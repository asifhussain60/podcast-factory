      "Sayyidina Ja'far ibn Mansur al-Yaman, *Kitab al-'Alim
      wa-l-Ghulam* (*The Book of the Master and the Boy*) — the
      dialogue book opens here with the threefold law of thanks,
      the Persian wanderer's biography, the sermon to the
      assembly, the long Master-Boy dialogue, and the binding of
      the covenant"
    - >
      "The architecture of *zahir* (apparent) and *batin* (inner)
      — surfaced first in the Master's sermon to the assembly
      (*his outward is a remembrance and an evidence for those
      who are guided, and his inward is a sure drink*), and then
      again in the Master's first limit on the boy (*uphold the
      outward meaning of the Book and its laws, and act upon what
      you know of it. Whoever does for God what he knows, God
      will guide him to what he does not know*); the full
      working-out runs through the rest of the book"
    - >
      "The *da'wa* hierarchy of *nāṭiq* (speaking Imam), *ḥujja*
      (argument), *du'āt* (summoners), and *nuqabā'* (chiefs) —
      named only indirectly in the Master's sermon (as the
      *family* who shield God's secrets and the *deposit* in the
      breasts of the righteous); fully developed in the
      cosmological chapter that follows"
    - >
      "*Hizb Allah* (the Party of God) — the boy's destination
      after the binding; the covenant is the rite of entry into
      the Party of God and the *company of His friends*"
    - >
      "*Taqiyya* (pious dissimulation) — anticipated in the
      Master's instruction to *stand with [the father] with
      outward agreement and keep all this your secret*; later
      chapters work the doctrine in its full doctrinal form"
