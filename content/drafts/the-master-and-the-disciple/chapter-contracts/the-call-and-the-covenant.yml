show_notes:
  blurb: >
    The opening chapter of *Kitab al-'Alim wa-l-Ghulam* (*The Book
    of the Master and the Boy*) — the *da'wa*'s foundational
    dialogue on how a teacher draws a seeker out of his world and
    binds him by oath into the Party of God. A delegation of
    believers asks a Master what work answers the threefold blessing
    of being called, being shown knowledge, and being commanded to
    work. The Master gives the threefold *law of thanks* — obedience
    answers the Master, action-plus-call answers knowledge,
    patience-plus-call answers the work — and then tells the story
    of a Persian wanderer rescued from *the calamity of ignorance*,
    who must now carry the call forward. The wanderer reaches a city
    on the far edge of the island, weighs an assembly of disputants
    by three qualities, delivers a sustained sermon on the
    hiddenness of God's secrets and the *deposit* of the call in the
    breasts of the righteous, and is followed home by the youngest
    and most thoughtful of the group — the son of a great Arab
    sheikh. The long Master-Boy dialogue then begins: *what is this
    matter; whose is it; on what authority does the Master speak;
    can a man secure it by acquisition or only by favor; what are
    the limits and conditions; and what shall the boy do about his
    father?* The Master imposes five conditions and refuses the boy
    permission to withdraw from his father — *stand with him with
    outward agreement, keep this your secret*. After a long absence,
    on a quiet night *when the informers had grown forgetful*, the
    boy finds the Master again. The Master recites to him the
    *covenant of God* — *the rope of God upon His earth* — and
    binds him fast. The boy weeps until his tears pour down. The
    chapter ends on the moment the binding is completed and the
    Master begins to expound. *The chapter is the door, and the
    covenant is the key.*
