show_notes:
  blurb: >
    The chapter where the book at last names them. Chapter four
    ended on the father's anger. The boy — *re-born* into the
    chain on the *seventh day* by the *greater Shaykh* (SHAYKH),
    given the *highest transmission* the source itself veils, and
    walked back to the edge of his city by the *scholar* —
    returned home with his heart absent in fear, and his father
    came to him, angry. This chapter is the *answer*. The father
    reproves; the boy offers *two strands of gratitude* (outward
    courtesy with divided hearts, or open debate with confidence
    between them); the father rejects the *taqiyya*-strand (*how
    long can outward agreement stand when its underpinnings
    differ?*) and chooses *debate*; the boy lays his bind
    (*either you are a scholar who withheld the teaching, or you
    are ignorant and needed the stranger; either way, I will
    precede you*); the father weeps, concedes, *they debated at
    intervals and disclosed things to each other at length, until
    they were guided to the right path*. *Through them, God
    revived many of His creation*. *The boy was sent out into the
    world to preach, with his father's blessing*. Then — for the
    first time in the book — the source names them: *the boy's
    name was Salih (SAA-lih), and his father's name was
    al-Bakhtari (al-bakh-tah-REE)*. News of them reaches a group
    who held to the old creed; the community goes to *Abu Malik*
    (a-BOO MAA-lik) — *the heel of the inks*, their senior
    scholar — and asks him what to do about the *blood and
    property* of these *crossers-over*. Abu Malik refuses to
    judge by anger. He gives the figure of the *breach* (*a
    breach in religion is gravely damaging, like a breach in
    medicine — its flaw cannot be repaired*) and lays out *three
    states* the *new community* could be in: *either they are
    upon what we know of religion (only with additions of
    literature, hadiths, poetry); or they have been given an
    increase in what they hold — and knowledge is a lost thing
    of the believer; or the people have given them guidance
    other than what they have, by the prophecy of a prophet who
    has been brought to them. This is not denied by the command
    of God … God is at work every day*. The *senior scholar of
    the old creed* voices the *three-states* doctrine that
    includes *prophecy after the books* as a *live possibility*.
    He warns the community against becoming *like the tyrants of
    the previous nations, who said God would not send messengers
    after their messengers … and even killed the prophets of
    God*. He humbles their hearts, teaches them the *door of
    seeking* (*the needy person must humble himself before what
    he needs*), the *sound heart* (*the heart that does not
    persist in denying what is said to it*), the *reverence-
    before-the-statement* doctrine, and the *petitioner-before-
    the-king* parable. He collapses the timetable from three
    days to two to *only this day, if you will do it; otherwise
    I go on alone*. They all repent, pay debts, bathe, put on
    the purest garments, and go out to al-Bakhtari's gate. Abu
    Malik calls al-Bakhtari *Abu Salih* (a-BOO SAA-lih, *father-
    of-Salih*); the father plays the title back open — *today
    my father is good, and I am the son of Salih; and he is
    good with his Lord*. Abu Malik names the *transpositions*
    (*the child has become the father, the Lord is in the
    earth, the Lord has a servant come to Him from him, the one
    who created annihilation has become eternal*) and asks for
    the *righteous slave*. Al-Bakhtari grants it under chain-
    discipline. Salih clears the council and welcomes them. The
    chapter's central exchange is the long Salih-Abu Malik
    dialogue. Salih's opening rebuke — *O Ka'b al-Ahbar* (KAB
    al-AH-bar, the paradigm of imitation-without-direct-
    knowledge) — *is it imitation, then?* Abu Malik's
    concession: *religion stands above imitation*. The *prophet-
    warner* doctrine: *the warner is a prophet, and the prophet
    is an argument from Allah, both for-them and against-them*.
    The *three faces of seeking*: *a seeker who knows, a
    seeker who does not know, a seeker who knows that he does
    not know* — with the parallel between *money-seeking* and
    *Hereafter-seeking* (the *divine scholar* who seeks out the
    dead; the *learned man* seeking the full end; the *ignorant
    who knows his ignorance*). Abu Malik places himself in the
    third — *the knowing seeker who knows nothing but knows
    that he is in need*. Salih probes: *knowledge by report* or
    *knowledge by direct sight*? — and lays out the *poverty-
    distress-capacity* doctrine: *ignorance is a need, poverty
    is the narrowness of need, distress is a great need that
    compels the creature to seek capacity; and capacity is the
    breadth of knowledge, because knowledge is wide*. Abu Malik
    confesses dire need. Salih: *how do you know me, without
    having seen me beside a scholar of prophecy?* The *essence-
    traders* parable: the *old creed's essence*, presented to
    the *people of metals*, was found to be *glass in
    camouflage*. *Knowledge is not knowledge until it is
    presented to those who know the science of heaven*. Abu
    Malik raises the question that frames the closing movement:
    *we know of no prophets and messengers in our time; nor
    have the people had any covenant with such men since the
    revelation was cut off by the books*. Salih: *any religion
    that is established only on narration is not called a
    religion*. The *books-themselves* fail because they give
    only the general. The *Maqrub* (mak-ROOB) divorce-case:
    Abu Malik, asked for a ruling, gave *two opposed rulings*
    and said *act on whichever of the two you wish* — *Maqrub
    goes home not knowing whether the woman in his house is
    his wife or another man's*. Abu Malik's confession: *the
    Sharia* (sha-REE-ah) *of my age has been lost, corrupted,
    and disrupted, and we hold on only to the name of
    religion*. Salih: *what is religion?* Abu Malik: *command,
    prohibition, lawful, forbidden, Sunnah* (SOON-nah)*,
    obligations*. Salih: *so you have combined religion and
    Sharia; then religion has been disrupted by the suspension
    of the Sharia — what is left with you?* Abu Malik sits a
    long while thinking, raises his head: *I do not see that
    anything is left with me. So what religion do you have?*
    Salih's positive doctrine — *religion is with me, and I am
    not veiled from it … the cause that connects heaven to
    earth, unbroken — the loop of the firm handhold, the rope
    of those who hold fast, the ark of tranquility and the
    ship of life and the light of life, generous in its
    content, safeguarded in its sciences, marked in its
    jewels, its virtue hidden from no one who looks upon it*.
    The chapter ends on Abu Malik's seam-question into chapter
    six: *if God has a religion by which He will judge on the
    Day … but now, since it has been lost, the attribute is
    preferable to him — so how is it described?*
