    described*; Salih's *how-do-you-know-me* probe in full
    (*you have not seen me rub elbows with a scholar of
    prophecy …*); the *essence-traders* parable in full (*we
    presented your essence to the essence-traders and the
    people of metals, and they tested it for us in the
    forge*); the *knowledge-is-not-knowledge-until-presented-
    to-the-science-of-heaven* doctrine; Abu Malik's *prophets-
    and-messengers* historical question in full (*we know of
    none of them in our time; nor have the people had any
    covenant with such men since the revelation was cut off by
    the books*); Salih's *religion-only-on-narration-is-not-
    religion* argument; the *Maqrub-divorce-case* in full (with
    Abu Malik's *act on whichever of the two you wish*); Abu
    Malik's *the Sharia of my age has been lost, corrupted,
    and disrupted, and we hold on only to the name of religion*
    confession; the *what-is-religion* exchange in full; the
    *combined-religion-and-Sharia* collapse; Abu Malik's silence
    and *I do not see that anything is left with me. So what
    religion do you have?*; Salih's positive doctrine in full
    (*religion is with me, and I am not veiled from it … the
    cause that connects heaven to earth, unbroken — the loop
    of the firm handhold, the rope of those who hold fast, the
    ark of tranquility and the ship of life and the light of
    life, generous in its content, safeguarded in its sciences,
    marked in its jewels, its virtue hidden from no one who
    looks upon it*); and the closing seam-question (*if God
    has a religion … but now, since it has been lost, the
    attribute is preferable to him — so how is it described?*).
  - >
    Use the Arabic-term phonetics on first chapter occurrence:
    *Kitab al-'Alim wa-l-Ghulam* (ki-TAAB al-AA-lim wal-ghu-LAAM),
    *Sayyidina Ja'far ibn Mansur al-Yaman* (sai-yi-DEE-nah JAH-far
    ibn man-SOOR al-YAH-man), *Shaykh* (SHAYKH), *da'wa* (DAH-wah),
    *Salih* (SAA-lih, first occurrence is the *naming* sentence,
    NOT earlier in the body), *al-Bakhtari* (al-bakh-tah-REE,
    same), *Abu Malik* (a-BOO MAA-lik), *Abu Salih* (a-BOO
    SAA-lih), *Abu al-Khair* (a-BOO al-KHAYR), *Ka'b al-Ahbar*
    (KAB al-AH-bar), *Maqrub* (mak-ROOB), *Sharia* (sha-REE-ah),
    *Sunnah* (SOON-nah), *Qur'an* (qur-AAN), *hadiths* (ha-DEETHS),
    *zakat* (za-KAAT), *zahir* (ZAA-hir), *batin* (BAA-tin),
    *ta'wīl* (/taʔˈwiːl/), *ḥawl* (/ħawl/), *quwwa* (/ˈquwːa/),
    *ḥujja* (/ˈħudʒːa/), *bāb* (/baːb/). Each phonetic appears
    once on its term's first chapter occurrence, per
    R-PRONUNCIATION-IMPERATIVE. *Taqiyya* (ta-KEE-yah) is
    referenced briefly only in the boy's *two-strands-of-
    gratitude* discussion; it is NOT a doctrinal centerpiece in
    this chapter (chapter four established it, chapter six will
    return to it as the *guardians have absented themselves*).
  - >
    The Prophet ﷺ honorific is spelled out on first per-chapter
    mention (*peace and blessings of Allah be upon him*) and
    contracted to ﷺ thereafter, per R-HONORIFIC-ONCE. In this
    chapter the Prophet is not directly named in the source
    text — but Salih's *prophet-warner* doctrine invokes the
    *prophet-as-argument-from-Allah-between-Him-and-His-
    creation*, and Abu Malik's *prophets-and-messengers*
    historical question invokes the *messengers* and the
    *revelation was cut off by the books*. If the Prophet must
    be named directly (e.g., in the brief gloss on the *Ka'b
    al-Ahbar* figure as a transmitter from *the People of the
    Book* alongside the Prophet's companions), use the spelled-
    out honorific on that first mention. The Imam is *not*
    directly named in this chapter — the *generous one* of
    chapter three and the *one whose right is binding* remain
    *un-named by name*. The phrase "Imam Ali" is FORBIDDEN per
    `imam-lineage-ismaili.yml`; the canonical Ismaili lineage
    runs Hassan as the first Imam, and "Father of Imams" is
    the only correct reference to ʿAlī ibn Abī Ṭālib if he
    must be named — but he is *not* named in this chapter.
  - >
    Names: the boy is *the boy* until the *naming* sentence
    (*the boy's name was Salih*); after that he is *Salih* (or,
    in Abu Malik's voice, *Abu al-Khair* or *the righteous
    slave*). The father is *the father* or *his father* until
    the *naming* sentence; after that he is *al-Bakhtari* (or,
    in Abu Malik's voice, *Abu Salih*). The *Master*-of-chapters-
    one-through-four is *the scholar* or *the stranger* (the
    father's term) in this chapter; he is *not* present in the
    chapter body (the chapter is *the answer* to chapter four's
    *parting*; the scholar has *traveled to another country*
    with the Shaykh). The *greater Shaykh* of chapter four is
    *not* present either. *Abu Malik* is *Abu Malik* throughout
    his on-stage presence (with the *Ka'b al-Ahbar* and *the
    mighty servant* and *the heel of the inks* and the
    *senior scholar of the old creed* as Salih's and the
    narrator's alternate references). *Maqrub* is named only
    once, in the divorce-case (the source does not develop
    him further). *The community* is *the community*, *the
    group*, *those who held to the old creed*.
  - >
    End on Abu Malik's seam-question into chapter six: *if God
    has a religion by which He will judge on the Day, with
    which He is pleased, and for which He rewards and punishes,
    then in this sense it exists. But now, since it has been
    lost, the attribute is preferable to him — so how is it
    described?* Do not pre-empt chapter six's material (the
    long discourse on justice and monotheism, the *Imam-Nāṭiq-
    Asās* doctrine, the *Taqiyya* of the *guardians of Allah*,
    the indictment of jurists who legitimize the killers of the
    guardians, the closing repentance, the author's signature).
    The chapter ends on the *attribute is preferable* question;
    chapter six is the *answer*.
anchor_passages:
  - >
    "The father's opening reproach (the chapter's opening seam-
    from-chapter-four): *O my son, is this the reward of sons to
    their fathers? I have taught you only the best that a child
    can be taught by a father, and you have not denied your own
    self nor renounced your beliefs except from the time I grew
    old with this strange man. You drew him in upon me, and you
    crossed over with him in his affair without consulting your
    parents. If what I knew was true, then you have hindered me
    in my very self, because you concealed the truth from me.
    And if it is false, then you have disobeyed me in your own
    ruin, and whatever has reached him has thereby reached me.*"
  - >
    "The boy's bind on the father (the chapter's first turning
    point): *Have you seen my standing with you for forty years
    to be anything other than one of two strands? Either you are
    a scholar, and you have withheld from me the teaching I am
    owed — do not blame me, then, if you forbid me from seeking
    my own salvation through another. Or you are ignorant — and
    you are excused with me — but you needed a man who was a
    stranger to me. I will precede you to him because of your
    age and the lateness of your birth, for I have heard his
    words just as you have heard them, and I have seen what you
    have seen.*"
  - >
    "The compressed-arc sentence of the father's conversion (the
    chapter's first hinge): *So they debated at intervals and
    disclosed things to each other at length, until they were
    guided to the right path — acting upon the religion of God,
    upholding it, holding fast to it, calling others to it, and
    cooperating in it. Through them, God revived many of His
    creation. And He sent the boy out into the world to preach,
    with his father's blessing, and to ask others to come to
    him. The boy came back to them and became a cause for their
    guidance. God blessed the people of that country through
    them and at their hands. God commanded, and slander was
    disappointed.*"
  - >
    "The naming of the world (the book's most-delayed
    revelation): *The boy's name was Salih, and his father's
    name was al-Bakhtari. They were honored — raised up before
    others, and given a high standing because of the excellence
    of the manners they had acquired.*"
  - >
    "Abu Malik's *three states* doctrine (the chapter's first
    long doctrinal speech): *Reflect on the affairs of these
    people, for they cannot be free of one of three states.
    Either the people are upon what we know of religion, and
    this incident among them is only an increase in literature,
    hadiths, poetry, and the abundant words of people; or they
    have given them an increase in what they hold in their
    religion, and they have rejoiced in it — and knowledge with
    every believer is a lost thing, and an increase of
    knowledge is better than a decrease; or the people have
    given them guidance other than what they have, by the
    prophecy of a prophet who has been brought to them and who
    has called them to it, and they have followed it clearly.
    This is not denied by the command of God, nor will the
    creation reach the end of God's decree in them or of His
    will in them, even if they strive their utmost. God is at
    work every day.*"
  - >
    "Abu Malik's lesson of the *tyrants of the previous
    nations* (the warning against the same logic the community
    came with): *We would then be like the tyrants of the
    previous nations, who fancied their doctrines in their
    judgment and rejoiced in their knowledge, until they
    thought they had encompassed all that God had commanded,
    taught, and intended to create. They said God would not
    send messengers after their messengers, and they did not
    consider that beyond what they had attained there was
    knowledge or doctrine. So they passed judgment that God
    should cut off His argument against His creation and His
    viceregents in His land. They made God's knowledge in His
    servants, and what He had sent down to His prophets and
    messengers, no more than the sum of their own minds —
    anything beyond that was misguidance to them. So they
    preferred that opinion and went greatly astray. They made
    light of it by their own rule, did not forbid for God, and
    even killed the prophets of God.*"
  - >
    "The *door of seeking* and the *sound heart* (Abu Malik's
    teaching to the community): *As for the knowledge of
    seeking, you must know that you are needy. The needy person
    must humble himself before what he needs. As for the sound
    heart: it is the heart that does not persist in denying
    what is said to it, nor in being, even — the truth is what
    unveils itself and shows its merit, and falsehood is what
    reveals its own nakedness. Then the sound heart discerns
    falsehood by its intellect and accepts the truth by
    acceptance.*"
  - >
    "The *petitioner-before-the-king* parable (the chapter's
    most sustained teacher-doctrine moment): *Like one who seeks
    something and stands before some king to ask for it, and is
    able to ask only with reverence. If he gives the petitioner
    something of what he asked for, he has fulfilled his duty
    of grace, and he earns the reward of what he gave. If he
    gives nothing, the petitioner has at least discharged the
    duty of asking gently for the matter, while stinginess
    obliged the other to withhold. So too with the seeker of
    knowledge: he must begin with humility, persistence, and
    patience in the face of adversity, until he fulfills the
    duty of requesting — and then time will bring him what it
    brings.*"
  - >
    "The *only-this-day* timetable-collapse: *Yes — we will do
    what you have commanded, over three days.* / *No.* / *Two
    days, then?* / *Only this day, if you will do it; otherwise
    I go on alone.* / *We repent to Allah from every sin, and
    we put aside what is owed; and we do what you have
    commanded — there is no power except in Allah.*"
  - >
    "The *Abu Salih / son-of-Salih* wordplay (the chapter's
    most exquisite batin-play on the names): *O Abu Salih, how
    is the good son? And where is he?* / *Today my father is
    good, and I am the son of Salih; and he is good with his
    Lord.* / *Salih had died?* / *Salih does not die and will
    never die. It is no figure of speech — the eternity
    remains.* / *These are three qualities whose meanings have
    been transposed: the child has become the father, the Lord
    is in the earth, and the Lord has a servant come to Him
    from him; and the one who created annihilation has become
    eternal. A whiff of perfume to perplexed students — and
    behind this lie further wonders.*"
  - >
    "Salih's *Ka'b al-Ahbar* rebuke and the *prophet-warner*
    doctrine: *Their nation has come to me, O Ka'b al-Ahbar —
    is it imitation, then? Where is your perfect mind and the
    noble understanding I have always credited to you?* /
    *Your stature is too high for mere prestige, and religion
    stands above imitation.* / *How then can I have warners,
    when the warner is a prophet? And the prophet is an
    argument from Allah between Him and His creation, for them
    and against them. How then can he be an argument for you
    when he is not an argument against you?*"
  - >
    "The *three faces of seeking* doctrine in full (the
    chapter's signature contribution): *The seeking is of three
    faces: a seeker who knows, a seeker who does not know, and
    a seeker who knows that he does not know. Which of the
    three are you?* / *Money is the treasure of the people of
    this world, and knowledge is the treasure of the people of
    the Hereafter. The seeking of money is of three kinds: a
    seeker who asks for what is his by right, a seeker who asks
    for what is owed on terms, and a seeker who asks for alms.
    So is the seeking of debt. The treasures of the Hereafter
    are sought in three ways as well. The first is the seeker
    who is himself a knower — the divine scholar — who seeks
    out the dead in their ignorance to revive them with his
    knowledge. The second is the seeker who knows — the learned
    man who has mastered certain degrees of knowledge and seeks
    their full end and limit; he is the knowing seeker. The
    third is the ignorant man who is known by his ignorance:
    he knows nothing beyond knowing that he is in need; so he
    asks the scholars in order to know. These three are the
    faces of the seekers.*"
  - >
    "The *knowledge-by-report-vs-direct-sight* distinction
    (the chapter's second doctrinal innovation): *Knowledge by
    report is news; knowledge by direct sight is eye-witness.*
    / *As for the way of news — it is the case of an ignorant
    man who does not know that he is ignorant until he meets a
    scholar, and the scholar tells him of his ignorance; then
    he knows that he is an ignorant man in need of knowledge,
    by the scholar's word. His knowledge of his ignorance has
    come to him as report. As for knowledge of need and
    ignorance by direct sight — that is the man who already
    knows in his own mind that he is asking about something,
    but does not know the face of the answer. His chest is
    straitened by ignorance, and he hopes for no relief except
    by knowledge of what he is ignorant of; so his ignorance
    has itself become a knowledge of his mind. Ignorance is a
    need, poverty is the narrowness of need, and distress is a
    great need that compels the creature to seek capacity; and
    capacity is the breadth of knowledge, because knowledge is
    wide. By this, I know that you are in need.*"
  - >
    "Salih's *how-do-you-know-me* probe (the chapter's rebuke
    of mediated imitation): *How can it be true for you that I
    am known for capacity unless you first know it of me
    yourself? And how is it that I knew I was the one sought,
    so as to intend it for you? You have not seen me rub elbows
    with a scholar of prophecy, so as to know me by that; nor
    have you witnessed from me the proofs of evidence, so as
    to know me by that. Will you, then, raise your request to
    the ease of imitation? In doing so you wrong wisdom and you
    wrong yourself. … Likewise, the one who takes knowledge as
    a tradition — if he does not give thanks for it, and then
    leaves it, he is called a disbeliever. And you are wiser
    to me than this.*"
  - >
    "The *essence-traders* parable (the chapter's central
    doctrinal parable): *As for your essence, it was generous
    of us to grant it to you as a correct essence — until we
    presented it to the essence-traders and the people of
    metals, and they tested it for us in the forge. They did
    not accept it from us as essence; they said it was glass in
    camouflage, and they pointed out its defects to us — and
    so it fell from the limits of essence. But true essence
    rises with its own preciousness and by the knowledge of the
    people of insight, who give thanks for it and compete for
    it, so that its price reaches every sum. … Likewise,
    knowledge is not knowledge until it is presented to those
    who know the science of heaven. If they accept it, it is
    true knowledge; and if they do not accept it, it is
    nonsense. Idleness is not permitted in wisdom, nor accepted
    by the wise.*"
  - >
    "The *Maqrub-divorce-case* (the chapter's concrete
    indictment of the Sharia-by-narration): *I heard you on the
    day of the quarrel, when a man came to you — Maqrub — and
    said to you: 'O Abu Malik, I swore an oath of divorce and
    broke it.' You said to him, 'Some people say she is
    forbidden to you and not lawful for you until she marries
    another husband, and some people say she is still your
    wife and is not forbidden to you by a single divorce.' So
    the man said to you: 'Which of these should I act on?' You
    said to him: 'Act on whichever of the two you wish.' Yet
    he does not know whether what he goes home to is lawful or
    forbidden. Is this how rulings work in the religion of
    God? Is this how God's lawful and forbidden are
    determined?* / *The Sharia of my age has been lost,
    corrupted, and disrupted, and we hold on only to the name
    of religion.*"
  - >
    "The *religion-equals-Sharia* collapse (the chapter's
    closing argument): *And what is religion, O Abu Malik?* /
    *Command and prohibition, the lawful and the forbidden,
    the Sunnah and the obligations.* / *What is Sharia, in
    your view, other than this?* / *I do not know of anything
    beyond what I have described to you.* / *So you have
    combined religion and Sharia into a single thing?* /
    *Yes.* / *Then religion has been disrupted by the
    suspension of the Sharia, and corrupted by its corruption
    — what is left with you?* / *I do not see that anything
    is left with me. So what religion do you have?*"
  - >
    "Salih's positive doctrine (the chapter's da'wa-positive
    answer): *Religion is with me, and I am not veiled from
    it. The corruptors opened its doors to the seekers, and
    the seeker remembered the first one who brought it and
    followed in good; he sought it, and through it works were
    honored, and through its justice the laws flourished. It
    is the cause that connects heaven to earth, unbroken —
    the loop of the firm handhold, the rope of those who hold
    fast, the ark of tranquility and the ship of life and the
    light of life, generous in its content, safeguarded in
    its sciences, marked in its jewels, its virtue hidden from
    no one who looks upon it.*"
  - >
    "The closing seam-question into chapter six (the chapter's
    unresolved seam): *If God has a religion by which He will
    judge on the Day, with which He is pleased, and for which
    He rewards and punishes, then in this sense it exists. But
    now, since it has been lost, the attribute is preferable
    to him — so how is it described?*"
