  references:
    - >
      "Sayyidina Ja'far ibn Mansur al-Yaman, *Kitab al-'Alim
      wa-l-Ghulam* (*The Book of the Master and the Boy*) —
      the chapter that names the boy as *Salih* (SAA-lih, *the
      righteous one*) and his father as *al-Bakhtari* (al-bakh-
      tah-REE), and stages the *public da'wa*'s first
      encounter with the *senior scholar of the old creed*,
      *Abu Malik* (a-BOO MAA-lik), called among his people
      *the heel of the inks*"
    - >
      "The *three faces of seeking* doctrine — *a seeker who
      knows, a seeker who does not know, a seeker who knows
      that he does not know* — with the three-by-three
      parallel between *money-seeking* (*by right, on terms,
      alms*) and *Hereafter-seeking* (the *divine scholar*
      seeking out the dead; the *learned man* seeking the
      full end; the *ignorant-who-knows-his-need*); the
      *da'wa*'s pedagogical framework for placing every
      seeker on a map before any teaching is given"
    - >
      "The *knowledge-by-report-vs-direct-sight* distinction —
      *knowledge by report is news; knowledge by direct sight
      is eye-witness* — applied to the seeker's own *self-
      knowledge of ignorance*: the *direct-sight knowledge of
      ignorance* is the *straitening of the chest*, *ignorance
      is a need, poverty is the narrowness of need, distress
      is a great need that compels the creature to seek
      capacity; and capacity is the breadth of knowledge,
      because knowledge is wide*"
    - >
      "The *essence-traders* parable — *we presented your
      essence to the essence-traders and the people of metals,
      and they tested it for us in the forge. They did not
      accept it from us as essence; they said it was glass in
      camouflage* — and the closing doctrine *knowledge is
      not knowledge until it is presented to those who know
      the science of heaven*. The *da'wa*'s answer to the
      *self-verifying-tradition* claim: even *jewel-figures*
      can be *glass in camouflage*; the test is *presentation
      to the people of the science of heaven*"
    - >
      "The *Maqrub-divorce-case* (the chapter's concrete
      indictment of the *Sharia-by-narration*) — *I swore an
      oath of divorce and broke it … which of these should I
      act on? Act on whichever of the two you wish* — and
      Abu Malik's confession *the Sharia of my age has been
      lost, corrupted, and disrupted, and we hold on only to
      the name of religion*. The *da'wa*'s argument against
      the *fiqh*-tradition's *internal indeterminacy*: when
      the *senior scholar* cannot give the *seeker* a single
      ruling, the *Sharia-as-religion* has been *suspended*"
    - >
      "The *religion-as-the-cause* doctrine (Salih's positive
      reply to Abu Malik's *zero point*) — *religion is the
      cause that connects heaven to earth, unbroken — the loop
      of the firm handhold, the rope of those who hold fast,
      the ark of tranquility and the ship of life and the
      light of life, generous in its content, safeguarded in
      its sciences, marked in its jewels, its virtue hidden
      from no one who looks upon it*. The *da'wa*'s positive
      doctrine: religion is the *living chain* between heaven
      and earth, not the *narrations* or the *Sharia*; it is
      *safeguarded* in its *sciences*; it is *recognizable*
      to the *people of insight* by its *jewels*"
    - >
      "The *plural-fathers* image extended from chapter four —
      the boy's chapter-four *parting from his elder father
      and the father who had been the cause of his grace*
      (the *Shaykh* and the *Master*) is now joined by the
      *biological father*'s *crossing-over* into the new
      religion; al-Bakhtari's *batin*-play *today my father
      is good, and I am the son of Salih* names the inversion
      in which *the son becomes the spiritual father of his
      biological father*"
    - >
      "Abu Malik's seam-question into chapter six — *if God
      has a religion by which He will judge on the Day, with
      which He is pleased, and for which He rewards and
      punishes, then in this sense it exists. But now, since
      it has been lost, the attribute is preferable to him —
      so how is it described?* — sets up chapter six's long
      discourse on God's *justice* and *monotheism*, the
      *Imam-Nāṭiq-Asās* doctrine, the *Taqiyya* (ta-KEE-yah)
      of the *guardians of Allah*, and the description of
      religion-by-attribute in the *da'wa*'s register"
