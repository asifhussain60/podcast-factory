title: "The Father Revealed and the Three Faces of Seeking"
audience: >
  Thoughtful adult readers continuing the dialogue book of the Ismaili
  *da'wa* (DAH-wah — call, missionary apparatus) — *Kitab al-'Alim
  wa-l-Ghulam* (ki-TAAB al-AA-lim wal-ghu-LAAM, *The Book of the
  Master and the Boy*), attributed to Sayyidina Ja'far ibn Mansur
  al-Yaman (sai-yi-DEE-nah JAH-far ibn man-SOOR al-YAH-man) — after
  the cosmology of chapter two, the ethical-practical bridge of
  chapter three, and the initiation chapter four where the boy was
  *re-born* into the chain on the *seventh day* by the *greater
  Shaykh* (SHAYKH), received the *highest transmission* the source
  itself veils, and walked back to the edge of his city. Chapter four
  closed on a single line — *then his father came to him, angry* —
  the boy's *biological father*, the third father (the *elder father*
  was the *Shaykh*; the *father who had been the cause of his grace*
  was the *Master*), the one whose enmity toward the people of this
  matter the Master had named in chapter one. This chapter is the
  *answer* to that anger. It opens with the father's long reproach
  (*is this the reward of sons to their fathers? you drew him in
  upon me, and you crossed over with him in his affair without
  consulting your parents*); the boy's offer of *two strands of
  gratitude* (outward courtesy with divided hearts, or open debate
  with confidence between them); the father's surprising rejection
  of the *taqiyya*-strand (*how long can outward agreement stand
  when its underpinnings differ? I do not want that*); the boy's
  bind on the father (*either you are a scholar and have withheld
  the teaching, or you are ignorant and needed a stranger; either
  way, I will precede you to him*); the father weeping, conceding,
  committing in advance to *accept the truth if shown, reject the
  falsehood for your sake*; *they debated at intervals and disclosed
  things to each other at length, until they were guided to the
  right path*; *God revived many of His creation through them*; *the
  boy was sent out to preach with his father's blessing*. Then —
  for the first time in the book — the source names them: *the boy's
  name was Salih, and his father's name was al-Bakhtari* (*Ṣāliḥ*,
  SAA-lih, *the righteous one*; *al-Bakhtarī*, al-bakh-tah-REE).
  News of them reaches a group who held to the old creed; the
  community goes to a scholar they call *Abu Malik* (a-BOO MAA-lik) —
  known among them as *the heel of the inks* — and asks him to
  judge their *blood and property*. Abu Malik refuses to judge by
  anger; he gives the figure of the *breach* (*a breach in religion
  is gravely damaging; its flaw cannot be repaired, like a breach in
  medicine*); he lays out *three states* the people could be in
  (*either they are upon what we know of religion; or they have
  given them an increase; or the people have given them guidance
  other than what they have, by the prophecy of a prophet who has
  been brought to them — this is not denied by the command of God …
  God is at work every day*); he warns against becoming *like the
  tyrants of the previous nations, who said God would not send
  messengers after their messengers … and even killed the prophets
  of God*; he teaches them that *seekers are the ones who do not
  yet know which is which*; he gives the *door of seeking* (*the
  needy person must humble himself before what he needs*); the
  *sound heart* (*the heart that does not persist in denying what
  is said to it … the truth is what unveils itself and shows its
  merit, and falsehood is what reveals its own nakedness*); the
  *reverence-before-the-statement* doctrine; the
  *petitioner-before-the-king* parable; and collapses the timetable
  from *three days* to *two days* to *only this day, if you will do
  it; otherwise I go on alone*. They all repent, pay debts, bathe,
  put on the purest garments, and go out together to al-Bakhtari's
  gate. Abu Malik calls al-Bakhtari *Abu Salih* (a-BOO SAA-lih); the
  father plays the title back open (*today my father is good, and I
  am the son of Salih; and he is good with his Lord*); Abu Malik
  names the *transpositions* (*the child has become the father, the
  Lord is in the earth, the Lord has a servant come to Him from
  him, the one who created annihilation has become eternal*); and
  asks for a meeting with the *righteous slave*. Al-Bakhtari grants
  it under chain-discipline (*no way to that — but did you mean my
  son, Salih?*); Salih's prayer (*O Allah, open the hearts of Your
  servants and guide them by Your mercy to the signs of what is
  sought*); the council is cleared; the visitors enter. The
  doctrinal climax is the long Salih-Abu Malik dialogue: Salih's
  rebuke of imitation (*O Ka'b al-Ahbar*, KAB al-AH-bar, the
  paradigm of imitation-without-direct-knowledge); the
  *prophet-warner* doctrine (*the warner is a prophet, and the
  prophet is an argument from Allah, both for-them and
  against-them*); Abu Malik's threefold concession (*we have come
  to know the virtue of asking*); the *three faces of seeking* (*a
  seeker who knows, a seeker who does not know, a seeker who knows
  that he does not know*) with the parallel between *money* and
  *knowledge* (the *divine scholar* who seeks out the dead, the
  *learned man* seeking the full end, the *ignorant man who knows
  his ignorance*); Abu Malik's self-diagnosis as the third;
  *knowledge by report* vs *knowledge by direct sight* (*ignorance
  is a need, poverty is the narrowness of need, distress is a
  great need that compels the creature to seek capacity; and
  capacity is the breadth of knowledge, because knowledge is
  wide*); Abu Malik's confession of dire need; Salih's *how do you
  know me?* probe (*you have not seen me rub elbows with a
  scholar of prophecy, so as to know me by that; nor have you
  witnessed from me the proofs of evidence*); the *essence-traders*
  parable (*we presented your essence to the essence-traders and
  the people of metals, and they tested it for us in the forge.
  They did not accept it from us as essence; they said it was glass
  in camouflage*); the doctrine that *knowledge is not knowledge
  until it is presented to those who know the science of heaven*.
  Abu Malik raises the historical-temporal question (*of those who
  know the science of the heavens — the prophets and messengers —
  we know of none in our time; nor have the people had any covenant
  with such men since the revelation was cut off by the books; and
  the nations are no longer condemned except by reports*). Salih's
  three-step answer: *(1) any religion that is established only on
  narration is not called a religion*; *(2)* the books-themselves
  fail because they give only the general, and someone must make
  the specific; the *Maqrub* (mak-ROOB) divorce-case shows that
  Abu Malik himself, asked for a ruling, could only say *act on
  whichever of the two you wish*; *(3)* Abu Malik's confession,
  *the Sharia (sha-REE-ah) of my age has been lost, corrupted, and
  disrupted, and we hold on only to the name of religion*. Salih
  asks *what is religion?*; Abu Malik gives the standard *fiqh*
  answer (*command, prohibition, lawful, forbidden, Sunnah, SOON-nah,
  obligations*); Salih: *so you have combined religion and Sharia
  into a single thing; then religion has been disrupted by the
  suspension of the Sharia, and corrupted by its corruption — what
  is left with you?* Abu Malik sits a long while thinking, then
  raises his head: *I do not see that anything is left with me. So
  what religion do you have?* Salih's positive doctrine — *religion
  is with me, and I am not veiled from it … the cause that connects
  heaven to earth, unbroken — the loop of the firm handhold, the
  rope of those who hold fast, the ark of tranquility and the ship
  of life and the light of life, generous in its content,
  safeguarded in its sciences, marked in its jewels, its virtue
  hidden from no one who looks upon it*. The chapter ends on Abu
  Malik's seam-question into chapter six: *if God has a religion by
  which He will judge on the Day … but now, since it has been
  lost, the attribute is preferable to him — so how is it
  described?* The chapter is the *naming of the world* (the names
  *Salih*, *al-Bakhtari*, and *Abu Malik* enter the book together);
  the *opening of the world's seeking* (the senior scholar of the
  old creed is now a seeker); and the *handoff* into chapter six's
  long discourse on justice, monotheism, and the description of
  religion-by-attribute.
angle: faithful_exposition
episode_format: deep_dive
format_rationale: >
  The chapter is a sustained primary-source narrative-with-doctrine
  developing ONE position — the *three faces of seeking* doctrine
  plus the *corruption-of-Sharia-only-religion* indictment plus the
  positive doctrine of *religion as the cause that connects heaven
  to earth, unbroken*. There are multiple named voices (the father,
  the boy/Salih, the community, Abu Malik), and the chapter does
  contain extended dialogue with concessions on both sides — but it
  is NOT a debate in the *al-Islah vs al-Nusra* sense (two named
  opposing doctrinal positions being adjudicated by a third). Every
  foil voiced (the father, the community, Abu Malik) *concedes and
  crosses over*: the father concedes after the boy's bind and is
  brought into the company of the brethren; the community concedes
  after Abu Malik's three-states reasoning and goes out with him;
  Abu Malik concedes on imitation, on the third-face self-diagnosis,
  on the Maqrub case, on the identity of religion-and-Sharia, and
  on *I do not see that anything is left with me*. Each interlocutor
  acts as a *prompter-and-receiver* on the way to Salih's positive
  doctrine. The chapter is a *deep_dive* in which the boy of
  chapters one through four becomes the *teacher* and the *Ka'b
  al-Ahbar* figure of the old creed becomes the *student* — an
  inversion of roles preserved by the same host_dynamic
  (curious_mind + scholar_companion) that has carried the book.
essential: core
essential_rationale: >
  This is the chapter that *reveals the names* (*Salih*,
  *al-Bakhtari*, *Abu Malik*) — the boy's name in the world after
  the chapter four batin-naming was deferred under the
  *coextensivity of name and named* doctrine. It is also the
  chapter that stages the *public da'wa*'s first encounter with the
  *senior scholar of the old creed* — the *Ka'b al-Ahbar* figure —
  and gives the signature *three faces of seeking* doctrine (*a
  seeker who knows, a seeker who does not know, a seeker who knows
  that he does not know*) with the parallel between *money* and
  *knowledge* (three kinds of money-seeking; three kinds of
  Hereafter-seeking: the *divine scholar*, the *learned man*, the
  *ignorant-who-knows-his-need*). The *knowledge-by-report* vs
  *knowledge-by-direct-sight* distinction, the *essence-traders*
  parable, the *forge-test* for true knowledge, the doctrine that
  *knowledge is not knowledge until it is presented to those who
  know the science of heaven*, the *Maqrub-divorce-case* indictment
  of the *Sharia-by-narration*, the *religion-equals-Sharia*
  collapse, and the positive doctrine of *religion as the cause
  that connects heaven to earth, unbroken — the loop of the firm
  handhold, the rope of those who hold fast, the ark of tranquility
  and the ship of life and the light of life* are all *da'wa* moves
  the book cannot be cut without losing. The chapter also stages
  the *first* time the *biological father* (previously *enemy*) is
  brought into the *new religion* — the *enmity toward the people
  of this matter* of chapter one and the *anger* of chapter four
  are *resolved* in the *they debated at intervals … God revived
  many of His creation through them* sentence. The closing seam
  (Abu Malik's *the attribute is preferable to him — so how is it
  described?*) is the *direct setup* for chapter six's long
  doctrinal discourse on justice, monotheism, and the description
  of religion-by-attribute.
host_dynamic: curious_mind + scholar_companion
host_dynamic_rationale: >
  The curious_mind voices the *foil-voices* across the chapter in
  sequence — the father in the opening reproach (*is this the
  reward of sons to their fathers?* / *if what I knew was true, you
  have hindered me … and if it is false, you have disobeyed me in
  your own ruin*); the community in the gathering before Abu Malik
  (*do you not see what the boy has gone over to? we are overwhelmed
  by what has happened and have held back for three reasons*); and
  *Abu Malik himself* in the long climactic dialogue (the
  *imitation* concession *religion stands above imitation*, the
  *third-face* self-diagnosis *I am the knowing seeker who knows
  nothing but knows that he is in need*, the *dire-need* confession
  *I find within myself everything you have just described*, the
  *Maqrub* concession *act on whichever of the two you wish … the
  Sharia of my age has been lost*, the *combined-religion-and-Sharia*
  concession *I do not know of anything beyond what I have
  described*, the *zero-point* confession *I do not see that
  anything is left with me — so what religion do you have?*, and
  the closing seam-question *how is it described?*). The
  scholar_companion voices *the boy/Salih* across the same
  sequence — the *two strands of gratitude* offer, the bind on the
  father (*either you are a scholar … or you are ignorant*), the
  *Ka'b al-Ahbar* rebuke and the *prophet-warner* doctrine, the
  *three faces of seeking* exposition, the *knowledge-by-report-vs-
  knowledge-by-direct-sight* distinction, the *essence-traders*
  parable, the *religion-only-on-narration-is-not-religion*
  argument, the *Sharia-suspension* logic, and the positive
  doctrine *religion is with me … the cause that connects heaven
  to earth, unbroken*. The scholar_companion also voices *Abu
  Malik in his scholar-mode* with the community at the gathering —
  the *three-states* reasoning, the *breach* figure, the *tyrants
  of the previous nations* lesson, the *door of seeking* teaching,
  the *sound heart* doctrine, the *reverence-before-the-statement*
  doctrine, the *petitioner-before-the-king* parable, and the
  *only-this-day* timetable-collapse — because in those passages
  Abu Malik is the *teacher*, not the *foil*, and the
  scholar_companion register matches the role. The chapter's
  signature move is the *role-inversion* in the climactic
  Salih-Abu Malik dialogue: the boy who was the *student* in
  chapters one through four is the *teacher* here, and the *senior
  scholar of the old creed* is the *student*. The same
  host_dynamic (curious_mind + scholar_companion) carries the
  inversion without renaming the registers.
length_target: extended
key_tensions:
  - >
    The chapter's central method is to walk the *foil-voices*
    through *concession-by-doctrine*, not *defeat-by-argument*.
    The father concedes after the boy's bind; the community
    concedes after Abu Malik's three-states reasoning; Abu Malik
    concedes through six successive admissions in the climactic
    dialogue. The hosts must let each concession land *as a
    crossing-over*, not as *losing-an-argument*. Each foil is
    *brought in*; none is *cast out*. The chapter's positive
    doctrine — *religion as the cause that connects heaven to
    earth, unbroken* — is *received* by the conceders, not
    *imposed* on them. The role-inversion (the boy as teacher; the
    senior scholar as student) is the *fruit* of the chain-work of
    chapters one through four. The hosts must avoid the temptation
    to make this a debate-with-winner; the source's pattern is
    *every foil eventually consents*.
  - >
    The *naming of the world* is the chapter's central revelation —
    *the boy's name was Salih, and his father's name was
    al-Bakhtari* — and it must land *as a single moment* in the
    same sentence the chapter places it: *they were honored —
    raised up before others*. The two names enter the book
    *together*, in a parenthesis to the larger sentence about
    honor and standing. Do NOT introduce *Salih* before the source
    does (do not retroject the name into the father-confrontation
    discussion before the *they debated at intervals … God revived
    many of His creation through them* sentence). The chapter
    *four* contract forbade the name from being used in chapter
    *four* body except in the closing seam-paragraph; the chapter
    *five* contract forbids the name from being used in chapter
    *five* body *before the naming sentence*. The *naming* is the
    *hinge*; everything before it is *the boy* and *the father*;
    everything after it is *Salih* and *al-Bakhtari*. The chapter
    *five* contract also introduces *Abu Malik* (a-BOO MAA-lik),
    *Abu Salih* (a-BOO SAA-lih), *Abu al-Khair* (a-BOO al-KHAYR),
    *Ka'b al-Ahbar* (KAB al-AH-bar), and *Maqrub* (mak-ROOB) on
    their first chapter occurrence; the *Sharia* (sha-REE-ah),
    *Sunnah* (SOON-nah), *Qur'an* (qur-AAN), *hadiths* (ha-DEETHS),
    and *zakat* (za-KAAT) terms on first chapter occurrence per
    R-PRONUNCIATION-IMPERATIVE.
  - >
    The *three faces of seeking* doctrine is the chapter's
    signature contribution. The three (*a seeker who knows, a
    seeker who does not know, a seeker who knows that he does not
    know*) MUST be voiced with the source's exact construction —
    each face given its full name on first occurrence; the
    parallel with *money-seeking* (*by right, on terms, alms*)
    given in full; the *Hereafter*-parallel given as three named
    figures (*the divine scholar* who seeks out the dead; *the
    learned man* who seeks the full end; *the ignorant who knows
    his ignorance*); Abu Malik's self-placement in the third
    given verbatim (*I am the knowing seeker who knows nothing
    but knows that he is in need*). The hosts must not collapse
    the three into a slogan or paraphrase the doctrine into a
    modern equivalent — the *three faces* doctrine is the
    chapter's *teachable*, and the doctrine works by its three-by-
    three architecture, not by its summary.
  - >
    The *Maqrub-divorce-case* is the chapter's most concrete
    indictment of the *Sharia-by-narration*. The case-detail must
    stay verbatim: a man named *Maqrub* came to Abu Malik with
    *I swore an oath of divorce and broke it*; Abu Malik gave him
    *two opposed rulings* (the strict — *she is forbidden to you
    and not lawful for you until she marries another husband*;
    the lenient — *she is still your wife and is not forbidden
    to you by a single divorce*); Maqrub asked *which of these
    should I act on?*; Abu Malik said *act on whichever of the
    two you wish*; Salih frames the implication — *yet he does
    not know whether what he goes home to is lawful or
    forbidden. Is this how rulings work in the religion of God?
    Is this how God's lawful and forbidden are determined?* Abu
    Malik's confession follows in full — *the Sharia of my age
    has been lost, corrupted, and disrupted, and we hold on only
    to the name of religion. What is the state of your religion?*
    The hosts must let the case-detail do its work — the *act on
    whichever of the two you wish* is the *evidence* on which the
    rest of the closing movement turns; flattening it loses the
    chapter's force.
  - >
    The chapter's closing seam — Abu Malik's *the attribute is
    preferable to him — so how is it described?* — is the
    *unresolved question* into chapter six. The hosts must end on
    the seam *as the seam*: do not pre-empt chapter six's
    discourse on justice and monotheism, the necessity of causes
    and messengers, the unbroken succession against the
    *no-prophet-after* claim, the indictment of jurists who
    legitimize the killers of the guardians, or the *Taqiyya*
    (ta-KEE-yah) doctrine. The chapter ends with the *question
    hanging*; chapter six is the *answer*. The chapter five
    contract is to *end on the description-by-attribute question*,
    not to summarize what follows.
  - >
    The chapter's *batin*-play on the names (*today my father is
    good, and I am the son of Salih; and he is good with his
    Lord*) is one of the source's most exquisite moments and
    must be voiced *with the inversion preserved*. The *zahir-
    batin* reading of the wordplay must be made explicit (the
    chapter four chain-discipline of *spiritual fatherhood* now
    extended to al-Bakhtari's having been *re-born by his son*),
    but the source's *form* must not be smoothed away. The four
    transpositions Abu Malik then names (*the child has become
    the father, the Lord is in the earth, the Lord has a servant
    come to Him from him, the one who created annihilation has
    become eternal*) must be voiced *in full* with their *three-
    qualities* miscount preserved (the source calls it *three*,
    then names *four*) — the *miscount* is *itself a sign* that
    Abu Malik is *grasping more than he is counting*.
