show_notes:
  blurb: >
    The cosmological foundation of *Kitab al-'Alim wa-l-Ghulam*
    (*The Book of the Master and the Boy*). The boy, just bound by
    the covenant at the end of chapter one, falls silent in his
    composure — and the Master *begins to expound and explain*.
    The Master starts at the origin: God as the *First of all firsts
    and the Inheritor of every thing*, the original light from which
    three words branch — *will*, *command*, and *saying* — whose
    seven letters (two of *Kun* and five of *fa-yakun*) produce the
    seven principles: air alone without consort, then water,
    darkness, light, then smoke, condensation, fire. The cipher
    unfolds into seven heavens, seven earths, twelve constellations,
    seven kingdoms, twelve islands, and seventeen seas; into day and
    night and the *sunna* of pairs in animal life, in speech, in
    names and meanings; and into the four ranks of the religion —
    the *imams* and *speakers* (*nāṭiqs*), the *arguments*
    (*ḥujaj*) and *chiefs* (*nuqabā'*), and the *summoners* (*du'āt*).
    The Master maps the cosmology onto the religion: the seven
    heavens are the seven *nāṭiqs*, the twelve constellations are
    the twelve *nuqabā'*, the seven earths are the imams of
    guidance, the twelve islands are the *ḥujaj*, the rivers and
    springs are the *du'āt*. The boy, who has been silent through
    the long architecture, asks the standing question about the
    *world* — some seek it, some reproach it — and the Master cuts
    through the dispute with the doctrine of *zahir* and *batin*:
    neither the scholars nor the ignorant truly reproach the world;
    the *scholars censure a corpse* (the world without knowledge of
    its soul, God); the *ignorant praise without meaning*. The boy
    asks for parables, and the Master delivers the master-parable:
    every created thing — even the atom — has six limits and a
    seventh, the air encompassing all. A short catechism walks the
    likenesses: heaven=*al-Imām al-Nāṭiq*, zodiac=*nuqabā'*,
    earth=*bāb*/*waṣī*, islands=*ḥujaj*, rivers=*du'āt*. The chapter
    climaxes on the *air* as the figure of the One who has nothing
    like Him — the Qur'anic *highest similitude* read not as
    measurement but as *signifier*, the *highest proof*. And it
    closes on the doctrine of *three layers of knowledge* — apparent,
    inward, and *inward of the inward* — proven from Q 7:26's three
    garments of Adam and from the argument of the intellect, sealed
    by the parable of the egg: shell, white, and *yolk which is its
    essence and meaning*. *The architecture is the same architecture
    all the way down.*
