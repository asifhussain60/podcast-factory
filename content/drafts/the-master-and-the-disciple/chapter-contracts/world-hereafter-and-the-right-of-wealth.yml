  references:
    - >
      "Sayyidina Ja'far ibn Mansur al-Yaman, *Kitab al-'Alim
      wa-l-Ghulam* (*The Book of the Master and the Boy*) — the
      ethical-practical bridge chapter, delivered after the
      cosmological architecture of chapter two and before the
      journey to the elder Shaykh and the seventh-day naming of
      chapter four"
    - >
      "The doctrine of the *rope of God* and the *rope of the rope
      of Allah* — the *da'wa* tradition's reading of the Qur'anic
      *hablu Allāh* (Q 3:103) as a *chain* of ropes, from the *hujja*
      and the *bāb* of the Imam (the rope the believer holds), to
      the Imam (the rope of God), to the *batin-of-batin* (the rope
      of the rope of God), held back here as *the end of your
      guidance and the end of the worlds*"
    - >
      "The doctrine of *la hawla wa la quwwata illa billah*
      (*there is no power except in Allah*) read as a confession
      of the doctrine of the Imamate — the *hawl* (year, twelve
      months) as the Imam who *turns* (*yuḥawwil*) the words of
      the Creator into the words of the people; the *quwwa*
      (power) as his *hujja* and *bāb*; the *ʿuṣba* (the band of
      Q 28:76, the keys carried by a band of strong men) as the
      ten arguments — one of the signature *ta'wīls* of the *da'wa*"
    - >
      "The *batin* of Pharaoh's dream (Q 12:43-49, the seven fat
      cows / seven lean / seven green ears / seven dry) — read as
      the seven *causes of God*, the seven *nāṭiqs* who receive
      from those causes, *al-Khidr* (Q 18:60-82) as the cause
      between God and the *awliyāʾ*, and the *guardians* who
      receive at the hands of *al-Khidr*"
    - >
      "The Qur'anic warrant for the doctrine of *degrees in
      religion* — *And whoever obeys Allah and His Messenger —
      those will be with the ones upon whom Allah has bestowed
      favor: the prophets, the truthful, the martyrs, and the
      righteous. What excellent companions they are! That is the
      bounty from Allah* (Q 4:69) — read here as *by exerting
      effort in obedience, not strictly by the merit of their own
      deeds*"
    - >
      "The doctrine of the *fifth of the best* as the *da'wa*
      zakat measure, generalizing the Qur'anic *khums* of war-
      spoils (Q 8:41) to *every kind of gain*, distinct from the
      *forty-of-one* standard of the *fiqh* schools — the chapter
      does not polemicize the difference, but gives the *fifth* as
      the binding measure for the boy"
    - >
      "The boy's *five-share* disposition of his wealth (zakat,
      expiation, thanksgiving, brethren, the Master's share) — an
      enactment-figure with no exact precedent in earlier *da'wa*
      catechisms; the structural significance is that the boy
      *performs* the doctrine in front of the Master, and the
      *zakat* share is held in *trust for the rightful owner of
      zakat*, who is then named (only by his attributes) as the
      *Imam*"
    - >
      "The first *direct speaking* of the Imam in the book — named
      only by his attributes (*the one whose right Allah has made
      binding upon every believer, in whose hand are the keys of
      the heavens, whose palms are opened with the light of
      Sinai*) — and the Master's placement of himself as *his son
      and one of his servants*, the *da'wa* figure of *spiritual
      sonship* (the *son* of the Imam being the one bound to him
      by the rope, not a biological descendant)"
