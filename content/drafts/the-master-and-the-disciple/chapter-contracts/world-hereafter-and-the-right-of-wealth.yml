title: "World, Hereafter, and the Right of Wealth"
audience: >
  Thoughtful adult readers continuing the dialogue book of the Ismaili
  *da'wa* (DAH-wah — call, missionary apparatus) — *Kitab al-'Alim
  wa-l-Ghulam* (ki-TAAB al-AA-lim wal-ghu-LAAM, *The Book of the
  Master and the Boy*), attributed to Sayyidina Ja'far ibn Mansur
  al-Yaman (sai-yi-DEE-nah JAH-far ibn man-SOOR al-YAH-man) — after
  the architecture of creation has been laid down in chapter two.
  Where chapter two walked the listener through the *cosmology* (the
  three words, the seven principles, the seven heavens and seven
  *nāṭiqs*, the doctrine of *zahir* and *batin*, the parable of the
  egg), this chapter walks the listener through the *ethics* the
  cosmology demands: the three houses of worship (angels, humans,
  beasts) and their three knowledges; the two kinds of people; the
  great station of God's saints that no one can give to another and
  the figure of the sower who prepares and waters but cannot bring
  out the plant; the *rope of God* named for the first time as the
  *hujja* (HOO-jah) and the *bāb* (BAAB) of the Imam, and the halt at
  the *rope of the rope of Allah* ("the end of your guidance and the
  end of the worlds"); the dropped *ta'wīl* of *la hawla wa la
  quwwata illa billah* ("there is no power except in Allah") — the
  *hawl* (year of twelve months) is the *Imam* who *turns*
  (*yuḥawwil*) the words of the Creator into the words of the people;
  the *quwwa* (power) is his *hujja* and *bāb*; the *ʿuṣba* (al-OOS-bah,
  the band) in the Joseph story is the ten arguments; Joseph's
  eleven planets, sun, and moon are the twelve captains, the Imam,
  and his *hujja*; the *batin* of Pharaoh's dream (seven fat cows =
  causes of God; seven lean = *nāṭiqs*; seven green ears = al-Khidr
  as cause between God and the *awliyāʾ*; seven dry = the guardians);
  the four meanings of "the life of this world" (perishing vs lasting;
  outward knowledge vs inward knowledge); the verdict on the one who
  has the inward without the outward (fruit-rind peeled before
  harvest, body severed from soul, *enemy of the guardians* unless
  excused for incapacity) and on the one who has the outward without
  the inward (body without soul, *counted among the dead*); the
  narrator's record of the Master beaming and weeping when the boy
  describes his brethren — the scholars yellow with vigil and weak
  with fasting, who refuse the world even from what is not forbidden;
  the doctrine of *one creation, one instrument, many passions* with
  the archer-figure (same target, same instrument, differing
  striking); the doctrine of *classes in this world* (equal in
  punishment because joined in disobedience) and *degrees in
  religion* (graded in acceptance because charged according to
  capacity) with the Qur'anic warrant *whoever obeys Allah and His
  Messenger — those will be with the ones upon whom Allah has
  bestowed favor: the prophets, the truthful, the martyrs, and the
  righteous* (Q 4:69); the limit of effort (*the full measure of
  one's knowledge and the utmost reach of one's capacity*); the duty
  of the body (the golden rule as *justice*); the duty of wealth
  (*lawful source, rightful place*, the *fifth of the best*); the
  boy's enactment of the doctrine in *five shares* (zakat,
  expiation, thanksgiving, brethren, the Master's share); the
  Master's tears and his refusal of his own share (*I have come out
  from wealth and from its temptations*) with the reapportionment of
  the rest as *trusts held for their rightful owners*; the first
  *direct* speaking of the *Imam* (the one whose right Allah has
  made binding upon every believer, in whose hand are the keys of
  the heavens, whose palms are opened with the *light of Sinai*); the
  Master's placement of himself as *his son and one of his servants*;
  and the boy's request to be taken *by the hand to the door of his
  chamber*, with the Master's careful answer — *this is your duty —
  but only with his permission and his decision*.
angle: faithful_exposition
episode_format: deep_dive
format_rationale: >
  The chapter is a sustained primary-source dialogue in which one
  position is being developed (the Master's ethical-practical
  exposition that walks the cosmology of chapter two outward into
  body, knowledge, work, and wealth) with the Boy as active
  interlocutor — the Boy asks the structurally placed questions
  ("will I attain this great station", "what is the meaning of *la
  hawla wa la quwwata illa billah*", "what is the standing of one
  who knows the inward without the outward", "where does the
  difference of passions come from", "what is the duty regarding my
  wealth"), and the Master replies in long architectural answers and,
  in the closing third, the Boy enacts the doctrine by disposing of
  his wealth in five shares. There are no two named opposing
  doctrinal voices being adjudicated; the closest the chapter comes
  to a contested voice is the standing controversy over the *world*
  (some seek it, some reproach it), which the Master resolves by the
  *zahir*/*batin* cut and by the doctrine of one creation / one
  instrument / many passions rather than by setting two named
  schools against each other. This is a deep-dive walk through the
  ethical-practical chapter that bridges chapter two's cosmology and
  chapter four's seventh-day naming, not a debate.
essential: core
essential_rationale: >
  This is the ethical-practical capstone of the first half of the
  book — the chapter where the boy moves from *receiving* the
  cosmology to *enacting* it (the five-share disposition of his
  wealth, performed in front of the Master); the chapter where the
  *Imam* is first directly spoken of (the one whose right Allah has
  made binding upon every believer, in whose hand are the keys of
  the heavens, whose palms are opened with the *light of Sinai*); the
  chapter where the *rope of God* and the *rope of the rope of
  Allah* are first distinguished, and where the *la hawla wa la
  quwwata illa billah* formula every Muslim utters daily is read,
  through the dropped *ta'wīl*, as a confession of the doctrine of
  the Imamate; and the chapter whose closing exchange — the boy's
  request to be taken to the Imam's door and the Master's deferral
  to the Imam's permission — sets up the journey to the elder
  Shaykh, the seventh-day naming, and the revelation of the boy's
  name (*Salih*) that fill chapters four and five. The chapter
  cannot be cut without losing the ethical bridge between the
  cosmology and the journey-and-naming arc.
host_dynamic: curious_mind + scholar_companion
host_dynamic_rationale: >
  The curious_mind voices the Boy's active interlocution (naming the
  pairs at the chapter's opening, asking the great-station question,
  pressing for the *batin* of *la hawla wa la quwwata illa billah*,
  pressing for the standing of inward-without-outward and
  outward-without-inward, describing the scholars yellow with vigil,
  asking where the difference of passions comes from, asking for the
  duty of body and the duty of wealth, performing the five-share
  disposition, and asking to be taken to the Imam's door); the
  scholar_companion voices the Master's exposition (the three houses
  of worship, the sower-and-plant figure, the dropped *ta'wīl* of
  the formula, the four meanings of *the life of this world*, the
  doctrine of one creation / one instrument / many passions, the
  Qur'anic warrant *whoever obeys Allah and His Messenger* (Q 4:69),
  the limit of effort, the golden rule as justice, the *fifth of the
  best* zakat doctrine, the tearful refusal of his own share, the
  reapportionment as trusts held for their rightful owners, the
  first direct speaking of the Imam, and the careful deferral to
  the Imam's permission). No named third doctrinal voice appears in
  this chapter — the rhetorical "scholars vs ignorant praising the
  world" of chapter two is *not* re-litigated here; the *batin*-cut
  has already been delivered.
length_target: extended
key_tensions:
  - >
    The chapter's central method is to walk the cosmology of chapter
    two *outward* into ethics — the same *zahir*/*batin* doctrine, the
    same seven-and-seven grammar, the same name-and-attribute pair-
    rule, now applied to *body* and *wealth* and *passions*. But the
    chapter is also, in its closing third, *unveiling* — for the
    first time in the book — the doctrine of the *Imam* as the
    rightful owner of the *zakat*, the one whose *hujja* is the
    *rope*, the one whose *permission* the Master must seek before
    bringing the boy to his door. The hosts must let the *ethical*
    register dominate for the first two-thirds of the chapter (the
    boy is being *trained*, not yet *brought*) and let the
    *revelatory* register dominate only in the closing third — the
    five-share enactment, the Master's tears, the first direct
    speaking of the Imam, the boy's request for the door. Collapsing
    the two registers into one (treating the chapter as either
    *only* ethics or *only* revelation) loses the chapter's hinge-
    function between chapter two's cosmology and chapter four's
    journey.
  - >
    The chapter contains two *dropped ta'wīls* — the reading of *la
    hawla wa la quwwata illa billah* (the *hawl* is the Imam who
    *turns* the Creator's words, the *quwwa* is his *hujja* and
    *bāb*, the *ʿuṣba* is the ten arguments, the Joseph-dream is the
    twelve captains with the Imam and his *hujja*) and the reading
    of Pharaoh's dream (seven fat cows = causes of God, seven lean
    = *nāṭiqs*, seven green ears = al-Khidr as cause between God and
    the *awliyāʾ*, seven dry = the guardians). Both *ta'wīls* are
    *signature* moves of the *da'wa* — the *hawl-quwwa-ʿuṣba* reading
    in particular is one of the most striking *ta'wīls* in the entire
    Ismaili philosophical corpus, because it reads a formula every
    Muslim utters daily as a *confession of the doctrine of the
    Imamate*. The hosts must let each *ta'wīl* land *as a ta'wīl* —
    the surface meaning first (the boy's folk-etymology of *year* and
    *mules*; Pharaoh's literal cows and ears), then the structural
    rule (every true word has an origin in the subtle; every dream-
    vision is like a mirage), then the *batin* reading. Skipping the
    structural rule and going straight to the *batin* loses the
    *legitimacy* of the *ta'wīl*-move itself.
  - >
    The chapter pivots on a *narrator-intervention* in the middle —
    the moment when the Master, hearing the boy's description of his
    brethren (the scholars yellow with vigil and weak with fasting,
    who refuse the world even from what is not forbidden), *beams*,
    *weeps*, *cannot speak from the intensity of the lesson*, and
    *fears that some of their enemies might prevail over them*. The
    narrator is showing the listener — in passing, without
    announcement — that the Master *himself* is one of the brethren
    the boy has been describing. The hosts must let this recognition
    land without explaining it; the Master's tears and his fear of
    *enemies* who might prevail are the chapter's first hint of the
    *taqiyya* (concealment) under which the *da'wa* operates in this
    period. The boy does not see the recognition at the time, and
    the source does not pause to flag it; the listener catches it as
    the narrator means it to be caught.
  - >
    The five-share enactment is the chapter's structural climax —
    and the *fifth of the best* zakat-doctrine is the chapter's
    distinctive ethical claim. The *fifth of the best* is the
    *da'wa* measure (echoing the Qur'anic *khums* of war-spoils,
    generalized to every kind of gain), distinct from the *forty-of-
    one* standard of the *fiqh* schools. The chapter does not
    polemicize against the *fiqh* measure; it simply gives the
    *fifth* as the binding measure for the boy and lets the
    difference stand by implication. The hosts must give the *fifth
    of the best* doctrine its due weight (it is the doctrinal core
    of the wealth-section) without turning the chapter into a
    polemic against the *fiqh* schools — the chapter's posture is
    *constructive*, not *polemical*, and the *fifth* is *the right
    measure* because the *zakat* is *purification* and the *fifth
    of the best* is what *the boy himself would love to receive*.
    The boy's enactment then *performs* the doctrine in the most
    striking form possible: he gives *all* his wealth, in five
    shares, to the Master — and the *zakat* share is held *in trust
    for the rightful owner*, who has not yet been named.
  - >
    The chapter's closing exchange — the boy's request to be taken
    *by the hand to the door of his chamber* and the Master's
    *this is your duty — but only with his permission and his
    decision* — is the structural seam between this chapter and the
    next. The hosts must let the *deferral* land *as the seam*: the
    Master does *not* refuse the boy's request (which would close
    the arc), and he does *not* grant the request directly (which
    would skip the *Imam's permission*); he names the request as the
    boy's *duty* and defers the *bringing* to the *Imam's permission
    and decision*. The chapter ends *open* on this deferral, and the
    next chapter — the journey to the elder Shaykh, the boy's
    weakness, the seventh-day naming — is the *answer* to it. The
    hosts must not summarize what *follows* (the journey, the
    naming, the revelation of the boy's name as *Salih* in chapter
    five) — the chapter's discipline is to *end on the deferral*.
tone_constraints:
  - >
    Walk the chapter in the order the source uses: (1) the boy's
    opening question about the pairs; (2) the three houses of
    worship and the three knowledges, with the two kinds of people;
    (3) the boy's question about the great station and the sower-
    and-plant figure; (4) the rope and the *rope of the rope of
    Allah*; (5) the dropped *ta'wīl* of *la hawla wa la quwwata illa
    billah* (the *hawl* as Imam, the *quwwa* as *hujja* and *bāb*,
    the *ʿuṣba* as the ten arguments, the Joseph-dream); (6) the
    *batin* of Pharaoh's dream; (7) the four meanings of "the life
    of this world"; (8) the two verdicts (inward-without-outward,
    outward-without-inward) and the synthesis (true believer
    establishes both); (9) the boy's description of his brethren
    and the Master's tearful recognition; (10) one creation, one
    instrument, many passions, with the archer-figure; (11) classes
    in the world and degrees in religion, with the Q 4:69 warrant
    and the limit of effort; (12) the duty of the body and the
    golden rule as justice; (13) the duty of wealth (lawful source,
    rightful place, the *fifth of the best*); (14) the five-share
    enactment and the Master's tears and refusal of his own share;
    (15) the first direct speaking of the Imam and the Master's
    placement of himself; (16) the boy's request for the door and
    the Master's deferral. Do not collapse the ethical-and-
    revelatory arc into a single summary — the chapter's force is
    in the *walk* through the layers in order, with the *revelation*
    arriving only in the closing third.
  - >
    Verbatim moments must stay verbatim from the chapter file. The
    boy's opening pair-question (*Are not this world and the
    Hereafter a pair, and the soul and the body a pair, and the
    knowledge of the apparent and of the subtle a pair, and so on —
    many pairs, all of them?*); the doctrine of the three houses of
    worship and the three knowledges (*the apparent is the
    knowledge of the limit of beasts … the knowledge of the inward
    is the knowledge of the children of Adam alone … the knowledge
    of the inner of the inner is the knowledge of the angels … He
    is the veil of the angels, the symbol of revelation and its
    interpreter for the children of Adam. With him are the keys of
    Paradise, which only those who obey him will enter*); the
    sower-and-plant figure (*The sower can prepare the land well,
    sow it, and water it — but he cannot bring out the plant and
    the leaves*); the *rope* exchange (*It is apparent to you. It
    is your rope and the most trustworthy link, your hujja
    (argument), and the door of your Imam*); the *hawl-quwwa*
    *ta'wīl* (*the Imam was called ḥawl because he turns
    (yuḥawwil) the words of the Creator gently into the words of
    the people, until they are understood … And quwwa (power) is
    his hujja (argument) and his door … there is no Imam and no
    hujja except by Allah, and from Allah comes their light and
    their sustenance*); the Joseph-dream *ta'wīl* (*meaning by the
    sun the Imam, by the moon his hujja and his door, and by the
    planets the twelve captains*); Pharaoh's dream *ta'wīl* (*the
    seven fat cows are the causes of God between Him and His
    creation … the seven lean ones are the seven appointed
    speakers (nāṭiqs) … the seven green ears are al-Khidr, a cause
    between God and the guardians (awliyāʾ) … the seven dry ones
    are the guardians*); the four meanings of "the life of this
    world"; the two verdicts on inward-without-outward (*at the
    level of the prophet — but if his inward does not rise, neither
    does his outward rise up*) and outward-without-inward (*like a
    body that has been raised up but into which no soul has been
    breathed; he is counted among the dead, and the dead are the
    abodes of the disbelievers*); the doctrinal aphorism (*this
    world is seen by the eye of wealth and children, and the
    Hereafter is seen by the eye of knowledge and certainty*); the
    yellow-scholars description (*they refused to work the world
    even from what is not forbidden to them*); the archer-figure
    (*they are unanimous in shooting it with courage and with the
    instrument, and they differ in striking it*); the Q 4:69
    warrant in full; the limit of effort (*the full measure of
    one's knowledge, and the utmost reach of one's capacity*); the
    golden rule restatement (*extend to others what you would wish
    extended to yourself, and refrain from doing to others what you
    would wish refrained from being done to you. This is justice,
    and Allah is pleased with justice*); the wealth-rule (*take it
    only from a lawful source, and spend it only in its rightful
    place*); the *fifth of the best* zakat doctrine (*take from it
    a fifth of the best of it — what you yourself would love to
    receive*); the five-share enactment (in full); the Master's
    benediction (*may scholars travel the road for the sake of one
    like you; may the earth rise and the heavens remain stable for
    the sake of one like you*); the Master's refusal (*I have come
    out from wealth and from its temptations, fleeing from it*);
    the first direct speaking of the Imam (*the one whose right
    Allah has made binding upon me and upon every believer, in
    whose hand are the keys of the heavens and the landmarks of
    the kingdom, whose palms are opened with the light of Sinai*);
    the Master's placement (*I am his son and one of his servants*);
    and the closing deferral (*This is your duty — but only with
    his permission and his decision*) — all stay verbatim with
    attribution.
  - >
    Use the Arabic-term phonetics on first chapter occurrence:
    *Kitab al-'Alim wa-l-Ghulam* (ki-TAAB al-AA-lim wal-ghu-LAAM),
    *Sayyidina Ja'far ibn Mansur al-Yaman* (sai-yi-DEE-nah JAH-far
    ibn man-SOOR al-YAH-man), *zahir* (ZAA-hir), *batin* (BAA-tin),
    *nāṭiq* (NAA-tiq), *da'wa* (DAH-wah), *hujja* (/ˈħudʒːa/), *bāb*
    (/baːb/), *ta'wīl* (/taʔˈwiːl/), *ḥawl* (/ħawl/), *yuḥawwil*
    (/juˈħawwil/), *quwwa* (/ˈquwːa/), *al-ʿuṣba* (/al ˈʕusˤba/),
    *nuqabā'* (noo-qa-BAA), *du'āt* (doo-AAT), *Yūsuf* (/ˈjuːsuf/),
    *al-Khiḍr* (/al ˈxidˤr/), *awliyāʾ* (/ʔawliˈjaːʔ/), *Ādam*
    (/ˈʔaːdam/), *zakāt* (/zaˈkaːt/) and *zakat* (za-KAAT) (the
    chapter uses both forms; first occurrence carries the IPA;
    subsequent prose uses the simpler ASCII form), *Islām*
    (iss-LAAM), *Sīnāʾ* (SEE-nigh). Each phonetic appears once on
    its term's first chapter occurrence, per
    R-PRONUNCIATION-IMPERATIVE.
  - >
    The Prophet ﷺ honorific is spelled out on first per-chapter
    mention (*peace and blessings of Allah be upon him*) and
    contracted to ﷺ thereafter, per R-HONORIFIC-ONCE. In this
    chapter the Prophet is mentioned only obliquely (as one of the
    *seven nāṭiqs* the Master does not enumerate in the Pharaoh
    *ta'wīl*, and as one of the *Messengers* in the doctrine of
    *answering the Messengers vs denying them*); use the spelled-
    out honorific on the first oblique reference if it is named. No
    individual Imam is named in this chapter — the *generous one*
    of the closing third is named only *by his attributes* (the
    one whose right Allah has made binding upon every believer, in
    whose hand are the keys of the heavens, whose palms are opened
    with the light of Sinai). The phrase "Imam Ali" is FORBIDDEN
    per `imam-lineage-ismaili.yml`; the canonical lineage runs
    Hassan as the first Imam, and "Father of Imams" is the only
    correct reference to ʿAlī ibn Abī Ṭālib if he must be named —
    but he is not named in this chapter.
  - >
    Names: the Master is *the Master*, *the scholar*, or *the
    Sheikh-Master* (per the source's usage); the Boy is *the boy*
    or *the youth* (the source still does not name him in this
    chapter — the revelation *the boy's name was Salih* comes only
    in source chapter 5; do not retroject the name). The
    *generous one* of the closing third is the *Imam*, but the
    source never uses the word *Imam* in the direct naming — only
    the attributes (*the one whose right Allah has made binding
    upon me and upon every believer*, *the keys of the heavens*,
    *the light of Sinai*); preserve the source's discipline of
    naming-by-attribute. The seven *nāṭiqs* in the Pharaoh
    *ta'wīl* are named *as a rank* without enumeration (Adam,
    Noah, Abraham, Moses, Jesus, Muhammad ﷺ, the Qā'im are not
    enumerated here — the source's own discipline is to deliver
    the *form* without the *enumeration*). The twelve captains in
    the Joseph-dream *ta'wīl* are likewise rank-named without
    enumeration.
  - >
    End on the boy's request and the Master's deferral — *Should
    you not, at this moment, take me by the hand to the door of
    his chamber until I enter, and to the house of light until I
    draw from it? This is part of the full measure of truthfulness
    which is binding upon you* / *This is your duty — but only
    with his permission and his decision*. The chapter's closing
    figure is the *door of the chamber* the boy has asked to be
    brought to, and the *Imam's permission* the Master must seek
    before bringing him. Do not summarize what *follows* (the
    boy's weakness, the journey to the elder Shaykh, the seventh-
    day naming in source chapter 4, the revelation of the boy's
    name as *Salih* in source chapter 5) — the chapter ends with
    the *deferral* held open. Close on the architectural register
    the closing paragraph of the chapter file uses: the boy has
    moved from *receiving doctrine* to *performing it*, the
    *generous one* has been *placed* in the chain, and the boy has
    *asked to be brought to his door* — the next chapter will
    *answer* his asking, but only after the *Imam's permission*
    has been *sought*, and only after the *boy himself* has been
    *named*.
anchor_passages:
  - >
    "The boy's opening pair-question (the chapter's opening rule):
    *Are not this world and the Hereafter a pair, and the soul and
    the body a pair, and the knowledge of the apparent and of the
    subtle a pair, and so on — many pairs, all of them?* And the
    Master's structural reading: *The pair: the outward is a name,
    and the inward is an attribute, which signifies the knowledge
    of God and the religion of God — which is the inner.*"
  - >
    "The Master's doctrine of the three houses of worship and the
    three knowledges (the chapter's foundational claim, echoing the
    egg-parable of chapter two): *the creation of the three houses
    of worship: first the creation of the angels, second the
    creation of human beings, and third the creation of the beasts.
    The apparent is the knowledge of the limit of beasts; whoever
    knows it without the secret is like the beasts. The knowledge
    of the inward is the knowledge of the children of Adam alone;
    whoever knows it is a believer, like a true human being. The
    knowledge of the inner of the inner is the knowledge of the
    angels; whoever knows it has become the spiritual counterpart
    of the physical knowledge of the body, and he is a prophet sent
    by God in His land … With him are the keys of Paradise, which
    only those who obey him will enter; and with him is the
    permission for the fire, which none enter except by his staff.*"
  - >
    "The Master's sower-and-plant figure (the chapter's first great
    parable, on the limit of teaching): *The sower can prepare the
    land well, sow it, and water it — but he cannot bring out the
    plant and the leaves. A man can be a craftsman whenever he
    wills — but he cannot create from his work what he wills.*"
  - >
    "The Master's first naming of the *rope*: *It is apparent to
    you. It is your rope and the most trustworthy link, your hujja
    (argument), and the door of your Imam.* And the halt at the
    *rope of the rope of Allah*: *This is the end of your guidance
    and the end of the worlds.*"
  - >
    "The Master's dropped *ta'wīl* of *la hawla wa la quwwata illa
    billah* (one of the signature *ta'wīls* of the *da'wa* — the
    formula every Muslim utters daily, read as a confession of the
    doctrine of the Imamate): *the Imam was called ḥawl because he
    turns (yuḥawwil) the words of the Creator gently into the words
    of the people, until they are understood … And quwwa (power) is
    his hujja (argument) and his door, whom God has strengthened to
    bear the heavy burden of utterance … there is no Imam and no
    hujja except by Allah, and from Allah comes their light and
    their sustenance.* And the Joseph-dream completion: *meaning by
    the sun the Imam, by the moon his hujja and his door, and by
    the planets the twelve captains.*"
  - >
    "The Master's *batin* of Pharaoh's dream (the chapter's second
    great *ta'wīl*): *the seven fat cows are the causes of God
    between Him and His creation. The seven lean ones are the seven
    appointed speakers (nāṭiqs) who seek what comes from God
    through His seven causes. The seven green ears are al-Khidr, a
    cause between God and the guardians (awliyāʾ). The seven dry
    ones are the guardians, obliged to receive from God at the
    hands of these seven causes.*"
  - >
    "The Master's four meanings of *the life of this world*: *a
    life that is apparent in this world, whose consequence is
    annihilation, and the life of the Hereafter, whose consequence
    is permanence … a life of outward knowledge and a life of
    inward knowledge … 'Be not tempted by the life of this world' —
    meaning that you are not tempted by the outward of knowledge
    and acting upon it alone. He will only accept from you the
    inward together with the outward.*"
  - >
    "The Master's two verdicts on inward-without-outward and
    outward-without-inward, and the boy's synthesis: *He is at the
    level of the prophet — but if his inward does not rise, neither
    does his outward rise up … if the rind is peeled off before
    being harvested, it is spoiled and not repaired afterward; and
    if the body is severed, the soul is not sustained in it for an
    hour …* / *An evil standing — for he is like a body that has
    been raised up but into which no soul has been breathed; he is
    counted among the dead, and the dead are the abodes of the
    disbelievers.* / *whoever knows the outward together with the
    inward and establishes them — is he a true believer? — Yes, he
    is a true believer.*"
  - >
    "The Master's doctrinal aphorism on the two eyes (the
    chapter's signature ethical claim): *this world is seen by the
    eye of wealth and children, and the Hereafter is seen by the
    eye of knowledge and certainty.* And the description of the
    brethren: *they remember death often, so that life does not
    torment them; they have seen the Hereafter as certain, and they
    have seen this world only as a fragment. So they refused to
    work the world even from what is not forbidden to them.*"
  - >
    "The Master's archer-figure (the resolution of the difference
    of passions): *By my life — their meaning in seeking is one,
    but they differ in hitting the mark, like archers aiming at a
    target: they are unanimous in shooting it with courage and with
    the instrument, and they differ in striking it.* And the
    settlement: *each seeker is given what he sought of them;
    whoever sought the reward of this world is given from it, and
    whoever sought the reward of the Hereafter is given from it.*"
  - >
    "The Master's doctrine of classes-in-the-world and degrees-in-
    religion (the chapter's structural settlement on the symmetry
    and its asymmetry of consequence), with the Qur'anic warrant:
    *If the people of this world have classes within this world,
    then the people of religion have degrees within their religion
    … And whoever obeys Allah and His Messenger — those will be
    with the ones upon whom Allah has bestowed favor: the prophets,
    the truthful, the martyrs, and the righteous. What excellent
    companions they are! That is the bounty from Allah. This is by
    exerting effort in obedience, not strictly by the merit of
    their own deeds. It is the righteous who reach this rank, but
    only as a mercy from Allah to them, even if they themselves are
    weak and their works are slight.*"
  - >
    "The Master's binding rule for the body (the golden rule
    restated as *justice*): *what is incumbent upon you in your own
    person is to perform every obligation and to avoid every
    forbidden thing — for this is the very religion of your soul
    and the purification of your body. The sum of what is
    obligatory upon you, so that Allah may be pleased with you and
    accept you, is this: extend to others what you would wish
    extended to yourself, and refrain from doing to others what you
    would wish refrained from being done to you. This is justice,
    and Allah is pleased with justice.*"
  - >
    "The Master's binding rule for wealth (the chapter's distinctive
    ethical claim — the *fifth of the best* as the *da'wa* zakat
    measure, distinct from the *forty-of-one* of the *fiqh*
    schools): *Take it only from a lawful source, and spend it only
    in its rightful place … take from it a fifth of the best of it
    — what you yourself would love to receive — and pay it to those
    who have a binding claim upon you. In this way wealth gives
    its alms, just as your body gives its alms through work. Work
    is the gateway to Paradise, and zakat is purification, and
    whoever pays the zakat has succeeded.*"
  - >
    "The boy's five-share enactment (the chapter's structural
    climax — the boy *performs* the doctrine he has been receiving):
    *All this wealth lies in your hands now, in five shares: one
    share is its zakat; one share is the expiation for what I have
    wasted; one share is thanksgiving to Allah for what I have come
    to know; one share for the poor among my brethren; and one
    share that you accept by your grace — and it will return to you
    increased. Join everyone of them to yourself, and Allah will
    repay you in their kind.*"
  - >
    "The Master's first direct speaking of the Imam (the chapter's
    revelation, delivered only by *attributes*, never by name): *He
    is the one whose right Allah has made binding upon me and upon
    every believer, in whose hand are the keys of the heavens and
    the landmarks of the kingdom, whose palms are opened with the
    light of Sinai — he is the cause behind the signs, and the one
    whose knowledge calls to the loftiest of ends. Through him your
    light is completed, through him Allah perfects your affair, and
    at his hand you are blessed.* And the Master's placement of
    himself: *I am his son and one of his servants in good works,
    seeking his pleasure and shunning his displeasure.*"
  - >
    "The closing exchange (the chapter's deferral and the seam to
    the next chapter): *Should you not, at this moment, take me by
    the hand to the door of his chamber until I enter, and to the
    house of light until I draw from it? This is part of the full
    measure of truthfulness which is binding upon you.* / *This is
    your duty — but only with his permission and his decision.*"
