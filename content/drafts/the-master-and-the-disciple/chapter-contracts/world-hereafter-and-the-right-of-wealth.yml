show_notes:
  blurb: >
    The ethical-practical bridge of *Kitab al-'Alim wa-l-Ghulam*
    (*The Book of the Master and the Boy*). After the cosmology of
    chapter two — the three words, the seven principles, the seven
    *nāṭiqs*, the parable of the egg — the boy turns to *application*.
    He names the *pairs* the cosmology has put in place (world and
    Hereafter, soul and body, apparent and subtle knowledge), and
    the Master walks them outward into ethics: the three houses of
    worship (angels, humans, beasts) and their three knowledges; the
    two kinds of people (the teacher whose soul has been animated by
    the spirit of certainty, and the learner still seeking for his
    survival); the great station of God's saints that no one can
    give to another, and the figure of the sower who prepares and
    waters but cannot bring out the plant. The Master names the
    *rope* — not the *rope of Allah* directly, but *your rope*, *your
    hujja*, *the door of your Imam* — and halts at the *rope of the
    rope of Allah* ("the end of your guidance and the end of the
    worlds"). He drops the *ta'wīl* of *la hawla wa la quwwata illa
    billah*: the *hawl* is the Imam who *turns* the Creator's words
    into the people's; the *quwwa* is his *hujja* and *bāb*; the
    *ʿuṣba* in the Joseph story is the ten arguments; the eleven
    planets, sun, and moon are the twelve captains, the Imam, and
    his *hujja*. He gives the *batin* of Pharaoh's dream — seven fat
    cows = causes of God; seven lean = the seven *nāṭiqs*; seven
    green ears = al-Khidr as cause between God and the *awliyāʾ*;
    seven dry = the guardians — and the four meanings of *the life
    of this world* (perishing vs lasting; outward knowledge vs
    inward knowledge). He gives the verdict on the one who has the
    inward without the outward (a *prophet* in level, but the
    *outward* does not rise if the *inward* does not) and on the
    one who has the outward without the inward (*a body raised up
    but into which no soul has been breathed; counted among the
    dead*). The narrator records the Master *beaming* and *weeping*
    when the boy describes his brethren — the scholars yellow with
    vigil and weak with fasting, who *refused to work the world even
    from what is not forbidden to them*. The Master pivots to the
    question of why *passions* differ when the origin (Adam from
    dust) and the *instrument* (the senses, outer and inner) are the
    same; the answer is *justice* — same archers, same target, same
    instrument, *differing in striking*. He gives the doctrine of
    *classes in the world* (equal in punishment because joined in
    disobedience) and *degrees in religion* (graded in acceptance
    because charged according to capacity) with the Qur'anic
    warrant of Q 4:69 (*whoever obeys Allah and His Messenger —
    those will be with the ones upon whom Allah has bestowed favor:
    the prophets, the truthful, the martyrs, and the righteous*),
    the limit of effort (*the full measure of one's knowledge and
    the utmost reach of one's capacity*), the duty of the body (the
    golden rule restated as *justice*), and the duty of wealth: *take
    it only from a lawful source, and spend it only in its rightful
    place*, with the *zakat* measured as *a fifth of the best of it*
    — *what you yourself would love to receive*. And then the
    chapter's structural climax: the boy *enacts* the doctrine,
    placing *all* his wealth in the Master's hands in *five shares*
    (zakat, expiation, thanksgiving, brethren, the Master's share).
    The Master, *tears flowing*, refuses his own share (*I have come
    out from wealth and from its temptations, fleeing from it*) and
    reapportions the rest as *trusts held for their rightful
    owners*. The boy asks who this *generous one* is — and the
    chapter, for the first time, speaks of the *Imam* directly: *the
    one whose right Allah has made binding upon me and upon every
    believer, in whose hand are the keys of the heavens and the
    landmarks of the kingdom, whose palms are opened with the light
    of Sinai*. The Master places himself as *his son and one of his
    servants*. The chapter ends on the boy's request to be taken *by
    the hand to the door of his chamber* and the Master's careful
    answer: *This is your duty — but only with his permission and
    his decision*.
