title: "Justice, Monotheism, and the Guardians of Allah"
audience: >
  Thoughtful adult readers reaching the final chapter of the dialogue
  book of the Ismaili *da'wa* (DAH-wah — call, missionary apparatus)
  — *Kitab al-'Alim wa-l-Ghulam* (ki-TAAB al-AA-lim wal-ghu-LAAM,
  *The Book of the Master and the Boy*), attributed to Sayyidina
  Ja'far ibn Mansur al-Yaman (sai-yi-DEE-nah JAH-far ibn man-SOOR
  al-YAH-man) — after chapter five named the world (*Salih*,
  SAA-lih; *al-Bakhtari*, al-bakh-tah-REE; *Abu Malik*, a-BOO MAA-lik)
  and brought the senior scholar of the old creed to the *zero
  point* of his own confession — *I do not see that anything is
  left with me. So what religion do you have?* Salih answered with
  the positive doctrine of *religion as the cause that connects
  heaven to earth, unbroken*. Chapter five ended on Abu Malik's
  seam-question: *if God has a religion by which He will judge on
  the Day, with which He is pleased, and for which He rewards and
  punishes, then in this sense it exists. But now, since it has
  been lost, the attribute is preferable to him — so how is it
  described?* Chapter six is the *answer*. Salih calls Abu Malik
  to *God's justice and His unity* — and immediately refuses the
  *monotheism-without-meaning* (*the use of God's names without
  knowing His Oneness*) that Abu Malik's school holds in common
  with the *people of justice and monotheism*. Salih leads Abu
  Malik through three failed approaches to monotheism: (1) the
  *four letters of Allah* (ahl-LAH) — *which letter indicates God,
  or what is it that indicates God — the letters by their
  separation, or by their joining?* — until *the door to the
  knowledge of monotheism has been closed before you*; (2) the
  *name-vs-named* distinction — *what is the difference between
  the name and the named? Which of the two is worshipped — or
  both?* — collapsing every choice into either word-worship or
  two-worship; (3) the *analogy from human makers* — *everything
  made is made of three things, and God did not create things from
  anything that existed before them* — exposing the grammatical
  fault *your saying "nothing is like Him" proves, from your own
  words, that He has a likeness and that nothing is like that
  likeness. Had you meant monotheism, you would have said, "He is
  not like anything"*. From the impossibility of perceiving God
  directly (*sight is closed, speech is closed*) and the obligation
  not to charge worshippers with what they cannot bear, Salih
  derives the positive doctrine: *there must be causes for this
  knowledge between Him and His creation — intermediaries who
  deliver His justice and bear witness to His witnessing for them
  and against them, whom He has chosen by His knowledge and
  selected from all His creation, and made them messengers to them
  and proofs against them, so that they stand as the just ones
  between Him and His servants*. Abu Malik concedes — *this, for
  me, is from the foundations of justice*. Salih builds the
  structure: *single justice → single judgment → succession of
  messengers → ranks among the just → equal reward for obedience
  regardless of rank → the virtuous one (the* nāṭiq*, NAA-tiq, the
  speaker-prophet, bearer of revelation) and the curious one (the*
  waṣī*, /waˈsˤiː/, the successor, bearer of* ta'wīl*, /taʔˈwiːl/,
  esoteric interpretation) → both inspired → obedience to either
  is obedience to Allah*. Abu Malik raises his community's great
  objection: *they all agree that after their prophet there is no
  prophet and no warner in their time*. Salih's answer is the
  chapter's most devastating piece of historical-doctrinal
  indictment. The originators of this saying are *three, in every
  age — a wayward devil, a stubborn tyrant, and a hypocrite* —
  who *sought to cut off the marks of the prophets from the
  features of prophethood and turn it into a station shared among
  themselves*. The same lie was told to the *nation of the Magi*,
  the *nation of the Torah* (*no messenger after Moses*), the
  *nation of the Gospel* (*its prophet is its God* — *no messenger
  after Jesus*), and now to *your community* (*no messenger or
  warner after their Messenger*). The community's *three qualities*
  against the prior nations' standing — earliness in religion,
  consensus, the testimony-asymmetry (*your own testimony to them
  that their prophets are truthful, and none of them has testified
  for any prophet of yours*) — are laid bare. Salih names the
  *just one as the guardian of Allah* (*awliyāʾ*, /ʔawliˈjaːʔ/);
  Abu Malik smiles his first breakthrough — *you have brought me
  out of my chapter on justice and monotheism, and what has
  brought me out of it is the truth itself*. Abu Malik then raises
  the *temporal-question*: *how shall we know the causes of Allah,
  or the cause among them, when we do not perceive them in their
  time?* Salih takes it as a slip — *the obligation has not been
  lifted, the giving has not run out, the Sunnah (SOON-nah) of
  Allah has not changed, God has not changed*; and the
  *interregnum-defense* (*we have been on that same footing,
  working through the interregnum by relying on the traditions
  and the Sunnah*) collapses under the count of *six prophets
  between Abraham and Moses* (Ishmael, Isaac, Jacob, Joseph,
  Jonah, Shu'ayb (shoo-AYB)) and *seven between Moses and Jesus*
  (Joshua, Elias, Talut (taa-LOOT), David, Solomon, Zechariah,
  John). *There was no interregnum*; the *Sunnah of Allah* is
  *continuous succession*. The just ones in any age are *openly
  present or hidden in fear, veiled* — Moses' flight from
  Pharaoh's city to the land of Shu'ayb is the paradigm. The
  *veil* is the form of their presence in a hostile age, and is
  named *Taqiyya* (ta-KEE-yah, protective concealment). The chain
  of indictment runs through the killers and the jurists who
  shelter them — *they show mercy to the slain, but see no
  disobedience in the killer* — to the chapter's most pointed
  single line: *were it not for the narrations of the jurists, no
  tyrannical king could ever be established*. Salih turns the
  indictment on Abu Malik himself: *you placed on their stockings
  the crown of your justice, and they grew proud; you covered
  their clay with the robes of the sacred law, and they went too
  far; you lit up their falsehood with the idleness of your truth*;
  *do not incline toward those who have done wrong, lest the Fire
  touch you*; *obey those in authority among you* (the guardians,
  not the king); *fight those who disbelieve in you* — *you
  disobeyed those whom you were commanded to obey, and obeyed
  those whom you were commanded to fight, all the while thinking
  you were doing well*. The community's *no-messenger-after-these-
  thirteen-messengers* claim is exposed as the *legal cover-up for
  the killing*. Salih names the structural diagnosis: *had you
  supported the friends of Allah, they would have appeared; had
  you failed His enemies, they would not have prevailed* — the
  guardians' *Taqiyya* is the community's responsibility, not
  God's deficit. Abu Malik repents; Salih opens the way back
  (*take refuge in Him, repent to Him, ask Him for the way of His
  guardians*). Salih's eyes well with tears at the mention of
  repentance and he interrupts his speech. He goes to his father
  al-Bakhtari (the scholar of chapter five) and consults him about
  Abu Malik and his companions; al-Bakhtari counsels gentleness —
  *do not let it move you to inflict ta'zir (tah-ZEER, discretionary
  religious chastisement) upon them. Test them by ignoring them
  without ignorance, and instruct your elders to be kind to them*.
  Abu Malik and his companions are guided and return to their
  people as warners. The author closes — *whatever in this account
  took the form of a narrative was no idle telling, but a
  confirmation of what Allah has commanded — for in it is the
  steadfastness of the messengers, the signs of the guardians, and
  the manners of the seekers*. The doxology blesses the Messenger
  Muhammad, peace and blessings of Allah be upon him; his
  guardian, *the Imam of the pious, the leader of the Muhajirun*
  (moo-haa-jih-ROON), *the beloved of the Lord of the Worlds*
  (named only by attribute, preserving the book's discipline of
  naming-by-attribute); and *the Imams of the people of his house,
  from whom Allah has removed every abomination*. The closing
  formula — *there is no power and no strength except by Allah
  the Almighty* — is the same formula whose interpretation (the
  *ḥawl*, /ħawl/, as the Imam who turns the Creator's words; the
  *quwwa*, /ˈquwːa/, as his *ḥujja*, /ˈħudʒːa/, and *bāb*, /baːb/)
  the book has spent six chapters unfolding. The book ends.
