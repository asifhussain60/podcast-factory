  - >
    Use the Arabic-term phonetics on first chapter occurrence:
    *Kitab al-'Alim wa-l-Ghulam* (ki-TAAB al-AA-lim wal-ghu-LAAM),
    *Sayyidina Ja'far ibn Mansur al-Yaman* (sai-yi-DEE-nah JAH-far
    ibn man-SOOR al-YAH-man), *Abu Malik* (a-BOO MAA-lik),
    *Salih* (SAA-lih), *al-Bakhtari* (al-bakh-tah-REE), *Sharia*
    (sha-REE-ah), *Sunnah* (SOON-nah), *zakat* (za-KAAT), *da'wa*
    (DAH-wah), *Allah* (ahl-LAH), *alif* (AH-lif), *Qur'an*
    (qur-AAN), *nāṭiq* (NAA-tiq), *waṣī* (/waˈsˤiː/), *ta'wīl*
    (/taʔˈwiːl/), *Shu'ayb* (shoo-AYB), *Talut* (taa-LOOT),
    *Taqiyya* (ta-KEE-yah), *Shaykh* (SHAYKH), *ta'zir*
    (tah-ZEER), *awliyāʾ* (/ʔawliˈjaːʔ/), *Muhajirun* (moo-haa-
    jih-ROON), *ḥawl* (/ħawl/), *quwwa* (/ˈquwːa/), *ḥujja*
    (/ˈħudʒːa/), *bāb* (/baːb/). Each phonetic appears once on
    its term's first chapter occurrence, per R-PRONUNCIATION-
    IMPERATIVE. The *Taqiyya* doctrine is the chapter's central
    pastoral teaching; it must be phoneticized on first chapter
    occurrence (when Salih names the *guardians' absence by
    Taqiyya*) and not on a casual prior mention.
  - >
    The Prophet ﷺ honorific is spelled out on first per-chapter
    mention (*peace and blessings of Allah be upon him*) and
    contracted to ﷺ thereafter, per R-HONORIFIC-ONCE. The
    Prophet is named in this chapter only in the closing
    doxology (*His Messenger Muhammad, peace and blessings of
    Allah be upon him, sent forth from Him to His creation as
    a bearer of good news and a warner*); this is the
    chapter's first per-chapter mention of the Prophet by
    name, and the spelled-out honorific applies. The Imam is
    *not* directly named by name in this chapter. The
    *guardian of the Messenger* in the doxology is referenced
    *by attribute only* (*the Imam of the pious, the leader
    of the Muhajirun, the beloved of the Lord of the Worlds*),
    preserving the book's naming-by-attribute discipline. The
    phrase "Imam Ali" is FORBIDDEN per `imam-lineage-
    ismaili.yml`; the canonical Ismaili lineage runs Hassan as
    the first Imam, and "Father of Imams" is the only correct
    reference to ʿAlī ibn Abī Ṭālib if he must be named —
    but he is *not* named in this chapter. The *Imams of the
    people of his house* are also referenced *collectively by
    attribute*, not individually.
  - >
    Names: Abu Malik is *Abu Malik* throughout. Salih is
    *Salih* (except in al-Bakhtari's closing counsel, where
    he is *you* — Salih is the addressee). Al-Bakhtari is
    *al-Bakhtari* in the narrator's voice and *the scholar
    who had first sent him out* in the *consultation*
    sentence; he is named *al-Bakhtari* on first chapter
    occurrence and *the scholar* / *his father* thereafter.
    *The Master* and *the greater Shaykh* of earlier chapters
    are *not* present in chapter six. *Moses*, *Pharaoh*,
    *Abraham*, *Ishmael*, *Isaac*, *Jacob*, *Joseph*, *Jonah*,
    *Shu'ayb*, *Joshua son of Nun*, *Elias*, *Talut*, *David*,
    *Solomon*, *Zechariah*, *John*, and *Jesus* are named
    *only* in Salih's *six-prophets-between-Abraham-and-Moses
    / seven-between-Moses-and-Jesus* count and in the *Moses-
    fleeing-Pharaoh-to-the-land-of-Shu'ayb* paradigm. *Ka'b
    al-Ahbar* of chapter five is *not* named in chapter six
    (the *imitation* rebuke is *behind us*, the doctrinal
    teaching is *in front of us*). The *three originators*
    (*a wayward devil, a stubborn tyrant, and a hypocrite*)
    are named *generically*, not by historical instance.
  - >
    End on the doxology and the *book is done* sentence. Do
    NOT add a *teaser for the next book*; this is the *last
    chapter*. The chapter's *closing line* is the doxology's
    *there is no power and no strength except by Allah the
    Almighty* — and the closing summary that places the
    book's whole arc (*the Master called the boy* through
    *the senior scholar of the old creed was sent back as
    warner*) within the *justice-and-monotheism* attributes
    Abu Malik asked for and Salih unfolded. The chapter ends
    on *the chain is open; the door is open; God's argument
    is conveyed*.
anchor_passages:
  - >
    "Salih's opening kindness and the *robes-of-arrogance*
    naming-without-flattery (the chapter's bridge from chapter
    five's seam): *The good is only good, O Abu Malik. Place
    your light in the lamp-niche of your mind and grasp what
    is meant for you. You may have rights, and the robes of
    arrogance may have dazzled you, and you may have taken
    upon yourself what is not your own — what you have
    imitated from the ways of those who follow you in
    charity, so that they listened to your speech, accepted
    your guidance, and trusted your opinion. It is your duty
    to protect yourself and them from a fire that you cannot
    avoid passing through; so seek a way to escape it.*"
  - >
    "Salih's *that-is-not-where-I-am-going* refusal of the
    easy doctrine (the chapter's first turning point): *That
    doctrine which means only descriptions of justice without
    knowing the One described, and the use of God's names
    without knowing His Oneness — this is the doctrine I
    refuse. What I call you to is knowledge of God's justice
    and the milestones of His unification. Once it is set
    forth, I will keep you from corrupting that saying as you
    wish.*"
  - >
    "The *fire-is-hot* figure on names-needing-meanings (the
    chapter's central methodological figure): *As when you
    say, 'fire is hot' — you have believed the words, but the
    truth does not benefit you, because your saying 'fire is
    hot' is the name of an attribute that does not benefit
    you if the speakers do not cook food with it and do not
    light it; they remain in darkness without the meaning of
    fire being present. And if names and attributes stand in
    place of meanings, then let your tongue burn at the mere
    mention of fire, and let the mention of food satisfy
    you.*"
  - >
    "The *four-letters-of-Allah* exchange (the closing of the
    monotheism door): *Your saying that God is One — and 'One'
    is four letters; we see two letters joined and two letters
    separate. So which of them is 'one,' or are they all
    together 'one'? And you say that 'Allah' is four letters:
    is the alif alone 'O God,' or are all the letters together
    'Allah' — the evidence of God — or do you say otherwise?*
    / *Abu Malik was struck silent. … I find no way out of
    this, except that each letter is a sign of God.* / *Which
    letter indicates God? Or what is it that indicates God — the
    letters by their separation, or by their joining?* / *I do
    not know what to tell you about this. Take us on to another
    chapter.* / *The door to the knowledge of monotheism has
    been closed before you. Who said this to you in this way, O
    Abu Malik?*"
  - >
    "The *had-you-meant-monotheism-you-would-have-said-He-is-
    not-like-anything* grammatical correction (the chapter's
    most exact monotheism-doctrine): *Your saying 'nothing is
    like Him' proves, from your own words, that He has a
    likeness and that nothing is like that likeness. Had you
    meant monotheism, you would have said, 'He is not like
    anything,' and you would not have said, 'nothing is like
    Him.' Glory be to the One whom no determination of thought
    can grasp, and whose sign no ambitions of perception can
    attain; the Almighty is too exalted for the description of
    those who are charged.*"
  - >
    "Salih's *causes-between-Him-and-His-creation* derivation
    (the chapter's positive doctrine, derived from Abu Malik's
    own concessions): *If He is higher than sight can reach,
    wider than perception can grasp, and greater than the
    limits of speech, then how does the one whom He forbids
    and commands come to know — so as to obey Him rather than
    disobey, and thank Him rather than disbelieve — unless you
    accept that there are causes for this knowledge between
    Him and His creation? Are there intermediaries who deliver
    His justice and bear witness to His witnessing for them
    and against them — whom He has chosen by His knowledge
    and selected from all His creation, and made them
    messengers to them and proofs against them, so that they
    stand as the just ones between Him and His servants,
    conveying His command and prohibition, so that obedience
    to them is obedience to God and His pleasure, and
    disobedience to them is His wrath and punishment?
    Otherwise, how could the command come from God to His
    creation?*"
  - >
    "Abu Malik's *foundations-of-justice* grand concession
    (the chapter's first crossing-over): *This, for me, is
    from the foundations of justice. As soon as creation
    needs God's justice to teach them what He wants from
    them through the hands of the righteous one whom He has
    created for that purpose, then each shall thank his
    benefactor, be rewarded by Him as He wills, be reproached
    by Him, and punished by Him if He wills.*"
  - >
    "The *virtuous-and-curious-one* (nāṭiq + waṣī)
    structure (the chapter's central doctrinal contribution):
    *If the virtuous one displays himself to others with
    knowledge of the unseen revealed in the revelation, then
    the curious one likewise displays himself to others with
    knowledge of the unseen in the interpretation of the
    Qur'an — whoever has it from Allah receives it and
    interprets it, and he receives nothing except from Allah
    by revelation.* / *And the curious one is also inspired?*
    / *Yes, and therefore obedience to him became obedience
    to Allah.* / *If you place him on a level with the
    virtuous one in obedience and revelation, why call him
    'curious'?* / *Because of the obedience due to the
    virtuous one and the need for him.*"
  - >
    "The *originators-of-this-were-three-in-every-age* triad
    (the chapter's etiology of the no-prophet-after lie): *The
    originators of this were three, in every age: a wayward
    devil, a stubborn tyrant, and a hypocrite. By saying
    this, they sought to cut off the marks of the prophets
    from the features of prophethood and turn it into a
    station shared among themselves; but they could not, until
    they had instilled in the hearts of the nations the
    saying, addressed to every nation, that Allah did not
    send anyone better than your prophet, that there is no
    prophet after him, and no warner.*"
  - >
    "The *Magi-Torah-Gospel-this-community* four-nations
    indictment (the chapter's pattern-recognition argument):
    *This is the nation of the Magi, clinging to its tyranny,
    worshipping its idols upon its fire, saying — according
    to their claim — that Allah will not send a messenger
    after their messenger. And this is the nation of the
    Torah … saying that Allah will not raise up a messenger
    after Moses. And this is the nation of the Gospel … saying
    that Allah will not send any messenger after Jesus. And
    this is your community, following the paths of those who
    came before it … certain in saying that Allah will not
    send any messenger or warner after their Messenger.*"
  - >
    "The *three-qualities* of the prior nations' standing
    (the chapter's consensus-asymmetry argument): *The first
    strand: they say they are earlier in the religion of
    Allah than you, and they have the merit of those who came
    before. The second: the consensus among themselves and
    with you to believe what they say — for they have the
    merit of being truthful. The third: your own testimony to
    them that their prophets are truthful and that they are
    the messengers of Allah; and none of them has testified
    for any prophet of yours, neither to prophethood nor to
    truthfulness.*"
  - >
    "The *just-one-is-the-guardian-of-Allah* identification
    (the chapter's first breakthrough): *Then it is established
    that the company is one of the prophets of Allah — namely,
    the just ones — and is the one among them called 'the
    just'?* / *Yes, he is the just one.* / *It has been
    established for you that the just one is the guardian of
    Allah — to the extent that you say it as a description,
    and the description holds?* / *Yes, this is true as a
    saying.* / *Whoever does not understand the one being
    described, will the description benefit him?* / *The
    description does not benefit him except by understanding
    the one being described.* / *Then whoever does not know
    the just one of Allah and His guardian, will his speech
    be just?* / *You have brought me out of my chapter on
    justice and monotheism, and what has brought me out of
    it is the truth itself, in the clearest of arguments and
    the kindest of speech.*"
  - >
    "The *six-prophets-between-Abraham-and-Moses / seven-
    between-Moses-and-Jesus* count (the chapter's collapse
    of the interregnum-defense): *The religion of Allah is too
    precious to Him for that. Was there really an interregnum
    after the religion of Abraham, when Allah sent after him
    Ishmael, Isaac, Jacob, Joseph, Jonah, and Shu'ayb,
    leading up to Moses? Then He inspired them with
    righteous deeds and the call to the religion of Abraham,
    the establishment of prayer by its Sunnah, and the giving
    of zakat by its obligation, until the Torah was given to
    Moses. So what interregnum stood between Moses and the
    Gospel, when Allah sent Joshua son of Nun after Moses,
    and Elias, Talut, David, Solomon, Zechariah, and John,
    leading up to Jesus? … Allah has made it so that, in the
    blink of an eye, they are either openly present or hidden
    in fear, veiled.*"
  - >
    "The *Moses-fleeing-Pharaoh-to-the-land-of-Shu'ayb*
    paradigm (the chapter's model for the absent age): *What
    was the reason for Moses' absence when he went out of
    Pharaoh's city and passed in fear, waiting until he
    reached the land of Shu'ayb?* / *He fled from Pharaoh's
    people, hiding from them, because he feared for himself
    when they had agreed to kill him.* / *Have you heard that
    any of the just — the just ones of Allah and the sons of
    His prophets — was killed while patiently bearing the
    burdens of the religion?* / *Yes — many of them have been
    killed.* / *Then what is the justice of this age that
    appears to you and to the people of your time? Is there
    one whom God sends down to you after death? Or one
    fleeing from among you whom you would force back to the
    killing he escaped, when he has followed Allah's example
    in His prophets and messengers — patient under fear and
    concealment until Allah judges between him and us, and
    who is the best of judges?*"
  - >
    "The *jurists-shelter-the-killers* indictment and the
    chapter's most pointed line (Abu Malik's confession
    against his own school): *What do your jurists say about
    this?* / *They show mercy to the slain, but see no
    disobedience in the killer.* / *Whoever obeys the killer
    voluntarily — is he not a partner with him in the blood
    of the slain?* / *Yes, by Allah — he is his partner, and
    even more wicked than he.* / *His companionship is
    acknowledged in his helping the killer — so how is he not
    worse than him?* / *Were it not for the narrations of the
    jurists, no tyrannical king could ever be established.*"
  - >
    "Salih's turn of the indictment on Abu Malik himself (the
    chapter's exposure of the senior scholar): *You placed on
    their stockings the crown of your justice, and they grew
    proud; you covered their clay with the robes of the
    sacred law, and they went too far; you lit up their
    falsehood with the idleness of your truth. So the weak
    were enraged by your conduct — those who were scholars
    like you — and they said, 'These are the jurists of the
    umma; we have in them an example.' You went astray by
    your own reasoning, and you led others astray by the
    reasoning of the mighty. … And you forgot the words of
    Allah Almighty: 'And do not incline toward those who
    have done wrong, lest the Fire touch you.' … 'Obey Allah
    and obey the Messenger and those in authority among
    you,' and you made these darknesses your authorities,
    even when they disbelieved. And you forgot the words of
    Allah Almighty: 'Fight those who disbelieve in you' — so
    you disobeyed those whom you were commanded to obey, and
    obeyed those whom you were commanded to fight, all the
    while thinking you were doing well.*"
  - >
    "The *Taqiyya* doctrine (the chapter's structural
    diagnosis of the absent age): *Had you supported the
    friends of Allah, they would have appeared; had you
    failed His enemies, they would not have prevailed. But
    the verdict has bound you to the guardians of Allah in
    three ways: the killer of the ruler does not tire of
    seeking and is not healed even when his case is nailed
    down — he is content with the stinging bite at his
    fingertips, out of anger; they do not stir up their
    enemy and do not turn from them even in their
    heedlessness; and out of hatred — because they believe
    in love for the guardians of Allah — they have no
    insight into faith and no trustworthiness in
    confidentiality. For this reason the guardians of Allah
    have absented themselves from you by Taqiyya, and for
    this reason the great creatures who took their own
    desires as their God, and seized the goods of this
    world, have done what is on a par with killing the
    prophets.*"
  - >
    "The *no-messenger-after-these-thirteen-messengers*
    exposure (the chapter's exposure of the legal cover-up
    for the killing): *They were ignorant of the fault of
    their conduct, so they did not hold themselves
    accountable for the injustice they committed, and were
    not humbled into repenting for what they had done;
    instead they returned to attributing the injustice of
    their own deeds to Allah, and they said: 'Allah will not
    send messengers after these thirteen messengers, nor
    will He send a warner.' So they made the killing of the
    guardians of Allah lawful unjustly — they were indeed
    unjust, and they wronged Him by that saying and by
    promising a lie.*"
  - >
    "Salih's *take-refuge-in-Him-and-repent-to-Him* opening
    of the way back (the chapter's pastoral turn): *By Allah,
    take refuge in Him and repent to Him — He accepts
    repentance from you. Ask Him for the way of His
    guardians, and He will save you by your works from the
    deeds of those who have done wrong. So it is with this
    creation: if they repent to Allah, He accepts their
    repentance — and what does Allah do with His punishment
    of them then? Allah does not oppress them by the weight
    of an atom, even when they are unjust and lie; and He
    does not hasten them with punishment, even when they
    hasten to commit disobedience.*"
  - >
    "Al-Bakhtari's closing counsel of gentleness (the
    chapter's pastoral teaching to the teacher): *You know
    your companions. If you know what is best for them, guide
    them with your guidance; and when you warn them, do not
    let it move you to inflict ta'zir upon them. Test them
    by ignoring them without ignorance, and instruct your
    elders to be kind to them and act righteously toward them
    in due time. The one who desires good is not hidden, and
    Allah will not abandon you behind your back; He will
    open for you, from the light of His success, the gates
    of guidance that He has appointed for him, and will show
    you the deeds of those who turn back to Him.*"
  - >
    "The author's closing and the doxology (the book's
    closing): *Whatever in this account took the form of a
    narrative was no idle telling, but a confirmation of
    what Allah has commanded — for in it is the steadfastness
    of the messengers, the signs of the guardians, and the
    manners of the seekers. Praise be to Allah, first and
    last. May Allah bless His Messenger Muhammad, peace and
    blessings of Allah be upon him, sent forth from Him to
    His creation as a bearer of good news and a warner; and
    bless his guardian, the Imam of the pious, the leader of
    the Muhajirun, the beloved of the Lord of the Worlds; and
    the Imams of the people of his house, those whom Allah
    has blessed and from whom He has removed every abomination
    and purified them completely. Allah is sufficient for us;
    blessed is the Agent, blessed is the Lord, and blessed is
    the Supporter. There is no power and no strength except
    by Allah the Almighty.*"
