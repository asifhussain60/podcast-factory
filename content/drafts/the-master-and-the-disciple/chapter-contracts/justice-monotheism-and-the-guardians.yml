format_rationale: >
  Reclassified 2026-05-24 from `deep_dive` to `debate` per Asif's
  override of the pipeline's initial Phase-0d analysis (paired with the
  same flip for ch05). The pipeline treated the *concession-arc* as a
  teaching-dialogue; Asif's revised reading — backed by the reference
  NotebookLM episode whose opener was *Welcome to the debate* — is that
  the chapter's STRUCTURE is the long sustained adjudication of two
  named opposing positions (Salih's necessity-of-causes-plus-chain-of-
  guardians vs Abu Malik's classical no-prophet-after / interregnum-
  defense / fiqh-tradition-sufficiency). The fact that Abu Malik
  concedes by the close maps cleanly to `host_b_concedes` resolution
  enum (challenger Category P2 explicitly allows it). Pipeline guidance
  updated in `_authoring.py` Phase 0d Step 2 prompt to allow
  named-opposition-with-concession-arc as a valid debate pattern going
  forward. Prior pipeline rationale preserved below:
  ───────────────────────────────────────────────────────────────────
  PRIOR (pipeline auto-analysis):
  The chapter is a sustained primary-source dialogue developing
  ONE positive doctrine across three movements — *the necessity
  of causes between God and His creation*; *the chain of just
  ones (nāṭiq + waṣī) as that cause*; *the absence of the cause
  in this age as Taqiyya driven by the community's own betrayal,
  not as God's interregnum*. There is one named opposing voice
  (Abu Malik), but Abu Malik is NOT being adjudicated against
  Salih in the al-Islah/al-Nusra debate-sense (two named opposing
  doctrinal positions resolved by a third). Abu Malik's role
  throughout is *foil-and-concession*: he gives the old creed's
  doctrine (*God is One, nothing is like Him, just in His
  ruling*); Salih strips it (*these are names and attributes of no
  use unless there is a meaning behind them*); Abu Malik concedes
  doctrinally at every juncture (the door of monotheism closed
  before him, the name-vs-named perplexity, the analogy's
  collapse, the impossibility of direct perception, the necessity
  of causes from the foundations of justice, the single-judgment
  doctrine, the virtuous-and-curious-one structure, the
  three-qualities of the prior nations, the just-one-as-guardian
  identification, the interregnum-defense collapse, the
  Moses-fleeing-Pharaoh paradigm, the jurists'-cover-up indictment
  including against his own school, the *were-it-not-for-the-
  narrations-of-the-jurists-no-tyrant-could-be-established* line
  against himself, and the closing repentance). Abu Malik is the
  *senior scholar of the old creed* brought to *crossing-over
  on his own concession*, exactly as the father in chapter five
  was. The chapter's pattern is identical to chapter five's:
  *every foil-voice* eventually *consents*. The same host_dynamic
  (curious_mind + scholar_companion) carries Salih's teaching
  and Abu Malik's concession-by-concession crossing-over, plus
  Salih's prayerful tears at the end and al-Bakhtari's closing
  counsel of gentleness.
debate:
  proposition: >
    God's justice is exhausted by the inherited monotheistic creed plus
    the classical no-prophet-after-our-prophet doctrine; the cutting-off
    of revelation by the books is part of God's plan, and no ongoing
    chain of named guardians (nāṭiq + waṣī) is required to constitute
    religion in any age.
  host_a:
    role: scholar
    position: >
      God's justice REQUIRES an unbroken chain of named guardians as the
      cause connecting heaven to earth. Naming Him One is insufficient
      without the meaning behind the names; the closure of sight and
      speech and the impossibility of direct perception derive the
      necessity of causes from the foundations of justice itself. The
      "interregnum" defense collapses on the historical-paradigm cases
      (Moses fleeing Pharaoh to Shu'ayb; six prophets between Abraham
      and Moses; seven between Moses and Jesus). The guardians' absence
      in this age is *Taqiyya driven by the community's betrayal* —
      "had you supported the friends of Allah, they would have appeared;
      had you failed His enemies, they would not have prevailed" — not
      God's interregnum. The jurists who legitimize the killers of the
      guardians are the structural sin: "were it not for the narrations
      of the jurists, no tyrannical king could ever be established."
    source_moves:
      - "*Fire-is-hot* figure on names-needing-meanings"
      - "*Four-letters-of-Allah* exchange closing the monotheism door"
      - "*Name-vs-named — which is worshipped?* trap"
      - "*Analogy-from-human-makers* and its refutation by the *three-things-every-making-presupposes*"
      - "*Glory-be-to-the-One-whom-no-determination-of-thought-can-grasp* doxology and the *sun-and-the-lights-of-the-earth* figure"
      - "*Sight-closed-speech-closed* derivation of the necessity-of-the-bridge"
      - "*Causes-between-Him-and-His-creation* positive doctrine"
      - "*Virtuous-one + curious-one* (nāṭiq + waṣī) structure with the *Lot-at-Abraham's-hands* and *Ishmael-and-Isaac* paradigm cases"
      - "*Originators-of-error-were-three-in-every-age* (devil/tyrant/hypocrite) triad"
      - "*Magi/Torah/Gospel/this-community* four-nations indictment"
      - "*Consensus-and-the-oppression-of-the-sultans* indictment of senior scholars"
      - "*Six-prophets-between-Abraham-and-Moses / seven-between-Moses-and-Jesus* collapsing the interregnum defense"
      - "*Moses-fleeing-Pharaoh-to-the-land-of-Shu'ayb* paradigm"
      - "*Killers-and-the-jurists-who-shelter-them* indictment"
      - "*Were-it-not-for-the-narrations-of-the-jurists-no-tyrannical-king-could-ever-be-established* line (Abu Malik's own concession turned against the school)"
      - "*Crown-of-your-justice-on-their-stockings / robes-of-the-sacred-law-on-their-clay* triad"
      - "*Fifteen-year-old-son-killed* question"
      - "*Had-you-supported-the-friends-of-Allah-they-would-have-appeared* structural diagnosis of *Taqiyya*"
  host_b:
    role: debater
    position: >
      The inherited creed — God is One, nothing is like Him, just in His
      ruling — is sufficient. The cutting-off of revelation by the books
      is part of God's plan; the community now lives by the narrations
      of the messengers and the testimony of the prior nations. No prophet
      comes after our prophet ﷺ; the "interregnums" between revealed
      messengers are part of the divine pattern. The jurists' role is to
      transmit and interpret; they are not responsible for the actions of
      rulers who happen to rule in their era.
    source_moves:
      - "Full classical monotheistic creed in one breath at the opening"
      - "Standard fiqh definition of religion (carried over from ch05)"
      - "*No-prophet-after-our-prophet* objection (the chapter's central foil claim)"
      - "*Magi/Torah/Gospel* historical pattern as proof that nations are condemned by reports alone"
      - "*Three-qualities of the prior nations' standing* (earliness, consensus, testimony-asymmetry)"
      - "*Interregnum-defense* fallback after the first refutation"
      - "*Openly-present-or-hidden-in-fear-veiled* clause as best-case for the chain doctrine, conditionally accepted"
  resolution: host_b_concedes
  resolution_note: >
    Abu Malik concedes step-by-step across the chapter's most-pointed
    moments: the door-of-monotheism closes before him, the name-vs-named
    perplexity is admitted, the analogy collapses, the necessity-of-
    causes-from-the-foundations-of-justice is conceded, the just-one-as-
    guardian identification produces his first-breakthrough smile, the
    interregnum-defense collapses on the historical-paradigm count, and
    finally — most strikingly — Abu Malik names the structural sin
    against his own school: "were it not for the narrations of the
    jurists, no tyrannical king could ever be established." The
    resolution closes with Abu Malik and his companions "returned to
    their people as warners." The debate-format honors the sustained
    structure of the contest; the `host_b_concedes` resolution honors
    the outcome's direction.
essential: core
essential_rationale: >
  This is the doctrinal climax of the book and cannot be removed
  without destroying the arc. It is the chapter that *describes
  religion-by-attribute* (the question chapter five posed and
  could not answer), naming the attributes as *justice* and
  *monotheism* and showing each is empty without the chain of
  the just ones. The chapter contains the book's three signature
  da'wa doctrines: (1) the *necessity of causes between God and
  His creation* derived from the closure of sight and speech and
  from the obligation not to charge worshippers with what they
  cannot bear; (2) the *virtuous-one + curious-one* (nāṭiq +
  waṣī) structure of revelation-plus-interpretation, with both
  inspired and both yielding obedience-to-Allah; (3) the
  *Taqiyya* doctrine in its structural form — *had you supported
  the friends of Allah, they would have appeared; had you failed
  His enemies, they would not have prevailed* — naming the
  guardians' absence as the community's responsibility, not
  God's deficit. The chapter also contains the historical-
  doctrinal indictment that the *no-prophet-after* saying is the
  same lie told to four nations (Magi, Torah, Gospel, this
  community) by three originators (devil, tyrant, hypocrite); the
  *three qualities* (earliness, consensus, testimony-asymmetry)
  by which the prior nations win every consensus-argument the
  community has tried to make against them; the indictment of the
  jurists who *show mercy to the slain but see no disobedience in
  the killer* and the chapter's most pointed line — *were it not
  for the narrations of the jurists, no tyrannical king could
  ever be established*; the *Moses-fleeing-Pharaoh* paradigm for
  the absent age (*either God sends back the slain, or the
  surviving just ones hide*); the *no-messenger-after-these-
  thirteen-messengers* claim exposed as the legal cover-up for
  the killing; Abu Malik's repentance and Salih's tears; al-
  Bakhtari's closing counsel of gentleness (*do not let it move
  you to inflict ta'zir*); and the author's closing — *whatever
  in this account took the form of a narrative was no idle
  telling, but a confirmation of what Allah has commanded* — and
  the doxology. The chapter both *closes the book's argument*
  and *closes the book*.
host_dynamic: curious_mind + scholar_companion
host_dynamic_rationale: >
  The curious_mind voices *Abu Malik* across the chapter — the
  old creed's standard creed (*God is One, nothing is like Him,
  just in His ruling*); the *struck-silent* perplexity at the
  four letters of *Allah*; the *each-letter-is-a-sign-of-God*
  improvisation; the *take-us-on-to-another-chapter* surrender;
  the *I-judged-that-this-great-creation-has-a-Creator-who-is-
  like-nothing-He-has-created* analogy from human makers; the
  *struck-the-ground-in-his-confusion* moment; the *speech-is-
  gone, there-is-nothing-to-say* honest answer; the *whoever-
  charges-the-obedient-one-with-what-he-cannot-bear-has-laid-a-
  sin-upon-him* concession on justice; the *they-learned-this-
  from-God* concession on the source of knowledge; the *this-
  for-me-is-from-the-foundations-of-justice* grand concession on
  the necessity of causes; the *judgment-can-only-be-one*
  concession on single judgment; the *is-each-of-them-like-his-
  counterpart* and *why-call-him-curious-if-he-is-also-inspired*
  questions on the virtuous/curious structure; the *I-accept-
  what-the-Books-bear-witness-to* concession on the chain-as-
  one; the *how-could-the-scholars-of-this-community-fail-to-
  consider-this-period* objection; the *what-was-the-origin-of-
  that-and-what-did-they-intend-by-it* question that draws out
  the *three originators*; the *what-are-these-three-qualities*
  question that draws out the *prior nations' standing*; the
  *this-community-has-gone-far-astray* and *yes-he-is-the-just-
  one* concessions on the just-one-as-guardian; the *first
  breakthrough smile* (*you have brought me out of my chapter
  on justice and monotheism*); the *how-shall-we-know-the-
  causes-in-our-time* temporal objection that brings the
  *Taqiyya* doctrine into view; the *interregnum-defense*
  fallback; the *this-is-an-irrefutable-statement* concession
  on the interregnum-collapse; the *what-then-is-the-meaning-
  of-their-absence* question that brings the Moses-fleeing-
  Pharaoh paradigm; the *both-are-in-the-Fire* concession on
  the killers; the *they-show-mercy-to-the-slain-but-see-no-
  disobedience-in-the-killer* admission against his own school;
  the *were-it-not-for-the-narrations-of-the-jurists-no-
  tyrannical-king-could-ever-be-established* admission; the
  *no-one-is-satisfied-with-that* concession; the *it-is-dear-
  to-us-that-the-guardian-of-Allah-be-killed-among-us* line;
  the *yes-this-is-the-description-of-this-nation-of-ours*
  concession on the *no-messenger-after-these-thirteen-
  messengers* doctrine; and the *I-seek-refuge-from-the-
  punishment-of-Allah-by-repenting-to-Him* closing repentance.
  The scholar_companion voices *Salih* across the same
  sequence — the *good-is-only-good* opening kindness; the
  *robes-of-arrogance* naming without flattery; the *I-call-
  you-to-God's-justice-and-unity* and the *that-is-not-where-
  I-am-going* refusal of the easy doctrine; the *fire-is-hot*
  figure on names-needing-meanings; the *four-letters-of-Allah*
  closure of the monotheism door; the *name-vs-named-which-is-
  worshipped* trap; the *everything-made-is-made-of-three-
  things-and-God-did-not-create-things-from-anything-that-
  existed-before-them* refutation of analogy; the *had-you-
  meant-monotheism-you-would-have-said-He-is-not-like-anything*
  grammatical correction; the *no-thought-grasps-Him* doxology
  and the sun-and-the-lights-of-the-earth figure; the *sight-
  closed-speech-closed* derivation; the *one-can-perceive-Him-
  only-by-request-and-inquiry* hinge; the *is-He-unjust* and
  *would-He-be-content-with-ignorance* and *were-they-created-
  as-scholars* questions; the *causes-between-Him-and-His-
  creation* positive doctrine; the *single-justice-single-
  judgment-succession* doctrine; the *ranks-among-the-just-
  and-equal-reward-for-obedience* doctrine; the *virtuous-and-
  curious-one* structure with the *Lot-at-the-hands-of-Abraham*
  and *Ishmael-and-Isaac* paradigm cases; the *Book-bears-
  witness-to-the-interpreter* clause; the *what-they-have-
  left-unexamined-is-not-sound* sociology-of-error; the
  *originators-of-this-were-three-in-every-age* triad of
  devil/tyrant/hypocrite; the *Magi/Torah/Gospel/this-community*
  four-nations indictment; the *consensus-and-the-oppression-
  of-the-sultans* indictment of the senior scholars; the
  *three-qualities* of the prior nations' standing; the *just-
  one-is-the-guardian-of-Allah* identification with the
  *coextensivity-of-description-and-described-one* logic; the
  *camouflaged-glass-falls-away* return of the chapter-five
  essence-traders parable; the *Glory-be-to-Allah* slip-rebuke
  on the temporal objection; the *what-has-excluded-us-from-
  that-justice* five-question indictment of the interregnum-
  defense; the *was-there-really-an-interregnum-between-
  Abraham-and-Moses* count; the *Moses-fleeing-Pharaoh*
  paradigm; the *what-do-your-jurists-say-about-this* and the
  *whoever-obeys-the-killer-voluntarily-is-his-partner-in-the-
  blood-of-the-slain* indictment; the *I-have-laid-this-on-
  you-yourself* turn of the indictment on Abu Malik; the
  *crown-of-your-justice-on-their-stockings* and *robes-of-the-
  sacred-law-on-their-clay* figures; the *do-not-incline-
  toward-those-who-have-done-wrong* / *obey-those-in-authority*
  / *fight-those-who-disbelieve* triad of inverted commandments;
  the *fifteen-year-old-son-killed* question; the *had-you-
  supported-the-friends-of-Allah-they-would-have-appeared*
  structural diagnosis of *Taqiyya* as the community's
  responsibility; the *no-messenger-after-these-thirteen-
  messengers* exposure as legal cover-up; the *take-refuge-
  in-Him-and-repent-to-Him* opening of the way back; and the
  tearful interruption that ends the teaching part. The
  scholar_companion also voices *al-Bakhtari* (Salih's father)
  in the closing-counsel of gentleness (*you know your
  companions … do not let it move you to inflict ta'zir … test
  them by ignoring them without ignorance*). The chapter's
  signature move is the *role-continuation* from chapter five:
  Salih is the teacher; the senior scholar of the old creed
  (Abu Malik) is the student; al-Bakhtari, the scholar-father,
  closes the dialogue with the *teacher's-counsel-to-the-
  teacher* on how to handle the new converts. The same
  host_dynamic (curious_mind + scholar_companion) that has
  carried the book carries the doctrinal climax.
length_target: extended
key_tensions:
  - >
    The chapter is the *book's doctrinal climax* — the answer to
    chapter five's *attribute is preferable to him — so how is it
    described?* — but it must be voiced as *answer-by-stripping*,
    not as *imposition*. Salih does not *declare* the doctrine of
    causes; he *derives* it from Abu Malik's own concessions on
    *names-need-meanings*, *sight-and-speech-are-closed*, *God-is-
    not-unjust*, *God-is-not-content-with-ignorance*, *they-were-
    created-ignorant-not-knowing-anything*. The *causes-between-
    God-and-creation* doctrine *follows by necessity* from what
    Abu Malik has already conceded. The hosts must walk the
    derivation step by step — not deliver the doctrine in one
    breath and then footnote it. Every concession is a
    *crossing-over* the listener earns alongside Abu Malik. If
    the hosts pre-empt the derivation, the chapter loses its
    *form*: it is not a treatise that *announces* its doctrine,
    but a dialogue that *brings the foil to it*.
  - >
    The *no-prophet-after-our-prophet* doctrine (the great
    objection Abu Malik raises and Salih answers) is the
    chapter's pivot. The answer comes in four moves: (1) the
    *originators-of-this-were-three-in-every-age — a wayward
    devil, a stubborn tyrant, and a hypocrite* — and the
    *sociology-of-error* (*what they have left unexamined is
    not sound; they have no one to discuss it with them; it
    has been drilled into their hearts*); (2) the *four-nations*
    pattern (*Magi, Torah, Gospel, this community*) showing the
    *form is identical, only the names change*; (3) the *three
    qualities* of the prior nations' standing — *earliness,
    consensus, testimony-asymmetry* — by which the prior
    nations win every consensus-argument; (4) the *Taqiyya*
    doctrine (*had you supported the friends of Allah, they
    would have appeared; had you failed His enemies, they
    would not have prevailed*) showing the absence is the
    community's responsibility, not God's deficit, and the
    *no-messenger-after-these-thirteen-messengers* claim is
    exposed as the legal cover-up for the killing. The hosts
    must hold the *four moves together as one structure* — the
    *sociology, the pattern, the consensus-asymmetry, the
    Taqiyya doctrine* — not present them as four separate
    arguments.
  - >
    The *virtuous-one + curious-one* structure (in the *da'wa*
    register the *nāṭiq* and the *waṣī*, the speaker-prophet
    and the successor-bearer-of-ta'wīl) is the chapter's
    central doctrinal contribution and must be voiced with the
    full subtlety. *Both* are inspired; *both* bring knowledge
    of the unseen; *both* yield obedience-to-Allah. The naming
    (*virtuous* / *curious*) is *not a ranking of inspiration-
    quality* — it is a *ranking of obedience-flow and need-of-
    the-other*: the curious one is named curious because *he
    obeys the virtuous one and needs the virtuous one's prior
    revelation-bringing to have something to interpret*. The
    *paradigm cases* from the source (*Lot at the hands of
    Abraham*; *Ishmael and Isaac, and the goodness accrued to
    Abraham*) must be voiced. The *Book-bears-witness-to-the-
    interpreter* clause must be voiced. The *interpreter's
    own knowledge-of-the-unseen* (the *seven creations of the
    unseen the virtuous one displays*) must not be flattened
    to mere *commentary*. The hosts must keep the *two
    stations as one matter*, as the source does, against the
    listener's reflex to read *interpretation* as *second-
    order, lesser commentary*.
  - >
    The *Taqiyya* doctrine (*ta-KEE-yah*, protective
    concealment) is the chapter's most-needed pastoral
    teaching for the contemporary listener. The doctrine has
    THREE components that must be voiced *as one*: (1) the
    *guardians are present in any age — either openly present
    or hidden in fear, veiled*; (2) the *veil is forced upon
    them by the community's killing of their predecessors and
    by the jurists' clearing of the killers*; (3) the
    *community itself is the cause of the veil — had you
    supported the friends of Allah, they would have appeared;
    had you failed His enemies, they would not have
    prevailed*. The doctrine is NOT *God has withdrawn His
    cause*; it is *the community has driven the cause into
    hiding by its own conduct, then attributed the absence to
    God by saying "no messenger after these thirteen
    messengers"*. The *responsibility* lies with the
    community, not with God; the *remedy* lies with the
    community (repentance, supporting the friends, failing
    the enemies). The hosts must voice the doctrine with all
    three components in view — the doctrine collapses if any
    one is dropped.
  - >
    The chapter's *most pointed single line* is *were it not
    for the narrations of the jurists, no tyrannical king
    could ever be established* — Abu Malik's *own*
    confession against his *own* school. The line must be
    voiced *as Abu Malik's own*, not as Salih's. The chapter's
    *most painful sentence* is *they show mercy to the slain,
    but see no disobedience in the killer* — also Abu Malik's
    own. The chapter's *most exposing exchange* is the
    *crown-of-your-justice-on-their-stockings* /
    *robes-of-the-sacred-law-on-their-clay* /
    *idleness-of-your-truth-lights-up-their-falsehood* triad —
    Salih's indictment of Abu Malik himself for legitimating
    the king through his school's narrations. These passages
    must NOT be softened to *historical background*; they are
    the chapter's *living indictment*, and Abu Malik *grants*
    each one. The hosts must let the indictment *land as
    indictment* on the contemporary listener, who is in the
    *same structural position as Abu Malik's nation*. The
    chapter's *pastoral* turn (Salih's tears, the way of
    repentance, al-Bakhtari's counsel of gentleness) follows
    the indictment without softening it.
  - >
    The book's *closing discipline of naming-by-attribute*
    must be preserved in the doxology. The *guardian of the
    Messenger* is named in the doxology *only by attribute*
    (*the Imam of the pious, the leader of the Muhajirun, the
    beloved of the Lord of the Worlds*), never by name. This
    is the book's *naming-by-attribute* discipline (the *one
    whose right is binding* of chapter three, the *generous
    one*, the *greater Shaykh*, never named-by-name) carried
    into the *closing-doxology*. The phrase "Imam Ali" is
    FORBIDDEN per `imam-lineage-ismaili.yml`; in the Ismaili
    canonical lineage the first Imam is Hassan, and the
    correct reference to ʿAlī ibn Abī Ṭālib (when he must
    be named) is "Father of Imams". In this chapter he is
    *not* named; he is referenced only by attribute in the
    closing doxology. The *Imams of the people of his house*
    are similarly referenced collectively by attribute, never
    individually by name. The hosts must preserve the
    discipline — they are voicing the *book's* closing, not
    an *explanatory commentary that names what the book left
    un-named*.
tone_constraints:
  - >
    Walk the chapter in the source's order: (1) Salih's opening
    kindness and the *robes-of-arrogance* naming; (2) Abu
    Malik's *we-are-left-with-only-the-knowledge-you-call-us-to*
    consent; (3) Salih's *I-call-you-to-God's-justice-and-unity*
    and the *that-is-not-where-I-am-going* refusal of the easy
    doctrine; (4) Abu Malik's full creed in one breath; (5) the
    *fire-is-hot* figure on names-needing-meanings; (6) the
    *four-letters-of-Allah* dialogue closing the monotheism
    door; (7) the *name-vs-named-which-is-worshipped* trap;
    (8) the *analogy-from-human-makers* and its refutation by
    the *three-things-every-making-presupposes* and *God-did-
    not-create-from-anything-pre-existing*; (9) the *had-you-
    meant-monotheism-you-would-have-said-He-is-not-like-
    anything* grammatical correction and the *doxology-of-
    inaccessibility*; (10) the *sun-and-the-lights-of-the-
    earth* figure; (11) the *speech-is-gone-one-can-perceive-
    Him-only-by-request-and-inquiry* hinge; (12) the *sight-
    closed-speech-closed* derivation and the *is-He-unjust /
    would-He-be-content-with-ignorance / were-they-created-as-
    scholars-or-ignorant* triad; (13) the *causes-between-Him-
    and-His-creation* positive doctrine; (14) Abu Malik's
    *this-is-from-the-foundations-of-justice* grand concession;
    (15) the *single-justice-single-judgment-succession-of-
    messengers* doctrine; (16) the *ranks-among-the-just-and-
    equal-reward-for-obedience* doctrine; (17) the *virtuous-
    and-curious-one* structure with the *Lot-at-the-hands-of-
    Abraham* and *Ishmael-and-Isaac* paradigm cases and the
    *Book-bears-witness-to-the-interpreter* clause; (18) Abu
    Malik's *no-prophet-after-our-prophet* objection and Salih's
    *sociology-of-error* answer (*what they have left
    unexamined is not sound; they have no one to discuss it
    with them; it has been drilled into their hearts*); (19)
    the *originators-of-this-were-three-in-every-age* triad of
    *devil/tyrant/hypocrite* and the *they-whispered-from-a-
    quarter-they-did-not-perceive* sentence; (20) the *Magi /
    Torah / Gospel / this-community* four-nations indictment;
    (21) the *consensus-and-the-oppression-of-the-sultans*
    indictment of the senior scholars; (22) the *three-
    qualities* of the prior nations' standing (*earliness,
    consensus, testimony-asymmetry*); (23) the *just-one-is-
    the-guardian-of-Allah* identification with the
    *coextensivity-of-description-and-described-one* logic;
    (24) Abu Malik's first-breakthrough smile (*you have
    brought me out of my chapter on justice and monotheism*);
    (25) Abu Malik's *temporal-question* about the absent age
    and Salih's *Glory-be-to-Allah* slip-rebuke; (26) the
    *five-question* indictment of the interregnum-defense;
    (27) Abu Malik's *interregnum-defense* fallback and the
    *six-prophets-between-Abraham-and-Moses / seven-between-
    Moses-and-Jesus* count that collapses it; (28) the
    *openly-present-or-hidden-in-fear-veiled* doctrine; (29)
    the *Moses-fleeing-Pharaoh-to-the-land-of-Shu'ayb*
    paradigm; (30) the *killers-and-the-jurists-who-shelter-
    them* indictment (*they show mercy to the slain, but see
    no disobedience in the killer*); (31) the *were-it-not-
    for-the-narrations-of-the-jurists-no-tyrannical-king-
    could-ever-be-established* line; (32) the *crown-of-your-
    justice-on-their-stockings* turn of the indictment on Abu
    Malik himself with the *do-not-incline / obey-the-
    authority / fight-the-disbelievers* triad of inverted
    commandments; (33) the *fifteen-year-old-son-killed*
    question; (34) the *had-you-supported-the-friends-of-
    Allah-they-would-have-appeared* structural diagnosis of
    *Taqiyya* and the *no-messenger-after-these-thirteen-
    messengers* exposure as legal cover-up; (35) Abu Malik's
    *where-is-the-salvation-from-this* question and Salih's
    *take-refuge-in-Him-and-repent-to-Him* opening of the
    way back; (36) Salih's tearful interruption; (37) al-
    Bakhtari's closing counsel of gentleness (*do not let it
    move you to inflict ta'zir*); (38) Abu Malik and his
    companions guided and *returned to their people as
    warners*; (39) the author's closing (*whatever in this
    account took the form of a narrative was no idle
    telling*); (40) the doxology blessing the Messenger
    Muhammad, his guardian (named-by-attribute), and the
    Imams of his house.
  - >
