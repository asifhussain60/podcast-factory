      *if names and attributes stand in place of meanings,
      then let your tongue burn at the mere mention of fire,
      and let the mention of food satisfy you* — the
      chapter's central methodological figure, applied to
      *God is One, nothing is like Him, just in His ruling*
      to show the standard creed is a *name without a
      meaning* unless its *described one* is known"
    - >
      "The *had-you-meant-monotheism-you-would-have-said-He-
      is-not-like-anything* grammatical correction — *your
      saying 'nothing is like Him' proves, from your own
      words, that He has a likeness and that nothing is like
      that likeness* — the chapter's most exact monotheism-
      doctrine, derived from a grammatical fault inside the
