show_notes:
  blurb: >
    The book's doctrinal climax and final chapter. Chapter five
    ended on Abu Malik (a-BOO MAA-lik), the senior scholar of
    the old creed, brought to a *zero point* — the *Sharia*
    (sha-REE-ah) of his age confessed to be *lost, corrupted,
    and disrupted*, and his identification of *religion* with
    *Sharia* collapsed by his own admission. He had asked:
    *the attribute is preferable to him — so how is it
    described?* Chapter six is the *answer*. Salih (SAA-lih)
    calls Abu Malik to *God's justice and His unity* — and
    immediately refuses the *monotheism-without-meaning* (*the
    use of God's names without knowing His Oneness*) that Abu
    Malik's school holds in common with the *people of justice
    and monotheism*. The opening figure: *as when you say,
    'fire is hot' — if names and attributes stand in place of
    meanings, then let your tongue burn at the mere mention of
    fire, and let the mention of food satisfy you*. Names
    require their meanings. Salih then leads Abu Malik through
    three failed approaches to monotheism. The *four letters of
    Allah*: *which letter indicates God — the letters by their
    separation, or by their joining?* Abu Malik *was struck
    silent*; *take us on to another chapter*. *The door to the
    knowledge of monotheism has been closed before you*. The
    *name-vs-named-which-is-worshipped* trap: *Allah is a name
    for Allah; what is the difference between the name and the
    named? Which is worshipped — or both?* Either word-worship
    or two-worship; monotheism fails. The *analogy from human
    makers*: *everything made is made of three things, and God
    did not create things from anything that existed before
    them*. The likeness fails at the root. And the grammatical
    correction: *had you meant monotheism, you would have said,
    'He is not like anything,' and you would not have said,
    'nothing is like Him'* — for the second form still posits a
    *Him* whose likeness nothing matches. *Glory be to the One
    whom no determination of thought can grasp*. From the
    closure of sight and speech, and the obligation that *God
    does not charge worshippers with what they cannot bear*,
    Salih derives the positive doctrine: *there must be causes
    for this knowledge between Him and His creation —
    intermediaries who stand as the just ones between Him and
    His servants, conveying His command and prohibition*. Abu
    Malik's grand concession: *this, for me, is from the
    foundations of justice*. The structure follows: single
    justice → single judgment → succession of messengers →
    ranks among the just → equal reward for obedience
    regardless of rank → the *virtuous one* (in the *da'wa*
    (DAH-wah) register the *nāṭiq*, NAA-tiq, the speaker-
    prophet, bearer of revelation) and the *curious one* (the
    *waṣī*, /waˈsˤiː/, the successor, bearer of *ta'wīl*,
    /taʔˈwiːl/, esoteric interpretation) — *both* inspired,
    *both* yielding obedience-to-Allah. *The Book bears witness
    to the interpreter*. Abu Malik then raises his community's
    great objection: *they all agree that after their prophet
    there is no prophet and no warner in their time*. Salih's
    answer is the chapter's most devastating piece of
    historical-doctrinal indictment. *The originators of this
    were three, in every age: a wayward devil, a stubborn
    tyrant, and a hypocrite*. The same lie was told to *the
    nation of the Magi*, *the nation of the Torah* (*no
    messenger after Moses*), *the nation of the Gospel* (*its
    prophet is its God* — *no messenger after Jesus*), and now
    *your community* (*no messenger or warner after their
    Messenger*) — *four nations, one error*. The community's
    *three qualities* are exposed: the prior nations have
    *earliness in religion*, *consensus among themselves and
    with you*, and the *testimony-asymmetry* (*your own
    testimony to them that their prophets are truthful, and
    none of them has testified for any prophet of yours*). The
    *just one is the guardian of Allah* (*awliyāʾ*,
    /ʔawliˈjaːʔ/). Abu Malik smiles his first breakthrough —
    *you have brought me out of my chapter on justice and
    monotheism, and what has brought me out of it is the truth
    itself*. The *temporal-question*: *how shall we know the
    causes in our time?* Salih's *interregnum-defense* collapse:
    *was there really an interregnum after the religion of
    Abraham, when Allah sent Ishmael, Isaac, Jacob, Joseph,
    Jonah, and Shu'ayb (shoo-AYB), leading up to Moses?* Six
    prophets named. *So what interregnum stood between Moses
    and the Gospel, when Allah sent Joshua son of Nun, Elias,
    Talut (taa-LOOT), David, Solomon, Zechariah, and John,
    leading up to Jesus?* Seven more. *There was no
    interregnum*. The just ones are *openly present or hidden
    in fear, veiled* — *Moses' flight from Pharaoh's city to
    the land of Shu'ayb* is the paradigm. The *veil* is the
    *form of their presence in a hostile age*, and is named
    *Taqiyya* (ta-KEE-yah, protective concealment). The
    indictment of the jurists who shelter the killers — *they
    show mercy to the slain, but see no disobedience in the
    killer* — leads to the chapter's most pointed single line:
    *were it not for the narrations of the jurists, no
    tyrannical king could ever be established*. Salih turns the
    indictment on Abu Malik himself: *you placed on their
    stockings the crown of your justice, and they grew proud;
    you covered their clay with the robes of the sacred law,
    and they went too far; you lit up their falsehood with the
    idleness of your truth*; *do not incline toward those who
    have done wrong*; *obey those in authority among you* (the
    guardians, not the king); *fight those who disbelieve* —
    *you disobeyed those whom you were commanded to obey, and
    obeyed those whom you were commanded to fight, all the
    while thinking you were doing well*. The community's
    *no-messenger-after-these-thirteen-messengers* claim is
    exposed: *they made the killing of the guardians of Allah
    lawful unjustly — they wronged Him by that saying and by
    promising a lie*. Salih names the structural diagnosis:
    *had you supported the friends of Allah, they would have
    appeared; had you failed His enemies, they would not have
    prevailed*. The guardians' *Taqiyya* is the community's
    responsibility, not God's deficit. Abu Malik repents; Salih
    opens the way back (*take refuge in Him, repent to Him,
    ask Him for the way of His guardians*). Salih's eyes well
    with tears at the mention of repentance and he interrupts
    his speech. Al-Bakhtari (al-bakh-tah-REE) — Salih's father,
    the scholar of chapter five — counsels gentleness: *do not
    let it move you to inflict ta'zir (tah-ZEER, discretionary
    religious chastisement) upon them. Test them by ignoring
    them without ignorance*. Abu Malik and his companions are
    guided and return to their people *as warners*. The
    author's closing: *whatever in this account took the form
    of a narrative was no idle telling, but a confirmation of
    what Allah has commanded — for in it is the steadfastness
    of the messengers, the signs of the guardians, and the
    manners of the seekers*. The doxology blesses the
    Messenger Muhammad, peace and blessings of Allah be upon
    him; *his guardian, the Imam of the pious, the leader of
    the Muhajirun (moo-haa-jih-ROON), the beloved of the Lord
    of the Worlds* (named *only by attribute*, preserving the
    book's discipline of naming-by-attribute); and *the Imams
    of the people of his house, from whom Allah has removed
    every abomination*. The closing formula — *there is no
    power and no strength except by Allah the Almighty* — is
    the same formula whose interpretation (the *ḥawl* as the
    Imam who turns the Creator's words; the *quwwa* as his
    *ḥujja* and *bāb*) the book has spent six chapters
    unfolding. The book is done.
