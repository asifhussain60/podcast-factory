  references:
    - >
      "Sayyidina Ja'far ibn Mansur al-Yaman, *Kitab al-'Alim
      wa-l-Ghulam* (*The Book of the Master and the Boy*) — the
      initiation chapter, delivered after the chapter-three
      deferral on the Imam's permission and before the chapter-
      five revelation of the boy's name (*Salih*) and the
      father's identity (*al-Bakhtari*)"
    - >
      "The *da'wa* doctrine of *coextensivity of name and named*
      — *the name belongs to you, and you belong to the name. So
      it does not appear except within your limit, and it travels
      with your duration* — the doctrinal warrant for the
      *seven-day defer* on the *naming* of the initiate, applied
      to the *batin* re-birth by analogy with the *zahir*
      *ʿaqīqa* tradition (the legal day-seven naming ceremony of
      the newborn child) in *fiqh*"
    - >
      "The *highest transmission* veiled in the source's own
      voice — *matters upon which no fancy had ever descended,
      which no pen had ever traced, and which had never occurred
      to the heart of any human being — matters that are not to
      be mentioned in the assemblies of preachers, and that are
      not permitted in mosques* — the *innermost batin* the
      *da'wa* preserves under *taqiyya* (ta-KEE-yah, pious
      dissimulation) and reveals only to *His own people*"
    - >
      "The *Hajj-by-the-great-sign* sealing-figure — *he removed
      his ihram by glorifying the sanctities of Allah, took hold
      of the rope, circumambulated the ancient House, spent his
      rites in remembrance, and performed Hajj by the great
      sign* — the *batin* Hajj that the *zahir* Hajj at Mecca is
      *a sign of*; the *great sign* (*al-āya al-kubrā*) read in
      the *da'wa* tradition as the *Imam* himself"
    - >
      "The *root-watered-branch-raised* figure as a deliberate
      reversal of the chapter-three sower-figure (the Master's
      *the sower can prepare the land well, sow it, and water it
      — but he cannot bring out the plant and the leaves*); what
      the *Master* could not do *alone*, the *chain* has now
      done *together* — the Master *prepares*, the Shaykh
      *names* and *transmits*, the *attendance* raises the
      branch"
    - >
      "The *interpretation key* the elder scholar gives on the
      edge of the city — *whatever in it is praiseworthy is like
      the truth and its people … whatever was a reprehensible
      parable, I spent it upon the enemies of the truth and its
      people … these are the foundations of the science that
      works by them: if she preserves them, she has no need of
      any others* — the *master key* of the *zahir-batin* science
      as the *da'wa* reads it: the *binary rule* by which every
      parable in the book may be *interpreted* without further
      teaching"
    - >
      "The *plural-fathers* image at the chapter's close — the
      boy returns home *unable to return any utterance of his
      grief over the parting from his elder father and the
      father who had been the cause of his grace* (the *elder
      father* = the *greater Shaykh*; the *father who was the
      cause of his grace* = the *Master*), and *his father came
      to him, angry* (the *biological father*) — the *seam* into
      chapter five's *confrontation* and the revelation of the
      boy's name (*Salih*, SAA-lih) and the father's identity
      (*al-Bakhtari*, al-bakh-tah-REE)"
