show_notes:
  blurb: >
    The initiation chapter of *Kitab al-'Alim wa-l-Ghulam* (*The
    Book of the Master and the Boy*) — the chapter where the boy
    is *re-born* into the chain of the *da'wa* by a *seventh-day
    naming* at the hand of the *greater Shaykh*, receives the
    *highest transmission* (the innermost *batin* the source
    deliberately does *not* record), and is *sent* as a *caller*
    in his own right. After the chapter-three deferral on the
    *Imam's permission*, the Master goes to the boy's father with
    the report; the father marvels and instructs *make haste*. The
    Master returns and finds the boy in *a different state of body
    than the one he had left him in* — *yellowed* by longing in a
    deliberate echo of the chapter-three brethren *yellowed by the
    rigor of fasting*. The announcement comes: *I cast mercy upon
    you into the heart of the one who has charge of you. So take
    up your traveling provisions, for I have high hopes for you,
    and I will accompany you to the door of your goal*. The boy
    nearly dies of joy; *Allah took hold of him, knowing his
    condition; then He returned him*. They set out and reach the
    *greater Shaykh*. In the Shaykh's council the boy *turns
    yellow from the intensity of his awe and cannot speak*; the
    Shaykh recognizes him to the Master as *the boy we used to
    hear about*, and the boy learns that his story is studied in
    the *gatherings of remembrance* of the brethren themselves.
    The next morning the Shaykh delivers two sustained discourses:
    the *justice* of God as *the middle between two extremes*
    (with the figure of *spread-out hands* and the *evidence
    against ingratitude itself unlimited*), and the *dignity of
    minds* with the chain of rights — *thought → good manners →
    knowledge → action → obedience perfected in hardship and
    ease*. Then the chapter's central ritual: the *seventh-day
    naming*. The Shaykh asks the boy his name; the boy gives
    *Ubayd Allah, son of Abd Allah*; the Shaykh receives it as
    *your description*; the boy withdraws to *I am free, son of
    Abd Allah*; the Shaykh probes (*who freed you from a master
    until you became free?*); the boy gives the *manumission-by-
    five-shares* account (*this world possessed me, and I have
    handed it back to the One who called it*); the Shaykh
    tightens to the impossibility of self-naming; the boy *falls
    silent*. The Shaykh names the impasse — *how can a thing know
    that which has no name?* — and defers *until the completion
    of seven days*, *for the dignity of the newborn*, *the name
    belongs to you, and you belong to the name. So it does not
    appear except within your limit, and it travels with your
    duration*. On the seventh day the boy bathes, puts on his
    purest garments, relieves himself (*a sign of the good that
    was to come after it*), and goes out repeating *the day of
    Sa'd, and the guardian of Sa'd*. The Shaykh receives him with
    *the implements of his work already taken up* and delivers,
    in a veil the source itself never lifts, the *highest
    transmission*: *matters upon which no fancy had ever
    descended … not to be mentioned in the assemblies of
    preachers, and not permitted in mosques. These books are
    among the greatest of His bounties, and are unveiled only to
    His own people*. The moment is sealed in the
    Hajj-by-the-great-sign figure: *he removed his ihram by
    glorifying the sanctities of Allah, took hold of the rope,
    circumambulated the ancient House, spent his rites in
    remembrance, and performed Hajj by the great sign*. Then
    attendance — *the root was watered and the branch raised* —
    in deliberate reversal of the chapter-three sower-figure:
    what the Master alone could not do, the chain has now done
    together. Then the farewell. The boy praises the Shaykh as
    *the gate of the people of heaven and the ascent of the
    people of the earth*; the Shaykh blesses him in eight
    clauses, with the *method of the call* named directly; the
    Shaykh gives three reasons for parting (the next journey to
    *another country*, the family awaiting the boy's return, the
    *duty of fulfilling the right of this grace — to worship by
    it and to call others to it*); and the Shaykh enjoins the
    safeguarding of the father in five negatives (*do not clothe
    him in the garment of contempt, do not board him on the ships
    of harm, do not omit his name, do not become distracted from
    his remembrance, and do not deceive him in your city — for
    there is a sting at the very outset*). The scholar walks the
    boy back toward his city, and on the *edge of the city* gives
    the boy the *six qualities* and the *interpretation key* —
    *whatever in it is praiseworthy is like the truth and its
    people; whatever was a reprehensible parable, I spent it upon
    the enemies of the truth and its people … these are the
    foundations of the science that works by them: if she
    preserves them, she has no need of any others*. The final
    parting — *the boy's gasp at the mention of parting was such
    that he almost killed himself … then he kissed the scholar's
    feet and wiped their dust upon his face* — closes the chapter.
    The boy returns home with his heart *absent from him in fear*,
    unable to return any utterance of his grief over the parting
    from his *elder father and the father who had been the cause
    of his grace*. His family becomes afraid for him. *Then his
    father came to him, angry*. The chapter ends there. *The
    naming has happened; the name in the world will now happen.
    The chapter is the re-birth; the next chapter is the re-entry.*
