title: "The Greater Shaykh and the Seventh-Day Naming"
audience: >
  Thoughtful adult readers continuing the dialogue book of the Ismaili
  *da'wa* (DAH-wah — call, missionary apparatus) — *Kitab al-'Alim
  wa-l-Ghulam* (ki-TAAB al-AA-lim wal-ghu-LAAM, *The Book of the
  Master and the Boy*), attributed to Sayyidina Ja'far ibn Mansur
  al-Yaman (sai-yi-DEE-nah JAH-far ibn man-SOOR al-YAH-man) — after
  the cosmology of chapter two and the ethical-practical bridge of
  chapter three. Chapter three closed on a deferral: the boy had
  *enacted* the doctrine of the *fifth of the best* by laying his
  wealth in *five shares* in the Master's hands, had heard the *Imam*
  named for the first time only by his attributes (*the one whose
  right Allah has made binding upon every believer, in whose hand are
  the keys of the heavens, whose palms are opened with the light of
  Sinai*, SEE-nigh), and had asked to be taken *by the hand to the
  door of his chamber*. The Master had answered *this is your duty —
  but only with his permission and his decision*. This chapter is the
  *bringing* — but the *door* the boy is brought to first is not the
  Imam's door directly; it is the door of the *greater Shaykh*
  (SHAYKH), the elder of the chain in whose council the *naming*
  must happen before the *generous one* may be approached. The
  chapter walks the listener through the boy's weakening (his body
  *yellowed* by longing in a deliberate echo of the chapter-three
  *yellow* of the scholars who *refused to work the world even from
  what is not forbidden*); the Master's announcement *I cast mercy
  upon you into the heart of the one who has charge of you* (the
  permission cast into the father's heart that the boy in chapter
  one was forbidden to ask for directly) sealed with the formula
  whose dropped *ta'wīl* (/taʔˈwiːl/) chapter three gave (*la hawla
  wa la quwwata illa billah*); the journey with the father to the
  Shaykh's house; the boy *yellowed a second time* by *awe* in the
  council and *unable to speak*; the Shaykh's brotherly recognition
  of the Master (*Brother, is this the boy we used to hear about?*)
  and the disclosure that the boy's *story* is studied in the
  *gatherings of remembrance* of the brethren themselves; the
  Shaykh's morning discourse in two movements — the *justice* of God
  as *the middle between two extremes* (*He has not taken creation
  as a duty owed to Him, nor has He charged them with what they
  cannot bear in disbelief of His blessings; rather, the affair is
  set in the middle between two extremes — and this is what is
  called justice*) with the doctrine of *spread-out hands* (bounty
  for the grateful and ungrateful alike, the *evidence against
  ingratitude itself unlimited*); and the *dignity of minds* with
  the chain of *rights* — *thought → good manners → knowledge →
  action → obedience perfected in hardship and ease* — closed on
  *only the patient receive it, and only the truly fortunate
  receive it*. Then the chapter's central ritual: the *seventh-day
  naming*. The Shaykh asks the boy his name; the boy gives his
  birth-name (*Ubayd Allah, son of Abd Allah*, oo-BAYD ah-LAH, son
  of AB-d ah-LAH); the Shaykh receives it as *the description by
  which the report has reached us*; the boy withdraws (*I am free,
  son of Abd Allah*); the Shaykh probes the warrant (*who freed you
  from a master until you became free?*); the boy gives the
  doctrinal account (*this world possessed me, and I have handed it
  back to the One who called it* — the *manumission-by-five-shares*
  of chapter three); the Shaykh tightens (*if this one owns and that
  one is owned, is it permissible for you to claim otherwise?*); the
  boy admits the impossibility; the Shaykh asks *What, then, is your
  name?* and the boy *falls silent*. The Shaykh names the impasse
  (*how can a thing know that which has no name?*); the boy concedes
  (*I am newborn to you, and you nurture me*); the Shaykh defers
  *until the completion of seven days*, *for the dignity of the
  newborn*, *the name belongs to you, and you belong to the name. So
  it does not appear except within your limit, and it travels with
  your duration* — the *da'wa* doctrine of *coextensivity of name
  and named*. On the seventh day the boy *washes*, *puts on his
  purest garments*, *relieves himself* (the *bodily seal* of the
  *outward purification*, named in a rare first-person aside by the
  elder Master-as-narrator as *a sign of the good that was to come
  after it*), goes out repeating *the day of Sa'd (SAHD), and the
  guardian of Sa'd*, and is received by the Shaykh *with the
  implements of his work already taken up*. The Shaykh then brings
  the boy near and delivers, *in a veil the source itself never
  lifts*, the *highest transmission*: *matters upon which no fancy
  had ever descended, which no pen had ever traced, and which had
  never occurred to the heart of any human being — matters that are
  not to be mentioned in the assemblies of preachers, and that are
  not permitted in mosques. These books are among the greatest of
  His bounties, and are unveiled only to His own people*. The
  chapter does not record what was transmitted; the narrator names
  the *veiling* and moves on. The boy is *brought out of his
  bewilderments to the very end of guidance*, *the doctrine is
  explained*, *the draught is given*, and the moment is sealed in a
  string of Hajj-figures — *he removed his ihram* (ih-RAAM) *by
  glorifying the sanctities of Allah, took hold of the rope,
  circumambulated the ancient House, spent his rites in remembrance,
  and performed Hajj* (HAJ) *by the great sign* — the *batin* Hajj
  that the *zahir* Hajj at Mecca is a sign of. Then attendance, *the
  root watered and the branch raised* (in deliberate reversal of the
  chapter-three sower-figure: what the Master *alone* could not do —
  *bring out the plant* — the chain has now *done together*). Then
  the farewell: the boy's praise (*you are the gate of the people
  of heaven and the ascent of the people of the earth*); the
  Shaykh's blessing (*may He ennoble your station with the method of
  the call*, the *da'wa* named directly, the boy now sent as well as
  received); the Shaykh's three considerations for parting (the next
  journey to *another country*, the family awaiting the boy's
  return, the *duty of fulfilling the right of this grace — to
  worship by it and to call others to it*); the Shaykh's
  five-negatives enjoinder on the safeguarding of the father (*do
  not clothe him in the garment of contempt, do not board him on
  the ships of harm, do not omit his name, do not become distracted
  from his remembrance, and do not deceive him in your city — for
  there is a sting at the very outset*). Then the scholar (the
  Master who has brought the boy from chapter one) walks the boy
  back toward his city; on the *edge of the city* gives him the
  *six qualities* (*trust in Allah when you are resolved; speak with
  a ruling when you are called upon; do not grow angry when you are
  wronged; do not weary if you are slandered; whoever responds to
  you with good, be patient with him; and devote yourself to the
  best of those upon whom you call*) and the *interpretation key*
  for everything they have walked through together: *whatever in it
  is praiseworthy is like the truth and its people … whatever was a
  reprehensible parable, I spent it upon the enemies of the truth
  and its people … these are the foundations of the science that
  works by them: if she preserves them, she has no need of any
  others*. The boy's three needs (the fulfilled, the prayed-for,
  the asked-for) are met. The final parting — *the boy's gasp at
  the mention of parting was such that he almost killed himself …
  then he kissed the scholar's feet and wiped their dust upon his
  face* — closes the chapter. The boy returns to his house with his
  heart *absent from him in fear*; his family becomes *afraid for
  him*; and the chapter ends on the line *then his father came to
  him, angry*. The naming has happened; the return has begun; the
  father's anger is the seam into chapter five, where the boy's
  name in the world (*Salih*, SAA-lih) and the father's identity
  (*al-Bakhtari*) will be revealed.
angle: faithful_exposition
episode_format: deep_dive
format_rationale: >
  The chapter is a sustained primary-source narrative-with-doctrine
  in which one position is being developed (the *initiation-as-
  re-birth* doctrine of the *da'wa*: that the seeker, once he has
  *handed back* the world, must be *re-named* by the chain on the
  *seventh day* because *name and named are coextensive in limit
  and duration*, and that the *highest transmission* is delivered
  only after the *outward purification* and only under a *veil*
  the source itself honors). The dialogue is between the boy and
  the Shaykh (with the Master deferring, as the lesser of the two
  in the council, in disciplined chain-discipline) and runs from
  the Shaykh's two opening discourses (justice as middle between
  two extremes; the chain of rights from thought through
  obedience), through the seventh-day naming dialogue (the
  *Ubayd-Allah* / *free* / *silence* / *newborn* / *coextensivity-
  of-name-and-named* exchanges), through the veiled *highest
  transmission* sealed in Hajj-figures, through the eight-clause
  blessing and three-reasons farewell, to the scholar's six
  qualities and interpretation-key on the edge of the city. There
  are no two named opposing doctrinal voices being adjudicated;
  there is no *Islah* / *Nusra* split, no *fiqh*-school vs *da'wa*
  contention. The closing image is the father's anger, but the
  father does not voice an opposing doctrine in this chapter; he
  is the *unresolved seam* into chapter five. This is a deep-dive
  walk through the initiation-and-naming chapter, not a debate.
essential: core
essential_rationale: >
  This is the *initiation chapter* of the book — the chapter where
  the boy is *re-born* into the chain by the *greater Shaykh* on
  the *seventh day*, receives the *highest transmission* (the
  innermost *batin* the source deliberately does *not* record),
  performs the *batin* Hajj sealed in the figure of *taking hold of
  the rope* and *circumambulating the ancient House* and *Hajj by
  the great sign*, is *sent* as a *da'i* (*may He ennoble your
  station with the method of the call*), and is given the *master
  key* of the *zahir-batin* science (the *interpretation rule*
  that every praiseworthy parable points to the truth and its
  people, every reprehensible parable to its enemies). The
  doctrine of *coextensivity of name and named*, the figure of the
  *yellowing* that knits the boy into the brethren the Master
  wept over in chapter three, the *veiled transmission* whose
  veiling is *itself* the source's discipline, and the Hajj-by-the-
  great-sign sealing-figure are all signature *da'wa* moves the
  chapter cannot be cut without losing. The chapter also stages the
  *first plural-fathers moment* of the book — the boy returns home
  *unable to return any utterance of his grief over the parting
  from his elder father and the father who had been the cause of
  his grace*: the *elder father* is the Shaykh, the *father who
  was the cause of his grace* is the Master, and the *biological
  father* who walks into the room *angry* at the chapter's close
  is the third — the *seam* into chapter five's confrontation and
  the revelation of the boy's name as *Salih*.
host_dynamic: curious_mind + scholar_companion
host_dynamic_rationale: >
  The curious_mind voices the boy's questions across the chapter —
  the weakened-state exchange (*and what is it that you have
  noticed in me?*), the staggered recognition (*has the report of
  my story really reached the saints of Allah?*), the
  seventh-day-naming probes (*why seven days? and if the newborn
  dies before? is this the name by which you have named me? how
  can such a thing be said?*), the praise of the Shaykh (*you are
  the gate of the people of heaven and the ascent of the people of
  the earth*), the asking for his father to be sent with him on
  the return, the *three needs* before the final parting; the
  scholar_companion voices the Master's three doctrinal moments
  (*I cast mercy upon you into the heart of the one who has charge
  of you*, the chain-register answer *it has been promised, the
  one awaited is thirsty, and the term is near*, the
  six-qualities-and-interpretation-key teaching on the edge of the
  city), the Shaykh's two opening discourses (justice as middle
  between two extremes; the chain of rights), the seventh-day
  naming dialogue from the Shaykh's side (*how can a thing know
  that which has no name?* / *would you be like an idol, even
  though you have been born?* / *the name belongs to you, and you
  belong to the name*), the eight-clause blessing and three-
  reasons farewell, and the five-negatives enjoinder on the
  safeguarding of the father. The narrator's two interventions
  (the first-person *and this is what I commanded him to do, as a
  sign of the good that was to come after it*, and the veiled-
  transmission disclosure-and-non-disclosure of *matters upon
  which no fancy had ever descended*) are voiced in the
  scholar_companion register. No named third doctrinal voice
  appears in this chapter — the father is *present in absence* at
  the opening (marvelling, instructing *make haste*) and *present
  in anger* at the close, but does not voice a doctrinal position
  in this chapter.
length_target: extended
key_tensions:
  - >
    The chapter's central method is to walk the boy through a
    *re-birth* — a *second birth* into the chain of the *da'wa*
    that requires *the handing back of the world* (the
    five-share enactment of chapter three) as its *precondition*
    and the *seventh-day defer* as its *time-form*. The hosts
    must let the *naming dialogue* land *as a naming dialogue*,
    not as an *etymological puzzle*: the Shaykh is not playing
    word-games with the boy; he is *refusing to name a thing that
    has not yet been fully born*. The doctrine of *the name
    belongs to you, and you belong to the name. So it does not
    appear except within your limit, and it travels with your
    duration* is the *coextensivity-of-name-and-named* rule that
    requires *seven days* between *birth* and *name* — and the
    *seven days* themselves are not arbitrary: they echo the
    *zahir* *ʿaqīqa* tradition (the legal day-seven naming
    ceremony) but apply it to the *batin* re-birth of the
    initiate. Collapsing the dialogue into either *etymological
    cleverness* or *generic ritual* loses the chapter's force.
  - >
    The *highest transmission* in the middle of the chapter is
    the moment the source itself *veils* — *matters upon which no
    fancy had ever descended, which no pen had ever traced, and
    which had never occurred to the heart of any human being —
    matters that are not to be mentioned in the assemblies of
    preachers, and that are not permitted in mosques*. The hosts
    must *honor the veil*: they may name *what kind of matters
    these are* (the *yolk* of the egg-parable; the *rope of the
    rope of God*; the *batin-of-batin* the Master halted at) and
    *why* the source veils (the *taqiyya* of the *da'wa* under
    persecution; the *necessity* that what is unveiled to *His
    own people* not be recorded for *other hands*), but they may
    *not invent content* for the veiled passage or speculate
    about its specifics. The veil is doctrine, not omission. The
    Hajj-by-the-great-sign sealing-figure (*he removed his
    ihram by glorifying the sanctities of Allah, took hold of
    the rope, circumambulated the ancient House, spent his rites
    in remembrance, and performed Hajj by the great sign*) is
    the chapter's *signal* that the transmission has happened and
    has had its *batin* Hajj-effect; the hosts must let the
    figure work *as a signal*, not flatten it into a *summary of
    what was transmitted*.
  - >
    The chapter contains the book's *first plural-fathers* moment.
    The boy returns home *unable to return any utterance of his
    grief over the parting from his elder father and the father
    who had been the cause of his grace* — and then *his father
    came to him, angry*. The chapter is naming *three fathers* in
    a single closing image: the *elder father* is the *Shaykh*
    (the elder of the chain who has *named* him on the seventh
    day); the *father who was the cause of his grace* is the
    *Master* (the *cause* who first *called* him in chapter one
    and *named the generous one* in chapter three); and *his
    father* who walks in *angry* is the *biological father* whose
    *enmity toward the people of this matter* the Master named in
    chapter one and the scholar named again on the edge of the
    city. The hosts must let the *plural-fathers* moment land
    without flattening it: the boy is *now* the *spiritual son*
    of two fathers (the *elder father* and the *cause of his
    grace*) and the *biological son* of a third, and the *grief*
    of the parting from the first two and the *fear* of the
    coming confrontation with the third are *one and the same
    grief* in his body. The chapter ends on the *seam* into
    chapter five — the *confrontation* — and does not resolve it.
  - >
    The chapter pivots on a *Shaykh-Master discipline* that is
    itself doctrine. When the boy in the council asks the Master
    *teach me how to speak*, the Master answers *it is not for me
    to instruct you in this place. Out of respect for the master
    of this house, you are in the hands of one who knows your
    need*. The Master *defers* in the Shaykh's house. The
    *Shaykh* is the *cause* between the *Master* and the *one
    whose right is binding*; the *Master* does not *step over*
    the Shaykh. This is the *chain-discipline* that makes the
    chapter the *chapter of the seventh-day naming* and not
    merely the *chapter of the second teaching*. The hosts must
    let the discipline land: the Master is the *speaker* of
    chapters one through three, and is *not* the speaker of
    chapter four; the chapter belongs to the Shaykh, with the
    Master speaking only at the opening (announcement and
    journey), the lodging (the chain-register *promised /
    thirsty / near*), and the edge-of-the-city teaching (the six
    qualities and the interpretation key). The Master *is not
    silent* in the chapter — but he *is not the primary teacher*.
  - >
    The chapter's *closing image* — the boy's heart *absent from
    him in fear*, the family *afraid for him*, and *his father
    came to him, angry* — is the *structural seam* between this
    chapter and the next. The hosts must let the *seam* land *as
    the seam*: the chapter ends *open* on the father's anger; the
    chapter does *not* summarize what *follows* (the
    confrontation, the boy's name *Salih*, the father's identity
    *al-Bakhtari*, the gathering before Abu Malik, the visit to
    al-Bakhtari, the three faces of seeking); the *next* chapter
    is the *answer* to the father's anger, and the chapter four
    contract is to *end on the anger*. The hosts must not
    pre-empt chapter five.
tone_constraints:
  - >
    Walk the chapter in the order the source uses: (1) the boy's
    weakening and the Master's announcement (*I cast mercy upon
    you into the heart of the one who has charge of you*); (2)
    the journey to the greater Shaykh; (3) the council where the
    boy is *yellowed by awe* and *cannot speak*; (4) the
    brotherly recognition (*Brother, is this the boy we used to
    hear about?*) and the *gatherings of remembrance* disclosure;
    (5) the Shaykh's opening discourse on justice as the *middle
    between two extremes* and *spread-out hands*; (6) the
    Shaykh's second discourse on the *dignity of minds* and the
    *chain of rights* (thought → good manners → knowledge →
    action → obedience); (7) the seventh-day naming dialogue
    (*Ubayd Allah* → *free* → *silence* → *newborn* →
    *coextensivity-of-name-and-named*); (8) the seventh-day
    bathing, the *day of Sa'd* repetition, the *implements of
    his work* received; (9) the veiled *highest transmission*
    and the *Hajj-by-the-great-sign* sealing-figure; (10) the
    attendance and the *root watered, branch raised*; (11) the
    boy's praise of the Shaykh, the Shaykh's eight-clause
    blessing, and the three-reasons farewell; (12) the
    five-negatives enjoinder on the safeguarding of the father;
    (13) the scholar's six qualities and interpretation-key on
    the edge of the city; (14) the boy's three needs and the
    final parting (*the boy kissed the scholar's feet and wiped
    their dust upon his face*); (15) the return home, the heart
    absent in fear, the family afraid, and the father coming in
    *angry*. Do not collapse the narrative-and-doctrinal arc into
    a single summary — the chapter's force is in the *walk*
    through the layers in order, with the *naming* arriving only
    after the *handing-back* and the *transmission* arriving only
    after the *naming*.
  - >
    Verbatim moments must stay verbatim from the chapter file.
    The Master's announcement (*I cast mercy upon you into the
    heart of the one who has charge of you. So take up your
    traveling provisions, for I have high hopes for you, and I
    will accompany you to the door of your goal — and there is
    no power except by Allah*); the brotherly recognition
    (*Brother, is this the boy we used to hear about?* / *Yes —
    the one whose remembrance is sweet in the hearts of the
    believers*); the boy's response to being known (*You have
    surrounded me from every side and overtaken me from every
    direction. I do not know whom to thank, nor whom to repay*);
    the Shaykh's *middle-between-two-extremes* doxology in full;
    the *spread-out hands* passage in full; the chain of rights
    (*Is it not the right of thought to pay zakat to the hearts
    through good manners? And the right of good manners is to
    seek knowledge; and the right of knowledge is to be acted
    upon; and the right of action is that it be performed in
    purity, in obedience to the First; and the right of obedience
    is that it be perfected in both hardship and ease, in
    goodness and in trial — and only the patient receive it, and
    only the truly fortunate receive it*); the entire
    seventh-day naming dialogue (*Ubayd Allah, son of Abd Allah*
    → *That is your description, and your news has already been
    brought to us* → *I am free, son of Abd Allah* → *who freed
    you from a master until you became free?* → *this world
    possessed me, and I have handed it back to the One who
    called it* → *if this one owns and that one is owned, is it
    permissible for you to claim otherwise?* → *it is not
    permissible* → *What, then, is your name?* → *the boy fell
    silent* → *how can a thing know that which has no name?* →
    *I am newborn to you, and you nurture me* → *Then wait until
    the completion of seven days* → *Why has that been deferred
    until the completion of seven days?* → *For the dignity of
    the newborn* → *And if the newborn dies before the
    completion of the seven days?* → *Nothing harms him. He is
    named after that* → *Is this the name by which you have
    named me?* → *Would you be like an idol, even though you
    have been born?* → *How can such a thing be said of it?* →
    *The name belongs to you, and you belong to the name. So it
    does not appear except within your limit, and it travels
    with your duration*); the seventh-day bathing and the day-of-
    Sa'd repetition (*The day of Sa'd, and the guardian of Sa'd*);
    the veiled-transmission disclosure-and-non-disclosure passage
    in full (*matters upon which no fancy had ever descended,
    which no pen had ever traced, and which had never occurred
    to the heart of any human being — matters that are not to be
    mentioned in the assemblies of preachers, and that are not
    permitted in mosques. These books are among the greatest of
    His bounties, and are unveiled only to His own people*); the
    Hajj-by-the-great-sign sealing-figure in full (*he removed
    his ihram by glorifying the sanctities of Allah, took hold of
    the rope, circumambulated the ancient House, spent his rites
    in remembrance, and performed Hajj by the great sign*); the
    *root-watered-branch-raised* line; the boy's praise of the
    Shaykh in full; the Shaykh's eight-clause blessing in full
    (*may Allah bless you with what He has given you, help you
    to preserve what has come to you, employ you in fulfilling
    His will, light your path with the light of His guidance,
    expand your breast with the keys of wisdom, ennoble your
    station with the method of the call (daʿwa), complete His
    favor upon you with the modes of response, and grant you
    such instruction in obedience to Him that you may have the
    best hope of His good pleasure*); the three considerations
    for parting in full; the five-negatives enjoinder on the
    safeguarding of the father in full; the scholar's six
    qualities in full; the interpretation-key passage in full
    (*whatever in it is praiseworthy is like the truth and its
    people, the virtues of their virtuous, and its witnesses
    pointing to them. And whatever was a reprehensible parable,
    I spent it upon the enemies of the truth and its people …
    these are the foundations of the science that works by them:
    if she preserves them, she has no need of any others*); the
    three-needs framing and answers; the final parting (*the
    boy's gasp at the mention of parting was such that he almost
    killed himself … then he kissed the scholar's feet and wiped
    their dust upon his face*); and the closing line *then his
    father came to him, angry* — all stay verbatim with
    attribution.
  - >
    Use the Arabic-term phonetics on first chapter occurrence:
    *Kitab al-'Alim wa-l-Ghulam* (ki-TAAB al-AA-lim wal-ghu-LAAM),
    *Sayyidina Ja'far ibn Mansur al-Yaman* (sai-yi-DEE-nah JAH-far
    ibn man-SOOR al-YAH-man), *zakat* (za-KAAT), *Sinai*
    (SEE-nigh), *Shaykh* (SHAYKH), *da'wa* (DAH-wah), *Ubayd
    Allah* (oo-BAYD ah-LAH), *Abd Allah* (AB-d ah-LAH), *Sa'd*
    (SAHD), *ihram* (ih-RAAM), *Hajj* (HAJ), *zahir* (ZAA-hir),
    *batin* (BAA-tin), *ta'wīl* (/taʔˈwiːl/), *ḥawl* (/ħawl/),
    *quwwa* (/ˈquwːa/), *ḥujja* (/ˈħudʒːa/), *bāb* (/baːb/),
    *taqiyya* (ta-KEE-yah), *Salih* (SAA-lih, only in the closing
    seam-paragraph as the *next chapter*'s name, not as the boy's
    name in this chapter). Each phonetic appears once on its
    term's first chapter occurrence, per
    R-PRONUNCIATION-IMPERATIVE.
  - >
    The Prophet ﷺ honorific is spelled out on first per-chapter
    mention (*peace and blessings of Allah be upon him*) and
    contracted to ﷺ thereafter, per R-HONORIFIC-ONCE. In this
    chapter the Prophet is not directly named — the *highest
    transmission* is *veiled* and the *Hajj-by-the-great-sign*
    sealing-figure is in the *da'wa*'s own register, not in the
    *Prophet-figure* register. If the Prophet must be named
    obliquely (in the discussion of the *zahir ʿaqīqa* tradition
    the seventh-day defer echoes, for instance), use the spelled-
    out honorific on that first mention. No individual Imam is
    named in this chapter — the *generous one* of chapter three
    remains the *generous one* in this chapter, *un-named* by
    name, the *one whose right Allah has made binding upon every
    believer*. The phrase "Imam Ali" is FORBIDDEN per
    `imam-lineage-ismaili.yml`; the canonical Ismaili lineage
    runs Hassan as the first Imam, and "Father of Imams" is the
    only correct reference to ʿAlī ibn Abī Ṭālib if he must be
    named — but he is *not* named in this chapter.
  - >
    Names: the Master (the elder scholar who has brought the boy
    from chapter one through three) is *the Master*, *the
    scholar*, or *the elder scholar* (per the source's usage);
    the *greater Shaykh* (the elder of the chain in whose
    council the *naming* happens) is *the greater Shaykh*, *the
    Shaykh*, *the master of the house*, or *the lord of the
    house* (per the source's usage). The two must not be
    conflated — the chapter's whole structure depends on the
    Master *deferring* to the Shaykh in the Shaykh's house. The
    Boy is *the boy* or *the youth* (the source still does not
    name him in this chapter — the revelation *the boy's name
    was Salih* comes only in source chapter 5; do not retroject
    the name into the body of the chapter, only in the closing
    seam-paragraph as the *next chapter*'s announcement). The
    father is *his father* or *the father* in this chapter (his
    name *al-Bakhtari* is revealed only in source chapter 5; do
    not retroject). The *generous one* of chapter three is *not*
    re-named in this chapter; he is referred to as *the
    generous one* or *the one whose right is binding* or *the
    Imam* (in the gloss only, never in the source's voice).
  - >
    End on the father's anger — *then his father came to him,
    angry*. The chapter's closing image is the *unresolved seam*
    into chapter five. Do not summarize what *follows* (the
    confrontation, the boy's name *Salih*, the father's identity
    *al-Bakhtari*, the gathering before *Abu Malik*, the visit
    to *al-Bakhtari*, the *three faces of seeking* — all of
    these are chapter five's material). The chapter ends on the
    *anger*; the next chapter *answers* it. Close on the
    architectural register the closing paragraph of the chapter
    file uses: *the naming has happened; the name in the world
    will now happen. The chapter is the re-birth; the next
    chapter is the re-entry*.
anchor_passages:
  - >
    "The Master's announcement to the boy (the chapter's
    opening doctrine): *Allah has known what is in your heart,
    and so has made the affliction easy. I cast mercy upon you
    into the heart of the one who has charge of you. So take up
    your traveling provisions, for I have high hopes for you,
    and I will accompany you to the door of your goal — and
    there is no power except by Allah.*"
  - >
    "The brotherly recognition in the Shaykh's house (the
    moment the boy learns he has been known longer than he has
    known): *Brother, is this the boy we used to hear about?* /
    *Yes — the one whose remembrance is sweet in the hearts of
    the believers.* / *Has the report of my story really reached
    the saints of Allah, until they study it in their gatherings
    of remembrance?* / *Yes, my brother — that is how it is.* /
    *You have surrounded me from every side and overtaken me
    from every direction. I do not know whom to thank, nor whom
    to repay.*"
  - >
    "The Shaykh's opening discourse on justice as the middle
    between two extremes (the chapter's first doctrine): *He has
    not taken creation as a duty owed to Him, nor has He charged
    them with what they cannot bear in disbelief of His
    blessings. Rather, the affair is set in the middle between
    two extremes — and this is what is called justice. He has
    spread out His hands with goodness; He has not disappointed
    one who calls upon Him, nor turned away one who is silent …
    He has shielded His blessings from any sting of denial, and
    made His proofs against denial fully documented; and He has
    expanded over what exists, so that the evidence against
    ingratitude is itself unlimited, known yet not fully
    describable.*"
  - >
    "The Shaykh's chain of rights (the chapter's second
    doctrine): *Is it not the right of thought to pay zakat to
    the hearts through good manners? And the right of good
    manners is to seek knowledge; and the right of knowledge is
    to be acted upon; and the right of action is that it be
    performed in purity, in obedience to the First; and the
    right of obedience is that it be perfected in both hardship
    and ease, in goodness and in trial — and only the patient
    receive it, and only the truly fortunate receive it.*"
  - >
    "The seventh-day naming dialogue (the chapter's central
    ritual, in full): *O boy, I have honored you as an estranged
    friend, and I greet you as a visiting guest. So what is your
    name?* / *Ubayd Allah, son of Abd Allah.* / *That is your
    description, and your news has already been brought to us.* /
    *I am free, son of Abd Allah.* / *And who freed you from a
    master until you became free?* / *This world possessed me,
    and I have handed it back to the One who called it.* / *I
    have understood. If this one owns and that one is owned, is
    it permissible for you to claim otherwise?* / *It is not
    permissible.* / *What, then, is your name?* / [silence] /
    *O boy, how can a thing know that which has no name?* / *I
    am newborn to you, and you nurture me.* / *Then wait until
    the completion of seven days.* / *Why has that been deferred
    until the completion of seven days?* / *For the dignity of
    the newborn.* / *And if the newborn dies before the
    completion of the seven days?* / *Nothing harms him. He is
    named after that.* / *Is this the name by which you have
    named me?* / *Would you be like an idol, even though you
    have been born?* / *How can such a thing be said of it?* /
    *The name belongs to you, and you belong to the name. So it
    does not appear except within your limit, and it travels
    with your duration.*"
  - >
    "The seventh-day bathing and the day-of-Sa'd repetition (the
    chapter's quiet liturgical detail): *When the boy attended
    to that, his heart felt the need to relieve himself on that
    day — and this is what I commanded him to do, as a sign of
    the good that was to come after it. … The boy went out
    saying, 'The day of Sa'd, and the guardian of Sa'd,'
    repeating it again and again — and nothing drove him to
    this saying except the abundance of his joy and the intensity
    of his longing to know what would bring him closer to the
    pleasure of Allah.*"
  - >
    "The veiled highest transmission (the chapter's central
    moment, deliberately un-recorded): *He began to speak of
    matters upon which no fancy had ever descended, which no pen
    had ever traced, and which had never occurred to the heart
    of any human being — matters that are not to be mentioned
    in the assemblies of preachers, and that are not permitted
    in mosques. These books are among the greatest of His
    bounties, and are unveiled only to His own people.*"
  - >
    "The Hajj-by-the-great-sign sealing-figure (the chapter's
    *signal* that the transmission has happened): *he removed
    his ihram by glorifying the sanctities of Allah, took hold
    of the rope, circumambulated the ancient House, spent his
    rites in remembrance, and performed Hajj by the great sign.*"
  - >
    "The Shaykh's eight-clause blessing (the chapter's most
    sustained benediction, with the *da'wa* named directly): *As
    for you, may Allah bless you with what He has given you,
    help you to preserve what has come to you, employ you in
    fulfilling His will, light your path with the light of His
    guidance, expand your breast with the keys of wisdom,
    ennoble your station with the method of the call (daʿwa),
    complete His favor upon you with the modes of response, and
    grant you such instruction in obedience to Him that you may
    have the best hope of His good pleasure.*"
  - >
    "The Shaykh's three considerations for parting and the
    five-negatives enjoinder on the safeguarding of the father:
    *we are traveling to another country; your separation from
    your family for all this time; and the duty of fulfilling
    the right of this grace that has reached you, for it is
    incumbent upon you to worship by it and to call others to
    it.* / *Do not clothe him in the garment of contempt, do
    not board him on the ships of harm, do not omit his name,
    do not become distracted from his remembrance, and do not
    deceive him in your city — for there is a sting at the very
    outset.*"
  - >
    "The scholar's six qualities and interpretation-key on the
    edge of the city (the chapter's parting teaching): *I commend
    to you six qualities: trust in Allah when you are resolved;
    speak with a ruling when you are called upon; do not grow
    angry when you are wronged; do not weary if you are
    slandered; whoever responds to you with good, be patient
    with him; and devote yourself to the best of those upon whom
    you call.* / *Whatever in it is praiseworthy is like the
    truth and its people — the virtues of their virtuous, and
    its witnesses pointing to them. And whatever was a
    reprehensible parable, I spent it upon the enemies of the
    truth and its people, and its evidence points to them.
    These are the foundations of the science that works by them:
    if she preserves them, she has no need of any others.*"
  - >
    "The closing image and the seam into the next chapter: *The
    boy returned to his house, his heart absent from him in
    fear, and unable to return any utterance of his grief over
    the parting from his elder father and the father who had
    been the cause of his grace, until his family and his
    neighbors became afraid for him. He spent his day and night
    agitated with sorrow and alarm. Then his father came to
    him, angry.*"
