  references:
    - "Qur'an 24:35 (the Light Verse — Light upon Light) — the scriptural anchor for the continuity al-Nusra defends"
    - "Qur'an 42:11 (laysa ka-mithlihi shay' — there is nothing like unto Him) — the scriptural anchor for the unlikeness al-Islah defends"
    - "Qur'an 38:72 (min ruhi — of My spirit, breathed into Adam) — the grammar of trace, of derivative-from-the-source"
    - "Qur'an 35:15 (you are those in need of Allah, while Allah is the Free of need) — the asymmetry that is the architecture"
    - "Nahj al-Balagha, Sermon 1 (Imam Ali AS) — without anything resembling Him as a model; the perfection of believing in Oneness is to negate attributes"
    - "Nahj al-Balagha, on the attributes of God (Imam Ali AS, paraphrased) — the knowers recognize the One who recognizes nothing in His likeness"
    - "Rahat al-'Aql (al-Kirmani) — pointed to twice, as the master text where emanation at the lower proportion is fully argued"
    - "al-Sahifa al-Sajjadiyya (Imam Zayn al-'Abidin AS, paraphrased) — the niche-and-lamp prayer; the three-step chain of unlikeness and being-from named in worship"
