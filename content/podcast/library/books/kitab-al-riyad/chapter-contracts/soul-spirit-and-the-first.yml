title: Soul, Spirit, and the First
audience: Listeners who have followed the dispute through Bāb 1 (Episodes 1–3) and Bāb 2 (Episode 4) and now want to see al-Kirmani turn the question of resemblance itself into a metaphysical instrument — testing the predicate of "born from" stratum by stratum and showing where it properly applies, where it fails, and what other predicates (trace, effect, emanation-at-the-lower-proportion) take its place.
