show_notes:
  blurb: "Across the six fusūl of Bāb 3, al-Kirmani turns the dispute over whether soul and nature 'resemble' the First into a precise instrument of theological discrimination. Al-Islah's picture of two sealed worlds — light above, dark below, no link — would break the chain of emanation entirely. Al-Nusra's continuous-gradient picture, with the soul having 'two sides' and nature 'two ends,' smuggles natural-world geometry into the non-corporeal Second. Al-Kirmani's corrective: resemblance is a load-bearing predicate only at the top of the chain (between the First and the Second, the noble dyad of counterparts); below the dyad, the right language is *emanation at the lower proportion*, the language of *trace* and *effect*. Al-Hayuli is unlike the Second not by distance but by proportion — what issues from the Second's effect-aspect rather than its cause-aspect. The Second has no deficiency; what looked like decrease is the feature of being-received-from. Al-Nusra's lyrical image of nature as the soul's incomplete telling of the splendor it saw above is kept, not refuted. The bāb closes on the prayer-architecture of the family: the chain of unlikeness and the chain of being-from are the same chain named twice — to receive without claiming, to be of without being like."
