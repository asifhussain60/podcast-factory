length_target: extended
key_tensions:
  - "Resemblance is a load-bearing predicate at the top of the originative chain (between the First and the Second, the noble dyad of counterparts) and collapses into category error one stratum down. The whole bāb is the discriminating reader's training in when to use the predicate and when to fall silent on it."
  - "Al-Islah's picture of two sealed worlds (the light world and the dark world, with no overlap) breaks the chain of emanation entirely. Al-Nusra's picture of a continuous light-to-dark gradient through 'two sides' of the soul and 'two ends' of nature, however, smuggles natural-world geometry (sides, diameters, area) into the non-corporeal Second. Both are wrong, and both are reaching for something true."
  - "Al-Kirmani's corrective move is the language of *proportions*: the Second is one essence standing in two proportions (cause to what is below, effect to what is above). From the cause-proportion comes its like; from the effect-proportion taken at the lower proportion comes al-Hayuli, the dark trace. The geometry of 'two sides' is replaced by a logic of two relations the same essence stands in."
  - "Al-Hayuli is not far from the First by distance; it is unlike the First by *proportion*. Distance is the wrong predicate; proportion is the right one. The dark trace is not the outermost ring of a concentric cosmos but the receding side of the very thing most directly related to the First — what comes from the Second's effect-aspect rather than its cause-aspect."
  - "There is no deficiency in the Second. What al-Nusra called 'decrease' is not subtraction of essence but a feature of being-received-from. Perfection at the second rank is not less perfection than perfection at the first rank; it is a different mode of the same predicate. The Second is perfect as caused-and-cause."
  - "Al-Nusra's lyrical image — nature as the soul's incomplete telling of the splendor it saw above — is kept, not refuted. Al-Kirmani's correction is not the philosopher's victory over the poet; it is the philosopher's care for the poet, making sure the image does not, when pressed for metaphysical work, claim more than it can sustain."
  - "The whole architecture is in service of *tawhid*: 'There is nothing like unto Him' (Qur'an 42:11) is honored absolutely at the top, but the Light Verse's chain of luminous transmission ('Light upon light,' Qur'an 24:35) is honored just as absolutely by the unbroken chain of trace-emanation that runs all the way down. The bāb refuses to choose between the two pictures and instead teaches how to hold both."
tone_constraints:
  - The bāb is short (the slimmest in the treatise) but its work is the most delicate of any so far. The hosts should slow down for the proportion-vs-distance move in fasl 4 and for the geometry-of-sides argument in fasl 3 — these are the densest moments and the easiest places for the listener to slip.
  - Hold the gravity of the resemblance question. This is not a technical philosophical exercise; it is the architecture by which *tawhid* (the affirmation of God's Oneness) is protected one stratum below the divine itself. The discriminating reader is being trained for a habit that has theological weight, not just speculative interest.
  - The honorifics for the Prophet ﷺ, the Imams (peace be upon them), and the prophets (peace be upon them) are expanded on first occurrence per Phase 0c rules; subsequent mentions use the contracted form.
  - The Qur'anic verses are quoted verbatim from Saheeh International on first citation; thereafter the translator is implied.
  - Al-Kirmani's tone toward al-Islah and al-Nusra is unfailingly generous even when correcting them — the hosts should match that tone. The bāb is teaching by discrimination, not by victory.
  - The lyrical fasl (fasl 6, on nature as the soul's incomplete story) is the bāb's most moving moment. The hosts should let it land and only afterwards mark the metaphysical restriction al-Kirmani places on it.
  - Do not turn the dispute into a competition between al-Islah and al-Nusra. Each of them was reaching for a real piece of the truth; al-Kirmani is making both pieces fit together.
anchor_passages:
  - "We do not say that nature and darkness are born of the Second in the way that the Second is born of the First, because that world is the world of nobility and virtue, while this world is the world of darkness. — author of al-Islah"
  - "This statement is wrong. If that world were light with no darkness in it, and this world were dark with no light in it, then there would be no link between this world and that. — author of al-Nusra"
  - "The First and the Second are two counterparts, the very source of honor, perfection, and elevation. There is no honor above them; God has made them the source of perfect honor, of perfect light, of perfect elevation, and of perfect knowledge. — al-Kirmani"
  - "Al-Hayuli is not similar to the Second, nor to the First, for its existence is by way of emanation from the First, at the lower proportion that we have shown in our previous words and in our well-known book Rahat al-'Aql. — al-Kirmani's closing of fasl 1"
  - "The effect is a cause in addition to what is below it… it is a cause that emanates something like itself, since the cause has its like as its effect. And from its own intellect — in that it is malaisa (non-being) — it emits what is not like itself, by being an emission from the lower proportion within the First, namely the proportion of being effect. — al-Kirmani, fasl 3"
  - "There is no deficiency in the Second. What he called 'deficiency,' as we have mentioned, is not that it is far from the First, but that it is like it; and the decrease is necessary, not in its very nature, but it became incomplete — not from the side of its own self, which is perfection, but it became incomplete from a side in which the Second's perfection is acquired through its receiving benefit. — al-Kirmani, fasl 5"
  - "If nature were not born of the soul, the soul could not tell of beauty, comeliness, and adornment at all; but in order for nature to be generated from the soul, the soul tells what it saw in its world of beauty and honor as an incomplete story — a story without completing the soul. — author of al-Nusra, fasl 6"
