key_tensions:
  - >
    The chapter's opening doctrinal claim — *whoever says that the beginning
    of the speaker-prophets had no Shariʿah is mistaken* — runs against the
    intuitive reading of *Surat al-Maʾida* on the *son who did not know how
    to bury*. Al-Nusra makes the intuitive case look like exegesis; al-Islah
    refuses it on the *apparent meaning* of the *qurban* verse plus the
    *universally affirmative* verses. Al-Kirmani's first move is to refuse
    al-Nusra's *premise* — that the *qurban* verse must be read on *batini*
    interpretation *alone*. The *apparent* and the *batini* readings stand
    side by side; the *apparent* reading is *itself* sufficient to settle
    the question. The hosts must walk this *two-layer* logic of *Chapter
    Seven* (the *two worships* as *body and spirit of the religion*)
    forward into the *qurban-and-raven* story without collapsing one layer
    into the other.
  - >
    The deepest *ta'wil* of the chapter — *the two sons of Adam* as *wali*
    (wa-lee — guardian) and *opposite* (al-mukhalif — al-mu-khaa-lif), the
    *raven* as *Muhammad ibn Abi Bakr* (mu-ham-mad ibn a-bee bakr) sent by
    *Ali ibn Abi Talib* (a-lee ibn a-bee taa-lib, peace be upon him) to
    recall the opponent to the wali's rank — is the *daʿwa*-theological
    layer that *carries both readings forward at once*. The apparent
    *qurban* settles the Shariʿah-rank; the *batini* reading of *the two
    sons* settles the *daʿwa*-architectural layer that al-Nusra had
    pressed. The hosts must let this *historical-type* reading land
    without sanitizing it as merely *symbolic* — al-Kirmani names
    Muhammad ibn Abi Bakr by name, and the reading is *not* incidental
    to the doctrine.
  - >
    The chapter's anthropological centerpiece is sub-chapter fifteen — the
    *three souls* (rational, irascible, lustful) and the *six gates of
    necessity* (retribution, marriage, inheritance, the ordinance for the
    absent and the dead, the extraction of rights, the disposition of the
    dead). The Shariʿah is *not* contingent on prior violation; it is
    *constitutive* of *human-being-as-such*. The argument is general:
    wherever human beings are, the six gates are needed. Adam was a human
    being; therefore Adam's time had the six gates; therefore Adam's
    Shariʿah is established by the very *anthropology of the human being*
    al-Kirmani's *Masabih fi al-Imama* (al-ma-saa-beeh fi al-i-maa-mah —
    *Lamps on the Imamate*) lays out. The hosts must let this
    *anthropology-side* argument land as the chapter's *deepest* defense —
    not as an ornamental sub-chapter alongside the textual ones.
  - >
    The verse of *Shariʿah* in Quran 42:13 names Noah, Abraham, Moses,
    Jesus, and Muhammad ﷺ. It does *not* name Adam. Al-Nusra reads this
    *silence* as a *roster*. Al-Kirmani refuses the *roster reading* on
    two registers: (a) the verses naming Adam as the *Caliph on the earth*
    (Quran 2:30) and the recipient of the *teaching of all the names*
    (Quran 2:31–33) are *themselves* the verses of *Adam's Shariʿah-rank*,
    *greater than mere sending* because *the act of teaching is the
    foundational act of every Shariʿah*; (b) the parallel roster of Quran
    4:163 (Noah, Abraham, Ishmael, Isaac, Jacob, the tribes, Jesus, Job,
    Jonah, Aaron, Solomon) also *omits* Adam — and *no one* claims Adam
    was not a recipient of revelation. The hosts must hold both registers
    at once: Adam *is mentioned* in the Qur'an, and Adam is *omitted*
    from this particular *roster* the same way he is *omitted* from
    *that other roster*. Neither omission is decisive.
  - >
    The angels' prostration to Adam (Quran 2:34) is the chapter's strongest
    *positive* evidence for Adam's *Mustafa* (mus-ta-faa — Chosen) rank.
    Al-Nusra reads the verse as showing Adam was prostrated-*to*, not
    that command came *through* him. Al-Kirmani turns the objection: a
    *Mustafa* is *that-through-whom* command issues; Allah does not
    command the angels *bypassing* the *Mustafa*; therefore the
    prostration *itself* is an act of *Shariʿah*-bound obligation issued
    *through* Adam's Mustafa-rank. And the parallel to the Children of
    Israel (Quran 2:40–43, where Allah commands them *without naming an
    intermediary* but the *daʿwa*'s settled doctrine says the command
    was conveyed *through* Muhammad ﷺ) seals the form. The hosts must
    let this *Mustafa-as-commanding-rank* doctrine land as the chapter's
    *positive* settlement on the angels-side.
tone_constraints:
  - >
    Walk the nineteen sub-chapters in consolidated order. Sub-chapters one
    and two open the *qurban* dispute and land al-Kirmani's first verdict
    (apparent and batini stand side by side). Sub-chapters three and four
    work the *manifest-duty* and *call-requires-something-to-call-to*
    arguments. Sub-chapters five and six surface the deep *ta'wil* of *the
    two sons* as *wali* and *opposite*, and *the raven* as *Muhammad ibn
    Abi Bakr*. Sub-chapters seven and eight work the *narrative tradition*
    and the *ranked disposition of the dead*. Sub-chapters nine and ten
    work the *prostration of the angels* and the *parallel verse to Israel*.
    Sub-chapter eleven distinguishes the *natural-world angels* (who bear
    assignment) from the *abode-of-eternity high limits* (who do not).
    Sub-chapter twelve refuses the *silent God-commands-you* objection.
    Sub-chapter thirteen refuses the *roster argument* of Quran 42:13 by
    the parallel roster of Quran 4:163. Sub-chapter fourteen settles the
    *real reason* for the necessity of a Shariʿah, with the reference to
    *al-Masabih fi al-Imama*. Sub-chapter fifteen unfolds the *three
    souls and six gates* anthropology. Sub-chapter sixteen works the
    *pre-Adamic peoples* and *Adam's sending as positive worship*.
    Sub-chapter seventeen lands the *Noah-parallel* (violation
    presupposes prior limits). Sub-chapter eighteen surfaces the *tent
    at the qibla* and Seth as *first asas*. Sub-chapter nineteen refuses
    the *bare-world-sufficient-for-tawhid* doctrine that would eliminate
    *the sending of the messengers* and may not even be a *genuine
    al-Nusra* doctrine (planted by adversaries in the copy). Do not
    collapse the nineteen sub-chapters into one thesis. The accumulation
    is the chapter's argumentative force.
  - >
    When al-Kirmani sides with *al-Islah*, name it — the *qurban* verse
    on its *apparent* reading (sub-chapters one through four), the
    *narrative tradition* of the *tent at the qibla* and Seth as *first
    asas* (sub-chapter eighteen), the *three souls and six gates*
    anthropology (sub-chapter fifteen). When al-Kirmani *expands* on
    *al-Islah*'s argument (the *ta'wil* of *the two sons* as *wali* and
    *opposite* with Muhammad ibn Abi Bakr as the *raven*, the parallel
    of *the prostration of the angels* and *the verse to Israel*, the
    *parallel roster* of Quran 4:163), name *that* too. When he
    suspects *adversary-planted* doctrine in *al-Nusra*'s copy
    (sub-chapter nineteen), name that as well. The chapter is a
    *patient, point-by-point adjudication* — not a polemic.
  - >
    The Quranic verses Q 5:27 (*the news of the two sons of Adam... when
    they offered a sacrifice*), Q 22:34 (*And for every nation We have
    appointed a rite*), Q 2:213 (*The people were one nation, so Allah
    sent the Prophets as bearers of good tidings and warners*), Q 5:30–31
    (*Allah sent a raven... He said: "Woe to me!"*), Q 3:33 (*Allah has
    chosen Adam and Noah*), Q 2:30 (*I am going to place a caliph on
    the earth*), Q 2:31–33 (*And Adam knew all the names... O Adam,
    inform them of their names*), Q 2:40–43 (*O Children of Israel,
    remember My grace... Establish the prayer, give the zakat, and bow
    with those who bow*), Q 4:163 (*We have revealed to you as We
    revealed to Noah and the prophets after him*), Q 42:13 (*He has
    prescribed for you of the religion that which He enjoined upon
    Noah*), and Q 71:23 (the idols Wadd, Suwa', Yaghuth, Ya'uq, Nasr)
    stay verbatim with attribution. Al-Kirmani's own settled formulas —
    *the Shariʿah of Adam is fixed*; *the qurban is one of the laws, and
    it is the most established of the reasons of the Shariʿah*; *both
    the opponent and the guardian believe that in the worship of Allah
    Almighty there is something which is His sacrifice*; *He is the man
    who was sent by the guardian of God for that purpose — Muhammad ibn
    Abi Bakr*; *the closest thing to the need of the people is first
    their reliance, in their survival, on what guards them against
    destruction*; *human beings have three souls*; *these are six gates
    through which the categories of necessity run*; *Adam was free,
    however, of the ordinances that fall under the genus of worship in
    drawing nearer to Allah Almighty* — stay verbatim from the chapter
    file. Imam al-Mu'izz li-Din Allah Ma'add ibn Isma'il (peace be upon
    him)'s formulation from *Ta'wil al-Shari'a* (ta-weel ash-sha-ree-ah)
    on the *Shariʿah as the architecture by which the soul... is made
    fit for the worship of Allah* stays verbatim with attribution. The
    aphorism attributed to Imam Ali ibn Abi Talib (peace be upon him)
    in the *daʿwa* tradition of *Nahj al-Balagha* (nahj al-ba-laa-ghah)
    on *the chain at the head of human history* stays verbatim with
    attribution.
  - >
    The Prophet ﷺ honorific is spelled out on first per-chapter mention
    (*peace and blessings of Allah be upon him*) and contracted to ﷺ
    thereafter, per R-HONORIFIC-ONCE. Adam, Noah, Seth, Moses, Jesus,
    Ali (the Commander of the Believers), and Imam al-Mu'izz each take
    (peace be upon him) at first mention. The opening repetitions
    inside source-attributed quotation blocks are honored as quoted
    material — they do not count against the R-HONORIFIC-ONCE budget.
  - >
    When the chapter references al-Kirmani's own treatises (*al-Masabih
    fi al-Imama* — *Lamps on the Imamate*), treat the reference as a
    real pointer — say what the treatise contains and why *Chapter
    Nine*'s sub-chapter fourteen sends the reader there (the
    architecture of the *necessity of the Shariʿah* on the human
    side — the *three souls* and the *six gates of necessity* that
    follow from them).
  - >
    The Arabic terms *Shariʿah* (sha-ree-ah), *natiq* (naa-tiq), *asas*
    (a-saas), *qurban* (qur-baan), *nusuk* (nu-suk), *mansak* (man-sak),
    *al-mukhalif* (al-mu-khaa-lif), *wali* (wa-lee), *al-Islah*
    (al-is-laah), *al-Nusra* (an-nus-rah), *al-Mustafa* (al-mus-ta-faa),
    *zahir* (thaa-hir), *batin* (baa-tin), *ta'wil* (ta-weel), *daʿwa*
    (daa-wah), *du'at* (daa-eet), *tawhid* (taw-heed), *Qa'im*
    (qaa-im), *qibla* (qib-lah), *sajda* (saj-dah), *ruku'* (ru-koo),
    *zakat* (za-kaat), *qisas* (qi-saas), *jihad* (ji-haad), *hudud*
    (hu-dood), *hujjah* (huj-jah), *al-Jadd* (al-jadd), *al-Fath*
    (al-fath), *al-Khayal* (kha-yaal), *Wadd* (wadd), *Suwa* (su-waa),
    *Yaghuth* (ya-ghooth), *Ya'uq* (ya-ooq), *Nasr* (nasr), *Nuh*
    (nooh), *Ali* (a-lee), *Musa* (moo-saa), *'Isa* (ee-saa),
    *al-Masabih fi al-Imama* (al-ma-saa-beeh fi al-i-maa-mah), and
    *Ta'wil al-Shari'a* (ta-weel ash-sha-ree-ah) each carry their
    phonetic guide at first chapter appearance, per
    R-PRONUNCIATION-IMPERATIVE.
  - >
    End on the cumulative verdict and the bridge to the second half of
    the chapter. The architecture standing: *Adam had a Shariʿah*, by
    the manifest evidence of the Qur'an, the narrative tradition of
    *Adam's tent at the qibla* and Seth as *first asas*, the
    anthropology of the *three souls and six gates of necessity*
    constitutive of *human-being-as-such*, and the internal coherence
    of the *daʿwa*'s doctrine of cycles. The *second half* of *Chapter
    Nine* — sub-chapters twenty through thirty-three — will work the
    *prophets-as-teachers* doctrine, the *monotheism-and-the-ranks*
    architecture, the *seven-lines-and-six-aradas* dispute, and the
    *wilayah of Noah*. Do not flatten the closing into a "what we
    learned" summary.
anchor_passages:
  - >
    "Al-Islah's opening doctrinal claim (sub-chapter one): *Whoever
    claims that the beginning of the speaker-prophets (peace be upon
    them) had no Shariʿah is mistaken. He is also mistaken when he
    counts them among those who are 'determined' (mutimmun), because
    determination occurs only by copying the Shariʿah or by renewing
    it — and the first Pronouncer had no Shariʿah preceding him to
    abrogate, so the name of determination does not apply to him.*"
  - >
    "Al-Kirmani's *ta'wil* of the two sons and the raven (sub-chapters
    five and six): *He is the man who was sent by the guardian of God
    for that purpose — Muhammad ibn Abi Bakr — for he is among those
    who are specially related to the guardianship from the side of
    religion, and to the opponent from the side of lineage. So
    Muhammad did what he was sent for, so that the opponent might be
    alerted to his crime, and led to abide by his mandate.*"
  - >
    "Al-Kirmani's parallel of Adam-and-Israel (sub-chapter ten): *If
    the verse appears in a form that does not indicate the presence
    of an intermediary, then by means of Muhammad it was nevertheless
    conveyed to them; and if it is possible to say that Muhammad is
    not the bearer of a law on this account, then the verse — which
    mentions Allah's command to the Children of Israel — likewise
    indicates that the command came by means of him. For if the two
    verses were placed in the chapter of being non-indicative of a
    single authentic intermediary, this would be impossible.*"
  - >
    "Al-Kirmani on the three souls (sub-chapter fifteen): *Human
    beings have three souls: the rational soul, which has
    discrimination and thought — it knows that it has a Creator and
    naturally submits to Him, and from this draws near to Him... Then
    there is the irascible soul that he possesses, by which he is
    angered when he is angered, and which loves to subdue, conquer,
    take revenge, oppress, kill, and deceive... And lust — from which
    he seeks refuge and seeks marriage as a necessity.*"
  - >
    "Al-Kirmani on the six gates (sub-chapter fifteen): *These are six
    gates through which the categories of necessity run, beneath which
    lie the kinds whose existence is necessary among human beings
    without fail. As for what is not necessary, and is at one time
    more and at another less, these are the duties of worshipping
    Allah, may He be exalted, and drawing closer to Him through
    knowing His limits, by which perfection is attained.*"
  - >
    "Al-Kirmani's Noah-parallel (sub-chapter seventeen): *This
    statement does not entail that Adam must have no law; rather, he
    too must have duties and a Shariʿah. For it has been established
    as obligatory that the role of violating the limits and following
    opposites — and violation only falls to one who follows another
    by abandoning his command and his ordinance.*"
  - >
    "Al-Islah on the tent at the qibla (sub-chapter eighteen): *Allah
    Almighty commanded Adam (peace be upon him) to set up a tent. He
    brought it down from Paradise and made it his qibla and the qibla
    of his son. Then Seth built a place after him — the Shariʿah, its
    wisdom, the collection of revelation and interpretation therein,
    the establishment of its branches and origins, and the
    arbitration of its obligations.*"
  - >
    "Al-Kirmani on the bare-world doctrine (sub-chapter nineteen): *In
    sum, the claim that leads to the disruption of the degrees of the
    limits is a statement neither from our belief nor from the
    doctrine of our loyalists, may Allah's peace and blessings be
    upon them. Perhaps this statement has been planted by adversaries
    in the book so it might be attributed to the author of the
    book — and Allah knows best.*"
  - >
    "Quran 5:27 (*Surat al-Maʾida*): *And recite to them the news of
    the two sons of Adam in truth, when they offered a sacrifice —
    and it was accepted from one of them and not accepted from the
    other.* — the anchor verse for sub-chapters one through six."
  - >
    "Quran 22:34 (*Surat al-Hajj*): *And for every nation We have
    appointed a rite, that they may pronounce the name of Allah over
    what He has provided them of cattle.* — al-Islah's universally
    affirmative verse in sub-chapters one and two."
  - >
    "Quran 2:213 (*Surat al-Baqara*): *Mankind was one nation, so
    Allah sent the Prophets as bearers of good tidings and warners,
    and He sent down the Book with them in truth, to judge between
    people in matters wherein they differed.* — the anchor verse for
    sub-chapter four (Adam-as-teacher-and-guide)."
  - >
    "Quran 3:33 (*Surat Aal 'Imran*): *Allah has chosen Adam and
    Noah.* — surfaced in sub-chapter nine for Adam's Mustafa-rank."
  - >
    "Quran 2:30, 2:31–33 (*Surat al-Baqara*): *I am going to place a
    caliph on the earth... And Adam knew all the names, then He
    showed them to the angels... O Adam, inform them of their names.*
    — surfaced in sub-chapter thirteen as the verses *greater than
    mere sending* that establish Adam's Shariʿah-rank."
  - >
    "Quran 2:40–43 (*Surat al-Baqara*): *O Children of Israel,
    remember My grace... Establish the prayer, give the zakat, and
    bow with those who bow.* — the parallel verse to Israel
    surfaced in sub-chapter ten as evidence that *silent
    intermediaries* are not *no intermediaries*."
  - >
    "Quran 42:13 (*Surat al-Shura*): *He has prescribed for you of
    the religion that which He enjoined upon Noah, and that which We
    have revealed to you, and that which We enjoined upon Abraham,
    Moses, and Jesus — to establish the religion and not be divided
    therein.* — the verse al-Nusra reads as a *roster* in
    sub-chapter thirteen, refuted by al-Kirmani via Quran 4:163."
  - >
    "Quran 4:163 (*Surat al-Nisa*): *We have revealed to you as We
    revealed to Noah and the prophets after him, and We revealed to
    Abraham, Ishmael, Isaac, Jacob, the tribes, Jesus, Job, Jonah,
    Aaron, and Solomon.* — the parallel roster surfaced in
    sub-chapter thirteen that *also omits Adam* and therefore breaks
    the *roster-reading* of Quran 42:13."
  - >
    "Quran 71:23 (*Surat Nuh*): the idols *Wadd, Suwa', Yaghuth,
    Ya'uq, and Nasr* — surfaced in sub-chapter seventeen as the
    objects of *violation* in Noah's time, presupposing the *limits
    drawn by Adam* before them."
  - >
    "Imam al-Mu'izz li-Din Allah Ma'add ibn Isma'il (peace be upon
    him), *Ta'wil al-Shari'a*: *The Shariʿah is not the response to
    a fall; it is the architecture by which the soul, which would
    otherwise destroy itself by the powers within it, is made fit
    for the worship of Allah. The Lawgiver's enacting of the limits
    is one act with the creating of the soul that bears them — the
    limits and the soul are the two faces of the one ordinance.* —
    surfaced in sub-chapter fourteen as the Cairo-court authority
    on the *Shariʿah-as-constitutive-of-the-soul* doctrine that
    anchors al-Kirmani's deeper reading of the *reason for the
    necessity of the Shariʿah*."
  - >
    "Imam Ali ibn Abi Talib (peace be upon him), attributed in the
    *daʿwa* tradition of *Nahj al-Balagha* aphorisms on *the chain
    of the speakers and their foundations*: *The chain that runs in
    time is the same chain that the Pen writes upon the Tablet. At
    its head stands the first Speaker, who is Adam (peace be upon
    him). His Shariʿah is the body of the religion; his Foundation,
    Seth (peace be upon him), is its spirit. Whoever rejects the
    body rejects the spirit; whoever rejects the spirit rejects the
    body. The two are the gift of Allah at the head of human
    history, and from them the chain runs down through Noah,
    Abraham, Moses, Jesus, and Muhammad ﷺ — and on to the Qa'im at
    the seventh.* — surfaced at the chapter's closing image as the
    voice of the Commander of the Believers on the chain's first
    joint."
