title: "The Shariʿah of Adam and the First Speaker"
audience: >
  Thoughtful adult readers who have walked with al-Kirmani through *Chapters
  One through Eight* of *al-Riyad* — the long disputes over the universal Soul
  and the First Intellect, the *human as fruit of all the worlds*, the
  architecture of motion-stillness-*hayula*-and-form, the *sections of the
  world*, and the *three-rank reading* of *al-qada* (qa-daa — judgment, decree)
  and *al-qadar* (qa-dar — destiny, measure) by which the chain is shown to
  run from the speaker-Prophet through the revelation-and-Shariʿah down to
  the world unfolding in time — and who now turn with the author from
  cosmology to *history*. If the chain that runs in time has a *first joint*
  at the *head of human history*, who is the speaker at that joint, and what
  is his Shariʿah? The author of *al-Nusra* (an-nus-rah) presses that Adam
  (peace be upon him) had *no* Shariʿah — that the *qurban* (qur-baan —
  offering) verse in *Surat al-Maʾida* (Quran 5:27) is a parable about the
  *establishment of proofs*, that *one of Adam's sons did not know how to
  bury his brother until Allah sent a raven*, that the verse of *Shariʿah*
  (Quran 42:13) names Noah, Abraham, Moses, Jesus, and Muhammad ﷺ but *not*
  Adam, that *the angels are not assigned and are not obligated by the
  Shariʿah*, and that *if Adam had been the owner of a Shariʿah, Allah would
  have commanded the angels to prostrate themselves through him*. The author
  of *al-Islah* (al-is-laah) had affirmed the opposite — that Adam had a
  Shariʿah, that the *qurban* verse settles it on its apparent reading, that
  the universally affirmative verses (*And for every nation We have appointed
  a rite*, Quran 22:34) settle it independently, and that the *natiq*
  (naa-tiq — speaker) cannot be a speaker without a Shariʿah drawn among his
  nation. Al-Kirmani works the dispute across the first nineteen of *Chapter
  Nine*'s thirty-three sub-chapters, taking each objection in turn and
  landing the cumulative verdict that *the Shariʿah of Adam (peace be upon
  him) is fixed* — by the manifest evidence of the Qur'an, the narrative
  tradition of *Adam's tent at the qibla* and Seth (peace be upon him) as
  *first asas* (a-saas — foundation), the anthropology of the *three souls*
  and the *six gates of necessity* constitutive of *human-being-as-such*,
  and the internal coherence of the *daʿwa*'s doctrine of cycles. This
  episode is the first half of *Chapter Nine* — the *defense* of Adam's
  Shariʿah.
