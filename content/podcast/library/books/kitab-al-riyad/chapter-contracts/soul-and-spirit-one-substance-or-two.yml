title: Soul and Spirit — One Substance or Two?
audience: >
  Thoughtful adult readers who have followed *Chapters One and Two* of
  *al-Riyad* through the long argument over the Soul and the narrow
  argument over the First Intellect, and who now arrive at *Chapter
  Three* — only six sub-chapters, but the place where al-Kirmani gives
  his judgment among the *hudud* on whether the Soul (the Second) and
  the lower soul (*al-Hayuli*, prime matter) are similar to the First
  or not. The answer settles the architecture for the rest of the book:
  the First and the Second are like-counterparts, "the mineral of
  honor"; *al-Hayuli* is the trace of the Second, not its child; light
  and darkness do not need to resemble each other to be in contact;
  the chain holds by the running of the originating power through the
  proportions of cause and effect, not by likeness from rank to rank.
