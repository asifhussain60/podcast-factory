key_tensions:
  - >
    Al-Islah and al-Nusra are arguing about whether contact between the
    higher and lower worlds requires resemblance. Al-Islah says the
    Second is born of the First because the two worlds are pure light
    and pure darkness respectively, and *al-Hayuli* is therefore only
    a trace of the Second — not its child. Al-Nusra says this leaves
    no possibility of contact and proposes a mixed-edges picture: the
    Soul has a luminous side and a dark side; nature has a bright end
    and a dark end. Al-Kirmani sides with al-Islah on the trace-not-
    birth doctrine, but refuses al-Nusra's mixed-edges picture without
    refusing the requirement of contact. The hosts must hold both
    refusals at once: contact is real; resemblance is not its condition;
    the contact is by the power learned from the First, running through
    the Second, impressing *al-Hayuli*.
  - >
    The chapter's central image — that the First and the Second are
    *the mineral of honor, perfection, and elevation*, with no ignorance,
    no cycle, no darkness whatsoever — is the doctrinal anchor for the
    rest of the book's architecture of the *hudud*. The hosts must let
    this image land for what it is: the First and Second are the rank
    at which the chain begins as pure light, and every rank below them
    is the chain's overflow into substrates that do not resemble it.
    The political stake — that the *hudud* are linked to their
    principles by office (the chain of proportions), not by likeness —
    is what the metaphysics is protecting. The hosts must name that
    stake without modernizing it into institutional language.
  - >
    Al-Nusra's repeated mistake across the chapter is to import body-
    categories into ranks where bodies cannot reach: sides (sub-chapter
    three), distance (sub-chapter four), diminution (sub-chapter five).
    Al-Kirmani's correction in each case is the same as the correction
    he gave in *Chapter Two* about motion: the category does not apply.
    Sides are for bodies; the Second has proportions, not sides. Distance
    is for bodies; the Second has rank, not distance from the First.
    Diminution is for bodies; the Second has perfection in self and
    only a "second perfection" acquired by way of benefit. The hosts
    must hold the categorical refusal firm without letting it sound
    like al-Kirmani is just saying "no" to every formulation al-Nusra
    offers. He is replacing each body-category with a precise relational
    category.
  - >
    The closing sub-chapter is the chapter's most concessive moment:
    al-Nusra rebuilds the chain (Intellect → Soul → nature, with
    decreasing likeness at each rank but a real chain of generation)
    and al-Kirmani lets it stand — *if there is any precedence in the
    discussion ... and otherwise it implies the correct statement, then
    I quote it.* The hosts must let the concession be a concession.
    Al-Kirmani is not being polite. He is acknowledging that al-Nusra,
    after losing the body-category arguments, has finally arrived at the
    same chain al-Kirmani himself has been building. The closing
    "I quote it" is doctrinal, not rhetorical.
tone_constraints:
  - Walk the six sub-chapters in order. Sub-chapter one carries the chapter's central doctrinal payload (the First and Second as the mineral of honor; *al-Hayuli* as the trace). Sub-chapter two, three, four, five each work the same payload through a different challenge from al-Nusra. Sub-chapter six is the concession. Do not collapse the six into a single thesis. The accumulation is the chapter's argumentative force.
  - When al-Kirmani sides with al-Islah on the trace-not-birth doctrine, name it. When he refuses al-Islah's auxiliary premise (that the higher world has *no* darkness in it, axiomatically, as a starting premise — rather than as a conclusion from the proof that *al-Hayuli* is not born from the Second), name that too. Half-credit moves are al-Kirmani's signature throughout *al-Riyad*; do not flatten them into a winner-takes-all dialectic.
  - Lost-work quotations (the authors of *al-Islah* and *al-Nusra*) are paraphrased in modern English. Quranic verses (33:72 on the trust; 17:85 on the spirit) stay verbatim with attribution. Al-Kirmani's own settled formulas — *the mineral of honor, perfection, and elevation*; *al-Hayuli is a trace of the Second*; *perfect in self; deficient only in addition* — stay verbatim from the chapter file. Imam Ali (peace be upon him) is quoted from the tradition with appropriate honorific.
  - The chapter's title question — *are the Soul and the spirit one substance or two?* — is not answered by saying "yes" or "no". It is answered by refusing the substrate-likeness frame the question presumes. The Soul is the *rank*; the spirit is the *affair* (Q 17:85 *amr*) carried by the rank; *al-Hayuli* is the *trace* impressed by the affair. They are not three substances in a row. Hold this gently — do not let the resolution sound deflationary or hand-wavy.
  - When the chapter references *Rahat al-'Aql* (al-Kirmani's own treatise on the seven seas and the architecture of the universal Intellect), treat the reference as a real pointer — say briefly what *Rahat al-'Aql* contains and why *al-Riyad* sends the reader there at this point.
  - End on the chapter's closing image and the bridge to *Chapter Four*. The First and Second standing together as the mineral of honor; below them *al-Hayuli*, the trace; the contact running by power, not likeness. *Chapter Four* will take the same architecture and ask the next question: what are the partial souls? Do not flatten the closing into a "what we learned" summary.
anchor_passages:
  - "Al-Kirmani's settled formula on the First and the Second: *The First and the Second are two counterparts — the mineral of honor, perfection, and elevation. There is no honor above them, and Allah has made them the mineral of perfect honor and perfect light, complete elevation, complete knowledge — with no ignorance there, no cycle, no darkness whatsoever. They founded the higher world, which is the mineral of purity, al-Quds (sanctity), and life.*"
  - "Al-Kirmani's defining sentence on al-Hayuli: *Al-Hayuli is a trace of the Second, which is the essence of this world; it is the essence of darkness, which cannot be described by mercy or power — yet the Second has manifested it: by means of the power learned from the First, the Second then brought forth from it the image, which is nature.*"
  - "Al-Kirmani's correction on parts and sides: *The one possessing parts is the one possessing diameters estimated by area. The Second, being not an embodiment, has no parts in the sense al-Nusra requires; the Second is one self that acquires two proportions in its additions — the cause-proportion in the First, and the effect-proportion (ma'lul) in the First. To call those proportions limbs is to confuse the language of relation with the language of geometry.*"
  - "Al-Kirmani on diminution: *There is no deficiency in the Second; nor is the Second far from the First. Rather, the Second is like the First; and the diminution is necessary, not from its very nature, but it became incomplete — not from the side of its own selves, which is its perfection, but from a side whose second perfection it acquires by way of benefit.*"
  - "Quran 33:72 on the trust deposited in the natural composite: *Indeed We offered the trust to the heavens and the earth and the mountains, and they declined to bear it, and were afraid of it; but the human being undertook to bear it. Indeed he was unjust to himself and ignorant.*"
  - "Quran 17:85 on the spirit: *And they ask you about the spirit. Say: the spirit is from the affair of my Lord, and you have not been given of knowledge except a little.*"
  - "Al-Kirmani's terse concession to al-Nusra in sub-chapter six: *If there is any precedence in the discussion over the intellect, the soul, nature, and the existence of the above — its existence over others — and otherwise, it implies the correct statement, then I quote it; and we do not need to elaborate with certainty upon what continued the mistake in perception. And in that is enough.*"
