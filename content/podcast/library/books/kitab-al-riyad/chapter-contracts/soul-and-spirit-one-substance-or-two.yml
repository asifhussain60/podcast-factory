show_notes:
  blurb: >
    Six sub-chapters of *Chapter Three* of *Kitab al-Riyad* — al-Kirmani's
    judgment among the *hudud* on whether the Soul (the Second) and the
    lower soul (*al-Hayuli*, prime matter) are similar to the First or
    not. The chapter answers: the First and the Second are
    like-counterparts, the mineral of honor, perfection, and elevation;
    *al-Hayuli* is the trace of the Second, not its child; the higher
    and lower worlds do not need to resemble each other to be in
    contact, because the contact is the work of the power learned from
    the First, running through the Second, impressing the substrate.
    Al-Nusra's body-categories — sides, distance, diminution — are
    refused one by one. The closing sub-chapter accepts al-Nusra's
    final reconstruction of the chain (Intellect → Soul → nature) once
    he has dropped the body-talk. The doctrinal payload sets the
    architecture for the rest of *al-Riyad*: the *hudud* are linked to
    their principles by office, not by likeness.
