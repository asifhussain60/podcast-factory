key_tensions:
  - >
    Both al-Razi (in *al-Islah*) and al-Sijistani (in *al-Nusra*) commit the
    same master-error in *Chapter Two*: they apply body-categories — motion,
    stillness, need, dwelling, encompassing — to the First and Second
    Intellects. Al-Kirmani's correction does not pick a side; he refuses
    the categorical mismatch at root. The hosts must hold both refusals
    simultaneously, not let the listener think al-Kirmani is endorsing
    al-Nusra against al-Islah on this question.
  - >
    The sub-chapter seven overflow doctrine is the politically hot center
    of the chapter: if light passes through the *hudud* without remainder,
    the *natiq*, *wali*, *imam*, and the whole structure of the Fatimid
    *da'wa* collapses. Al-Kirmani's answer — *the hudud withhold nothing;
    the limitation is in the receiver's capacity* — is doctrinally
    foundational. The hosts must make the political stake visible without
    flattening it into modern institutional language.
  - >
    The Quranic anchors in sub-chapter seven (Q 17:31 *do not kill your
    children for fear of poverty*; Q 4:6 *deliver to them their wealth*)
    are not decoration. They carry al-Kirmani's whole argument that the
    *hudud* are guardians of light who must deliver, not proprietors who
    may withhold. The hosts must let the verses do their argumentative
    work — not slide past them as devotional flourish.
  - >
    The chapter's logic depends on a sharp distinction al-Kirmani has been
    building since *Chapter One*: the world of origination (*dar al-Ibda'*)
    where the First and Second Intellects exist is categorically other
    than the world of nature where bodies move and rest. The hosts must
    keep that distinction firm; the moment it slips, every sub-chapter
    in this chapter collapses back into the errors of *al-Islah* or
    *al-Nusra*.
tone_constraints:
  - Walk the nine sub-chapters in order. Do not collapse them into a single thesis. The chapter's argumentative force depends on the accumulation of corrections, each refusing a slightly different version of the same body-category mismatch.
  - When al-Kirmani sides with al-Nusra (the intellect is not in motion), name it. When he sides against al-Nusra (motion does not befit the universal Soul either), name that immediately. Half-credit moves are al-Kirmani's signature; do not flatten them into a winner-takes-all dialectic.
  - Lost-work quotations (the authors of *al-Islah* and *al-Nusra*) are paraphrased in modern English. Quranic verses (17:31, 4:6) stay verbatim with attribution. Al-Kirmani's own settled formulas — *the hudud withhold nothing; the limitation is in the receiver's capacity* — stay verbatim from the chapter file.
  - The overflow-and-receivership doctrine (sub-chapter seven) is the chapter's most consequential beat. Give it air. Let the political stake — the integrity of the *natiq*/*wali*/*imam*/*hudud* architecture — be named without being modernized into institutional vocabulary.
  - End on the closing prayer and the warning that confusion about the ranks of the *hudud* leads to the corruption of the essence of souls. The discipline of perception is itself a grace. Do not flatten the prayer into a "what we learned" summary.
  - When the chapter file references *Rahat al-'Aql* (al-Kirmani's own treatise) for the full cosmology, treat the reference as a real pointer — say what *Rahat al-'Aql* contains and why this chapter sends the reader there.
anchor_passages:
  - "Al-Kirmani's proof that the Intellect is not a body: *If the Intellect were a body, it would be preceded in existence by others, and it would not be the first creation. Nothing precedes the first intellect in its existence, since it is itself the act of creation, behind which is only God the Creator Almighty.*"
  - "Al-Kirmani's settled formula on the *hudud*: *The blessings overflow from the side of all the hudud. The reason being that there is no shortage in those blessings by which perfection is attained in all beings, nor any withholding on the part of the hudud. The limitation lies rather in the incapacity of the receivers to accept them — each according to the capacity of the one able to receive.*"
  - "Quran 17:31 anchoring the overflow doctrine: *Do not kill your children for fear of poverty.* — and al-Kirmani's gloss: *How then could it be permissible to lock up the spiritual wealth — namely the sciences and the blessings of light — from their rightful owners?*"
  - "Quran 4:6 anchoring the *hudud*-as-guardians reading: *If you find them of sound mind, then deliver to them their wealth, and do not consume it wastefully and in haste.* — *The blessings overflow only that they may be conveyed to those who deserve them.*"
  - "The chapter's culminating warning: *One must take care to know the ranks of the hudud, so that there be no confusion about the matter of perceiving things in their realities — for such confusion would lead to the corruption of the essence of souls.*"
