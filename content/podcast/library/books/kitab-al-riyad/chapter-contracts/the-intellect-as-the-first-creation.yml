show_notes:
  blurb: >
    Nine sub-chapters of the second chapter of *Kitab al-Riyad* — al-Kirmani's
    narrow, dense argument that the First and Second Intellects are not
    bodies, and that the whole vocabulary of motion, stillness, need,
    dwelling, and encompassing therefore does not apply to them. The chapter
    answers two competing wrong pictures (al-Razi's "motion and stillness
    united in the First and the Second" and al-Sijistani's "motion for the
    Soul, stillness for the Intellect") with the same correction: the
    categories of bodies do not transfer to the world of origination.
    The structural climax is the overflow doctrine: the *hudud* withhold
    nothing; the limitation is in the receiver's capacity. The Quranic
    anchors (17:31 and 4:6) carry the doctrinal weight. The chapter ends
    on the warning that confusion about the ranks of the *hudud* corrupts
    the essence of the souls that try to perceive without that discipline.
