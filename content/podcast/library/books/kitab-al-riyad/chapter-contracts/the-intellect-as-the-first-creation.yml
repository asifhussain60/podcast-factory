title: The Intellect as the First Creation
audience: >
  Thoughtful adult readers who have followed the long arc of *Chapter One*
  (episodes three through five) and now arrive at the narrow, cosmologically
  charged *Chapter Two* — only nine sub-chapters, but the place where
  al-Kirmani states most plainly why nothing said of bodies can be said of
  the First Intellect, and why the overflow doctrine that grounds the
  Ismaili *hudud* is doctrinally untouchable so long as the ranks are
  kept clear in the perceiving soul.
