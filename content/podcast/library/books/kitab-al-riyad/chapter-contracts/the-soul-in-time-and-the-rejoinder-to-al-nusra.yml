title: The Soul in Time and the Rejoinder to al-Nusra
audience: >
  Thoughtful adult readers closing out the foundational chapter of *al-Riyad*
  with al-Kirmani — watching the dialectic accelerate through its last fifteen
  sub-chapters, listening for the place where al-Sijistani thinks he has finally
  caught al-Razi (the souls that forget their world), and following al-Kirmani's
  decisive distinction between the universal Soul and the sensual soul of a
  struggling human being that disarms the entire attack.
