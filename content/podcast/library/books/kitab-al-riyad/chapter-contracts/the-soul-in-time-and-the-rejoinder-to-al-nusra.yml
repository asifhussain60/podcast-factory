key_tensions:
  - >
    Al-Sijistani's strongest case — the speaking souls that are subject to nature,
    enslaved to appetite, forgetful of their own splendor — is also the case
    where al-Kirmani draws the cleanest distinction. The sensual soul
    (*al-nafs al-hissiyya*) is not the speaking soul (*al-nafs al-natiqa*),
    and neither is the universal Soul that al-Razi meant. One word, three
    distinct existents — and al-Sijistani's entire forty-page attack has
    been smuggling among them.
  - >
    The "forgetting" argument either contradicts itself (the eternal cannot
    have a time-of-knowing and a time-of-not-knowing) or describes natural
    souls instead of the universal Soul. Al-Kirmani catches al-Sijistani's
    own later book *al-Maqalid* (proposition 44 of Euclid) contradicting
    his *al-Nusra* on the very point. The hosts should let this catch
    breathe and pray-for-the-opponent moment land.
  - >
    The Speaker (*natiq*) and the Foundation (*asas*) — the prayer cycles,
    the bowing and prostration supplications, the male/female ranking,
    the sacrifice of camels, the Friday sermon-before-prayer / Eid prayer-
    before-sermon ordering — these are not mere ritual details. They are the
    way the supra-natural ranks become visible in the embodied life. The
    hosts must hold both registers without collapsing them.
  - >
    Sub-chapter 38 closes the chapter with al-Kirmani's universal verdict on
    the philosophers — Empedocles, Plato, Aristotle and after — that they
    erred because they had not yet seen the Alawite *da'wa*. This is the
    Ismaili-Fatimid claim of the book in compact form. The hosts must surface
    it without making it sound triumphalist.
  - >
    The final prayer ("We ask God to enlighten our intellects, to seal our
    affairs with happiness…") is the seal of the whole chapter. End on the
    prayer, not on a summary.
tone_constraints:
  - Walk the sub-chapters in order. The last stretch is fast — preserve the pace.
  - The closing prayer is verbatim. The Speaker/Foundation analogies are al-Kirmani's voice; preserve their structure.
  - Lost-work quotations (al-Islah and al-Nusra) may be paraphrased in modern English. Al-Kirmani's voice stays verbatim. The hadith of the Two Weighty Things has already been delivered in episode four; do not re-deliver here.
  - The distinction between the sensual soul, the speaking soul, and the universal Soul is the doctrinal hinge of the episode. Surface it clearly; do not let the same English word carry three meanings unmarked.
  - End on the closing prayer and the bridge to Chapter Two (the First Intellect, the First Creator, nine sub-chapters). Do not summarize "what we learned."
  - When al-Kirmani catches al-Sijistani's self-contradiction in *al-Maqalid*, hold the praying-for-the-opponent gesture. It is characteristic and should land.
anchor_passages:
  - "Al-Kirmani's sensual-soul / speaking-soul / Successor-soul distinction at sub-chapter 28: 'The submissive one that is led… this is the sensual soul, not the speaking soul to which I have alluded.'"
  - "The Speaker/Foundation prayer-cycle analogy at sub-chapter 27: bowing supplication ('Glory be to my Lord the Great…') as the Foundation; prostration supplication ('Glory be to my Lord the Most High…') as the Speaker."
  - "Al-Kirmani's reading of Friday prayer at sub-chapter 27: the sermon BEFORE the prayer on Friday, the prayer BEFORE the sermon on Eid al-Fitr — each ordering a face of the Speaker/Foundation rank."
  - "Al-Kirmani's catch of al-Sijistani's self-contradiction at sub-chapter 32: the forty-fourth proposition of Euclid in *al-Maqalid* refuting *al-Nusra*'s very claim about souls coming from the world of intellect."
  - "The closing prayer at sub-chapter 38: 'We ask God to enlighten our intellects, to seal our affairs with happiness, and to grant us success in good words and good deeds, by virtue of His being, His kindness, and His generosity.'"
