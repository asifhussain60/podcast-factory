show_notes:
  blurb: >
    The closing stretch of Chapter One of *Kitab al-Riyad* — sub-chapters
    twenty-four through thirty-eight. Al-Sijistani's last lines of attack
    (the sperm-and-man analogy, the Speaker-and-Foundation ranking, the
    male-female pair, the souls subject to nature that forget their world,
    the fourfold division of objects/idea/words/writing, the Intellect-and-
    time-together claim) meet al-Kirmani's decisive distinction between
    the universal Soul and the sensual soul of struggling human beings.
    The chapter ends on the prayer that seals the whole argument and on
    the bridge to Chapter Two.
