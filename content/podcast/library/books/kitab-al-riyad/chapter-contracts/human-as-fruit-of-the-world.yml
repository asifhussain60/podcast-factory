show_notes:
  blurb: "Across the seven fusūl of Bāb 5, al-Kirmani turns the dispute between al-Islah (the human as fruit of *this* world) and al-Nusra (the human as fruit of the *higher* world) into a precise instrument of metaphysical-anthropological discrimination. Each disputant has *part* of the truth; each disputant, by insisting on his half, loses the other half. Al-Kirmani's adjudication holds both parts: the human receives his *first perfection* (the physical form ready for the three souls) from the natural order's productive arc, and his *second perfection* (the perfected spiritual form, abiding through the knowledge of tawhid by means of the hudud) from the higher world. The doubled answer then opens into the wider claim: the human is the fruit of *all* the worlds — every rank in the chain from the First Intellect downward converges in him. *The human is the last in the universes, united in eternity with what has been acquired by time.* And the architectural axiom that will carry the rest of the treatise: *the last of them was already in the first of them.* Along the way the bāb dismantles al-Nusra's heaven-and-earth analogy (which refutes itself by its own admission about potency), the claim that the Soul *sought* a rank she had not attained (God enriches her by what is with Him), and the claim that order in the cosmos comes from the Intellect as a vehicle of arrangement (the Intellect perceives only the truth — order benefits from the Intellect's truth-seeing, not from any imposed structure). The bāb closes on the prayer-architecture: *May God gather us together with our pure loyalists in the Abode of Holiness.* The metaphysics, the believer's vocation, and the Trust the heavens and the earth declined to bear (Quran 33:72) are one architecture, named in three registers."
