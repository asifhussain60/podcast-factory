show_notes:
  blurb: "Across the seven fusūl of Bāb 7, al-Kirmani closes the anthropological arc that Bāb 5 opened. Al-Islah proposes a fourfold cosmology — *four jewels, four structures, four divisions of human beings* — and names the human as *the counterpart of the world as a whole, because he gathers all the jewels of the world*. Al-Nusra reframes *pairing* as *the state of acceptance* (the dense lower world is the pair of the subtle upper world because it accepts the upper's influences; the horse is the human's pair because it accepts his instruction). Al-Kirmani refuses al-Islah's count and recasts the actual divisions of the world: the *offspring* of nature constitute *three* genera (mineral, plant, animal), not four, and the human is not a fourth genus but *shares in the animal genus, distinguished within it by a kind of conscious awareness*. From this correction follows the positive teaching at Fasl 2: the human, being a species within the animal genus, has *many pairs in many respects* — paired with the angels when he is virtuous, with lions when he is brave, with wolves when he is cruel, with foxes when he is deceitful, with crows when he is treacherous, with tigers when he is cunning, with monkeys when he is given to immorality and play. *According to whatever a person is satisfied with — by his actions, or his morals, or his customs — he will have a pair of like kind.* At Fasl 3 al-Kirmani delivers the bāb's central teaching: *in truth, the pair of human beings can only be the angels* — meaning *the prophets, the awliya, and the imams* together with *those who follow in their footsteps*. The Qur'anic principle of pairing-as-alliance (Quran 5:51 — *whoever takes them as allies, he is one of them*) is read positively of the prophetic-and-Imamic line: take them as one's party, and one becomes *of them*. Fasl 4 rereads al-Nusra's invocation of Bandhaqlis (Empedocles): by *bestial soul* read *human beings in their natural state who would accept education*; by *rational soul* read *the teaching prophets and Imams* — *the mothers of human beings*, who give birth to the rational form by their teaching, anchored in the Qur'an's verse of *the reassured soul* (89:27–30). Fasl 5 carries the disputants' competing maps of human-as-microcosm; al-Kirmani's verdict is doubled — al-Islah is closer (body ↔ minerals, growth ↔ plants, sense ↔ animals), but both are incomplete because *the human is not only a counterpart to this world; he is a counterpart to all the worlds*. Fasl 6 walks through the detailed mapping: skin around the body as planets around the cosmos; ears, eyes, nose, mouth as openings that run the course of the planets; the four natures as the four cardinal directions; bones, cartilage, flesh, and blood as rivers, valleys, waters, and mountains; hair and nails as what grows without feeling. The upper correspondence parallels: *the world of intellect, praise, monotheism, divinization, virtues* has its likeness in the human's *intellect, praise, monotheism, divinization, virtue*. *There is no differentiation between what has been brought into being before him except by rank only.* Fasl 7 closes on the tender image of *the child in his coming-to-be between his parents*: *this world* gives the matter (the body in *aḥsani taqwīm*), *that world* gives the form (the rational soul, *the highest, most honored form*), the *midwife* carries the matter. The architecture terminates twice in prayer — *may Allah make us among those who follow their party*; *may God place us among those who follow the traces of His guardians* — because the seam, in the end, is *the place for which the human was made*."
