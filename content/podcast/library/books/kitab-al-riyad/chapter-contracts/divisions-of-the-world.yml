  references:
    - "Qur'an 17:70 (And We have certainly honored the children of Adam and carried them on the land and sea and provided for them of the good things and preferred them over much of what We have created, with [definite] preference) — the Qur'anic charter for the human's preferred rank, the rank both disputants are arguing to ground"
    - "Qur'an 95:4 (We have certainly created man in the best of forms — *aḥsani taqwīm*) — the Qur'anic anchor for al-Islah's microcosm-claim that the human gathers what is in the cosmos; the body in *aḥsani taqwīm* is what *this world* gives at Fasl 7"
    - "Qur'an 5:51 (whoever takes them as allies — *yatawallahum* — is one of them) — the verse al-Kirmani quotes at Fasl 3, lifting the principle (*alliance constitutes belonging*) and applying it positively to the prophets and the Imams; the bāb's compressed metaphysics of pairing-as-alliance"
    - "Qur'an 89:27–30 (O reassured soul — *al-nafs al-muṭmaʾinna* — return to your Lord, well-pleased and well-pleasing) — the verse al-Kirmani points to at Fasl 4 as the *correct face* on which al-Nusra's Empedoclean reading is to be carried; the soul that has accepted the teaching is the soul that returns"
    - "Sahih Muslim, *Kitab al-Birr*, hadith 2586 (The believer is the brother of the believer; they are like one body — if one limb complains, the rest of the body responds with sleeplessness and fever) — paraphrased in the manner of the Prophet ﷺ; the architecture of *alliance as bodily belonging* that grounds al-Kirmani's reading of the prophetic-and-Imamic line as *one body in the cosmos*"
    - "Sahih al-Bukhari, *Kitab al-Janāʾiz*, hadith 1358 and Sahih Muslim, *Kitab al-Qadar*, hadith 2658 (Every child is born upon the *fiṭra*; it is his parents who make him a Jew, a Christian, or a Magian) — paraphrased in the manner of the Prophet ﷺ; the architecture of *the human shaped by what claims him as parent*, paralleling al-Kirmani's *mothers of human beings*"
    - "Nahj al-Balagha / Ghurar al-Ḥikam tradition (Your remedy is within you, and you do not perceive; you think yourself a small body, but in you the great world unfolds) — paraphrased in the manner of Imam Ali ibn Abi Talib's sayings on self-knowledge; the Alid line that names the bāb's anthropology from the side of the inner unfolding"
    - "al-Sahifa al-Sajjadiyya (in the manner of Imam Zayn al-'Abidin's supplications, paraphrased) — *O God, place me among those whom You have made the party of Your friends, and the followers of Your prophets, and the company of Your Imams; and make my standing with them the standing of one whom You have not abandoned* — the Du'a-side of the bāb's *be made of the party of the prophets and the Imams* teaching"
    - "Rahat al-'Aql (Hamid al-Din al-Kirmani) — referenced by al-Kirmani himself at Fasl 6 as the place where the full demonstration of the microcosm-and-macrocosm correspondences is laid out; the present bāb offers a summary anchored in the longer work"
    - "Ta'wil al-Shari'a (Maulana Imam al-Mu'izz li-Din Allah Ma'add ibn Isma'il, peace be upon him) — the Fatimid Imam's work cited in Bāb 5 as the authority on the doubled teleology of the human; the same architecture stands behind Bāb 7's anthropology of the human at the seam of the worlds"
