key_tensions:
  - "Al-Islah's fourfold cosmology vs al-Kirmani's threefold correction: al-Islah names *four jewels, four structures, four divisions of human beings* — three genera apart from human beings, with the human as the fourth. Al-Kirmani replies that *world* in al-Islah's mouth refers not to the cosmos in totality but to the *offspring* of nature, which constitute *three* genera (mineral, plant, animal); the human is not a fourth genus but *shares in the animal genus, distinguished within it by a kind of conscious awareness*. The correction matters because it relocates the human's distinctiveness: from *counting outside the three* to *being the awareness within the animal genus*."
  - "Al-Islah's claim that the human has *no pair within the world's parts* vs al-Kirmani's *the human has many pairs in many respects*. Al-Islah grounds the human's microcosm-status by denying him any intra-cosmic pair (gold-and-silver pair within metals; the human, with the rational soul, is unique). Al-Kirmani refuses on two grounds: *logical* (species within a genus form each other; if humans are a species in the animal genus they have pairs *necessarily*); and *metaphysical* (the microcosm-claim itself entails resemblance to all cosmic things, and resemblance is pairing). The human's uniqueness is not *being unpaired*; it is *being susceptible to all the pairs*."
  - "Al-Nusra's identification of *the horse* as the human's pair vs al-Kirmani's *the angels are the human's true pair*. Al-Nusra grounds the horse-pairing on *acceptance of instruction*: pairing is *the state of acceptance* (bestowal-and-reception, cause-effect), and the horse accepts instruction more readily than other animals. Al-Kirmani accepts the deeper principle (pairing-as-acceptance) but rejects the horse-conclusion: the criterion picks out too many candidates (dog, falcon, elephant, camel) and confers no priority on the horse. The true pair, on the principle of acceptance, is *whichever kind the human's moral satisfaction aligns him with* — and on the highest reading, *the angels*, meaning the prophets, the awliya, the Imams, and their followers."
  - "The Qur'anic principle of pairing-as-alliance (Quran 5:51 — *whoever takes them as allies, he is one of them*) at work in both directions: in al-Kirmani's exposition the verse names the universal logic by which moral satisfaction constitutes belonging. Take cruelty as one's satisfaction and one is paired with the wolves; take treachery and one is paired with the crows and the hawks; take immorality, amusement, and play and one is paired with the monkeys. Take the prophets and the Imams as one's *walī* (wa-lee) and one is paired with the angels. The cosmos is structured such that the human is *becoming whomever he allies himself with*."
  - "Al-Nusra's reading of Bandhaqlis (Empedocles) vs al-Kirmani's rereading under the lens of the teaching line. Al-Nusra cites Empedocles: *the bestial soul looks toward the rational soul out of love; the horse's image is the best among bestial souls; therefore the horse is the rational soul's pair*. Al-Kirmani rereads: by *bestial soul* read *human beings in their natural state who would accept education*; by *rational soul* read *the prophets, the awliya, and the Imams* — *the mothers of human beings* — who give birth to the rational form by their teaching. The architecture of Bāb 4 (*the soul acquires by obedience to the hudud*) returns as the metaphysics of *spiritual motherhood*, anchored in Quran 89:27–30 (*O reassured soul, return to your Lord*)."
  - "The disputants' competing maps of human-as-microcosm at Fasl 5. Al-Islah maps body ↔ minerals, growth ↔ plants, sense ↔ animals, with the rational soul standing alone. Al-Nusra reshuffles: body ↔ contracted bodies, growth ↔ dissolved bodies, sense ↔ animal sperm. Al-Kirmani's verdict is doubled — al-Islah is closer (his correspondences follow the architecture), but both are incomplete because the human is *not only a counterpart to this world; he is a counterpart to all the worlds*, gathering the originative (*ibdaʿ*), the emanative (*inbiʿāth*), the natural production, and the offspring's three genera."
  - "The architectural axiom at Fasl 6 (Chapter Six of Book Seven in the manuscript): *the human is the collector of much of what exists between the first creation and the second resurrection*. The lower correspondence — skin around the body as planets around the cosmos; ears, eyes, nose, mouth as openings that run the course of the planets; the four natures as the four cardinal directions; bones, cartilage, flesh, blood as rivers, valleys, waters, mountains, minerals; hair and nails as what grows without feeling — is paralleled at the upper correspondence: *the world of creation and emancipation* is *the world of intellect, praise, monotheism, divinization, virtues* and the human is *the collector of these virtues*. *There is no differentiation between what has been brought into being before him except by rank only.*"
  - "The closing anthropological image at Fasl 7: *the human is in the state of the child in his coming-to-be between his parents* — *this world* giving the matter (the body in *aḥsani taqwīm*, the receptive surface) and *that world* giving the form (the rational soul, *the highest, most honored form*); *the carrier of the matter* is the *midwife*. The image articulates the matter-form distinction Bāb 6 spent its dialectic securing as the *anthropological architecture* of the human at the seam of the worlds — the human is *from both, and from both he came to be*."
  - "The vocational register the bāb closes in. The architecture is not academic; it terminates twice in prayer (*may Allah make us among those who follow their party*; *may God place us among those who follow the traces of His guardians*). The cosmic structure of *kinds* in the world and the moral choice of *whose party one takes* are the same architecture named from two sides. The human's *pair* is not given by biology but enacted by his vocation; the bāb belongs in the register of supplication because the seam is *the place for which the human was made*."
tone_constraints:
  - The bāb is short by treatise standards (3,823 source words) and less sharply polemical than Bāb 6 — al-Kirmani's tone returns to the charitable-discrimination mode of Bāb 5, accepting each disputant's partial truth before naming the lost half. The hosts should maintain the gravity without dramatizing the polemic, and should slow down at three architectural moments — Fasl 1's correction of the four-genera count to three (the human is *within* the animal genus, not outside it); Fasl 2's catalogue of bestial pairings (the human becomes whichever moral kind he is satisfied with); Fasl 3's apophatic reversal of Quran 5:51 (*whoever takes them as allies, he is one of them*, read positively of the prophetic-and-Imamic line).
  - The honorifics for the Prophet ﷺ, the Imams (peace be upon them), the prophets (peace be upon them), and the *awliya* (guardians) are expanded on first occurrence per Phase 0c rules; subsequent mentions use the contracted form. *Sallallahu alayhi wa sallam* — peace and blessings of Allah be upon him — for the Prophet ﷺ on first mention; thereafter contracted.
  - Qur'anic verses are quoted verbatim from Saheeh International on first citation; thereafter the translator is implied.
  - The phrase *the small world* (al-ʿālam al-ṣaghīr) is the bāb's central term. Pronounce *al-ʿālam al-ṣaghīr* as *al-aa-lam aṣ-ṣa-gheer*. The architecture of the human-as-microcosm is the bāb's compressed teaching; the hosts should let the cosmic-physiological mapping (skin around bones / planets around earth; rivers and mountains / bones and minerals) land in the listener's imagination as a concrete picture, not as an abstract analogy.
  - Treat the principle of *pairing-as-alliance* with the architectural weight it carries. Al-Kirmani's reading of Quran 5:51 inverts the verse's surface polemic against unsuitable allies into the universal principle *you become the company you keep*. The hosts should name the inversion explicitly (the verse, on its surface, is a warning against taking certain allies; al-Kirmani lifts the *logic* — *whoever takes them as allies is one of them* — and applies it positively to the prophets and the Imams). The inversion is the bāb's compressed teaching of moral cosmology.
  - Treat *the mothers of human beings* (al-Kirmani's name for the prophets, awliya, and Imams) with the architectural weight the bāb gives it. The natural body is the *first birth*; the rational form, cultivated by the teaching line, is the *second birth*. The image of *spiritual motherhood* is not a metaphor; it is the architecture of Bāb 4 (acquisition by obedience to the hudud) rendered in the register of generation.
  - Do not turn the catalogue of bestial pairings (lion / wolf / fox / crow / hawk / tiger / monkey) into a moral lecture. The catalogue is *al-Kirmani's*, and his point is *cosmological* before it is moral — the cosmos is structured such that every moral satisfaction has its *cosmic kind*. Name the cosmology; let the moral teaching land as the architecture's natural consequence.
  - Hold the gentleness of Fasl 7's closing image — *the state of the child in his coming-to-be between his parents* — without sentimentalizing. The image is precise: *parents* give the form, *midwife* carries the matter, the child is from *both* and *to both*. The matter-form distinction Bāb 6 spent its dialectic securing returns here as the anthropological architecture; do not paper over the technical structure with warmth.
anchor_passages:
  - "The entire world is composed of four jewels, four structures, and four divisions of human beings. It stands upon three jewels apart from human beings, and the fourth is human beings. The knotted and the dissolved are all one essence. — author of al-Islah, Fasl 1"
  - "He is the counterpart of the world as a whole, because he gathers all the jewels of the world. For this reason he is called the small world (al-ʿālam al-ṣaghīr), because he counterparts the whole that gathers its parts. — author of al-Islah, Fasl 1"
  - "The state of pairing is not merely the state of [biological] sex; the state of pairing is the state of acceptance. — author of al-Nusra, Fasl 1"
  - "The divisions of the world are more than what we have mentioned. The offspring of nature are three genera, with no fourth — the metals, the plant, and the animal. The human being who is named as the fourth shares in the genus of the animal, with a kind of conscious awareness. — al-Kirmani, Fasl 1"
  - "If human beings are a species, then they are a pair to others among the species. Human beings would not have been likened in their structure, morals, actions, and all their conditions, motions, and natures to all that they encounter in the universe of existence — according to what he mentioned, and on account of which it is said that he is the small world — unless he were a pair to all cosmic things according to occasion and circumstance. — al-Kirmani, Fasl 2"
  - "If he is good, virtuous, wise, religious, knowledgeable, and pure, he is paired with the angels on account of the occasion between them; if he is courageous, brave, strong, and helpful, his pair is the lions; if he is unjust, cruel, and murderous, then he is paired with the wolves and the deception of foxes; if he is a treacherous thief, he is paired with the crows and the hawks; if he is deceitful, cunning, and overpowering, the tiger is paired with him. If he is an adulterer — of immorality, amusement, and play — then he is paired with the monkeys. According to whatever a person is satisfied with — whether by his actions, or his morals, or his customs, or in some portion of them — he will have a pair of like kind. — al-Kirmani, Fasl 2"
  - "In truth, the pair of human beings can only be the angels. What we mean by that is human beings of all virtues — the prophets, the guardians (awliya), and the imams (may the prayers of God be upon them) — and those who follow in their footsteps, establish their obedience, and worship Allah with both modes of worship. — al-Kirmani, Fasl 3"
  - "What he means by 'the sensual soul' is the one who is in the form of human beings, the one who would accept education, discipline, and reason — not the horse. And what he means by 'the rational soul' is the teachers, who are the prophets, the guardians, and the imams (peace be upon them) and their followers — they being in truth the mothers of human beings. — al-Kirmani, Fasl 4"
  - "The human being is the counterpart of the whole world. His body stands opposite all the bodies of the world in their differing kinds; his growth opposite the plants; his sense opposite the animal; and he possesses something that is preferable to all of them, in which he is alone — the speaking soul that is his. — author of al-Islah, Fasl 5"
  - "The human being is not only a counterpart to this world; he is a counterpart to all the worlds, since he is the collector of everything that preceded him in existence, and there is in him what corresponds to each of them. The matter is built upon this, not upon what he said. — al-Kirmani, Fasl 5"
  - "In the world there are rivers, valleys, and waters of different tastes, mountains and minerals; and in the human being likewise — as the author of al-Islah has it — there are bones and cartilage, flesh and blood, what flows from him and what comes out of him. In the world there is what grows and develops without feeling; and in the human being likewise there is what grows and develops without feeling, like hair and nails. — al-Kirmani, Fasl 6"
  - "That world is the world of the intellect, the world of praise and laudation and sanctification, the world of monotheism and divinization, the world of virtues, the world of goodness and merits. The human being — likewise meaning man — is the collector of these virtues. That world has imprinted itself upon him, and his body has been marked by this world; and in this respect there is no differentiation between what has been brought into being before him except by rank only. — al-Kirmani, Fasl 6"
  - "He exists in the state of existing between the two worlds — the state of the child in his coming-to-be between his parents. It is not permissible to attribute him to one of them to the exclusion of the other, because he is from both of them, and from both of them he came to be. — al-Kirmani, Fasl 7"
