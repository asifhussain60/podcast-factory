title: The Divisions of the World and the Small World That Gathers Them
audience: Listeners who have followed Bāb 1 (Episodes 1–3) on the architecture of the originative dyad, Bāb 2 (Episode 4) on the First Intellect as Originator, Bāb 3 (Episode 5) on Soul and Spirit, Bāb 4 (Episode 6) on the rational souls as second emanation, Bāb 5 (Episode 7) on the human as the fruit of all the worlds, and Bāb 6 (Episode 8) on motion, stillness, and the word *kun*, and who now want to see al-Kirmani close the anthropological arc Bāb 5 opened — testing how the world itself is divided, whether the human is a fourth genus alongside three, whether his pair is the horse, and what it means to say that *the true pair of human beings can only be the angels*. The episode walks through al-Kirmani's refusal of al-Islah's fourfold cosmology (the world has three genera, not four; the human shares the animal genus *with a kind of conscious awareness*), his refusal of al-Nusra's identification of the horse as the human's pair (the criterion of *acceptance of instruction* picks out too many candidates), and the positive teaching the rest of the treatise will lean upon: the human's *pair* is *enacted* by his moral satisfaction, and the proper pair is *the angels* — meaning the prophets, the awliya (aw-li-yaa), and the Imams (i-maam) together with those who follow in their footsteps; he becomes their pair to the degree that he *takes them as his party*. The episode closes on the microcosm-and-macrocosm mapping (skin around the body as planets around the cosmos; ears, eyes, nose, mouth as openings that run the course of the planets; rivers and mountains as bones and minerals; what grows without feeling as hair and nails) and the closing image of *the child between his parents and the midwife* — *this world* giving the matter, *that world* giving the form.
