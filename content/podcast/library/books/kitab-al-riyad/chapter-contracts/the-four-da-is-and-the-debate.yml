title: The Four Da'is and the Debate
audience: >
  Thoughtful adult readers — including those new to Fatimid-era Ismaili philosophy
  — who want to follow the editor's chain of argument from the original spark
  (*al-Mahsul*) through the three preachers whose books reply to one another
  (*al-Islah*, *al-Nusra*, *al-Riyad*), with biographies and theology presented as
  they are needed to read the debate.
