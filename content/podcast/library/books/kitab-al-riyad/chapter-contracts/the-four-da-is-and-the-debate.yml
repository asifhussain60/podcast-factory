key_tensions:
  - >
    A philosophical debate inside the Ismaili da'wa is itself the proof of an
    unusual intellectual freedom — and that very freedom is what produced the
    quarrel al-Kirmani must now adjudicate.
  - >
    Al-Sijistani's defense of *al-Mahsul* against al-Razi reads as faithful
    discipleship, yet al-Kirmani — al-Sijistani's own student in philosophy —
    consistently rules against him in favor of al-Razi.
  - >
    The chain *al-Mahsul* → *al-Islah* → *al-Nusra* → *al-Riyad* is the form of
    the debate: each book replies to the one before it, and two of the four are
    now lost — we only know them through al-Kirmani's quotation.
  - >
    Al-Kirmani is an Ismaili da'i answering an internal quarrel, but his apparatus
    (al-Farabi's preservation theorem, Ibn Sina on the possible and necessary,
    and a line that anticipates Descartes on continuous creation) is the apparatus
    of universal philosophy.
tone_constraints:
  - Do not flatten the three preachers into one "Ismaili" voice — name each by name and keep their positions distinct.
  - Do not soften the disagreements. Al-Sijistani is "out of place and incorrect" in al-Kirmani's verdict; do not euphemize that.
  - Keep the apparatus of names (*Hujjat al-Iraqayn*, *al-Mu'ayyad fi al-Din*, *Qadi al-Nu'man*) intact — this is a world of titled offices, not just authors.
  - No modern framings ("debate club," "doctrinal Twitter," "philosophy bros"). Hold the fourth-century Hijra world.
  - End on the threshold of the book itself, not on a takeaway about freedom of thought.
