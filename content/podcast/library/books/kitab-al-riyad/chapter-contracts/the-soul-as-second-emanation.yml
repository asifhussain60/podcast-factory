show_notes:
  blurb: "Across §27–§38 of Bāb 1, al-Kirmani sets the dialectic down and lays out the Soul-as-Successor positively. The Foundation is illumined by the Speaker as the moon is filled on the fourteenth night. The sensual soul that falls into desire is not the universal Soul of al-Islah's doctrine. The First Intellect's self-sufficiency proves the necessity of a Second. Forgetting cannot mark the Second, and al-Nusra has contradicted himself in al-Maqalid on this very point. The closing section places the great philosophers in their proper light — eminent but limited by what they could not witness — and ends with the prayer that the philosophical apparatus exists to serve: We ask God to illuminate our intellects."
