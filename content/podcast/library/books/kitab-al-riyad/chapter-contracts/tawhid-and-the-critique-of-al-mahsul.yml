  references:
    - >
      "al-Kirmani, *Rahat al-'Aql* (The Repose of the Intellect) —
      al-Kirmani's magnum opus on the architecture of the whole chain
      from the First Creator down through the universal Intellect,
      the universal Soul, the *hudud*, the celestial spheres, the
      elements, the genera, and the human being; cited in sub-chapter
      one for the doctrine of *cooperation in the sciences of religion*
      and throughout the chapter as the canonical reference for the
      architecture of the First Intellect as *pure unity self-knowing
      alone*, the *acquired intellect* as *the assembly of the images
      of the worlds*, and the *paradoxical intellect nicknamed the
      Pen* as the rank to which the acquired intellects attain"
