key_tensions:
  - >
    The chapter's opening pivot — *why al-Kirmani writes where Abu Hatim
    was silent* — is not a denunciation of either Abu Hatim or al-Mahsul,
    but a doctrine of *cooperation in the sciences of religion*. The
    Speaker (peace be upon him) *arranged the sciences through many
    people without the imamate*, so that *they should cooperate among
    themselves* like the senses: *if one of them misses something which
    the other perceives, the perception of this second one is not a
    defect for the one who missed*. The hosts must let this framing
    land before any polemical move: the critique that follows is
    *cooperation in discharging the right of religion*, not contest.
  - >
    The chapter's first metaphysical move — the *threefold impossibility*
    against al-Mahsul's claim that God is *Creator of the thing — the
    rational, illusory, intellectual, logical thing, and what is not
    under these elements* — is the architectural rule that nothing
    *precedes* the First Intellect (it is *the first existing thing
    from Allah*), nothing exists *with* the First Intellect (*from the
    One issues the One*; a second creates either multiplied causes —
    denying God's unity — or multiplied effects from one cause —
    denying the rule from which the chain runs), and nothing exists
    *after* the Intellect that is yet *not perceived by reason*
    (which is a square circle). The hosts must walk all three positions
    in order, holding the architectural metaphysics that has run through
    *Chapters Six through Nine*.
  - >
    The chapter's deepest linguistic-philosophical move is the
    *grammar of nothing* — the sophistical conversion by which the
    word *nothing* in philosopher's hands becomes a *positive
    predicate* affirming *that-which-is-not-a-thing*. When al-Mahsul
    writes *He and nothing with Him*, the formula *sounds* like the
    strongest tawhid; in fact, *nothing* has been smuggled in as a
    *something* that stands *with* God. The doctrine of *huwa* (He)
    — the only pronoun *positive for what is outside of it, without
    any attribute or plurality*, surfaced from Imam al-Mu'izz li-Din
    Allah's *Ta'wil al-Shara'i'* — is the chapter's positive answer.
    The hosts must hold *both* moves: the negative critique of
    al-Mahsul's *nothing-with-Him* and the positive doctrine of
    *huwa* as the threshold at which language honestly stops.
  - >
    The chapter's central doctrinal identity — *unity = the First
    Intellect = the Word = the cause = creativity = the Creator* —
    is the closing settlement of the architecture al-Kirmani has been
    building joint-by-joint through nine chapters. Al-Mahsul says
    *unity is the cause of the Intellect* and *the Intellect became
    eternal by the eternity of its cause*; al-Kirmani refuses: *unity*
    is not a *rank between Allah and the First Intellect* (there is
    no such rank); *unity* IS the Intellect; the supposed *eternity-
    from-the-cause* is no eternity transmitted from a separate cause
    but the eternity *of the very thing itself*. The doctrine *X
    became eternal because of an eternal cause* holds only at the
    rank of the *acquired intellects* (the prophets, foundations,
    imams, and their followers who *acquire* eternity by *receiving
    the lights* of the angels-near-the-Throne and uniting with them).
    The hosts must let this central identity land as the chapter's
    architectural settlement — and refuse the philosophical tendency
    to *separate* the names (unity, cause, Intellect, Word) into
    distinct ranks.
  - >
    The chapter's recurring corrective — al-Mahsul mistakes the
    *acquired intellect* (the intellect of the prophets, foundations,
    imams, and their followers, which gathers *all the images of the
    worlds* by *rising* through the chain) for the *First Intellect*
    (which is *pure unity self-knowing alone*, has *no need to perceive
    what is within it*, knows only *itself and the One above it*) —
    runs through sub-chapter nine (on *the world created all at once
    in the Intellect*), sub-chapter eleven (on *the forms became
    eternal*), sub-chapter thirteen (on *the Intellect became like
    the Word*), and sub-chapter fifteen (on *the Intellect benefits
    images from its cause the Word, as the two plates benefit from
    the sun's light*). Each time, al-Kirmani lets al-Mahsul's
    formulation stand *for the acquired intellect* — and refuses
    its application *to the First Intellect*. The hosts must walk
    the four parallel corrections in order and hold the two-rank
    distinction that drives them all.
  - >
    The chapter's closing settlement — *tawhid and the knowledge of
    the limits are difficult, and yet they encompass the life and
    survival of souls* — is the book's closing humility. Because
    tawhid is *difficult*, Allah has *from time to time singled out
    one man with perfection and election — such as the Imam, peace be
    upon him*; the Imam is *complete in accepting the overflow taking
    place in the natural world from the side of the angels who are
    near to Him*; *there is no way to this except by adopting the
    two acts of worship* — the *zahir* (the Shariʿah, the actions)
    and the *batin* (the *ta'wil* (ta-weel — interpretation), the
    inner knowledge), settled as *body and spirit of the religion*
    in Imam al-Mu'izz's *Ta'wil al-Shara'i'*. The book closes with
    the prayer for *Dar al-Quds*, *a noble station*. The hosts must
    let this soteriological close land as the chapter's — and the
    book's — settling note. Do not collapse the close into a "what
    we learned" summary.
tone_constraints:
  - >
    Walk the sixteen sub-chapters in consolidated order. Sub-chapter
    one frames *why al-Kirmani writes where Abu Hatim was silent*
    (cooperation in the sciences of religion like the senses).
    Sub-chapter two lands the *threefold impossibility* against
    al-Mahsul's *Creator of the thing — and what is not under these
    elements* (precedes-the-Intellect impossible, is-with-the-Intellect
    impossible, follows-the-Intellect impossible). Sub-chapter three
    works the *grammar of nothing* (the philosopher's conversion of
    negation into positive predicate). Sub-chapter four lands the
    reductio (*Creator of the thing and of nothing* yields *Creator
    of His own Creator*). Sub-chapter five works *He and no thing
    with Him*, the *with* that requires two things, and the positive
    doctrine of *huwa* anchored to the verse *Allah bears witness that
    there is no god but He* (Q 3:18) and to Imam al-Mu'izz li-Din
    Allah's *Ta'wil al-Shara'i'*. Sub-chapter six refuses al-Mahsul's
    retreat (claiming to have denied both *thing* and *no-thing*).
    Sub-chapter seven works the *out of it* preposition that converts
    denial into affirmation. Sub-chapter eight refuses the empty
    *nothing after the thing* with the Qur'anic anchor *Nothing is
    like Him* (Q 42:11). Sub-chapter nine works the first parallel
    correction — *the Intellect created with all the images of the
    worlds* belongs to the *acquired intellect*, not the First.
    Sub-chapter ten settles the central identity (unity = Intellect
    = Word = cause = creativity = Creator). Sub-chapter eleven
    presses the four impossibilities against *unity as other than
    the Intellect*. Sub-chapter twelve works the second parallel
    correction — *the forms became eternal* applies only to acquired
    intellects (with the *paradoxical intellect called the proximate
    sovereign, nicknamed the Pen* — *al-Qalam* (al-qa-lam) — as the
    rank to which acquired intellects attain). Sub-chapter thirteen
    works the third parallel correction — *the Intellect became like
    the Word* applies only to acquired intellects (the First Intellect
    *is* identical with the Word, not *like* the Word). Sub-chapter
    fourteen refuses calling the *intellect* the *Creator* (shirk).
    Sub-chapter fifteen works the fourth parallel correction — the
    *Intellect-as-intermediary* doctrine applies only to acquired
    intellects. Sub-chapter sixteen lands the chapter's centerpiece
    — *creativity IS the Creator*; the *intermediary* doctrine
    collapses; the closing Imam-Ali aphorism from *Nahj al-Balagha*
    (nahj al-ba-laa-ghah) on *whoever describes Him has limited Him*
    lands the chapter on the highest voice. The closing section
    works the soteriological settlement — tawhid is difficult, the
    Imam is the way, the two worships (zahir and batin), the prayer
    for *Dar al-Quds*. Do not collapse the sixteen sub-chapters into
    one thesis. The accumulation is the chapter's argumentative force,
    and the book's closing humility.
  - >
    When al-Kirmani sides with al-Islah on something, name it (the
    closing chapter contains few partial-sidings — most of the
    chapter is sustained critique of al-Mahsul, with Abu Hatim's
    *al-Islah* placed alongside as *should-have-corrected-but-passed
    over*). When al-Kirmani lets a part of al-Mahsul's formulation
    stand *with correction* (the four parallel corrections in
    sub-chapters nine, eleven, thirteen, and fifteen — where the
    formulation is *valid for the acquired intellect but invalid for
    the First*), name that pattern as the chapter's signature move.
    The chapter is not polemical in the manner of *Chapter Six*;
    it is *architectural-final* — the closing settlement at the
    rank above which there is no rank.
  - >
    Lost-work quotations (the author of *al-Mahsul*) are paraphrased
    in modern English. The Quranic verses Q 3:18 (*Allah bears
    witness that there is no god but He — and the angels and those
    of knowledge — upholding justice. There is no god but He, the
    Almighty, the Wise*), Q 42:11 (*Nothing is like Him — and He is
    the Hearing, the Seeing*), Q 6:103 (*Vision perceives Him not,
    but He perceives all vision; and He is the Subtle, the Aware*),
    and Q 57:3 (*He is the First and the Last, and the Outward and
    the Inward; and He has knowledge of all things*) stay verbatim
    with attribution. Al-Kirmani's own settled formulas — *the souls
    of religion are all one*; *the people of the rank of correction
    in the sciences of religion are like the senses*; *the First
    Intellect is self-knowing alone*; *what he mentioned is the
    intellect that emanates from the natural world, not the First
    Intellect*; *unity is the intellect, and the intellect is the
    One*; *it is the cause; it is the effect; it is the creativity;
    it is the Creator; and it is the Perfect*; *the paradoxical
    intellect called the proximate sovereign, nicknamed the Pen*;
    *creativity IS the Creator*; *tawhid and the knowledge of the
    limits are difficult, and yet they encompass the life and
    survival of souls* — stay verbatim from the chapter file. Imam
    al-Mu'izz li-Din Allah Ma'add ibn Isma'il (peace be upon him)'s
    formulation from *Ta'wil al-Shara'i'* on *huwa* as the only
    pronoun *positive for what is outside of it, without any
    attribute or plurality* stays verbatim with attribution. The
    aphorism attributed to Imam Ali ibn Abi Talib (peace be upon him)
    in *Nahj al-Balagha* on *whoever describes Him has limited Him;
    whoever limits Him has counted Him; whoever counts Him has
    denied His pre-eternity* stays verbatim with attribution.
  - >
    The Prophet ﷺ honorific is spelled out on first per-chapter
    mention (*peace and blessings of Allah be upon him*) and contracted
    to ﷺ thereafter, per R-HONORIFIC-ONCE. Adam, Nuh, Seth, Abraham,
    Moses, Jesus each take (peace be upon him) on first chapter
    mention. Imam Ali, Imam al-Mu'izz li-Din Allah, and the Imams of
    the *ahl al-bayt* each take (peace be upon him) on first chapter
    mention. The opening repetitions inside al-Kirmani's own quoted
    formulations ("may Allah have mercy on him" applied to al-Mahsul
    and Abu Hatim) are honored as quoted material — they do not count
    against the R-HONORIFIC-ONCE budget.
  - >
    When the chapter references al-Kirmani's own treatises (*Rahat
    al-'Aql* — *The Repose of the Intellect*, surfaced in sub-chapter
    one for the *limbs-of-the-body-of-the-daʿwa* doctrine of
    cooperation, and through the chapter as the canonical text on
    the architecture of the chain), treat the references as real
    pointers — say what the treatise contains and why *al-Riyad*'s
    closing chapter sends the reader there.
  - >
    The Arabic terms *tawhid* (taw-heed), *al-mubdi* (al-mub-di),
    *al-mubdi al-awwal* (al-mub-di al-aw-wal), *al-Mahsul* (al-mah-sool),
    *al-Islah* (al-is-laah), *al-Sadayn* (as-sa-dayn), *ibda'* (ib-daa),
    *al-wujud al-haqq* (al-wu-jood al-haqq), *huwa* (hu-wa), *al-Qalam*
    (al-qa-lam), *al-Lawh* (al-lawh), *al-hayula* (al-ha-yoo-laa),
    *qada* (qa-daa), *qadar* (qa-dar), *wilayah* (wi-laa-yah), *natiq*
    (naa-tiq), *al-nuṭaqāʾ* (an-nu-ta-qaa), *asas* (a-saas), *hujjah*
    (huj-jah), *hujjas* (huj-jahs), *hudud* (hu-dood), *da'wa*
    (daa-wah), *Shariʿah* (sha-ree-ah), *ta'wil* (ta-weel), *zahir*
    (thaa-hir), *batin* (baa-tin), *Dar al-Quds* (daar al-quds),
    *mawali* (ma-waa-lee), *al-aimma al-bararah* (al-a-im-mah
    al-ba-ra-rah), *Rahat al-'Aql* (raa-hat al-aql), *Ta'wil
    al-Shara'i'* (ta-weel ash-sha-raa-i), *Nahj al-Balagha* (nahj
    al-ba-laa-ghah), *Abu Hatim al-Razi* (a-boo haa-tim ar-raa-zee),
    and *al-Kirmani* (al-kir-maa-nee) each carry their phonetic
    guide at first chapter appearance, per R-PRONUNCIATION-IMPERATIVE.
  - >
    End on the chapter's — and the book's — closing image and prayer.
    The architecture standing: tawhid is *difficult* because language
    is created and the Creator stands above the field of created
    things; *huwa* is the only honest threshold; *creativity IS the
    Creator*; *unity IS the First Intellect*; *the acquired intellect
    of the prophets, foundations, and imams gathers the images*; the
    Imam is *the one perfected man* singled out by Allah in whom the
    overflow from the angels-near-Him reaches its full measure; the
    *two worships* (zahir and batin) are the body and spirit of the
    religion; the prayer for *Dar al-Quds* closes the chapter, and
    *Praise be to God, until He is praised as is due; and prayers
    upon Muhammad and his good family, all of them, the pure* closes
    the book. Do not flatten the closing into a summary of doctrines.
    Let the architecture rest at its highest joint.
anchor_passages:
  - >
    "Al-Kirmani on the doctrine of cooperation among the limbs of the
    daʿwa (sub-chapter one): *They are like one person who gathers
    his parts together, and they are like the senses: each perceives
    things, and if one of them misses something which the other
    perceives, the perception of this second one is not a defect for
    the one who missed the perception, nor for the others.*"
  - >
    "Al-Kirmani on the threefold impossibility against the *Creator
    of the thing — and what is not under these elements* (sub-chapter
    two): *Whatever is not perceived by reason, illusion, or thought,
    and is not spoken of by logic, must, if it exists, either precede
    reason in its existence, or be with reason in its existence, or
    follow reason in its existence. It is impossible for it to precede
    reason, for reason is with the act, behind which is none but Allah
    Almighty... It is also impossible that its existence be one with
    the very intellect... It is also impossible that its existence
    follow reason... Since he was not devoid of three sections, each
    of which obliged that his existence be impossible, it is proven
    that his existence is impossible, and to say it is misguidance.*"
  - >
    "Al-Kirmani on the doctrine of *huwa* as the only honest threshold
    of language (sub-chapter five): *Among the tongues that exist
    between human beings, there is no language able to express Allah
    in a manner appropriate to Him. The words and letters of the
    composite and the simple are all originated... He, the Almighty,
    is behind the minds and the perceptions, and behind a veil from
    understandings and thought, beyond which the paths of inquiry are
    cut off. The Almighty is not described by a word borrowed in its
    affirmative without proving an attribute or a plurality, except
    by a word that Allah has affirmed after exception: His saying,
    'Allah bears witness that there is no god but He,' where He did
    not say 'except Allah.'*"
  - >
    "Al-Kirmani on the First Intellect as self-knowing alone, not the
    assembly of the images (sub-chapter nine): *This science — the
    mind that is said to have been created, and in which the images
    of the worlds and what is in them emerged — cannot be the First
    Intellect. The First Intellect does not need the perception of
    what is within it; its existence is related to its Creator who
    created it, and it does not need to know more than its knowledge
    of itself, that it is creative, and that its existence is not by
    itself but by another who is its Creator... What he mentioned is
    the intellect that emanates from the natural world, not the First
    Intellect.*"
  - >
    "Al-Kirmani on the central identity at the rank of the First
    Emanation (sub-chapter ten): *Loneliness is not a cause of reason,
    and it is other than it until it advances upon the intellect.
    Rather it is the intellect itself, and the intellect is the unity,
    which is the One. It is the cause; it is the effect; it is the
    creativity; it is the Creator; and it is the Perfect. The Perfect,
    which is the Eternal, the Eternal, the Existence, and the Essence
    — the One.*"
  - >
    "Al-Kirmani on the paradoxical intellect nicknamed the Pen
    (sub-chapter twelve): *It is not correct to say what he said
    except in the case of the intellects which emerge from the
    intellects — such as the intellects of the prophets, the
    foundations, the imams and their followers, peace be upon them —
    who came forth into intellect through their own words. This is
    the paradoxical intellect called the proximate sovereign,
    nicknamed the Pen, in its entirety and timelessness.*"
  - >
    "Al-Kirmani on the chapter's central settlement that creativity
    IS the Creator (sub-chapter sixteen): *Thus it is proven that
    creativity is the Creator; and if creativity is the Creator, then
    what the author of al-Mahsul said is wrong, so let him avoid it,
    God willing. And so we have come to what we were promised at the
    beginning of the book.*"
  - >
    "Al-Kirmani on the soteriological close — tawhid is difficult,
    and the Imam is the way (closing section): *Tawhid and the
    knowledge of the limits are difficult, and yet they encompass
    the life and survival of souls, and their salvation from the
    world of nature and its impossibilities. Since it is difficult,
    and God Almighty knows that all His servants do not attain the
    degree by which they reach perfection in knowing the limits of
    God and His unity, He has from time to time singled out one man
    with perfection and election — such as the Imam, may God's
    prayers be upon him.*"
  - >
    "Quran 3:18 (*Surat Al-i-Imran*): *Allah bears witness that there
    is no god but He — and the angels and those of knowledge —
    upholding justice. There is no god but He, the Almighty, the
    Wise.* — the chapter's central Qur'anic anchor for the doctrine
    that Allah's own witness is given by *His own name placed after
    the negation of every god* — not by an exception clause that
    would create a second."
  - >
    "Quran 42:11 (*Surat al-Shura*): *Nothing is like Him — and He
    is the Hearing, the Seeing.* — surfaced in sub-chapter eight as
    the Qur'anic anchor for the doctrine that the negation of
    likeness does not posit a positive entity called *no-thing*; the
    pronoun *He* (huwa) is given, the comparison is denied, the
    predicates *Hearing* and *Seeing* are given as His act-toward-
    the-world, not as additions to His essence."
  - >
    "Quran 6:103 (*Surat al-An'am*): *Vision perceives Him not, but
    He perceives all vision; and He is the Subtle, the Aware.* —
    surfaced in sub-chapter sixteen as the Qur'anic anchor for the
    exhaustion of language at the threshold of Him."
  - >
    "Quran 57:3 (*Surat al-Hadid*): *He is the First and the Last,
    and the Outward and the Inward; and He has knowledge of all
    things.* — surfaced in sub-chapter sixteen as the Qur'anic
    anchor for the doctrine that there is no *intermediary* between
    Allah and what issues from Him."
  - >
    "Imam al-Mu'izz li-Din Allah Ma'add ibn Isma'il (peace be upon
    him), *Ta'wil al-Shara'i'* (ta-weel ash-sha-raa-i — *Interpretation
    of the Laws*), on the unique grammatical privilege of *huwa*
    (sub-chapter five): *Imam al-Mu'izz indicated this in his
    well-known book. He said that 'it'* (huwa) *is only Him, even if
    it is a borrowed word, for it is among the minds positive for
    what is outside of it, without any attribute or plurality.* —
    the Cairo-court authority on the only pronoun that bears no
    attribute or plurality and therefore points past every predicate
    without falling into shirk."
  - >
    "Imam Ali ibn Abi Talib (peace be upon him), *Nahj al-Balagha*
    (nahj al-ba-laa-ghah), the sermon known as *al-Khutba al-Ashbah*
    on the impossibility of describing the Lord without falling into
    limit (sub-chapter sixteen): *Whoever describes Him has limited
    Him; whoever limits Him has counted Him; whoever counts Him has
    denied His pre-eternity. He is not described by direction, nor
    compared to a likeness, nor confined to a measure; He is the
    First whose firstness no firstness preceded, and the Last whose
    lastness no lastness will follow.* — surfaced at the chapter's
    close as the Commander of the Believers' voice on the chapter's
    central doctrinal labor."
  - >
    "Al-Kirmani, *Rahat al-'Aql* (raa-hat al-aql — *The Repose of the
    Intellect*) on the cooperation of the *hudud* of the daʿwa
    (sub-chapter one): *We are limbs of a single body, the body of
    the daʿwa. The hand does not shame the foot, nor the eye the
    ear. When one limb sees a knot the other passed over, it is its
    right to tie it; that is the very meaning of being one body.* —
    surfaced in sub-chapter one as the canonical formulation of the
    *cooperation-in-the-sciences-of-religion* doctrine that opens
    the chapter."
