title: "Tawhid and the Critique of al-Mahsul"
audience: >
  Thoughtful adult readers who have followed *Chapters One through Nine*
  of *al-Riyad* through the long arguments — the perfection of the soul,
  the chain of emanation from the First Intellect down through the
  universal Soul and the *hudud* (hu-dood — limits), the soul-and-spirit
  question, souls-as-parts-or-traces, the human as *fruit of all the
  worlds*, motion and stillness and *al-hayula* (al-ha-yoo-laa — prime
  matter), the sections of the world, the doctrine of *qada* (qa-daa —
  judgment) and *qadar* (qa-dar — destiny), and the architecture of the
  law of Adam (peace be upon him) and the *wilayah* (wi-laa-yah —
  guardianship) of Nuh (peace be upon him) — and who now arrive at
  *Chapter Ten*, the book's closing critique: sixteen sub-chapters in
  which al-Kirmani turns from the architecture of the chain to the rank
  *above* the chain — *tawhid* (taw-heed — monotheism) and *al-mubdi
  al-awwal* (al-mub-di al-aw-wal — the First Creator). The author of
  *al-Mahsul* (al-mah-sool — the lost-work that began the four-book
  *al-Sadayn* (as-sa-dayn — Two Reformers) cycle) had written a chapter
  on the *first thing in what was first to fix*: tawhid and the First
  Creator. Abu Hatim al-Razi (a-boo haa-tim ar-raa-zee), in *al-Islah*
  (al-is-laah — *The Correction*), had passed over the errors; people
  read his silence as approval, and read al-Mahsul's chapter as sound.
  Al-Kirmani enters at the close of his own treatise — having promised
  the work at the book's beginning — to *discharge the right of religion
  by stating what is implicated in what I have mentioned, what it is
  not permissible to believe regarding the chapter of monotheism and
  the first Creator*. Sixteen sub-chapters of patient point-by-point
  critique at the very threshold where philosophical language meets
  the rank that admits no language: the wrongness of saying God is
  *Creator of the thing*; the metaphysical incoherence of *nothing
  with Him*; the impossibility of describing the First by borrowed
  words (with the Cairo-court reading of *huwa* (He) as the only
  pronoun that bears no attribute or plurality); the doctrine that
  the intellect of al-Mahsul's text is not the First Intellect but the
  *acquired intellect* of the prophets, foundations, and imams; the
  refutation of *unity is the cause of the Intellect* (unity *is* the
  Intellect; the Intellect *is* the Word; the Word *is* the cause;
  the cause *is* creativity; creativity *is* the Creator); the refusal
  of the *Intellect-as-intermediary* and *creativity-as-intermediary*
  doctrines; and the closing settlement that tawhid is *difficult*,
  and Allah has from time to time selected *one man* with the perfection
  of receiving the overflow from the angels-near-Him — the Imam, peace
  be upon him — by holding to whom the believers reach the *two worships*
  (the *zahir* (thaa-hir) and *batin* (baa-tin) of the religion) and
  ascend through the chain to *Dar al-Quds* (daar al-quds — the Abode
  of Holiness, Jerusalem). The book closes with the chapter, and the
  chapter closes with the prayer.
