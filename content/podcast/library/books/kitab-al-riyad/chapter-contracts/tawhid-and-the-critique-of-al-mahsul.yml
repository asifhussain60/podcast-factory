show_notes:
  blurb: >
    Sixteen sub-chapters of *Chapter Ten* of *Kitab al-Riyad* — the
    book's closing critique. Al-Kirmani turns from the architecture
    of the chain to the rank *above* the chain — *tawhid* (taw-heed
    — monotheism) and *al-mubdi al-awwal* (the First Creator). The
    author of *al-Mahsul* had written a chapter on the *first thing
    in what was first to fix*: tawhid and the First Creator. Abu Hatim
    al-Razi, in *al-Islah*, had passed over the errors. Al-Kirmani
    enters at the close of his own treatise — having promised the
    work at the book's beginning — to *discharge the right of
    religion by stating what is implicated in al-Mahsul's chapter
    and what it is not permissible to believe*. Sub-chapter one
    frames the doctrine of *cooperation in the sciences of religion
    like the senses*. Sub-chapter two lands the *threefold
    impossibility* against the *Creator of the thing — and what is
    not under these elements*. Sub-chapters three through eight work
    the *grammar of nothing* and refuse al-Mahsul's *He and no thing
    with Him* (with the verse of self-witness Q 3:18, the verse of
    incomparability Q 42:11, and the Cairo-court doctrine of *huwa*
    as the only pronoun *positive for what is outside of it, without
    any attribute or plurality*, anchored to Imam al-Mu'izz li-Din
    Allah's *Ta'wil al-Shara'i'*). Sub-chapter nine corrects al-
    Mahsul's confusion of the *acquired intellect* (which gathers the
    images of both worlds) with the *First Intellect* (which is *self-
    knowing alone*). Sub-chapter ten lands the chapter's central
    identity — *unity = the First Intellect = the Word = the cause =
    creativity = the Creator*. Sub-chapter eleven presses the
    impossibilities against *unity as other than the Intellect*.
    Sub-chapter twelve corrects the *forms became eternal* doctrine
    (valid only of the acquired intellects that unite with the
    *paradoxical intellect called the proximate sovereign, nicknamed
    the Pen* — *al-Qalam*). Sub-chapter thirteen corrects the *Intellect
    became like the Word* doctrine (the First Intellect IS the Word,
    not LIKE the Word). Sub-chapter fourteen refuses applying the
    name *Creator* to the intellect (shirk). Sub-chapters fifteen
    and sixteen refuse the *Intellect-as-intermediary* and
    *creativity-as-intermediary* doctrines and land the chapter's
    centerpiece — *creativity IS the Creator* — anchored to Q 6:103
    and Q 57:3, and crowned by the Imam Ali aphorism from *Nahj
    al-Balagha* on *whoever describes Him has limited Him*. The
    closing section settles the soteriological consequence: tawhid
    is *difficult*; Allah has from time to time singled out *one
    perfected man — the Imam, peace be upon him*; the *two worships*
    (zahir and batin) are the body and spirit of the religion; the
    chapter closes with the prayer for *Dar al-Quds*, *a noble
    station*, and the book closes with *Praise be to God, until He
    is praised as is due; and prayers upon Muhammad and his good
    family, all of them, the pure*. The book's final chapter is its
    closing humility — the speaker who has worked the chain joint-
    by-joint stops at the last joint and *will not speak past it*.
