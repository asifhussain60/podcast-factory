show_notes:
  blurb: >
    Nine sub-chapters of *Chapter Six* of *Kitab al-Riyad* — al-Kirmani's
    adjudication of the next argument the two reformers handed down: what
    are motion, stillness, *al-hayula* (prime matter), and form, and what
    kind of analogy from soul-and-body, if any, can honestly capture
    them? The author of *al-Islah* had offered a gentler-and-denser
    proportion: motion-and-stillness as the *soul* of *al-hayula*-and-form.
    The author of *al-Nusra* had refused the proportion and offered a
    structural parallel keyed to division and similarity of parts. Sub-chapter
    one frames the dispute and lands the chapter's structural doctrine:
    motion and stillness are *opposites that do not meet in the same place
    at the same time*; form and *al-hayula* are *inseparable correlates,
    actor and acted-upon*. Sub-chapter two presses the consequence —
    *al-Islah's* proportion would force the soul to be a body, which it is
    not. Sub-chapter three handles *al-Nusra's* structural parallel and
    settles the synonymy of *al-nafs* and *al-ruh* as one non-bodily
    reality. Sub-chapter four delivers the positive doctrine of motion
    (*that by which the same thing changes*) and the architectural map
    (form-and-*al-hayula* as *the first emanation*). Sub-chapter five
    handles *al-Islah's* analogy from *kun* and refuses it *as an image*.
    Sub-chapter six handles the related doctrine of two proportions and
    qualifies the analogy *by first-and-accident*. Sub-chapter seven is
    the chapter's hinge — the *grave error* of *pre-creative creativity*,
    refused categorically in the name of *tawhid*: *the Creative IS the
    creativity*. Sub-chapter eight seals the doctrine at the First
    Effect: above it, no motion, no rest, no body-talk whatsoever.
    Sub-chapter nine closes on what contradictions among bodies actually
    are — not in their being bodies, but in *the images within them*.
    The doctrinal payload sets the architecture for *Chapter Seven's*
    coming question of *the sections of the world*: the body's
    differentiation is at the form-level, the image-level, what
    *al-hayula* has received; the world's architectural divisions follow
    the proportions of receivership at each rank, the same architecture
    *Chapter Four* settled for the souls and *Chapter Five* settled for
    the human being.
