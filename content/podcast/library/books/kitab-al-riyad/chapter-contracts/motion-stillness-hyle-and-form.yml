title: Motion, Stillness, *al-Hayula*, and Form
audience: >
  Thoughtful adult readers who have followed *Chapters One through Five*
  of *al-Riyad* through the long arguments over the universal Soul, the
  First Intellect, the rank of the speaking souls (the *second
  emanation*), and the rank of the human being (the *fruit of all the
  worlds*), and who now arrive at *Chapter Six*: nine sub-chapters in
  which al-Kirmani turns from the rank of the human being to the
  architecture of the natural-world end of the chain — what motion,
  stillness, *al-hayula* (prime matter), and form actually are, and what
  kind of analogy from soul-and-body, if any, can honestly capture them.
  The author of *al-Islah* had offered a clean gentler-and-denser
  proportion: motion-and-stillness stand to *al-hayula*-and-form as soul
  stands to body. The author of *al-Nusra* had refused the gentler-denser
  as the *measure* of soul-and-body and offered a structural parallel:
  body has three dimensions, soul has parts that resemble each other,
  motion divides into three sections (so motion is like the body),
  *al-hayula's* parts resemble each other (so *al-hayula* is like the
  soul). Al-Kirmani works the nine sub-chapters as the same triangulating
  adjudication he gave *Chapters Four* and *Five* — but on a different
  question, the deepest of the natural-world chain. The settlement: motion
  and stillness are *opposites that do not meet in the same place at the
  same time*; *al-hayula* and form are *inseparable correlates, actor and
  acted-upon, the first emanation*; the soul is not a body and therefore
  admits neither density nor gentleness; *al-nafs* and *al-ruh* are two
  names for one non-bodily reality; the *kun* of Allah's command, taken as
  two letters, is a remote analogy *by first-and-accident*; above the
  First Effect there is no motion, no rest, no body-talk whatsoever; and
  *al-Islah's* picture of a *creativity that exists before it has
  appeared* is the gravest error of the chapter — the door to *shirk* at
  the highest end, refused categorically in the name of *tawhid*.
