key_tensions:
  - >
    The vocabulary disputes look technical (gentler-vs-denser, three
    sections vs three dimensions, two letters of *kun*) but the stake
    underneath is the integrity of *tawhid* at the top of the chain and
    the categorical refusal of body-talk in the higher ranks. If
    *al-Islah's* gentler-denser proportion held, the soul would slip back
    into being a body — a *gentler* body, but a body — and the categorical
    refusal *Chapters Two* and *Three* built would lose its hold. If
    *al-Islah's kun*-as-two-letters were taken at full weight, the First
    would slip into being an actor who *uses an instrument* (the word
    *Be*), and *tawhid* would crack at its highest end — the same crack
    *Chapter Four* (sub-chapter eight) refused with the doctrine that the
    Intellect IS the Word. The hosts must hold both anxieties at once and
    not let either reformer's word win cleanly. Al-Kirmani's settled
    architecture — motion-and-stillness as opposites,
    *al-hayula*-and-form as inseparable actor-and-acted-upon, the
    first emanation, the natural composite — is what the chapter exists
    to surface.
  - >
    Al-Kirmani's deepest refusal in the chapter is the seventh
    sub-chapter's polemical climax. *Al-Islah* had said that *creativity,
    before it has appeared, has not yet become creative through
    creativity* — a picture of a *pre-creative creativity* hovering in
    the presence of the Almighty, awaiting its emergence. Al-Kirmani
    refuses this as the *grave error* of the chapter. *The doctrine and
    belief in monotheism is that other than Allah Almighty — who is
    Creative and First — nothing has any reality in existence at all; and
    if anything did, then creativity would be nothing other than the
    Creative itself.* The Creative IS the creativity, in the same sense
    *Chapter Four* settled that the Intellect IS the Word, in the same
    sense *Chapter Five* settled that the divine names are *synonymous
    according to the additions*. The hosts must let the *tawhid*-stake of
    this refusal carry its full weight — this is the chapter's hinge, not
    a technical correction.
  - >
    The *kun* analogy is the chapter's most beautiful and most dangerous
    move. *Al-Islah* read the divine command *kun* (Be!) as a word of two
    letters — the voweled *kaf* (carrying motion) and the consonant *nun*
    (carrying stillness) — and built from this an analogy for the
    relation of motion-and-stillness to the First Cause. Al-Kirmani
    refuses the analogy at its root *as an image* (because *image*
    implies something that has an image, and not a word; and there is no
    *kaf* or *nun* above the First Effect) AND admits the analogy *by
    first-and-accident* — as a remote indicator of the doctrine that the
    divine Self can be considered under two honorable proportions
    (cause-toward-below and effect-toward-above) without those being
    separate realities. The hosts must let the half-admission be a
    half-admission, not flatten it into either acceptance or rejection.
    The doctrine the analogy can honestly bear is the same doctrine
    *Chapter Four* settled — names by aspect — and no more.
  - >
    The chapter's positive architectural doctrine, set in sub-chapter
    four, is the load-bearing payload for everything that follows.
    *Motion is that by which the same thing changes — either by place,
    or by universe, or by corruption, or by increase, or by decrease, or
    by impossibility. Its occurrence is from the mover, which is the
    principle in the thing in which the motion resides.* And *hyle and
    form are the first emanation of the following proportion, just as
    the second is upon the noble proportion within it.* The
    actor-and-acted-upon coupling of form-and-*al-hayula* — set in
    sub-chapter one — is mapped here to the chain of emanation, the
    same chain *Chapter Four* settled. The hosts must let this map
    happen: the architecture *Rahat al-'Aql* gave for the higher ranks
    holds at the natural-world end of the chain too, and *Chapter
    Six* is the chapter that applies the same architecture to the
    natural composite.
  - >
    The sub-chapter nine close on contradictions is the chapter's
    deepest move on the body-image relation, and it carries the link
    forward to *Chapter Seven's* sections of the world. *Bodies are
    bodies because they are objects; there is no distinction between
    them as such, and no contradiction among them. The difference and
    the contrast lie in the images within them — what animates them — not
    in their being bodies.* Bodies are undifferentiated as
    bodies; the differentiation that produces the contradictions of the
    natural world is at the form-level, the image-level, what
    *al-hayula* has received. The hosts must let this close set up
    *Chapter Seven* (the *sections of the world*): the world's
    architectural divisions are not at the *al-hayula*-level but at the
    form-level, by the proportions of receivership at each rank.
tone_constraints:
  - >
    Walk the nine sub-chapters in order. Sub-chapter one carries the chapter's setup of the soul-body analogy dispute and lands the actor-and-acted-upon doctrine for form-and-*al-hayula* AND the opposites doctrine for motion-and-stillness. Sub-chapter two presses the consequence — *al-Islah's* proportion would force the soul to be a body. Sub-chapter three handles *al-Nusra's* structural parallel and settles the synonymy of *al-nafs* and *al-ruh*. Sub-chapter four delivers the positive doctrine of motion and the architectural map (form-and-*al-hayula* as the first emanation). Sub-chapter five handles *al-Islah's kun*-as-two-letters analogy and refuses it *as an image*. Sub-chapter six handles the related doctrine of two proportions and qualifies the *kun* analogy *by first-and-accident*. Sub-chapter seven is the polemical climax — the *grave error* of *pre-creative creativity*, refused in the name of *tawhid*. Sub-chapter eight seals the doctrine: above the First Effect there is no motion, no rest. Sub-chapter nine delivers the body-image close. Do not collapse the nine into a single thesis. The accumulation is the chapter's argumentative force.
  - >
    When al-Kirmani sides with *al-Islah* on something, name it. When he sides with *al-Nusra* on something, name that too. The chapter is a sustained pattern of partial sidings — and unlike *Chapters Four* and *Five*, this chapter's verdict on both reformers is harsher: *in this chapter the two of them have strayed far from representation and simile*. But the harshness is still calibrated. *Al-Nusra's* refusal of the gentler-denser is right; his structural parallel is wrong. *Al-Islah's kun* analogy holds *by first-and-accident*; his *pre-creative creativity* does not hold at all. Let the half-credit moves be half-credit, and let the categorical refusal of *pre-creative creativity* land with its full *tawhid* weight.
  - >
    Lost-work quotations (the authors of *al-Islah*, *al-Nusra*, and *al-Mahsul*) are paraphrased in modern English. The Quranic verse Q 36:82 (His command, when He intends a thing, is only that He says to it, "Be," and it is) stays verbatim with attribution. Al-Kirmani's own settled formulas — *motion and stillness are two opposites that do not meet in the same place at the same time*; *form and hyle, their existence together is such that neither is separable from the other*; *the path of hyle and form is not the path of motion and stillness*; *the soul is the soul, and the proof rests on the fact that it is not embodied*; *al-nafs and al-ruh are two synonyms for the same thing, and that thing is not a body*; *motion is that by which the same thing changes*; *hyle and form are the first emanation*; *the hyles are imaginary; so too is creativity imaginary — it shows itself only in the First Creator*; *the doctrine and belief in monotheism is that other than Allah Almighty — who is Creative and First — nothing has any reality in existence at all*; *bodies are bodies because they are objects; the difference and the contrast lie in the images within them* — stay verbatim from the chapter file. Imam Ali ibn Abi Talib (peace be upon him)'s aphorism from the first sermon of *Nahj al-Balagha* — *He is with everything, but not by closeness; He is other than everything, but not by separation; He acts, but not by movements or instruments* — stays verbatim with attribution.
  - >
    The Prophet ﷺ honorific is spelled out on first per-chapter mention (*peace and blessings of Allah be upon him*) and contracted to ﷺ thereafter, per R-HONORIFIC-ONCE. Imam Ali ibn Abi Talib takes (peace be upon him); the speaker-prophets and the Imams take (peace be upon him).
  - >
    When the chapter file references al-Kirmani's own treatises (*Rahat al-'Aql* = *The Repose of the Intellect*; *Aqlam al-Din* = *Milestones of Religion*; *al-Masabih* = *With Lamps* / the book *With Lamps*), treat the references as real pointers — say what each treatise contains and why *al-Riyad's Chapter Six* sends the reader there at the precise moments it does (*Rahat al-'Aql* for the architecture of *al-hayula*-and-form as the first emanation; *Aqlam al-Din* for the body's nine sections / nine accidents doctrine; *al-Masabih* for the categorical refusal of body-status for the soul).
  - >
    The Arabic terms *al-hayula* (al-ha-yoo-laa), *kun* (kun), *al-Islah* (al-is-laah), *al-Nusra* (an-nus-rah), *al-Mahsul* (al-mah-sool), *al-nafs* (an-nafs), *al-ruh* (ar-rooh), *hudud* (hu-dood), *Rahat al-'Aql* (raa-hat al-aql), *Aqlam al-Din* (aq-laam ad-deen), and *Nahj al-Balagha* (nahj al-ba-laa-gha) each carry their phonetic guide at first chapter appearance, per R-PRONUNCIATION-IMPERATIVE.
  - >
    End on the chapter's closing image and the bridge to *Chapter Seven*. The architecture standing: motion-and-stillness as opposites, *al-hayula*-and-form as inseparable actor-and-acted-upon and as the first emanation, the soul as the single non-bodily reality, the body as *al-hayula*-informed, the First Effect beyond motion-and-rest, the First Creator beyond any analogy. *He acts, but not by movements or instruments* — Imam Ali's aphorism settling at the head of the chain the same doctrine *Chapter Six* settles all the way down. *Chapter Seven* will take the architecture and apply it to the world's own internal divisions — the *sections of the world*. Do not flatten the closing into a "what we learned" summary.
anchor_passages:
  - >
    "Al-Kirmani's verdict on the soul-body analogy (sub-chapter one): *In this chapter the two of them have strayed far from representation and simile; and between us and the two of them lies a corrupt foundation upon which the proof is built — neither the proverb nor its representation is true.*"
  - >
    "Al-Kirmani's structural doctrine on motion-and-stillness vs form-and-hyle (sub-chapter one): *Motion and stillness, even when they are actualized, are two opposites that do not meet in the same place at the same time. As for form and hyle: their existence together is such that neither is separable from the other, provided that one of them is an actor — which is the form — and the other is acted upon in it — which is al-hayula.*"
  - >
    "Al-Kirmani's categorical refusal of body-talk for the soul (sub-chapter two): *The soul cannot be embodied with density or gentleness, for density and gentleness are properties only of that which is a body... The soul is the soul, and the proof rests on the fact that it is not embodied. And if the soul is not embodied, then it is impossible to argue that it is gentler or denser, or that it is represented by such terms.*"
  - >
    "Al-Kirmani's synonymy of *al-nafs* and *al-ruh* (sub-chapter three): *Al-nafs and al-ruh are two synonyms for the same thing, and that thing is not a body. For if it were a body, the body would necessarily require of it the nine qualities and accidents that the body needs, and it could be perceived by sense. But since it is not perceived by sense, it is not perceivable, and the nine accidents do not exist in it.*"
  - >
    "Al-Kirmani's positive doctrine of motion and the architectural map (sub-chapter four): *Motion is that by which the same thing changes — either by place, or by universe, or by corruption, or by increase, or by decrease, or by impossibility. Its occurrence is from the mover, which is the principle in the thing in which the motion resides... Hyle and form are the first emanation of the following proportion, just as the second is upon the noble proportion within it.*"
  - >
    "Al-Kirmani on the imaginary character of *al-hayula* and creativity (sub-chapter five): *The hyle and its form are the act of the command, which is creativity. As we have said, the hyles are imaginary; so too is creativity imaginary — it shows itself only in the First Creator.*"
  - >
    "Al-Kirmani's qualification of the *kun* analogy (sub-chapter six, glossed from his settled formulation): *The analogy holds only by being first and by accident, which is what the one who calls the First an actor in this manner must concede.*"
  - >
    "Al-Kirmani's *tawhid*-refusal of *pre-creative creativity* (sub-chapter seven — the chapter's hinge): *And this is a grave error. For the doctrine and belief in monotheism is that other than Allah Almighty — who is Creative and First — nothing has any reality in existence at all; and if anything did, then creativity would be nothing other than the Creative itself.*"
  - >
    "Al-Kirmani's seal at the First Effect (sub-chapter eight): *It should not be said that above the First Effect there is motion and rest, because that would assert motion and rest of the First Effect and of what is below it. We have already shown that the First Effect is not movable, that motion does not befit it, and that there is no stillness in it either, because it is other than a body.*"
  - >
    "Al-Kirmani's body-image close (sub-chapter nine): *Bodies are bodies because they are objects; there is no distinction between them as such, and no contradiction among them. The difference and the contrast lie in the images within them — what animates them — not in their being bodies.*"
  - >
    "Quran 36:82 on the divine command: *His command, when He intends a thing, is only that He says to it, \"Be,\" and it is.*"
  - >
    "Imam Ali ibn Abi Talib (peace be upon him), *Nahj al-Balagha*, the first sermon: *He is with everything, but not by closeness; He is other than everything, but not by separation; He acts, but not by movements or instruments.* — surfaced for sub-chapter seven's *tawhid*-refusal of *pre-creative creativity* and the doctrine that the First's action is metaphorical, not by instruments."
