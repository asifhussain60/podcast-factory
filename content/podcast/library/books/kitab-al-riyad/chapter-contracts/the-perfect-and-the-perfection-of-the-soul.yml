title: The Perfect and the Perfection of the Soul
audience: >
  Thoughtful adult readers who have followed al-Kirmani's editorial overture
  through episodes one and two and now want to enter the actual philosophical
  argument of *al-Riyad* — the foundational dispute over what "perfection"
  names, whether the Soul is perfect or deficient, and how the formula
  "perfect in itself, deficient only in relation" gets established across
  the first ten sub-chapters of Chapter One.
angle: faithful_exposition
episode_format: deep_dive
