show_notes:
  blurb: >
    The opening of *Kitab al-Riyad* in full: the damaged invocation that
    survives, al-Kirmani's preface and prayer for the ruling Imam, his
    statement of method, the table of ten chapters, and the first ten
    sub-chapters of Chapter One — where the foundational doctrine of the
    book (perfect in itself, deficient only in relation) is established
    against al-Sijistani's persistent attempt to fix the Soul on a single
    rank-scale that would make it deficient in itself.
