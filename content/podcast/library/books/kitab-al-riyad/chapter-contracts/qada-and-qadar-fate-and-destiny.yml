episode_number: 12
title: "Qada and Qadar — Fate and Destiny"
audience: >
  Thoughtful adult readers who have followed *Chapters One through Seven*
  of *al-Riyad* through the long arguments over the universal Soul, the
  First Intellect, the speaking souls (the *second emanation*), the human
  as *the fruit of all the worlds*, the architecture of motion, stillness,
  *al-hayula* (al-ha-yoo-laa — prime matter), and form, and the sections
  of the world with the human being as a *between*-state child of *both*
  worlds, and who now arrive at *Chapter Eight*: twenty-four sub-chapters
  in which al-Kirmani turns from the architecture of the world's sections
  to the question of *how the chain runs in time* — what is the relation
  between *al-qada* (qa-daa — judgment, decree) and *al-qadar*
  (qa-dar — destiny, measure), which is *prior*, which is *posterior*,
  what is the *order* by which what is decreed at the head of the chain
  becomes what is measured at the rank of the receiver. The author of
  *al-Islah* (al-is-laah) had argued: destiny precedes decree, because
  *destiny is estimation and decree is detail*, and the prior is before
  the posterior — like a tailor estimating a garment before he cuts it.
  The author of *al-Nusra* (an-nus-rah) had inverted the order: decree
  precedes destiny, like the *spiritual image of the sewing* in the
  tailor's soul precedes the appreciation by which he estimates — for
  there is no estimation without a judge who obliges that estimation,
  and the spiritual is prior to the bodily. The dispute draws in the
  verse *Indeed, We have created everything according to a measure*
  (Quran 54:49), the Prophetic word *Flee from Allah's qada to His
  qadar*, the verse of Moses *show me, that I may look upon You*
  (Quran 7:143), the doctrine that *the mind is all things and all
  things are the mind*, and the verse *no blame upon those who believe
  and do righteous deeds for what they have eaten* (Quran 5:93). Al-Kirmani
  works the twenty-four sub-chapters as the same triangulating
  adjudication he gave *Chapters Four through Seven* — but the chapter's
  doctrinal payload is the *three-rank reading* of *qada* and *qadar*
  by which the chain is shown to run from the speaker-Prophet through
  the revelation-and-Shariʿah down to the world unfolding in time, with
  the *reassured soul* at the receiving end *returning to its Lord,
  pleased and pleasing* (Quran 89:27–30).
