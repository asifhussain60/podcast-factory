    and Shariʿah, the world unfolding in time), with Quran 70:6–7 as
    the Qur'anic anchor. Sub-chapter nine corrects the doctrine of
    the First Intellect as *the assembly of the images of the worlds*.
    Sub-chapters ten through fifteen work Quran 54:49 (*Indeed, We
    have created everything according to a measure*) and give the
    *Pen-Tablet-Writer* architecture. Sub-chapters sixteen through
    nineteen work the Prophetic word *Flee from Allah's qada to His
    qadar* in three meanings, with Quran 18:77 as al-Islah's anchor.
    Sub-chapter twenty gives the political *ta'wil* of Moses asking
    Shuʿayb for the agency to lift the affliction of the people of
    truth at the wrong time (Quran 7:143 and Quran 41:53). Sub-chapters
    twenty-one and twenty-two refuse the doctrine *the mind is all
    things and all things are the mind*. Sub-chapter twenty-three
    refuses *al-Nusra*'s reading of Quran 5:93 as a license to abandon
    the Shariʿah and gives the verse a different *ta'wil* (a license
    to the *du'at* to study outside sciences as a weapon under three
    conditions). Sub-chapter twenty-four lands the three-position
    order: *decree at the beginning, apportioning in the middle,
    completion at the end* — anchored to Quran 89:27–30 and the
    *reassured soul* that *returns to its Lord, pleased and pleasing*.
    The doctrinal payload sets the architecture for *Chapter Nine*'s
    coming question of *the law of Adam and the wilayah of Nuh* — how
    the chain that runs in time first establishes itself at the head
    of human history.
