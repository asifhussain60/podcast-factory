key_tensions:
  - "The survival paradox — three lost books, one survivor, and the survivor is the judge."
  - "Intellectual freedom in a 'conservative' Islamic age — the Ismailis kept arguing with each other."
  - "Adjudicator's privilege — al-Kirmani sides with al-Razi, then turns on al-Razi in Bab 10."
  - "What was at stake — getting the cosmic schema wrong putting the soul's journey wrong."
tone_constraints:
  - No modernizations of place or institution names.
  - Honor the philosophical register; do not flatten the technical vocabulary.
  - Maintain the gravity of the stakes the philosophers themselves felt.
anchor_passages:
  - "Tamer editorial frame (p 5): 'The Islamic world at the close of the third Hijri century was alive with science, philosophy, and refined letters. Its cultural sphere was crisscrossed by new movements, dense doctrinal controversies, and theological debate that did not stop at any boundary.'"
  - "Al-Kirmani's method statement (preface, p 49–50): 'I had seen Abu Hatim al-Razi correct what he saw as errors in the book al-Mahsul. Then Abu Ya'qub al-Sijistani came and defended the author of al-Mahsul... I had therefore determined that I shall set forth herein the original views that came in al-Islah, correcting some of what came in al-Mahsul, and what came in al-Nusra, presenting my view and my comments upon them.'"
  - "Nur al-Din Ahmad (quoted by Tamer): 'Had the Ismaili da'wa produced no one but al-Kirmani, that would have been pride enough and glory enough.'"
  - "Imam Ali (AS), Nahj al-Balagha Saying 366: 'Knowledge is twinned with action. He who knows acts; and knowledge calls to action — if it answers, well; if not, knowledge departs from it.'"
