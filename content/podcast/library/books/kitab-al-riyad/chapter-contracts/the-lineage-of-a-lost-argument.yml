show_notes:
  blurb: |
    Episode 1 of the Kitab al-Riyad series. Hamid al-Din al-Kirmani (d. ~411 AH)
    wrote a book that judges between two earlier judgments of a now-lost
    treatise — and his book is the only one of the four to survive. This
    opening conversation lays out the chain: al-Nasafi → al-Razi → al-Sijistani
    → al-Kirmani, names the four philosophers, and explains why this particular
    work is preserved when the three it answers are not.
