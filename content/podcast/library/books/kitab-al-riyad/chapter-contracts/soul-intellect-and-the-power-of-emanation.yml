show_notes:
  blurb: >
    The middle stretch of Chapter One of *Kitab al-Riyad* — sub-chapters
    eleven through twenty-three — where al-Sijistani exhausts his attacks
    on the perfection of the Soul through a parade of analogies, and
    al-Kirmani holds the formula "perfect in itself, deficient only in
    relation" at every turn. The Two Weighty Things hadith arrives at the
    structural center; the dolphins of the Sea of Oman arrive near the end.
    The episode closes at the threshold of the sperm-and-man analogy that
    opens episode five.
