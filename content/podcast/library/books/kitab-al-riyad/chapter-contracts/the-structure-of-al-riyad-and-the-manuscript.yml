length_target: longer
key_tensions:
  - >
    Al-Kirmani's stated method is to quote *al-Islah* and *al-Nusra* against
    each other and judge between them — but his verdicts almost always favor
    al-Razi over his own teacher al-Sijistani. The book is filial and dis-filial
    at the same time.
  - >
    Many of the disputes (the perfect vs. perfection; motion as effect vs. motion
    as intention; soul identical to spirit or not) hinge on micro-distinctions in
    Arabic philosophical vocabulary. The editor must convey the substance without
    pretending the granularity isn't there.
  - >
    The ninth chapter on Adam and the Great Resurrection contains a structural
    paradox: at the moment the *da'wa* reaches its summit, the *hudud* dissolve
    and the work of teaching ends. Triumph and termination are the same event.
  - >
    Chapter ten's nine-point critique of *al-Mahsul* repeatedly finds the same
    error — granting the Intellect, the Word, or "creativity" an independence
    that monotheism cannot allow. The editor surfaces this as a single fault
    with nine forms.
tone_constraints:
  - Walk the chapters in order. Do not collapse the ten into a thesis-statement.
  - When al-Kirmani sides with al-Razi against al-Sijistani, name that. Discipleship is not loyalty here.
  - Lost-work quotations (the author of *al-Mahsul*, *al-Islah*, *al-Nusra*) may be paraphrased; verbatim quotations from al-Kirmani, the Imam al-Mu'izz, or named hadith stay verbatim.
  - Do not modernize the manuscript story. Two Indian copies, one from Surat (1935) and one from Tehran on microfilm — keep that texture.
  - End on Aref Tamer's signature, not on a "what we learned" summary.
