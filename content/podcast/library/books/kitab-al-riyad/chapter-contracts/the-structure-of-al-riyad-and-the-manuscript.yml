show_notes:
  blurb: >
    A chapter-by-chapter walk through *al-Riyad* itself — al-Kirmani's stated
    method, his ten substantive verdicts on the perfection of the soul, motion
    and stillness, *qada* and *qadar*, the law of Adam, the nine-point critique
    of *al-Mahsul* — and the closing story of the two Indian manuscripts (Surat
    1935 and Tehran on microfilm) that made the modern edition possible.
