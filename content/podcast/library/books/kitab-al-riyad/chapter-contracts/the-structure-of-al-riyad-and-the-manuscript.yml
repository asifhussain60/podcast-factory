title: The Structure of al-Riyad and the Manuscript
audience: >
  Thoughtful adult readers who have followed the four-da'is overture and now want
  to walk through *al-Riyad's* ten substantive chapters with the editor — seeing
  where al-Kirmani sides with al-Razi, where he sides with neither, and what the
  closing critique of *al-Mahsul* actually says — plus the bibliographic story of
  how the modern edition came to exist.
angle: faithful_exposition
episode_format: deep_dive
