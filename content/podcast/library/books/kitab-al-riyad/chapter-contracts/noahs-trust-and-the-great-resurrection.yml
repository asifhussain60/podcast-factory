key_tensions:
  - "The dialectical reversal at Fasl 17. Al-Nusra had grounded *the necessity of Nuh's Sharia* in *the violation of limits before his time*. Al-Kirmani's reply: violation *presupposes* what is being violated — *the roles in violating the limits presuppose the limits being there to be violated*. If Nuh's Sharia is *grounded* in the violation, the violation is *grounded* in Adam's prescriptions. Al-Nusra's argument for Nuh requires Adam. The very fact that the second Speaker had to *renew and abrogate* presupposes the first Speaker's *establishment*. The move closes the bāb's first major movement and consolidates eight independent arguments that all converge on Adam's Sharia."
  - "The deepest objection at Fasl 19. Al-Nusra: *the structure and ordering of the world, in the matter of signifying the divine unity, is indispensable* — but the cosmos's signs *have led many moralists away from monotheism and into anthropomorphic simile*. The argument is double-edged: the cosmos *does* indicate tawhid, and yet the cosmic indications mislead. Al-Kirmani's reply accepts the *first* edge (if cosmos suffices, messengers are *a virtue God does not need*) and completes the *architecture* the second edge already names: the cosmos *is* an indication, *but the indication requires reading*; the reader is *the prophet*; *the limits the prophet teaches* are *what allow the cosmos to be read as indication at all*. The architecture is *not* (cosmos → tawhid) but (cosmos → prophet's teaching of the reading → tawhid). The middle term is the prophet's law. And — the bāb's most striking move — *even the angels who are near to Him* are in this position; if the angels need the architecture of works and signs to attain perfection, the human certainly does."
  - "The angels' demurral re-read at Fasl 20–21 as a *cycle-claim*, not a sufficiency-claim. The architecture of *knowledge alternating between potency and act across the cosmic cycles* (illustrated through heat-cold-snow-mountain-and-sand, then through *the ignorance that reached its end and the knowledge introduced into potency*) names the bāb's reading of Quran 2:30: *we glorify You and sanctify You* was *not* a wrong claim about the angels themselves; it was a wrong claim about *the cycle they were in*. *I know what you do not know* names the *next* cycle's opening — *the end of ignorance into act, and the attainment of knowledge to its goal in potency, and the establishment of the teachers and the guides*. Adam's sending is the architecture under which *knowledge comes out of potency into act* at the cycle's turn. The reading is the bāb's most beautiful."
  - "The Qā'im does not raise the worship at Fasl 25. Against al-Nusra's claim that *the Qā'im raises the laws* and thereby invalidates worship in the natural world, al-Kirmani refuses absolutely. *The Qā'im does not invalidate anything related to the worship of Allah; rather, he is the conclusion of the roles of the predecessors, the completion of something that has been done in its place.* The cosmic imagery of Quran 82:1–2 (heaven split, planets scattered) and 81:1–3 (sun darkened, stars dimmed, mountains set in motion) names *not* the abolition of the laws but *the passing away of the ranks* — *the closing of the door of teaching* — *the time at which knowledge returns to potency and is concealed*. The architecture is *symmetric* with Fasl 20–21: the first cycle opens knowledge out of potency into act; the seventh closes act back into potency. The architecture is *fulfillment*, not *abolition*."
  - "The seven lines and the six widths at Fasl 27–28. Al-Islah's figural argument — *seven lines* (Speakers) with *six widths* (Sharias) between them; the chain is *cumulative* (each Speaker's Sharia completed only by the appearance of the next); the seventh line (the Qā'im) closes the chain. Al-Nusra's counter-figure reads the *six widths* not as Sharias but as *the six Imamic cycles between the Speakers* — and argues that *Adam, being preceded by no Imams, was not called to legislate*. Al-Kirmani's surgical correction: *the lines stand for the Speakers; the presentations stand for the duration of each Speaker's authority in his cycle*; and — the bāb's signature reversal — *the Sharia is made obligatory for Adam by the presence of the Imams after him*. *The presence of the Imams entails the obligation of preserving the place of the Speaker, his Sharia, and his outlines in his community. Without that, it would not have been obligatory to obey the Imam of any speaking cycle.* Al-Nusra's argument *requires* Adam's Imams; Adam's Imams *require* Adam's Sharia. The geometry closes on *the great cycle and the small cycle* — the seven-and-six pattern holds at the macro-level (Speakers) and the meso-level (Imams within each cycle)."
  - "The Ark in its doubled register at Fasl 31. Al-Islah reads the Ark as *the new Sharia* in which the obedient are saved from the flood that drowned those who clung to the abrogated law (Wadd, Suwa', Yaghuth, Ya'uq, Nasr — the five idols of Quran 71:23). Al-Nusra reads it as *the appointment of the waliyy* — the foundation in whose obedience the new cycle holds. Al-Kirmani — characteristically — accepts *both*: *the first concerns the order of this world, and the second the order of the brethren, and neither dispenses with the other*. The Ark is *both* the new Sharia of the second cycle *and* the appointment of the waliyy through whom the Sharia is held. The bāb's deepest hermeneutic constant — *the outer carries the inner; the inner holds inside the outer* — is enacted, at the figure of the Ark, as architectural completion."
  - "Adam's guardian was Seth, and the chain began with Adam at Fasl 32. Against al-Nusra's lingering claim that *Nuh was the first to establish a guardian by way of ta'wīl*, al-Kirmani replies: *the prophethood of Adam (peace be upon him) and his Sharia are established, and it is firmly established that Seth (peace be upon him) was his guardian*. The architecture is structural: *each Speaker requires a guardian who benefits from him, just as every moved thing necessarily has a mover — the mover being one, even if many derive their motion from it*. The chain begins with *Adam-and-Seth*, not with *Nuh-and-Shem*. *The learner who comprehends the truth is the one we call the guardian.* The architecture of Speaker-and-guardian is not historically contingent; it is structurally necessary for every speaking cycle, from the first door to the gathering."
  - "The son of Noah at Fasl 33 as the adversary-figure of the second cycle. Al-Nusra had argued from Quran 11:42–43 (*I will take refuge on a mountain to protect me from the water*) that *the matter of the guardian was unknown before Noah's time*. Al-Kirmani's reply: al-Nusra has already conceded (in the chapter on the cycles) that *Adam's cycle was followed by the Imams who succeeded him* — the argument internally contradicts itself. And then the bāb's load-bearing political-architectural reading: *the son, though attributed to Noah, was not truly of his line spiritually. He was a powerful man, possessed of worldly authority, who occupied a position parallel to that of the adversary in the cycle of our Prophet Muhammad ﷺ. He had drawn benefit from Noah, had learned what he knew, and so became, by the strength he derived, his rival.* The *mountain that protects from water* names *what is sustained by men and saints* — political backing. *The water* is *the flood that extended outwardly and inwardly*. The architecture closes on the bāb's compressed teaching: *the conditions of Muhammad's cycle are like the conditions of the cycles mentioned above* — *the pattern that has run through all the prophets and the guardians, all the way to the time of the seventh*."
tone_constraints:
  - The bāb's second half is built around al-Kirmani's *cosmic-architectural reach*. He is no longer arguing only for *Adam's Sharia* (the first half settled that); he is reading the architecture of *cycles, knowledge, ignorance, the Speakers, the guardians, the Imams, the Qā'im, and the Great Resurrection* as *one unified architecture*. The hosts should slow at five architectural moments: Fasl 17 (the dialectical reversal that *Nuh's Sharia presupposes Adam's*); Fasl 19–22 (the deepest objection and al-Kirmani's anthropological-cosmological reply on *knowledge alternating between potency and act*); Fasl 25 (*the Qā'im does not invalidate worship*); Fasl 31 (the Ark in its doubled register — *the order of this world and the order of the brethren*); Fasl 33 (the political-architectural reading of *the son of Noah* as *the adversary-figure of the second cycle*).
  - The closing reading at Fasl 33 is *politically charged* and reads the second cycle through the architecture of the seventh. *He occupied a position parallel to that of the adversary in the cycle of our Prophet Muhammad ﷺ.* The reading should not be flattened into a single register — the son of Noah is *both* the historical figure of the Qur'anic narrative *and* the architectural archetype of every cycle's adversary. The bāb has been preparing this reading since Fasl 6 of Episode 11 (Cain and Abel as *the wali and the adversary*); the closing reading completes the architecture.
  - The honorifics for the Prophet ﷺ, the Imams (peace be upon them), the prophets (peace be upon them), and the awliya (guardians) are expanded on first occurrence per Phase 0c rules; subsequent mentions use the contracted form.
  - Qur'anic verses are quoted verbatim from Saheeh International on first citation; thereafter the translator is implied. The episode's load-bearing anchors are Quran 71:23 (the five idols), 71:25 (drowned and entered the Fire), 11:42–43 (the son of Noah and the mountain), 21:104 (*as We began, We will repeat*), 82:1–2 and 81:1–3 (the cosmic Resurrection), 2:30–33 (the angels' demurral and the teaching of the names), and 56:62 (*a new creation*).
  - The architecture of *the cosmos as alternation between potency and act* at Fasl 20 carries the bāb's most beautiful reading. Al-Kirmani's illustrations from nature (heat in the belly of a body becoming cold in melting; the gathering of a mountain's parts dissolving into sand) are not philosophical aside but *the bāb's cosmological grammar* for reading *knowledge and ignorance*. Let the analogies land in their physical specificity before turning to the architecture of *the cycle's turn*.
  - The reading of *the Qā'im closing the door of teaching* at Fasl 22 and Fasl 25 is *not* an antinomian reading. The architecture is *symmetric to Fasl 20's opening*: the first cycle opens knowledge out of potency; the seventh closes act back into potency. *The Qā'im does not invalidate worship.* The hosts should not soften the architecture's symmetry and should not collapse it into an *abolition of the laws* reading — that would replicate the very error al-Kirmani is correcting.
  - The Ark reading at Fasl 31 is the bāb's most condensed enactment of the Da'wa's *outer-and-inner* hermeneutic. Both readings are *true*; neither is *more true* than the other; the architecture *requires both*. The closing Du'a paraphrase on *boarding the Ark of every cycle* names the bāb's vocation under this architecture: the soul that recognizes *the foundation by the architecture and not by the lineage* is the soul that boards the Ark when the water rises.
anchor_passages:
  - "What he says does not imply that Adam should have no Sharia. Rather, Adam too must have had duties and a Sharia, because it has been established that the roles in violating the limits and pursuing contraries — and such violation only befalls a follower's follower by abandoning the master's command and prescription — the violation itself was proven by saying that the prescriptions had become a Sharia, and by it the violation occurred against Adam (peace be upon him). So Sharia is established for him. — al-Kirmani, Fasl 17"
  - "It has been narrated that God Almighty ordered Adam (peace be upon him) to set up a tent that He brought down from Paradise, and made it his qibla and the qibla of his sons. Then Seth built a place after him. This refers to Sharia, its wisdom, the gathering of revelation and interpretation in it, the establishment of its branches and roots, and the binding force of its obligations. — author of al-Islah, Fasl 18"
  - "If the world's elaborate order is itself an arbiter indicating monotheism, then the sending of the messengers to call to and signify monotheism — sent with the very evidence that others are already producing — would amount to nothing more than a virtue God does not need. I do not see how that goes for him: with the world's evident order so plainly arranged, is that not enough to indicate tawheed? — al-Kirmani, Fasl 19"
  - "The work is not only for monotheism, but also for the correction of the soul in worship, for emulating the highest assembly, and for acquiring — through exercise — honorable morals and noble habits by which they are prepared for joining what is above them. — al-Kirmani, Fasl 20"
  - "I know from the end of ignorance in the world to its end-the-act, the completion of its role, its appearance — and from the attainment of knowledge in the world to its goal in potency, and the return of repentance to Him in the reappearance, and the resurgence of need in His appearance, to the establishment of the teachers and the guides — what you do not know. So Allah sent Adam (peace be upon him), making him His successor to manifest knowledge, to gain them integrity in act, to show them how to know the boundaries, and to teach them what they did not know. — al-Kirmani, Fasl 20–21"
  - "The Qā'im is the owner of the seventh stage, who dismisses speech, distinguishes the people of Paradise from the people of Hell, and closes the door of education. Repentance is not valid then, because they do not remain knowledgeable, and they are not of the people of knowledge. — al-Kirmani, Fasl 22"
  - "Believing that is unsound. For the estimation of its existence in the natural world does not arise from the second way of revival, because it does not invalidate anything related to the worship of Allah, the Almighty. Rather, it is the conclusion of the roles of the predecessors, the completion of something that has been done in its place. — al-Kirmani, Fasl 25"
  - "All these similitudes are folded upon the limits, and the announcements concern their passing away — that is, their ranks — not the laws or the works whose time has elapsed; for those laws then survive with no teachers, except for what is necessary to its existence as we have mentioned. — al-Kirmani, Fasl 25"
  - "The Sharia is made obligatory for him by the presence of the Imams after him. The presence of the Imams entails the obligation of preserving the place of the Speaker, his Sharia, and his outlines in his community. Without that, it would not have been obligatory to obey the Imam of any speaking cycle. — al-Kirmani, Fasl 28"
  - "Even if this is one interpretation, the proper face is to say what corresponds to the saying of Allah Almighty: namely that this is a reference to the return of the Qā'im (peace be upon him) — the return of knowledge after it had gone out into action, its abundance into potency, its scarcity, and its predetermined apportionment over all the people after him, just as they were in the time of Adam; and the return of ignorance after it had been in potency, and its reduction into action, and its multiplication on account of its appointed wisdom. — al-Kirmani, Fasl 29"
  - "The two interpretations are correct in their own respects: the first concerns the order of this world, and the second concerns the order of the brethren, and neither dispenses with the other, since each of them raises its own head. — al-Kirmani, on the Ark, Fasl 31"
  - "Each speaker (natiq) requires a guardian who benefits from him, just as every moved thing necessarily has a mover — the mover being one, even if many derive their motion from it… When Adam was the speaker, he therefore must have had a guardian, and likewise every speaker. — al-Kirmani, Fasl 32"
  - "The proper interpretation of the prayer of the son of Noah is that this son, though attributed to Noah, was not truly of his line spiritually. He was a powerful man, possessed of worldly authority, who occupied a position parallel to that of the adversary in the cycle of our Prophet Muhammad. He had drawn benefit from Noah, had learned what he knew, and so became, by the strength he derived, his rival; people too imagined that he was the guardian himself. — al-Kirmani, Fasl 33"
  - "The water here is what divides Noah's people against the force that destroys them, and the mountain is what is sustained by men and saints. So the son made his intent and took those of his kind with him, and they perished in his obstinacy. There remained only the one who had bound himself to obedience to Noah's foundation. — al-Kirmani, Fasl 33"
  - "This is a pattern that has run through all the prophets and the guardians, all the way to the time of the seventh… Only one who is counted among the people of the elevated (ʿalawī) daʿwah, of which God is the light, recognizes this. — al-Kirmani, Fasl 33"
