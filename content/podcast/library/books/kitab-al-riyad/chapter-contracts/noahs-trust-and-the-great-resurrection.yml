title: Noah's Trust and the Great Resurrection
audience: Listeners who have followed Episode 11 through al-Kirmani's six-gateway architecture and the bāb's first sixteen fusūl on Adam's law, and who now want the second half of Bāb 9 (baab) — what Nuh (nooh) adds to what Adam opened, what the architecture of *seven Speakers and six Sharias* (sha-ree-ah) really names, and how the bāb closes on the Qā'im (qaa-im) and the Great Resurrection. The episode walks through Fasl 17–33 in five interlocking movements. First (Fasl 17–18) the dialectical reversal that *the very fact of violation presupposes Adam's prescriptions* and the traditional anchor of *the tent of Paradise and the qibla of Adam*. Second (Fasl 19–22) al-Nusra's (an-nus-rah) deepest objection — that the cosmos itself suffices to indicate tawhid (taw-heed; the unity of God), making the sending of messengers *a virtue God does not need* — and al-Kirmani's anthropological-cosmological reading of Quran 2:30–33: *I know what you do not know* names the architecture of the next cycle's beginning of knowledge; the angels who said *we glorify You* were at the end of the cycle of ignorance, and Adam's sending opens the cycle of knowledge. Third (Fasl 23–30) al-Nusra's remaining arguments: the encouragement-intimidation-or-both disjunction (each requires parables, parables require ta'wīl — ta-weel, ta'wīl requires Sharia); the *Qā'im raises the laws* claim (refuted absolutely — *the Qā'im does not invalidate worship, he completes the roles*); the seven-lines-and-six-widths geometry (mapped onto Speakers and Sharias); the letter-by-letter analysis of *Adam* (refuted by parity with *Muhammad*); the reading of Quran 21:104 (*as We began, We will repeat*) as *the return of the Qā'im* and *the return of knowledge to potency*. Fourth (Fasl 31–32) the Ark of Nuh read in its doubled register — al-Islah (al-is-laah) reads the Ark as *the new Sharia*; al-Nusra reads it as *the new da'wa and its waliyy* (wa-lee; guardian); al-Kirmani accepts both — *the first concerns the order of this world, and the second the order of the brethren, and neither dispenses with the other*; and the bāb's correction that *Seth was Adam's guardian* — the chain of Speakers-and-guardians began with Adam, not with Nuh. Fifth (Fasl 33) the political-architectural reading of Quran 11:42–43 — Noah's son as *a powerful man, possessed of worldly authority, who occupied a position parallel to that of the adversary in the cycle of our Prophet Muhammad ﷺ* (peace and blessings of Allah be upon him); *the mountain that protects from water* names not a geological feature but *what is sustained by men and saints* — political backing; and *the flood that extended outwardly and inwardly* names the pattern *that runs through every prophetic cycle, all the way to the time of the seventh*. The episode closes on the architecture of *one mercy from the door of Adam to the gathering of the Qā'im*.
