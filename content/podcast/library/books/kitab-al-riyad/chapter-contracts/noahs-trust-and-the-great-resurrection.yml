show_notes:
  blurb: "Across the closing seventeen fusūl of Bāb 9 (Fasl 17–33), al-Kirmani takes the architecture Episode 11 opened — Adam's Sharia under the six-gateway theory of human community — and walks it forward through five interlocking movements. Fasl 17 closes the dialectical loop on al-Nusra's argument: he had grounded *Nuh's Sharia* in *the violation of limits before Nuh's time*, but *violation presupposes what is being violated* — Adam's prescriptions. The architecture is consolidated. Fasl 18 anchors the case in the traditional report of *the tent from Paradise* — Adam's qibla, the place Seth built. Fasl 19 takes up al-Nusra's deepest objection — that *the structure and ordering of the world*, in indicating tawhid, makes the sending of messengers *a virtue God does not need*. Al-Kirmani's reply completes the architecture al-Nusra only half-built: the cosmos *is* an indication, but the indication *requires reading*; the reader is the prophet; the prophet's law is what allows the cosmos to be read as indication at all. *Even the angels who are near to Him* need the architecture of works and signs to attain perfection; the human certainly does. Fasl 20–21 give the bāb's most beautiful reading: *knowledge alternates between potency and act across the cosmic cycles*; the angels who said *we glorify You and sanctify You* (Quran 2:30) were at *the end of the cycle of ignorance*, and Allah's reply (*I know what you do not know*) names *the architecture of the next cycle's beginning of knowledge*. Adam was sent *to manifest knowledge, to gain them integrity in act, to show them how to know the boundaries*. Fasl 22 distinguishes the cycle of the guardian (knowledge continues to be taught between Muhammad ﷺ and the Qā'im) from the cycle of the Qā'im (the door of education is closed). Fasl 23–24 close the dialectical sweep on al-Nusra's remaining arguments: encouragement or intimidation or both — all three require parables, all three require ta'wīl, all three require Sharia; with wisdom or without — if without, no prophecy at all; if with, *Sharia and the two acts of worship*. Fasl 25 delivers the bāb's most direct teaching on the Great Resurrection: the Qā'im *does not invalidate worship*; he is *the conclusion of the roles of the predecessors, the completion of something that has been done in its place*. The cosmic verses of Quran 82:1–2 and 81:1–3 name *the passing away of the ranks*, not the abolition of the laws — *the time at which knowledge returns to potency and is concealed*. The architecture is *symmetric*: the first cycle opens knowledge out of potency into act; the seventh closes act back into potency. Fasl 26 corrects al-Nusra's category mistake — the architecture of works-and-signs applies to *the intellects in the world of body* (the perfected-by-acquisition), not to *the First Intellect and the higher limits* (the perfected-by-origination). Fasl 27–28 walk through al-Islah's seven-lines-and-six-widths geometry and al-Nusra's counter-figure; al-Kirmani's surgical correction reverses al-Nusra's argument: *the Sharia is made obligatory for Adam by the presence of the Imams after him* — al-Nusra's argument *requires* Adam's Imams; Adam's Imams *require* Adam's Sharia. Fasl 29 reads Quran 21:104 (*as We began, We will repeat*) as *the return of the Qā'im* and the symmetry of knowledge-and-ignorance turning over at the cycle's close. Fasl 30 disables al-Nusra's letter-by-letter analysis of *Adam* by parity with *Muhammad*. Fasl 31 reads the Ark in its doubled register: al-Islah reads it as *the new Sharia*; al-Nusra reads it as *the new da'wa and its waliyy*; al-Kirmani accepts *both* — *the first concerns the order of this world, and the second the order of the brethren, and neither dispenses with the other*. Those who drowned are those who clung to the abrogated law, which had hardened into the worship of Wadd, Suwa', Yaghuth, Ya'uq, and Nasr (the five idols of Quran 71:23); *because of their sins they were drowned, and were made to enter the Fire* (Quran 71:25) names the flood as *outward and inward*. Fasl 32 corrects al-Nusra on the historical claim — *Seth was Adam's guardian*; the chain of Speaker-and-guardian began with Adam, not with Nuh; *each Speaker requires a guardian, just as every moved thing necessarily has a mover*. And Fasl 33 closes on the bāb's load-bearing political-architectural reading: Noah's son was *a powerful man, possessed of worldly authority, who occupied a position parallel to that of the adversary in the cycle of our Prophet Muhammad ﷺ*; *the mountain that protects from water* names *what is sustained by men and saints* — political backing; *the flood that extended outwardly and inwardly* names the pattern *that runs through all the prophets and the guardians, all the way to the time of the seventh*. The episode is enriched (per Phase 0e) with seven Qur'anic anchors at the head (71:23 the five idols; 71:25 drowned and entered the Fire; 11:42–43 the son of Noah; 21:104 *as We began, We will repeat*; 82:1–2 and 81:1–3 the cosmic Resurrection; 2:31–33 the teaching of the names), an Alid paraphrase on *the first opened the road; the last gathers the travelers*, and a closing supplicatory paraphrase in the manner of Imam Zayn al-'Abidin (peace be upon him) on *boarding the Ark of every cycle*."
