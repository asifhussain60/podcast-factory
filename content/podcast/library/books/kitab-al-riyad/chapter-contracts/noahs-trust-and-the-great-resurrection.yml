    - "Qur'an 2:30–33 (and when your Lord said to the angels: I will make upon the earth a successor… they said: Will You place in it one who corrupts it and sheds blood, while we glorify You with Your praise and sanctify You?… and He taught Adam the names — all of them) — al-Kirmani's anchor across Fasl 20–21 for the angels' demurral as *a cycle-claim* and Adam's sending as *the inauguration of the cycle of knowledge*"
    - "Qur'an 41:53 (We will show them Our signs in the horizons and in their own selves) — the verse that grounds the architecture of *signs requiring reading* at Fasl 19"
    - "Alid line on the seven speaker-prophets (the first opened the road; the last gathers the travelers — between the opening and the gathering, the road is one; the doors are seven; the gathered are those who walked) — paraphrased after the manner of Imam Ali ibn Abi Talib's sayings on the cycles"
    - "al-Sahifa al-Sajjadiyya (Imam Zayn al-'Abidin, peace be upon him; paraphrased) — the closing supplicatory line on *boarding the Ark of every cycle, recognizing the foundation by the architecture and not by the lineage*"
    - "al-Masabih fi al-Imama (al-Kirmani's own work) — the longer corpus pointer carried across the prior bābs and continuing into Bāb 9"
    - "Rahat al-'Aql (Hamid al-Din al-Kirmani) — the longer corpus pointer the bāb's anthropological-cosmological readings draw from"
