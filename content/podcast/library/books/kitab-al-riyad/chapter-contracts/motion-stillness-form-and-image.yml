show_notes:
  blurb: "Across the nine fusūl of Bāb 6, al-Kirmani turns from the human-at-the-seam-of-the-worlds (Bāb 5) back to the chain's interior joints, testing whether *motion and stillness*, *hayula and form*, and the word *kun* (Be) can be analogized to soul and body without breaking the architecture the previous bābs have built. Al-Islah proposes a graded ladder: motion/stillness stand to *hayula*/form as form/*hayula* stand to body — gentler-to-denser at each rank. Al-Nusra counters with a structural resemblance: motion divides in three (from-the-center, toward-the-center, around-the-middle) just as body divides in three (length, width, depth), so motion resembles body in *kind of division*, while *hayula*, whose parts resemble each other, resembles soul. Al-Kirmani refuses both: *the soul is not embodied* — density and gentleness do not apply to it — so the graded ladder loses its first term; and *body is in fact divisible into nine sections*, not three, so the dimensional resemblance gets the count wrong. The deeper correction is logical: motion and stillness are *contraries that cannot coexist*, while *hayula* and form are *correlatives that cannot exist apart* — the dyads belong to different genera and cannot be analogized. Al-Kirmani then gives the principled definition: *motion is that by which a thing's selfsame state changes — by place, or by quality, or by corruption, or by increase, or by decrease, or by impossibility — and its occurrence is from the mover which is the principle in the thing in which it inheres, naturally and not by width*. From there the bāb takes up al-Islah's reading of the First Cause as the word *kun* — its two letters (moving *kaf*, stationary *nun*) standing in for body, the motion and stillness in them for soul. Al-Kirmani accepts the reading only at the level of *analogical understanding*: the two states correspond to *two honorable relations* of the originative apex (its being a *cause* and its being *effected*), not to properties of the Origin's essence. *At the level of the Self itself, above the First Effect, there is no kaf, no nun, no motion, and no stillness — what is there is pure ibda and complete causation.* The grave error al-Kirmani names against al-Islah at Fasl 7 — that *Allah became Creative through ibda* — is refuted by strict monotheism: *ibda is nothing other than the Creator Himself*. The bāb closes on the compressed teaching that *contradictions occur in bodies, not in spirits — bodies are bodies because they are objects; difference and contrast lie in the images by which what animates them is animated*. The manuscript ends abruptly; the architecture has been tested at its interior joints and held."
