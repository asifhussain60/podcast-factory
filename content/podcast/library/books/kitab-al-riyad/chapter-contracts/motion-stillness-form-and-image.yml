key_tensions:
  - "Al-Islah's foundational analogy: motion/stillness stand to *hayula*/form as form/*hayula* stand to body — gentler-to-denser at each rank, the soul as gentle, the body as dense, the architecture proportioned by a graded ladder of refinement. The analogy *looks* metaphysically elegant; al-Kirmani will show it collapses because soul is not embodied at all, and *density* and *gentleness* are predicates that apply to bodies only. Once *embodied gradations* are removed from the soul, the proportional analogy loses its first term and the whole ladder falls."
  - "Al-Nusra's counter-proposal: motion is divisible into three (from-the-center, toward-the-center, around-the-middle) just as body is divisible into three (length, width, depth), so motion resembles body in *kind of division*. *Hayula*, by contrast, is not divisible — its parts resemble each other — so *hayula* resembles soul. The analogy is more careful than al-Islah's, but al-Kirmani still corrects it: body is in fact divisible into *nine* sections, not three (per his *Ma'alim al-Din* — ma-aa-lim ad-deen), and *motion* and *hayula* belong to fundamentally different metaphysical categories — motion and stillness are opposites that *do not coexist in the same place at the same time*, whereas *hayula* and form *exist only together*."
  - "The metaphysical asymmetry that breaks both analogies: motion and stillness are *contraries* that *cannot coexist*; *hayula* and form are *correlatives* that *cannot exist apart*. The dyads belong to different logical genera. To analogize them is to import the structure of one into the other and lose what each is. *Hayula* and form, on al-Kirmani's account, are *the first emanations following in proportion as emission* — a unitary first emanation with two aspects, where form is the *agent* and *hayula* is the *object in which the action occurs* (and this is the architecture defended at length in al-Kirmani's *Rahat al-'Aql* — raa-hat al-aql)."
  - "The word *kun* (Be) as the cosmological diagram: al-Islah reads the First Cause — which is *ibda* (origination) — as the word of the Almighty, whose form is *kun*, the two letters *kaf* (kaaf; voweled, moving) and *nun* (noon; unvoweled, stationary). The two letters stand in for body; the motion and stillness in them stand in for soul. The reading has a Qur'anic anchor (the divine command *kun fa-yakun* of Surat Ya-Sin 36:82) and a long Ismaili pedigree, but al-Kirmani will accept it only at the level of *analogical understanding* — *istinbāṭ qiyāsī* — and refuse to let it bind the originative apex to the structure of an alphabetic word."
  - "Al-Nusra's apophatic correction (which al-Kirmani endorses, then sharpens): at the level of *the Self itself*, above the First Effect, there is no *kaf*, no *nun*, no motion, no stillness — *one cannot say of what is above the First Effect that it is in motion or at rest*; what is there is *pure ibda and complete causation*. The apophatic structure that Bāb 2 named (*the First is the last; the beginning of Him is the middle of Him is the end of Him*) is reaffirmed at the question about the originative word: any predicate that imports temporal or spatial structure into the Origin is *too small for what is named*."
  - "The Cause–and–Effect doctrine that the *kun* analogy expresses, when read carefully: the two states of the word — moving *kaf* and stationary *nun* — correspond to *two honorable relations* of the originative apex, one of which is its being a *cause* (the motion that *terminates in stillness*) and the other its being *effected* (the stillness whose *end is motion*). Read this way, the analogy is not naming Allah's essence; it is naming the *relational structure* by which the Origin and what is originated stand to each other. The teaching that the Creator *is the cause and the effect, the perfect and the complete* (Bāb 5 Fasl 6) returns at this stratum: the analogy points to the structure of the originative dyad, not to a property of the Origin's essence."
  - "Al-Kirmani's principled definition of motion (Fasl 4): *motion is that by which a thing's selfsame state changes — by place, or by quality, or by corruption, or by increase, or by decrease, or by impossibility — and its occurrence is from the mover which is the principle in the thing in which it inheres, naturally and not by width.* This is a definition broad enough to subsume the Aristotelian *kinēsis* (place-change, qualitative change, growth, diminution, generation, corruption) under one architectural rubric and to deny that motion is a *separable substance* — motion is a *predicate of change*, and the *mover* is *the principle in the thing* (the immanent principle), not an external agent operating on a passive substrate."
  - "The grave error al-Kirmani names against al-Islah at Fasl 7: to say that *the First Hayula is imaginal just as ibda is imaginal* — and to ground this in *Allah's pride* in *His becoming Creative through ibda* — is to imply that *before ibda there was no creativity*, which would require something other than Allah to come into being, contradicting strict monotheism. *Ibda is nothing other than the Creator Himself.* The originative act is not a property the Origin acquires; the originative act *is* the Origin under one of His aspects of relation. The bāb closes by reaffirming the Bāb 5 teaching: the names of the Origin (Creator, creativity, perfect, complete) are *synonymous with respect to additions* — one thing only, named under aspects."
  - "Fasl 9's compressed metaphysical principle: *contradictions occur in bodies, not in spirits — bodies are bodies because they are objects; there is no differentiation among them and no contradiction between them in that respect. Difference and contrast lie in the images by which what animates them is animated — not insofar as they are bodies.* This is the bāb's compressed final teaching: *contrariety* is a predicate of embodied things in the natural order, where motion and stillness, hot and cold, generation and corruption stand as opposites; spirits, considered in their essence, do not stand in *contraries* but in the *images* through which they are animated. The architecture preserves itself by locating opposition where opposition belongs."
tone_constraints:
  - The bāb is the second slimmest in the treatise (2,340 source words) and is sharper in its dialectic than Bāb 5 — al-Kirmani repeatedly names the disputants' analogies as *built upon a corrupt root* and as *irregular disorder*, while still preserving the structure of charitable discrimination he has used throughout the dispute. The hosts should maintain the gravity without dramatizing the polemic. The bāb's argumentative density makes it the easiest in the series for a listener to slip on; slow down for Fasl 4 (the principled definition of motion), Fasl 5 (the *kun* analogy), and Fasl 7 (the *grave error* against the *al-Islah*'s grounding of *ibda*'s appearance in Allah's *pride*).
  - Hold the gravity of the apophatic claim. The hosts should let the line *one cannot say of what is above the First Effect that it is in motion or at rest* land — this is the moment in the bāb where the negative theology of the Da'wa (daa-wah) becomes audible. The Qur'anic *laysa ka-mithlihi shay'* (there is nothing like Him) of Surat al-Shura 42:11 is the verse this teaching is rendering in technical vocabulary.
  - The honorifics for the Prophet ﷺ, the Imams (peace be upon them), and the prophets (peace be upon them) are expanded on first occurrence per Phase 0c rules; subsequent mentions use the contracted form.
  - The Qur'anic verses are quoted verbatim from Saheeh International on first citation; thereafter the translator is implied.
  - Al-Kirmani's tone toward al-Islah and al-Nusra in this bāb is somewhat sharper than in Bāb 5 — he names *corrupt root* and *irregular disorder* explicitly. The hosts should not soften this, but should also not amplify it into hostility. The dispute is about getting the architecture right; the sharp language names where the disputants have *built on what cannot bear the weight*.
  - Treat *ibda* (origination) as a technical term whose distinction from *inbi'ath* (in-bi-aath; emanation) is load-bearing for the whole treatise. *Ibda* is *origination from nothing* — the act by which the First Intellect comes to be; *inbi'ath* is *emanation* — the act by which the Soul flows from the Intellect, the rational souls from the Soul, and so on. The bāb's *grave error* turns precisely on confusing the two.
  - Do not turn the bāb into a lecture on Aristotelian categories. The hosts should name the categories where they appear (the four kinds of change, the body's dimensions, the contraries-and-correlatives distinction) but always return to *what the analogy is doing for the architecture*. The bāb is testing the chain's joints, not surveying the *Physics*.
  - Treat the closing line *contradictions occur in bodies, not in spirits* with the architectural weight it carries. This is the bāb's compressed final teaching, returning the listener to where the architecture locates opposition. The bāb ends abruptly in the manuscript; the hosts should not paper over the abruptness with synthetic closure — the manuscript trails off, and the abruptness is itself part of how the bāb sits in the treatise.
anchor_passages:
  - "The first *hayula* (prime matter) is illusory motion in the vehicles, and the *hayulanis* (matter-like things) in a single statement of three. What has been said of that in this book contains much confusion. I say, in brief, that motion and stillness are to *hayula* and form as form and *hayula* are to body — for motion and stillness are gentler than body, and body is denser than soul; likewise motion and stillness are gentler than *hayula* and form, and *hayula* and form are denser than motion and stillness. — author of al-Islah, Fasl 1"
  - "If it were as he mentioned, it would have been required that the tangible essences be objects of the symptoms — since they are denser than the symptoms — and that the symptoms be souls for them, since they are gentler than the essences. Rather, what is required is that we look at the limit of body and soul, and then liken to the soul what resembles the limit of the soul, and to the body what resembles the limit of the body. — author of al-Nusra, Fasl 1"
  - "Motion is divided into three sections — comparable to the divisions of body — such as motion from the center, motion toward the center, and motion around the middle. So motion must resemble body: when it is divided, it divides as body divides into length, width, and depth. *Hayula* is not like this, because the parts of *hayula* resemble each other; and because motion resembles body if they are alike in the kind of division, and soul if they are alike in the parts, the first thing that motion resembles is soul — that is, the one motion which is the undivided body. — author of al-Nusra, Fasl 1"
  - "In this chapter the two have departed from likeness and simile, and between us and both of them stands the fact that they have built upon a corrupt root upon which the proof rests; neither the simile nor the analogy by which they represent it is true. — al-Kirmani, Fasl 1"
  - "Motion and stillness, even when they are actual, are two opposites that do not meet in the same place at the same time, whereas *hayula* and form: their existence together cannot dispense with the other, on condition that one of them is an agent — which is form — and the other is an object in which the action occurs — which is *al-hayula*. — al-Kirmani, Fasl 1"
  - "The soul is not embodied to have density or gentleness, for density and gentleness are specific to that which is a body, just as air, which is a body, is specifically gentle, and earth, which is a body, is specifically dense. The soul is the soul, and the evidence is established that it is not embodied. Once the soul is not embodied, then to say of it that it is gentler or more dense, or to make a likeness on that basis, is impossible. — al-Kirmani, Fasl 2"
  - "Motion is that by which a thing's selfsame state changes — either by place, or by quality, or by corruption, or by increase, or by decrease, or by impossibility — and its occurrence is from the mover which is the principle in the thing in which it inheres, naturally and not by width. *Al-hayula* and form are the first emanations following in proportion as emission. — al-Kirmani, Fasl 4"
  - "The First Cause, which is creativity, is the word of the Almighty and Exalted. Its form is *kun* (Be), which is two voweled letters (kaf and nun), and the unvoweled letter — the kaf and the nun — of the word stand in the position of body; motion and stillness stand as the soul. — author of al-Islah, Fasl 5"
  - "It combines two states, just as the word 'Be' combines motion and stillness; so the two states are attributed to that Essence in respect of two honorable relations, one of which is its being a cause, and the other its being effected. The motion that terminates in stillness corresponds to the relation whose cause terminates in an effect, and the stillness whose end is motion corresponds to the relation in which the effect terminates in the cause — for there is no motion or stillness here except by way of analogical understanding. — al-Kirmani, Fasl 5"
  - "As for the Self itself, it is not established for Him that these two letters are the words about which speech here applies — because at this level there is no kaf, no nun, no motion, and no stillness. One cannot say of what is above the First Effect that it is in motion or at rest, or anything like such expressions; rather, what is there is pure ibda (creativity) and complete causation. — al-Nusra (endorsed by al-Kirmani), Fasl 6"
  - "The doctrine and belief in monotheism is that what is other than Allah Almighty — and He is the Creative One and the Originator — had no existence at all; and even if it had, ibda is nothing other than the Creator Himself. — al-Kirmani, Fasl 7"
  - "Bodies are bodies because they are objects; there is no differentiation among them and no contradiction between them in that respect. Difference and contrast lie in the images by which what animates them is animated — not insofar as they are bodies. — al-Kirmani, Fasl 9"
