  references:
    - "Qur'an 36:82 (His command, when He intends a thing, is only that He says to it: Be — *kun fa-yakun* — and it is) — the Qur'anic anchor for al-Islah's reading of *kun* as the word of the First Cause"
    - "Qur'an 42:11 (there is nothing like unto Him — *laysa ka-mithlihi shay'*) — the Qur'anic charter for the bāb's apophatic claim that no created predicate (motion, stillness, *kaf*, *nun*) belongs at the level of the Self itself"
    - "Qur'an 7:54 (He covers the night with the day, [each] seeking it rapidly; and the sun, the moon, and the stars subjected by His command) — the verse establishing motion and order in the natural cosmos as a *predicate of created things*, not of the Creator"
    - "Nahj al-Balagha (Imam Ali AS, Sermon 1, paraphrased) — *He created creation without imagined thought, without need experienced, without motion brought into being, without restlessness of soul* — the apophatic teaching at the originative apex from the side of the Imam's khutbah"
    - "Rahat al-'Aql (Hamid al-Din al-Kirmani) — referenced by al-Kirmani himself in Fasl 1 as the place where the *hayula*-and-form architecture receives its full exposition; the present bāb is in dialogue with it"
    - "Ma'alim al-Din (Hamid al-Din al-Kirmani) — referenced by al-Kirmani himself in Fasl 4 as the place where the body's division into nine sections (vs the three dimensions) is demonstrated"
    - "al-Masabih (Hamid al-Din al-Kirmani, *With Lamps*) — referenced by al-Kirmani himself in Fasl 3 as the place where the soul's not-being-perceived-by-a-sense receives its demonstration"
