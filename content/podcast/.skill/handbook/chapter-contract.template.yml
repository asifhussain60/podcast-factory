# chapter-contract.template.yml
#
# Per-chapter I/O contract for the /podcast extract capability.
# Copy this file to:
#   content/podcast/<source-slug>/chapter-contracts/<chapter-slug>.yml
#
# Then invoke:
#   python3 scripts/podcast/extract_chapter.py <chapter-ref>
#
# The contract is read DETERMINISTICALLY. The extractor never invents fields
# not present here. Any field with a default below is optional; required
# fields are marked REQUIRED.

# ──────────────────────────────────────────────────────────────────────────
# 1. Chapter identity
# ──────────────────────────────────────────────────────────────────────────

# REQUIRED. Path or slug for the source chapter file.
# Resolution order:
#   1. literal path (absolute or repo-relative) → used as-is
#   2. content/podcast/library/*/*/chapters/<chapter_ref>.txt
chapter_ref: ch01-example

# REQUIRED. The downstream bundle slug. Must match the chapter slug after
# the ch## prefix (1:1 chapter ↔ episode mapping, SKILL.md §0).
# Example: chapter ch01-frame-and-first-counsel → slug "frame-and-first-counsel".
slug: example

# REQUIRED. Source bucket — determines output location.
#   book-chapter   → content/podcast/library/<category>/<book-slug>/    (book_slug below)
#   article        → content/podcast/library/<article-slug>/
source_type: book-chapter

# Conditionally required (when source_type is book-chapter or article).
book_slug: null

# Episode number. Leave null to auto-assign from
# content/podcast/.skill/registry.md (next monotonic).
episode_number: null

# Provenance — set when this chapter is a SPLIT derivative of a larger source.
# Format: repo-relative path to the original source chapter.
# Leave null when the chapter file IS the original source (no split occurred).
# See .skill/handbook/extract-capability.md "Splitting policy" for when to split.
derived_from: null

# ──────────────────────────────────────────────────────────────────────────
# 2. NotebookLM steering surface
# ──────────────────────────────────────────────────────────────────────────

# REQUIRED. One-line title for the episode, written for the listener.
title: "The frame and the first counsel"

# REQUIRED. Concrete audience description. Not "general adult".
# This text reaches NotebookLM's Customize box verbatim.
audience: >
  Thoughtful adult readers of classical works who want to follow the author's
  argument as it unfolds — neither a survey nor a critique, but a close walk
  through the text with two attentive companions.

# REQUIRED. The lens. One of:
#   faithful_exposition — present the chapter as-given; no commentary stance
#   personal_application — turn the chapter toward the listener's own life
#   critical_dialectical — engage the chapter as an argument, including its weak points
#   comparative — put the chapter in conversation with other thinkers
angle: personal_application

# REQUIRED. Episode format. One of:
#   deep_dive  — two hosts walk through the source faithfully (default)
#   debate     — each host adopts a role + position and argues from it
# See .skill/handbook/two-host-framing.md (deep_dive) and
# .skill/handbook/debate-framing.md (debate) for the full spec of each.
episode_format: deep_dive

# REQUIRED for episode_format=deep_dive. Two-host dynamic. One of:
#   curious_mind + scholar_companion   (default)
#   skeptic + believer
#   two_skeptics
#   mentor + student
#   two_practitioners
#   custom (then fill host_dynamic_custom)
# Leave null when episode_format=debate (debate uses `debate.host_a.role`
# and `debate.host_b.role` instead).
host_dynamic: curious_mind + scholar_companion
host_dynamic_custom: null

# REQUIRED for episode_format=debate. Defines the proposition under debate,
# each host's role + position, the source moves available to each host, and
# how the episode resolves. Leave null when episode_format=deep_dive.
# Full spec: .skill/handbook/debate-framing.md
#
# Schema:
#   debate:
#     proposition: "<one sentence, phrased as a claim>"
#     host_a:
#       role: "<historical or intellectual perspective>"
#       position: "<positive claim, not 'the opposite of host_b'>"
#       source_moves:
#         - "<quote, passage, or tradition this host draws on>"
#         - ...
#     host_b:
#       role: ...
#       position: ...
#       source_moves: [...]
#     resolution: synthesis | open | host_a_concedes | host_b_concedes | historical_division
debate: null

# Target Audio Overview length. One of: brief | default_deep_dive | longer
# default_deep_dive → 12–15 min, source target 1,800–2,800 refined words
length_target: default_deep_dive

# ──────────────────────────────────────────────────────────────────────────
# 3. Editorial steering (the hidden layer)
# ──────────────────────────────────────────────────────────────────────────

# REQUIRED. 2–4 specific tensions the hosts must reach. NOT generic themes.
# These steer the conversation more than any other field.
key_tensions:
  - "Baba was decent in one direction and destructive in another, and never saw the gap."
  - "The man who was gentle with his wife was the same man who reached for the cane."
  - "Babu inherits both lineages — the warmth and the silence — and has to choose."

# Tone constraints — what NotebookLM hosts must NOT do.
tone_constraints:
  - No cheerful filler. This is grief and reckoning, not nostalgia.
  - Do not soften the cane or the stealing. Name them.
  - Do not modernize the father into a villain. Hold the contradiction.
  - End on the unresolved question, not a takeaway.

# Anchor passages the hosts should quote verbatim (extracted at build time).
# Optional. If empty, the extractor lifts candidates and marks them [LLM-SELECT].
anchor_passages: []

# ──────────────────────────────────────────────────────────────────────────
# 4. Adaptation mode
# ──────────────────────────────────────────────────────────────────────────

# One of:
#   faithful           — preserve source prose; no modern bridges
#   bridge             — preserve source + add 1–2 paragraph "Why this lands today" callout
#   modern_paraphrase  — full rewrite in contemporary idiom; original moves to appendix
adaptation_mode: faithful

# ──────────────────────────────────────────────────────────────────────────
# 5. Phonetic overrides (only for chapters with non-English terms)
# ──────────────────────────────────────────────────────────────────────────

# Inline term → respelling. Layered ON TOP of any handbook lexicon.
# Empty for English-only memoir.
phonetic_overrides: {}

# ──────────────────────────────────────────────────────────────────────────
# 6. Show-notes (optional, for the 99-show-notes.md file)
# ──────────────────────────────────────────────────────────────────────────

show_notes:
  blurb: null            # 1–2 sentence episode description
  related_episodes: []   # slugs of related episodes in the same source
  references: []         # external works cited
