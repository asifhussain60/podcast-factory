name: scientific
description: |
  Scientific tradition whitelist — starter file.
  For peer-reviewed scientific papers, essays, and reports.
  Use philosophical.yml for philosophy-of-science material that isn't itself empirical.

figures:
  # Foundational figures by discipline
  - "Charles Darwin"
  - "Albert Einstein"
  - "Marie Curie"
  - "Richard Feynman"
  - "Rosalind Franklin"
  - "Niels Bohr"
  - "Werner Heisenberg"
  - "Barbara McClintock"
  - "Lynn Margulis"
  - "Donald Knuth"
  - "Alan Turing"
  - "Claude Shannon"
  - "Geoffrey Hinton"
  - "Demis Hassabis"

signal_terms:
  - "hypothesis"
  - "p-value"
  - "confidence interval"
  - "controlled trial"
  - "peer review"
  - "reproducibility"
  - "meta-analysis"
  - "effect size"
  - "preprint"
  - "primary literature"

allowed_enrichment_sources:
  - "Peer-reviewed journal articles (PubMed, arXiv, Nature, Science, Cell, etc.)"
  - "Established textbooks in the relevant discipline"
  - "Reports from established standards bodies (IEEE, ISO, IETF, WHO, etc.)"
  - "Recognized professional society publications"

forbidden_enrichment_sources:
  - "Non-peer-reviewed claims presented as established science"
  - "Pop-science articles that overstate primary findings"
  - "Industry-funded studies presented without conflict disclosure"
  - "Online sources without clear attribution"
  - "Preprints (arXiv etc.) cited without noting they are not peer-reviewed"

tone_preferences:
  - "Preserve hedged language — 'suggests', 'indicates', 'is consistent with' — do not strengthen into 'proves'"
  - "Preserve methodology language — if the source describes a method, the refinement preserves the description"
  - "Distinguish correlation from causation when the source does"

modern_analogy_register:
  preferred_domains:
    - "Engineering analogies (signal-to-noise, feedback loops, control systems)"
    - "Everyday measurement and uncertainty"
    - "Cooking, gardening, navigation as parallels for experimentation"
  avoid_domains:
    - "Quantum-mechanics analogies for human behavior (very common misuse)"
    - "Evolutionary 'just-so' stories that go beyond the evidence"
    - "Marketing 'science' parallels"

quote_attribution_requirements:
  - "Direct attribution to the paper or named figure"
  - "DOI or citation key when available"
  - "Note when the source is a preprint or non-peer-reviewed"
