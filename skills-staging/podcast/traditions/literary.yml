name: literary
description: |
  Literary tradition whitelist — starter file.
  For novels, short fiction, poetry, plays, essays, and memoirs treated as literary works.
  Distinguishes literary analysis from philosophical or theological analysis.

figures:
  - "Shakespeare"
  - "Cervantes"
  - "Dostoyevsky"
  - "Tolstoy"
  - "Chekhov"
  - "Borges"
  - "Toni Morrison"
  - "James Baldwin"
  - "Virginia Woolf"
  - "Marcel Proust"
  - "Italo Calvino"
  - "Gabriel Garcia Marquez"
  - "Naguib Mahfouz"
  - "Saadat Hasan Manto"

signal_terms:
  - "narrative"
  - "voice"
  - "free indirect discourse"
  - "unreliable narrator"
  - "diegesis"
  - "mimesis"
  - "stream of consciousness"
  - "magical realism"
  - "verisimilitude"
  - "intertextuality"

allowed_enrichment_sources:
  - "Established literary criticism on the work in question"
  - "Author's own letters, essays, or interviews"
  - "Translator notes when working with translated texts"
  - "Peer-reviewed literary scholarship"

forbidden_enrichment_sources:
  - "Reader-review aggregations (Goodreads quotes etc.) as authoritative"
  - "Sparknotes / Cliffnotes as primary criticism"
  - "Modern psychological diagnosis applied retroactively to characters"

tone_preferences:
  - "Preserve the work's tone — comic stays comic, tragic stays tragic"
  - "Preserve voice — first-person stays first-person; the narrator's stance matters"
  - "Distinguish narrator from author — what the narrator says is not necessarily what the author believes"
  - "Preserve dialogue structure when refining for audio"

modern_analogy_register:
  preferred_domains:
    - "Other works of literature for comparison (named, attributed)"
    - "Universal human experiences without flattening cultural specificity"
    - "Craft of writing itself (sentence structure, pacing, scene)"
  avoid_domains:
    - "Reducing literature to a self-help lesson"
    - "Treating a novel's themes as a personality test"
    - "Applying contemporary political frames retroactively"

quote_attribution_requirements:
  - "Quote with author name and work title"
  - "Translator name if translated"
  - "Chapter or page reference when available"
