name: islamic
description: |
  Broader Islamic tradition whitelist — starter file.
  For sources that are Islamic but not specifically Ismaili.
  Expand as needed; for Ismaili-specific material, use ismaili.yml.

figures:
  - "Prophet Muhammad"
  - "Caliphs Abu Bakr, Umar, Uthman, Ali (Rashidun)"
  - "Imam Ali ibn Abi Talib"
  - "Imam al-Ghazali"
  - "Ibn Sina (Avicenna)"
  - "Ibn Rushd (Averroes)"
  - "Ibn Arabi"
  - "Jalal al-Din Rumi"
  - "al-Tabari"
  - "Ibn Khaldun"

signal_terms:
  - "shari'ah"
  - "sunnah"
  - "hadith"
  - "ummah"
  - "tawhid"
  - "iman"
  - "ihsan"
  - "fiqh"
  - "tafsir"
  - "ijtihad"

allowed_enrichment_sources:
  - "The Holy Qur'an (any translation, attribute the translator)"
  - "Six canonical Sunni hadith collections (Bukhari, Muslim, Tirmidhi, Abu Dawud, Nasa'i, Ibn Majah) when source itself is Sunni"
  - "Nahj al-Balagha (Imam Ali's sermons)"
  - "Established works of major Islamic philosophers (al-Ghazali, Ibn Sina, etc.)"
  - "Peer-reviewed academic Islamic studies"

forbidden_enrichment_sources:
  - "Sectarian polemics from any direction"
  - "Modern revisionist commentary lacking scholarly grounding"
  - "Online sources without clear attribution"

tone_preferences:
  - "Preserve reverence in theological passages"
  - "Preserve honorifics for Prophet ﷺ and major figures"
  - "When source is Sunni, do not impose Shia framing; when Shia, do not impose Sunni framing — read on the source's own terms"

modern_analogy_register:
  preferred_domains:
    - "Mentorship, apprenticeship, professional ethics"
    - "Constitutional and legal interpretation (for shari'ah, fiqh, ijtihad)"
    - "Institutional integrity vs. individual character"
  avoid_domains:
    - "Pop-culture political parallels"
    - "Analogies that flatten religious obligation to lifestyle choice"

quote_attribution_requirements:
  - "Direct attribution to a named figure"
  - "Source citation"
  - "Translator if translated"
  - "Verification the quote appears in an allowed_enrichment_source"
