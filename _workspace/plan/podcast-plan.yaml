  - id: P7
    wave: W2
    name: "Heartbeat + status CLI + wait-banner"
    effort: 1-2 days
    priority: high
    depends_on: [P5, P6]
    why: |
      Currently zero visibility into in-flight work. User waits 15+ minutes
      with no signal whether claude -p is making progress, hung, or dead.
      Heartbeat thread + read-only CLI eliminates this anxiety AND lays the
      data plane for P8 (HTTP API) and P12 (live dashboard).
    tasks:
      - id: P7.1
        title: "Heartbeat daemon thread in scripts/podcast/_progress.py"
        files:
          - scripts/podcast/_progress.py
          - scripts/podcast/orchestrate_book.py
        spec:
          path: "<book>/_system/heartbeat.json"
          interval_sec: 30
          fields:
            - pid
            - phase
            - phase_status
            - elapsed_in_phase_s
            - last_chunk_written
            - last_chunk_mtime
            - last_log_line
            - subprocess_pid
            - hostname                       # for R3 multi-Mac mitigation
            - cost_so_far_usd                # P6 cost ledger snapshot
          write: "atomic (tmp + rename); never block on disk"
        acceptance:
          - "heartbeat.json updates within 30s while orchestrator runs"
          - "Thread is daemon=True; orchestrator exit terminates it cleanly"
          - "Zero impact on claude -p timing (heartbeat is side-channel only)"
      - id: P7.2
        title: "Per-LLM-call heartbeat bumps"
        files:
          - scripts/podcast/_chunking.py
          - scripts/podcast/_authoring.py
        spec: |
          Before each chunked window / per-source-chapter / per-chapter LLM call,
          call _progress.bump_heartbeat(label="05-refine-english · win-007 · 3082 words").
        acceptance:
          - "Within 30s of any LLM call starting, heartbeat label reflects it"
      - id: P7.3
        title: "scripts/podcast/orchestrator_status.py (CLI inspector + wait-banner)"
        files:
          - scripts/podcast/orchestrator_status.py        # NEW
        spec: |
          Read-only. Reads heartbeat.json + state.json + _chunks/ dir + log tail.
          Emits the boxed banner per meta.async_safety.wait_banner_format.
          Usage:
            python3 scripts/podcast/orchestrator_status.py <book-slug>
            python3 scripts/podcast/orchestrator_status.py --all
            python3 scripts/podcast/orchestrator_status.py --json
            python3 scripts/podcast/orchestrator_status.py --banner [--ascii]
            python3 scripts/podcast/orchestrator_status.py --eta            # P10 later
        acceptance:
          - "Runs in <1s on a 260-page book's state"
          - "Falls back gracefully if heartbeat.json missing (uses log tail)"
          - "Exit code 0 if process alive, 2 if dead, 1 if state stale (>5min)"
          - "Boxed banner preserves the row/column structure of meta.async_safety.wait_banner_format"
          - "`--ascii` flag emits ASCII-fallback banner for non-UTF8 terminals"
      - id: P7.4
        title: "JSONL event log for downstream consumers"
        files:
          - scripts/podcast/_progress.py                  # new: append_event()
          - scripts/podcast/_chunking.py
          - scripts/podcast/_authoring.py
        spec:
          path: "<book>/_system/events.jsonl"
          line_schema: {ts, phase, step, total, label, level, msg}
          append_only: true
        acceptance:
          - "events.jsonl tails cleanly with `tail -F`"
          - "Schema documented in scripts/podcast/_progress.py docstring"

      - id: P7.5
        title: "Heartbeat exposes learning-substrate state (P-9 visibility)"
        files:
          - scripts/podcast/_progress.py                  # extend heartbeat schema
        spec: |
          Add new fields to `<book>/_system/heartbeat.json`:
            - learning_findings_appended_this_run: int
            - learning_proposals_open: int        (count of _learning/proposals/*.md)
            - learning_promoted_total: int        (count of _learning/promoted/*.md)
            - learning_fixture_count: int         (count of _learning/fixtures/*/)
            - last_trainer_outcome: enum          (NEVER_RAN | PROMOTED | ARCHIVED | RED_HARNESS | null)
            - challenger_version: str             (from _rules.py CHALLENGER_VERSION)

          These fields are read-only snapshots — the heartbeat thread never
          modifies the substrate. Fields are computed from filesystem state at
          each heartbeat tick (cheap; bounded directory listings).
        acceptance:
          - "heartbeat.json includes all 6 new learning fields"
          - "Fields update within 30s of any substrate change (file appears in promoted/ or fixtures/)"
          - "Zero impact on claude -p timing (verified by tiny-book wall-clock comparison)"

  - id: P8
    wave: W2
