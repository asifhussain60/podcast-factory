  - id: P9
    wave: W3
    name: "Sample corpus validation (graduated 30p → 865p, 7 books)"
    effort: 1 week wall-clock
    priority: high
    depends_on: [P8]
    why: |
      Prove the pipeline handles the full size range BEFORE adding control plane
      (W4) or polish (W5). Each run also feeds the trainer with cross-book examples.

      Per principle P-1, every run is on `claude -p` (Claude Code primary). The
      Anthropic Python SDK is NOT used in the workhorse phases.

      Per principle P-9, every shipped book MUST make the system measurably
      smarter. The per-book ship gate (P9.0) verifies the learning loop closed
      cleanly: findings appended, health score written, trainer ran, regression
      harness stayed green. A book that ships clean WITHOUT triggering any
      learning-loop activity is suspicious — the gate surfaces a P1 warning.
    per_book_ship_gate:                     # applies to every P9.* row
      - "Cost ledger row appended for every phase that called claude -p"
      - "Findings appended to _learning/findings.jsonl (≥1 record OR documented zero-findings rationale)"
      - "Health score written to _learning/health/<slug>.json; health-trend.md row appended"
      - "Trainer ran; outcome is PROMOTED or ARCHIVED (never NEVER_RAN unless documented)"
      - "test_challenger.py exits 0 after the trainer's commit (no fixture regressed)"
      - "If trainer promoted a rule, CHALLENGER_VERSION bumped by 0.1 in _rules.py"
