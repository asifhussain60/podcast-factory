            <!-- These guidances were learned from N prior books -->
            <addendum signature="..." phase="05-refine-english">
              ...
            </addendum>
            </learned-addenda>
          R9 cap: at most 5 addenda per phase. When a 6th is proposed, oldest
          (by authored_at) is moved to content/podcast/.skill/handbook/_learned-addenda/_archive/.
          Trainer agent spec §3 (Cluster + Hypothesize) extended with:
            "If proposal targets a workhorse phase (05-refine-english, 06-
             phonetics, 07-chapter-design, 08-enrichment, 11-per-chapter),
             write a phase-prompt addendum INSTEAD OF (or IN ADDITION TO)
             a _rules.py DENY-list edit. Phase-prompt addenda are subject to
             P19.2 regression-fixture gating before write."
        depends_on_local: [P13.1, P2.6]
        acceptance:
          - "_learned-addenda/ directory exists with README.md documenting schema + R9 cap"
          - "_authoring.py prompt assembly reads addenda matching current phase and concatenates them in `<learned-addenda>` XML block"
          - "R9 cap enforced: 6th addendum to same phase triggers FIFO eviction (oldest → _archive/)"
          - "podcast-trainer.agent.md Protocol §3 documents the addendum-writing flow with the 5-cap"
          - "Schema validation: every addendum file's frontmatter validates against the schema"

      - id: P19.2
        title: "Phase-prompt regression fixtures + Goodhart guard"
        files:
          - content/podcast/.skill/_learning/fixtures/phase_prompts/   # NEW dir tree
          - content/podcast/.skill/_learning/fixtures/phase_prompts/05-refine-english/   # 3+ fixtures
          - content/podcast/.skill/_learning/fixtures/phase_prompts/06-phonetics/        # 3+ fixtures
          - content/podcast/.skill/_learning/fixtures/phase_prompts/11-per-chapter/      # 3+ fixtures
          - scripts/podcast/test_phase_prompts.py                       # NEW
        spec: |
          For each workhorse phase that accepts addenda, ship at least 3
          regression fixtures:
            input.md       — input text for the phase
            expected.json  — expected output structural properties (header count,
                             paragraph count, word-count range, key phrases that
                             MUST or MUST NOT appear)
          test_phase_prompts.py runs each phase prompt assembly with addenda
          loaded, drives a mock-or-real claude -p call against input.md, and
          asserts expected.json properties hold within tolerance.
          Goodhart guard: when trainer proposes a new addendum, the proposal
          must FIRST pass test_phase_prompts.py against the existing fixtures.
          If it fails ANY fixture, the proposal is archived (per the same
          flow as test_challenger.py for _rules.py edits). Fixtures are
          HUMAN-AUTHORED ONLY — trainer NEVER adds or modifies fixtures
          (same anti-overfit rule as test_challenger.py per agent INVARIANTS).
        depends_on_local: [P19.1]
        acceptance:
          - "≥3 fixtures per phase under fixtures/phase_prompts/<phase>/"
          - "test_phase_prompts.py exits 0 against current fixtures (post-P19.1 substrate; no addenda yet)"
          - "Trainer addendum proposals pass test_phase_prompts.py BEFORE write; failing proposals archived with tombstone"
          - "podcast-trainer.agent.md INVARIANTS section reaffirms: trainer does not author or modify phase_prompts fixtures (only humans)"
          - "CI: test_phase_prompts.py runs on every PR touching scripts/podcast/_authoring.py OR content/podcast/.skill/handbook/_learned-addenda/"

      - id: P19.3
        title: "Health-score recursion — next-book post-addendum verification"
        files:
          - scripts/podcast/_authoring.py                  # invoke_trainer end-of-book check
          - .github/agents/podcast-trainer.agent.md        # Protocol §END addendum-revert flow
        spec: |
          After an addendum lands on a phase, the NEXT book that runs through
          that phase must show a non-worse health-score component for the
          check_ids the addendum targeted. Specifically:
            • Trainer's end-of-run audit (invoke_trainer in _authoring.py)
              records: addenda_in_effect: [<phase>/<signature>, ...]
            • At next-book trainer pass, compute per-signature health-score
              delta vs. last-book-with-this-signature
            • If delta is WORSE (more findings of the same signature class),
              the addendum is REVERTED automatically: file moved from
              _learned-addenda/<phase>.md to _learned-addenda/_archive/
              with a revert-tombstone explaining the regression
            • If delta is equal or better, addendum stays
          This closes the loop on "is the system actually getting smarter?" —
          an addendum that doesn't improve outcomes self-evicts.
        depends_on_local: [P19.1, P19.2]
        acceptance:
          - "invoke_trainer records addenda_in_effect in end-of-book audit"
          - "Next-book trainer pass computes per-signature health delta and reverts regressed addenda"
          - "Revert-tombstone in _learned-addenda/_archive/ cites the regression measurements"
          - "If addendum reverts 2+ times for the same signature, signature is escalated to human-review queue (P14 dashboard surface)"

