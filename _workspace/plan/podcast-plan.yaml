# =============================================================================
# Podcast Pipeline — Phased Plan (CANONICAL)
# =============================================================================
# Scope: podcast agent + skill ONLY. Journal is OUT OF SCOPE.
#
# v3 (2026-05-19) — three structural changes from v2:
#   1. SEQUENTIAL RENUMBERING. Phases are now P1..P20, organized into 6 named
#      waves (W1..W6). Each wave is a unit of autonomous, scheduled-task
#      execution with a single DONE signal sourced from acceptance-criteria.md.
#      The legacy P0a / P0b / P0c / P0 / P1..P7 numbering is retired; back-compat
#      aliases live in `legacy_id_map` for one release.
#   2. CLAUDE CODE IS THE PRIMARY EXECUTION MECHANISM. The wholesale
#      Anthropic-Python-SDK migration formerly in P3 is CANCELLED. `claude -p`
#      (Claude Code in headless mode, --permission-mode acceptEdits) remains
#      the workhorse for every LLM call in scripts/podcast/. The Python SDK is
#      reserved for narrow side-channel cases (status-API helper, cost-ledger
#      token counting) — never as a swap for the primary execution path.
#   3. NUMERIC/SYMBOLIC DISAMBIGUATION is folded in as a first-class phase (P4)
#      in Wave 1. Adds the challenger Loop N, the abjad-numerals shared file,
#      the disambiguation handbook, and the orchestrator's Phase-0d numeric-scan
#      step. Worked example: Master & Disciple Ch-02.
#
# v3.2.1 (2026-05-19, later still) — two-kernel acceptance from the cowork-brief review:
#   1. SKILL.md INTELLIGENCE-MODULE LAYER documented. The
#      content/podcast/.skill/handbook/ directory was already the swap point but
#      the swap rule was implicit. v3.2.1 makes it explicit in SKILL.md §10:
#      adding a new framing strategy / NotebookLM trick / phase-prompt addendum
#      requires editing exactly ONE folder — no SKILL.md, agent-file, or
#      journal-side edits. The deprecation channel (DEPRECATED header) and the
#      check-fixture pairing rule (P-9) are now first-class doc.
#   2. P17.1 SOURCE-ADAPTER REGISTRY added (W6, trigger-gated). Adapter pattern
#      for new input formats (Urdu PDFs, scanned images, video transcripts).
#      Lives at scripts/podcast/adapters/ as a Python package. Uniform
#      SourceAdapter Protocol (can_handle / extract / normalize / emit). Azure
#      creds stay in the shared _azure.py helper — adapters don't know about
#      Keychain plumbing. Rejected alternative: monolithic --source-type flag
#      in _azure.py — would inflate the file by 100-300 LOC per format and
#      entangle unrelated deps (Whisper for video ≠ Azure for PDF).
#   Rejected from the same brief (with rationale in the review response):
#     • New _workspace/plan/podcast-plan-review.md duplicate doc.
#     • `manifest.yaml` versioning of intelligence — conflicts with the
#       _learning/ substrate's promotion/archive log; two truth sources.
#     • `pipeline/adapters/*.js` + `server/src/pipeline/` — wrong language
#       (this pipeline is Python) and wrong location (server/ is the journal
#       site's Node proxy, unrelated to podcast).
#     • `skills-staging/podcast/pipeline/` — skills-staging is the intelligence
#       layer per framework.md; runtime adapters belong in scripts/podcast/.
#
# v3.2 (2026-05-19, later) — DoR-for-execution rebalancing. Eleven changes from v3.1:
#   1.  W5 ABSORBED into W1/W2. P15 split into P5.4 (constants module, W1) +
#       P8.6 (bulk find/replace + HTML doc rewrite, W2). P16 collapsed into P8.8
#       (W2; single commit). W5 marked OBSOLETED; back-compat in legacy_id_map.
#       Rationale: shipping rename BEFORE W3 corpus run prevents citation rot
#       in _learning/promoted/ tombstones; "zero in-flight" naturally true in W2.
#   2.  P2.6 ADDED (W1): golden-fixture refinement determinism. Two runs on the
#       tiny-book fixture must produce refined-english.md within bounded text
#       similarity (Levenshtein ratio ≥ 0.90, structural-key parity 100%).
#       Operationalizes "bit-stable refinement" quality contract.
#   3.  P5.1 SHIPPED (2026-05-19, later): --permission-mode acceptEdits added to
#       subprocess.run([CLAUDE_CMD, "-p", ...]) at _authoring.py:99 and
#       _chunking.py:255. Two-line band-aid per principle P-2.
#   4.  P5.4 ADDED (W1): scripts/podcast/_phases.py — single source of truth for
#       the 14-step phase names. Eliminates literal-string phase IDs.
#   5.  P8.6 ADDED (W2): bulk phase rename + HTML doc rewrite. Runs after P7+P8
#       ship, before W3 corpus begins. Prereq_gate "zero in-flight" naturally
#       satisfied in this window.
#   6.  P8.7 ADDED (W2): D3.js view upgrade. Six diagrams across four HTML views
#       (wave DAG, phase Gantt, P4 decision tree, pipeline flowchart, agent
#       topology, acceptance heatmap). Bundled offline; honors view/index.html's
#       "offline by design" promise.
#   7.  P8.8 ADDED (W2): agent dedup + isolation CI. Single-commit collapse of
#       former P16's 4 sub-tasks.
#   8.  P10.1 EXTENDED: ETA model parallel-targets cost-per-phase (USD), not just
#       wall-clock. Closes loop with P6.3 hard cap — refuses W3 invocation when
#       PREDICTED cost exceeds cap.
#   9.  P11 DEMOTED to documentation-only. Q1.blocks: P12 removed. P12 depends
#       on P7.1 heartbeat schema (already provides hostname field), not on a
#       formal multi-mac decision doc.
#   10. P12.3 ADDED: mutation API pytest harness (FastAPI TestClient + subprocess
#       mock). Today's P12.1 acceptance is "verified on a live run" — too thin
#       for a surface including DELETE /books/{slug}?rollback_branch=true.
#   11. P19 REWRITTEN as P19.1/P19.2/P19.3 (was 1 line in W6):
#       - P19.1 phase-prompt addendum substrate
#       - P19.2 phase-prompt regression fixtures (3+ per phase)
#       - P19.3 health-score recursion (next-book post-addendum verification)
#       R9 risk added: addenda compound silently (cap ≤5 per phase, FIFO eviction).
#       P1.4 exit-code 4 added: "wave done but P-9 invariant violated."
#
# v3.1 (2026-05-19, late) — production-readiness pass for the LEARNING LOOP:
#   The `_learning/` closed-loop substrate (sense → aggregate → propose → test →
#   promote, plus the post-book podcast-trainer pass) was shipped 2026-05-18 and
#   has already produced two promoted rules (J2 bold-header, R-NOSURPRISE
#   companion). The plan inherited the substrate but did not own its production-
#   readiness. v3.1 corrects that:
#     • New principle P-9 (system must measurably improve every shipped book).
#     • New W1 task P1.4: scripts/podcast/run_wave.py (kickoff harness; was
#       referenced 8× but unowned).
#     • New W1 task P2.5: E2E test for the learning loop (tiny-book → ledger →
#       aggregate → propose → regression-green).
#     • New W1 task P6.4: trainer reads cost-ledger.jsonl (closes Q3 with an
#       implementation row, not just a "resolved" verdict).
#     • New W2 tasks P7.5 / P8.5: heartbeat + dashboard surface learning state.
#     • New W3 metrics: every book records promotions, fixture deltas, health-
#       score trend; trainer outcome is a ship gate.
#     • New W5 task P15.4: trainer phase-rename round-trip is asserted.
#     • New R7: learning loop silently degrades (fixture coverage, promoted-rule
#       regression).
#     • intelligence_sources extended with _learning/ canonical paths.
#     • acceptance-criteria.md mirrors every new row; done_when extended.
#   The substrate code itself is NOT changed by v3.1 — only owned and gated.
#
# See README.md for scope boundary, research/findings.md for citations,
# view/index.html for visual architecture diagrams,
# numeric-symbolic-disambiguation-plan.md for P4's full design document.
# =============================================================================

meta:
  version: "3.2.1"
  created: 2026-05-19
  refined: 2026-05-19
  gap_closed: 2026-05-19
  execute_readied: 2026-05-19
  restructured: 2026-05-19          # v3 restructure: waves + sequential ids + SDK cancel + P4 numeric
  learning_loop_owned: 2026-05-19   # v3.1: plan now owns _learning/ substrate production-readiness
  rebalanced: 2026-05-19            # v3.2: W5 absorbed into W1/W2; P5.1 shipped; D3 view upgrade owned; P19 self-learning expanded
  modularized: 2026-05-19           # v3.2.1: SKILL.md intelligence-module layer documented; P17.1 source-adapter registry added
  owner: asif

  primary_execution_mechanism: claude-code-cli
  primary_execution_rationale: |
    The podcast agent and skill are DESIGNED FOR and EXECUTED VIA Anthropic
    Claude Code. The orchestrator's LLM workhorse is `claude -p` (Claude Code
    in headless mode) invoked with --permission-mode acceptEdits. This preserves
    the agent runtime (tool use, file-edit, multi-turn refinement, permission
    semantics) that the skill design depends on, and avoids re-implementing the
    agent protocol on top of a raw Python SDK client.

    The Anthropic Python SDK is used ONLY for narrow, side-channel use cases:
      • status-API helper calls (P8) — e.g., one-shot 'summarize this state'
      • cost-ledger token counting (P6) — usage extraction from claude -p stdout
    Never as a replacement for the primary LLM execution path.

  legacy_id_map:                    # v2 → v3 → v3.2 ID translation; one release of back-compat
    P0a: P1
    P0b: P2
    P0c: P3
    P0d: P4                         # P0d was the v2-draft slot for numeric/symbolic; now P4
    P0:  P5
    "P3.4 (cost-only)": P6
    P1:  P7
    P2:  P8
    P3:  CANCELLED                  # SDK migration phases (P3.1, P3.2, P3.3, P3.5, P3.6) cancelled
    P4:  P9
    "P4.8 (eta)": P10
    "P5.0": P11
    "P5.1+P5.2": P12
    "P5.3": P13
    "P5.4": P14
    "P6.1": OBSOLETED_BY_P5.4_AND_P8.6   # v3.2: phase rename split; W5 absorbed
    "P6.2+P6.3": OBSOLETED_BY_P8.8       # v3.2: agent dedup collapsed; W5 absorbed
    "P6.4": CANCELLED               # SDK token-count parity — no SDK to compare against
    "P6.5": CANCELLED               # SDK fallback shim — no SDK to fall back from
    "P7.1": P17
    "P7.2": P18
    "P7.3": P19
    "P7.4": P20
    # v3.2 obsoletions (W5 absorbed into W1/W2):
    P15: OBSOLETED_BY_P5.4_AND_P8.6      # see meta v3.2_summary change #1
    P16: OBSOLETED_BY_P8.8               # see meta v3.2_summary change #1
    "P15.4": OBSOLETED_BY_P5.4_AND_P8.6  # trainer phase-rename round-trip now in P8.6 acceptance

  legacy_cleanup_basenames:         # consumed by repo-surgeon Pass 5 L8
    - chatgpt-podcast-skill-prompt
    - folder-cleanup-prompt
    - podcast-refactor-executive-summary
    - podcast-orchestrator-large-books

  branch_strategy: "feature branches off develop, merge via --no-ff"
  primary_mac: true                 # Azure-backed pipeline runs here (see ../primary-mac-activation.md)

  scope_in:
    - .github/agents/podcast-orchestrator.agent.md
    - .github/agents/podcast-trainer.agent.md
    - .github/agents/podcast-challenger.agent.md   # not yet in .github/; migrated by P16
    - .github/agents/podcast-extract.agent.md      # not yet in .github/; migrated by P16
    - skills-staging/podcast/**
    - scripts/podcast/**                            # includes scripts/podcast/tests/
    - content/podcast/**
    - docs/architecture/podcast-*.html              # podcast-facing architecture docs (rename surface, P15)

  scope_out:
    - .github/agents/journal-*.agent.md
    - .github/agents/CORTEX.agent.md
    - .github/agents/reconcile.agent.md
    - .github/agents/repo-surgeon.agent.md
    - infra/claude-agents/**                        # explicit DELETION target after P16 migration
    - skills-staging/journal/**
    - scripts/memoir/**
    - scripts/site/**
    - content/babu-memoir/**
    - content/_shared/**                            # journal reads READ-ONLY (Arabic); podcast writes ONLY to content/_shared/arabic/06-abjad-numerals.md per P4
    - docs/architecture/journal-*.html
    - docs/architecture/index.html                  # cross-cutting nav, edit only when both sides agree

  scope_in_writes_to_shared_exception:              # one-time exception for P4
    path: content/_shared/arabic/06-abjad-numerals.md
    rationale: |
      P4 (Numeric/Symbolic Disambiguation) creates ONE cross-skill shared file:
      the canonical abjad-numerals reference, used by both podcast pre-refined
      mode AND any future journal Arabic-handling. The file's location follows
      the existing `content/_shared/arabic/00-..05-` pattern. After creation,
      the file is READ-ONLY for both skills. No other writes to content/_shared/**
      are permitted from the podcast skill.

# -----------------------------------------------------------------------------
# Waves — autonomous scheduled-task units
# -----------------------------------------------------------------------------
# Each wave is one scheduled task (cron / `/schedule` skill / launchd). The
# task kicks off the wave, runs its phases sequentially (or in parallel where
# noted), checks the wave's DONE signal against acceptance-criteria.md, and
# either advances to the next wave (if gated open) or halts for human review.
# -----------------------------------------------------------------------------
waves:

  - id: W1
    name: "Foundation & Guardrails"
    phases: [P1, P2, P3, P4, P5, P6]
    schedule_intent: "Overnight; idempotent; zero LLM cost (except P2.5/P2.6 tiny-book passes ~<$2)"
    parallelism: "P1, P2, P3, P4 in parallel; P5 sequential after P4; P6 sequential after P5; P1.4 (run_wave.py) before any other phase can be kicked off; P2.5 sequential after P2.2 (learning E2E builds on sunny-day E2E); P2.6 sequential after P2.2 (determinism check builds on sunny-day E2E); P5.4 (phase constants) parallel with P5.1/P5.2 (perm-mode fix)"
    blast_radius: "Local — no external API calls except P2.5+P2.6 tiny-book passes (<$2); CI workflows created but not executed"
    kickoff_cmd: "python3 scripts/podcast/run_wave.py 1"
    done_signal: "All P1–P6 rows in acceptance-criteria.md `### Wave 1` group checked, including P1.4 (run_wave.py), P2.5 (learning-loop E2E), P2.6 (refinement determinism), P4.4b (Loop N fixture), P5.4 (phase constants module), and P6.4 (trainer cost-ledger hook)"
    gates_open_next: "Wave 2 (after human review of W1 commit AND test_challenger.py green on develop)"
    learning_loop_gate: |
      W1 is the wave that OWNS the learning loop becoming a load-bearing
      invariant. After W1, every PR to scripts/podcast/, .github/agents/
      podcast-challenger.agent.md, or content/podcast/.skill/handbook/ MUST
      pass the regression harness in CI. The substrate's two existing
      promotions (J2 bold-header + R-NOSURPRISE companion) plus the seven
      bootstrap fixtures stay green through W1 — no plan task is allowed to
      regress them.

  - id: W2
    name: "Observability + Polish (formerly W5)"
    phases: [P7, P8]
    schedule_intent: "Single daytime+overnight window; ~1.5 wk wall-clock; trivial LLM cost"
    parallelism: "P7 then P8; P8 depends on P7's heartbeat schema; P8.6/P8.7/P8.8 sequential at the END of W2 (after P8.1-P8.5 ship; before W3 starts so zero-in-flight is naturally true)"
    blast_radius: "Local — new daemon thread + localhost FastAPI service + bulk phase rename across scripts/podcast/ + agent dedup deletion of infra/claude-agents/"
    kickoff_cmd: "python3 scripts/podcast/run_wave.py 2"
    done_signal: "All P7–P8 acceptance rows checked; dashboard reachable at http://127.0.0.1:8765/; phase rename schema_version=2 across live state files; agent picker shows each agent exactly once; isolation_check + dedup_check CI green; D3 views render the 6 diagrams"
    prereq_gate_for_p8_6_p8_8: "scripts/podcast/orchestrator_status.py --all --json | jq '[.books[] | select(.phase_status==\"running\" or .phase_status==\"failed\")] | length' == 0  (naturally satisfied before W3 begins)"
    gates_open_next: "Wave 3"
    absorbed_from_w5: |
      v3.2: P15 (phase rename) split into P5.4 (W1 constants) + P8.6 (W2 bulk rename + HTML).
      P16 (agent dedup + isolation CI) collapsed into P8.8. P8.7 D3 view upgrade added.
      W5 marked OBSOLETED — see waves[id=W5].

  - id: W3
    name: "Corpus Validation"
    phases: [P9, P10]
    schedule_intent: "One graduated run per scheduled invocation; book picked from queue"
    parallelism: "Strictly sequential — one book per invocation; ETA model (P10) trains on completed runs; P9.8 yield report runs ONCE after P9.7"
    blast_radius: "BIG — full Azure OCR + claude -p spend per run; uses cost ledger from P6"
    kickoff_cmd: "python3 scripts/podcast/run_wave.py 3 --book <slug>"
    done_signal: "All 7 books in P9 either shipped clean OR documented failure-mode + remediation; P10 ETA model within ±30% on held-out book; P9.8 yield report committed and shows fixture_coverage_pct trending UP"
    gates_open_next: "Wave 4 (after P9.8 yield report human-reviewed)"
    cost_guardrail: "P6 hard halt enforced (default $50); wave aborts if hard cap hit"
    learning_loop_gate: |
      Each book in W3 MUST satisfy the per_book_ship_gate (defined under P9):
      cost-ledger row, finding emission, health score, trainer outcome,
      regression harness green. The W3 yield report (P9.8) is the W3 acceptance
      artifact for P-9 — without it, W3 is not done.

  - id: W4
    name: "Control Plane"
    phases: [P11, P12, P13, P14]
    schedule_intent: "Single window; mutation surface only, no autonomous LLM spend"
    parallelism: "P11 first (decision); P12+P13 parallel; P14 last"
    blast_radius: "Mutation API live; pause/resume/delete enabled; bearer-token auth"
    kickoff_cmd: "python3 scripts/podcast/run_wave.py 4"
    done_signal: "All P11–P14 rows checked; 2 books run truly parallel in P12 acceptance"
    gates_open_next: "Wave 5"

  - id: W5
    name: "OBSOLETED (work absorbed into W1/W2 by v3.2)"
    status: OBSOLETED
    phases: []                       # was [P15, P16] — both phases redirected
    schedule_intent: "N/A — wave no longer executable"
    parallelism: "N/A"
    blast_radius: "N/A"
    kickoff_cmd: "N/A — `run_wave.py 5` returns exit 0 with explanatory message"
    done_signal: "Auto-DONE: P5.4 (W1) + P8.6 + P8.7 + P8.8 (W2) collectively deliver everything W5 promised"
    gates_open_next: "Wave 6 (trigger-gated, gated on W2 done_signal, not on W5)"
    redirect: |
      v3.2 absorbed P15 + P16 into W1+W2 to eliminate the post-corpus phase-name
      citation rot in _learning/promoted/ tombstones and to remove the 2-3 day
      W5 schedule overhead. See meta.v3.2 changes #1.
        P15 (phase rename)            → P5.4 (W1) + P8.6 (W2)
        P15.4 (trainer round-trip)    → folded into P8.6 acceptance
        P16.1 (migrate agents)        → P8.8 sub-step
        P16.2 (dedup check + CI)      → P8.8 sub-step
        P16.3 (isolation check + CI)  → P8.8 sub-step
        P16.4 (delete infra/)         → P8.8 sub-step
      W5 row kept in waves[] only so `run_wave.py 5` retains a no-op handler;
      `scripts/podcast/run_wave.py --check 5` prints the redirect explanation
      and exits 0.

  - id: W6
    name: "Deferred + Self-Learning"
    phases: [P17, P17.1, P18, P19, P20]                # v3.2.1: P17.1 source-adapter registry added as sibling to P17
    schedule_intent: "NOT time-scheduled — each phase has its own `promote_when` trigger"
    parallelism: "N/A — promoted individually as triggers fire. P19.1/P19.2/P19.3 sequential (substrate → fixtures → recursion verification)."
    blast_radius: "Per-phase; see individual phases. P19 self-learning addenda are gated by P19.2 regression fixtures + R9 cap (≤5 addenda per phase, FIFO eviction)."
    kickoff_cmd: "manual — `python3 scripts/podcast/run_wave.py 6 --phase P17` after promote_when trigger fires"
    done_signal: "Each promoted phase ships its own acceptance rows"
    gates_open_next: "N/A (terminal wave)"

