  - "P0a → P5 all merged to develop with passing CI (P0a/P0b/P0c are blockers for P3+)"
  - "P0c.1 — chatgpt-podcast-skill-prompt reference repaired in docs/architecture/podcast-overview.html"
  - "P0c.2 — no other broken references from the 2026-05-19 legacy-file cleanup"
  - "scripts/podcast/_boundary_check.py exits 0; no automatic writes outside content/podcast/**"
  - "E2E test (P0b) passes on tiny-book fixture; PR gate enforces it"
  - "Dashboard at http://127.0.0.1:8765/ can: list, start, resume, retry, delete books"
  - "Full pipeline run on Rasail Ikhwan (865p) completes with structured cost ledger"
  - "Zero `subprocess.run([CLAUDE_CMD,...])` calls remain in scripts/podcast/ (after P6.5)"
  - "isolation_check CI job is green; agent-dedup CI script exits 0"
  - "Agent picker shows each agent exactly once (P6.2 dedup verified)"
  - "podcast-challenger / podcast-extract / ui-reviewer migrated to .github/agents/"
  - "Phase rename to 01-preflight..14-done complete; schema_version=2 across all live state files"
  - "docs/architecture/podcast-*.html updated in lockstep with code phase rename"
  - "podcast-orchestrator.agent.md updated to reference the new service + status CLI"
  - "Manual library handoff documented in skills-staging/podcast/SKILL.md"
  - "Q1 (multi-Mac) resolved via P5.0; multi-mac-decision.md committed"
