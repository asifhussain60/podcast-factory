          - "Auth tests verify 401 for missing/invalid bearer; 200 with valid"
          - "Audit row asserted for every mutation flow"
          - "Idempotency asserted for pause+pause AND resume+resume"
          - "DELETE without ?rollback_branch=true keeps git branch (verified by mock not called)"
          - "Cross-book parallel mutation test passes without state corruption"
          - "Tests use TestClient + Popen mock — no live subprocess, no live API spend"
          - "Tests run in <30s wall-clock (CI-fast)"

