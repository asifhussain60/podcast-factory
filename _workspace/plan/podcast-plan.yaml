          _workspace/plan/numeric-symbolic-disambiguation-plan.md §3:
            - 02-glossary.md: add Twelve Jazāʾir, Seven Seas (Yaʿqūbī),
              Seven Oft-Repeated, Asāas, Hisab al-Jummal entries
            - 03-source-integrity-notes.md: add Numeric/Symbolic enumeration register
              + Anachronism register tables
            - ch02-scaffolding.md: insert Numeric Disambiguation section between
              Podcast Segment Map and Recurring Refrain; append NotebookLM instructions
            - 06-human-review-checklist.md: add §J Numeric/Symbolic Enumeration Review
              with 9 checkboxes + failure-mode escalation
        acceptance:
          - "All 4 M&D NotebookLM files updated per the plan §3 spec"
          - "Cross-references between files are consistent (e.g., glossary entry references the integrity-notes register row)"
          - "Decision log on file: 12-jazāʾir = both (symbolic + historical); cryptic sphere letters = NEEDS HUMAN REVIEW"

      - id: P4.8
        title: "Update plan staleness signals + intelligence sources for P4 deliverables"
        files:
