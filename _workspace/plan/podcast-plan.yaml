          ~half-day commit.
        files:
          - .github/agents/podcast-challenger.agent.md    # NEW (materialize with staged Loop N edits)
          - .github/agents/podcast-extract.agent.md       # NEW (materialize)
          - .github/agents/ui-reviewer.agent.md           # NEW (materialize)
          - infra/claude-agents/                          # DELETE entire directory
          - scripts/install-claude-skills.sh              # idempotent rewrite: materializes .claude/agents/ from .github/agents/
          - scripts/check_agent_dedup.py                  # NEW — diff name sets between dirs
          - scripts/podcast/_isolation_check.py           # NEW — AST scan: scripts/podcast/ does not import scripts/site/ or scripts/memoir/
          - .github/workflows/podcast-isolation.yml       # NEW — runs dedup_check + isolation_check + boundary_check
        spec: |
          Single PR. Sequence within the commit:
            1. Materialize the 3 missing agents into .github/agents/.
            2. `git rm -r infra/claude-agents/`.
            3. Rewrite install-claude-skills.sh:
               - Reads .github/agents/*.agent.md
