# -----------------------------------------------------------------------------
# Guiding principles
# -----------------------------------------------------------------------------
principles:
  - id: P-1
    name: "Claude Code is the primary execution mechanism"
    detail: |
      `claude -p --permission-mode acceptEdits` is the canonical LLM-call site for
      every workhorse phase (0b refine-english, 0c phonetics, 0d chapter-design,
      0e enrichment, per-chapter framing/build/challenger, trainer). The Anthropic
      Python SDK is RESERVED for narrow side-channel use (status-API helper, cost
      ledger token counting), NEVER for the primary execution path. This preserves
      the Claude Code agent runtime (tool use, multi-turn, permission semantics) that
      the skill design depends on.

  - id: P-2
    name: "Ship the band-aid before the cure"
    detail: |
      P5 is a 2-line permission-mode fix that unblocks kitab-al-riyad today. Ship
      it via Wave 1 even though P6 (cost ledger) and P7 (heartbeat) will harden
      around it. No phase is allowed to depend on a yet-unshipped phase from a
      later wave.

  - id: P-3
    name: "Observation before mutation"
    detail: |
      Wave 2 (heartbeat + status API) ships BEFORE Wave 4 (control plane mutation
      API). A dashboard is useless if the process is opaque; mutations are dangerous
      if you cannot see what is happening.

  - id: P-4
    name: "Validate on real books before refactoring"
    detail: |
      Wave 3 runs the graduated book corpus (30p → 865p) BEFORE Wave 5 polish.
      Wave 5 phase-rename (P15) cannot run while any book is in-flight; that gate
      is enforced by Wave 5's prereq_gate.

  - id: P-5
    name: "Resume-safe checkpoints everywhere"
    detail: |
      Every new code path must be resume-safe: append-only logs, .done markers,
      atomic file writes. No phase may overwrite state from an earlier phase.

  - id: P-6
    name: "Podcast / journal isolation is enforced, not aspirational"
    detail: |
      No file under scripts/podcast/ may import from scripts/site/ or scripts/memoir/.
      P1 audits, P16 wires the CI check. One whitelisted exception: P4 creates
      content/_shared/arabic/06-abjad-numerals.md (see meta.scope_in_writes_to_shared_exception).

  - id: P-7
    name: "Manual handoff for cross-skill content, never automatic"
    detail: |
      The podcast skill MAY propose additions to journal libraries (quotes, clinical,
      memoir) by writing to BOOK_DIR/_system/episode-drafts/EP##-*/proposed-library-entries.md.
      It MUST NEVER write directly to content/babu-memoir/** or content/_shared/**
      (except the P4 abjad file noted above). Promotion is a manual journal-side step.

  - id: P-8
    name: "No invented enumerations (Numeric/Symbolic Disambiguation)"
    detail: |
      Any numeric claim in source text ("twelve regions", "seven seas") must be
      either (a) backed by a period-attested enumeration with source citation, or
      (b) explicitly flagged for human review. Inventing an unsourced enumeration
      is a P0 BLOCKED finding from podcast-challenger Loop N (P4).

# -----------------------------------------------------------------------------
# Intelligence sources — where each agent/skill MUST consult before acting
# -----------------------------------------------------------------------------
intelligence_sources:
  podcast:
    canonical_skill:  "skills-staging/podcast/SKILL.md"
    consult_before_any_edit:
      - {path: "skills-staging/podcast/SKILL.md",                     when: "every session start",         staleness_signal: "git diff vs branch HEAD"}
      - {path: "scripts/podcast/orchestrate_book.py",                 when: "any state-machine change",    staleness_signal: "phase_map / state schema drift"}
      - {path: "scripts/podcast/_progress.py",                        when: "any state-schema edit",       staleness_signal: "schema_version constant out of sync with state.json"}
      - {path: "content/podcast/library/books/*/_system/orchestrator-state.json", when: "before resume / retry-phase", staleness_signal: "phase_status=running with stale ts_updated"}
      - {path: "_workspace/plan/podcast-plan.yaml",                   when: "every multi-step task",       staleness_signal: "meta.restructured date >7d old AND active wave changed"}
      - {path: "_workspace/plan/research/findings.md",                when: "any architecture decision",   staleness_signal: "linked URL HTTP 404"}
      - {path: "_workspace/plan/numeric-symbolic-disambiguation-plan.md", when: "any per-book scaffolding for Islamic source material", staleness_signal: "ambiguity register stale relative to chapter list"}
      - {path: "content/podcast/.skill/handbook/numeric-symbolic-disambiguation.md", when: "any chapter with numeric/symbolic claims", staleness_signal: "P4 deliverable; created in Wave 1"}
      - {path: "content/_shared/arabic/06-abjad-numerals.md",         when: "any letter-count / abjad-value claim", staleness_signal: "P4 deliverable; created in Wave 1"}
      - {path: "docs/architecture/podcast-pipeline.html",             when: "any phase boundary change",   staleness_signal: "phase IDs disagree with _progress.py PHASE_ORDER"}
      - {path: "docs/architecture/podcast-orchestrator.html",         when: "any orchestrator behavior change", staleness_signal: "phase IDs disagree with code"}
    per_book_intelligence:
      - {path: "<book>/_system/source/raw-extract.md",                consult_for: "OCR truth-source for refinement decisions"}
      - {path: "<book>/_system/source/text/refined-english.md",       consult_for: "Phase-0c-and-beyond canonical text"}
      - {path: "<book>/_system/source/text/_phonetics.md",            consult_for: "Arabic term pronunciation map"}
      - {path: "<book>/_system/source/text/numeric-disambiguation-register.md", consult_for: "P4: per-book numeric/symbolic ambiguity register"}
      - {path: "<book>/_system/source-chapter-map.md",                consult_for: "Phase 0d unit_mode=section/auto traceability"}
      - {path: "<book>/_system/challenger-report.md",                 consult_for: "Ship-readiness verdict before merge"}
  journal:
    canonical_skill:  "skills-staging/journal/SKILL.md"
    consult_before_any_edit:
      - {path: "skills-staging/journal/SKILL.md",                     when: "every session start"}
      - {path: "content/babu-memoir/_system/voice-fingerprint.md",    when: "any chapter authoring"}
      - {path: "content/babu-memoir/_system/craft-techniques.md",     when: "any chapter authoring"}
      - {path: "content/babu-memoir/_system/thematic-arc.md",         when: "chapter slotting / re-ordering"}
      - {path: "content/babu-memoir/_system/locked-paragraphs.md",    when: "edits near locked passages"}
      - {path: "content/babu-memoir/_system/biographical-context.md", when: "fact-checking / timeline questions"}
      - {path: "content/_shared/arabic/**",                           when: "Arabic word pronunciation (READ-ONLY); includes 06-abjad-numerals.md after P4"}
    boundary: "READS NOTHING from content/podcast/. The only cross-skill connection is consuming proposed-library-entries.md as input to manual library curation."
  cross_cutting:
    - {path: "_workspace/primary-mac-activation.md",                  consult_for: "Azure bootstrap on a new Mac"}
    - {path: "_workspace/plan/view/index.html",                       consult_for: "Visual architecture overview (read-only)"}
    - {path: "_workspace/plan/acceptance-criteria.md",                consult_for: "Master checklist tracking entire scope of work (read every multi-step task)"}
  conflict_resolution:
    description: |
      When two intelligence sources disagree, prefer in this order (highest authority first):
        1. The relevant agent's `reads_normative` list (challenger frontmatter) — contract-bearing.
        2. `_workspace/plan/podcast-plan.yaml` (canonical phased plan; if `restructured` <7d old).
        3. `skills-staging/<skill>/SKILL.md` (the producing skill's current contract).
        4. `_workspace/plan/research/findings.md` (rationale + citations).
        5. `_workspace/plan/numeric-symbolic-disambiguation-plan.md` (P4 design doc; authoritative for numeric/symbolic protocol).
        6. `docs/architecture/*.html` (visual / narrative; treat as derived, not authoritative).
      Plan staleness signal: if `meta.restructured` is >7 days old AND the active wave has changed since,
      run `/repo-surgeon --plan-only` before trusting the plan.
  full_read_requirement:
    description: |
      For multi-step authoring tasks, the agent MUST read EVERY file under its bucket's
      `consult_before_any_edit` list in full at session start (not skim). Single-step
      lookups may read on-demand.

# =============================================================================
# Phases
# =============================================================================
phases:

  # ===========================================================================
  # WAVE 1 — Foundation & Guardrails
  # ===========================================================================

  - id: P1
    wave: W1
    legacy_id: P0a
    name: "Journal/podcast boundary verification + CI lock-down"
    effort: hours
    priority: blocker
    depends_on: []
    why: |
      Evidence sweep 2026-05-19 confirms NO automatic podcast→journal/clinical/quote
      feeds exist. The podcast skill writes proposed-library-entries.md to its own
      _system/episode-drafts/ directory only — promotion is manual. This phase
      LOCKS the property in place via CI before it can regress.
    tasks:
      - id: P1.1
        title: "Audit script confirming zero cross-boundary writes"
        files:
          - scripts/podcast/_boundary_check.py             # NEW
        spec: |
          AST scan + grep for any write/append/open(...,'w') under scripts/podcast/
          targeting:
            content/babu-memoir/** | content/_shared/** | scripts/memoir/** | scripts/site/**
          ALLOWED exception (per meta.scope_in_writes_to_shared_exception):
            content/_shared/arabic/06-abjad-numerals.md (created by P4 one-time)
          Exit 0 if clean, non-zero with file:line if violation found.
        acceptance:
          - "Runs in <2s over scripts/podcast/"
          - "Documented in skills-staging/podcast/SKILL.md as the boundary contract"
          - "Allows P4's one-time write to content/_shared/arabic/06-abjad-numerals.md"
      - id: P1.2
        title: "Document manual handoff for cross-skill content"
        files:
          - skills-staging/podcast/SKILL.md                # add Manual Handoff section
          - docs/podcast/manual-library-handoff.md         # NEW
          - scripts/podcast/_proposal_writer.py            # NEW
        spec: |
          Document: where proposed-library-entries.md lives, who promotes it, how the
          journal side ingests, how to detect drift (proposed but never promoted).

          Schema for `BOOK_DIR/_system/episode-drafts/EP##-<slug>/proposed-library-entries.md`:
          ```yaml
          ---
          schema_version: 1
          book_slug: <slug>
          episode_id: EP##-<slug>
          generated_by: scripts/podcast/_proposal_writer.py
          generated_at: <ISO-8601 UTC>
          ---
          ## Quotes proposed for content/babu-memoir/_system/quotes-library.txt
          - text: "<quote text>"
            attribution: "<who said it>"
            source_ref: "<book + chapter + page>"
            episode_context: "<one-line>"
            confidence: high|medium|low
          ## Clinical anecdotes proposed for content/babu-memoir/_system/clinic-library.txt
          - title: "<descriptor>"
            summary: "<2-3 sentences>"
            source_ref: "<…>"
            episode_context: "<…>"
          ## Promotion ledger (journal side writes here when promoted)
          - quote_id: <hash>
            promoted_at: <ISO-8601>
            promoted_to: content/babu-memoir/_system/quotes-library.txt#<line-anchor>
          ```
        acceptance:
          - "grep 'manual library handoff' in skills-staging/podcast/SKILL.md returns the section"
          - "scripts/podcast/_proposal_writer.py emits a schema-valid file from a populated chapter contract"
