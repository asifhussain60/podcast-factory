# -----------------------------------------------------------------------------
# Open questions
# -----------------------------------------------------------------------------
open_questions:
  - id: Q1
    question: "Multi-Mac story for the service"
    detail: |
      User memory designates THIS Mac as primary for the Azure-backed pipeline as of
      2026-05-18. Does the FastAPI service run on the primary Mac only, or are jobs
      delegated across machines? Affects: state location, auth, worker pool design,
      heartbeat hostname enforcement (R3).
    current_lean: "Service runs primary-only; secondary Macs are read-only viewers via SSH-tunneled dashboard."
    blocks: P12
    formal_resolution_task: P11

  - id: Q2
    question: "Cost ceiling per book"
    detail: |
      Should the orchestrator halt if a book's running cost exceeds $X?
    blocks: P6
    default_until_overridden: |
      Soft warning at $20 (heartbeat banner); hard halt before Phase 0d at $50.
      Implemented in P6.3 via a check against cost-ledger.jsonl summing.
      Overrides: --cost-cap-soft / --cost-cap-hard CLI flags, or state.config keys.
    resolution_phase: P6.3

  - id: Q3
    question: "Trainer integration with claude -p stays as-is"
    detail: |
      podcast-trainer.agent.md ingests per-chapter convergence outputs. With SDK
      migration cancelled, trainer continues to run on claude -p; no integration
      work needed beyond verifying the trainer reads the new cost-ledger.jsonl
      surface for cross-book cost commentary.
    resolution: "RESOLVED — keep as-is; trainer reads cost-ledger.jsonl for context"
    closed_at: 2026-05-19

  - id: Q4
    question: "Sphere-letters cipher in Master & Disciple Ch-02"
    detail: |
      The seven-letter abjad-encoded sequence `(ب ج لا د م لہ م)` references the
      seven heavenly spheres. Three candidate interpretations on file (initials
      of seven karūbiyya; OCR artifact; abbreviated planet names). User decision
      2026-05-19: flag for human/editorial review; do NOT decode.
    blocks: "Episode 2 production for Master & Disciple"
    resolution_path: "Consult James W. Morris critical edition (I.B. Tauris)"
    handled_by: "P4.5 challenger Loop N — flags as NEEDS HUMAN REVIEW; no invented decoding"

  - id: Q5
    question: "Fifth intermediary (Thursday's symbol) in Master & Disciple Ch-02"
    detail: |
      Probable reading: fifth rank in da'wa hierarchy (Nāṭiq→Asāas→Imām→Ḥujja→Dāʿī)
      = the Dāʿī. Internally consistent but must be verified against Morris edition.
    blocks: "Episode 2 production for Master & Disciple"
    resolution_path: "Morris critical edition footnote check"
    handled_by: "P4.5 Loop N — flag NEEDS HUMAN REVIEW"

  - id: Q6
    question: "Non-standard luminary order in Master & Disciple Ch-02"
    detail: |
      Ch-02 lists 'seven heavens (Saturn, Jupiter, Mars, Sun, Venus, Mercury, Moon)'
      — period-appropriate (Ptolemaic) but non-standard order. Confirm against
      Morris edition whether order matches Arabic original or translator's choice.
    blocks: "Episode 2 production for Master & Disciple"
    resolution_path: "Morris critical edition cross-check"

  - id: Q7
    question: "Seven continents anachronism in Master & Disciple Ch-02"
    detail: |
      Source text says 'seven continents (Asia, Africa, N-America, S-America,
      Antarctica, Europe, Australia)' — anachronistic. Period referent is
      al-aqālīm al-sabʿa (seven climes). Confirm with user/translator whether
      this is deliberate editorial accommodation OR OCR/translation drift.
    blocks: "Episode 2 production for Master & Disciple"
    resolution_path: "User/translator confirmation; if drift, restore period referent"

# -----------------------------------------------------------------------------
# Risks
# -----------------------------------------------------------------------------
risks:
  - id: R1
    severity: medium
    risk: "claude -p timeout fragility at scale (xlarge books)"
    mitigation: "P5.2 hardens artifact validation; P7 heartbeat exposes hangs; P9.6/P9.7 prove behavior on 591p and 865p books before W4 control plane goes live"

  - id: R2
    severity: medium
    risk: "Doc Intelligence 600s poll budget insufficient for 800+ page books"
    mitigation: "P9.6 / P9.7 expose. If hit, extend budget to 1800s as a single-line fix; PDF splitting (P17) remains deferred"

  - id: R3
    severity: medium
    risk: "FastAPI service started on Mac A while orchestrator run manually on Mac B → state divergence"
    mitigation: "Heartbeat carries hostname (P7.1); service rejects mutations on books whose last heartbeat was a different host (P11/P12)"

  - id: R4
    severity: low
    risk: "Phase rename (P15) breaks an in-flight book"
    mitigation: "P15 prereq_gate enforces zero-in-flight; translation layer makes migration atomic"

  - id: R5
    severity: medium
    risk: "Invented numeric enumerations slip past human review (P4)"
    mitigation: "Challenger Loop N (P4.5) raises P0 BLOCKED on any unsourced enumeration; book cannot ship until resolved"

  - id: R6
    severity: low
    risk: "P4 abjad reference file write to content/_shared/ breaks isolation principle"
    mitigation: "meta.scope_in_writes_to_shared_exception whitelists exactly one path; P1.1 boundary check honors the exception"

