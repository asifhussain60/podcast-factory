      - id: P4.10
        title: "Per-book content-range convention — skip editor's apparatus + back-matter indexes"
        added: 2026-05-19
        why: |
          Edited Arabic / philosophical / religious sources routinely carry 10-25%
          of front-matter (editor's intros, bios, bibliographies, editing notes)
          and 10-15% of back-matter (indexes — subject, names, places, Qur'anic
          verses, manuscripts). On Kitab al-Riyad, the editor's apparatus +
          indexes total 29% of refined-english.md by line count. Today the
          orchestrator wastes Phase 0c/0e/11 LLM-token spend refining material
          that won't appear in any episode AND Loop N spuriously flags
          the editor's bibliography of al-Kirmani's 25 works as
