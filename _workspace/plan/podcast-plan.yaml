  - id: P9
    wave: W3
    legacy_id: "v2 P4.1-P4.7"
    name: "Sample corpus validation (graduated 30p → 865p, 7 books)"
    effort: 1 week wall-clock
    priority: high
    depends_on: [P8]
    why: |
      Prove the pipeline handles the full size range BEFORE adding control plane
      (W4) or polish (W5). Each run also feeds the trainer with cross-book examples.

      Per principle P-1, every run is on `claude -p` (Claude Code primary). The
      Anthropic Python SDK is NOT used in the workhorse phases.

      Per principle P-9, every shipped book MUST make the system measurably
      smarter. The per-book ship gate (P9.0) verifies the learning loop closed
      cleanly: findings appended, health score written, trainer ran, regression
      harness stayed green. A book that ships clean WITHOUT triggering any
      learning-loop activity is suspicious — the gate surfaces a P1 warning.
    per_book_ship_gate:                     # NEW v3.1 — applies to every P9.* row
      - "Cost ledger row appended for every phase that called claude -p"
      - "Findings appended to _learning/findings.jsonl (≥1 record OR documented zero-findings rationale)"
      - "Health score written to _learning/health/<slug>.json; health-trend.md row appended"
      - "Trainer ran; outcome is PROMOTED or ARCHIVED (never NEVER_RAN unless documented)"
      - "test_challenger.py exits 0 after the trainer's commit (no fixture regressed)"
      - "If trainer promoted a rule, CHALLENGER_VERSION bumped by 0.1 in _rules.py"
    tasks:
      - id: P9.1
        title: "Tiny: Ayyuhal Walad (30p) — first-shipped baseline"
        prereq: "Branch book/ayyuhal-walad already partially exists; verify it still resumes"
        source_material_risk: "low — short text"
        acceptance:
          - "Full pipeline to merge in <2h wall-clock"
          - "Cost <$5"
      - id: P9.2
        title: "Small: Masaail searchable (81p)"
        source_material_risk: "medium — multi-chapter 0d loop"
        acceptance: ["Full pipeline; record token/cost/wall-clock"]
      - id: P9.3
        title: "Small: Majalis Moyyada (139p)"
        source_material_risk: "high — Ismaili source material; P4 Loop N exercise"
        acceptance:
          - "Full pipeline; metrics recorded"
          - "P4 numeric-disambiguation-register.md populated for at least 3 chapters"
          - "Challenger Loop N raises no P0 findings post-convergence"
      - id: P9.4
        title: "Large: Kitab Maqbas (392p)"
        risk: "First book where Phase 0d source-chapter loop may produce 15+ episodes"
        source_material_risk: "high"
        acceptance: ["Full pipeline; chapter contracts hold; Loop N clean"]
      - id: P9.5
        title: "Large: Asaas Al-Taveel (416p)"
        source_material_risk: "high"
        acceptance: ["Full pipeline; metrics recorded; Loop N clean"]
      - id: P9.6
        title: "XLarge: Raahat al-Aqal (591p)"
        risk: "Phase 0a may approach Doc Intelligence 600s poll budget (R2)"
        source_material_risk: "high"
        acceptance: ["Full pipeline OR documented Doc-Intelligence-poll-extension issue"]
      - id: P9.7
        title: "XLarge: Rasail Ikhwan AsSafa (865p)"
        risk: "Largest book; tests Phase 0d map-reduce at upper end"
        source_material_risk: "high — Ikhwan epistles dense with numeric symbolism"
        acceptance:
          - "Full pipeline OR documented failure mode + remediation issue"
          - "P4 disambiguation register exercised on classical-philosophical numeric structures"

      - id: P9.8
        title: "Cross-book learning yield report (P-9 measurable improvement)"
        depends_on_local: [P9.1, P9.2, P9.3, P9.4, P9.5, P9.6, P9.7]
        files:
          - _workspace/plan/research/learning-yield-report.md   # NEW (terminal artifact of W3)
        spec: |
          After the 7-book corpus runs, produce a single report capturing:
            - Per-book health-score trajectory
            - Per-book findings count by severity
            - Per-book fixture additions (new fixtures landed during the run)
            - Promotions across the corpus (signatures + commit hashes)
            - Archived proposals (signatures + reasons)
            - Fixture-coverage % at W3 start vs. W3 end
            - CHALLENGER_VERSION trajectory across the 7 runs
            - Any cost-budget breaches surfaced by P6.4
            - Any books that triggered the "NEVER_RAN" trainer warning
          The report is read by W5 (informs which trainer-promoted rules will
          land in the phase-rename window) and by the next user/operator
          session as ground truth for "did the system get smarter?"
        acceptance:
          - "Report exists; cites every P9.* book that completed (or documents why one didn't)"
          - "fixture_coverage_pct at W3 end > W3 start (P-9 invariant: smarter every run)"
          - "promoted/ cardinality at W3 end ≥ start + 1 (at least one new promotion during the corpus run, OR documented rationale why none — e.g., regression harness was protecting against premature promotion)"
          - "Report linked from done_when block + acceptance-criteria.md Wave 3 group"

  - id: P10
    wave: W3
    legacy_id: "v2 P4.8"
    name: "ETA model: words → wall-clock per phase"
    effort: hours
    priority: medium
    depends_on: [P9]
    tasks:
      - id: P10.1
        title: "Linear regression over P9.1–P9.7 runs — wall-clock AND cost (v3.2)"
        files:
          - scripts/podcast/orchestrator_status.py        # add --eta + --cost-eta
          - scripts/podcast/run_wave.py                   # extend W3 invocation to call --cost-eta pre-flight
        spec: |
          Two parallel regression targets, fitted from cost-ledger.jsonl + phase
          timing in events.jsonl across P9.1-P9.7:
            1. (raw_words, refined_words) → (phase_05_min, 06_min, 07_min, 08_min, per_chapter_min)
            2. (raw_words, refined_words) → (phase_05_usd, 06_usd, 07_usd, 08_usd, per_chapter_usd)
          v3.2 closes the loop with P6.3 hard cap:
            • orchestrator_status.py --cost-eta <book-slug> reads state.config.
              tier + raw_words, predicts total cost, exits non-zero if
              predicted > state.config.cost_cap_hard (default $50).
            • run_wave.py 3 invokes --cost-eta as a pre-flight check; refuses
              W3 invocation if predicted cost exceeds cap (saves $20-50 of
              Phase 0a spend that would happen before the in-flight P6.3
              hard-halt fires at Phase 0d).
          Used for status CLI / dashboard ETA display + W3 cost guardrail.
        depends_on_local: []
        acceptance:
          - "ETA wall-clock prediction within ±30% on a held-out book"
          - "ETA cost prediction within ±25% on a held-out book"
          - "`run_wave.py 3 --book <slug>` exits non-zero when predicted cost > cost_cap_hard; prints predicted/cap/explanation"
          - "Both regressions trained from cost-ledger.jsonl + events.jsonl; CLI flag `--retrain-eta` re-fits after a new book lands"

