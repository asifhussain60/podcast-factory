  - id: P5
    wave: W1
    legacy_id: P0
    name: "claude -p permission-mode fix + artifact validation"
    effort: hours
    priority: blocker
    depends_on: []
    why: |
      Current orchestrator silently fails inside Phase 0b/0c/0d/0e because
      `claude -p` refuses file-write tools without --permission-mode acceptEdits.
      Returns rc=0 with a refusal in stdout; orchestrator's artifact check logs
      "NO ARTIFACT" and proceeds. All windows on kitab-al-riyad failed this way
      last session (5 .in.md written, 0 .out.md).

      Per P-1 (Claude Code primary), `claude -p` is the canonical execution
      mechanism. This phase HARDENS that mechanism; it does NOT replace it.
    tasks:
      - id: P5.1
        title: "Add --permission-mode acceptEdits to all claude -p invocations"
        status: SHIPPED                  # v3.2 2026-05-19 later — see meta.v3.2 change #3
        files:
          - scripts/podcast/_chunking.py
          - scripts/podcast/_authoring.py
        shipped_evidence:
          - "scripts/podcast/_authoring.py:99  [CLAUDE_CMD, '-p', '--permission-mode', 'acceptEdits', prompt]"
          - "scripts/podcast/_chunking.py:255  [CLAUDE_CMD, '-p', '--permission-mode', 'acceptEdits', prompt]"
        acceptance:
          - "grep 'claude -p' returns 0 results without --permission-mode flag"
          - "Both sites pass --permission-mode acceptEdits"
      - id: P5.2
        title: "Harden artifact check: rc=0 AND out_path exists AND non-empty"
        files:
          - scripts/podcast/_chunking.py
          - scripts/podcast/_authoring.py
        acceptance:
          - "If out_path missing OR file_size == 0, raise typed error with stdout/stderr capture"
          - "No silent 'NO ARTIFACT' continuation — every failure surfaces"
      - id: P5.4
        title: "Phase-id constants module (single source of truth for 14-step names)"
        why: |
          v3.2 absorbs the W5 phase rename into W1+W2. P5.4 lands the CONSTANTS
          module in W1; P8.6 (W2) does the bulk find/replace of literal phase-ID
          strings in scripts/podcast/ and HTML docs. Splitting the work this way
          means W3 corpus runs (and _learning/promoted/ tombstones citing them)
          use stable names from day one.
        files:
          - scripts/podcast/_phases.py                     # NEW
        spec: |
          Single module defining:
            ```python
            # scripts/podcast/_phases.py
            from enum import StrEnum

            class Phase(StrEnum):
                PREFLIGHT     = "01-preflight"
                BRANCH        = "02-branch"
                SCAFFOLD      = "03-scaffold"
                OCR_TRANSLATE = "04-ocr-translate"    # was 0a
                REFINE_ENG    = "05-refine-english"   # was 0b
                PHONETICS     = "06-phonetics"        # was 0c
                CHAPTER_DESIGN = "07-chapter-design"  # was 0d
                ENRICHMENT    = "08-enrichment"       # was 0e
                SERIES_PLAN   = "09-series-plan"      # was 0f
                REGISTER_SERIES = "10-register-series" # was 0g
                PER_CHAPTER   = "11-per-chapter"
                TRAINER       = "12-trainer"
                MERGE         = "13-merge"
                DONE          = "14-done"

            PHASE_ORDER: tuple[Phase, ...] = tuple(Phase)

            # Back-compat alias map (v3.2 → one release of back-compat,
            # removed after P8.6 bulk rewrite lands)
            LEGACY_ALIAS: dict[str, Phase] = {
                "0a": Phase.OCR_TRANSLATE,
                "0b": Phase.REFINE_ENG,
                "0c": Phase.PHONETICS,
                "0d": Phase.CHAPTER_DESIGN,
                "0e": Phase.ENRICHMENT,
                "0f": Phase.SERIES_PLAN,
                "0g": Phase.REGISTER_SERIES,
                "pre-flight": Phase.PREFLIGHT,
                "branch": Phase.BRANCH,
                "scaffold": Phase.SCAFFOLD,
                "per-chapter": Phase.PER_CHAPTER,
                "trainer": Phase.TRAINER,
                "merge": Phase.MERGE,
                "done": Phase.DONE,
            }

            def resolve(name: str) -> Phase:
                """Resolve legacy or canonical phase name to Phase enum."""
                if name in Phase.__members__.values() or name in [p.value for p in Phase]:
                    return Phase(name)
                if name in LEGACY_ALIAS:
                    return LEGACY_ALIAS[name]
                raise ValueError(f"unknown phase: {name!r}")
            ```
          Other modules (orchestrate_book.py, _authoring.py, _chunking.py,
          _progress.py) DO NOT import this module yet — the bulk find/replace
          happens in P8.6. P5.4 just lands the source-of-truth file plus a
          unit test that verifies enum + alias consistency.
        depends_on_local: [P5.1, P5.2]
        acceptance:
          - "scripts/podcast/_phases.py exists; Phase enum has all 14 values in PHASE_ORDER"
          - "LEGACY_ALIAS keys cover the entire old 0a..0g + named-step set"
          - "scripts/podcast/tests/test_phases.py exists and asserts: (a) Phase enum is StrEnum, (b) PHASE_ORDER == tuple(Phase), (c) every LEGACY_ALIAS key resolves via resolve(), (d) unknown name raises ValueError"
          - "Importing _phases.py has zero side effects (no FS writes, no network)"
          - "Module is consumed by W2 P8.6 bulk rewrite; W1 deliverable is the module + tests only"

      - id: P5.3
        title: "Re-run kitab-al-riyad --resume; verify Phase 0b completes"
        branch_workflow: |
          1. Apply P5.1/P5.2 patches on `develop` first; merge after P1 boundary check
             + P2 tiny-book smoke pass.
          2. Rebase `book/kitab-al-riyad` onto updated develop (or cherry-pick P5 commits
             if rebase would touch in-flight files).
          3. Confirm orchestrator-state.json still parses unchanged after the rebase.
          4. `git checkout book/kitab-al-riyad` and
             `python3 scripts/podcast/orchestrate_book.py --resume kitab-al-riyad`.
        acceptance:
          - "P5.1 + P5.2 land on develop BEFORE book branch resume"
          - "book/kitab-al-riyad rebased clean onto develop; state.json untouched"
          - "All N windows produce non-empty .out.md files"
          - "Phase transitions 0b → 0c → 0d → 0e cleanly OR halts cleanly at 0f"

