          - "Phase IDs cited inside each diagram match phases[].id in podcast-plan.yaml (Pass 5 L7 conformance)"
          - "Wave dependency DAG (D1): hovering a wave node shows its done_signal"
          - "Phase Gantt (D2): every phase P1-P20 has a bar; OBSOLETED phases (P15, P16) rendered greyed-out with redirect tooltip"
          - "Pipeline flowchart (D4): hovering a phase shows the corresponding _authoring.py function name"
          - "Agent topology (D5): exactly 4 agent nodes (orchestrator, challenger, trainer, extract); only trainer has dashed outbound edges"
          - "Coverage heatmap (D6): cell totals sum to ~177 pending + 8 checked = ~185 rows (matches acceptance-criteria.md inventory line)"
          - "diagrams.js has no inline `<script src='http...'>` references and no fetch() of off-domain URLs"
          - "assets/css/diagrams.css uses only existing theme.css CSS variables — no new color literals"

      - id: P8.8
        title: "Agent dedup + isolation CI (single commit collapse of former P16)"
        why: |
          Three agent locations exist today: .github/agents/ (canonical, 8 files),
          infra/claude-agents/ (vestigial mirror, 8 files), .claude/agents/
          (Claude Code's materialized location, 5 files). The drift is real —
          podcast-challenger and podcast-extract exist in infra/ + .claude/ but
          NOT in .github/. v3.2 collapses former P16.1-P16.4 (4 sub-tasks, 2-3
          days) into one ~half-day commit.
        files:
          - .github/agents/podcast-challenger.agent.md    # NEW (materialize with staged Loop N edits)
          - .github/agents/podcast-extract.agent.md       # NEW (materialize)
          - .github/agents/ui-reviewer.agent.md           # NEW (materialize)
          - infra/claude-agents/                          # DELETE entire directory
          - scripts/install-claude-skills.sh              # idempotent rewrite: materializes .claude/agents/ from .github/agents/
          - scripts/check_agent_dedup.py                  # NEW — diff name sets between dirs
          - scripts/podcast/_isolation_check.py           # NEW — AST scan: scripts/podcast/ does not import scripts/site/ or scripts/memoir/
          - .github/workflows/podcast-isolation.yml       # NEW — runs dedup_check + isolation_check + boundary_check
        spec: |
          Single PR. Sequence within the commit:
            1. Materialize the 3 missing agents into .github/agents/.
            2. `git rm -r infra/claude-agents/`.
            3. Rewrite install-claude-skills.sh:
               - Reads .github/agents/*.agent.md
               - For each, materializes .claude/agents/<basename without .agent>.md
               - Idempotent: second run produces zero diffs
            4. scripts/check_agent_dedup.py:
               - Compares name sets across .github/agents/ and .claude/agents/
                 (post-install-claude-skills.sh run)
               - Exit 0 only when sets match (after suffix-strip)
            5. scripts/podcast/_isolation_check.py:
               - AST scan of scripts/podcast/*.py
               - Fails build on any `import scripts.site.*` or `import scripts.memoir.*`
               - Honors P1.1 boundary_check whitelist (06-abjad-numerals write)
            6. .github/workflows/podcast-isolation.yml:
               - on: push/pull_request paths covering scripts/podcast/, .github/agents/, .claude/agents/
               - runs: boundary_check, isolation_check, dedup_check, test_challenger.py
        acceptance:
          - "Every agent in any of three locations exists in .github/agents/ (full materialization verified by listing)"
          - "P4.5 Loop N edits carried into .github/agents/podcast-challenger.agent.md (byte-identity verified post-materialization vs the staged copy)"
          - "scripts/check_agent_dedup.py exits 0 only when name sets match across .github/+.claude/; runs in CI"
          - "scripts/podcast/_isolation_check.py AST scan fails build on forbidden import"
          - ".github/workflows/podcast-isolation.yml exists; all 4 jobs green on clean tree"
          - "infra/claude-agents/ removed (git log preserves history, tracked deletion not force-removal)"
          - "install-claude-skills.sh idempotent — second run zero diffs"
          - "VS Code/Claude Code agent picker shows each agent exactly once (PR description records visual verification)"

