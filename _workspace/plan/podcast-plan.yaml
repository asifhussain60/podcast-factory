          - "Phase IDs cited inside each diagram match phases[].id in podcast-plan.yaml (Pass 5 L7 conformance)"
          - "Wave dependency DAG (D1): hovering a wave node shows its done_signal"
          - "Phase Gantt (D2): every phase P1-P20 has a bar; OBSOLETED phases (P15, P16) rendered greyed-out with redirect tooltip"
          - "Pipeline flowchart (D4): hovering a phase shows the corresponding _authoring.py function name"
          - "Agent topology (D5): exactly 4 agent nodes (orchestrator, challenger, trainer, extract); only trainer has dashed outbound edges"
          - "Coverage heatmap (D6): cell totals sum to ~177 pending + 8 checked = ~185 rows (matches acceptance-criteria.md inventory line)"
          - "diagrams.js has no inline `<script src='http...'>` references and no fetch() of off-domain URLs"
          - "assets/css/diagrams.css uses only existing theme.css CSS variables — no new color literals"

      - id: P8.8
        title: "Agent dedup + isolation CI (single commit collapse of former P16)"
        why: |
          Three agent locations exist today: .github/agents/ (canonical, 8 files),
          infra/claude-agents/ (vestigial mirror, 8 files), .claude/agents/
          (Claude Code's materialized location, 5 files). The drift is real —
          podcast-challenger and podcast-extract exist in infra/ + .claude/ but
