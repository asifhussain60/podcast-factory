# =============================================================================
# Podcast Pipeline — Phased Plan (CANONICAL)
# =============================================================================
# Scope: podcast agent + skill ONLY. Journal is OUT OF SCOPE.
#
# v3 (2026-05-19) — three structural changes from v2:
#   1. SEQUENTIAL RENUMBERING. Phases are now P1..P20, organized into 6 named
#      waves (W1..W6). Each wave is a unit of autonomous, scheduled-task
#      execution with a single DONE signal sourced from acceptance-criteria.md.
#      The legacy P0a / P0b / P0c / P0 / P1..P7 numbering is retired; back-compat
#      aliases live in `legacy_id_map` for one release.
#   2. CLAUDE CODE IS THE PRIMARY EXECUTION MECHANISM. The wholesale
#      Anthropic-Python-SDK migration formerly in P3 is CANCELLED. `claude -p`
#      (Claude Code in headless mode, --permission-mode acceptEdits) remains
#      the workhorse for every LLM call in scripts/podcast/. The Python SDK is
#      reserved for narrow side-channel cases (status-API helper, cost-ledger
#      token counting) — never as a swap for the primary execution path.
#   3. NUMERIC/SYMBOLIC DISAMBIGUATION is folded in as a first-class phase (P4)
#      in Wave 1. Adds the challenger Loop N, the abjad-numerals shared file,
#      the disambiguation handbook, and the orchestrator's Phase-0d numeric-scan
#      step. Worked example: Master & Disciple Ch-02.
#
# See README.md for scope boundary, research/findings.md for citations,
# view/index.html for visual architecture diagrams,
# numeric-symbolic-disambiguation-plan.md for P4's full design document.
# =============================================================================

meta:
  version: 3
  created: 2026-05-19
  refined: 2026-05-19
  gap_closed: 2026-05-19
  execute_readied: 2026-05-19
  restructured: 2026-05-19          # v3 restructure: waves + sequential ids + SDK cancel + P4 numeric
  owner: asif

  primary_execution_mechanism: claude-code-cli
  primary_execution_rationale: |
    The podcast agent and skill are DESIGNED FOR and EXECUTED VIA Anthropic
    Claude Code. The orchestrator's LLM workhorse is `claude -p` (Claude Code
    in headless mode) invoked with --permission-mode acceptEdits. This preserves
    the agent runtime (tool use, file-edit, multi-turn refinement, permission
    semantics) that the skill design depends on, and avoids re-implementing the
    agent protocol on top of a raw Python SDK client.

    The Anthropic Python SDK is used ONLY for narrow, side-channel use cases:
      • status-API helper calls (P8) — e.g., one-shot 'summarize this state'
      • cost-ledger token counting (P6) — usage extraction from claude -p stdout
    Never as a replacement for the primary LLM execution path.

  legacy_id_map:                    # v2 → v3 ID translation; one release of back-compat
    P0a: P1
    P0b: P2
    P0c: P3
    P0d: P4                         # P0d was the v2-draft slot for numeric/symbolic; now P4
    P0:  P5
    "P3.4 (cost-only)": P6
    P1:  P7
    P2:  P8
    P3:  CANCELLED                  # SDK migration phases (P3.1, P3.2, P3.3, P3.5, P3.6) cancelled
    P4:  P9
    "P4.8 (eta)": P10
    "P5.0": P11
    "P5.1+P5.2": P12
    "P5.3": P13
    "P5.4": P14
    "P6.1": P15
    "P6.2+P6.3": P16
    "P6.4": CANCELLED               # SDK token-count parity — no SDK to compare against
    "P6.5": CANCELLED               # SDK fallback shim — no SDK to fall back from
    "P7.1": P17
    "P7.2": P18
    "P7.3": P19
    "P7.4": P20

  legacy_cleanup_basenames:         # consumed by repo-surgeon Pass 5 L8
    - chatgpt-podcast-skill-prompt
    - folder-cleanup-prompt
    - podcast-refactor-executive-summary
    - podcast-orchestrator-large-books

  branch_strategy: "feature branches off develop, merge via --no-ff"
  primary_mac: true                 # Azure-backed pipeline runs here (see ../primary-mac-activation.md)

  scope_in:
    - .github/agents/podcast-orchestrator.agent.md
    - .github/agents/podcast-trainer.agent.md
    - .github/agents/podcast-challenger.agent.md   # not yet in .github/; migrated by P16
    - .github/agents/podcast-extract.agent.md      # not yet in .github/; migrated by P16
    - skills-staging/podcast/**
    - scripts/podcast/**                            # includes scripts/podcast/tests/
    - content/podcast/**
    - docs/architecture/podcast-*.html              # podcast-facing architecture docs (rename surface, P15)

  scope_out:
    - .github/agents/journal-*.agent.md
    - .github/agents/CORTEX.agent.md
    - .github/agents/reconcile.agent.md
    - .github/agents/repo-surgeon.agent.md
    - infra/claude-agents/**                        # explicit DELETION target after P16 migration
    - skills-staging/journal/**
    - scripts/memoir/**
    - scripts/site/**
    - content/babu-memoir/**
    - content/_shared/**                            # journal reads READ-ONLY (Arabic); podcast writes ONLY to content/_shared/arabic/06-abjad-numerals.md per P4
    - docs/architecture/journal-*.html
    - docs/architecture/index.html                  # cross-cutting nav, edit only when both sides agree

  scope_in_writes_to_shared_exception:              # one-time exception for P4
    path: content/_shared/arabic/06-abjad-numerals.md
    rationale: |
      P4 (Numeric/Symbolic Disambiguation) creates ONE cross-skill shared file:
      the canonical abjad-numerals reference, used by both podcast pre-refined
      mode AND any future journal Arabic-handling. The file's location follows
      the existing `content/_shared/arabic/00-..05-` pattern. After creation,
      the file is READ-ONLY for both skills. No other writes to content/_shared/**
      are permitted from the podcast skill.

# -----------------------------------------------------------------------------
# Waves — autonomous scheduled-task units
# -----------------------------------------------------------------------------
# Each wave is one scheduled task (cron / `/schedule` skill / launchd). The
# task kicks off the wave, runs its phases sequentially (or in parallel where
# noted), checks the wave's DONE signal against acceptance-criteria.md, and
# either advances to the next wave (if gated open) or halts for human review.
# -----------------------------------------------------------------------------
waves:

  - id: W1
    name: "Foundation & Guardrails"
    phases: [P1, P2, P3, P4, P5, P6]
    schedule_intent: "Overnight; idempotent; zero LLM cost"
    parallelism: "P1, P2, P3, P4 in parallel; P5 sequential after P4; P6 sequential after P5"
    blast_radius: "Local — no external API calls; CI workflows created but not executed"
    kickoff_cmd: "python3 scripts/podcast/run_wave.py 1"
    done_signal: "All P1–P6 rows in acceptance-criteria.md `### Wave 1` group checked"
    gates_open_next: "Wave 2 (after human review of W1 commit)"

  - id: W2
    name: "Observability"
    phases: [P7, P8]
    schedule_intent: "Single daytime window; ~1 wk wall-clock; trivial LLM cost"
    parallelism: "P7 then P8; P8 depends on P7's heartbeat schema"
    blast_radius: "Local — new daemon thread + localhost FastAPI service"
    kickoff_cmd: "python3 scripts/podcast/run_wave.py 2"
    done_signal: "All P7–P8 acceptance rows checked; dashboard reachable at http://127.0.0.1:8765/"
    gates_open_next: "Wave 3"

  - id: W3
    name: "Corpus Validation"
    phases: [P9, P10]
    schedule_intent: "One graduated run per scheduled invocation; book picked from queue"
    parallelism: "Strictly sequential — one book per invocation; ETA model (P10) trains on completed runs"
    blast_radius: "BIG — full Azure OCR + claude -p spend per run; uses cost ledger from P6"
    kickoff_cmd: "python3 scripts/podcast/run_wave.py 3 --book <slug>"
    done_signal: "All 7 books in P9 either shipped clean OR documented failure-mode + remediation; P10 ETA model within ±30% on held-out book"
    gates_open_next: "Wave 4"
    cost_guardrail: "P6 hard halt enforced (default $50); wave aborts if hard cap hit"

  - id: W4
    name: "Control Plane"
    phases: [P11, P12, P13, P14]
    schedule_intent: "Single window; mutation surface only, no autonomous LLM spend"
    parallelism: "P11 first (decision); P12+P13 parallel; P14 last"
    blast_radius: "Mutation API live; pause/resume/delete enabled; bearer-token auth"
    kickoff_cmd: "python3 scripts/podcast/run_wave.py 4"
    done_signal: "All P11–P14 rows checked; 2 books run truly parallel in P12 acceptance"
    gates_open_next: "Wave 5"

  - id: W5
    name: "Polish"
    phases: [P15, P16]
    schedule_intent: "Single scheduled task; HARD-GATED by zero in-flight books"
    parallelism: "P15 first (orchestrator phase rename); P16 second (agent dedup + CI)"
    blast_radius: "Touches every podcast file with a phase-id reference; ~700 LOC surface"
    kickoff_cmd: "python3 scripts/podcast/run_wave.py 5 --confirm-zero-inflight"
    done_signal: "Phase rename schema_version=2 across live state files; agent picker shows each agent once; isolation CI green"
    gates_open_next: "Wave 6 (trigger-gated, not time-gated)"
    prereq_gate: "scripts/podcast/orchestrator_status.py --all --json | jq '[.books[] | select(.phase_status==\"running\" or .phase_status==\"failed\")] | length' == 0"

  - id: W6
    name: "Deferred"
    phases: [P17, P18, P19, P20]
    schedule_intent: "NOT time-scheduled — each phase has its own `promote_when` trigger"
    parallelism: "N/A — promoted individually as triggers fire"
    blast_radius: "Per-phase; see individual phases"
    kickoff_cmd: "manual — `python3 scripts/podcast/run_wave.py 6 --phase P17` after promote_when trigger fires"
    done_signal: "Each promoted phase ships its own acceptance rows"
    gates_open_next: "N/A (terminal wave)"

