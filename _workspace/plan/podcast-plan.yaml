  - id: P17.1
    wave: W5
    name: "Source-adapter registry (pluggable input formats) + manifest-driven multi-source ingestion"
    promote_when: |
      PROMOTED 2026-05-19 — operator explicitly opted in for (a) folder-bundle
      ingestion ("podcast agent on a folder of curated documents") and
      (b) Asaas chapter-map preflight convention. Triggered after P9.5
      (Asaas) ships clean — Asaas validates the chapters-rationale.md /
      manifest preflight convention on a single-source book BEFORE scaling
      to N-doc bundles.

      Original trigger (now superseded): first non-Arabic-PDF source arrives
      (Urdu PDF, scanned image, video transcript), OR user explicitly opts in.
    why: |
      Today Phase 04-ocr-translate hardcodes the Arabic-PDF flow via
      scripts/podcast/_azure.py. New input formats require either inflating
      _azure.py with if/elif branches (entangles unrelated deps — Whisper for
      video, Tesseract for scans, Azure for PDF) or rewriting the orchestrator.
      Registry pattern: each input type is one adapter file
      under scripts/podcast/adapters/, each implementing the same Protocol.
      Orchestrator dispatches via the registry; _azure.py remains the shared
      credentials/client helper (adapters don't know about Keychain plumbing).
    promote_when_rationale: |
      Per CORE-048 challenge-gate: the alternative considered was monolithic
      `--source-type` flag in _azure.py with if/elif dispatch. Rejected because
      each new format (Urdu / video / scanned image) inflates _azure.py by
      100-300 LOC and entangles deps. Adapter pattern keeps each format's
      dependencies and tests isolated; one folder per addition.
    files:
      - scripts/podcast/adapters/__init__.py                 # NEW — REGISTRY dict + SourceAdapter Protocol
      - scripts/podcast/adapters/_base.py                    # NEW — SourceAdapter Protocol + RawText dataclass
      - scripts/podcast/adapters/arabic_pdf.py               # NEW — migrates current _azure.py PDF flow
      - scripts/podcast/adapters/_azure_client.py            # NEW (or REFACTOR _azure.py) — single shared Azure helper
      - scripts/podcast/orchestrate_book.py                  # call adapters.dispatch(source_path) in Phase 04
      - scripts/podcast/tests/adapters/__init__.py           # NEW
      - scripts/podcast/tests/adapters/test_registry.py      # NEW — registry dispatch + Protocol conformance
      - scripts/podcast/tests/adapters/test_arabic_pdf.py    # NEW — golden-fixture parity vs pre-migration output
      - docs/podcast/source-adapter-registry.md              # NEW — extension guide for future contributors
    spec: |
      Protocol (scripts/podcast/adapters/_base.py):
        ```python
        from pathlib import Path
        from typing import Protocol, runtime_checkable
        from dataclasses import dataclass

        @dataclass
        class RawText:
            text: str
            source_lang: str           # ISO 639-1 (ar, ur, fa, en, ...)
            confidence: float          # 0.0-1.0; per-page OCR confidence floor
            page_count: int | None
            adapter_id: str
            extraction_notes: list[str]

        @runtime_checkable
        class SourceAdapter(Protocol):
            adapter_id: str
            handles_extensions: tuple[str, ...]   # (".pdf",) etc.
            handles_mime_types: tuple[str, ...]

            @classmethod
            def can_handle(cls, source_path: Path) -> bool: ...
            def extract(self, source_path: Path, book_dir: Path) -> RawText: ...
            def normalize(self, raw: RawText) -> str: ...                  # → refined-input.md
            def emit(self, normalized: str, book_dir: Path) -> Path: ...   # writes raw-extract.md
        ```
      Registry (scripts/podcast/adapters/__init__.py):
        ```python
        from .arabic_pdf import ArabicPdfAdapter
        # future: from .urdu_pdf import UrduPdfAdapter
        # future: from .video_transcript import VideoTranscriptAdapter

        REGISTRY: dict[str, type[SourceAdapter]] = {
            "arabic-pdf": ArabicPdfAdapter,
            # ...
        }

        def dispatch(source_path: Path) -> SourceAdapter:
            for adapter_cls in REGISTRY.values():
                if adapter_cls.can_handle(source_path):
                    return adapter_cls()
            raise UnsupportedSourceError(source_path)
        ```
      Azure creds (scripts/podcast/adapters/_azure_client.py):
        Single helper class exposing `.translate(text, target='en')`,
        `.ocr(pdf_path) -> Iterator[Page]`, `.transcribe(audio_path) -> str`.
        Adapters import this; they NEVER read Azure keys directly. Keychain
        plumbing stays here. Path migration: rename existing _azure.py → adapters/_azure_client.py
        in P17.1 commit; update imports across orchestrate_book.py and any
        consumer.

      Migration acceptance (DoR for first promotion):
        1. Existing Arabic-PDF flow migrates from _azure.py to ArabicPdfAdapter.
        2. Golden-fixture parity: tiny-book Phase 04-ocr-translate output is
           byte-identical pre- vs. post-migration (regression-protective).
        3. orchestrate_book.py Phase 04 calls adapters.dispatch() instead of
           direct _azure.py functions.
        4. docs/podcast/source-adapter-registry.md documents the extension
           contract — adding a new adapter is one new file under adapters/
           plus one line in REGISTRY plus its own test fixture.

    depends_on: [P5, P8, P17]        # P5 ships the Phase enum (P5.4); P8 ships the bulk rename (P8.6) so canonical phase names are stable; P17 is the sibling PDF pre-split phase
    acceptance:
      - "scripts/podcast/adapters/ Python package exists; _base.py defines SourceAdapter Protocol + RawText dataclass"
      - "scripts/podcast/adapters/__init__.py exports REGISTRY dict + dispatch(source_path) function; dispatch raises UnsupportedSourceError on unknown type"
      - "scripts/podcast/adapters/arabic_pdf.py implements SourceAdapter for .pdf files with source_lang='ar'; passes isinstance(..., SourceAdapter) check at runtime"
      - "scripts/podcast/adapters/_azure_client.py is the SOLE site that reads Azure credentials from Keychain; adapters import this module only — `grep -rE 'KEYCHAIN|az_key|api_key' scripts/podcast/adapters/` outside _azure_client.py returns 0 results"
      - "orchestrate_book.py Phase 04 calls `adapters.dispatch(source_path).extract(...).normalize().emit(book_dir)` — no direct _azure.py imports"
      - "scripts/podcast/tests/adapters/test_registry.py asserts: (a) every adapter in REGISTRY satisfies SourceAdapter Protocol, (b) dispatch resolves correctly for known extensions, (c) UnsupportedSourceError raised cleanly for unknown"
      - "scripts/podcast/tests/adapters/test_arabic_pdf.py asserts golden-fixture parity: tiny-book pre-migration raw-extract.md == post-migration raw-extract.md (byte-identical OR within Levenshtein ≥0.95 if non-determinism in Azure OCR is unavoidable — document which in the test)"
      - "docs/podcast/source-adapter-registry.md exists; extension guide includes a worked example for adding a new adapter (one new file + one REGISTRY line + one test)"
      - "Adding a hypothetical urdu_pdf.py touches exactly: adapters/urdu_pdf.py (new file), adapters/__init__.py (one REGISTRY line), tests/adapters/test_urdu_pdf.py (new file). Zero edits to orchestrate_book.py, _authoring.py, _chunking.py, SKILL.md, or any agent file (verified by manually walking through the worked example in PR description)"
      - "Boundary check (P1.1): adapters/ folder participates in scripts/podcast/ isolation — no imports from scripts/site/ or scripts/memoir/"
      - "Cost-ledger integration: each adapter call appends a cost-ledger.jsonl row via the shared _cost_ledger.py module (P6.1); Azure spend by adapter is itemized"

    extension_change_d:
      summary: |
        Change D — Manifest-driven multi-source ingestion. Extends P17.1's
        adapter pattern with a manifest schema, four additional adapters
        (english_pdf, markdown, transcript, auto), a voice_mode field for
        multi-author bundles, and a backward-compat shim that auto-scaffolds
        a 1-doc manifest for existing single-source books. Lands AFTER P9.5
        (Asaas) ships clean.
      files_new:
        - scripts/podcast/adapters/_manifest.py             # NEW — manifest schema + YAML validator
        - scripts/podcast/adapters/english_pdf.py           # NEW — Azure OCR with lang hint = en
        - scripts/podcast/adapters/markdown.py              # NEW — trivial (read file, normalize whitespace)
        - scripts/podcast/adapters/transcript.py            # NEW — timestamped-transcript parser; preserves speaker tags
        - scripts/podcast/adapters/auto.py                  # NEW — detect format by extension + first-bytes sniff
        - scripts/podcast/scaffold_bundle.py                # NEW — walk a folder, emit a manifest stub
        - scripts/podcast/tests/adapters/test_manifest_validator.py
        - scripts/podcast/tests/adapters/test_english_pdf.py
        - scripts/podcast/tests/adapters/test_markdown.py
        - scripts/podcast/tests/adapters/test_transcript.py
        - scripts/podcast/tests/adapters/test_auto.py
        - scripts/podcast/tests/adapters/test_voice_mode.py
        - scripts/podcast/tests/e2e/test_folder_bundle.py
        - scripts/podcast/tests/e2e/test_single_pdf_manifest_parity.py
        - scripts/podcast/tests/e2e/fixtures/folder-bundle/   # 3-doc synthetic fixture
      files_modified:
        - scripts/podcast/scaffold_book.py                  # auto-scaffold 1-doc manifest for new single-source books (backward-compat shim)
        - scripts/podcast/orchestrate_book.py               # Phase 0a honors manifest ordering + adapter dispatch
        - scripts/podcast/_authoring.py                     # Phase 11 reads voice_mode for framing context
        - content/podcast/.skill/handbook/book-dir-layout.md   # document _system/source/manifest.yml schema
        - content/podcast/.skill/handbook/two-host-framing.md  # already updated 2026-05-19 with voice_mode override section
      manifest_schema: |
        schema_version: 1
        bundle_kind: folder | single_pdf | mixed
        voice_mode: single_author | curated_anthology | editor_voice
        title: "<Bundle Title>"
        author_or_curator: "<operator-supplied>"
        documents:
          - path: source/file1.pdf
            role: intro | chapter | appendix | sidebar | epigraph
            order: 1
            chapter_slug: <kebab-case>     # only when role: chapter
            adapter: arabic_pdf | english_pdf | markdown | transcript | auto
          - path: source/file2.txt
            role: chapter
            order: 2
      ext_acceptance:
        - "P17.1.ext.1 ✅ Manifest schema documented in book-dir-layout.md; YAML validator at scripts/podcast/adapters/_manifest.py"
        - "P17.1.ext.2 ✅ Four new adapters (english_pdf, markdown, transcript, auto) implement SourceAdapter Protocol; parity tests under tests/adapters/"
        - "P17.1.ext.3 ✅ scaffold_book.py auto-generates 1-doc manifest stub for new single-source books (backward-compat shim); scaffold_bundle.py auto-generates N-doc manifest stub from a folder walk"
        - "P17.1.ext.4 ✅ orchestrate_book.py Phase 0a honors manifest ordering + adapter dispatch; produces concatenated normalized.md with doc-boundary comment markers (<!-- DOC: file1.pdf | role: chapter -->)"
        - "P17.1.ext.5 ✅ Phase 0d respects manifest chapter_slug declarations; falls back to auto-segmentation only when manifest is silent"
        - "P17.1.ext.6 ✅ voice_mode field (single_author | curated_anthology | editor_voice) consumed by _authoring.py Phase 11; default = single_author preserves existing behavior"
        - "P17.1.ext.7 📊 Folder-bundle fixture under _learning/fixtures/folder_bundle/three-articles/ runs clean through Phase 0a → Phase 11; produces episode txt with cross-doc references intact"
        - "P17.1.ext.8 ✅ Single-PDF parity: existing W3 corpus books produce byte-identical refined-english.md + chapter txt with the auto-scaffolded 1-doc manifest (golden frozen at tiny-book + Ayyuhal Walad)"
        - "P17.1.ext.9 🔒 Sequencing-enforcement: run_wave.py 5 --phase P17 refuses dispatch until orchestrator_status.py --book asaas-al-taveel returns phase_status='complete'; CLI prints '⛔ Change-D extension code cannot land until P9.5 (Asaas) ships clean — the preflight convention is unvalidated.' Override flag: --force-pre-asaas (refuses unless ASAAS_OVERRIDE=1 env var also set, documented in source-adapter-registry.md). Closes the audit's single biggest sequencing risk."
      voice_mode_risk: |
        Cross-author voice homogenization in folder bundles is the single
        biggest risk. The current pipeline assumes one author voice per book
        (meta-prose-tells.md + enrichment-whitelist.md are per-book). A
        bundle_kind: folder mixing 5 authors will produce hosts who paper
        over real voice discontinuities. Mitigation: voice_mode manifest
        field — default `single_author` preserves current behavior;
        `curated_anthology` suppresses cross-doc meta-prose homogenization;
        `editor_voice` layers an explicit editor persona into framing.

