# -----------------------------------------------------------------------------
# Risks
# -----------------------------------------------------------------------------
risks:
  - id: R1
    severity: medium
    risk: "claude -p timeout fragility at scale (xlarge books)"
    mitigation: "P5.2 hardens artifact validation; P7 heartbeat exposes hangs; P9.6/P9.7 prove behavior on 591p and 865p books before W4 control plane goes live"

  - id: R2
    severity: medium
    risk: "Doc Intelligence 600s poll budget insufficient for 800+ page books"
    mitigation: "P9.6 / P9.7 expose. If hit, extend budget to 1800s as a single-line fix; PDF splitting (P17) remains deferred"

  - id: R3
    severity: medium
    risk: "FastAPI service started on Mac A while orchestrator run manually on Mac B → state divergence"
    mitigation: "Heartbeat carries hostname (P7.1); service rejects mutations on books whose last heartbeat was a different host (P11/P12)"

  - id: R4
    severity: low
    risk: "Phase rename (P15) breaks an in-flight book"
    mitigation: "P15 prereq_gate enforces zero-in-flight; translation layer makes migration atomic"

  - id: R5
    severity: medium
    risk: "Invented numeric enumerations slip past human review (P4)"
    mitigation: "Challenger Loop N (P4.5) raises P0 BLOCKED on any unsourced enumeration; book cannot ship until resolved"

  - id: R6
    severity: low
    risk: "P4 abjad reference file write to content/_shared/ breaks isolation principle"
    mitigation: "meta.scope_in_writes_to_shared_exception whitelists exactly one path; P1.1 boundary check honors the exception"

  - id: R7
    severity: medium
    risk: |
      Learning loop silently degrades: fixture coverage drops, promoted rules
      regress without anyone noticing, trainer runs all return NEVER_RAN, or
      patterns.md stops regenerating because findings.jsonl is corrupt.

      Failure mode: a book ships clean — but the next book inherits a quietly
      broken learning loop, and the system gets DUMBER over time. This is the
      most insidious failure mode for the P-9 invariant because nothing breaks
      loudly; the system just stops improving.
    mitigation: |
      Three layers of defense:
        1. P2.5 CI gate — test_challenger.py exits 0 on every PR; red harness
           blocks merge. This catches fixture regression at PR time.
        2. P7.5 + P8.5 dashboard visibility — fixture_coverage_pct,
           promoted_total, and last_trainer_outcome are surfaced on every
           dashboard load; a 14-day flat-line on promoted_total without any
           archived/ activity is a "system isn't learning" warning band.
        3. P9.8 cross-book yield report — terminal W3 artifact that explicitly
           asserts fixture_coverage_pct(W3 end) > fixture_coverage_pct(W3 start).
           If the assertion fails, W3 does NOT pass acceptance.

      Escalation path if the dashboard's warning band fires for >14 days:
        - Human inspects findings.jsonl for schema corruption
        - Human inspects most recent trainer run logs in _learning/archive/
        - If patterns.md is stale, run `learn_aggregate.py` manually
        - If the regression harness is red, address the failing fixture as a
          blocker before any more books are scheduled (W3 halts)

  - id: R8
    severity: low
    risk: |
      Trainer auto-archive of a proposal it should have escalated. If trainer
      regression fails for a NARROW reason that a human-authored, NARROWER diff
      could have passed, the proposal is permanently archived (per Tier-3 anti-
      overfit rule in podcast-trainer.agent.md §"INVARIANTS").
    mitigation: |
      The archive tombstone in _learning/archive/ MUST include the
      test_challenger.py failure output (per agent spec §"Archive flow"). A
      future human reviewing the archive can revive the proposal manually if
      they spot a viable narrower diff. P14 dashboard mutation UI surfaces
      archived proposals so this review can happen without grep-fu.

  - id: R9
    severity: medium
    risk: |
      Phase-prompt addenda (P19.1) compound silently. After 20+ books,
      a workhorse phase's effective prompt could be 3-5× its base length, with
      internally-contradictory directives accreted from 20+ trainer passes.
      Failure modes:
        a. Prompt-length inflation degrades model attention to the original
           phase task.
        b. Contradictory addenda fight each other ("be terse" vs. "be expansive
           on edge cases") — output quality oscillates between books.
        c. Token cost per phase silently inflates as the addenda accumulate
           (each addendum is ~50-200 tokens of input on every claude -p call).
    mitigation: |
      Three layers of defense:
        1. HARD CAP — at most 5 addenda per phase. P19.1 enforces this at
           write time; the 6th proposal triggers FIFO eviction (oldest by
           authored_at moves to _learned-addenda/_archive/). The trainer
           cannot bypass this.
        2. P19.3 health-score recursion — addenda that don't improve the
           next-book health-score for their target signature are auto-
           reverted. Self-correcting limit on prompt-length inflation.
        3. QUARTERLY HUMAN REVIEW — same cadence as findings.jsonl rotation
           (LL15). Reviewer reads each _learned-addenda/<phase>.md, asks:
           "is this still helpful? still consistent with sibling addenda?"
           Approves merges (combine 2-3 addenda into one tighter directive)
           or deletions. Default is "do nothing"; the cap + recursion handle
           steady-state drift.
      Cost-context observability: P7.5 heartbeat fields and P8.5 dashboard
      surface `addenda_active_count` per phase + `addenda_token_cost_per_call`.
      The trainer's cost-context audit line (P6.4) flags addendum-driven cost
      inflation.

