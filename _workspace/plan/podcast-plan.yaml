  - id: P5
    wave: W1
    name: "claude -p permission-mode fix + artifact validation"
    effort: hours
    priority: blocker
    depends_on: []
    why: |
      Current orchestrator silently fails inside Phases 05-refine-english / 06-phonetics / 07-chapter-design / 08-enrichment because
      `claude -p` refuses file-write tools without --permission-mode acceptEdits.
      Returns rc=0 with a refusal in stdout; orchestrator's artifact check logs
      "NO ARTIFACT" and proceeds. All windows on kitab-al-riyad failed this way
      last session (5 .in.md written, 0 .out.md).

      Per P-1 (Claude Code primary), `claude -p` is the canonical execution
      mechanism. This phase HARDENS that mechanism; it does NOT replace it.
    tasks:
      - id: P5.1
        title: "Add --permission-mode acceptEdits to all claude -p invocations"
        files:
          - scripts/podcast/_chunking.py
          - scripts/podcast/_authoring.py
        shipped_evidence:
          - "scripts/podcast/_authoring.py:99  [CLAUDE_CMD, '-p', '--permission-mode', 'acceptEdits', prompt]"
          - "scripts/podcast/_chunking.py:255  [CLAUDE_CMD, '-p', '--permission-mode', 'acceptEdits', prompt]"
        acceptance:
          - "grep 'claude -p' returns 0 results without --permission-mode flag"
          - "Both sites pass --permission-mode acceptEdits"
      - id: P5.2
        title: "Harden artifact check: rc=0 AND out_path exists AND non-empty"
        files:
          - scripts/podcast/_chunking.py
          - scripts/podcast/_authoring.py
        acceptance:
          - "If out_path missing OR file_size == 0, raise typed error with stdout/stderr capture"
          - "No silent 'NO ARTIFACT' continuation — every failure surfaces"
      - id: P5.4
        title: "Phase-id constants module (single source of truth for 14-step names)"
        why: |
          P5.4 lands the CONSTANTS module in W1; P8.6 (W2) does the bulk
          find/replace of literal phase-ID strings in scripts/podcast/ and HTML
          docs. Splitting the work this way means W3 corpus runs (and
          _learning/promoted/ tombstones citing them) use stable names from
          day one.
        files:
          - scripts/podcast/_phases.py                     # NEW
        spec: |
          Single module defining:
            ```python
            # scripts/podcast/_phases.py
            from enum import StrEnum

            class Phase(StrEnum):
                PREFLIGHT       = "01-preflight"
                BRANCH          = "02-branch"
                SCAFFOLD        = "03-scaffold"
                OCR_TRANSLATE   = "04-ocr-translate"
                REFINE_ENG      = "05-refine-english"
                PHONETICS       = "06-phonetics"
                CHAPTER_DESIGN  = "07-chapter-design"
                ENRICHMENT      = "08-enrichment"
                SERIES_PLAN     = "09-series-plan"
                REGISTER_SERIES = "10-register-series"
                PER_CHAPTER     = "11-per-chapter"
                TRAINER         = "12-trainer"
                MERGE           = "13-merge"
                DONE            = "14-done"

            PHASE_ORDER: tuple[Phase, ...] = tuple(Phase)

            ```

          Single execution path: no LEGACY_ALIAS, no `resolve()` indirection.
          Callers do `Phase(name)` directly. ValueError on unknown name.
          Other modules (orchestrate_book.py, _authoring.py, _chunking.py,
          _progress.py) DO NOT import this module yet — the bulk find/replace
          happens in P8.6. P5.4 lands the source-of-truth file plus a unit
          test that verifies enum + ordering.
        depends_on_local: [P5.1, P5.2]
        acceptance:
          - "scripts/podcast/_phases.py exists; Phase enum has all 14 values"
          - "PHASE_ORDER == tuple(Phase) (canonical phase ordering)"
          - "scripts/podcast/tests/test_phases.py exists; asserts (a) Phase is StrEnum, (b) PHASE_ORDER == tuple(Phase), (c) Phase('unknown-name') raises ValueError"
          - "Module has zero side effects on import (no FS writes, no network)"
          - "Module is consumed by W2 P8.6 bulk rewrite; W1 deliverable is the module + tests only"

      - id: P5.3
        title: "Re-run kitab-al-riyad --resume; verify 05-refine-english completes"
        branch_workflow: |
          1. P5.1 (perm-mode) is already on develop. Land P5.2 (artifact validation)
             on develop after P1 boundary check + P2 tiny-book smoke pass.
          2. Rebase `book/kitab-al-riyad` onto updated develop (or cherry-pick P5.2
             commit if rebase would touch in-flight files).
          3. Confirm orchestrator-state.json still parses unchanged after the rebase.
          4. `git checkout book/kitab-al-riyad` and
             `python3 scripts/podcast/orchestrate_book.py --resume kitab-al-riyad`.
        acceptance:
          - "P5.2 lands on develop BEFORE book branch resume (P5.1 already shipped)"
          - "book/kitab-al-riyad rebased clean onto develop; state.json untouched"
          - "All N refinement windows produce non-empty .out.md files"
          - "Phase transitions 05-refine-english → 06-phonetics → 07-chapter-design → 08-enrichment cleanly OR halts cleanly at 09-series-plan gate"

