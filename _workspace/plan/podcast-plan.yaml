    name: "Orchestrator phase rename: 14-step sequential naming"
    effort: 2-3 days
    priority: medium
    depends_on: [P14]
    prereq_gate: |
      ZERO in-flight books, verified by:
        python3 scripts/podcast/orchestrator_status.py --all --json | \
