# -----------------------------------------------------------------------------
# Open questions (must be resolved before P5)
# -----------------------------------------------------------------------------
open_questions:
  - id: Q1
    question: "Multi-Mac story for the service"
    detail: |
      User memory designates THIS Mac as primary for the Azure-backed pipeline as of
      2026-05-18. Runbook: ../primary-mac-activation.md. Does the FastAPI service (P2/P5)
      run on the primary Mac only, or are jobs delegated across machines? Affects:
      state location, auth, worker pool design, heartbeat hostname enforcement (R3).
    current_lean: "Service runs primary-only; secondary Macs are read-only viewers via SSH-tunneled dashboard."
    blocks: P5
    formal_resolution_task: P5.0   # promoted to a real task; this entry stays until the doc lands
  - id: Q2
    question: "Cost ceiling per book"
    detail: |
      Should the orchestrator halt if a book's running cost exceeds $X? Soft warning
      at heartbeat, hard halt before Phase 0d, etc.
    blocks: P3.4
  - id: Q3
    question: "Trainer integration with SDK migration"
    detail: |
      podcast-trainer.agent.md ingests per-chapter convergence outputs. SDK path
      should preserve that integration; verify before P3.3 ships.
    blocks: P3.3

# -----------------------------------------------------------------------------
# Risks
# -----------------------------------------------------------------------------
risks:
  - id: R1
    severity: high
    risk: "P3 SDK migration introduces a regression that's only visible at scale"
    mitigation: "Run P4.1 and P4.2 (tiny + small books) FIRST on the SDK path before declaring P3 done. Keep CLAUDE_CMD fallback for one release."
  - id: R2
    severity: medium
    risk: "Doc Intelligence 600s poll budget insufficient for 800+ page books"
    mitigation: "P4.6 / P4.7 expose this. If hit, extend budget to 1800s as a single-line fix; PDF splitting still deferred."
  - id: R3
    severity: medium
    risk: "FastAPI service started on Mac A while orchestrator is run manually on Mac B → state divergence"
    mitigation: "Heartbeat carries hostname; service rejects mutations on books whose last heartbeat was a different host (configurable override)."
  - id: R4
    severity: low
    risk: "Phase rename (P6.1) breaks an in-flight book"
    mitigation: "Defer P6.1 until no books are in-flight; translation layer makes the migration atomic when run."

# -----------------------------------------------------------------------------
# Done definition
# -----------------------------------------------------------------------------
