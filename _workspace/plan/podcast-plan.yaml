    promote_when: "P13 SQLite index proven stable AND P2.6 refinement determinism green AND P9.8 yield report shows fixture_coverage_pct trending UP"
    why: |
      Today the trainer can only edit _rules.py DENY lists (a static change).
      P19 gives it a channel to teach the LLM new tricks in the workhorse
      phases (refinement, phonetics, framing) — gated by regression fixtures
      (anti-Goodhart) and health-score recursion (effect verification).
    risk_cap: "See R9 — addenda compound silently. Hard cap ≤5 addenda per phase, FIFO eviction."
    tasks:
      - id: P19.1
        title: "Phase-prompt addendum substrate"
        files:
          - content/podcast/.skill/handbook/_learned-addenda/   # NEW directory
          - content/podcast/.skill/handbook/_learned-addenda/README.md   # NEW
          - scripts/podcast/_authoring.py                       # extend prompt assembly to read addenda
          - .github/agents/podcast-trainer.agent.md             # Protocol §3 addendum-writing flow
        spec: |
          Trainer may write per-phase addendum files at:
            content/podcast/.skill/handbook/_learned-addenda/<phase-id>.md
            (one file per orchestrator phase: 05-refine-english, 06-phonetics,
             07-chapter-design, 08-enrichment, 11-per-chapter)
          File schema:
            ```
            ---
            schema_version: 1
            phase: 05-refine-english
            signature: <check-id-or-cluster-signature>
            authored_by: podcast-trainer
            authored_at: <ISO-8601 UTC>
            authored_from_books: [<slug1>, <slug2>, ...]
            ---
            ## Guidance
            <one-paragraph instruction added to phase prompt>
            ## Counter-examples (DO NOT do this)
            - <surface-form-1>
            ## Positive examples (DO this)
            - <surface-form-1>
            ```
          _authoring.py prompt assembly reads addenda matching the current phase
          and concatenates them under a clear `<learned-addenda>` XML block at
          the END of the base system prompt:
            <learned-addenda>
            <!-- These guidances were learned from N prior books -->
            <addendum signature="..." phase="05-refine-english">
              ...
            </addendum>
            </learned-addenda>
          R9 cap: at most 5 addenda per phase. When a 6th is proposed, oldest
          (by authored_at) is moved to content/podcast/.skill/handbook/_learned-addenda/_archive/.
          Trainer agent spec §3 (Cluster + Hypothesize) extended with:
            "If proposal targets a workhorse phase (05-refine-english, 06-
             phonetics, 07-chapter-design, 08-enrichment, 11-per-chapter),
             write a phase-prompt addendum INSTEAD OF (or IN ADDITION TO)
             a _rules.py DENY-list edit. Phase-prompt addenda are subject to
             P19.2 regression-fixture gating before write."
        depends_on_local: [P13.1, P2.6]
        acceptance:
          - "_learned-addenda/ directory exists with README.md documenting schema + R9 cap"
          - "_authoring.py prompt assembly reads addenda matching current phase and concatenates them in `<learned-addenda>` XML block"
          - "R9 cap enforced: 6th addendum to same phase triggers FIFO eviction (oldest → _archive/)"
          - "podcast-trainer.agent.md Protocol §3 documents the addendum-writing flow with the 5-cap"
          - "Schema validation: every addendum file's frontmatter validates against the schema"

      - id: P19.2
        title: "Phase-prompt regression fixtures + Goodhart guard"
        files:
          - content/podcast/.skill/_learning/fixtures/phase_prompts/   # NEW dir tree
          - content/podcast/.skill/_learning/fixtures/phase_prompts/05-refine-english/   # 3+ fixtures
          - content/podcast/.skill/_learning/fixtures/phase_prompts/06-phonetics/        # 3+ fixtures
          - content/podcast/.skill/_learning/fixtures/phase_prompts/11-per-chapter/      # 3+ fixtures
          - scripts/podcast/test_phase_prompts.py                       # NEW
        spec: |
          For each workhorse phase that accepts addenda, ship at least 3
          regression fixtures:
            input.md       — input text for the phase
            expected.json  — expected output structural properties (header count,
                             paragraph count, word-count range, key phrases that
                             MUST or MUST NOT appear)
          test_phase_prompts.py runs each phase prompt assembly with addenda
          loaded, drives a mock-or-real claude -p call against input.md, and
          asserts expected.json properties hold within tolerance.
          Goodhart guard: when trainer proposes a new addendum, the proposal
          must FIRST pass test_phase_prompts.py against the existing fixtures.
          If it fails ANY fixture, the proposal is archived (per the same
          flow as test_challenger.py for _rules.py edits). Fixtures are
          HUMAN-AUTHORED ONLY — trainer NEVER adds or modifies fixtures
          (same anti-overfit rule as test_challenger.py per agent INVARIANTS).
        depends_on_local: [P19.1]
        acceptance:
          - "≥3 fixtures per phase under fixtures/phase_prompts/<phase>/"
          - "test_phase_prompts.py exits 0 against current fixtures (post-P19.1 substrate; no addenda yet)"
          - "Trainer addendum proposals pass test_phase_prompts.py BEFORE write; failing proposals archived with tombstone"
          - "podcast-trainer.agent.md INVARIANTS section reaffirms: trainer does not author or modify phase_prompts fixtures (only humans)"
          - "CI: test_phase_prompts.py runs on every PR touching scripts/podcast/_authoring.py OR content/podcast/.skill/handbook/_learned-addenda/"

      - id: P19.3
        title: "Health-score recursion — next-book post-addendum verification"
        files:
          - scripts/podcast/_authoring.py                  # invoke_trainer end-of-book check
          - .github/agents/podcast-trainer.agent.md        # Protocol §END addendum-revert flow
        spec: |
          After an addendum lands on a phase, the NEXT book that runs through
          that phase must show a non-worse health-score component for the
          check_ids the addendum targeted. Specifically:
            • Trainer's end-of-run audit (invoke_trainer in _authoring.py)
              records: addenda_in_effect: [<phase>/<signature>, ...]
            • At next-book trainer pass, compute per-signature health-score
              delta vs. last-book-with-this-signature
            • If delta is WORSE (more findings of the same signature class),
              the addendum is REVERTED automatically: file moved from
              _learned-addenda/<phase>.md to _learned-addenda/_archive/
              with a revert-tombstone explaining the regression
            • If delta is equal or better, addendum stays
          This closes the loop on "is the system actually getting smarter?" —
          an addendum that doesn't improve outcomes self-evicts.
        depends_on_local: [P19.1, P19.2]
        acceptance:
          - "invoke_trainer records addenda_in_effect in end-of-book audit"
          - "Next-book trainer pass computes per-signature health delta and reverts regressed addenda"
          - "Revert-tombstone in _learned-addenda/_archive/ cites the regression measurements"
          - "If addendum reverts 2+ times for the same signature, signature is escalated to human-review queue (P14 dashboard surface)"

  - id: P22
    wave: W2
    name: "Operator-review gate after Phase 0a (English-transcript halt + comment-driven refinement)"
    promote_when: |
      PROMOTED 2026-05-19 — operator explicitly opted in. Verbatim:
      "Can I get a full transcription of the book in English since it's being
      processed entirely anyways? Without that this effort is not worth much.
      Once you have the full transcript (in English from whatever language)
      then you should apply all refinements. You should break for my review
      and comment-based updates before starting the heavy processing cycles."
    why: |
      Today the orchestrator runs Phase 0a (OCR + translate) → Phase 0b
      (refinement, chunked, ~32 windows for a 260-page book) → Phase 0c
      (phonetic) → Phase 0d (chapter design) → Phase 0e (enrichment) → Phase
      0f (operator gate). The operator's first chance to see the book in
      English is somewhere mid-Phase 0b when refined.md starts taking shape,
      and the first hard halt is Phase 0f — by which point ~6 hours of LLM
      work has already happened.

      Two problems with this:
        1. The operator has no early visibility into the *raw English text*
           of the book. If OCR scrambled a passage, if translation glitched,
           if a page was skipped — the operator finds out 6 hours in.
        2. There is no place to insert operator domain knowledge (corrections,
           glossary additions, page-range adjustments) before the heavy
           LLM-driven phases bake assumptions into refined.md.

      P22 inserts a halt-with-DoR gate immediately after Phase 0a. The
      orchestrator writes a clean, paginated English transcript artifact +
      a scaffolded operator-review.md file, then halts. The operator reads
      the transcript, adds comments to operator-review.md (or edits the
      transcript directly), then resumes with --approve-transcript. The
      operator's comments are concatenated into the Phase 0b refinement
      prompt as additional context.

      Net effect: ~5 minutes of operator attention BEFORE the 6-hour heavy
      cycle, instead of after. The operator's review catches OCR/translation
      issues at the cheapest possible point, and the operator's domain
      knowledge informs every downstream phase.
    files:
      - scripts/podcast/orchestrate_book.py                  # MODIFY — Phase 0a now writes english-transcript.md + halts at 0a.5 gate
      - scripts/podcast/_authoring.py                        # MODIFY — Phase 0b refinement reads operator-review.md as additional prompt context
      - scripts/podcast/_transcript_writer.py                # NEW — clean paginator: normalized.md → english-transcript.md with page breadcrumbs
      - scripts/podcast/tests/test_transcript_writer.py      # NEW
      - scripts/podcast/tests/e2e/test_operator_review_gate.py  # NEW
      - docs/podcast/operator-review-gate.md                 # NEW — operator workflow doc
    halt_point_heuristic: |
      The halt point depends on where the first CLEAN readable English
      artifact is produced:

      - **Arabic-scanned PDF source** (e.g. KaR, Asaas, Raahat al-Aqal):
        halt AFTER Phase 0b. Phase 0a produces raw-extract.md (Azure raw
        translate is unreadable junk — proper names mangled, sentences
        scrambled). Phase 0b produces refined-english.md, which IS the
        readable English transcript. Halt here.
      - **English text-layer PDF source** (e.g. modern English books with
        OCR text already embedded): halt AFTER Phase 0a. Phase 0a produces
        the English text directly via PDF text extraction. Phase 0b
        becomes a light polish pass and the transcript is essentially
        what Phase 0a emitted.
      - **Markdown / transcript source**: halt AFTER Phase 0a. The text
        is already clean.

      The orchestrator detects which case applies by reading the source
      adapter (P17.1) and the source language. Default: halt after the
      first phase whose output is a complete, single-file English artifact
      passing a readability heuristic (proper-noun integrity, sentence
      coherence, ≥80% recognizable English vocabulary).
    spec: |
      When the halt phase completes, the orchestrator:
        1. Reads <book>/_system/source/text/refined-english.md
           (or normalized.md for English-source cases per halt_point_heuristic)
        2. Calls _transcript_writer.paginate(source) → english-transcript.md
           - paragraph breaks preserved
           - page-number breadcrumbs from OCR metadata inserted every page boundary
           - generous left margin for marginal review notes
           - top-of-file header naming the book + source language + OCR confidence
             + which-phase-was-the-halt-point
        3. Writes english-transcript.md to <book>/english-transcript.md
           (top-level, not buried under _system/, so it's visible to the
           operator at a glance)
        4. Writes a scaffolded operator-review.md template to
           <book>/operator-review.md with sections:
             - Translation issues (page-anchored)
             - Missing or scrambled passages
             - Glossary additions
             - Pronunciation corrections
             - Free-form comments
             - **Content range** (§7): operator declares body_starts_at_page
               + body_ends_at_page; heuristic-suggested defaults pre-filled
               by the scaffolder (first page whose paragraph density crosses
               threshold T after a recognized signature like "Introduction"
               or "Editor's Preface" → body_starts; last page before a
               recognized "Index" / "Bibliography" / "Errata" header →
               body_ends). On --approve-transcript resume, the orchestrator
               emits content-range.md from this section. See P4.10.
             - "I approve this transcript — proceed" checkbox
        5. Sets state.json phase_status="halted-for-transcript-review",
           writes halt message to stdout/log:
           ```
           ┌─────────────────────────────────────────────────────────────┐
           │ HALTED — English transcript ready for operator review       │
           │                                                             │
           │ Read:   <book>/english-transcript.md                        │
           │ Comment: <book>/operator-review.md (or edit transcript)     │
           │ Resume: python3 orchestrate_book.py --resume <slug>         │
           │           --approve-transcript                              │
           └─────────────────────────────────────────────────────────────┘
           ```
        6. Exits with rc=3 (halt, not error)

      When the operator runs --approve-transcript:
        1. Verifies operator-review.md has the "I approve" checkbox marked
           OR is empty (no comments = silent approval)
        2. Reads operator-review.md and any inline edits to
           english-transcript.md
        3. Passes the operator's comments into the Phase 0b refinement
           prompt as a `<operator-review>` XML block at the top of the
           system prompt
        4. Resumes Phase 0b normally
    depends_on: [P5, P6]   # P5 ships acceptEdits + artifact validation; P6 ships cost ledger (the gate must not lose ledger context across halt-resume)
    acceptance:
      - "P22.impl-halt-point ✅ Halt-point detection: Arabic-scanned source → halt after Phase 0b; English text-layer source → halt after Phase 0a; markdown source → halt after Phase 0a (verified against fixtures)"
      - "P22.impl-transcript-exists ✅ At halt, <book>/english-transcript.md exists; word count within ±2% of source artifact (paragraphing preserved; page breadcrumbs intact)"
      - "P22.impl-review-template ✅ At halt, <book>/operator-review.md exists with scaffolded sections; operator can mark 'I approve' checkbox"
      - "P22.impl-state ✅ state.json shows phase_status='halted-for-transcript-review' at the halt point"
      - "P22.impl-exit-code ✅ Orchestrator exit code is 3 (halt) — not 0 (success) or 1 (error)"
      - "P22.impl-approve-flag ✅ --approve-transcript flag resumes from the halt; refuses to resume if operator-review.md has comments but no 'I approve' checkbox"
      - "P22.impl-prompt-injection ✅ Downstream phases from the halt point onwards include operator-review.md content as <operator-review> XML block when present (Phase 0b+ for English-text-layer/markdown halt-after-0a; Phase 0c+ for Arabic-scan halt-after-0b)"
      - "P22.test-e2e ✅ E2E test: operator-review.md with 3 typo corrections influences refined.md (assertion via Levenshtein delta in fixture)"
      - "P22.impl-skip-flag ✅ Backward-compat: --skip-transcript-gate flag bypasses the halt for runs that don't want the gate (default: gate is on)"
      - "P22.impl-cost-ledger ✅ Cost-ledger row written for the halt-point paginator step (no LLM call; records the paginator + scaffolder runtime)"
      - "P22.impl-no-overwrite ✅ operator-review.md is NEVER overwritten by the orchestrator after initial scaffold; operator edits are preserved on resume"
      - "P22.preflight-invariant 🔒 Hand-authored preflight artifacts NEVER overwritten: if <book>/_system/source/text/chapters-rationale.md OR <book>/_system/concept-glossary.md OR <book>/_system/registry.md exists at halt time, the orchestrator MUST NOT regenerate them after --approve-transcript. (Asaas case: all three are hand-authored before Phase 0a — auto-regenerating them on resume would destroy the operator's preflight intelligence.)"
      - "P22.git-policy ✅ english-transcript.md and operator-review.md are git-tracked (NOT under .gitignore) — audit trail of operator interventions across runs; commits use the message convention 'podcast(<book-slug>): operator transcript review — <one-line summary>'"
      - "P22.range ✅ operator-review.md template includes §7 Content range with heuristic-suggested defaults (body_starts_at_page, body_ends_at_page); on --approve-transcript resume, orchestrator emits _system/source/text/content-range.md from operator's declaration (per P4.10). Operator can override the heuristic defaults; if §7 is left blank, content-range.md is NOT emitted and Phase 0d ingests the whole transcript as today."

  - id: P21
    wave: W5
    name: "Cross-book learning store (vocabulary + patterns + author profiles + operator preferences)"
    promote_when: |
      ≥3 books shipped clean through W3 corpus (P9.1–P9.3 minimum) AND
      operator opts in. The store needs at least 3 books' worth of vocabulary
      and pattern observations to be worth the indexing overhead.

      Original operator motivation (2026-05-19): "The cognitive and language
      load on the LLM should keep reducing drastically from each run. Once
      you learn patterns and they're stored in some fashion in a local
      database, it should work. Remember I am the ONLY one using this."
    why: |
      Today every book's Phase 0c (Arabic phonetic pass) re-derives phonetic
      guides for terms the system has already seen 50 times across other
      books. Every Phase 0d re-derives chapter-design patterns. Every
      Phase 11 re-discovers the author's style profile. No knowledge
      accumulates across books beyond the trainer's narrow phase-prompt
      addenda (P19) and the per-book glossary/pronunciation files.

      The cross-book learning store changes that. Single-user, single-Mac,
      git-tracked SQLite + structured YAML files. Each phase looks up known
      terms / patterns / profiles BEFORE calling claude -p. Cache hits skip
      LLM cost entirely. Cache misses go through the LLM as today, then
      promote the result to the store for the next book.

      Concrete time savings (per modeling):
        - Book 2 (post-store): ~20-30% faster end-to-end vs book 1
        - Book 5: ~40-50% faster
        - Book 10: ~50-60% faster (asymptotic)
        - Phase 0c phonetic pass: up to 80% LLM-call reduction by book 5
        - Phase 0b refinement: ~20-25% reduction (style profile reuse)
        - Phase 0e enrichment: ~30-50% reduction (pattern library reuse)
    promote_when_rationale: |
      Premature promotion (after only 1-2 books) burns engineering effort on
      indexing infrastructure without enough data to demonstrate the cache-hit
      curve. P9.1-P9.3 (Ayyuhal Walad, Masaail, Majalis Moyyada) span small
      and small-medium ranges across different content types — sufficient
      seed corpus for vocabulary.sqlite to start showing 30%+ hit rates.
    files_new:
      - content/podcast/_learning/vocabulary.sqlite          # NEW — gitignored binary; rebuildable from JSONL log
      - content/podcast/_learning/vocabulary.jsonl           # NEW — append-only audit log; git-tracked
      - content/podcast/_learning/patterns.sqlite            # NEW — gitignored
      - content/podcast/_learning/patterns.jsonl             # NEW — git-tracked
      - content/podcast/_learning/author-profiles/           # NEW — one YAML per author
      - content/podcast/_learning/operator-prefs.yml         # NEW — voice_mode default, tier default, etc.
      - content/podcast/_learning/cache-stats.jsonl          # NEW — per-run hit-rate telemetry
      - scripts/podcast/_learning_store.py                   # NEW — read/write API
      - scripts/podcast/_learning_rebuild.py                 # NEW — rebuild .sqlite from .jsonl audit log
      - scripts/podcast/tests/test_learning_store.py         # NEW
    files_modified:
      - scripts/podcast/_chunking.py                         # Phase 0c looks up term phonetics before LLM call
      - scripts/podcast/_authoring.py                        # Phase 0b/0e style-profile + pattern lookups
      - .gitignore                                            # ignore *.sqlite under _learning/
    seed_corpus_policy: |
      Per-book concept-glossary.md (Change A) is the PRIMARY seed source for
      vocabulary.sqlite. On every successful book ship (W3+ corpus), the
      learning-store-loader walks `<book>/_system/concept-glossary.md` and
      promotes each term with: first_seen_book=<slug>, confidence=0.95
      (hand-authored books like Asaas's preflight) or 0.7 (claude-p-generated
      glossaries), operator_locked=false. The operator can flip operator_locked=true
      from the dashboard (P8 /learning/vocabulary endpoint). Pronunciation.md
      is the secondary seed source for the pronunciation field. mangle-map.md
      stays per-book — it does NOT promote (mangle is TTS-voice-specific).

      Goodhart guard interaction with Loop N: cached terms in vocabulary.sqlite
      do NOT affect Loop N (numeric-invented detection). Loop N runs on
      refinement output and detects invented numeric enumerations regardless
      of whether the underlying terms are cache-hit. P4 numeric-disambiguation
      register is NOT a seed source for patterns.sqlite — numeric claims
      always re-derive per book.
    schema_sketch: |
      vocabulary.sqlite
        terms(
          term TEXT PRIMARY KEY,           -- the Arabic / foreign word
          source_lang TEXT,                -- "ar" | "ur" | "fa" | ...
          pronunciation TEXT,              -- phonetic guide
          one_line_gloss TEXT,             -- conceptual meaning
          domain TEXT,                     -- cosmology | hermeneutics | fiqh | ...
          first_seen_book TEXT,            -- book slug
          first_seen_at TEXT,              -- ISO ts
          occurrence_count INTEGER,        -- across all books
          operator_locked BOOLEAN,         -- true = operator-approved canonical; never re-derive
          confidence FLOAT                 -- 0.0-1.0; LLM-derived vs operator-confirmed
        )

      patterns.sqlite
        patterns(
          signature TEXT PRIMARY KEY,      -- hash of (book_type, structure_key)
          pattern_name TEXT,               -- "qur'anic verse → exegesis → moral application"
          example_books TEXT,              -- JSON array of slugs
          template TEXT,                   -- markdown template
          times_used INTEGER
        )
    acceptance:
      - "P21.api ✅ scripts/podcast/_learning_store.py exposes: lookup_term(term, lang) -> Term | None; promote_term(...); lookup_pattern(...); promote_pattern(...)"
      - "P21.perf ✅ Lookups complete in <5ms p99 (SQLite read; in-memory cache after first hit)"
      - "P21.telemetry ✅ Cache-stats per-run telemetry: cache-stats.jsonl row per phase with {phase, lookups, hits, misses, hit_rate, elapsed_ms_saved}"
      - "P21.review ✅ Operator review surface: dashboard (P8) gets a /learning/vocabulary endpoint listing recent additions; operator can mark terms operator_locked=true"
      - "P21.audit ✅ Audit log: every store write also appends to .jsonl; rebuild_from_jsonl reproduces .sqlite byte-identical OR within documented tolerance"
      - "P21.boundary ✅ Boundary check (P1.1): _learning_store.py reads but does not write outside content/podcast/_learning/"
      - "P21.cost-ledger ✅ Cost-ledger integration: rows include hit/miss field; LLM-skipped calls show $0 cost with method='cache-hit'"
      - "P21.goodhart 🔒 Operator can mark a term as operator_locked, preventing the LLM-derived value from re-asserting itself on a later run"
      - "P21.seed-glossary ✅ Per-book concept-glossary.md is the primary seed source for vocabulary.sqlite (see seed_corpus_policy block above): confidence 0.95 for hand-authored, 0.7 for claude-p-generated; operator_locked=false on initial promotion"

