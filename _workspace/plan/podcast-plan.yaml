      # ── v3.2 additions: W2 absorbs the former W5 work ───────────────────────
      - id: P8.6
        title: "Bulk phase rename + HTML doc rewrite (formerly W5 P15)"
        why: |
          P5.4 (W1) landed the _phases.py constants module. P8.6 does the bulk
          find/replace across scripts/podcast/ to remove literal phase-ID strings
          and consumes _phases.Phase enum. Also rewrites the 5 podcast architecture
          HTML docs. Runs at END of W2, AFTER P8.1-P8.5 ship, BEFORE W3 corpus
          begins — zero-in-flight is naturally satisfied in this window.
        prereq_gate: |
          scripts/podcast/orchestrator_status.py --all --json | \
            jq '[.books[] | select(.phase_status=="running" or .phase_status=="failed")] | length' \
          == 0
        files:
          - scripts/podcast/_progress.py                  # bump schema_version 1→2; translation layer
          - scripts/podcast/orchestrate_book.py           # import Phase; PHASE_ORDER from _phases
          - scripts/podcast/_authoring.py                 # invoke_trainer writes Phase.TRAINER
          - scripts/podcast/_chunking.py
          - scripts/podcast/_convergence.py
          - scripts/podcast/extract_chapter.py
          - scripts/podcast/build_episode_txt.py
          - skills-staging/podcast/SKILL.md               # phase-ID references
          - .github/agents/podcast-orchestrator.agent.md
          - .github/agents/podcast-trainer.agent.md
          - .github/agents/podcast-challenger.agent.md    # (post-P8.8 migration; staged here)
          - .github/agents/podcast-extract.agent.md       # (post-P8.8 migration; staged here)
          - _workspace/plan/podcast-plan.yaml             # this file — any remaining 0a..0g references
          - _workspace/plan/view/index.html
          - _workspace/plan/view/phased-plan.html
          - _workspace/plan/view/podcast-capabilities.html
          - docs/architecture/podcast-pipeline.html
          - docs/architecture/podcast-orchestrator.html
          - docs/architecture/podcast-quality-system.html
          - docs/architecture/podcast-overview.html
          - docs/architecture/index.html
        spec: |
          1. read_state() detects schema_version=1, rewrites old phase keys
             ("0a"..."0g", "trainer", "merge", "done") to new canonical values
             via _phases.LEGACY_ALIAS before returning state dict.
          2. write_state() emits schema_version=2 with new keys only.
          3. CLI argparse `--retry-phase` accepts BOTH old and new names for one
             release (resolves via _phases.resolve()).
          4. Logs, banners, JSONL events, heartbeat.json, cost-ledger.jsonl all
             use the NEW names.
          5. invoke_trainer() at _authoring.py writes update_phase(book_dir,
             phase=Phase.TRAINER, ...) — not the literal "trainer" string.
          6. PHASE_ORDER tuple in orchestrate_book.py imports from _phases.py.
          7. docs/architecture/podcast-*.html and _workspace/plan/view/*.html
             updated atomically (same commit) so the diagram phase labels
             match the code constants.
        acceptance:
          - "Existing state.json migrates seamlessly on first read (schema_version 1 → 2)"
          - "`--retry-phase 0b` AND `--retry-phase 05-refine-english` both resolve to the same Phase.REFINE_ENG"
          - "`grep -rE '\\b0[a-g]\\b' scripts/podcast/ --include='*.py'` returns 0 literal phase-ID matches outside _phases.LEGACY_ALIAS"
          - "`grep -n '\"trainer\"' scripts/podcast/ --include='*.py'` returns 0 raw matches outside _phases.LEGACY_ALIAS"
          - "scripts/podcast/tests/e2e/test_phase_rename.py asserts state.json shows `12-trainer` after the trainer step on a schema_version=2 fixture; schema_version=1 fixture migrates; --retry-phase trainer resolves to Phase.TRAINER"
          - "All 5 docs/architecture/podcast-*.html files updated in lockstep; grep on each for literal 0a..0g returns 0 results"
          - "All 4 _workspace/plan/view/*.html files updated for phase-pill grid (P5.5 → P14-DONE labels show new step names)"

      - id: P8.7
        title: "D3.js view upgrade — 6 diagrams across 4 HTML views (offline-bundled)"
        why: |
          Per the v3.2 audit (CORE-064 sweep): index.html / phased-plan.html /
          podcast-capabilities.html / acceptance-criteria.html collectively
          have 0 interactive flow diagrams. The 16 inline SVGs across the four
          files are decorative badges, not architecture. The plan's promise of
          "SVG architecture diagrams" in index.html's nav card is unfulfilled.

          Honoring index.html:312-317 "offline by design" — bundle d3.v7.min.js
          locally; no CDNs.
        files:
          - _workspace/plan/view/assets/js/d3.v7.min.js   # NEW — bundled vendor copy (~280KB)
          - _workspace/plan/view/assets/js/diagrams.js    # NEW — 6 diagram builders + theme integration
          - _workspace/plan/view/assets/css/diagrams.css  # NEW — D3-targeted styles using existing theme vars
          - _workspace/plan/view/index.html               # mount diagram #1 (wave DAG)
          - _workspace/plan/view/phased-plan.html         # mount #2 (phase Gantt) + #3 (P4 decision tree)
          - _workspace/plan/view/podcast-capabilities.html # mount #4 (pipeline flowchart) + #5 (agent topology)
          - _workspace/plan/view/acceptance-criteria.html # mount #6 (acceptance heatmap)
        diagrams:
          - id: D1
            view: index.html
            kind: "Wave dependency DAG (D3 force-directed or Dagre layout)"
            data_source: "waves[].phases + waves[].gates_open_next"
