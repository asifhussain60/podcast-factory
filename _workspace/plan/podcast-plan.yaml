# -----------------------------------------------------------------------------
# Guiding principles
# -----------------------------------------------------------------------------
principles:
  - id: P-1
    name: "Claude Code is the primary execution mechanism"
    detail: |
      `claude -p --permission-mode acceptEdits` is the canonical LLM-call site for
      every workhorse phase (05-refine-english, 06-phonetics, 07-chapter-design,
      08-enrichment, per-chapter framing/build/challenger, trainer). The Anthropic
      Python SDK is RESERVED for narrow side-channel use (status-API helper, cost
      ledger token counting), NEVER for the primary execution path. This preserves
      the Claude Code agent runtime (tool use, multi-turn, permission semantics) that
      the skill design depends on.

  - id: P-2
    name: "Ship the band-aid before the cure"
    detail: |
      P5 is a 2-line permission-mode fix that unblocks kitab-al-riyad today. Ship
      it via Wave 1 even though P6 (cost ledger) and P7 (heartbeat) will harden
      around it. No phase is allowed to depend on a yet-unshipped phase from a
      later wave.

  - id: P-3
    name: "Observation before mutation"
    detail: |
      Wave 2 (heartbeat + status API) ships BEFORE Wave 4 (control plane mutation
      API). A dashboard is useless if the process is opaque; mutations are dangerous
      if you cannot see what is happening.

  - id: P-4
    name: "Validate on real books before refactoring"
    detail: |
      Wave 3 runs the graduated book corpus (30p → 865p) only AFTER Wave 2 has
      shipped its polish work (P8.6 phase rename, P8.7 view upgrade, P8.8 agent
      dedup). The W2 closing sequence requires zero in-flight books — naturally
      true before W3 begins. See waves[id=W2].prereq_gate_for_p8_6_p8_8.

  - id: P-5
    name: "Resume-safe checkpoints everywhere"
    detail: |
      Every new code path must be resume-safe: append-only logs, .done markers,
      atomic file writes. No phase may overwrite state from an earlier phase.

  - id: P-6
    name: "Podcast / journal isolation is enforced, not aspirational"
    detail: |
      No file under scripts/podcast/ may import from scripts/site/ or scripts/memoir/.
      P1 audits, P16 wires the CI check. One whitelisted exception: P4 creates
      content/_shared/arabic/06-abjad-numerals.md (see meta.scope_in_writes_to_shared_exception).

  - id: P-7
    name: "Manual handoff for cross-skill content, never automatic"
    detail: |
      The podcast skill MAY propose additions to journal libraries (quotes, clinical,
      memoir) by writing to BOOK_DIR/_system/episode-drafts/EP##-*/proposed-library-entries.md.
      It MUST NEVER write directly to content/babu-memoir/** or content/_shared/**
      (except the P4 abjad file noted above). Promotion is a manual journal-side step.

  - id: P-8
    name: "No invented enumerations (Numeric/Symbolic Disambiguation)"
    detail: |
      Any numeric claim in source text ("twelve regions", "seven seas") must be
      either (a) backed by a period-attested enumeration with source citation, or
      (b) explicitly flagged for human review. Inventing an unsourced enumeration
      is a P0 BLOCKED finding from podcast-challenger Loop N (P4).

  - id: P-9
    name: "The system must measurably improve from every shipped book"
    detail: |
      The `_learning/` closed-loop substrate (sense → aggregate → propose → test →
      promote → trainer) is a load-bearing invariant, not a nice-to-have. Every
      book that ships MUST:
        (a) append findings to `_learning/findings.jsonl` via `emit_finding()`,
        (b) refresh `_learning/health/<book-slug>.json` and append a row to
            `BOOK_DIR/_system/health-trend.md`,
        (c) cause `learn_aggregate.py` to regenerate `_learning/patterns.md`,
        (d) cause `learn_propose.py` to either emit new proposals or no-op,
        (e) trigger the `podcast-trainer` agent which either promotes a
            regression-green diff (test_challenger.py 7/7 green in worktree) or
            archives a proposal with documented reason.
      The regression harness `scripts/podcast/test_challenger.py` MUST stay green
      on `develop` AT ALL TIMES — a red harness is a release-blocker tracked by
      W1 acceptance row P2.5 + W3 per-book ship gate.

      The trainer NEVER auto-modifies the regression fixture set; only humans
      add fixtures (anti-Goodhart). A trainer pass that ends with 0 proposals
      promoted AND 0 proposals archived is suspicious — surface a warning.

      "Smarter on every run" is operationalized by three metrics tracked in the
      dashboard (P8.5):
        1. Fixture coverage = |fixtures/| / |distinct check_ids in patterns.md|
           — must trend ↑ over time, never ↓ except by human-approved deletion.
        2. Promoted-rule count (`promoted/` cardinality) — append-only series.
        3. Per-book health score (P0·1.0 + P1·0.2 + P2·0.05 penalty) — should
           trend ↓ for repeat books (same book re-run with newer rule set).
      All three are surfaced in `/books/{slug}/learning` (P8.5) and on the
      Wave-3 per-book ship checklist (P9.*).

# -----------------------------------------------------------------------------
# Intelligence sources — where each agent/skill MUST consult before acting
# -----------------------------------------------------------------------------
intelligence_sources:
  podcast:
    canonical_skill:  "skills-staging/podcast/SKILL.md"
    consult_before_any_edit:
      - {path: "skills-staging/podcast/SKILL.md",                     when: "every session start",         staleness_signal: "git diff vs branch HEAD"}
      - {path: "scripts/podcast/orchestrate_book.py",                 when: "any state-machine change",    staleness_signal: "phase_map / state schema drift"}
      - {path: "scripts/podcast/_progress.py",                        when: "any state-schema edit",       staleness_signal: "schema_version constant out of sync with state.json"}
      - {path: "content/podcast/library/books/*/_system/orchestrator-state.json", when: "before resume / retry-phase", staleness_signal: "phase_status=running with stale ts_updated"}
      - {path: "_workspace/plan/podcast-plan.yaml",                   when: "every multi-step task",       staleness_signal: "meta.restructured date >7d old AND active wave changed"}
      - {path: "_workspace/plan/research/findings.md",                when: "any architecture decision",   staleness_signal: "linked URL HTTP 404"}
      - {path: "_workspace/plan/numeric-symbolic-disambiguation-plan.md", when: "any per-book scaffolding for Islamic source material", staleness_signal: "ambiguity register stale relative to chapter list"}
      - {path: "content/podcast/.skill/handbook/numeric-symbolic-disambiguation.md", when: "any chapter with numeric/symbolic claims", staleness_signal: "P4 deliverable; created in Wave 1"}
      - {path: "content/_shared/arabic/06-abjad-numerals.md",         when: "any letter-count / abjad-value claim", staleness_signal: "P4 deliverable; created in Wave 1"}
      - {path: "docs/architecture/podcast-pipeline.html",             when: "any phase boundary change",   staleness_signal: "phase IDs disagree with _progress.py PHASE_ORDER"}
      - {path: "docs/architecture/podcast-orchestrator.html",         when: "any orchestrator behavior change", staleness_signal: "phase IDs disagree with code"}
      # ── Learning-substrate canonical paths (P-9 invariant) ───────────
      - {path: "content/podcast/.skill/_learning/README.md",          when: "every session that may write findings",    staleness_signal: "schema diverges from emit_finding() kwargs in _rules.py"}
      - {path: "content/podcast/.skill/_learning/patterns.md",        when: "before invoking podcast-trainer",          staleness_signal: "mtime older than findings.jsonl tail"}
      - {path: "content/podcast/.skill/_learning/proposals/",         when: "before invoking podcast-trainer",          staleness_signal: "any proposal older than its signature's last_seen in patterns.md"}
      - {path: "content/podcast/.skill/_learning/promoted/",          when: "drafting any rule diff",                   staleness_signal: "tombstone references a check_id no longer in _rules.py"}
      - {path: "content/podcast/.skill/_learning/health/",            when: "W3 per-book ship gate; dashboard render",  staleness_signal: "no entry for a book that completed Phase 14-done"}
      - {path: "scripts/podcast/_rules.py",                           when: "any change to CHALLENGER_VERSION or DENY lists", staleness_signal: "CHALLENGER_VERSION not bumped after promoted/ gains a file"}
      - {path: "scripts/podcast/test_challenger.py",                  when: "every CI run; before any trainer commit",  staleness_signal: "exit code != 0 on develop"}
    per_book_intelligence:
      - {path: "<book>/_system/source/raw-extract.md",                consult_for: "OCR truth-source for refinement decisions"}
      - {path: "<book>/_system/source/text/refined-english.md",       consult_for: "Phase 06-phonetics-and-beyond canonical text"}
      - {path: "<book>/_system/source/text/_phonetics.md",            consult_for: "Arabic term pronunciation map"}
      - {path: "<book>/_system/source/text/numeric-disambiguation-register.md", consult_for: "P4: per-book numeric/symbolic ambiguity register"}
      - {path: "<book>/_system/source-chapter-map.md",                consult_for: "Phase 07-chapter-design unit_mode=section/auto traceability"}
      - {path: "<book>/_system/challenger-report.md",                 consult_for: "Ship-readiness verdict before merge"}
  journal:
    canonical_skill:  "skills-staging/journal/SKILL.md"
    consult_before_any_edit:
      - {path: "skills-staging/journal/SKILL.md",                     when: "every session start"}
      - {path: "content/babu-memoir/_system/voice-fingerprint.md",    when: "any chapter authoring"}
      - {path: "content/babu-memoir/_system/craft-techniques.md",     when: "any chapter authoring"}
      - {path: "content/babu-memoir/_system/thematic-arc.md",         when: "chapter slotting / re-ordering"}
      - {path: "content/babu-memoir/_system/locked-paragraphs.md",    when: "edits near locked passages"}
      - {path: "content/babu-memoir/_system/biographical-context.md", when: "fact-checking / timeline questions"}
      - {path: "content/_shared/arabic/**",                           when: "Arabic word pronunciation (READ-ONLY); includes 06-abjad-numerals.md after P4"}
    boundary: "READS NOTHING from content/podcast/. The only cross-skill connection is consuming proposed-library-entries.md as input to manual library curation."
  cross_cutting:
    - {path: "_workspace/primary-mac-activation.md",                  consult_for: "Azure bootstrap on a new Mac"}
    - {path: "_workspace/plan/view/index.html",                       consult_for: "Visual architecture overview (read-only)"}
    - {path: "_workspace/plan/acceptance-criteria.md",                consult_for: "Master checklist tracking entire scope of work (read every multi-step task)"}
  conflict_resolution:
    description: |
      When two intelligence sources disagree, prefer in this order (highest authority first):
        1. The relevant agent's `reads_normative` list (challenger frontmatter) — contract-bearing.
        2. `_workspace/plan/podcast-plan.yaml` (canonical phased plan; if `restructured` <7d old).
        3. `skills-staging/<skill>/SKILL.md` (the producing skill's current contract).
        4. `_workspace/plan/research/findings.md` (rationale + citations).
        5. `_workspace/plan/numeric-symbolic-disambiguation-plan.md` (P4 design doc; authoritative for numeric/symbolic protocol).
        6. `docs/architecture/*.html` (visual / narrative; treat as derived, not authoritative).
      Plan staleness signal: if `meta.restructured` is >7 days old AND the active wave has changed since,
      run `/repo-surgeon --plan-only` before trusting the plan.
  full_read_requirement:
    description: |
      For multi-step authoring tasks, the agent MUST read EVERY file under its bucket's
      `consult_before_any_edit` list in full at session start (not skim). Single-step
      lookups may read on-demand.

# =============================================================================
# Phases
# =============================================================================
phases:

  # ===========================================================================
  # WAVE 1 — Foundation & Guardrails
  # ===========================================================================

  - id: P1
    wave: W1
    name: "Journal/podcast boundary verification + CI lock-down"
    effort: hours
    priority: blocker
    depends_on: []
    why: |
      Evidence sweep 2026-05-19 confirms NO automatic podcast→journal/clinical/quote
      feeds exist. The podcast skill writes proposed-library-entries.md to its own
      _system/episode-drafts/ directory only — promotion is manual. This phase
      LOCKS the property in place via CI before it can regress.
    tasks:
      - id: P1.1
        title: "Audit script confirming zero cross-boundary writes"
        files:
          - scripts/podcast/_boundary_check.py             # NEW
        spec: |
          AST scan + grep for any write/append/open(...,'w') under scripts/podcast/
          targeting:
            content/babu-memoir/** | content/_shared/** | scripts/memoir/** | scripts/site/**
          ALLOWED exception (per meta.scope_in_writes_to_shared_exception):
            content/_shared/arabic/06-abjad-numerals.md (created by P4 one-time)
          Exit 0 if clean, non-zero with file:line if violation found.
        acceptance:
          - "Runs in <2s over scripts/podcast/"
          - "Documented in skills-staging/podcast/SKILL.md as the boundary contract"
          - "Allows P4's one-time write to content/_shared/arabic/06-abjad-numerals.md"
      - id: P1.2
        title: "Document manual handoff for cross-skill content"
        files:
          - skills-staging/podcast/SKILL.md                # add Manual Handoff section
          - docs/podcast/manual-library-handoff.md         # NEW
          - scripts/podcast/_proposal_writer.py            # NEW
        spec: |
          Document: where proposed-library-entries.md lives, who promotes it, how the
          journal side ingests, how to detect drift (proposed but never promoted).

          Schema for `BOOK_DIR/_system/episode-drafts/EP##-<slug>/proposed-library-entries.md`:
          ```yaml
          ---
          schema_version: 1
          book_slug: <slug>
          episode_id: EP##-<slug>
          generated_by: scripts/podcast/_proposal_writer.py
          generated_at: <ISO-8601 UTC>
          ---
          ## Quotes proposed for content/babu-memoir/_system/quotes-library.txt
          - text: "<quote text>"
            attribution: "<who said it>"
            source_ref: "<book + chapter + page>"
            episode_context: "<one-line>"
            confidence: high|medium|low
          ## Clinical anecdotes proposed for content/babu-memoir/_system/clinic-library.txt
          - title: "<descriptor>"
            summary: "<2-3 sentences>"
            source_ref: "<…>"
            episode_context: "<…>"
          ## Promotion ledger (journal side writes here when promoted)
          - quote_id: <hash>
            promoted_at: <ISO-8601>
            promoted_to: content/babu-memoir/_system/quotes-library.txt#<line-anchor>
          ```
        acceptance:
          - "grep 'manual library handoff' in skills-staging/podcast/SKILL.md returns the section"
          - "scripts/podcast/_proposal_writer.py emits a schema-valid file from a populated chapter contract"
          - "docs/podcast/manual-library-handoff.md documents the promotion workflow"
      - id: P1.3
        title: "CI gate cross-reference: boundary check invoked from podcast-isolation.yml"
        files:
          - .github/workflows/podcast-isolation.yml         # consumer; the workflow itself is created by P8.8
        spec: |
          P1.1 lands the boundary check script in W1. P8.8 (W2) creates the
          podcast-isolation.yml CI workflow that invokes it. P1.3 is the
          cross-reference acceptance: when P8.8 ships, the workflow MUST
          include a step that runs `python3 scripts/podcast/_boundary_check.py`
          and fails the job on non-zero exit.
        depends_on_local: [P1.1, P8.8]   # P8.8 owns the workflow file; this row asserts the wiring
        acceptance:
          - ".github/workflows/podcast-isolation.yml contains a step invoking `python3 scripts/podcast/_boundary_check.py`"
          - "The step's `continue-on-error` is false (failure blocks the workflow)"
          - "Manual smoke: opening a PR that introduces a forbidden write (e.g., to content/babu-memoir/) fails the isolation check in CI"
      - id: P1.4
        title: "Wave kickoff harness — scripts/podcast/run_wave.py"
        files:
          - scripts/podcast/run_wave.py                  # NEW (referenced 8× as kickoff_cmd; now owned)
        spec: |
          Single entry point invoked by `/schedule` (or launchd) at the start of
          each wave. Subcommands `1..6` map to W1..W6.

          Responsibilities (per wave):
            1. Read meta.system_check; refuse if `safe_to_edit_plan = false`
               OR a heavier guard (W3+ waves require zero in-flight books).
            2. Read acceptance-criteria.md for the wave's row group; print the
               unchecked rows so the operator (or scheduled runner) knows the
               scope.
            3. Dispatch to per-wave runner functions:
                 W1 → run boundary check, E2E setup, doc fixes, P4 scaffold,
                      perm-mode fix, cost ledger (PARALLEL where safe).
                 W2 → start heartbeat + service.
                 W3 → kick off `orchestrate_book.py <slug>` for the next
                      queued book (with cost cap from P6.3).
                 W4 → start mutation API + worker pool.
                 W5 → run zero-in-flight gate, then phase rename + agent dedup.
                 W6 → require `--phase` argument; refuse without it.
            4. Idempotent: re-running a wave should diff-only what's not done.
            5. `--check` flag: compute the wave's `done_signal` from
               acceptance-criteria.md row-state WITHOUT running the wave.
          Wave kickoffs MUST NOT silently advance — every wave halts at its
          `done_signal` and waits for human review (or scheduled re-fire).
        acceptance:
          - "`python3 scripts/podcast/run_wave.py 1` runs idempotently; second invocation does zero work if W1 acceptance rows already checked"
          - "`run_wave.py --check 5` computes Wave 5 done_signal from acceptance-criteria.md without executing"
          - "W3 invocation refuses if cost-ledger.jsonl shows >$50 spent in the current book (hard cap from P6.3)"
          - "W5 invocation refuses without `--confirm-zero-inflight` AND a passing prereq_gate check"
          - "Exit code 0 = wave already done, 2 = wave executed and DONE, 3 = wave halted at human-review gate, 1 = error, 4 = wave DONE but P-9 invariant violated (fixture_coverage_pct dropped OR test_challenger.py red on develop OR last_trainer_outcome=NEVER_RAN without rationale)"

  - id: P2
    wave: W1
    name: "E2E test harness for the podcast pipeline"
    effort: 1-2 days
    priority: blocker
    depends_on: []
    why: |
      Today: only unit + integration tests exist. There is NO automated end-to-end
      coverage of orchestrate_book.py. The only way to detect regressions in the
      state machine, chunking, or phase transitions is to run a full book and
      visually inspect outputs. This blocks W3 corpus validation.
    tasks:
      - id: P2.1
        title: "Tiny-book fixture for E2E"
        files:
          - scripts/podcast/tests/e2e/__init__.py          # NEW
          - scripts/podcast/tests/e2e/fixtures/tiny-book/  # NEW
          - scripts/podcast/tests/e2e/conftest.py          # NEW
        acceptance:
          - "Fixture text is deterministic; cost <$0.50 per full run"
          - "Includes ≥1 Arabic phrase to exercise translator + phonetics"
          - "Includes ≥1 numeric/symbolic claim (e.g., 'three companions') to exercise P4 challenger Loop N detection"
      - id: P2.2
        title: "Sunny-day E2E: PDF → 04-ocr-translate..08-enrichment → halts at 09-series-plan gate gate"
        files:
          - scripts/podcast/tests/e2e/test_full_pipeline.py # NEW
        spec: |
          - Spin up tmp book dir, copy fixture, run orchestrate_book.py --no-gate
          - Assert: state.json shows each phase completed in order
          - Assert: refined-english.md and _phonetics.md non-empty AND >100 words each
          - Assert: every `_chunks/05-refine-english/win-*.in.md` has a matching non-zero `win-*.out.md`
          - Assert: ≥1 chapter-contract written; ≥1 chapter txt written
          - Assert: halts cleanly at 09-series-plan gate
          - Assert: heartbeat.json updated within 30s (after P7 ships)
          - Assert: no log line containing 'NO ARTIFACT'
          - Assert: numeric-disambiguation-register.md exists if fixture contains numeric claims
        acceptance:
          - "Run command: `pytest scripts/podcast/tests/e2e/ -v`"
          - "Total wall-clock <15min on tiny fixture; <$1 cost"
          - "Sunny-day test FAILS if the P5 bug class returns (verified by toggling --permission-mode in a regression branch)"
      - id: P2.3
        title: "Rainy-day E2E: artifact-missing / rc=0-but-refusal"
        files:
          - scripts/podcast/tests/e2e/test_failure_modes.py # NEW
        spec: |
          - Inject mock `claude -p` that returns rc=0 with no file write
          - Assert: orchestrator raises typed error, does NOT silently advance
          - Test resume after killing mid-window
          - Test --retry-phase on a failed 06-phonetics
        acceptance:
          - "All rainy-day scenarios fail loud"
          - "Resume-after-kill restores exactly the windows that finished"
      - id: P2.4
        title: "Wire E2E into validation gate"
        files:
          - .github/workflows/podcast-e2e.yml              # NEW
          - skills-staging/podcast/SKILL.md
        acceptance:
          - "PR to scripts/podcast/ fails CI if E2E test fails"
          - "Skill SKILL.md documents the gate"
      - id: P2.6
        title: "Golden-fixture refinement determinism (bit-stable quality contract)"
        files:
          - scripts/podcast/tests/e2e/test_refinement_determinism.py   # NEW
          - scripts/podcast/tests/e2e/fixtures/tiny-book/golden/refined-english.md   # NEW (committed reference output)
        why: |
          Without a deterministic quality contract on refined-english.md, every
          downstream assertion (phonetics, chapter design, framing, challenger
          checks) sits on an undeterministic root. The pipeline's most
          consequential artifact is the refined English; if two runs on the
          same input drift apart in voice, structure, or content, the entire
          quality system is post-hoc. This test operationalizes "bit-stable
          refinement" — not byte-identical (LLMs are stochastic at the token
          level), but bounded-similarity within a contract.
        spec: |
          1. Run author_phase_0b on tiny-book fixture (P2.1 fixture, deterministic
             input). Capture refined-english.md as run_1.
          2. Re-run author_phase_0b on the SAME fixture (fresh tmpdir; no state
             leak). Capture as run_2.
          3. Assert: normalized Levenshtein ratio(run_1, run_2) >= 0.90.
             (Normalize: strip whitespace runs; lowercase; remove punctuation;
              compute python-Levenshtein ratio.)
          4. Assert: structural-key parity = 100% — both runs produce the same
             count of:
               - markdown H2 headers
               - paragraphs (split on \n\n)
               - parenthetical asides (count of "(" tokens)
          5. Assert: word-count delta < 5% (|wc_1 - wc_2| / max(wc_1, wc_2)).
          6. On first run with no golden/refined-english.md committed: write
             one as the canonical reference; CI marks the run as "golden
             established" (exit 0); subsequent runs assert similarity AGAINST
             the golden, not just pairwise across two same-session runs.
          7. Allow controlled golden refresh: `--update-golden` flag rewrites
             the committed golden; CI rejects --update-golden unless commit
             message contains `GOLDEN-REFRESH: <reason>`.
        depends_on_local: [P2.1, P2.2]
        acceptance:
          - "`pytest scripts/podcast/tests/e2e/test_refinement_determinism.py -v` exits 0 on a fresh checkout"
          - "Levenshtein ratio across two same-input runs >= 0.90; structural-key parity 100%; word-count delta < 5%"
          - "Committed golden refined-english.md exists; PR diff to it requires GOLDEN-REFRESH commit message"
          - "Run cost <$1 (two tiny-book Phase 05-refine-english refinements; <10min wall-clock)"
          - "Test fails loud if a future _authoring.py change drifts the refinement style (regression-protective)"

      - id: P2.5
        title: "Learning-loop E2E + regression-harness CI gate (P-9 invariant)"
        files:
          - scripts/podcast/tests/e2e/test_learning_loop.py   # NEW
          - .github/workflows/podcast-learning-loop.yml       # NEW (or appended to podcast-e2e.yml)
        spec: |
          End-to-end test for the closed-loop substrate (sense → aggregate →
          propose → test). On the tiny-book fixture from P2.1:

          1. Run the orchestrator to completion (re-uses P2.2 sunny path).
          2. Invoke the podcast-challenger sub-agent on the produced chapter
             contract (mock the LLM by injecting a deterministic stub that
             surfaces exactly 3 findings: 1 P1 + 2 P2).
          3. Assert `_learning/findings.jsonl` gained ≥3 rows with the expected
             check_ids; schema validates via `emit_finding`'s docstring.
          4. Run `python3 scripts/podcast/learn_aggregate.py`; assert
             `_learning/patterns.md` regenerates and lists the new signatures.
          5. Run `python3 scripts/podcast/learn_propose.py`; assert at least the
             density-threshold path emits a markdown proposal under
             `_learning/proposals/` (the same-check-3×-in-one-(book,episode)
             trigger from `learn_aggregate.py:THRESHOLD_DENSITY = 3`).
          6. Run `python3 scripts/podcast/test_challenger.py`; assert exit 0
             against the full fixture corpus (7 fixtures shipped; harness MUST
             stay green on develop at all times).
          7. Run `python3 scripts/podcast/write_health.py <tiny-book>`; assert
             `_learning/health/<slug>.json` written and `health-trend.md`
             appended.

          Idempotency: re-running the test must not append duplicate findings
          (the challenger emits ONE record per finding per run). Verify by
          asserting findings.jsonl line-count is stable across two consecutive
          test runs against the same fixture state.
        acceptance:
          - "`pytest scripts/podcast/tests/e2e/test_learning_loop.py -v` exits 0"
          - "Test creates ≥1 new proposal in _learning/proposals/ on first run; second run produces no new proposal (idempotent)"
          - "test_challenger.py exit code 0 with current 7 fixtures (B5, O1, N1, M3, R4, j2_bold_header, surprise_positive_companion)"
          - "CI job `podcast-learning-loop` runs test_challenger.py on every PR to scripts/podcast/ AND to .github/agents/podcast-challenger.agent.md AND to content/podcast/.skill/handbook/"
          - "CI job fails on any regression (exit non-zero); failing PR cannot merge to develop"
          - "P-9 invariant verified: tiny-book run produces findings.jsonl row + health entry + patterns regenerate"

  - id: P3
    wave: W1
    name: "Doc regressions introduced by legacy-file cleanup (2026-05-19)"
    effort: hours
    priority: blocker
    depends_on: []
    status: PARTIALLY_DONE              # P0c.1, P0c.2 already shipped in v2
    why: |
      Commit b0d991b deleted four `_workspace/` files referenced from
      docs/architecture/podcast-overview.html. Close before next docs publish.
    tasks:
      - id: P3.1
        title: "Repair chatgpt-podcast-skill-prompt reference"
        status: DONE
        files: [docs/architecture/podcast-overview.html]
        acceptance:
          - "grep -r 'chatgpt-podcast-skill-prompt' docs/ scripts/ skills-staging/ returns no results"
          - "podcast-overview.html paragraph reads coherently without the deleted reference"
      - id: P3.2
        title: "Audit for other broken links from the cleanup"
        status: DONE
        acceptance:
          - "All four legacy basenames (legacy_cleanup_basenames) annotated as deleted/retired/closed"

  - id: P4
    wave: W1
    name: "Numeric/Symbolic Disambiguation protocol — handbook + challenger Loop N + per-book scaffolding"
    effort: 1-2 days
    priority: blocker
    depends_on: []
    why: |
      Classical Islamic / Ismaili source material is saturated with symbolic numeric
      structures (7 heavens, 12 regions, 7 seas, abjad-encoded ciphers, modern
      anachronisms). The current pipeline handles these poorly: asserts counts
      without enumeration, modernizes anachronistically (e.g., "seven continents"),
      leaves cipher sequences unannotated. This phase installs the protocol BEFORE
      any future Islamic-source book ships so it is enforced from chapter 1, not
      retrofitted.

      Worked example: Master & Disciple Ch-02 (Oath and Cosmic Origins) — see
      `_workspace/plan/numeric-symbolic-disambiguation-plan.md` for the full
      ambiguity register, source citations, and decision log.
    tasks:
      - id: P4.1
        title: "Create canonical abjad-numerals shared file"
        files:
          - content/_shared/arabic/06-abjad-numerals.md    # NEW (the ONLY whitelisted write to content/_shared/**)
        spec: |
          Mirrors structure of existing content/_shared/arabic/00-..05- files. Contents:
            1. Full Mashriqi (Eastern) and Maghribi (Western) abjad tables.
            2. Hisab al-Jummal practice — how to sum, how ة and final letters count.
            3. Worked examples (Allah=66, basmala=786, Muhammad=92, Ali=110, kun=70, etc).
            4. When to use it in the pipeline (any letter-count claim; any abjad-encoded passage).
            5. Lookup behavior for pronunciation-guide entries with numeric claims.
        acceptance:
          - "File exists at canonical location"
          - "Includes both Mashriqi and Maghribi variants"
          - "Includes verified reference calculations (Allah, basmala, Muhammad, Ali)"
          - "Includes Ch-02 worked calculations (kun=70, fayakun=166, etc)"
          - "After P4 commit, content/_shared/arabic/06-abjad-numerals.md is treated as READ-ONLY by both podcast and journal skills"

      - id: P4.2
        title: "Create disambiguation handbook for the podcast skill"
        files:
          - content/podcast/.skill/handbook/numeric-symbolic-disambiguation.md   # NEW
        spec: |
          The general protocol — applies to ANY book (not just Master & Disciple).
          Sections:
            1. Activation triggers (count-without-enumeration; cipher; anachronistic gloss)
            2. Workflow per ambiguity (identify → research → record → scaffold → checklist)
            3. The "enumerate once" rule (anti-repetition across episodes)
            4. Anachronism handling (label both period-referent AND modernization)
            5. Invented content is P0 BLOCKED
            6. Authoritative-source register (preference order: critical edition >
               Iranica/IIS > peer-reviewed > general reference > web)
        acceptance:
          - "Handbook exists at canonical path"
          - "References content/_shared/arabic/06-abjad-numerals.md as the abjad authority"
          - "References numeric-symbolic-disambiguation-plan.md as the worked-example source"

      - id: P4.3
        title: "Extend SKILL.md pre-read list to include the new shared + handbook files"
        files:
          - skills-staging/podcast/SKILL.md
        spec: |
          Add reference #21:
            21. PODCAST_ROOT/.skill/handbook/numeric-symbolic-disambiguation.md
                — required protocol for any book asserting counts-without-enumeration,
                  containing abjad ciphers, or applying modern glosses to pre-modern referents.
          Extend SHARED_ARABIC mandatory pre-read paragraph to include 06-abjad-numerals.md
          (raising the count from six SHARED_ARABIC files to seven).
        acceptance:
          - "skills-staging/podcast/SKILL.md grep '06-abjad-numerals.md' returns the new pre-read line"
          - "Reference #21 present in pre-read list"

      - id: P4.4
        title: "Extend pre-refined-source-mode handbook with Numeric Disambiguation step"
