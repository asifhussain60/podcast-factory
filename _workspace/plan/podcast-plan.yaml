# =============================================================================
# Podcast Pipeline — Phased Plan (CANONICAL)
# =============================================================================
# Scope: podcast agent + skill ONLY. Journal is OUT OF SCOPE.
# See README.md for scope boundary, research/findings.md for citations,
# view/index.html for visual architecture diagrams.
# =============================================================================

meta:
  version: 2
  created: 2026-05-19
  refined: 2026-05-19           # initial repo-surgeon evidence sweep + folded VS Code refinement prompt
  gap_closed: 2026-05-19        # systematic gap audit; 23 findings resolved on branch plan/v2-gap-close
  owner: asif
  branch_strategy: "feature branches off develop, merge via --no-ff"
  primary_mac: true                              # Azure-backed pipeline runs here (see ../primary-mac-activation.md)
  scope_in:
    - .github/agents/podcast-orchestrator.agent.md
    - .github/agents/podcast-trainer.agent.md
    - .github/agents/podcast-challenger.agent.md   # not yet in .github/; lives in infra/+.claude/. Migrated by P6.2.
    - .github/agents/podcast-extract.agent.md      # not yet in .github/; lives in infra/+.claude/. Migrated by P6.2.
    - skills-staging/podcast/**
    - scripts/podcast/**                            # includes scripts/podcast/tests/ (E2E harness, P0b)
    - content/podcast/**
    - docs/architecture/podcast-*.html              # podcast-facing architecture docs (rename surface, P6.1)
  scope_out:
    - .github/agents/journal-*.agent.md
    - .github/agents/CORTEX.agent.md
    - .github/agents/reconcile.agent.md
    - .github/agents/repo-surgeon.agent.md
    - infra/claude-agents/**                        # explicit DELETION target after P6.2 migration
    - skills-staging/journal/**
    - scripts/memoir/**
    - scripts/site/**
    - content/babu-memoir/**
    - content/_shared/**                            # journal reads READ-ONLY (Arabic), podcast NEVER writes
    - docs/architecture/journal-*.html              # journal docs out of scope
    - docs/architecture/index.html                  # cross-cutting nav, edit only when both sides agree

