  - id: P4
    wave: W1
    legacy_id: P0d
    name: "Numeric/Symbolic Disambiguation protocol — handbook + challenger Loop N + per-book scaffolding"
    effort: 1-2 days
    priority: blocker
    depends_on: []
    why: |
      Classical Islamic / Ismaili source material is saturated with symbolic numeric
      structures (7 heavens, 12 regions, 7 seas, abjad-encoded ciphers, modern
      anachronisms). The current pipeline handles these poorly: asserts counts
      without enumeration, modernizes anachronistically (e.g., "seven continents"),
      leaves cipher sequences unannotated. This phase installs the protocol BEFORE
      any future Islamic-source book ships so it is enforced from chapter 1, not
      retrofitted.

      Worked example: Master & Disciple Ch-02 (Oath and Cosmic Origins) — see
      `_workspace/plan/numeric-symbolic-disambiguation-plan.md` for the full
      ambiguity register, source citations, and decision log.
    tasks:
      - id: P4.1
        title: "Create canonical abjad-numerals shared file"
        files:
          - content/_shared/arabic/06-abjad-numerals.md    # NEW (the ONLY whitelisted write to content/_shared/**)
        spec: |
          Mirrors structure of existing content/_shared/arabic/00-..05- files. Contents:
            1. Full Mashriqi (Eastern) and Maghribi (Western) abjad tables.
            2. Hisab al-Jummal practice — how to sum, how ة and final letters count.
            3. Worked examples (Allah=66, basmala=786, Muhammad=92, Ali=110, kun=70, etc).
            4. When to use it in the pipeline (any letter-count claim; any abjad-encoded passage).
            5. Lookup behavior for pronunciation-guide entries with numeric claims.
        acceptance:
          - "File exists at canonical location"
          - "Includes both Mashriqi and Maghribi variants"
          - "Includes verified reference calculations (Allah, basmala, Muhammad, Ali)"
          - "Includes Ch-02 worked calculations (kun=70, fayakun=166, etc)"
          - "After P4 commit, content/_shared/arabic/06-abjad-numerals.md is treated as READ-ONLY by both podcast and journal skills"

      - id: P4.2
        title: "Create disambiguation handbook for the podcast skill"
        files:
          - content/podcast/.skill/handbook/numeric-symbolic-disambiguation.md   # NEW
        spec: |
          The general protocol — applies to ANY book (not just Master & Disciple).
          Sections:
            1. Activation triggers (count-without-enumeration; cipher; anachronistic gloss)
            2. Workflow per ambiguity (identify → research → record → scaffold → checklist)
            3. The "enumerate once" rule (anti-repetition across episodes)
            4. Anachronism handling (label both period-referent AND modernization)
            5. Invented content is P0 BLOCKED
            6. Authoritative-source register (preference order: critical edition >
               Iranica/IIS > peer-reviewed > general reference > web)
        acceptance:
          - "Handbook exists at canonical path"
          - "References content/_shared/arabic/06-abjad-numerals.md as the abjad authority"
          - "References numeric-symbolic-disambiguation-plan.md as the worked-example source"

      - id: P4.3
        title: "Extend SKILL.md pre-read list to include the new shared + handbook files"
        files:
          - skills-staging/podcast/SKILL.md
        spec: |
          Add reference #21:
            21. PODCAST_ROOT/.skill/handbook/numeric-symbolic-disambiguation.md
                — required protocol for any book asserting counts-without-enumeration,
                  containing abjad ciphers, or applying modern glosses to pre-modern referents.
          Extend SHARED_ARABIC mandatory pre-read paragraph to include 06-abjad-numerals.md
          (raising the count from six SHARED_ARABIC files to seven).
        acceptance:
          - "skills-staging/podcast/SKILL.md grep '06-abjad-numerals.md' returns the new pre-read line"
          - "Reference #21 present in pre-read list"

      - id: P4.4
        title: "Extend pre-refined-source-mode handbook with Numeric Disambiguation step"
        files:
          - content/podcast/.skill/handbook/pre-refined-source-mode.md
        spec: |
          Add a new required scaffolding step:
            ## Numeric Disambiguation
            - Per-claim symbolic meaning + period-attested enumeration (if resolved)
            - ONE-TIME enumeration policy
            - Cross-references to 03-source-integrity-notes.md numeric register + 06-abjad-numerals.md
          Plus a new failure-mode entry:
            6. Asserting an invented enumeration → P0 BLOCKED finding in the challenger.
        acceptance:
          - "Handbook contains both the new scaffolding step and the new failure-mode entry"

      - id: P4.5
        title: "Add challenger Loop N (Numeric/Symbolic Disambiguation)"
        files:
          - .github/agents/podcast-challenger.agent.md     # add Loop N spec  (Note: agent currently lives in infra/+.claude/, migrated by P16)
          - .claude/agents/podcast-challenger.md           # mirror Loop N
        spec: |
          Loop N checks:
            1. Enumeration coverage — every "N X" claim has either an enumeration in the
               per-chapter scaffolding's Numeric Disambiguation block, OR an explicit
               NEEDS HUMAN REVIEW flag in 03-source-integrity-notes.md.
            2. One-time enumeration — no enumeration repeated across episodes; cross-episode scan.
            3. Abjad cipher coverage — any abjad-encoded sequence has either a sourced decoding
               or a NEEDS HUMAN REVIEW flag.
            4. Anachronism labeling — every anachronistic gloss has both period referent +
               modernization labeled, with explicit on-air host instruction.
            5. No invented content — any enumeration without a source citation is P0.
          Severity ladder:
            - P0 (BLOCKED): invented enumeration; unsourced cipher decoding
            - P1 (SHIP-WITH-CAUTION): enumeration repeated across episodes; anachronism unlabeled
            - P2 (note for next episode): NEEDS HUMAN REVIEW items still pending after publication
          Note: This file is in scripts/podcast/'s scope only after the P16 agent-dedup migration.
          During Wave 1, P4.5 edits the existing locations (infra/ + .claude/) and stages the
          .github/agents/ version for P16 to land. P16 finalizes the move.
        acceptance:
          - "podcast-challenger.agent.md contains a Loop N section with the 5 checks + severity ladder"
          - "Mirror file in .claude/agents/podcast-challenger.md is byte-identical (after stripping .agent.md suffix)"
          - "Loop N's reads_guidance includes content/_shared/arabic/06-abjad-numerals.md and content/podcast/.skill/handbook/numeric-symbolic-disambiguation.md"

      - id: P4.6
        title: "Add Phase-0d numeric/symbolic scan step to the orchestrator"
        files:
          - scripts/podcast/_authoring.py                  # Phase 0d prompt scaffolding
        spec: |
          After chapter boundaries are determined in Phase 0d, scan each chapter for:
            (a) numeric claims ("N X") without enumeration
            (b) abjad-encoded sequences
            (c) anachronistic glosses
          Findings are recorded to:
            <book>/_system/source/text/numeric-disambiguation-register.md
          The orchestrator only FLAGS; it does not invent decodings. Resolution
          happens at the per-chapter scaffolding layer (P4.7) and at the challenger
          Loop N gate (P4.5).
        acceptance:
          - "Phase 0d prompt instructs the LLM to emit numeric-disambiguation-register.md"
          - "E2E test (P2.2) verifies the register file exists when the fixture contains numeric claims"

      - id: P4.7
        title: "Apply protocol to Master & Disciple as the worked-example book"
        files:
          - content/podcast/library/books/the-master-and-the-disciple/_notebooklm/02-glossary.md
          - content/podcast/library/books/the-master-and-the-disciple/_notebooklm/03-source-integrity-notes.md
          - content/podcast/library/books/the-master-and-the-disciple/_notebooklm/ch02-scaffolding.md
          - content/podcast/library/books/the-master-and-the-disciple/_notebooklm/06-human-review-checklist.md
        spec: |
