  - id: P5
    wave: W1
    legacy_id: P0
    name: "claude -p permission-mode fix + artifact validation"
    effort: hours
    priority: blocker
    depends_on: []
    why: |
      Current orchestrator silently fails inside Phase 0b/0c/0d/0e because
      `claude -p` refuses file-write tools without --permission-mode acceptEdits.
      Returns rc=0 with a refusal in stdout; orchestrator's artifact check logs
      "NO ARTIFACT" and proceeds. All windows on kitab-al-riyad failed this way
      last session (5 .in.md written, 0 .out.md).

      Per P-1 (Claude Code primary), `claude -p` is the canonical execution
      mechanism. This phase HARDENS that mechanism; it does NOT replace it.
    tasks:
      - id: P5.1
        title: "Add --permission-mode acceptEdits to all claude -p invocations"
        files:
          - scripts/podcast/_chunking.py
          - scripts/podcast/_authoring.py
        acceptance:
          - "grep 'claude -p' returns 0 results without --permission-mode flag"
          - "Both sites pass --permission-mode acceptEdits"
      - id: P5.2
        title: "Harden artifact check: rc=0 AND out_path exists AND non-empty"
        files:
          - scripts/podcast/_chunking.py
          - scripts/podcast/_authoring.py
        acceptance:
          - "If out_path missing OR file_size == 0, raise typed error with stdout/stderr capture"
          - "No silent 'NO ARTIFACT' continuation — every failure surfaces"
      - id: P5.3
        title: "Re-run kitab-al-riyad --resume; verify Phase 0b completes"
        branch_workflow: |
          1. Apply P5.1/P5.2 patches on `develop` first; merge after P1 boundary check
             + P2 tiny-book smoke pass.
          2. Rebase `book/kitab-al-riyad` onto updated develop (or cherry-pick P5 commits
             if rebase would touch in-flight files).
          3. Confirm orchestrator-state.json still parses unchanged after the rebase.
          4. `git checkout book/kitab-al-riyad` and
             `python3 scripts/podcast/orchestrate_book.py --resume kitab-al-riyad`.
        acceptance:
          - "P5.1 + P5.2 land on develop BEFORE book branch resume"
          - "book/kitab-al-riyad rebased clean onto develop; state.json untouched"
          - "All N windows produce non-empty .out.md files"
          - "Phase transitions 0b → 0c → 0d → 0e cleanly OR halts cleanly at 0f"

