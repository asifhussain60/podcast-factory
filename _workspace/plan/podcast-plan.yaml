        why: |
          Today's P12.1 acceptance is "verified on a live run (SIGSTOP/SIGCONT
          confirmed by ps state)" — too thin for a surface that includes
          DELETE /books/{slug}?rollback_branch=true. This phase adds a pytest
          harness that exercises every mutation flow against a TestClient with
          subprocess.Popen mocked out, asserting:
            • audit row written for every mutation
            • bearer-token auth rejects missing/invalid tokens with 401
            • idempotency: pause+pause is no-op; resume on already-running is no-op
            • DELETE branch rollback is guarded by `?rollback_branch=true` flag
              (default keeps branch; explicit flag deletes)
            • SQLite cross-book index (P13) reads stay consistent during mutations
