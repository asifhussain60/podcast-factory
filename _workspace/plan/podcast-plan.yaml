  # =============================================================================
  - id: P5
    name: "Control plane: mutation API + worker pool"
    effort: 1-2 weeks
    priority: medium
    depends_on: [P4]
    why: |
      Hands-off operation. Trigger new books from browser, retry phases without
      shell, run 2-3 books concurrently. Worker pool means one stuck book doesn't
      block the others.
    tasks:
      - id: P5.0
        title: "Resolve Q1 — multi-Mac story for the service"
        files:
          - docs/podcast/multi-mac-decision.md       # NEW
          - _workspace/plan/podcast-plan.yaml        # update open_questions:Q1 → resolved
        spec: |
          Decide and document:
            - primary-only service vs. distributed workers
            - heartbeat hostname enforcement (R3 mitigation)
            - state directory location (local fs vs. shared iCloud/git)
            - auth model (localhost token vs. SSH-tunneled remote viewer)
          Default lean per current_lean in Q1: primary-only; secondary Macs are
          read-only viewers via SSH-tunneled dashboard. Confirm or revise.
        acceptance:
          - "Q1 marked resolved in open_questions with a one-line decision ref"
          - "multi-mac-decision.md documents the choice and its implications for P5.1/P5.2"
      - id: P5.1
        title: "Mutation endpoints"
        files: [scripts/podcast/service/app.py]
        spec:
          endpoints:
            - "POST   /books                        body: {pdf_path|pdf_upload, slug, tier}"
            - "POST   /books/{slug}/resume"
            - "POST   /books/{slug}/pause"          # SIGSTOP the subprocess
            - "POST   /books/{slug}/retry-phase     body: {phase}"
            - "DELETE /books/{slug}                 query: ?rollback_branch=true"
          auth: "single shared bearer token from keychain; localhost-only still default"
        acceptance:
          - "All mutations write an audit row to _workspace/podcast-audit.jsonl"
          - "Pause/resume verified on a live run"
      - id: P5.2
        title: "Worker pool: subprocess.Popen registry"
        files:
          - scripts/podcast/service/workers.py     # NEW
        spec: |
          - max_concurrent (default 2) configurable
          - one Popen per book; monitored by asyncio task
          - SIGTERM on shutdown; cleanup on crash
          - exposes /workers endpoint with PID + state per slot
        acceptance:
          - "2 books run truly in parallel without state corruption"
          - "Server restart picks up orphaned runs via state.json scan (read-only resume detect)"
      - id: P5.3
        title: "SQLite cross-book index (READ-ONLY cache)"
        files:
          - _workspace/podcast.db                  # NEW (gitignored)
          - scripts/podcast/service/index.py       # NEW
        spec: |
          Built from filesystem state. Per-book row: slug, title, pages, raw_words,
          refined_words, current_phase, last_event_ts, total_cost_usd.
          Rebuild command: `python -m scripts.podcast.service.index --rebuild`.
          DB is a CACHE — JSON files remain authoritative.
        acceptance:
          - "DB file gitignored under _workspace/"
          - "Rebuild from a fresh empty DB reproduces identical state"
      - id: P5.4
        title: "Dashboard mutation UI (start / retry / delete buttons)"
        files: [scripts/podcast/service/static/dashboard.js]
        acceptance:
          - "All mutations confirmable; destructive ones require typed slug to confirm"

  # =============================================================================
  - id: P6
    name: "Polish: phase rename + agent dedup + isolation check"
    effort: 3-5 days
    priority: medium
    depends_on: [P5]
    tasks:
      - id: P6.1
        title: "Phase rename: full 14-step sequential naming"
        prereq: |
          Before running this migration, verify NO books are in-flight:
            python3 scripts/podcast/orchestrator_status.py --all --json | \
              jq '[.books[] | select(.phase_status=="running" or .phase_status=="failed")] | length' \
              # must return 0
          R4 risk codified: a mid-flight book during this migration corrupts state.
        files:
          - scripts/podcast/_progress.py           # bump schema_version to 2; add translation layer
          - scripts/podcast/orchestrate_book.py    # phase_map, completed set, --retry-phase
          - scripts/podcast/_authoring.py          # phase="0d" strings (32 occurrences)
          - scripts/podcast/_chunking.py
          - scripts/podcast/_convergence.py
          - scripts/podcast/extract_chapter.py     # has "phase 0a", "phase 0b" strings
          - scripts/podcast/build_episode_txt.py   # has "phase 0a"…"phase 0g" strings
          - skills-staging/podcast/**              # any phase references
          - .github/agents/podcast-*.agent.md      # task descriptions
          - _workspace/plan/podcast-plan.yaml      # this file
          - _workspace/plan/view/index.html        # visual diagram
          - docs/architecture/podcast-pipeline.html       # SVG phase labels 0a–0g
          - docs/architecture/podcast-orchestrator.html   # phase 0a/0f text
          - docs/architecture/podcast-quality-system.html # Phase 0f gate refs
          - docs/architecture/podcast-overview.html       # Phase 0a refs
          - docs/architecture/index.html                  # Phase 0f nav refs (cross-cutting, edit-with-care)
        spec: |
          Full mapping (replaces partial 0a→0g mapping in v1 of this plan):

            | Old key       | New key                |
            |---------------|------------------------|
            | pre-flight    | 01-preflight           |
            | branch        | 02-branch              |
            | scaffold      | 03-scaffold            |
            | 0a            | 04-ocr-translate       |
            | 0b            | 05-refine-english      |
            | 0c            | 06-phonetics           |
            | 0d            | 07-chapter-design      |
            | 0e            | 08-enrichment          |
            | 0f            | 09-series-plan         |
            | 0g            | 10-register-series     |
            | per-chapter   | 11-per-chapter         |
            | trainer       | 12-trainer             |
            | merge         | 13-merge               |
            | done          | 14-done                |

          Migration requirements:
            1. read_state() detects schema_version=1 (legacy) and rewrites keys → new names on load.
            2. write_state() emits schema_version=2 with new keys only.
            3. --retry-phase accepts BOTH old and new names for at least one release.
            4. Logs, banners, JSONL events use NEW names only.
            5. Surface ~700 lines per evidence sweep (orchestrate_book.py 38, _authoring.py 32, agent docs 10+, SKILL.md 3, plan-yaml 70+).
            6. DEFER until no books are in-flight (R4 risk).
        acceptance:
          - "Existing kitab-al-riyad state.json migrates seamlessly on first read"
          - "`--retry-phase 0b` and `--retry-phase 05-refine-english` both resolve to the same phase"
          - "Docs (podcast-pipeline.html, plan view/index.html) updated atomically with the code"
          - "Zero `0a`..`0g` literal strings remain in scripts/podcast/ after migration"
      - id: P6.2
        title: "Agent dedup — canonicalize on .github/agents/ and delete infra/claude-agents/"
        prereq: |
          BLOCKER per evidence sweep 2026-05-19: the following agents exist ONLY in
          infra/claude-agents/ + .claude/agents/, NOT in .github/agents/. They must be
          migrated upstream FIRST or unique content is lost:
            - podcast-challenger.md (70K) ← largest agent; episode contract validator
            - podcast-extract.md    (5K stub) ← single-chapter extraction
            - ui-reviewer.md        (10K)     ← UI/CSS review helper
        files:
          - .github/agents/podcast-challenger.agent.md     # NEW — migrate from infra/
          - .github/agents/podcast-extract.agent.md        # NEW — migrate from infra/
          - .github/agents/ui-reviewer.agent.md            # NEW — migrate from infra/
          - infra/claude-agents/                           # DELETE after migration
          - scripts/install-claude-skills.sh               # rewrite to source from .github/agents/
        spec: |
          Inventory snapshot (verified 2026-05-19):
            UNIQUE to .github/agents/        : CORTEX, journal-orchestrator, reconcile, repo-surgeon — preserve as-is
            DUPLICATE (.github + infra)       : podcast-orchestrator, podcast-trainer
            TRIPLICATE (.github + infra + .claude): journal-challenger, refine-prompt
            DUPLICATE (infra + .claude)       : podcast-challenger, podcast-extract, ui-reviewer ← MIGRATE
          After migration: .github/agents/ is sole upstream source. install-claude-skills.sh
          materializes .claude/agents/*.md by stripping the `.agent.md` suffix.
        acceptance:
          - "Every agent appearing in any of the three locations exists in .github/agents/"
          - "scripts/check_agent_dedup.py (NEW) compares names across the three dirs, exits 0 only when set differences are empty; runs in CI"
          - "VS Code/Claude Code agent picker shows each agent exactly once (visual verification step in the PR description)"
          - "infra/claude-agents/ removed; git log preserves history (the directory is a tracked deletion, not a force-removal)"
          - "install-claude-skills.sh idempotent: second run produces zero diffs"
      - id: P6.3
        title: "CI check: scripts/podcast/ does not import from scripts/site/ or scripts/memoir/"
        files:
          - scripts/podcast/_isolation_check.py    # NEW
          - .github/workflows/podcast-isolation.yml # NEW (lint job)
        acceptance:
          - "AST scan fails build if forbidden import found"
      - id: P6.4
        title: "Heartbeat → stream-json upgrade in _claude_client"
        files: [scripts/podcast/_claude_client.py]
        spec: |
          Already streaming via SDK in P3; this task just ensures heartbeat
          ticks reflect Anthropic SSE events (output_tokens cumulative) rather
          than approximate token counts.
        acceptance:
          - "Side-by-side compare on tiny-book fixture: heartbeat final output_tokens equals stream.get_final_message().usage.output_tokens"
          - "Test stored as scripts/podcast/tests/e2e/test_token_count_parity.py"
      - id: P6.5
        title: "Retire the CLI fallback shim from P3.6"
        prereq: "At least one xlarge book (≥800p) shipped clean on the SDK path"
        files: [scripts/podcast/_claude_client.py, scripts/podcast/orchestrate_book.py]
        spec: "Remove PODCAST_LLM_BACKEND env var and all `cli` dispatch. Subprocess code path deleted."
        acceptance:
          - "grep -r 'PODCAST_LLM_BACKEND' scripts/podcast/ returns 0 results"
          - "grep -rE 'subprocess\\.(run|Popen).*claude' scripts/podcast/ returns 0 results"

