            - Confirms typed-slug body required for prod safety (matches P14.1
              dashboard contract: destructive ops require typed slug)
          Test 6 — Cross-book consistency (P13 link):
            - Start 2 books in parallel (via worker pool)
            - Fire mutations on both
            - Rebuild SQLite index mid-mutation; assert no row tearing
        depends_on_local: [P12.1, P12.2, P13.1]
        acceptance:
