# -----------------------------------------------------------------------------
# Async work safety rules (enforced before every code edit)
# -----------------------------------------------------------------------------
async_safety:
  pre_edit_checklist:
    - "pgrep -fl 'orchestrate_book|claude -p|extract_chapter|build_episode' → empty"
    - "Find no `.in.md` without a matching `.out.md` in any active `_chunks/` dir"
    - "If async is running, read the heartbeat to confirm advancement; do NOT touch files under: \
       _system/orchestrator-state.json | _system/source/text/** | _system/source/text/_chunks/** | chapters/** | chapter-contracts/** | episodes/** | transcripts/** | _learning/**"
  read_only_always_safe:
    - "Glob, grep, read of any path"
    - "git status / log / diff"
    - "az resource list, az account show"
  unsafe_during_async:
    - "Edits inside the active book directory"
    - "Spawning a second `claude -p` heavy run"
    - "Phase rename migration (P6.1)"
    - "Agent dedup (P6.2)"
  wait_banner_format: |
    ╔══════════════════════════════════════════════════════════════════╗
    ║  ⏸  WAITING ON ASYNC WORK — DO NOT START NEW LLM RUNS            ║
    ╠══════════════════════════════════════════════════════════════════╣
    ║  BOOK     │ {title}                                              ║
    ║  AUTHOR   │ {author or unknown}                                  ║
    ║  PAGES    │ {page_count or unknown}  │  SOURCE  │ {type/size}    ║
    ║  BRANCH   │ {branch}                                             ║
    ╠══════════════════════════════════════════════════════════════════╣
    ║  RUNNING                                                         ║
    ║   • {process name} ({terminal/pid}) — {current phase}            ║
    ║     log: {log path}                                              ║
    ║                                                                  ║
    ║  NEXT GATE   │ {next human or automated gate}                    ║
    ║  PROGRESS    │ {phase/unit count/percent if available}           ║
    ║  SAFE WORK   │ {paths safe to edit}                              ║
    ║  DO NOT      │ {paths not safe to touch}                         ║
    ╚══════════════════════════════════════════════════════════════════╝
  wait_banner_format_ascii: |                       # used when terminal does not render UTF-8 box-drawing
    +==================================================================+
    |  >> WAITING ON ASYNC WORK -- DO NOT START NEW LLM RUNS           |
    +==================================================================+
    |  BOOK     | {title}                                              |
    |  AUTHOR   | {author or unknown}                                  |
    |  PAGES    | {page_count or unknown}  |  SOURCE  | {type/size}    |
    |  BRANCH   | {branch}                                             |
    +==================================================================+
    |  RUNNING                                                         |
    |   * {process name} ({terminal/pid}) -- {current phase}           |
    |     log: {log path}                                              |
    |                                                                  |
    |  NEXT GATE   | {next human or automated gate}                    |
    |  PROGRESS    | {phase/unit count/percent if available}           |
    |  SAFE WORK   | {paths safe to edit}                              |
    |  DO NOT      | {paths not safe to touch}                         |
    +==================================================================+

# -----------------------------------------------------------------------------
# Guiding principles
# -----------------------------------------------------------------------------
principles:
  - id: P-1
    name: "Ship the band-aid before the cure"
    detail: |
      P0 is a 2-line fix that unblocks the kitab-al-riyad run today.
      Do P0 even though P3 (SDK migration) makes it obsolete — the validation
      that follows P0 informs P3's design.
  - id: P-2
    name: "Observation before mutation"
    detail: |
      Build read-only status (P1, P2) before the control plane (P5).
      A dashboard is useless if the process is opaque; mutations are dangerous
      if you can't see what's happening.
  - id: P-3
    name: "Validate on real books before refactoring"
    detail: |
      P4 runs the graduated book corpus (30p → 865p) on the current shell-out
      pipeline. ONLY after that passes do we touch the SDK migration (P3 reorders
      to AFTER P4 if validation surfaces unknown failure modes).
  - id: P-4
    name: "Resume-safe checkpoints everywhere"
    detail: |
      Every new code path must be resume-safe: append-only logs, .done markers,
      atomic file writes. No phase may overwrite state from an earlier phase.
  - id: P-5
    name: "Podcast / journal isolation is enforced, not aspirational"
    detail: |
      No file under scripts/podcast/ may import from scripts/site/ or scripts/memoir/.
      Add a CI check in P6 that asserts this. Boundary already holds in current code
      per repo-surgeon evidence sweep 2026-05-19 — work is to lock it down, not remove
      existing automatic feeds (there are none).
  - id: P-6
    name: "Manual handoff for cross-skill content, never automatic"
    detail: |
      The podcast skill MAY propose additions to journal libraries (quotes, clinical,
      memoir) by writing to BOOK_DIR/_system/episode-drafts/EP##-*/proposed-library-entries.md.
      It MUST NEVER write directly to content/babu-memoir/** or content/_shared/**.
      Promotion of proposed entries is a manual journal-side step.

# -----------------------------------------------------------------------------
# Intelligence sources — where each agent/skill MUST consult before acting
# -----------------------------------------------------------------------------
intelligence_sources:
  podcast:
    canonical_skill:  "skills-staging/podcast/SKILL.md"
    consult_before_any_edit:
      - {path: "skills-staging/podcast/SKILL.md",                     when: "every session start",         staleness_signal: "git diff vs branch HEAD"}
      - {path: "scripts/podcast/orchestrate_book.py",                 when: "any state-machine change",    staleness_signal: "phase_map / state schema drift"}
      - {path: "scripts/podcast/_progress.py",                        when: "any state-schema edit",       staleness_signal: "schema_version constant out of sync with state.json"}
      - {path: "content/podcast/library/books/*/_system/orchestrator-state.json", when: "before resume / retry-phase", staleness_signal: "phase_status=running with stale ts_updated"}
      - {path: "_workspace/plan/podcast-plan.yaml",                   when: "every multi-step task",       staleness_signal: "meta.gap_closed date >7d old AND active phase changed"}
      - {path: "_workspace/plan/research/findings.md",                when: "any architecture decision",   staleness_signal: "linked URL HTTP 404"}
      - {path: "docs/architecture/podcast-pipeline.html",             when: "any phase boundary change",   staleness_signal: "phase IDs disagree with _progress.py PHASE_ORDER"}
      - {path: "docs/architecture/podcast-orchestrator.html",         when: "any orchestrator behavior change", staleness_signal: "phase IDs disagree with code"}
    per_book_intelligence:
      - {path: "<book>/_system/source/raw-extract.md",                consult_for: "OCR truth-source for refinement decisions"}
      - {path: "<book>/_system/source/text/refined-english.md",       consult_for: "Phase-0c-and-beyond canonical text"}
      - {path: "<book>/_system/source/text/_phonetics.md",            consult_for: "Arabic term pronunciation map"}
      - {path: "<book>/_system/source-chapter-map.md",                consult_for: "Phase 0d unit_mode=section/auto traceability"}
      - {path: "<book>/_system/challenger-report.md",                 consult_for: "Ship-readiness verdict before merge"}
  journal:
    canonical_skill:  "skills-staging/journal/SKILL.md"
    consult_before_any_edit:
      - {path: "skills-staging/journal/SKILL.md",                     when: "every session start"}
      - {path: "content/babu-memoir/_system/voice-fingerprint.md",    when: "any chapter authoring (light variant) — voice-fingerprint-light.md / voice-deep-analysis.md as needed"}
      - {path: "content/babu-memoir/_system/craft-techniques.md",     when: "any chapter authoring"}
      - {path: "content/babu-memoir/_system/thematic-arc.md",         when: "chapter slotting / re-ordering"}
      - {path: "content/babu-memoir/_system/locked-paragraphs.md",    when: "edits near locked passages"}
      - {path: "content/babu-memoir/_system/biographical-context.md", when: "fact-checking / timeline questions"}
      - {path: "content/_shared/arabic/**",                           when: "Arabic word pronunciation (READ-ONLY)"}
    boundary: "READS NOTHING from content/podcast/. The only cross-skill connection is consuming proposed-library-entries.md as input to manual library curation."
  cross_cutting:
    - {path: "_workspace/primary-mac-activation.md",                  consult_for: "Azure bootstrap on a new Mac"}
    - {path: "_workspace/plan/view/index.html",                       consult_for: "Visual architecture overview (read-only)"}

# -----------------------------------------------------------------------------
# Phases
# -----------------------------------------------------------------------------
phases:

  # =============================================================================
  - id: P0a
    name: "Journal/podcast boundary verification + CI lock-down"
    effort: hours
    priority: blocker
    depends_on: []
    why: |
      Evidence sweep 2026-05-19 confirms NO automatic podcast→journal/clinical/quote
      feeds exist. The podcast skill writes proposed-library-entries.md to its own
      _system/episode-drafts/ directory only — promotion is manual. This phase
      LOCKS the property in place via CI before it can regress; no code removal
      needed because there is nothing to remove.
    tasks:
      - id: P0a.1
        title: "Audit script confirming zero cross-boundary writes"
        files:
          - scripts/podcast/_boundary_check.py             # NEW
        spec: |
          AST scan + grep for any write/append/open(...,'w') under scripts/podcast/
          targeting:
            content/babu-memoir/** | content/_shared/** | scripts/memoir/** | scripts/site/**
          Exit 0 if clean, non-zero with file:line if violation found.
        acceptance:
          - "Runs in <2s over scripts/podcast/"
          - "Documented in skills-staging/podcast/SKILL.md as the boundary contract"
      - id: P0a.2
        title: "Document manual handoff for cross-skill content"
        files:
          - skills-staging/podcast/SKILL.md                # add Manual Handoff section
          - docs/podcast/manual-library-handoff.md         # NEW (or fold into SKILL.md)
        spec: |
          Document: where proposed-library-entries.md lives, who promotes it, how the
          journal side ingests, how to detect drift (proposed but never promoted).
        acceptance:
          - "Search 'manual library handoff' in SKILL.md returns the section"
      - id: P0a.3
        title: "CI gate (deferred to P6.3, listed here for traceability)"
        spec: "P0a.1 wired into .github/workflows/podcast-isolation.yml — see P6.3"

  # =============================================================================
  - id: P0b
    name: "E2E test harness for the podcast pipeline"
    effort: 1-2 days
    priority: blocker
    depends_on: []
    why: |
      Today: only unit (test_challenger.py) + integration (test_azure_connectivity.py)
      tests exist. There is NO automated end-to-end coverage of orchestrate_book.py.
      The only way to detect regressions in the state machine, chunking, or phase
      transitions is to run a full book and visually inspect outputs. This blocks
      P3 (SDK migration) from being safely verified.
    tasks:
      - id: P0b.1
        title: "Tiny-book fixture for E2E"
        files:
          - scripts/podcast/tests/e2e/__init__.py          # NEW
          - scripts/podcast/tests/e2e/fixtures/tiny-book/  # NEW (3-chapter, ~5k word synthetic PDF or text)
          - scripts/podcast/tests/e2e/conftest.py          # NEW (env fixtures, tmp_book_dir)
        acceptance:
          - "Fixture text is deterministic; cost <$0.50 per full run"
          - "Includes ≥1 Arabic phrase to exercise translator + phonetics"
      - id: P0b.2
        title: "Sunny-day E2E: PDF → 0a..0e → halts at 0f gate"
        files:
          - scripts/podcast/tests/e2e/test_full_pipeline.py # NEW
        spec: |
          - Spin up tmp book dir, copy fixture, run orchestrate_book.py --no-gate
          - Assert: state.json shows each phase completed in order
          - Assert: refined-english.md and _phonetics.md non-empty
          - Assert: ≥1 chapter-contract written; ≥1 chapter txt written
          - Assert: halts cleanly at 0f (series-plan human-review gate)
          - Assert: heartbeat.json updated within 30s during run
        acceptance:
          - "Run command: `pytest scripts/podcast/tests/e2e/ -v` (documented in README)"
          - "Total wall-clock <15min on tiny fixture; <$1 cost"
          - "Asserts on artifacts AND state transitions AND failure handling"
      - id: P0b.3
        title: "Rainy-day E2E: artifact-missing / rc=0-but-refusal"
        files:
          - scripts/podcast/tests/e2e/test_failure_modes.py # NEW
        spec: |
          - Inject mock `claude -p` that returns rc=0 with no file write (the P0 bug class)
          - Assert: orchestrator raises typed error, does NOT silently advance
          - Test resume after killing mid-window (verify .out.md checkpoint reuse)
          - Test --retry-phase on a failed 0c
        acceptance:
          - "All rainy-day scenarios fail loud (typed errors, not silent passes)"
          - "Resume-after-kill restores exactly the windows that finished"
      - id: P0b.4
        title: "Wire E2E into validation gate"
        files:
          - .github/workflows/podcast-e2e.yml              # NEW
          - skills-staging/podcast/SKILL.md                # add "Before ship: run E2E" gate
        spec: |
          CI job: tiny-book E2E on every PR touching scripts/podcast/.
          NOT on every push to develop (cost / wall-clock).
        acceptance:
          - "PR to scripts/podcast/ fails CI if E2E test fails"
          - "Skill SKILL.md documents the gate"

  # =============================================================================
  - id: P0c
    name: "Doc regressions introduced by legacy-file cleanup (2026-05-19)"
    effort: hours
    priority: blocker
    depends_on: []
    why: |
      The legacy-file deletion in commit b0d991b removed
      _workspace/chatgpt-podcast-skill-prompt.md. That path is referenced by
      docs/architecture/podcast-overview.html:366, leaving a stale link. Close
      this regression before the next docs publish.
    tasks:
      - id: P0c.1
        title: "Repair or rewrite the chatgpt-podcast-skill-prompt reference"
        files:
          - docs/architecture/podcast-overview.html
        spec: |
          Options:
            1. Rewrite the paragraph to point at skills-staging/podcast/SKILL.md
               (the current canonical source) and remove the chatgpt-prompt fork
               description entirely.
            2. Restore the deleted file from git history (commit b0d991b^).
          Decision: option 1 — the chatgpt fork is no longer maintained and SKILL.md
          is the single source of truth.
        acceptance:
          - "grep -r 'chatgpt-podcast-skill-prompt' docs/ scripts/ skills-staging/ returns no results"
          - "podcast-overview.html paragraph reads coherently without the deleted reference"
      - id: P0c.2
        title: "Audit for other broken links from the cleanup"
        spec: |
          For each path deleted in commit b0d991b, grep the entire repo (excluding
          .git, node_modules) for the basename. Any non-test reference is a
          regression to repair.
          Deleted basenames to grep:
            - chatgpt-podcast-skill-prompt
            - folder-cleanup-prompt
            - podcast-refactor-executive-summary
            - podcast-orchestrator-large-books
        acceptance:
          - "All four basenames return zero non-test references in docs/, scripts/, skills-staging/, .github/"
          - "Any references found are repaired or explicitly redirected"

  # =============================================================================
  - id: P0
    name: "Critical bug fix: claude -p permission mode"
    effort: hours
    priority: blocker
    depends_on: []
    why: |
      Current orchestrator silently fails inside Phase 0b/0c/0d/0e because
      `claude -p` refuses file-write tools without --permission-mode acceptEdits.
      Returns rc=0 with a refusal in stdout; orchestrator's artifact check logs
      "NO ARTIFACT" and proceeds to the next window. All windows on
      kitab-al-riyad failed this way last session (5 .in.md written, 0 .out.md).
    tasks:
      - id: P0.1
        title: "Add --permission-mode acceptEdits to all claude -p invocations"
        files:
          - scripts/podcast/_chunking.py    # _run_one_window
          - scripts/podcast/_authoring.py   # _run_claude (and any other CLAUDE_CMD sites)
        acceptance:
          - "grep 'claude -p' returns 0 results without --permission-mode flag"
          - "Both sites pass --permission-mode acceptEdits"
      - id: P0.2
        title: "Harden artifact check: rc=0 AND out_path exists AND non-empty"
        files:
          - scripts/podcast/_chunking.py
          - scripts/podcast/_authoring.py
        acceptance:
          - "If out_path missing OR file_size == 0, raise typed error with stdout/stderr capture"
          - "No silent 'NO ARTIFACT' continuation — every failure surfaces"
      - id: P0.3
        title: "Re-run kitab-al-riyad --resume; verify Phase 0b completes"
        branch_workflow: |
          1. Apply P0.1/P0.2 patches on `develop` first; merge to develop after
             the boundary check (P0a.1) and a tiny-book smoke pass.
          2. Rebase `book/kitab-al-riyad` onto the updated `develop` (or
             cherry-pick the P0 commits if rebase would touch in-flight files).
          3. Confirm `_system/orchestrator-state.json` still parses unchanged after
             the rebase (the rebase must not touch state files).
          4. `git checkout book/kitab-al-riyad` and
             `python3 scripts/podcast/orchestrate_book.py --resume kitab-al-riyad`.
        acceptance:
          - "P0.1 + P0.2 land on develop BEFORE book branch resume"
          - "book/kitab-al-riyad rebased clean onto develop; state.json untouched by the rebase"
          - "All N windows produce non-empty .out.md files"
          - "Phase transitions 0b -> 0c -> 0d -> 0e cleanly OR halts cleanly at 0f human gate"

  # =============================================================================
  - id: P1
    name: "Observability foundation: heartbeat + status CLI"
    effort: 1-2 days
    priority: high
    depends_on: [P0]
    why: |
      Currently zero visibility into in-flight work. User waits 15+ minutes
      with no signal whether claude -p is making progress, hung, or dead.
      Heartbeat thread + read-only CLI eliminates this anxiety AND lays the
      data plane for P2 (HTTP API) and P5 (live dashboard).
    tasks:
      - id: P1.1
        title: "Heartbeat daemon thread in scripts/podcast/_progress.py"
        files:
          - scripts/podcast/_progress.py
          - scripts/podcast/orchestrate_book.py   # spawn heartbeat at startup
        spec:
          path: "<book>/_system/heartbeat.json"
          interval_sec: 30
          fields:
            - pid
            - phase
            - phase_status
            - elapsed_in_phase_s
            - last_chunk_written          # path of most recent .out.md / .done file
            - last_chunk_mtime
            - last_log_line               # tail -1 of orchestrator log
            - subprocess_pid              # current claude -p PID, if any
          write: "atomic (tmp + rename); never block on disk"
        acceptance:
          - "heartbeat.json updates within 30s while orchestrator runs"
          - "Thread is daemon=True; orchestrator exit terminates it cleanly"
          - "Zero impact on claude -p timing (heartbeat is side-channel only)"
      - id: P1.2
        title: "Per-LLM-call heartbeat bumps"
        files:
          - scripts/podcast/_chunking.py
          - scripts/podcast/_authoring.py
        spec: |
          Before each chunked window / per-source-chapter / per-chapter LLM call,
          call _progress.bump_heartbeat(label="0b · win-007 · 3082 words").
          Lets status CLI show step-level progress, not just phase-level.
        acceptance:
          - "Within 30s of any LLM call starting, heartbeat label reflects it"
      - id: P1.3
        title: "scripts/podcast/orchestrator_status.py (CLI inspector)"
        files:
          - scripts/podcast/orchestrator_status.py   # NEW
        spec: |
          Read-only. Reads heartbeat.json + state.json + _chunks/ dir + log tail.
          Emits the user-preferred boxed banner (canonical format in meta.async_safety.wait_banner_format).
          Usage:
            python3 scripts/podcast/orchestrator_status.py <book-slug>
            python3 scripts/podcast/orchestrator_status.py --all
            python3 scripts/podcast/orchestrator_status.py --json     # for piping
            python3 scripts/podcast/orchestrator_status.py --banner   # emit the boxed banner (default for TTY)
          Banner fields (sourced from heartbeat.json + state.json):
            title, author, page_count, source_type/size, branch, process_name, pid,
            current_phase, log_path, next_gate, phase/unit count/percent, safe_paths,
            unsafe_paths
          Banner is the format used by agents when asking the user to wait on async work.
        acceptance:
          - "Runs in <1s on a 260-page book's state"
          - "Falls back gracefully if heartbeat.json missing (uses log tail)"
          - "Emits exit code 0 if process alive, 2 if dead, 1 if state stale (>5min)"
          - "Boxed banner preserves the row/column structure of meta.async_safety.wait_banner_format (template), with field substitution; verified by structural-match unit test, not byte equality"
          - "`--ascii` flag emits the same banner with ASCII fallback chars (+ - |) for terminals without UTF-8 box support"
      - id: P1.4
        title: "JSONL event log for downstream consumers"
        files:
          - scripts/podcast/_progress.py   # new: append_event()
          - scripts/podcast/_chunking.py   # call append_event at key boundaries
          - scripts/podcast/_authoring.py
        spec:
          path: "<book>/_system/events.jsonl"
          line_schema: {ts, phase, step, total, label, level, msg}
          append_only: true
        acceptance:
          - "events.jsonl tails cleanly with `tail -F`"
          - "Schema documented in scripts/podcast/_progress.py docstring"

  # =============================================================================
  - id: P2
    name: "Read-only Status API + browser dashboard"
    effort: 3-4 days
    priority: high
    depends_on: [P1]
    why: |
      Browser-based dashboard replaces bash status checks. SSE stream gives
      the user true real-time feedback instead of polling. Read-only by design
      — mutations land in P5 only after observation is proven robust.
    tasks:
      - id: P2.1
        title: "FastAPI service: scripts/podcast/service/"
        files:
          - scripts/podcast/service/__init__.py   # NEW
          - scripts/podcast/service/app.py        # NEW — FastAPI app
          - scripts/podcast/service/models.py     # NEW — Pydantic schemas
          - scripts/podcast/service/sources.py    # NEW — filesystem readers
        spec:
          port: 8765
          host: 127.0.0.1                         # localhost only by default
          deps: ["fastapi", "uvicorn[standard]"]  # add to scripts/podcast/requirements.txt
          endpoints:
            - "GET  /healthz                          → liveness"
            - "GET  /books                            → list all books + phase + status"
            - "GET  /books/{slug}                     → state.json + chunk counts + heartbeat"
            - "GET  /books/{slug}/heartbeat           → heartbeat.json (raw)"
            - "GET  /books/{slug}/logs?tail=200       → recent log lines"
            - "GET  /books/{slug}/events?since=<ts>   → events.jsonl rows"
            - "GET  /books/{slug}/chunks/{phase}      → per-window status grid"
            - "GET  /books/{slug}/stream              → SSE feed of new events"
          mutations: NONE
        acceptance:
          - "OpenAPI docs render at /docs"
          - "pytest asserts every non-stream endpoint returns content-type `application/json` AND parses to valid JSON"
          - "pytest asserts /books/{slug}/stream returns content-type `text/event-stream` and emits at least one event"
          - "Service uses filesystem ONLY — no DB, no global state"
      - id: P2.2
        title: "Static dashboard SPA in scripts/podcast/service/static/"
        files:
          - scripts/podcast/service/static/index.html   # NEW
          - scripts/podcast/service/static/dashboard.js # NEW
          - scripts/podcast/service/static/styles.css   # NEW
        spec: |
          Vanilla JS, no framework. Single page:
            • Top: book picker (all books, current phase, last heartbeat age)
            • Middle: phase timeline (P0 → done) with completed/active/pending styling
            • Bottom: live event stream (SSE) + log tail
          Mounted at /  via app.mount("/", StaticFiles(...))
        acceptance:
          - "Open http://127.0.0.1:8765/ in browser → live updating dashboard"
          - "Phase-stuck detection: heartbeat age >2min flashes yellow, >10min flashes red"
      - id: P2.3
        title: "launchd plist for dev daemon + startup documentation"
        files:
          - infra/launchd/com.journal.podcast-service.plist   # NEW
          - docs/podcast/service-startup.md                   # NEW
        spec: |
          Optional auto-start. Documented as opt-in. The doc must specify:
            - how to install the plist (`launchctl bootstrap gui/$UID …`)
            - how to verify it loaded (`launchctl list | grep podcast-service`)
            - what behavior the dashboard exhibits if the service is NOT running
              (curl error → README points users at the start command)
            - manual one-shot start (`uvicorn scripts.podcast.service.app:app`)
        acceptance:
          - "plist passes `plutil -lint`"
          - "service-startup.md answers: install / verify / behavior-when-down / manual-start"
          - "Dashboard JS shows a friendly 'service not running — see docs' card on connection failure"

  # =============================================================================
  - id: P3
    name: "Anthropic SDK migration: replace `claude -p` shell-out"
    effort: 3-4 days
    priority: high
    depends_on: [P0, P0b, P2]                     # P0b E2E harness MUST exist before SDK swap so regressions are caught
    book_branch_strategy: |
      P3 changes land on `develop` first. All `book/*` branches with in-flight
      runs (any state.json not in `done` or `merge`) MUST be paused before P3.5
      validation. After validation passes, rebase each active book/* onto
      develop and re-run --resume from its current phase. Document each rebase
      outcome in the audit log.
    why: |
      Native SDK eliminates entire bug classes:
        - silent file-write refusals (we write files ourselves)
        - 30-min subprocess.run timeouts (SDK streams to avoid HTTP timeouts)
        - "rc=0 but no artifact" failures (SDK returns text directly)
      Adds: token-level streaming for true real-time progress, structured errors
      (rate-limit / auth / content-policy distinguishable), built-in cost telemetry
      via usage headers, Claude 4.6+ error recovery via continuation requests.
    tasks:
      - id: P3.1
        title: "Add `anthropic` to requirements; create wrapper module"
        files:
          - scripts/podcast/requirements.txt
          - scripts/podcast/_claude_client.py    # NEW
        spec: |
          Single function: call_claude(prompt, *, max_tokens, model, on_token=None, on_error=None) -> str
          Internals:
            with client.messages.stream(...) as stream:
                for text in stream.text_stream:
                    if on_token: on_token(text)            # heartbeat bump
                msg = stream.get_final_message()
            return msg.content[0].text
          Reads ANTHROPIC_API_KEY from env (already in keychain per store-keychain-keys.sh).
          Implements Claude 4.6+ continuation pattern for interrupted streams.
        acceptance:
          - "100% drop-in replacement signature; one function only"
          - "Returns the same text the CLI would have written to out_path"
          - "Bubbles up typed errors (RateLimit, Overloaded, Auth, ContentPolicy)"
      - id: P3.2
        title: "Swap _chunking._run_one_window to use _claude_client"
        files: [scripts/podcast/_chunking.py]
        acceptance:
          - "No subprocess.Popen / subprocess.run remains in _chunking.py"
          - "out_path is written by Python after call_claude returns the text"
          - "Per-token heartbeat bumps via on_token callback"
      - id: P3.3
        title: "Swap _authoring._run_claude to use _claude_client"
        files: [scripts/podcast/_authoring.py]
        acceptance:
          - "Same as P3.2 for 0d/0e and per-chapter authoring"
      - id: P3.4
        title: "Cost-tracking sidecar"
        files:
          - scripts/podcast/_claude_client.py
          - scripts/podcast/cost_ledger_summary.py        # NEW — sums ledger; pytest assertion target
        spec: |
          After every call, append a line to <book>/_system/cost-ledger.jsonl:
            {ts, phase, step, model, input_tokens, output_tokens, cache_read, cache_create, cost_usd}
          Use pricing table in module constant; warn loudly if model not in table.
          `cost_ledger_summary.py` reads the ledger and emits:
            {total_input_tokens, total_output_tokens, total_cost_usd_by_phase}
          plus a `cost-validation.json` snapshot stored alongside the ledger.
        acceptance:
          - "`python3 scripts/podcast/cost_ledger_summary.py <book>` exits 0 and prints structured totals"
          - "cost-validation.json regenerated on each run; diffable in PR review"
          - "Manual cross-check vs Anthropic console for first SDK book: ledger total within ±1%"
      - id: P3.5
        title: "End-to-end re-run on kitab-al-riyad (or fresh small book) with SDK path"
        acceptance:
          - "All phases complete with zero subprocess errors"
          - "Dashboard shows live token counts during 0d/0e"
          - "cost-ledger.jsonl populated"
          - "P0b E2E suite passes on the SDK code path"
      - id: P3.6
        title: "Fallback shim — keep CLAUDE_CMD subprocess path behind a flag"
        files:
          - scripts/podcast/_claude_client.py
          - scripts/podcast/orchestrate_book.py
        spec: |
          Add env var `PODCAST_LLM_BACKEND` accepting `sdk` (default) | `cli`.
          When `cli`, _claude_client transparently dispatches to the legacy shell-out
          path with --permission-mode acceptEdits (the P0 fix). Logged loudly at
          startup. Removed in the release AFTER the first xlarge book ships clean
          on SDK.
        acceptance:
          - "PODCAST_LLM_BACKEND=cli replicates the old behavior end-to-end on tiny-book fixture"
          - "Default behavior unchanged when env var unset"
          - "Removal scheduled in P6 (track as P6.5)"

  # =============================================================================
  - id: P4
