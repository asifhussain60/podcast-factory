# =============================================================================
# Podcast Pipeline — Phased Plan (CANONICAL)
# =============================================================================
# Scope: podcast agent + skill ONLY. Journal is OUT OF SCOPE.
#
# Forward-only plan. There is ONE execution path — no version branching,
# no legacy aliases, no back-compat shims. Version lives in ./VERSION
# (single source of truth). History is in git, not in this file.
#
# Principle: `claude -p --permission-mode acceptEdits` is the canonical
# LLM-call site for every workhorse phase. The Anthropic Python SDK is
# RESERVED for narrow side-channel use (status-API helper, cost ledger
# token counting), never the primary execution path.
#
# See README.md for scope boundary, research/findings.md for citations,
# view/index.html for visual architecture, numeric-symbolic-disambiguation-plan.md
# for P4's full design document.
# =============================================================================

meta:
  version_file: VERSION             # single source of truth at _workspace/plan/VERSION
  owner: asif

  primary_execution_mechanism: claude-code-cli
  primary_execution_rationale: |
    The podcast agent and skill are DESIGNED FOR and EXECUTED VIA Anthropic
    Claude Code. The orchestrator's LLM workhorse is `claude -p` (Claude Code
    in headless mode) invoked with --permission-mode acceptEdits. This preserves
    the agent runtime (tool use, file-edit, multi-turn refinement, permission
    semantics) that the skill design depends on, and avoids re-implementing the
    agent protocol on top of a raw Python SDK client.

    The Anthropic Python SDK is used ONLY for narrow, side-channel use cases:
      • status-API helper calls (P8) — e.g., one-shot 'summarize this state'
      • cost-ledger token counting (P6) — usage extraction from claude -p stdout
    Never as a replacement for the primary LLM execution path.

  branch_strategy: "feature branches off develop, merge via --no-ff"
  primary_mac: true                 # Azure-backed pipeline runs here (see ../primary-mac-activation.md)

  scope_in:
    - .github/agents/podcast-orchestrator.agent.md
    - .github/agents/podcast-trainer.agent.md
    - .github/agents/podcast-challenger.agent.md
    - .github/agents/podcast-extract.agent.md
    - skills-staging/podcast/**
    - scripts/podcast/**                            # includes scripts/podcast/tests/
    - content/podcast/**
    - docs/architecture/podcast-*.html

  scope_out:
    - .github/agents/journal-*.agent.md
    - .github/agents/CORTEX.agent.md
    - .github/agents/reconcile.agent.md
    - .github/agents/repo-surgeon.agent.md
    - infra/claude-agents/**                        # deletion target — see P8.8
    - skills-staging/journal/**
    - scripts/memoir/**
    - scripts/site/**
    - content/babu-memoir/**
    - content/_shared/**                            # journal reads READ-ONLY; podcast writes ONLY to content/_shared/arabic/06-abjad-numerals.md per P4
    - docs/architecture/journal-*.html
    - docs/architecture/index.html                  # cross-cutting nav, edit only when both sides agree

  scope_in_writes_to_shared_exception:              # one-time exception for P4
    path: content/_shared/arabic/06-abjad-numerals.md
    rationale: |
      P4 creates ONE cross-skill shared file: the canonical abjad-numerals
      reference, used by the podcast pre-refined mode AND any future journal
      Arabic-handling. Follows the existing content/_shared/arabic/00-..05-
      pattern. After creation, READ-ONLY for both skills. No other writes
      to content/_shared/** are permitted from the podcast skill.

  research_artifacts:                               # source-of-truth narratives behind plan deltas
    - path: research/findings.md
      authored: 2026-05-XX
      summary: "Pre-W1 research findings (P4 numeric-symbolic, P5 permission-mode, P-9 invariant, etc.)"
    - path: research/master-disciple-recommendations.md
      authored: 2026-05-XX
      summary: "Master & Disciple book-specific recommendations from earlier sessions"
    - path: research/podcast-best-practices.md
      authored: 2026-05-XX
      summary: "Cross-book podcast authoring best practices distilled from corpus runs"
    - path: research/2026-05-19-redesign-proposal-from-air.md
      authored: 2026-05-19
      authored_by: claude-opus-4.7 on MacBook Air parallel session
      integrated_in: efdf323 + later edits on feat/podcast-w1-foundation
      summary: |
        Operator-curated source bundle → podcast capability arc. Four changes:
        A (per-book concept-glossary), B (Pattern 5 Recursive Scaffold),
        C (Asaas chapter-map preflight + 6-episode preset), D (manifest-driven
        multi-source ingestion via P17.1 extension). Operator added Changes E
        (P21 cross-book learning store) and F (P22 transcript-review gate)
        during integration. Document is the source-of-truth narrative for the
        architectural decisions taken 2026-05-19.
    - path: research/2026-05-19-redesign-audit-from-air.md
      authored: 2026-05-19
      authored_by: claude-opus-4.7 on MacBook Air parallel session (post-integration audit)
      integrated_in: gap-closure commit on feat/podcast-w1-foundation (after efdf323 + 7a5a50b)
      summary: |
        Read-only audit of the Air redesign integration. Verdict: SHIP-READY.
        Surfaced 5 minor drifts and 5 missing items. All 5 gaps closed in
        the follow-up commit: P17.1.ext.9 sequencing-enforcement row, P4.9
        Pattern-5 fixture + challenger Category P rows, Asaas registry.md
        seed (series_pattern: recursive_scaffold), W2 done_signal P22
        addition, P22 acceptance row halt-point wording fix. Also added
        P21 seed-corpus policy (concept-glossary → vocabulary.sqlite) and
        P22 preflight-invariant (hand-authored artifacts never overwritten).

# -----------------------------------------------------------------------------
# Waves — autonomous scheduled-task units
# -----------------------------------------------------------------------------
# Each wave is one scheduled task (cron / `/schedule` skill / launchd). The
# task kicks off the wave, runs its phases sequentially (or in parallel where
# noted), checks the wave's DONE signal against acceptance-criteria.md, and
# either advances to the next wave (if gated open) or halts for human review.
# -----------------------------------------------------------------------------
waves:

  - id: W1
    name: "Foundation & Guardrails"
    phases: [P1, P2, P3, P4, P5, P6]
    schedule_intent: "Overnight; idempotent; zero LLM cost (except P2.5/P2.6 tiny-book passes ~<$2)"
    parallelism: "P1, P2, P3, P4 in parallel; P5 sequential after P4; P6 sequential after P5; P1.4 (run_wave.py) before any other phase can be kicked off; P2.5 sequential after P2.2 (learning E2E builds on sunny-day E2E); P2.6 sequential after P2.2 (determinism check builds on sunny-day E2E); P5.4 (phase constants) parallel with P5.1/P5.2 (perm-mode fix)"
    blast_radius: "Local — no external API calls except P2.5+P2.6 tiny-book passes (<$2); CI workflows created but not executed"
    kickoff_cmd: "python3 scripts/podcast/run_wave.py 1"
    done_signal: "All P1–P6 rows in acceptance-criteria.md `### Wave 1` group checked, including P1.4 (run_wave.py), P2.5 (learning-loop E2E), P2.6 (refinement determinism), P4.4b (Loop N fixture), P5.4 (phase constants module), and P6.4 (trainer cost-ledger hook)"
    gates_open_next: "Wave 2 (after human review of W1 commit AND test_challenger.py green on develop)"
    on_completion:
      # Plain-language summary auto-rendered into _workspace/plan/view/index.html
      # under the "Wave Completions" section when this wave's done_signal flips.
      # See scripts/podcast/_view_updater.py for the rendering mechanism.
      update_html_views: true
      target_files:
        - _workspace/plan/view/index.html
      html_summary: |
        Wave 1 laid the foundations and guardrails the rest of the pipeline depends
        on. We installed automatic checks so that podcast work can never accidentally
        write into the memoir's files, a way to track exactly how much each book
        costs to process, the single entry point that kicks off every wave on a
        schedule, hardened error handling so silent failures can't slip through, and
        the first piece of the Arabic-numeric protocol (the abjad-numerals reference,
        the disambiguation handbook, and the rules that prevent invented
        enumerations from reaching listeners).

        In plain language: before Wave 1, the system was fragile. A single mistake
        could overwrite a memoir chapter, blow the cost budget, or quietly produce
        a broken book without the operator noticing. After Wave 1, the system has
        seat belts. Every step is monitored, every cost is logged, and every cross-
        boundary write is blocked. The pipeline is now safe to run unattended on
        long passes.
    learning_loop_gate: |
      W1 is the wave that OWNS the learning loop becoming a load-bearing
      invariant. After W1, every PR to scripts/podcast/, .github/agents/
      podcast-challenger.agent.md, or content/podcast/.skill/handbook/ MUST
      pass the regression harness in CI. The substrate's two existing
      promotions (J2 bold-header + R-NOSURPRISE companion) plus the seven
      bootstrap fixtures stay green through W1 — no plan task is allowed to
      regress them.

  - id: W2
    name: "Observability + Polish"
    phases: [P7, P8, P22]
    schedule_intent: "Single daytime+overnight window; ~1.5 wk wall-clock; trivial LLM cost"
    parallelism: "P7 then P8; P8 depends on P7's heartbeat schema; P8.6/P8.7/P8.8 sequential at the END of W2 (after P8.1-P8.5 ship; before W3 starts so zero-in-flight is naturally true)"
    blast_radius: "Local — new daemon thread + localhost FastAPI service + bulk phase rename across scripts/podcast/ + agent dedup deletion of infra/claude-agents/"
    kickoff_cmd: "python3 scripts/podcast/run_wave.py 2"
    done_signal: "All P7–P8 + P22 acceptance rows checked; dashboard reachable at http://127.0.0.1:8765/; phase rename schema_version=2 across live state files; agent picker shows each agent exactly once; isolation_check + dedup_check CI green; D3 views render the 6 diagrams; transcript-review gate halts at the correct phase per source type"
    prereq_gate_for_p8_6_p8_8: "scripts/podcast/orchestrator_status.py --all --json | jq '[.books[] | select(.phase_status==\"running\" or .phase_status==\"failed\")] | length' == 0  (naturally satisfied before W3 begins)"
    gates_open_next: "Wave 3"
    on_completion:
      update_html_views: true
      target_files:
        - _workspace/plan/view/index.html
      html_summary: |
        Wave 2 turned the lights on. We added a heartbeat that updates every 30
        seconds so you can see what each book is doing in real time, a localhost
        browser dashboard that shows every book's progress + cost + recent
        learning-loop activity, a status command that prints a clean snapshot
        from the terminal, and a structured event log that downstream tools can
        tail. We also cleaned up the architectural debt: every step of the
        pipeline now has a stable, well-ordered name (01-preflight through
        14-done), the planning views gained six interactive diagrams, and the
        three places agent files used to live consolidated into one source of
        truth.

        In plain language: before Wave 2, you'd start a long pipeline run and
        have no idea whether it was healthy or hung. After Wave 2, every step is
        observable. The dashboard at 127.0.0.1:8765 tells you exactly where each
        book is, how much it has cost so far, what the quality-learning system
        has just promoted or archived, and whether the regression harness is
        still green. The pipeline went from "trust and hope" to "watch and
        intervene."

        Wave 2 also introduces the English-transcript operator-review gate
        (P22). After Phase 0b (or Phase 0a for English-source books) the
        orchestrator now halts, surfaces the full English transcript of the
        book at the top of the book directory, scaffolds an operator-review.md
        for comments, and waits for --approve-transcript to resume. The
        operator's ~5 minutes of review attention happens BEFORE the heavy
        cycles (phonetic pass, chapter design, enrichment, per-chapter
        framing), so OCR/translation issues get caught at the cheapest
        possible point and operator domain knowledge informs every downstream
        phase.

  - id: W3
    name: "Corpus Validation"
    phases: [P9, P10]
    schedule_intent: "One graduated run per scheduled invocation; book picked from queue"
    parallelism: "Strictly sequential — one book per invocation; ETA model (P10) trains on completed runs; P9.8 yield report runs ONCE after P9.7"
    blast_radius: "BIG — full Azure OCR + claude -p spend per run; uses cost ledger from P6"
    kickoff_cmd: "python3 scripts/podcast/run_wave.py 3 --book <slug>"
    done_signal: "All 7 books in P9 either shipped clean OR documented failure-mode + remediation; P10 ETA model within ±30% on held-out book; P9.8 yield report committed and shows fixture_coverage_pct trending UP"
    gates_open_next: "Wave 4 (after P9.8 yield report human-reviewed)"
    cost_guardrail: "P6 hard halt enforced (default $50); wave aborts if hard cap hit"
    on_completion:
      update_html_views: true
      target_files:
        - _workspace/plan/view/index.html
      html_summary: |
        Wave 3 ran the pipeline through seven real books, graduated from a tiny
        30-page Ghazali treatise (Ayyuhal Walad) up to an 865-page philosophical
        compendium (Rasail Ikhwan al-Safa). Each book taught the system
        something: the trainer reviewed every run, the learning-loop substrate
        promoted or archived rules based on what the challenger found, and the
        ETA model learned to predict wall-clock and cost from the book's word
        count. The cross-book yield report at the end of the wave shows
        measurably more fixture coverage and a non-decreasing per-book health
        score — concrete evidence the system got smarter from the first book to
        the last.

        In plain language: this is where the pipeline stopped being a theory and
        started being a tested production system. Seven distinct Islamic /
        Ismaili source books — different sizes, different complexity, different
        editorial quality — all went through the full process. The challenger
        caught quality issues; the trainer learned from them; the system
        compounded improvements. By the end, the operator has a corpus of
        shipped books AND a learning-loop that's demonstrably getting smarter.
    learning_loop_gate: |
      Each book in W3 MUST satisfy the per_book_ship_gate (defined under P9):
      cost-ledger row, finding emission, health score, trainer outcome,
      regression harness green. The W3 yield report (P9.8) is the W3 acceptance
      artifact for P-9 — without it, W3 is not done.

  - id: W4
    name: "Control Plane"
    phases: [P11, P12, P13, P14]
    schedule_intent: "Single window; mutation surface only, no autonomous LLM spend"
    parallelism: "P11 first (decision); P12+P13 parallel; P14 last"
    blast_radius: "Mutation API live; pause/resume/delete enabled; bearer-token auth"
    kickoff_cmd: "python3 scripts/podcast/run_wave.py 4"
    done_signal: "All P11–P14 rows checked; 2 books run truly parallel in P12 acceptance"
    gates_open_next: "Wave 5 (trigger-gated, not time-gated)"
    on_completion:
      update_html_views: true
      target_files:
        - _workspace/plan/view/index.html
      html_summary: |
        Wave 4 made the pipeline operationally controllable. Up to this point,
        you could watch a book run, but if something went wrong mid-run, your
        only options were "let it finish" or "kill the process." Wave 4 adds
        the controls: pause and resume a running book, retry a failed step,
        delete a botched run cleanly, and run two books in parallel without
        their state files colliding. A SQLite index makes cross-book queries
        fast (which book has the highest cost, which is closest to done, which
        had the most challenger findings), and the dashboard from Wave 2 gets
        new buttons for every mutation — with typed-slug confirmation on the
        destructive ones.

        In plain language: before Wave 4, the pipeline was a one-shot
        commitment. After Wave 4, it's a real production system. You can
        operate it like any other long-running job — pause when something
        else needs the machine, resume when ready, retry a single step
        without restarting the whole book, and run a small + a large book
        side by side. Plus everything is audit-logged: every mutation writes
        a row, so you always know who did what and when.

  - id: W5
    name: "Deferred + Self-Learning"
    phases: [P17, P17.1, P18, P19, P20, P21]
    schedule_intent: "NOT time-scheduled — each phase has its own `promote_when` trigger"
    parallelism: "N/A — promoted individually as triggers fire. P19.1/P19.2/P19.3 sequential (substrate → fixtures → recursion verification)."
    blast_radius: "Per-phase; see individual phases. P19 self-learning addenda are gated by P19.2 regression fixtures + R9 cap (≤5 addenda per phase, FIFO eviction)."
    kickoff_cmd: "manual — `python3 scripts/podcast/run_wave.py 5 --phase P17` after promote_when trigger fires"
    done_signal: "Each promoted phase ships its own acceptance rows"
    gates_open_next: "N/A (terminal wave)"
    on_completion:
      update_html_views: true
      target_files:
        - _workspace/plan/view/index.html
      html_summary: |
        Wave 5 ships the genuinely autonomous-quality-evolution capability.
        Before this wave, the system's "learning" was limited to the trainer
        editing a deny-list of forbidden phrases. After Wave 5, the trainer can
        write phase-prompt addenda — short, fixture-gated guidance that gets
        appended to the refinement, phonetics, or framing prompt for every
        future book. The addenda are kept honest by regression fixtures (hand-
        authored, never modified by the trainer), a hard cap of five addenda
        per phase, and a health-score recursion that auto-reverts any addendum
        that doesn't measurably improve the next book.

        Wave 5 also lands the optional convenience features: PDF pre-splitting
        for books too large for Azure's polling budget in one shot, parallel
        per-chapter authoring for speed, web upload via the dashboard, the
        source-adapter registry promotion (which enables manifest-driven
        multi-source ingestion — folder bundles, multi-author anthologies, etc.
        running through the same pipeline), and the cross-book learning store
        (P21) that lets vocabulary, patterns, author style profiles, and
        operator preferences accumulate across books so the LLM cognitive load
        drops on each successive run.

        Each Wave 5 phase promotes individually when its trigger fires; the
        wave never auto-fires under launchd.

