            - Assert SIGSTOP signal sent (via mock.assert_called_with)
            - Idempotency: second pause is 200 no-op (already paused)
          Test 3 — POST /books/{slug}/resume (SIGCONT):
            - Mirror of pause, with SIGCONT
            - Idempotency: resume on running is 200 no-op
          Test 4 — POST /books/{slug}/retry-phase:
            - Body: {phase}; resolves via _phases.resolve() (supports legacy)
            - Sets state.json phase_status to "pending"; re-spawns orchestrator
          Test 5 — DELETE /books/{slug}:
