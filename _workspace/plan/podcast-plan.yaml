            data_source: "phases[].id, phases[].wave, phases[].depends_on, phases[].effort"
            interactions: "hover → tooltip with .why + .acceptance[0]; clicking a bar opens row in acceptance"
            mount_point: "replaces current tone-N decorative SVG strip"
          - id: D3
            view: phased-plan.html
            kind: "P4 Numeric Disambiguation decision tree (D3 collapsible tree)"
            data_source: "numeric-symbolic-disambiguation-plan.md §3 workflow"
            interactions: "click node to expand/collapse; leaves show P0/P1/P2 verdict"
            mount_point: "replaces the long markdown table in P4 section"
          - id: D4
            view: podcast-capabilities.html
            kind: "Pipeline architecture flowchart (D3-enriched inline SVG)"
            data_source: "_phases.Phase enum + _authoring.py phase functions"
            interactions: "hover phase → input/output artifacts + claude-p call count + cost band; click → file:line in _authoring.py"
            mount_point: "top of capabilities tour"
          - id: D5
            view: podcast-capabilities.html
            kind: "Agent topology graph (D3 force)"
            data_source: ".github/agents/podcast-*.agent.md frontmatter (tools + reads_normative)"
            interactions: "edges: solid = invocation, dashed = spec-edit authority (trainer only)"
            mount_point: "after pipeline flowchart"
