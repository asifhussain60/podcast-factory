        == 0
    files:
      - scripts/podcast/_progress.py                      # bump schema_version 1→2; translation layer
      - scripts/podcast/orchestrate_book.py
      - scripts/podcast/_authoring.py
      - scripts/podcast/_chunking.py
      - scripts/podcast/_convergence.py
      - scripts/podcast/extract_chapter.py
      - scripts/podcast/build_episode_txt.py
      - skills-staging/podcast/**
      - .github/agents/podcast-*.agent.md
      - _workspace/plan/podcast-plan.yaml                 # this file
      - _workspace/plan/view/index.html
      - docs/architecture/podcast-pipeline.html
      - docs/architecture/podcast-orchestrator.html
      - docs/architecture/podcast-quality-system.html
      - docs/architecture/podcast-overview.html
      - docs/architecture/index.html
    spec: |
      Full mapping (orchestrator-internal phase IDs — distinct from the plan's
      outer PHASE numbering P1..P20):

        | Old key       | New key                |
        |---------------|------------------------|
        | pre-flight    | 01-preflight           |
        | branch        | 02-branch              |
        | scaffold      | 03-scaffold            |
        | 0a            | 04-ocr-translate       |
        | 0b            | 05-refine-english      |
        | 0c            | 06-phonetics           |
        | 0d            | 07-chapter-design      |
        | 0e            | 08-enrichment          |
        | 0f            | 09-series-plan         |
        | 0g            | 10-register-series     |
        | per-chapter   | 11-per-chapter         |
        | trainer       | 12-trainer             |
        | merge         | 13-merge               |
        | done          | 14-done                |

      Migration requirements:
        1. read_state() detects schema_version=1 and rewrites keys on load.
        2. write_state() emits schema_version=2 with new keys only.
        3. --retry-phase accepts BOTH old and new names for at least one release.
        4. Logs, banners, JSONL events use NEW names only.
    acceptance:
      - "Existing state.json migrates seamlessly on first read (schema_version 1→2)"
      - "`--retry-phase 0b` and `--retry-phase 05-refine-english` both resolve to the same phase"
      - "Docs (podcast-pipeline.html, plan view/index.html) updated atomically with the code"
      - "Zero `0a`..`0g` literal phase-ID strings remain in scripts/podcast/"

