      - id: I2
        title: "Noise routing — two-pass: zero-cost rule pre-pass then Sonnet for ambiguous survivors only"
        depends_on: [I1]
        rationale: |
          Two-pass architecture, NOT a model-per-paragraph router.
          Pass 1 (zero cost): rule-based pre-pass strips structurally obvious
          noise -- isnads, biographical preambles, repetitive lecture openers,
          greetings -- without a single LLM token.
          Pass 2 (Sonnet only): ambiguous survivors from Pass 1 go to Sonnet
          for context-sensitive noise decision.
          Hard constraint: esoteric, quran, hadith, ta'wil, haqaiq, daqaiq,
          poetry, reality, sharia paragraphs are excluded from the noise
          candidate pool entirely -- never offered to either pass.
          Companion source compression also in this step: bulk dedup first
          (restating-primary chunks dropped at zero cost) then enrichment test
          ('teaches something the primary does not?') then historical/biographical
          = automatic fail then compression ratio logged; companion < 15% of
          original volume triggers flag for human review before any LLM spend.
          Model-per-paragraph routing (Haiku/Sonnet/Gemini per complexity score)
          was explicitly considered and rejected in the intelligence pipeline
          discussion -- it spends tokens on every paragraph including obvious
          cases. Locked decisions: D13, D14, D4c (discussion).
        deliverables:
