    pre_execution_blockers:
      - id: BLOCKER-B-PRE
        status: RESOLVED
        discussion_required_with: asif
        description: |
          Before any Wave B step executes, discuss whether to enrich the Wisdom adapted
          chapter text using ChatGPT or Gemini (Asif holds paid subscriptions for both)
          before B0 ingests it into the intelligence library.
          Decision paths:
          (a) ingest as-is from existing adapted extracts — current plan baseline;
          (b) run a ChatGPT/Gemini enrichment pass on all PASS+WARN chapters first;
          (c) run enrichment as a post-hoc annotation layer on B0-ingested atoms.
          Enrichment could improve doctrinal atom depth, topic-tagging precision, and
          Quran cross-reference coverage — all of which affect Augmenter output quality.
        impacts: [B0, B1, B2, B3]
        resolution: "Path (a) selected for kickoff: ingest as-is from existing adapted extracts; revisit optional enrichment after B0 baseline lands."
    steps:

      - id: B0
        phase_type: pre_wave_mobilization
        status: completed_2026_05_28
        title: "Build the Wisdom corpus ingestion driver — independent chapter refinement"
        depends_on: [A2]
        rationale: "75 PASS+WARN Wisdom chapters are ready to seed the intelligence library before any pipeline book runs B1. Independent refinement state machine lets Asif correct chapters one by one without LLM re-runs."
        deliverables:
          module:
            path: "scripts/podcast/intelligence/wisdom_ingest_knowledge.py"
            max_lines: 400
            api:
              - "ingest_chapter(slug, *, re_ingest=False, dry_run=False) -> IngestResult"
              - "ingest_all(verdicts=['PASS','WARN'], *, dry_run=False) -> IngestSummary"
              - "print_status() -> None"
              - "seed_lookup_tables(db) -> None  # idempotent: external_corpora + topic_type_taxonomy"
            cli_flags:
              - "--chapter <slug>   target a specific chapter slug"
              - "--re-ingest        delete old atoms for this chapter and re-create from corrected adapted-extract.en.md"
              - "--dry-run          print what would change without writing"
              - "--status           print table: slug | verdict | ingestion_status | atom_count"
              - "--force            override FAIL verdict for manually-cleared chapters"
          refinement_state_machine:
            field: "corpus_chapters.ingestion_status"
            states: ["pending", "ingested", "needs_correction", "correction_draft", "re_ingested"]
            transitions:
              - {from: pending,           to: ingested,           trigger: "ingest_chapter() succeeds"}
              - {from: ingested,           to: needs_correction,   trigger: "human sets correction_notes + marks chapter"}
              - {from: needs_correction,   to: correction_draft,   trigger: "adapted-extract.en.md edited + committed"}
              - {from: correction_draft,   to: re_ingested,        trigger: "ingest_chapter(re_ingest=True) succeeds; correction_count += 1"}
              - {from: re_ingested,        to: needs_correction,   trigger: "further corrections needed"}
          idempotent_re_ingest_behavior:
            - "DELETE FROM atom_sources WHERE corpus_chapter_id = C.id"
            - "DELETE FROM atom_topic_tags WHERE atom_id IN (atoms with no remaining sources)"
            - "DELETE FROM knowledge_atoms WHERE id IN (atoms now source-less)"
            - "Re-extract from corrected adapted-extract.en.md; expand topic tags via topic_type_taxonomy"
            - "SET corpus_chapters.correction_count += 1, last_ingested_at = now(), ingestion_status = 're_ingested'"
          new_R_constants:
            - {name: R_CORPUS_INGEST_MAX_ATOMS_PER_CHAPTER, value: 50}
            - {name: R_CORPUS_INGEST_WARN_VERDICT_SETS_NEEDS_REVIEW, value: true}
          canonical_id_format: "doctrine:wisdom:<binder_id>:<chapter_id>:<chunk_index>  (chunk_index 0-based within chapter)"
          chunk_algorithm: "split adapted-extract.en.md on <!-- section N --> markers; group consecutive sections into <=600-word chunks; never split mid-section"
          source_files:
            topic_tag_map: "_workspace/source-library/topic-type-map.json (18-row taxonomy + 223 per-topic assignments; no DB access needed)"
            quran_atoms: "\u27eaquran S:A\u27eb markers in adapted-extract.en.md -> surrounding paragraph (~150 words) as tafsir_note"
            hadith_atoms: "adaptation-citations.jsonl entries matching hadith collection names"
          implementation_brief: "_workspace/plan/intelligence/wisdom-intelligence-spec.md"
          tests:
            - "tests/test_wisdom_ingest_idempotent.py"
            - "tests/test_wisdom_refinement_state_machine.py"
        acceptance:
          - "ingest_all(dry_run=True) runs against all 122 chapters without errors"
          - "PASS chapters ingest with needs_review=0; WARN chapters ingest with needs_review=1"
          - "Re-ingesting a chapter after atom deletion produces identical atom count (no duplicates)"
          - "--status prints one row for all 122 chapters with correct verdict + ingestion_status"
          - "Marking a chapter needs_correction does not delete its atoms (atoms stay, flagged needs_review=1)"
        cost_estimate_usd: 0
        authorization: *tier_one

