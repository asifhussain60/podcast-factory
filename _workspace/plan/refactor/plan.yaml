              - "index.html (SPA launcher — built in Wave D)"
              - "architecture.md (timeless design — already written)"
              - "refactor/"
              - "conventions/"
              - "debt/"
              - "operations/"
              - "reader/"
              - "spa/"
              - "research/ (existing — KEEP)"
              - "_drivers/ (existing — KEEP)"
              - "view/ (existing — eventually superseded by SPA)"
              - "_archive/ (NOT created — git history preserves deleted files)"
            "_workspace/plan/refactor/":
              - "plan.md (this plan)"
              - "plan.yaml (this file)"
              - "progress.json (Wave D dashboard reads)"
            "_workspace/plan/conventions/":
