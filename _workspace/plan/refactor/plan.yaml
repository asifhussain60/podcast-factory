# ===========================================================================
# WAVE J — Source Library (Dual-Interface Server + Live Editor Integration)
# ===========================================================================

  - id: J
    name: Source Library — Dual-Interface Server and Live Editor Integration
    execution_status: in_progress
    parallel_with: []
    depends_on: [I]
    summary: |
      Wave J transforms the three SQL Server source databases into a live
      intelligence layer serving two consumers simultaneously: the authoring
      pipeline (MCP stdio tools for Claude Code and Copilot) and the Astro
      live editor (HTTP endpoints for the existing QuranPopover and
      TermPopover components — currently aimed at quran.com and Gemini Flash
      respectively). Six steps: J0 builds the dual-interface server (stdio
      MCP + HTTP REST, same query layer); J1 builds the search-optimised
      SQLite mirror (FTS5 virtual tables + unified term_index combining
      KQUR Roots+Derivatives with KASHKOLE Glossary); J2 rewires the Astro
      editor's existing popover API routes to the local server;
      J3 wires the enrichment phase live fallback; J4 wires the style
      rewrite phase; J5 adds a Wisdom topic cross-reference popover.
      Connection: server 192.168.1.158; databases KQUR, KASHKOLE,
      KSESSIONS_DEV; VS Code MSSQL profile AHHOME. Source dumps at
      CONTENT/_shared/source-library/ (gitignored). Query files at
      scripts/wisdom/queries/ (7 files, committed d37d731).
      Cost model: zero tokens and zero external API calls for all verse
      popups, term definitions, and topic lookups once J1+J2 are in place.
      Gemini Flash remains as a silent fallback only for terms absent from
      all three databases (~10% of hovers estimated).
    execution_notes: []
    steps:

      - id: J0
        title: "Build the dual-interface source library server — MCP stdio for the pipeline, HTTP for the Astro editor"
        depends_on: []
        rationale: |
          One Python process, two transports, same six query functions.
          MCP stdio transport (for Claude Code, Copilot, Claude Desktop):
            tools/list -> tools/call -> JSON-RPC 2.0. Registered in .mcp.json.
          HTTP transport (for the Astro app's API routes, port 4390):
            FastAPI on port 4390. Browser cannot call stdio; HTTP is required.
            Same six functions back both transports — zero duplication.
          Six query functions:
            (1) quran_lookup(surah: int, ayat: int)
                -> QuranAyats: Arabic, Pickthall, Asad, Urdu, Phonetic.
            (2) quran_theme_search(keyword: str, limit: int = 10)
                -> FTS5 over PickthallTranslation + AsadTranslation (LIKE until J1).
            (3) word_etymology(term: str)
                -> Roots JOIN Derivatives: root Arabic, English meaning, grammar tags,
                   derivative definitions.
            (4) topic_search(keyword: str, limit: int = 10)
                -> FTS5 over TopicDataUnicode. Returns binder, chapter, topic,
                   first 400 chars.
            (5) topic_get(topic_id: int)
                -> Full TopicDataUnicode + linked Quran ayats (TopicAyats) +
                   glossary terms (TopicGlossaries JOIN Glossary).
            (6) session_style_fetch(theme: str, group_id: int = null, limit: int = 4)
                -> Session passages by theme; HTML stripped to plain text.
          HTTP endpoints mirror the six functions at port 4390:
            GET /quran/verse?surah=N&ayat=N
            GET /quran/theme?q=keyword
            GET /term/define?term=keyword
            GET /etymology?term=keyword
            GET /topic/search?q=keyword
            GET /topic/get?id=N
            GET /sessions/fetch?theme=keyword&group_id=N&limit=4
          Security: all parameters parameterised (OWASP A03). String inputs
          max 200 chars. Rate limit: 60 calls/min per interface. JSON schema
          validation on all requests and responses.
          Primary data source: SQLite mirror (J1). SQL Server fallback when
          mirror lacks a row.
          Registered in .mcp.json at repo root for Copilot/Claude Code.
          --dry-run: lists tools, hits /health, confirms SQLite accessible.
        deliverables:
          - "scripts/mcp/source_library_server.py: dual-transport server (<=600 lines, DR-005)"
          - "scripts/mcp/__init__.py"
          - "scripts/mcp/README.md: startup, registration, tool and HTTP endpoint reference"
          - "Six MCP tools + matching HTTP endpoints via FastAPI"
          - ".mcp.json at repo root: source-library server registration added"
          - "FastAPI on port 4390; MCP stdio on same process"
          - "Input validation: parameterised queries, 200-char limit, type checks"
          - "Rate limiter: 60 calls/min (token bucket, in-process)"
          - "--dry-run: lists tools + hits /health, exits 0, no data returned"
          - "requirements: mcp, fastapi, uvicorn, pyodbc in scripts/mcp/requirements.txt"
        acceptance:
          - "Server starts and responds to tools/list via MCP stdio"
          - "GET localhost:4390/quran/verse?surah=2&ayat=255 returns Arabic + Pickthall + Asad + Urdu"
          - "GET localhost:4390/term/define?term=tawhid returns definition from KASHKOLE Glossary"
          - "topic_get(1) via MCP returns content + linked ayats"
          - "SQL injection attempt on any endpoint returns 422 without executing"
          - ".mcp.json present and parseable; VS Code MCP panel shows source-library server"
          - "--dry-run exits 0 with no DB rows returned"
          - "test_mcp_server.py: >=12 tests green (both transports, all 6 tools, injection guard, rate limit)"
          - "source_library_server.py <=600 lines"
        authorization: tier_one
        branch: "feature/wave-j-mcp-server"
        cost_estimate_usd: 0
        execution_status: not_started

      - id: J1
        title: "Build the search-optimised SQLite mirror with FTS5 tables and a unified term index"
        depends_on: [J0]
        rationale: |
          Three FTS5 virtual tables replace LIKE scans with sub-millisecond
          indexed search:
            fts_quran: Arabic, PickthallTranslation, AsadTranslation, UrduTranslation
            fts_topics: TopicDataUnicode content (HTML stripped on import)
            fts_sessions: SessionTranscripts plain text (HTML stripped on import)
          Unified term_index table (materialised at build time):
            Source: KQUR Roots + Derivatives + KASHKOLE Glossary + DeeniTermGroup
            Schema: term_index(
              term TEXT,       -- lookup key (English transliteration)
              arabic TEXT,     -- Arabic script
              root TEXT,       -- root Arabic
              grammar_tag TEXT,-- verb/noun/adj/etc
              definition TEXT, -- English definition (Glossary preferred)
              etymology TEXT,  -- root meaning + derivative chain
              tradition TEXT,  -- ismaili/shii/sunni/general
              source TEXT,     -- KQUR|KASHKOLE
              related TEXT     -- JSON array of related term strings
            )
            FTS5 virtual table over term_index for instant term lookup.
          word_etymology and GET /term/define query term_index first.
          If found (found: true): returned instantly, zero AI cost.
          If not found (found: false): Astro define-term falls back to Gemini.
          Row-level indexes:
            (surah_id, ayat_id) on QuranAyats
            topic_id on Topics
            session_id on SessionTranscripts
          Excluded: KASHKOLE TopicData binary column (724 MB of blobs).
          Estimated mirror size: <50 MB.
          --verify flag checks row counts mirror vs SQL Server after build.
        deliverables:
          - "scripts/mcp/build_mirror.py: FTS5-aware SQLite mirror builder (<=400 lines)"
          - "CONTENT/_shared/source-library/mirror.db: SQLite file (gitignored, <50 MB est.)"
          - "FTS5 virtual tables: fts_quran, fts_topics, fts_sessions"
          - "term_index table: unified cross-database term lookup surface with FTS5"
          - "Composite index: (surah_id, ayat_id) on QuranAyats"
          - "Index: topic_id on Topics, session_id on SessionTranscripts"
          - "HTML stripping on SessionTranscripts and TopicDataUnicode at import time"
          - "build_mirror.py: --dry-run counts rows without writing .db"
          - "build_mirror.py: --verify checks mirror row counts vs SQL Server"
          - "source_library_server.py updated: FTS5 queries replace LIKE in theme/term search"
        acceptance:
          - "build_mirror.py --dry-run exits 0 and prints per-table row counts"
          - "mirror.db produced, under 100 MB"
          - "FTS5 term search for tawhid returns >=1 result from term_index in <5 ms"
          - "FTS5 quran search for mercy returns >=3 results in <5 ms"
          - "term_index contains >=1000 rows (smoke test for completeness)"
          - "Server started with --offline serves quran_lookup and term/define from mirror.db"
          - "test_mcp_mirror.py: >=8 tests green (FTS5 queries, term_index, verify flag, row counts)"
        authorization: tier_one
        branch: "feature/wave-j-offline-mirror"
        cost_estimate_usd: 0
        execution_status: completed_2026_05_29
        completed_notes: |
          source_library_mirror.py (380 lines): 4 tables (fts_quran, fts_topics,
          fts_sessions, term_index), paginated extraction, --dry-run + --verify.
          source_library_queries.py updated: quran_theme_search, topic_search,
          word_etymology all try mirror first, fall back to SQL Server.
          15 tests in test_source_library_mirror.py — 317 total passing.

      - id: J2
        title: "Rewire the Astro editor's existing popover API routes to call the local server first"
        depends_on: [J0, J1]
        rationale: |
          QuranPopover.tsx and TermPopover.tsx exist and work — they just call
          the wrong backends (quran.com and Gemini Flash). This step rewires
          the two existing Astro API routes and adds two new ones. No frontend
          component code changes for the wiring itself.
          verse.ts rewiring:
            Try GET localhost:4390/quran/verse?surah=N&ayat=N first (300 ms timeout).
            On success: return Pickthall + Asad + Urdu + phonetic + Arabic.
            Response shape is a superset of the existing VerseData interface.
            On server unreachable: fall back to quran.com.
            Module-level isLocalAvailable boolean re-evaluated every 60 s.
          define-term.ts rewiring:
            Try GET localhost:4390/term/define?term={phonetic} first.
            If found: true -> return definition + etymology + related array.
            If found: false -> fall back to Gemini Flash.
            If server unreachable -> fall back to Gemini immediately.
          New routes:
            plan-dashboard/src/pages/api/quran/etymology.ts
              GET /api/quran/etymology?root=<str>
              -> localhost:4390/etymology?term=<str>
            plan-dashboard/src/pages/api/wisdom/topic.ts
              GET /api/wisdom/topic?id=<n>
              -> localhost:4390/topic/get?id=<n> (consumed by J5 TopicPopover)
          Shared utility: plan-dashboard/src/lib/localServerClient.ts
            Probe with 300 ms timeout, module-level availability flag,
            re-probe interval, typed response helpers for all endpoints.
          UI enhancements (minimal, no new libraries):
            QuranPopover.tsx: asad_translation displayed alongside Pickthall.
            TermPopover.tsx: etymology expandable section when field non-empty.
        deliverables:
          - "plan-dashboard/src/pages/api/quran/verse.ts: local-first rewrite"
          - "plan-dashboard/src/pages/api/ai/define-term.ts: local-first with Gemini fallback"
          - "plan-dashboard/src/pages/api/quran/etymology.ts: new route"
          - "plan-dashboard/src/pages/api/wisdom/topic.ts: new route"
          - "plan-dashboard/src/lib/localServerClient.ts: shared probe + typed response helpers"
          - "VerseData interface updated: asad_translation, urdu_translation, phonetic fields added"
          - "TermPopover.tsx: etymology expandable section when etymology field non-empty"
          - "QuranPopover.tsx: asad_translation section when present"
        acceptance:
          - "GET /api/quran/verse?key=2:255 with local server running returns asad_translation field"
          - "GET /api/quran/verse?key=2:255 with local server stopped falls back to quran.com"
          - "GET /api/ai/define-term for a term in term_index returns local definition (no Gemini call)"
          - "GET /api/ai/define-term for a term absent from term_index falls back to Gemini"
          - "GET /api/wisdom/topic?id=1 returns topic name + content + linked ayats"
          - "QuranPopover shows asad_translation section when populated"
          - "TermPopover shows etymology section when populated"
          - "test_astro_api_rewiring.ts: >=10 tests green (local paths, fallback paths, new routes)"
        authorization: tier_one
        branch: "feature/wave-j-astro-rewiring"
        cost_estimate_usd: 0
        execution_status: not_started

      - id: J3
        title: "Wire enrichment phase to use live verse lookups as a complete-coverage fallback"
        depends_on: [J0, B3]
        rationale: |
          The Wave B Augmenter enriches chapters from pre-extracted SQLite atoms.
          Coverage is bounded: verses not yet extracted pass through unannotated.
          A live fallback calls localhost:4390/quran/verse when no matching atom
          is found in the local knowledge database.
          Fallback path:
            1. Augmenter finds citation pattern (Q\d+:\d+ or Unicode marker)
            2. Looks up in knowledge_atoms WHERE type='quran' AND needs_review=0
            3. If 0 atoms: calls GET localhost:4390/quran/verse?surah=S&ayat=A
            4. Formats result with _context_injection.format_provenance
            5. Logs to _system/mcp-calls.jsonl (tool, args, latency_ms, source='live')
          Thematic path: quran_theme_search when doctrine_topic_ids contains
          'quran_thematic' tag; per-chapter call using top 3 extracted themes.
          Gate: series.enable_live_quran_lookup: true in meta.yml (default false).
        deliverables:
          - "scripts/podcast/intelligence/augmenter.py: live fallback path added (<=600 lines)"
          - "scripts/podcast/intelligence/_local_server_client.py: thin HTTP helper (<=100 lines)"
          - "_system/mcp-calls.jsonl: per-call ledger per chapter"
          - "meta.yml flag: series.enable_live_quran_lookup (bool, default false)"
          - "Thematic path when doctrine_topic_ids has quran_thematic tag"
        acceptance:
          - "Augmenter injects Q2:255 correctly even when no knowledge_atoms row exists"
          - "mcp-calls.jsonl written with source=live entries after enrichment"
          - "enable_live_quran_lookup: false produces zero server calls"
          - "Server unreachable -> augmenter logs warning and continues without crash"
          - "test_augmenter_live_fallback.py: >=6 tests green"
        authorization: tier_one
        branch: "feature/wave-j-enrichment-wiring"
        cost_estimate_usd: 0
        execution_status: not_started

      - id: J4
        title: "Wire style rewrite phase to pull live session samples matched to each chapter's themes"
        depends_on: [J0, I0b]
        rationale: |
          The I0b style rewrite pass uses a fixed pre-selected set of session
          HTML files. That sample is genre-generic. A live query per chapter
          returns the 3-4 session passages most thematically relevant to the
          chapter being authored. Theme matching uses the session database's
          existing group and category structure — no embeddings, no AI cost.
          Theme extraction: top 3 noun phrases from chapter text (regex +
          existing topic_tags from Augmenter run). One session_style_fetch
          call per theme; results deduplicated by session_id.
          Gate: series.enable_live_style_fetch: true in meta.yml (default false).
        deliverables:
          - "scripts/wisdom/rewrite_chapters.py: live session fetch path added"
          - "Theme extractor: extract_chapter_themes(text) -> list[str] (top 3 phrases)"
          - "_system/mcp-calls.jsonl: style fetch calls alongside enrichment calls"
          - "meta.yml flag: series.enable_live_style_fetch (bool, default false)"
          - "Fallback: server offline -> rewrite falls back to static style-imprint.md only"
