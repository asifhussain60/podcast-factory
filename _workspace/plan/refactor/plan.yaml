# Pipeline Refactor — Machine-Readable Roadmap
# Companion to refactor/plan.md (human-readable). Architecture-first companion: every
# step here traces to a layer in ../architecture.md. Single source of truth.

meta:
  plan_id: pipeline-refactor
  status: AWAITING_APPROVAL
  generated_at: 2026-05-26
  branch_target: develop
  approved_by: null
  approved_at: null
  authored_by: Claude Opus 4.7
  companion_files:
    architecture: ../architecture.md
    human_readable: plan.md
  doctrine:
    no_file_versions: |
      No file in this repo carries a version suffix or version header (DR-009).
      Pre-commit hook rejects 'Version: \d' in tracked files and new files matching
      '*v[0-9]*.md'. Git history IS the version log.
    retroactive_for_shipped: |
      Shipped books (KaR, M&D, Ayyuhal Walad, ISLR Mas-I, Asaas al-Taveel) receive
      enhancements as addendum episodes + metadata stamps + extraction-only passes.
      They are NEVER re-run through the pipeline (DR-013). Every enhancement still
      becomes default for the next forward book.
    modularization: |
      No file in scripts/podcast/ exceeds 600 lines (DR-005). Six-layer dependency
      chain (Core → Domain → Intelligence + Authoring → Phases → Driver) with no
      cycles. SOLID + DRY enforced by line caps + acyclic dependency analysis.
    database: |
      SQLite + JSON1 for v1 (DR-001). Single file at content/knowledge-base/knowledge.db.
      WAL mode. SQLAlchemy ORM keeps the Wave-2 Postgres+pgvector migration path open.
      Zero infrastructure on any Mac.

# ---------------------------------------------------------------------------
# Anchors — reusable structures (DRY)
# ---------------------------------------------------------------------------
anchors:
  tier_zero: &tier_zero { authorization: 0, description: "Just do it; no per-action acknowledgement." }
  tier_one:  &tier_one  { authorization: 1, description: "Do, then surface in the At-a-glance." }
  tier_two:  &tier_two  { authorization: 2, description: "Always ask. One-line ask + single-sentence Next." }

# ---------------------------------------------------------------------------
# Inherited / Locked decisions (cross-reference architecture.md ADRs)
# ---------------------------------------------------------------------------
locked_decisions:
  - {ref: DR-001, decision: "SQLite + JSON1 v1; Postgres + pgvector at Wave 2"}
  - {ref: DR-002, decision: "Tier-2 capstone NEVER reads chapter-scope material"}
  - {ref: DR-003, decision: "Per-content-type typed branch policy"}
  - {ref: DR-004, decision: "Letter-suffix phase IDs (08a/08b/08c)"}
  - {ref: DR-005, decision: "Every scripts/podcast/ file ≤ 600 lines"}
  - {ref: DR-006, decision: "architecture.md independent of docs/architecture/index.html"}
  - {ref: DR-007, decision: "Augmenter default-disabled until G12 fires green"}
  - {ref: DR-008, decision: "Per-book scratch stays JSONL, not SQLite"}
  - {ref: DR-009, decision: "No version stamps in tracked files; pre-commit hook enforces"}
  - {ref: DR-010, decision: "Astro for plan SPA + design tokens shared with podcast-reader"}
  - {ref: DR-011, decision: "Cross-tradition guard via tradition_adjacency.yml"}
  - {ref: DR-012, decision: "Augmenter strips text_ar before injection"}
  - {ref: DR-013, decision: "Retroactive enhancements for shipped books = addendum-only"}

# ===========================================================================
# WAVE A — Foundation
# ===========================================================================

waves:

  - id: A
    name: Foundation
    parallel_with: []
    steps:

      - id: A1
        title: "Clean the legacy plan folder and stand up the nested structure"
        depends_on: []
        runs_before: "every other step"
        rationale: "User doctrine: fold pending work, delete legacy, no v2/v3 versions"
        deliverables:
          new_nested_structure:
            "_workspace/plan/":
