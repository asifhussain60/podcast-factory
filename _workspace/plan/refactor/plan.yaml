  - wave: K
    title: "Quality Scoring + Pipeline Hardening"
    status: not_started
    authorization: awaiting_approval
    depends_on: [B, I, J]
    description: |
      Wave K introduces a principled, multi-dimensional quality score (PEQ —
      Podcast Episode Quality) that replaces free-form PASS/WARN/FAIL verdicts
      across both the podcast pipeline and the wisdom pipeline. The same
      four-axis weighted rubric (Fidelity, Voice, Structure, Enrichment)
      is applied consistently in the challenger, the convergence loop, the
      wisdom chapter validator, and the plan-dashboard. Two canonical books
      (kitab-al-riyad and the-master-and-the-disciple) are used as
      before/after regression fixtures; snapshot baselines are captured
      before any K-step runs and compared after each step completes.
    steps:

      - id: K0
        title: "Define and publish the PEQ quality-scoring contract"
        depends_on: []
        rationale: |
          All quality measurement in this system currently reduces to a
          three-state string (PASS/WARN/FAIL). This creates three problems:
          (1) two episodes that both pass may differ wildly in actual quality;
          (2) the convergence loop cannot prioritise which dimension to fix;
          (3) before/after regressions cannot be measured numerically.
          K0 defines the canonical PEQ schema and locks it before any other
          K-step builds against it.
          PEQ score = weighted sum of four axes (each 0-25 raw, normalised to 0-100):
            - Fidelity (0-25): citation accuracy + source faithfulness.
              Algorithm: Levenshtein-distance-free overlap of verse references
              between adapted-extract and source TopicAyats; weighted by
              number of citations in source chapter.
            - Voice (0-25): register match to KSessions exemplars.
              Algorithm: cosine similarity of TF-IDF bigram vectors between
              the episode text and the three nearest KSessions style exemplars
              (pre-computed at K1 build time; no live API calls).
            - Structure (0-25): archetype arc compliance.
              Algorithm: rule-based arc checker per archetype spec —
              required section types present, forbidden section types absent,
              word-count within tier envelope.
            - Enrichment (0-25): terminology coverage + Quran hook density.
              Algorithm: ratio of domain terms (from term_index) correctly
              glossed on first occurrence; ratio of Quran references present
              in episode vs source.
          Weights default: Fidelity=0.35, Voice=0.25, Structure=0.20,
          Enrichment=0.20. Per-series overrides via series-config.yaml.
          Thresholds: PEQ >= 85 = PASS, 70-84 = WARN, < 70 = FAIL.
        deliverables:
          - "scripts/podcast/_quality.py: PEQ dataclass, score() function, compute_all_axes()"
          - "scripts/podcast/knowledge/schema/019_quality_scores.sql: quality_scores table"
          - "content/_shared/archetypes/*/spec.yml: arc_rules section added to all 7 archetypes"
          - "docs/reference/peq-scoring-contract.md: public spec for PEQ axes, weights, thresholds"
        acceptance:
          - "_quality.py <= 300 lines (DR-005)"
          - "score() returns PEQ dataclass with axes (fidelity, voice, structure, enrichment, total)"
          - "total rounds to int in [0,100]"
          - "test_quality.py: >= 10 unit tests covering edge cases (empty text, all-zero axes, etc.)"
          - "019_quality_scores.sql applied by run_migrations() without error"
          - "All 7 archetype spec.yml files have arc_rules section"
        authorization: tier_one
        branch: "feature/wave-k-quality-contract"
        cost_estimate_usd: 0
        execution_status: completed

      - id: K1
        title: "Snapshot regression baselines for kitab-al-riyad and the-master-and-the-disciple"
        depends_on: [K0]
        rationale: |
          Before any K-step changes pipeline behaviour, capture PEQ baseline
          scores for every shipped chapter of both canonical books. These
          snapshots become the regression floor: any K-step that drops a
          chapter's PEQ score by more than 5 points fails its acceptance check.
          The snapshot runner also exports per-axis breakdowns so the team can
          see which dimension is weakest across the corpus before optimisation.
        deliverables:
          - "scripts/wisdom/wisdom_quality_snapshot.py: runs PEQ on all PASS+WARN chapters of a book"
          - "_workspace/test-strategy/baselines/kitab-al-riyad-peq-baseline.json: per-chapter scores"
          - "_workspace/test-strategy/baselines/the-master-and-the-disciple-peq-baseline.json: per-chapter scores"
          - "tests/regression/test_peq_regression.py: fails if any chapter drops >5 PEQ points vs baseline"
        acceptance:
          - "Baseline JSON files committed with >= 10 chapters each"
          - "test_peq_regression.py passes green on the committed baselines (no regressions at capture time)"
          - "Per-axis breakdown present in baseline JSON (fidelity, voice, structure, enrichment per chapter)"
          - "script exits 0 on both books, <= 120 s wall time"
        authorization: tier_one
        branch: "feature/wave-k-baselines"
        cost_estimate_usd: 0
        execution_status: completed

      - id: K2
        title: "Replace challenger free-form verdict with PEQ-driven scoring in both pipelines"
        depends_on: [K0, K1]
        rationale: |
          The podcast challenger (podcast-challenger agent) and the wisdom
          chapter challenger (tools/content_challenger/wisdom/) both produce
          free-form text verdicts. This step replaces the text verdict with a
          structured PEQ score appended to each report, while keeping the
          prose commentary. The convergence loop in orchestrate_book.py is
          updated to advance to the next chapter only when PEQ >= 70 (WARN
          threshold); FAIL chapters are flagged for retry up to the existing
          3-outer x 5-inner cap. The wisdom challenger similarly gates the
          seal stage on PEQ >= 70 unless --force is passed.
        deliverables:
          - "scripts/podcast/intelligence/challenger_scoring.py: PEQ integration wrapper for podcast challenger"
          - "tools/content_challenger/wisdom/challenge_auto.py: PEQ section appended to wisdom-challenger-report.md"
          - "scripts/podcast/orchestrate_book.py: convergence advancement gated on peq_total >= 70"
          - "tools/content_translator/stages/seal.py: wisdom seal blocked on peq_total < 70 unless --force"
          - "_system/challenger-report.md format: ## PEQ Score section with axis breakdown table"
        acceptance:
          - "test_peq_regression.py still green after this step (no baseline regressions)"
          - "wisdom-challenger-report.md contains ## PEQ Score section with all four axis scores"
          - "orchestrate_book.py convergence loop reads peq_total from report, not verdict string"
          - "FAIL chapter halts loop; WARN chapter advances; PASS advances"
          - "test_challenger_scoring.py: >= 8 tests green"
        authorization: tier_one
        branch: "feature/wave-k-challenger-scoring"
        cost_estimate_usd: 0
        execution_status: completed

      - id: K3
        title: "Wire PEQ scores into agent prompts and skill instructions for consistent quality framing"
        depends_on: [K2]
        rationale: |
          Agents and skills currently receive text rubrics with no numeric anchor.
          The framing agent (episode framing phase) and the wisdom adaptation
          prompt both describe quality goals in prose — which means the LLM has
          no way to self-monitor against a score. This step adds a quality
          contract block to the three key prompts: the framing system prompt,
          the wisdom adaptation system prompt, and the podcast-challenger skill
          spec. Each block states the four PEQ axes and their weights in a
          compact table, instructs the model to self-assess before submitting,
          and asks it to report which axis it believes is weakest in its output.
          This self-assessment is not trusted numerically — the deterministic
          PEQ scorer (K0) has the final word — but it steers the model toward
          higher-quality outputs on the first pass, reducing costly retries.
        deliverables:
          - "scripts/podcast/_authoring.py: framing system prompt gains PEQ quality contract block"
          - "tools/content_translator/stages/adapt_auto.py: adaptation system prompt gains PEQ contract block"
          - "skills-staging/podcast/SKILL.md: PEQ axes listed in quality criteria section"
          - "infra/claude-agents/podcast-challenger.md: PEQ axes + thresholds listed in evaluation rubric"
          - "infra/claude-agents/podcast-orchestrator.md: convergence halt condition updated to PEQ >= 70"
        acceptance:
          - "test_peq_regression.py still green (no regressions vs baseline)"
          - "Framing prompt includes PEQ contract block (verified by string search in test)"
          - "Wisdom adaptation prompt includes PEQ contract block"
          - "SKILL.md and podcast-challenger.md reference PEQ thresholds (85/70)"
          - "No prompt exceeds 4000 tokens after additions (test_prompt_length.py)"
        authorization: tier_one
        branch: "feature/wave-k-prompt-quality-framing"
        cost_estimate_usd: 0
        execution_status: completed

      - id: K4
        title: "Surface PEQ scores on the plan dashboard with per-chapter and per-book breakdowns"
        depends_on: [K2]
        rationale: |
          After K2, every challenger report has structured PEQ data. This step
          makes that data visible in the plan dashboard: a new /quality page
          shows per-book, per-chapter score tables with colour-coded axis
          breakdowns (green >= 85, amber 70-84, red < 70), a trend chart
          comparing baseline vs current for both canonical books, and a
          cross-book summary banner showing fleet-wide average PEQ. The page
          reads directly from the quality_scores table (schema/019) — no
          new data fetch needed.
        deliverables:
          - "plan-dashboard/src/pages/quality.astro: new page with per-chapter PEQ table + trend chart"
          - "plan-dashboard/src/pages/architecture.astro: Wave K section added"
          - "plan-dashboard/src/lib/quality-data.ts: reads quality_scores via SQLite (same pattern as db-schema page)"
          - "plan-dashboard/src/components/PeqScoreCard.tsx: reusable score card (axis bars + total badge)"
        acceptance:
          - "/quality page renders without errors"
          - "PeqScoreCard shows all four axis bars + total badge"
          - "Trend chart shows at least one data point for each baseline book"
          - "Cross-book summary banner present and shows fleet average"
          - "quality.astro <= 400 lines"
        authorization: tier_one
        branch: "feature/wave-k-quality-dashboard"
        cost_estimate_usd: 0
        execution_status: completed

      - id: K5
        title: "Apply PEQ-gated quality checks to the wisdom pipeline retranslation and reingestion cycle"
        depends_on: [K2, K3]
        rationale: |
          The wisdom pipeline retranslation loop (wisdom_run_remaining.py + seal.py)
          currently advances on any non-FAIL verdict. With PEQ in place, this
          step tightens the loop: chapters that score < 70 on Fidelity are
          automatically queued for re-translation (not just re-adaptation);
          chapters that score < 70 on Enrichment are queued for re-enrichment
          before re-ingestion into the knowledge base. This closes the gap
          between the wisdom extraction pipeline and the knowledge library's
          quality floor, ensuring only chapters above the WARN threshold enter
          the intelligence layer consumed by the podcast pipeline.
        deliverables:
          - "scripts/wisdom/wisdom_run_remaining.py: PEQ-gated advancement (fidelity < 70 -> re-translate)"
          - "scripts/wisdom/wisdom_pipeline_all.py: PEQ summary report emitted per binder"
          - "scripts/podcast/intelligence/wisdom_ingest_knowledge.py: ingest blocked on peq_total < 70 unless --force"
          - "_workspace/test-strategy/baselines/: baseline JSONs regenerated after K5 (new floor)"
        acceptance:
          - "test_peq_regression.py still green vs K1 baselines"
          - "wisdom_run_remaining.py --dry-run shows PEQ-gated queue for at least 1 chapter"
          - "Ingest of a chapter with peq_total=65 raises QualityGateError unless --force passed"
          - "test_wisdom_quality_gate.py: >= 6 tests green"
          - "wisdom_pipeline_all.py --summary emits per-binder PEQ table"
        authorization: tier_one
        branch: "feature/wave-k-wisdom-quality-gate"
        cost_estimate_usd: 0
        execution_status: completed

