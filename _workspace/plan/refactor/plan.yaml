              doctrine:     "when doctrine_topic_ids set: atom_topic_tags JOIN knowledge_atoms WHERE type='doctrine' AND needs_review=0 AND topic_type_id IN (doctrine_topic_ids); silently skip when None"
            needs_review_gate: "needs_review=0 required for ALL atom types — WARN-verdict Wisdom atoms blocked from augmentation output until re-ingested clean"
