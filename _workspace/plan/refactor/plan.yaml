  - id: I
    name: Intelligence Pipeline — Audio Intake, Noise Routing, Tradition-Aware KB, Source Review Gate, Phase 11g
    execution_status: completed
    parallel_with: []
    depends_on: [B]
    summary: |
      Extends the pipeline in five coordinated areas, preceded by two
      retroactive repair steps (I0a + I0b) on existing shipped books.
      I0a: Haiku annotation pass pre-marks noise and content types on
      existing chapters; Asif reviews and approves in the reader UI.
      I0b: Sonnet rewrites cleaned text in Asif's teaching voice using
      style extracted from his KSessions lectures (Wise Reminder, Ikhwan
      Arithmetic, Asaas Al-Taveel, Session 2346 Isbat al-Imamah).
      Then: audio-first intake (I1); two-pass noise routing with
      zero-cost rule pre-pass + Sonnet for ambiguous survivors only (I2);
      tradition-aware KB schema migration (I3); Source Review Gate
      Phase 06a (I4); Book Review unified astro view (I5);
      Phase 11g per-chapter Sonnet optimiser (I6).
      All decisions locked in _workspace/plan/intelligence/locked-decisions.md.
    locked_decisions_ref: "_workspace/plan/intelligence/locked-decisions.md"
    execution_notes: []
    steps:
      - id: I0a
        title: "Retroactive noise annotation — AI pre-marks existing chapters; human reviews in reader UI"
        depends_on: []
        rationale: |
          The two primary test books carry noise of different types.
          the-master-and-the-disciple has additive noise (the pipeline added
          large italicised editorial preambles + 'Where this chapter picks up'
          sections on top of good source content).
          kitab-al-riyad has condensed noise (pipeline dropped content AND added
          framing; the source file is larger than the chapter output, meaning
          substantive content may be missing). Before building the automated
          noise router, ground-truth annotation must be established manually.
          A Haiku pass pre-marks each paragraph with a proposed tag
          (mark-for-deletion, mark-for-improvement, esoteric, reality, sharia,
          quran, hadith) and imports results into the reader annotation SQLite DB.
          Asif reviews in the reader at localhost:4322 and approves or overrides.
          Approved deletions applied in-place; git is the recovery mechanism.
          Hard rule: esoteric / reality / quran / hadith / poetry / sharia
          paragraphs are NEVER deletion candidates -- model annotations for these
          categories are auto-demoted to mark-for-improvement.
          Reader UI components already built: ParagraphAnnotationBar.tsx +
          AnnotationWorkbench.tsx support all required tag types.
        deliverables:
          - "scripts/wisdom/annotate_chapters.py: Haiku annotation pass producing structured JSON per paragraph (<=300 lines)"
          - "scripts/wisdom/import_annotations.py: load JSON into reader annotation SQLite DB"
          - "Annotation tags: mark-for-deletion, mark-for-improvement, esoteric, reality, sharia, quran, hadith"
          - "Protected-category demotion rule enforced in annotate_chapters.py (never deletion)"
          - "Dry-run target: one chapter from the-master-and-the-disciple + one from kitab-al-riyad"
          - "Full pass: all 21 chapters (6 M&D + 15 KaR)"
          - "In-place chapter edits applied after Asif approves; committed as test-fixture baseline"
        acceptance:
          - "Annotations visible in reader UI at localhost:4322 for both test books after import"
          - "No esoteric/quran/hadith/poetry/sharia paragraphs carry mark-for-deletion tag"
          - "annotate_chapters.py: >= 5 tests green (tag assignment, demotion rule, confidence threshold)"
          - "Chapter text files updated to match approved annotations after finalize step"
          - "git diff shows only deletion of confirmed noise paragraphs (no content added)"
        authorization: tier_one
        branch: "feature/wave-i-retroactive-annotation"
        cost_estimate_usd: 3
        execution_status: completed
        execution_notes:
          - "2026-05-28 discussion: reader UI (ParagraphAnnotationBar.tsx + AnnotationWorkbench.tsx) already supports all required tag types."
          - "Noise type characterised per book: M&D = additive (pipeline added editorial); KaR = condensed (content dropped + framing added)."
          - "Annotation DB is SQLite inside the reader. Import script writes directly to DB -- no API endpoint needed."
          - "Test book sizes: M&D 6 chapters 1409 lines; KaR 15 chapters 2776 lines."
          - "Source files confirmed available: both books have _system/source/text/raw-extract.md and refined-english.md."

      - id: I0b
        title: "Style rewrite pass -- AI rewrites surviving content in Asif's teaching voice"
        depends_on: [I0a]
        rationale: |
          After I0a annotation review and deletion, the cleaned chapter text is
          rewritten to match Asif's actual teaching register, extracted from his
          delivered KSessions lectures. Three signature style patterns extracted
          from the corpus:
          (1) Recap + bridge opening: every session opens with a one-paragraph
              recap of the previous session then a bridge sentence framing the
              day's question. Never starts cold.
          (2) Arabic term + immediate English gloss: the Arabic is never left
              hanging ('rwh -- our natural disposition').
          (3) Teaching by contrast or explicit enumerated pattern: structure is
              made visible, each element is given a why.
          Style corpus groups in KSessions: G3 Wise Reminder (44 sessions),
          G17 Ikhwan As-Safa Cat 51 arithmetic only (14 sessions), G18 Asaas
          Al-Taveel (32 sessions). Session 2346 ('Necessity Of Imam') is the
