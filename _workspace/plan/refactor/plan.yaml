            single_plus_distillation: {used_by: [scholarly-deep-dive deep >=12 ch], cap_t1: 25, cap_t2: 12, constraint: "t2 <= 0.5 * t1"}
            per_part_and_single: {used_by: [encyclopedic-epistolary medium], cap_per_part: 20, cap_t1: 30}
            full_brethren: {used_by: [encyclopedic-epistolary deep — Rasāʾil], cap_per_part: 20, cap_t1: 30, cap_t2: 12}
          new_quality_gates:
            - {id: distillation-shorter-than-capstone, severity: P0, rule: "t2_minutes <= 0.5 * t1_minutes"}
            - {id: distillation-fewer-revisions, severity: P0, rule: "kernel_count in [1,2,3]"}
            - {id: distillation-not-recap, severity: P0, rule: "uses _anti_cliche.TIER_2_DENY"}
            - {id: distillation-kernel-test, severity: P1, rule: "framing answers kernel test prompt"}
            - {id: per-part-bounded-to-part, severity: P0, rule: "per-part capstone must not synthesize across other parts"}
            - {id: capstone-no-cliche-self-help, severity: P0, rule: "uses _anti_cliche.SELF_HELP_DENY"}
        acceptance:
          - "tests/test_capstone_cross_tier_raises.py — raises on tier-2 reading chapter source"
          - "tests/test_capstone_doctrinal_gate.py — capstone with 'Imam Ali' is blocked"
          - "tests/test_capstone_quality_gates.py — all six gates fire on fixtures"
        cost_estimate_usd: 0
        authorization: *tier_one

      - id: C3
        title: "Build the 08b modern-research augmentation phase"
        depends_on: [A4, B4]
        deliverables:
          phase_handler:
            path: "scripts/podcast/phases/augmentation.py"
            max_lines: 300
          authoring_module:
            path: "scripts/podcast/_authoring/augmentation.py"
          citation_verify_module:
            path: "scripts/podcast/intelligence/_citation_verify.py"
            max_lines: 200
            api: ["verify_url(u)", "verify_doi(d)", "verify_citation(c)"]
            returns: "Verified | Rejected(reason) | Indeterminate(reason)"
            url_check:
              method: HEAD
              timeout_seconds: 3
              max_redirects: 3
              accept_status: [2xx, 3xx]
              reject_status: [4xx, 5xx, timeout]
            doi_check:
              endpoint: "https://api.crossref.org/works/{doi}"
              timeout_seconds: 5
              ua_header: "podcast-factory/1.0 (mailto:asifhussain60@gmail.com)"
              polite_pool: true
              retry_on_429:
                strategy: exponential_backoff
                max_retries: 3
              reject_status: [404]
            cache:
              path: "content/knowledge-base/citation_cache.sqlite"
              schema: "(citation TEXT PRIMARY KEY, status TEXT, reason TEXT, fetched_at TIMESTAMP)"
              ttl_days: 30
            indeterminate_policy: "emit citation with data-verification='indeterminate'; queue in manual_review_queue; do NOT fail phase"
            offline_flag: "--offline bypasses live checks; canonical-form prefilter only"
          enabled_for:
            default_on: [encyclopedic-epistolary]
            opt_in: [scholarly-deep-dive, lecture-series]
            never: [play-novel, aphorism-collection]
          output_file: "BOOK_DIR/_system/augmentations/<unit-slug>.md"
          content_requirements:
            - "5-15 augmentation points per unit"
            - "each tagged: confirms | extends | contests | contextualizes (never equates)"
            - "real locatable works (URL/DOI/ISBN)"
            - "every citation passes canonical-form pre-filter (C4) AND live verification (HEAD/Crossref) before emit"
            - "rejected citations dropped from output; indeterminate citations emit with data-verification attribute + manual_review_queue entry"
          shared_contract: "writes citations via _context_injection.format_provenance (same as Augmenter — DRY)"
          feeds_extractor: "08b output also scanned by 08c-knowledge-extract — only Verified citations enter cross-book library"
          quality_gates:
            - {id: augmentation-real-sources, severity: P1}
            - {id: augmentation-no-buzzword, severity: P0, note: "blocks 'quantum spirituality'-style hijacking"}
            - {id: augmentation-citation-verified, severity: P1, note: "all emitted citations must be Verified or Indeterminate; Rejected must be dropped"}
          cost_estimate_per_unit_usd: "0.50 - 1"
          network_cost_estimate: "near-zero (HEAD + Crossref are free; cache cuts re-runs)"
        acceptance:
          - "Phase handler emits 3 augmentation .md files on 3-unit test"
          - "Citations route through canonical-form pre-filter AND live verification"
          - "Synthetic test: known-dead URL is Rejected; known-fake DOI is Rejected; live URL is Verified; rate-limited DOI lookup retries 3x then marks Indeterminate"
          - "Cache hit on re-run skips network call"
          - "--offline flag bypasses live checks deterministically"
          - "08c picks up Quran/hadith from 08b output in integration test"
        cost_estimate_usd: 5
        authorization: *tier_two

      - id: C4.0
        title: "NotebookLM diagram-capability pilot (PRE-C4 gate; per oq7 resolution)"
        depends_on: [C1]
        gates: "C4 implementation"
        purpose: "Empirically verify which diagram types NotebookLM produces before locking the classifier-gate severity"
        deliverables:
          pilot_run:
            scope: "2-3 Rasāʾil epistles selected for diagram-density coverage"
            cost_estimate_usd: 30
            prompt_includes:
              - "explicit request for structural diagrams: emanation_hierarchy, taxonomic_tree, geometric_proof, musical_ratio, astronomical_model, matter_form_diagram, prophetic_cycle, magic_taxonomy, court_scene_illustration"
              - "evaluation rubric per diagram type: rendered? fidelity grade? prose-bullet fallback?"
          findings_doc:
            path: "_workspace/plan/research/notebooklm-diagram-pilot-findings.md"
            sections: [per-diagram-type-rendering, fidelity-grading, prose-bullet-fallback-frequency, classifier-gate-recommendation]
        decision_branches:
          if_ge_4_types_reliable:
            c4_gate_severity: P1
            c4_classifier: hard gate at < 60% coverage
          if_lt_4_types_reliable:
            c4_gate_severity: P2
            c4_classifier: advisory only
            c4_fallback_path: "externally-authored diagrams (Mermaid + Excalidraw fed as images via slide-deck upload UI)"
        acceptance:
          - "Pilot run complete; findings doc written"
          - "C4 gate severity locked based on findings"
        cost_estimate_usd: 30
        authorization: *tier_two

      - id: C4
        title: "MANUAL-REVIEW markers + canonical-form pre-filter + rich-diagram classifier"
        depends_on: [A2, C4.0]
        deliverables:
          marker_syntax: "<div class='alert manual-review' data-reason='{reason}' data-confidence='{low|medium}'>{content}</div>"
          reason_enum: [azure-gap-fill, low-confidence-translation, ismaili-claim-unverified, doctrinal-cross-check-needed, transcript-reconstruction, augmentation-citation-unverified]
          canonical_regex_module:
            path: "scripts/podcast/intelligence/_canonical_regex.py"
            patterns:
              quran: "\\bQ(uran)?\\.?\\s*\\d{1,3}[:.]\\d{1,3}\\b"
              hadith: "\\b(Bukhari|Muslim|Tirmidhi|Abu\\s*Dawud|Nasai|Ibn\\s*Majah)\\s*[:,]?\\s*(book\\s*\\d+\\s*,\\s*)?(hadith\\s*)?\\d+\\b"
              doi: "\\b10\\.\\d{4,}\\/\\S+\\b"
              isbn: "\\b97[89]-?\\d{1,5}-?\\d{1,7}-?\\d{1,7}-?\\d\\b"
            sample_audit_rate: 0.20
          publish_gate:
            location: "scripts/podcast/pipeline_lint.py"
            function: "check_manual_review_resolved()"
            fails_if: "any unresolved <div class='alert manual-review'...> in finalize-phase book"
          rich_diagram_classifier:
            path: "scripts/podcast/slides/classify_slides.py"
            max_lines: 200
            engine: "claude-vision (default), gemini-vision (fallback)"
            labels: ["diagram", "prose", "title", "quote"]
            invocation: "called by slide-deck-challenger after deck generation"
            gate: "rich-diagram-coverage >= 60% per high-density unit (P1)"
            fallback: "if classifier unavailable, gate demotes to P2 advisory"
          podcast_reader_component:
            path: "podcast-reader/src/components/ManualReviewAlert.astro"
        acceptance:
          - "pipeline_lint fails on test fixture with unresolved marker"
          - "podcast-reader renders marker with red border + tooltip"
          - "Canonical-form pre-filter clears >70% of synthetic citation set"
          - "Classifier labels test deck with >=80% accuracy on hand-labeled fixture"
        cost_estimate_usd: 5
        authorization: *tier_two

      - id: C5
        title: "Phased rollout + Tier-2 cost gates for large-scale books"
        depends_on: [C1]
        deliverables:
          trigger: "archetype.estimated_episodes > 20 OR meta.yml.phased_rollout == true"
          phase_boundary_gates: "Tier-2 always-ask between each phase"
          rasail_phasing:
            phase_A: "Part 1 Mathematical (14 epistles) — pilot most-structured"
            phase_B: "Part 2 Natural (17 epistles) — rich-diagram at scale"
            phase_C: "Part 3 Psychological (10 epistles)"
            phase_D: "Part 4 Theological (11 epistles)"
            phase_E: "4 per-part capstones + tier-1 Jāmiʿa + tier-2 distillation"
          cost_estimate_rasail_full_run_usd: "350 - 700"
          knowledge_extract_per_phase: true
          heartbeat_addition: "cost ceiling status surfaced per phase"
        acceptance:
          - "Phased-rollout flag triggers Tier-2 halt between phases"
          - "08c per-phase invocation tested on synthetic 30-chapter book"
        cost_estimate_usd: 0
        authorization: *tier_one

# ===========================================================================
# WAVE D — Extend the existing planning dashboard (plan-dashboard/ at port 4322)
# The dashboard already exists and is running. Wave D extends it — it does NOT
# create a new Astro project. All work goes into plan-dashboard/ (the live site
# at localhost:4322). It must always reflect the real state of the plan.
# ===========================================================================

  - id: D
    name: Dashboard extension
    execution_status: completed_2026_05_27
    design_decision: "Reframed 2026-05-26: extend plan-dashboard/ (already running at port 4322). Do NOT create _workspace/plan/spa/ or a second Astro project."
    depends_on: [A1]
    parallel_with: [B, C]
    steps:

      - id: D1
        title: "Standardise the existing dashboard design tokens so the podcast reader shares the same visual style"
        depends_on: [A1]
        design_decision: "Work targets plan-dashboard/src/styles/theme.css (already exists). Export canonical CSS custom properties from it and import them into podcast-reader/. No new files or directories are created."
        deliverables:
          existing_file_to_update: "plan-dashboard/src/styles/theme.css"
          properties_to_export:
            color: ["--c-bg", "--c-text", "--c-accent", "--c-warn", "--c-success", "--c-muted"]
            type: ["--type-serif", "--type-sans", "--type-mono", "modular scale sizes"]
            spacing: ["--space-xs", "--space-sm", "--space-md", "--space-lg", "--space-xl"]
            radius: ["--radius-sm", "--radius-md", "--radius-lg"]
            shadow: ["--shadow-1", "--shadow-2", "--shadow-3"]
          shared_with: [podcast-reader]
        acceptance:
          - "podcast-reader and plan-dashboard render with matching colours and type scale from the same token source"
        cost_estimate_usd: 0
        authorization: *tier_one

      - id: D2
        title: "Verify and patch the navigation so every planned section is reachable"
        depends_on: [D1]
        design_decision: "The nav shell already exists in plan-dashboard/. This step audits the current routes against the spec and fills any gaps — it does NOT rebuild the shell."
        deliverables:
          existing_app: "plan-dashboard/ (Astro, port 4322)"
          nav_spec:
            - "Overview (landing)"
            - "How it works (pipeline architecture)"
            - "What it runs on (infrastructure)"
            - "Annotation Ops (annotation-to-intelligence lane)"
            - "Live progress (dashboard)"
            - "Library (shipped books)"
            - "Backbone (new — added in D3)"
          default_route: "/dashboard"
        acceptance:
          - "All nav items render and route correctly"
          - "No broken links"
        cost_estimate_usd: 0
        authorization: *tier_one

      - id: D3
        title: "Add an interactive factory-floor view showing each processing stage and book type"
        depends_on: [D2]
        design_decision: "New route added to the existing plan-dashboard. Shows the 16 pipeline stages as clickable stations. Click a stage to see what it does; click a book type to see which stages behave differently for that type."
        deliverables:
          target_app: "plan-dashboard/"
          new_route: "/backbone"
          source_data: ["plan.yaml (pipeline stages)", "architecture.md (book types / archetypes)"]
          interactivity:
            - "click stage → see what it does and what rules it enforces"
            - "click book type → see which stages differ for that type"
            - "hover animations show a book moving through the pipeline"
          rendering: "client-side; data read from plan files at build time"
        acceptance:
          - "All 16 stages are clickable and show descriptions"
          - "All 7 book types are selectable from a sidebar"
        cost_estimate_usd: 0
        authorization: *tier_one

      - id: D4
        title: "Complete the live progress section so it shows books in flight, costs, and roadmap status"
        depends_on: [D2]
        design_decision: "The live progress route already exists in plan-dashboard/. This step fills the gaps: wire in the remaining metric tiles and confirm the per-wave progress bars update automatically on every push."
        deliverables:
          target_app: "plan-dashboard/"
          existing_route: "/dashboard (already live)"
          gaps_to_fill:
            - "books currently in flight + which stage they are on + cost so far"
            - "count of knowledge items extracted (Quran verses, hadiths)"
            - "commits to the main working branch in the last 7 days"
            - "items waiting for manual human review"
            - "per-wave progress bars (five waves, A through E) with per-step status icons"
          update_strategy: "static snapshot regenerated on every push (already working for roadmap tiles); extend same mechanism for remaining tiles"
        acceptance:
          - "All metric tiles render correctly on page load"
          - "Per-wave progress bars reflect the real state of the plan without manual refresh"
        cost_estimate_usd: 0
        authorization: *tier_one

      - id: D5
        title: "Replace floating annotation UI with a right-hand annotation workspace and durable AI handoff"
        depends_on: [D2]
        design_decision: |
          The floating left-side bar is retired. Annotation now lives in the right rail
          so one-handed use stays stable while reading. Paragraph hover sets the active
          target; markers, notes, and AI actions are managed in a single workspace.
          Notes autosave when cursor focus moves to another paragraph. Action outputs
          are queued in localStorage and can be copied as one accumulated execution set.
          A server export endpoint writes a chapter-scoped JSON handoff so Copilot,
          Claude Code, and future pipeline stages share the same machine-readable source.
        deliverables:
          db_additions:
            - "knowledge.db — table: paragraph_annotations(id, book_slug, chapter_id, para_idx, tag_id, note, created_at)"
            - "knowledge.db — table: annotation_tags(id, tag_label, tag_color, tag_icon, is_default, sort_order, created_at)"
            - "knowledge.db — new table: paragraph_notes(id, book_slug, chapter_id, para_idx, note, updated_at)"
          default_tags:
            - {label: "esoteric",            color: "#7c3aed"}
            - {label: "reality",             color: "#0369a1"}
            - {label: "sharia",              color: "#065f46"}
            - {label: "mark for deletion",   color: "#b91c1c"}
            - {label: "mark for improvement",color: "#92400e"}
          new_files:
            - "plan-dashboard/src/components/reader/AnnotationWorkbench.tsx — right-rail control surface for paragraph/book/global annotation scope"
            - "plan-dashboard/src/pages/api/annotations/export.ts — writes chapter-level annotation-intelligence JSON handoff"
            - "plan-dashboard/src/lib/reader/annotation-export.ts — durable export builder + accumulated instruction text"
          updated_files:
            - "plan-dashboard/src/pages/library/[slug]/chapter/[chapter].astro — mount AnnotationWorkbench in the right rail"
            - "plan-dashboard/src/pages/api/annotations.ts — add PATCH autosave for paragraph notes"
            - "plan-dashboard/src/lib/db/annotations.ts — paragraph_notes table + chapter snapshot helpers"
            - "plan-dashboard/src/layouts/Base.astro — add Annotation Ops architecture subnav"
          gemini_integration:
            api: "Gemini 2.0 Flash with Google Search grounding (tools: google_search)"
            trigger: "workspace action run → POST /api/ai/research"
            output: "single result copy + queue copy + JSON sync copy"
          queue_model:
            fast_lane: "localStorage queue for instant capture and batch clipboard copy"
            durable_lane: "content/drafts/<category>/<slug>/_system/annotation-intelligence/<chapter>.json"
            schema_fields:
              - "scope: paragraph | book | global"
              - "kind: marker | action"
              - "paraIdx + paragraphPreview"
              - "instruction + tags + createdAt"
          libraries_used:
            db: "better-sqlite3 ^12 — synchronous SQLite from Astro API routes (server-only)"
            icons: "lucide-react (already installed) — marker/action icons in right-rail workbench"
            gemini_sdk: "@google/generative-ai ^0.24 — grounding tool support"
          architecture_note: |
            Paragraph content is rendered from raw HTML (set:html), so annotation uses
            event delegation over .prose-body and data-para-idx stamping at mount.
            Hover only selects context; editing happens in the right rail. This keeps
            reading stable and avoids floating controls occluding text.
        acceptance:
          - "Hovering chapter text updates active paragraph context in the right rail within 200ms"
          - "Moving to a new paragraph autosaves note text for the previous paragraph"
          - "Marker changes persist in knowledge.db and render paragraph highlights after reload"
          - "Queue button beside copy copies accumulated instruction set for assistant execution"
          - "JSON sync endpoint writes a chapter handoff file containing queue + markers + notes"
        cost_estimate_usd: 0
        authorization: *tier_one

      - id: D6
        title: "Teach planner + site-sync to auto-detect annotation architecture gaps and generate missing views"
        depends_on: [D5]
        design_decision: |
          The planner and site-sync loop should not require manual reminders when a new
          architecture lane appears in plan.yaml. They must detect missing navigation and
          missing architecture/infrastructure coverage, then generate or patch views.
        deliverables:
          planner_updates:
            - "podcast planner guidance explicitly treats annotation-intelligence as a first-class architecture lane"
            - "snapshot regeneration remains automatic after any canonical-plan change"
          site_sync_updates:
            - "podcast-site-sync prompt allows targeted new view creation when plan has a lane with no view"
            - "sync report must include coverage check for annotation operations"
          ui_surface:
            - "new architecture subview route for annotation operations"
            - "architecture and infrastructure pages include annotation lane summary cards"
        acceptance:
          - "Site-sync run reports annotation lane coverage status"
          - "If plan adds a new architecture lane, sync can propose/create the missing view"
          - "Planner snapshots include D6 status in roadmap tiles"
        cost_estimate_usd: 0
        authorization: *tier_one

# ===========================================================================
# WAVE E — Retroactive Enhancements + Extended Publish Gate
# ===========================================================================

  - id: E
    name: Retroactive + Gates
    execution_status: completed_2026_05_27
    depends_on: [B, C]
    steps:

      - id: E1
        title: "Migrate every meta.yml to the unified schema"
        depends_on: [C1, C2]
        deliverables:
          migration_script:
            path: "scripts/podcast/migrate_meta_yml.py"
            constraint: "No version suffix in script name. No 'schema_version' field in any meta.yml."
            idempotent: true
          default_mapping:
            kitab-al-riyad:               {archetype: scholarly-deep-dive,  philosophical_depth: deep,    capstone_mode: single_plus_distillation}
            asaas-al-taveel:              {archetype: scholarly-deep-dive,  philosophical_depth: deep,    capstone_mode: single_plus_distillation}
            ayyuhal-walad:                {archetype: aphorism-collection,  philosophical_depth: shallow, capstone_mode: none}
            islr-mas-i:                   {archetype: scholarly-deep-dive,  philosophical_depth: medium,  capstone_mode: single}
            the-master-and-the-disciple:  {archetype: play-novel,           capstone_mode: none,          requires_preface: true}
            kunooz-al-hikmah:             {archetype: lecture-series,       capstone_mode: single}
            rasail-ikhwan-al-safa:        {archetype: encyclopedic-epistolary, capstone_mode: full_brethren, augmentation_enabled: true, diagram_density: high, phased_rollout: true}
          sync_to_db: "scripts/podcast/sync_metadata_to_db.py — populates book_metadata table"
        acceptance:
          - "migrate_meta_yml.py applied to every existing book; meta.yml lints clean"
          - "No 'schema_version' or 'v2' field anywhere in content/drafts/ or content/published/"
          - "knowledge.db.book_metadata has one row per book matching meta.yml"
        cost_estimate_usd: 0
        authorization: *tier_one

      - id: E2
        title: "KaR — tier-2 distillation addendum (no re-run)"
        depends_on: [E1, C2]
        branch: "book/kar-distillation-addendum"
        branch_off: develop
        procedure:
          - "(a) Stamp KaR meta.yml with unified schema"
          - "(b) Read existing tier-1 capstone source bundle from chapter-contracts/"
          - "(c) Generate tier-2 distillation source bundle following C2 spec"
          - "(d) Author framing.txt"
          - "(e) Upload to NotebookLM as NEW episode alongside existing source set"
          - "(f) Challenger + postprod-review on the new episode only"
          - "(g) Ship via publish_to_library.py"
          - "(h) Imam doctrine sweep on all 13 KaR chapter sources + framings"
          - "(i) Extraction-only pass (B1+B2 against finalized KaR chapters → atoms → knowledge.db)"
        explicit_negative_constraints:
          - "DO NOT regenerate chapter sources"
          - "DO NOT re-author existing episodes"
          - "DO NOT enable Augmenter for KaR"
        cost_estimate_usd: "15 - 25"
        authorization: *tier_two

      - id: E3
        title: "M&D — EP00 preface addendum + vacuum + postprod-review (no re-run)"
        depends_on: [E1, C1]
        branch: "book/the-master-and-the-disciple (current)"
        procedure:
          - "(a) Stamp M&D meta.yml with unified schema"
          - "(b) Author EP00 preface from C1 PLAY-NOVEL spec — single NEW episode"
          - "(c) Vacuum agent — rename NotebookLM-titled audio to ch##-<slug>.m4a (postprod-vacuum-tasks T4-T6)"
          - "(d) Postprod-review on all 6 chapters with PLAY-NOVEL archetype invariants"
          - "(e) Imam doctrine sweep on 6 chapter sources + framings"
          - "(f) Extraction-only pass — finalized chapters → atoms → knowledge.db"
        explicit_negative_constraints:
          - "DO NOT re-author any of the 6 shipped chapters"
          - "DO NOT enable Augmenter for M&D"
        delegation: "Operational task tracking in _workspace/plan/postprod-vacuum-tasks.md (T3-T8, T11). This step references that 12-task ledger; doesn't duplicate."
        cost_estimate_usd: "20 - 30"
        authorization: *tier_two

      - id: E4
        title: "Extend publish gate with G8-G12 + activate G12 acceptance"
        depends_on: [B3, C2, C4, E1]
        deliverables:
          script: "scripts/podcast/validate_ship_ready.py (extends G1-G7)"
          new_gates:
            G8:  {name: capstone-mode-honored, rule: "if capstone_mode != none, required tier-1 and (where applicable) tier-2 episodes exist and pass anti-cliché"}
            G9:  {name: rich-diagram-coverage, rule: "if diagram_density == high, classifier reports >= 60% diagrams per high-density unit"}
            G10: {name: manual-review-resolved, rule: "no unresolved <div class='alert manual-review'> markers"}
            G11: {name: knowledge-base-merge-clean, rule: "Librarian merge-report.md reports zero conflicts"}
            G12: {name: augmenter-ab-acceptance, rule: "For books with enable_knowledge_augmenter: true, podcast-challenger surfaced at least one finding referencing an augmented atom"}
          g12_enforcement: "Until G12 fires green on at least one book pair, R_KNOWLEDGE_AUGMENTER_DEFAULT_ENABLED stays false (DR-007)"
          recommended_g12_pair: "Kunooz (augmenter disabled) + first-forward-book-after-Kunooz (augmenter enabled)"
        acceptance:
          - "validate_ship_ready.py reports G1-G12 status for every book"
          - "M&D + KaR pass G1-G11 after E2 + E3 (G12 not applicable — augmenter disabled)"
        cost_estimate_usd: 0
        authorization: *tier_one

      - id: E5
        title: "Automate planner UI resilience + launcher lifecycle quality gates"
        depends_on: [D4, D6, E4]
        deliverables:
          ui_resilience_suite:
            path: "plan-dashboard/tests/ui-resilience/"
            checks:
              - "route visual sanity for /plan, /live, /architecture, /db-schema at desktop + tablet breakpoints"
              - "sidebar integrity: no overlap, no clipped cards, no horizontal overflow"
              - "detail panel integrity: no card collision when anchor-based cards are rendered"
          launcher_lifecycle_suite:
            target: "Desktop launch script lifecycle"
            checks:
              - "reuses healthy server without spawning duplicates"
              - "self-heals stale occupant on 4322"
              - "does not auto-close Terminal via AppleScript"
          quality_hardening:
            - "dead-code sweep for plan-dashboard shared config modules"
            - "remove stale exported interfaces/types not referenced by runtime"
          ci_gate:
            trigger: "changes touching plan-dashboard/** or desktop launcher workflows"
            behavior: "fail fast on resilience-suite regressions"
        acceptance:
