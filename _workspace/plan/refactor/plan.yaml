            - {from: "podcast-intelligence-enhancements.md", folded_into: "conventions/authoring.md (items 3-6 only)", then: DELETE, note: "items 3-6 = host gender lock, Essential Teachings, Imam doctrine substitution, reflective-reverent emotion register"}
            - {from: "v4-doctrine-propagation.md", folded_into: "git history (LANDED 2026-05-22 commit 23009eb per pipeline-debt.md)", then: DELETE}
            - {from: "f25-apparatus-table-schema.md", folded_into: "debt/pipeline-debt.md F25 entry", then: DELETE}
            - {from: "f27-validator-drafts.md", folded_into: "debt/pipeline-debt.md F27 entry (7/8 landed; #8 covered by F25)", then: DELETE}
            - {from: "podcast-plan-DoR.md", folded_into: "operations/per-book-ship-checklist.md (superseded)", then: DELETE}
            - {from: "podcast-plan-DoR-appendix.md", folded_into: "operations/per-book-ship-checklist.md (superseded)", then: DELETE}
            - {from: "acceptance-criteria.md (84K)", folded_into: "debt/pipeline-debt.md (scan for live P-items first)", then: DELETE, note: "NEEDS SCAN — most P-items appear superseded per pipeline-debt cross-references"}
            - {from: "podcast-plan.yaml (263K)", folded_into: "debt/pipeline-debt.md (scan for live items first)", then: DELETE, note: "NEEDS SCAN"}
