	اگر نماز پوری نہیں کی تو آئندہ کرات میں شدید حالتوں اور طریقوں سے نماز کی تعداد پوری کرنی پڑیگی۔ اس سے کسی بھی حالت میں رستہ گاری نہیں ہے۔ مستفید کی لا پرواہی مفیدین کے لئے مصیبت بن جاتی ہے اسلئے وہ مستقل نماز کی تاکید کرتے رہتے ہیں۔<br />
