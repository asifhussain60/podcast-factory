key_tensions:
  - >
    *Al-Islah*'s clean four-jewels-four-structures-four-classes scheme
    is architecturally too small. The world has many more sections
    than four: from the *center* (the deepest mineral core) to the
    *encompassing ocean* (the outermost limit), it includes the
    *throne* (al-'Arsh — also a name for the First Intellect in
    *Chapter Two*), the planets, fire, air, water, earth, and the
    born. The *born* — the generated beings of the world — divide
    into three genera with no fourth: mineral, vegetable, animal.
    The human is *of the animal genus yet distinguished by a kind of
    consciousness* — a fourth-by-distinction, not a fourth-by-genus.
    The hosts must let this architectural correction land cleanly:
    *Al-Islah*'s symmetry is broken because the world is not a four-
    fold thing; the human's distinction is not a separate genus but
    a *speaking soul* that comes to rest in the animal-bodied being
    that has been prepared by the chain to receive it. The same
    chain *Rahat al-'Aql* (raa-hat al-aql) gives at the natural-
    world end of the architecture is what *Chapter Seven*'s first
    sub-chapter applies to the question of the world's actual
    divisions.
  - >
    *Al-Islah*'s claim that *humankind has no peer* is refused from
    two angles that al-Kirmani turns into the chapter's deepest move
    on what kind of being the human is. First angle: if the human is
    a *type* within the animal genus (as *al-Islah* himself says),
    then by *al-Islah*'s own classification the human pairs with the
    other types of the genus. Second angle: the microcosm doctrine
    itself generates the refutation — to be the *small world* is to
    be *like* every part of the world, and to be like something is
    to pair with it; the microcosm is *not* what has no peer but
    what has *all peers, by occasion*. And the pair *shifts by what
    the human chooses to resemble*: angels for the virtuous; lions
    for the brave; wolves and foxes for the cruel and cunning; crows
    for the treacherous; tigers for the deceitful; monkeys for the
    licentious. *Whatever a person is content to resemble — whether
    by his actions, his morals, his customs, or in any part of them
    — that becomes his pair.* The human is the *plastic part* of the
    world — the part whose resemblance to other parts is *chosen*
    rather than given. That is what the speaking soul does. The
    hosts must let this *pairing-by-choice* land as the chapter's
    moral architecture, not as a clever taxonomic remark.
  - >
    The chapter's strict-sense doctrine of *the pair of humankind*
    is the chapter's deepest verdict and the one *Chapter Five* had
    been preparing. *The pair of humankind can only be the angels —
    and what we mean by "humankind" here are those of all virtues:
    the prophets, the guardians, and the imams (prayers of God be
    upon them) and those who follow in their footsteps, uphold their
    obedience, and worship Allah with both worships.* The strict-
    sense *humankind* is the rank that has *written into itself the
    angelic resemblance* — pure obedience, pure worship-of-both-
    kinds, pure adherence to command-and-prohibition. Those who look
    human but have taken on the moral state of beasts are *not* the
    *humankind* whose pair is the angels; their pair is what their
    soul has chosen by resemblance. The hosts must let this
    distinction land as the *walaya*-doctrine the chapter is
    settling: the chain of *walaya* runs from the Prophet ﷺ through
    the imams of his pure family to those who follow them; he who
    takes them as guardians is counted *one of them*; all are
    *humankind* in the strict sense; all have the angels as their
    pair.
  - >
    *Al-Nusra*'s appeal to Bandhaqlis (Empedocles) on the bestial
    soul and speaking soul carries the chapter's methodological
    centerpiece. *Al-Nusra* takes Bandhaqlis *literally*: bestial
    soul = horse, speaking soul = human. Al-Kirmani's correction is
    twofold. First: the *da'wa* tradition does not draw its doctrine
    of the souls from Bandhaqlis-quotations carried over through
    Greek and Syriac transmissions; the *da'wa* draws from the Book
    of Allah and the sayings of the pure Imams. Second: read on the
    *ta'wil*, Bandhaqlis was *not* speaking horse-and-human; he was
    speaking of *those who receive teaching* and *those who teach* —
    of the *hudud of the da'wa* (the prophets, guardians, imams, and
    their followers) as *the speaking soul* and *the mothers of
    humankind*, and of the receivers-in-the-form-of-humankind as the
    *bestial soul* who accept education and are raised by degrees
    according to acceptance. The Qur'anic anchor *Surat al-Fajr*
    (Q 89:27–30) — *O reassured soul, return to your Lord, pleased
    and pleasing; enter among My servants; enter My Paradise* —
    names exactly the soul Bandhaqlis's doctrine indicates when read
    on the correct face. The hosts must hold both moves at once: the
    methodological correction (Book and Imams over Greek-via-Syriac)
    and the substantive *ta'wil* (teachers-and-receivers, not horse-
    and-human).
  - >
    The architectural map of the microcosm is the chapter's
    technical centerpiece in sub-chapters five and six. *Al-Islah*'s
    map (body-to-bodies, growth-to-plants, sense-to-animals, speaking-
    soul-as-unique-fourth) preserves the natural joints; *al-Nusra*'s
    re-mapping (growth-to-dissolved-bodies, sense-to-developing-
    bodies, speaker-against-the-animal) crosses them. Al-Kirmani sides
    with *al-Islah*. But the chapter's deepest correction is at a
    different level: the human is the counterpart not only of *this*
    world but of *all the worlds*. The natural-world end of the
    parallels (gentle-and-dense, planets-and-spheres-and-five-senses,
    four-elements-and-four-natures, rivers-and-mountains-and-bones-
    and-blood, plant-growth-and-hair-and-nails, sensitive-animals-
    and-sensitive-faculties) is matched at the creative-emanative end
    by parallels of intellect-and-Intellect, praise-and-praising,
    *tawhid* and divinity, virtues and excellences, *existence over
    others and in oneself*. *That world has impressed him, and his
    body has been marked by this world; and given that this is so,
    there is no distinction between him and what has gone before
    except by rank alone.* The chapter sends the reader twice to
    al-Kirmani's *Rahat al-'Aql* (called by its sub-title *the Peace
    of Mind* in this chapter) for the full architecture.
  - >
    Sub-chapter seven seals the chapter on the deepest architectural
    question. If the human is the counterpart of *both* worlds, where
    does the human *belong*? *Al-Islah* lands the doctrine — and
    al-Kirmani lets it stand: *he is in a state of existence between
    the two worlds, like the state of the boy in his existence
    between his two parents*. Not *of* this world alone; not *of*
    that world alone. *From both, and from them he came to be*. From
    *this world* runs the *course of matter* (the *al-hayula*, the
    *acted-upon* of *Chapter Six*); from *that world* runs the
    *course of the image* (the *form*, the *acting-upon*). And the
    image has a third figure: *the parents in the highest and most
    honorable picture* (the universal Intellect and the universal
    Soul, the higher-world parents) and *the midwife who delivered*
    (the *hudud of the da'wa* — the prophets, imams, *hujjas*, and
    *du'at* by whose hand the gift of the higher world is conveyed
    into the receiver who has reached the rank that can receive
    it). The midwife is what sub-chapter four named — *the mothers
    of humankind* — taken now in its architectural sense. The hosts
    must let this *between*-doctrine land as the chapter's signature:
    the human is not the *fruit-of-this-world-only* and not the
    *fruit-of-that-world-only*; the human is *the child of both
    worlds, delivered into existence by the hudud*.
tone_constraints:
  - Walk the seven sub-chapters in order. Sub-chapter one frames the four-jewels-four-classes scheme and the horse-as-human's-pair claim, and lands al-Kirmani's correction (world has many more sections than four; generated beings are three genera plus human-by-distinction). Sub-chapter two refuses the no-peer claim from two angles and lands the pairing-by-occasion doctrine (angels, lions, wolves, foxes, crows, tigers, monkeys). Sub-chapter three settles the strict pair of *strict-sense humankind* as the angels and names the *walaya* chain that constitutes the strict-sense humankind. Sub-chapter four turns to Bandhaqlis (Empedocles) and gives the *ta'wil*-reading (teachers and receivers, not horse-and-human), with the Qur'anic anchor *Surat al-Fajr* (Q 89:27–30). Sub-chapter five settles the architectural map of the microcosm in its disputed form and prefers *al-Islah*'s to *al-Nusra*'s; sub-chapter six fills the map at full breadth and adds the creative-emanative world parallels; sub-chapter seven lands the *between*-state doctrine. Do not collapse the seven sub-chapters into one thesis. The accumulation is the chapter's argumentative force.
  - When al-Kirmani sides with *al-Islah* on something, name it (sub-chapter five on the microcosm map). When he sides with *al-Nusra* on something, name that too (sub-chapter one on the broader meaning of pairing-as-acceptance — though only as a category, not as a license for the horse-and-human gloss). The chapter is a sustained pattern of partial sidings, like *Chapters Four* and *Five* and unlike *Chapter Six*'s more polemical posture. Let the half-credit moves be half-credit, and let the categorical refusals (the four-classes scheme, the no-peer claim, the literal Bandhaqlis-reading, *al-Nusra*'s re-mapping of the microcosm) land with their full architectural weight.
  - Lost-work quotations (the authors of *al-Islah*, *al-Nusra*, and *al-Mahsul*) are paraphrased in modern English. The Quranic verses Q 89:27–30 (*O reassured soul, return to your Lord, pleased and pleasing; enter among My servants; enter My Paradise*) and the *al-Ma'ida* verse Q 5:55–56 in spirit on *walaya* (*he who takes them as guardians is one of them*) stay verbatim with attribution. Al-Kirmani's own settled formulas — *the divisions of the world are more numerous than what we have mentioned*; *World is a name that refers to many things, from the center to the encompassing ocean*; *the generated beings of the world are three genera with no fourth*; *the human, mentioned as the fourth, is of the genus of animal yet distinguished by a kind of consciousness*; *humankind has many forms and many pairs from many sides*; *the pair of humankind can only be the angels*; *those in the form of humankind who would accept education* (Bandhaqlis's bestial soul); *the teachers... being in truth the mothers of humankind*; *the human being is not only a counterpart of this world; he is a counterpart for all the worlds*; *there is no distinction between him and what has gone before except by rank alone*; *he is in a state of existence between the two worlds, like the state of the boy in his existence between his two parents* — stay verbatim from the chapter file. Imam Ali ibn Abi Talib (peace be upon him)'s aphorism from *Diwan al-Imam Ali* (peace be upon him) — *You suppose yourself a small body, yet in you is folded the greater world* — stays verbatim with attribution. Imam al-Mu'izz li-Din Allah Ma'add ibn Isma'il (peace be upon him)'s formulation from *Ta'wil al-Shari'a* — *man is the purpose of the second world and the end of the action of nature* — stays verbatim with attribution.
  - The Prophet ﷺ honorific is spelled out on first per-chapter mention (*peace and blessings of Allah be upon him*) and contracted to ﷺ thereafter, per R-HONORIFIC-ONCE. Imam Ali ibn Abi Talib, Imam al-Mu'izz li-Din Allah, and the speaker-prophets and imams take (peace be upon him).
  - When the chapter references al-Kirmani's own treatises (*Rahat al-'Aql* = *The Repose of the Intellect* = *The Peace of Mind*, the sub-title the chapter itself uses), treat the references as real pointers — say what each treatise contains and why *al-Riyad*'s *Chapter Seven* sends the reader there at the precise moments it does (*Rahat al-'Aql* for the composite architecture of the human being and the architecture of the *hudud*).
  - The Arabic terms *al-hayula* (al-ha-yoo-laa), *al-Islah* (al-is-laah), *al-Nusra* (an-nus-rah), *al-Mahsul* (al-mah-sool), *al-nafs* (an-nafs), *al-ruh* (ar-rooh), *Bandhaqlis* (ban-thaq-lees), *hudud* (hu-dood), *walaya* (wi-laa-yah), *ta'wil* (ta-weel), *Ma'ad* (ma-aad), *tawhid* (taw-heed), *da'wa* (daa-wah), *al-ibda'* (ib-daa), *Rahat al-'Aql* (raa-hat al-aql), *al-nafs al-natiqa* (an-nafs an-naa-ti-qah), *al-nafs al-mutma'inna* (an-nafs al-mut-ma-in-nah), and *Ta'wil al-Shari'a* (ta-weel ash-sha-ree-ah) each carry their phonetic guide at first chapter appearance, per R-PRONUNCIATION-IMPERATIVE.
  - End on the chapter's closing image and the bridge to *Chapter Eight*. The architecture standing: three genera plus human-by-distinction; many pairs for the human by occasion, with the strict pair of the strict-sense humankind being the angels; the *hudud* as the midwives of the speaking soul into the receiver-in-the-form-of-humankind; the microcosm-architecture running joint-by-joint at both ends; the human in a *between*-state, matter from below and image from above, parents in the highest picture and midwife in the conveying rank. *You suppose yourself a small body, yet in you is folded the greater world* — Imam Ali (peace be upon him), settling at the rank of the *manifest book* the very doctrine *Chapter Seven* settles all the way down. *Chapter Eight* will take the architecture and apply it to the question of *al-qada* (qa-daa — judgment) and *al-qadar* (qa-dar — destiny) — how the chain runs in time. Do not flatten the closing into a "what we learned" summary.
anchor_passages:
  - "Al-Kirmani's correction of the four-classes scheme (sub-chapter one): *The investigators of these matters did not rely on sound research. The author of al-Islah divided the world into four jewels, four structures, and four classes including humankind — and that is impossible, because the divisions of the world are more numerous than what we have mentioned. 'World' is a name that refers to many things, from the center to the encompassing ocean — the throne, the planets, fire, air, water, earth, and the born.*"
  - "Al-Kirmani's settled doctrine of the three genera (sub-chapter one): *The generated beings of the world are three genera with no fourth, each of them having many species under it... the human, mentioned as the fourth, is of the genus of animal yet distinguished by a kind of consciousness.*"
  - "Al-Kirmani's pairing-by-occasion doctrine (sub-chapter two): *Humankind, since it is similar in its structure, morals, actions, conditions, motions, and natures to all that the universe of existence presents... must be a pair to all things, in accordance with the occasion and the case at hand... And on this pattern, whatever a person is content to resemble — whether by his actions, his morals, his customs, or in any part of them — that becomes his pair. Humankind has many forms and many pairs from many sides.*"
  - "Al-Kirmani's strict-sense *pair of humankind* doctrine (sub-chapter three): *In truth, the pair of humankind can only be the angels — and what we mean by 'humankind' here are those of all virtues: the prophets, the guardians, and the imams (prayers of God be upon them) and those who follow in their footsteps, uphold their obedience, and worship Allah with both worships.*"
  - "Al-Kirmani's *ta'wil* of Bandhaqlis (sub-chapter four): *By 'the sensual soul' he means those in the form of humankind who would accept education, discipline, and reason — not the horse — and by 'the speaking soul' he means the teachers, who are the prophets, the guardians, the imams (peace be upon them), and their followers, who would be kind to those in the form of humankind, teach them their interests in religion and worldly affairs, benefit them in ways they do not perceive with their senses, and raise them in degrees according to their acceptance — being in truth the mothers of humankind.*"
  - "Al-Kirmani's microcosm-of-all-worlds doctrine (sub-chapter five): *The human being is not only a counterpart of this world; he is a counterpart for all the worlds, since he is the collector of all the things that preceded him in existence, similar to what is in him for both of them. The matter rests on this, not on what he said.*"
  - "Al-Kirmani's closing formula on the two impressions (sub-chapter six): *That world has impressed him, and his body has been marked by this world; and given that this is so, there is no distinction between him and what has gone before except by rank alone.*"
  - "Al-Islah's *between*-state doctrine, accepted by al-Kirmani (sub-chapter seven): *He is in a state of existence between the two worlds, like the state of the boy in his existence between his two parents: it is not permissible to attribute him to one of them alone, because he is from both of them, and from them he came to be... So it is permissible to attribute to this world what runs in him from the course of matter, which is the acceptable, and to attribute to that world what runs in him from the course of the image, which is the acceptable, just as in the case of the child who has, on the one hand, his parents in the highest and most honorable picture, and, on the other hand, the one who delivered that piece — namely the midwife.*"
  - "Quran 89:27–30 (the closing verses of *Surat al-Fajr*): *O reassured soul, return to your Lord, pleased and pleasing; enter among My servants; enter My Paradise.* — surfaced for sub-chapter four's *ta'wil* of Bandhaqlis and the doctrine of the *reassured soul* raised through the degrees of acceptance by the *hudud*."
  - "Imam Ali ibn Abi Talib (peace be upon him), *Diwan al-Imam Ali*: *Your remedy is within you, but you do not perceive it. Your illness is from yourself, but you do not see it. You suppose yourself a small body, yet in you is folded the greater world. You are the manifest book, by whose letters what is hidden becomes apparent.* — surfaced for sub-chapter two's pairing-by-occasion doctrine and the chapter's bridge image at its close, naming the human as the *manifest book* whose content is chosen."
  - "Imam al-Mu'izz li-Din Allah Ma'add ibn Isma'il (peace be upon him), *Ta'wil al-Shari'a*: *Man is the purpose of the second world and the end of the action of nature; the world of creation produces him as its fruit, and the world of emanation perfects him as its receiver; he is one being whose body is the chain made dense and whose soul is the chain made gentle.* — surfaced for sub-chapter six's both-worlds-microcosm doctrine at the seal of the creative-emanative parallels."
