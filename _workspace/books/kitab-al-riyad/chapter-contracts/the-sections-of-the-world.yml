title: The Sections of the World
audience: >
  Thoughtful adult readers who have followed *Chapters One through Six*
  of *al-Riyad* through the long arguments over the universal Soul, the
  First Intellect, the rank of the speaking souls (the *second
  emanation*), the rank of the human being (the *fruit of all the
  worlds*), and the architecture of motion, stillness, *al-hayula*
  (al-ha-yoo-laa — prime matter), and form, and who now arrive at
  *Chapter Seven*: seven sub-chapters in which al-Kirmani turns from
  the architecture of the natural composite to the question of *the
  sections of the world itself* — what the world's actual divisions
  are, where the human being sits among those sections, what kind of
  *pair* the human has (or has many of, or has none of), and on what
  footing the doctrine of the microcosm can honestly stand. The
  author of *al-Islah* (al-is-laah) had offered a four-jewels-four-
  structures-four-classes scheme with the horse paired to humankind
  by essence-sharing and humankind itself as the counterpart of the
  whole world with no peer among its parts. The author of *al-Nusra*
  (an-nus-rah) had refused the four-classes division and offered in
  its place a pairing-by-acceptance scheme: the dense lower world as
  pair of the subtle upper world, the horse as humankind's pair
  because the horse accepts teaching from humankind more than other
  animals do. *Al-Nusra* also adduced a doctrine attributed to
  Bandhaqlis (ban-thaq-lees — Empedocles), the pre-Socratic Greek
  philosopher (c. 490–430 BC) of Acragas in Sicily, on the *bestial
  soul* and the *speaking soul* — read literally by *al-Nusra* as
  horse-and-human. Al-Kirmani works the seven sub-chapters as the
  same triangulating adjudication he gave *Chapters Four*, *Five*,
  and *Six*, but now on the question of the world's own architectural
  divisions and the human being's place within them.
