key_tensions:
  - >
    The chapter opens (sub-chapter twenty) with the doctrine that the
    *work* of the speakers is *not only* for *signifying tawhid* — the
    world's structure already does part of that. The *deeper* purpose
    is *the correction of the soul*, *emulating the highest assembly*
    (al-malaʾ al-aʿla), and *acquiring through discipline the honorable
    morals and noble habits by which they prepare for union with what
    is above them*. The *positive worship* of the *qurban* (qur-baan),
    *sajda* (saj-dah), *ruku'* (ru-koo), *zakat* (za-kaat) is not
    *exterior decoration* of the inner *tawhid*; it is *constitutive*
    of the soul's *raising-by-degrees*. The hosts must hold this
    *Shariʿah-as-pedagogy* doctrine against any temptation to reduce
    *the positive worship* to *symbolic gesture*.
  - >
    The angels' verse — *Will You place in it one who corrupts it
    and sheds blood, while we glorify You with praise and sanctify
    You? He said, I know what you do not know* (Quran 2:30) — is
    read on a *cosmological* architecture of *force* and *act* across
    the cycles. *The universes, by His decree and His wisdom, are
    between force and act — hesitating: sometimes standing in
    potentiality, and sometimes already existing in actuality.* When
    *heat* in a body reaches its end, *cold appears*; when *cold*
    reaches its end, *heat appears*; *ignorance is general in the
    presence of its people, and ignorance is lost through the lack
    of its people*. The verse names the *turning point* of the
    cycle — *I know* = *the end of ignorance and the beginning of
    knowledge*; *what you do not know* = *the necessity of teachers
    and guides at the turning*. The arc runs from *Adam's first
    sending* to *the Qa'im at the seventh*. The hosts must walk
    this *cyclic-architecture* reading without flattening it into a
    generic "ignorance-to-knowledge" arc.
  - >
    Sub-chapter twenty-three's *three sections of Adam's call* —
    *encouragement* (*targhib* — tar-gheeb), *intimidation* (*tarhib*
    — tar-heeb), or *both* — yields a deep result. *Encouragement*
    requires *parables of pleasure* (orchards, rivers, trees);
    *intimidation* requires *parables of pain* (fire, chains,
    scorching wind); both require *interpretation*. On *any* of the
    three forms, *Adam's speech must have an apparent meaning
    followed by an interpretation*. The very *form* of *prophetic
    speech* — by *necessity* — carries *both* a *zahir* (thaa-hir —
    the apparent) and a *batin* (baa-tin — the hidden). And the
    *zahir* of *prophetic speech*, *by definition*, *is the law
    and the clear custom* — the *Shariʿah*. The hosts must let
    this *form-of-prophetic-speech-itself-entails-Shariʿah*
    argument land as one of the chapter's tightest *positive*
    proofs.
  - >
    The chapter's longest sub-dispute (sub-chapters twenty-seven
    and twenty-eight) is the *seven lines and six aradas* (ar-das —
    *the transverse marks* in the *daʿwa*'s geometric mnemonic).
    *Al-Islah* reads the seven lines as the *seven speakers* and
    the six aradas as the *six laws*. *Al-Nusra* reads the seven
    lines as the *higher letters* (the *seven principal letters
    of the Arabic alphabet*, each written by one speaker) and the
    aradas as the *cycles of the Imams between speakers*. On
    *al-Nusra*'s reading, the *symmetry* of *Qa'im-no-Imams-after-
    no-Shariʿah* and *Adam-no-Imams-before-no-Shariʿah* lands as
    elegantly as a *closed geometry*. Al-Kirmani corrects *al-Islah*
    (the Shariʿah of Adam is *not dependent* on Noah's appearance
    for its *fulfillment*; *the Shariʿah is a stature that does
    not require any increase upon it nor any decrease from it*)
    and refuses *al-Nusra*'s reading (it is better to graph lines
    on *pronouncers* and aradas on *the duration of their
    command*; the *Imams after Adam* — Seth and his descendants —
    entail Adam's Shariʿah). The hosts must walk the geometric
    architecture without making it a glassy diagram — the *aradas*
    are *the duration of command*, and *cycles* admit both *major*
    (speakers) and *minor* (imams) readings.
  - >
    The chapter's deepest *taʾwil* (sub-chapter thirty-three) is the
    *son of Noah* — *I will take refuge in a mountain that will
    protect me from the water; there is no preserver today from the
    command of Allah* (Quran 11:42–43). On the *daʿwa*'s reading,
    *the son was not from Noah's loins* — he was *a man of great
    worldly station* who learned from Noah and was *imagined* to be
    his *guardian*. When the *true wali* was appointed (in the
    building of the *ark*), the son *separated himself* (Q 11:42
    uses *iʿtazala* — to set oneself apart), refused obedience, and
    took refuge in the *mountain of his partisans*. The *water* is
    the *cleansing force*; the *mountain* is *what supports him of
    men and partisans*. *The flood spread outwardly and inwardly* —
    the *apparent flood* of *Surat Hud* (soo-rat hood) carries the
    *batini layer* of the *cleansing of the daʿwa from the opposite-
    and-his-partisans*. The *type recurs* in the cycle of Muhammad
    ﷺ — and at every cycle until the seventh. The hosts must let
    this *recurring-opposite-figure* doctrine land as the chapter's
    political seal — not as merely allegorical reading of a flood
    story.
  - >
    Two readings of the *ark of Noah* (sub-chapter thirty-one) are
    *both sound* — *al-Islah*'s (the ark as the *new apparent
    Shariʿah*, where *whoever entered under its rulings was delivered
    from humiliation as one inside a ship is delivered*) and
    *al-Nusra*'s (the ark as the *daʿwa-with-the-wali*, where
    *whoever enters the quiet daʿwa is kept safe from drowning in
    error*). Al-Kirmani: *one is the matter of this world and the
    other is the matter of religion, and neither of them dispenses
    with the other, for each of them lifts up the head of the
    other*. The hosts must hold the *two-layer* doctrine of the
    chapter — the *apparent Shariʿah* and the *batini daʿwa* lift
    each other up; the *ark* is *both*; refusing either reading
    halves the religion.
tone_constraints:
  - >
    Walk the fourteen sub-chapters in consolidated order. Sub-chapter
    twenty opens with *the work is for soul-correction*, the angels'
    verse, and the cycles of knowledge and ignorance (the deep
    architecture of *force and act*). Sub-chapters twenty-one and
    twenty-two refine *al-Nusra*'s claim about the *great cycle*
    and the *role of the Qa'im* — distinguishing the *interregnum
    role* (knowledge widespread) from the *post-Qa'im role* (door
    of education closed). Sub-chapter twenty-three works the
    *three sections of Adam's call* and lands *apparent-meaning-
    plus-interpretation-on-any-form*. Sub-chapter twenty-four
    lands the *positive settlement* — *knowledge and action
    together* as the *one Shariʿah*. Sub-chapter twenty-five
    refuses *al-Nusra*'s framing of *the Qa'im as abrogator* and
    settles *Qa'im-as-completer*; the *apocalypse-verses* of the
    Qur'an concern *the passing of the ranks of the limits*, not
    the *abrogation of works*. Sub-chapter twenty-six closes the
    *monotheism-and-signs* dispute by distinguishing *the high
    limits* (perfection from innovation) from *the bodily
    intellects* (perfection from acquisition through teaching).
    Sub-chapters twenty-seven and twenty-eight work the *seven
    lines and six aradas* dispute. Sub-chapter twenty-nine reads
    *As We began the first creation, We shall repeat it* (Quran
    21:104) on the *cyclic return* of *knowledge to potentiality*.
    Sub-chapter thirty refutes the *Adam-letters* argument by
    internal inconsistency. Sub-chapters thirty-one through
    thirty-three work the *ark of Noah*, the doctrine that *every
    speaker has a wali*, and the deep *taʾwil* of the *son of
    Noah* as the *opposite* who is washed away in the cleansing
    flood. Do not collapse the fourteen sub-chapters into one
    thesis. The accumulation is the chapter's architectural force.
  - >
    When al-Kirmani sides with *al-Islah*, name it (sub-chapter
    thirty-one: the ark as the *new apparent Shariʿah* — *this
    meaning is admissible*; sub-chapter thirty-two: *Adam had Seth
    as his guardian*). When he sides with *al-Nusra*, name that
    too (sub-chapter thirty-one: the ark as the *daʿwa-with-the-
    wali* — *this meaning is also sound*; sub-chapter twenty-eight:
    aradas as the *duration of command*, not as the *higher
    letters*). When he settles *between* them with a *both-true*
    verdict (sub-chapter thirty-one: *one is the matter of this
    world and the other is the matter of religion, and neither
    dispenses with the other*), name *that* too. When he
    *categorically* refuses (sub-chapter twenty-five on *Qa'im-as-
    abrogator*; sub-chapter thirty's *Adam-letters* argument by
    internal inconsistency), name those as well. The chapter is
    architectural — like *Chapter Eight* — with categorical
    refusals at *Qa'im-as-abrogator* and *Adam-letters*, and
    *both-true* verdicts on the ark.
  - >
    The Quranic verses Q 2:30 (*I am going to place a caliph on the
    earth... I know what you do not know*), Q 2:31–33 (*And Adam
    knew all the names*), Q 73:17 (*On the day when the children
    will grow old*), Q 50:15 (*Are We then wearied with the first
    creation?*), Q 82:1–2 and Q 81:1–4 (*When the heaven is cleft
    asunder... when the sun is darkened, when the stars fall*), Q
    21:104 (*As We began the first creation, We shall repeat it*),
    Q 11:38 (*And he was making the ark... whenever any of the
    chiefs of his people passed him, they ridiculed him*), Q 71:25
    (*They were drowned in their sins, so they were made to enter
    the Fire*), Q 11:42–43 (*And Noah called his son, who had
    separated himself... I will take refuge in a mountain that
    will protect me from the water; there is no preserver today
    from the command of Allah*), and Q 71:23 (the idols *Wadd,
    Suwa', Yaghuth, Ya'uq, Nasr*) stay verbatim with attribution.
    Al-Kirmani's own settled formulas — *I know what you do not
    know names the end of ignorance and the beginning of
    knowledge*; *the universes, by His decree and His wisdom, are
    between force and act*; *the three sections affirm an apparent
    meaning that is fixed for Adam, followed by an interpretation —
    so Adam is the owner of a law and a clear custom*; *the
    Shariʿah is a stature that does not require any increase upon
    it nor any decrease from it*; *the high limits attain their
    perfection from the rank of innovation*; *both interpretations
    are sound in that regard. One is the matter of this world and
    the other is the matter of religion, and neither of them
    dispenses with the other, for each of them lifts up the head
    of the other*; *each speaker requires a guardian who derives
    benefit from him*; *the son attributed to Noah was not from
    his loins, but rather was a man of great worldly station whom
    he presented — like the opposite in the cycle of Muhammad*;
    *the flood spread outwardly and inwardly. Only one who is
    reckoned among the people of the Alawi daʿwa knows of it.
    Allah is its light* — stay verbatim from the chapter file.
    Imam al-Mu'izz li-Din Allah Ma'add ibn Isma'il (peace be upon
    him)'s formulation from *Ta'wil al-Shari'a* (ta-weel ash-sha-
    ree-ah) on the *two worships as the two faces of one obedience*
    stays verbatim with attribution. Al-Kirmani's own *Rahat
    al-'Aql* (raa-hat al-aql) on the chain from First Intellect
    down through the speakers and guardians, with the Lord *above
    the head*, stays verbatim with attribution at the chapter's
    closing image.
  - >
    The Prophet ﷺ honorific is spelled out on first per-chapter
    mention (*peace and blessings of Allah be upon him*) and
    contracted to ﷺ thereafter, per R-HONORIFIC-ONCE. Adam, Noah,
    Seth, Moses, Jesus, Ali (the Commander of the Believers), Imam
    al-Mu'izz, and Salih (saa-lih) each take (peace be upon him)
    at first mention. The opening repetitions inside source-
    attributed quotation blocks are honored as quoted material —
    they do not count against the R-HONORIFIC-ONCE budget.
  - >
    When the chapter references al-Kirmani's own *Rahat al-'Aql*
    (raa-hat al-aql — *The Repose of the Intellect*), treat the
    reference as a real pointer to the architectural settlement of
    *the whole chain* — from the First Creator down through the
    universal Intellect, the universal Soul, the *al-Jadd*, the
    *al-Fath*, the *al-Khayal*, the celestial spheres, the
    elements, the genera, and the human being — surfaced at the
    chapter's closing image where the chain is graphed from the
    Lord at the head down to the cleansing-of-the-opposite at
    every cycle's joint. Sub-chapter twenty-six's distinction of
    *the high limits attaining perfection from innovation* against
    *the bodily intellects attaining perfection from acquisition*
    is the doctrine *Rahat al-'Aql* settles in its rank-by-rank
    walk through the chain.
  - >
    The Arabic terms *Shariʿah* (sha-ree-ah), *natiq* (naa-tiq),
    *asas* (a-saas), *wali* (wa-lee), *Qa'im* (qaa-im), *al-Islah*
    (al-is-laah), *al-Nusra* (an-nus-rah), *al-mukhalif* (al-mu-
    khaa-lif), *targhib* (tar-gheeb), *tarhib* (tar-heeb), *qurban*
    (qur-baan), *sajda* (saj-dah), *ruku'* (ru-koo), *zakat*
    (za-kaat), *qisas* (qi-saas), *hudud* (hu-dood), *hujjah*
    (huj-jah), *al-Jadd* (al-jadd), *al-Fath* (al-fath), *al-Khayal*
    (kha-yaal), *al-Mustafa* (al-mus-ta-faa), *Mu'tazila* (mu-ta-zi-
    lah), *zahir* (thaa-hir), *batin* (baa-tin), *ta'wil* (ta-weel),
    *taʾwil* (ta-weel), *daʿwa* (daa-wah), *tawhid* (taw-heed),
    *quwwah* (quw-wah), *fiʿl* (fi'l), *ʿilm* (ilm), *jahl* (jahl),
    *qibla* (qib-lah), *wilayah* (wi-laa-yah), *Nuh* (nooh), *Adam*
    (aa-dam), *Musa* (moo-saa), *Salih* (saa-lih), *Ali* (a-lee),
    *al-malaʾ al-aʿla* (al-ma-la al-aa-la), *al-fulk* (al-fulk),
    *iʿtazala* (i-ta-za-la), *Alawi* (a-la-wee), *aradas* (ar-das),
    *al-Mahsul* (al-mah-sool), *Rahat al-'Aql* (raa-hat al-aql),
    *Ta'wil al-Shari'a* (ta-weel ash-sha-ree-ah), *Surat Hud*
    (soo-rat hood), *al-Sijistani* (as-si-jis-taa-nee), and *al-Razi*
    (ar-raa-zee) each carry their phonetic guide at first chapter
    appearance, per R-PRONUNCIATION-IMPERATIVE.
  - >
    End on the chapter's closing settlement and the bridge to
    *Chapter Ten*. The architecture standing: the *work* of the
    speakers is *not only* for *tawhid* but for *soul-correction
    toward the second perfection*; *I know what you do not know*
    names the *cosmic turn* by which knowledge emerges from
    potency at the end of the cycle of ignorance; *Adam's three
    sections of call* all carry *parables* with both *apparent
    meaning* and *interpretation*, and the *apparent meaning* is
    *itself* the Shariʿah; *the Qa'im completes rather than
    abrogates*; the *high limits attain tawhid by innovation*; the
    *seven lines and six aradas* graph the speaker-cycles; the
    *Adam-letters* argument refutes itself; the *ark of Noah*
    carries *both readings*, with *al-Islah*'s and *al-Nusra*'s
    both *sound*; *every speaker requires a guardian*, and *Adam
    had Seth*; and the *son of Noah* is the *type of the opposite*
    that recurs at every cycle until the seventh, *washed away in
    the cleansing flood that spreads outwardly and inwardly*. The
    bridge to *Chapter Ten*: *what is at the very head of the
    chain — above the First Speaker, above the First Intellect,
    above the universal Soul*? *Chapter Ten* will take up *Tawhid
    and the critique of al-Mahsul* — the doctrines of the
    *Mu'tazila*, of *al-Razi*, of *al-Sijistani*, and of the
    *lost-work al-Mahsul itself*. Do not flatten the closing into
    a "what we learned" summary.
anchor_passages:
  - >
    "Al-Kirmani on soul-correction and the highest assembly
    (sub-chapter twenty): *Furthermore, the work is not only for
    monotheism, but also for the correction of the soul in worship,
    for emulating the highest assembly, and for acquiring through
    discipline the honorable morals and noble habits by which they
    prepare for union with what is above them — not to be diverted
    from the way.*"
  - >
    "Al-Kirmani's deep reading of *I know what you do not know*
    (sub-chapter twenty): *The Almighty said: 'I know' — the end
    of ignorance in the world up to its end, the act, the
    completion of its role, and its appearance; and the attainment
    of knowledge in the world up to its goal in strength; and the
    return of repentance to Him in the reappearance; and the
    resurrection of the need in His appearance for the
    establishment of teachers and guides — 'what you do not know.'*"
  - >
    "Al-Kirmani on Adam's three sections of call (sub-chapter
    twenty-three): *If that is the case, then the three sections
    affirm an apparent meaning that is fixed for Adam, followed
    by an interpretation — so Adam is the owner of a law and a
    clear custom.*"
  - >
    "Al-Kirmani on the Qa'im as completer, not abrogator
    (sub-chapter twenty-five): *To believe this is sick, for the
    estimation of its existence from the natural world does not
    arise from the second way of revival, because it does not
    invalidate anything related to the worship of Allah, the
    Almighty. Rather, it is the conclusion of the roles of the
    predecessors and the completion of something that has been
    done in its place; and it removes the boundaries about their
    ranks.*"
  - >
    "Al-Kirmani on the high limits (sub-chapter twenty-six): *The
    First Intellect and the paradoxical transcendent limits of
    bodies have not attained their perfection through any of
    that; rather, they have gained their perfections from the
    beginning of their existence in innovation and emanation. It
    is not permissible to apply this statement to that.*"
  - >
    "Al-Kirmani correcting al-Islah on the aradas (sub-chapter
    twenty-seven): *The Shariʿah is a stature that does not
    require any increase upon it nor any decrease from it. Even
    if the author of al-Islah said: the first cycle, which
