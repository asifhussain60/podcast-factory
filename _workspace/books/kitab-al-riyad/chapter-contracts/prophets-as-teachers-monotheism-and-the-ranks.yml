title: "Prophets as Teachers, Monotheism, and the Ranks"
audience: >
  Thoughtful adult readers who have walked the first half of *Chapter Nine*
  of *al-Riyad* — al-Kirmani's nineteen-sub-chapter defense of *the
  Shariʿah of Adam (peace be upon him)* against the author of *al-Nusra*
  (an-nus-rah)'s objections — and now turn with him to the *architectural
  settlement* of the chain that runs through human history. The cumulative
  verdict of the first half is fixed: *Adam had a Shariʿah, and Seth
  (peace be upon him) was his asas* (a-saas — foundation). The fourteen
  sub-chapters of the second half take that verdict and *expand* it — *why*
  are prophets sent at all (not only to signify *tawhid* (taw-heed) but to
  *correct the soul* and prepare it for *union with what is above*), how
  do the *cycles of knowledge and ignorance* turn at the *end of the
  cycle* (the deep reading of *I know what you do not know*, Quran 2:30,
  by the architecture of *force* and *act* — *quwwah* and *fiʿl* — across
  the cycles), what is the *form* of *Adam's call* (the *three sections* —
  encouragement, intimidation, or both — each requiring *parable* and
  therefore *interpretation*), why the *Qa'im* (qaa-im — the awaited one)
  *completes* rather than *abrogates* the laws (the *boundaries pass
  away*, but the *laws and ordinances of works* stand), how the *high
  limits* (the First Intellect, the universal Soul, *al-Jadd* (al-jadd),
  *al-Fath* (al-fath), *al-Khayal* (kha-yaal)) attain perfection from
  *innovation* and not from *signs and works*, how the *seven lines and
  six aradas* (ar-das) graph the architecture of the speaker-cycles, why
  the *Adam-letters* argument refutes itself, what the *ark of Noah*
  signifies (and the two sound readings of it), why *every speaker
  requires a guardian*, and what the deep *taʾwil* (ta-weel —
  interpretation) of the *son of Noah* settles about the recurring
  figure of the *opposite* (al-mukhalif — al-mu-khaa-lif) who claims the
  guardian's rank and is washed away in the *flood of the cleansing*
  that spreads *outwardly and inwardly*. The chapter closes on the
  bridge to *Chapter Ten* (Tawhid and the critique of *al-Mahsul* —
  al-mah-sool — the lost-work that began the four-book chain), where
  the architecture of *tawhid* at the head of the chain is settled
  against the doctrines of the philosophers.
