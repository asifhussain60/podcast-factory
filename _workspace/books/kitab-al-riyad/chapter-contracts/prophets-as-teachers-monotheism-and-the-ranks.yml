    establishment of the wali*."
  - >
    "Quran 71:25 (*Surat Nuh*): *They were drowned in their
    sins, so they were made to enter the Fire.* — surfaced in
    sub-chapter thirty-one for *al-Islah*'s reading of *the
    Wadd-Suwa worshippers as those who adhered to the first
    law and rejected Noah's new law*."
  - >
    "Quran 11:42–43 (*Surat Hud*): *And Noah called his son,
    who had separated himself, 'O my son, ride with us, and do
    not be with the disbelievers.' He said, 'I will take refuge
    in a mountain that will protect me from the water.' Noah
    said, 'There is no preserver today from the command of
    Allah.'* — the anchor verses for sub-chapter thirty-three's
    deep *taʾwil* of the son of Noah as the *opposite*."
  - >
    "Imam al-Mu'izz li-Din Allah Ma'add ibn Isma'il (peace be
    upon him), *Ta'wil al-Shari'a*: *The worship of the body
    and the worship of the spirit are the two faces of one
    obedience. The Shariʿah is the body; the taʾwil is the
    spirit. He who keeps the body and abandons the spirit, his
    religion is dead; he who claims the spirit and abandons
    the body, his religion is a lie. And Adam, peace be upon
    him, brought both — the body of the rite and the spirit
    of the taʾwil — as Allah taught him the names of all
    things.* — surfaced in sub-chapter twenty-four to seal the
    *positive settlement* of *knowledge and action together*
    in the *one Shariʿah*."
  - >
    "Al-Kirmani, *Rahat al-'Aql* (raa-hat al-aql — *The
    Repose of the Intellect*), on the rank of the First
    Creator at the head of the chain: *The chain that runs in
    time has a head, and the head has a Lord. The Lord is not
    the head; the Lord is above the head. The First Intellect
    knows the Lord by innovation; the universal Soul receives
    the head's writing; the speakers carry the writing into
    the world; the guardians preserve the writing in the
    community; the opposites are washed away in the cleansing
    of every cycle; and at the seventh, the Qa'im completes
    the roles and closes the door of teaching. This is the
    architecture of the chain that runs in time. And above
    the head is the Lord, of whom no description, no
    attribute, no opposition is permitted — the Originator of
    the Originated, the Innovator of the Innovated. Beyond
    Him there is nothing but Him.* — surfaced at the chapter's
    closing image as the architectural settlement on which
    *Chapter Ten*'s *Tawhid and critique of al-Mahsul* will
    stand."
