show_notes:
  blurb: >
    The second half of *Chapter Nine* of *Kitab al-Riyad* — fourteen
    sub-chapters in which al-Kirmani takes the verdict of the first
    half (*Adam had a Shariʿah, and Seth was his asas*) and *expands*
    it into the architectural shape of the chain that runs through
    human history. Sub-chapter twenty: *the work is for soul-
    correction, not only for tawhid*; the deep reading of *I know
    what you do not know* (Quran 2:30) on the architecture of
    *force and act* across the cycles. Sub-chapters twenty-one and
    twenty-two: distinguishing the *interregnum role* of the Qa'im
    (knowledge widespread) from the *post-Qa'im role* (door of
    education closed). Sub-chapter twenty-three: the *three
    sections of Adam's call* — encouragement, intimidation, or
    both — each requiring *parable* and therefore *apparent
    meaning followed by interpretation*. Sub-chapter twenty-four:
    *knowledge and action together* as the *one Shariʿah* —
    *body and spirit of the religion*. Sub-chapter twenty-five:
    *the Qa'im completes, does not abrogate* — the apocalypse-
    verses concern *the passing of the ranks*, not the *laws and
    ordinances of works*. Sub-chapter twenty-six: *the high
    limits attain perfection from innovation*; the *bodily
    intellects* from *acquisition through teaching*. Sub-chapters
    twenty-seven and twenty-eight: the *seven lines and six
    aradas* dispute — al-Islah's reading corrected, al-Nusra's
    refused, al-Kirmani's positive geometry of the speaker-cycles.
    Sub-chapter twenty-nine: *As We began the first creation, We
    shall repeat it* (Quran 21:104) on the *cyclic return*.
    Sub-chapter thirty: the *Adam-letters* argument refuted by
    internal inconsistency. Sub-chapters thirty-one through
    thirty-three: the *ark of Noah* with both readings sound
    (apparent Shariʿah + daʿwa-with-the-wali), the doctrine that
    *every speaker has a guardian* (Adam had Seth), and the
    deep *taʾwil* of *the son of Noah* as the *opposite* who is
    washed away in the cleansing flood that spreads *outwardly
    and inwardly* — the type that recurs at every cycle until
    the seventh. Bridge to *Chapter Ten*: *Tawhid and the
    critique of al-Mahsul* — the doctrine of the First Creator
    above the head of the chain.
