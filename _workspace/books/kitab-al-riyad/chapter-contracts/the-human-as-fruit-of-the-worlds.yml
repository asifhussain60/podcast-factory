show_notes:
  blurb: >
    Seven sub-chapters of *Chapter Five* of *Kitab al-Riyad* — al-Kirmani's
    adjudication of the next great dispute between the two reformers: is
    the human being the *fruit* of this world (the harvest of the long
    natural ascent from elements into the form prepared to receive the
    three souls), as the author of *al-Islah* said, or the fruit of the
    *higher* world (the abode of survival to which the prophets called
    us), as the author of *al-Nusra* insisted? Sub-chapter one frames the
    dispute and lands the third word: the human being is the *fruit of
    all the worlds* — first perfection from the natural world, second
    perfection from the higher world, on the authority of Imam al-Mu'izz
    li-Din Allah's *Ta'wil al-Shari'a*. Sub-chapter two turns *al-Nusra's*
    "would-not-move" objection back on him and gives the structural
    formula: human beings are formed by *the meeting of the overflow of
    the worlds*. Sub-chapter three refuses *al-Islah's* extension of
    emanation to *al-Hayula* AND *al-Nusra's* perfect-and-deficient
    marriage analogy, settling the doctrine that each rank is perfect in
    itself and deficient only when added to another. Sub-chapter four
    settles the name *al-Tamamiyyah* on the Creator. Sub-chapter five
    settles the synonymy of the divine names (cause, effect, perfect,
    perfected) *according to the additions* — one named, multiple
    aspects, the same architecture *Chapter Four* settled for
    Intellect-and-Word. Sub-chapter six delivers the chapter's deepest
    move: the universal Soul *did not seek* in her action; God enriched
    her at origination; her overflow is the work of giving, not of
    getting. From that, the chapter's signature formula: *human beings
    have two sides — one part natural, one part divine; the last in the
    universes, united in eternity with what has been acquired by time*.
    Sub-chapter seven closes on the First Creator's metaphorical action
    and the Intellect that perceives only the truth. The doctrinal
    payload sets the architecture for *Chapter Six's* coming question of
    motion, stillness, *al-Hayula*, and form: the human being is the rank
    at which the chain of emanation from above meets the chain of natural
    cause-and-effect from below; the *hudud* convey the gift; the believer
    who knows the houses of the Prophets, the guardians, the imams, and
    the righteous is ready for salvation, gathered in *Dar al-Quds*.
