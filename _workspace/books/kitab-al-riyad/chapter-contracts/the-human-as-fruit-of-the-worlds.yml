title: The Human Being — Fruit of All the Worlds
audience: >
  Thoughtful adult readers who have followed *Chapters One through Four*
  of *al-Riyad* through the long arguments over the universal Soul, the
  First Intellect, the relation of the higher world to *al-Hayula*, and
  the rank of the speaking souls (the *second emanation*) — and who now
  arrive at *Chapter Five*: seven sub-chapters in which al-Kirmani turns
  from the rank of the soul to the rank of the whole human being. The
  question is structural and political at once. Is the human being the
  *fruit* of this world — the harvest of the long natural ascent from
  elements through compounds into the form prepared to receive the three
  souls (vegetative, sensitive, speaking) — as the author of *al-Islah*
  said? Or is the human being the fruit of the *higher* world, as the
  author of *al-Nusra* insisted, because if the human being were of this
  world, this world would have held him and not let him move to the
  *Ma'ad*? Al-Kirmani's settlement is the doctrine Imam al-Mu'izz li-Din
  Allah Ma'add ibn Isma'il (peace be upon him) taught in *Ta'wil
  al-Shari'a*: the human being is the *purpose of the second world and
  the end of the action of nature* — the fruit of *all* the worlds, the
  last in the universes, united in eternity with what has been acquired
  by time.
