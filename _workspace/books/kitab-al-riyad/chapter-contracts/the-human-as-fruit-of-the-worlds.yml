key_tensions:
  - >
    The vocabulary dispute looks small ("fruit of this world" vs "fruit
    of the higher world") but the stake underneath is the integrity of
    the entire *da'wa* architecture. If the human being is the fruit of
    *this* world only, the *Ma'ad* becomes a story told for the
    consolation of mortals — that is the picture *al-Nusra* (rightly)
    pressed *al-Islah* on, because the materialists drew exactly that
    conclusion. If the human being is the fruit of the *higher* world
    only, the bodily life becomes incidental, and *sharia* — the long
    discipline of obedience and worship in and through the body — loses
    its hold as the work that earns the soul's second perfection. The
    hosts must hold both anxieties at once and not let either reformer's
    word win cleanly. Al-Kirmani's third word — *fruit of all the worlds*
    — is what the chapter exists to surface.
  - >
    Al-Kirmani's half-credit moves are the engine of the chapter — the
    same pattern *Chapter Four* trained. In sub-chapter one, he grants
    *al-Islah* that the natural world prepares the bodily form (the
    *first perfection*) AND grants *al-Nusra* that the human being's
    destination is the higher world (the *second perfection*) — and lands
    on the formula that the human being receives BOTH. In sub-chapter
    two, he turns *al-Nusra's* "would-not-move" objection back: by the
    same logic, the higher world would *also* hold the human being and
    not release him, yet the human being descends into bodily life. In
    sub-chapter three, he grants *al-Islah* the Intellect → Soul
    emanation AND refuses *al-Islah's* extension of emanation to
    *al-Hayula*; grants *al-Nusra's* heaven-and-earth analogy in part AND
    refuses *al-Nusra's* extraction of a perfect-and-deficient doctrine
    from it. The hosts must let the half-credit moves be half-credit, not
    flatten them.
  - >
    Sub-chapter six carries the chapter's deepest move and the highest
    political stake. The universal Soul *did not seek* in her action to
    reach a rank she had not attained — God enriched her when he
    originated her. *Al-Nusra's* picture of the Soul's action as a
    *seeking-after* the noble rank smuggles dependence of the higher on
    the lower into the architecture. Al-Kirmani refuses it at the root.
    The Soul's overflow is the work of *giving*, not the work of
    *getting*. And from that doctrine the chapter's signature formula
    unfolds: the human being is *the last in the universes, united in
    eternity with what has been acquired by time* — the rank at which
    eternity and time meet, the harvest of all the worlds. The hosts
    must let the formula carry its weight without paraphrase that
    flattens it.
  - >
    The Imam al-Mu'izz li-Din Allah citation runs as the chapter's
    doctrinal spine. In sub-chapter one, al-Kirmani names Imam al-Mu'izz
    li-Din Allah Ma'add ibn Isma'il's *Ta'wil al-Shari'a* as the highest
    authority for the formula that the human being is the *purpose of
    the second world and the end of the action of nature*. The hosts
    must let the Imam's name and the *Ta'wil al-Shari'a* citation do
    their argumentative work — this is not a devotional aside but the
    chapter's doctrinal anchor, the same Cairo-court treatise that
    *Chapter Four* (sub-chapter eight) reached for when settling the
    Intellect-Word identity.
  - >
    The *al-Tamamiyyah* and divine-names sub-arguments (sub-chapters
    four and five) are not asides. They extend the *Chapter Four*
    architecture — *the Intellect is the Word, the Word is the
    Intellect* — to the divine names themselves. *Al-Tamamiyyah*
    (perfection) belongs to the Creator. Cause, effect (*al-ma'lul*),
    perfect, perfected are *synonymous according to the additions* —
    multiple meanings, one named. The hosts must name this as the
    extension it is: the chapter is not detouring; it is showing how the
    same architecture of names-by-aspect that grounds the
    Intellect-Word identity grounds the relation of the Creator to His
    names.
tone_constraints:
  - Walk the seven sub-chapters in order. Sub-chapter one carries the chapter's setup of the vocabulary dispute and lands the third-word formula (*fruit of all the worlds*). Sub-chapter two turns *al-Nusra's* "would-not-move" objection back and gives the structural formula (*meeting of the overflow of the worlds*). Sub-chapter three refuses the emanation-from-Soul-into-*al-Hayula* extension AND the heaven-and-earth marriage analogy in its perfect-and-deficient form, settling the doctrine of perfection-by-rank. Sub-chapter four handles the *al-Tamamiyyah* name. Sub-chapter five settles the synonymy of the divine names *according to the additions*. Sub-chapter six is the doctrinal climax — the universal Soul did not seek; the human has two sides; the human is *the last in the universes, united in eternity with what has been acquired by time*. Sub-chapter seven closes on the First Creator's metaphorical action and the Intellect that perceives only the truth. Do not collapse the seven into a single thesis. The accumulation is the chapter's argumentative force.
  - When al-Kirmani sides with *al-Islah* on something, name it. When he sides with *al-Nusra* on something, name that too. The chapter is a sustained pattern of partial sidings, and the listener should feel each one land. Half-credit is al-Kirmani's signature, and *Chapter Five* runs the pattern through a different question than *Chapter Four* did.
  - Lost-work quotations (the authors of *al-Islah* and *al-Nusra*) are paraphrased in modern English. Quranic verses (95:4–6 on the human created of the best stature and the work that earns the unfailing reward; 23:115 on whether you were created in vain) stay verbatim with attribution. Al-Kirmani's own settled formulas — *fruit of all the worlds*; *the meeting of the overflow of the worlds*; *human beings have two sides — one part natural, one part divine*; *the last in the universes, united in eternity with what has been acquired by time*; *what came first of them was the last of them*; *the names are synonymous according to the additions* — stay verbatim from the chapter file. Imam al-Mu'izz li-Din Allah Ma'add ibn Isma'il's *Ta'wil al-Shari'a* citation stays verbatim. Imam Ali ibn Abi Talib (peace be upon him) is quoted from the aphoristic tradition (the *small body / greater world folded within* couplet) with appropriate honorific. The Prophet ﷺ hadith *whoever knows himself knows his Lord* is quoted with attribution.
  - The Prophet ﷺ honorific is spelled out on first per-chapter mention (*peace and blessings of Allah be upon him*) and contracted to ﷺ thereafter, per R-HONORIFIC-ONCE. Imam Ali and the Imams take (peace be upon him); Imam al-Mu'izz li-Din Allah Ma'add ibn Isma'il takes (peace be upon him).
  - When the chapter file references *Rahat al-'Aql* (al-Kirmani's *well-known book* and his magnum opus on the seven seas and the architecture of the chain), treat the reference as a real pointer — say what the treatise contains and why *al-Riyad's Chapter Five* sends the reader there (for the architecture of *dar al-Ibda'*, the *hudud*, and the chain of overflow from First through Second into the natural composite).
  - End on the chapter's closing image and the bridge to *Chapter Six*. The human being at the rank where the two overflows meet; the Prophet ﷺ's *whoever knows himself knows his Lord*; Imam Ali's *small body / greater world folded within*; the believer who knows the houses of the Prophets, the guardians, the imams, and the righteous, ready for salvation, gathered in *Dar al-Quds*. *Chapter Six* will take the architecture and ask the next question: what is motion, what is stillness, what is *al-Hayula*, what is form? Do not flatten the closing into a "what we learned" summary.
anchor_passages:
  - "Al-Kirmani's third word — the chapter's settled formula: *Each is truthful in what he said on one side, and each is untruthful on another. The side on which they are both truthful is that each of them has said of human beings what belongs to him. The side on which they are both untruthful is in denying the other its share. For man rightly bears the title of fruit of all the worlds, because human beings issue from between the two worlds. From this world he receives his first perfection; from that world he receives his second.*"
  - "Al-Kirmani's structural formula (sub-chapter two): *Human beings are in fact human beings precisely because they are formed by the meeting of the overflow of the worlds: from the natural world, what flows in the channel of the bodies; and from the world of the Intellect, what flows in the channel of the form. And this is in the middle.*"
  - "Al-Kirmani's settled doctrine of perfection by rank (sub-chapter three): *Deficiency is found only in things — not in their selves, but in their ranks when they are added to one another, and in their actions when they do not exist except in something other than that which is done with their existence. In itself each is perfect; for if their selves were not perfect in the existence that befits them, nothing could be done by them — neither by themselves nor by another.*"
  - "Al-Kirmani's settled doctrine on the divine names (sub-chapter five): *We say that the Creative is the perfection, only perfect, and the Creator is the creativity; he is the cause, the effect (al-ma'lul), the perfect, and the perfected. These names are synonymous according to the additions, because there is a multiplicity of meanings upon which these names fall, yet there is only one thing.*"
  - "Al-Kirmani's refusal of the seeking-doctrine (sub-chapter six): *The universal soul, in what is indicated of her, did not seek in her action to reach a rank she had not attained. The universal soul, which is the second, overflows upon this world not to be drawn to it for what is not hers — God enriched her when he originated her, with no need to seek what she was not given. Rather, her action is to establish wisdom in bringing what is in potentiality into actuality.*"
  - "Al-Kirmani's deepest formula on the human being (sub-chapter six): *Human beings have two sides: one part natural, one part divine. He is not the fruit of this world alone, nor the fruit of that world alone, but the fruit of all the worlds. He is the last in the universes, united in eternity with what has been acquired by time. Therefore it has been said that what came first of them was the last of them.*"
  - "Al-Kirmani's closing on the First's metaphorical action (sub-chapter seven): *This is not necessary for the First Creator and Originator, because the action there is metaphorical, not in motion nor in order. Rather, the first is the last; the beginning of it is the middle, and the middle of it is the end. There is no order in it, no system; rather, the systems and order in what comes after benefit from the lights of what is not in order or system — that is the First Intellect.*"
  - "Imam al-Mu'izz li-Din Allah Ma'add ibn Isma'il (peace be upon him), *Ta'wil al-Shari'a* (The Interpretation of Sharia), cited by al-Kirmani in sub-chapter one as the highest authority for the doctrine: *Man is the purpose of the second world and the end of the action of nature.*"
  - "Quran 95:4–6 on the human's best stature and the work that earns the unfailing reward: *Surely We created man of the best stature. Then We reduced him to the lowest of the low — except those who believe and do righteous deeds, for them is a reward unfailing.*"
  - "Quran 23:115 refusing the picture of creation in vain: *Did you then think that We had created you in vain, and that you would not be returned to Us?*"
  - "Imam Ali ibn Abi Talib (peace be upon him), aphoristic tradition: *Do you suppose yourself to be a small body? Within you is folded the greater world.* — surfaced for sub-chapter two's structural formula on the human as the meeting of the two overflows."
  - "Hadith of the Prophet ﷺ: *Whoever knows himself knows his Lord.* — surfaced for sub-chapter one's closing on the work of self-knowledge as knowledge of the One from whom both overflows run."
