title: Souls — Parts of the First Truths, or Only Traces?
audience: >
  Thoughtful adult readers who have followed *Chapters One through Three*
  of *al-Riyad* through the long arguments over the Soul, the First
  Intellect, and the relation of the higher world to *al-Hayuli*, and
  who now arrive at *Chapter Four* — eight sub-chapters where al-Kirmani
  adjudicates the longest-running disagreement between the two reformers:
  are the speaking souls in us *parts* of the First Truths (the
  universal Second) or only *traces* of them? The answer is the
  doctrinal hinge for everything that follows in the book: the speaking
  souls are the *second emanation* — perfect in themselves, continuous
  by rank with what stands above, never pieces broken off from any
  substance above them. And the integrity of prophethood, imamate,
  walaya, sharia, and revelation rests not on the partness of the
  souls but on the deeper formula Imam al-Mu'izz li-Din Allah taught in
  *Ta'wil al-Shari'a*: that the Intellect is nothing but the Word, and
  the Word is nothing but the Intellect.
