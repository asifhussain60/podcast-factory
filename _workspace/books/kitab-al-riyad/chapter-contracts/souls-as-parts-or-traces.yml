key_tensions:
  - >
    The vocabulary dispute looks small ("traces" vs "parts") but the stake
    underneath is the integrity of the *da'wa* architecture. If the souls
    are *only* traces in *al-Hayuli's* sense, the prophet cannot reach
    back up the chain to receive the message; if the souls are *parts*
    in the literal piece-of-a-substance sense, the categorical refusal
    of body-talk that *Chapters Two* and *Three* spent so much labor
    building falls apart. The hosts must hold both anxieties at once
    and not let either reformer's word win cleanly. Al-Kirmani's third
    word — *second emanation* — is what the chapter exists to surface.
  - >
    Al-Kirmani's half-credit moves are the engine of the chapter. In
    sub-chapter one, he grants al-Nusra that souls are jewels existing
    by themselves (effects are not self-existent) AND grants al-Islah
    that "parts" had to be refused to keep the soul out of body-status.
    In sub-chapter six, he grants al-Nusra that the soul's unlimited
    receptive capacity is itself a proof of non-embodiment AND grants
    only the restricted parts-by-rank language. In sub-chapter seven,
    he releases both reformers' formulations into a single doctrine: the
    souls are the second emanation, and prophethood does not depend on
    the parts-claim at all. The hosts must let the half-credit moves
    be half-credit, not flatten them into a winner-takes-all dialectic.
  - >
    Sub-chapter eight carries the chapter's deepest move and the highest
    political stake. Al-Nusra offers a four-rung ladder (Intellect
    creative through Word; Soul as image of Intellect; nature born of
    Soul; speaking souls as parts of Universal Soul) and claims that with
    this ladder in place every Ismaili doctrine becomes coherent.
    Al-Kirmani refuses the ladder at the first rung: the Word does not
    stand behind the Intellect as an instrument; the Intellect IS the
    Word, and the Word IS the Intellect. He brings Imam al-Mu'izz
    li-Din Allah's *Ta'wil al-Shari'a* as the highest authority for
    this identity. The hosts must let the Imam's name and the *Ta'wil
    al-Shari'a* citation do their argumentative work — this is not a
    devotional aside but the chapter's hinge.
  - >
    The "in the Sixties" doctrine (sub-chapter seven) is technical
    al-Kirmani vocabulary from his own *Rahat al-'Aql* — the rank-by-rank
    reckoning of the prophet's soul as it ascends through the *hudud* and
    reaches the station at the brink of the upper world. The hosts must
    name it as al-Kirmani's own reckoning (referenced as "our well-known
    book"), not gloss it as a metaphor. The station is what enables the
    prophet's reception. The reception is not by composition with the
    universal Soul; it is by having reached the rank where the upper
    world becomes perceptible.
tone_constraints:
  - Walk the eight sub-chapters in order. Sub-chapter one carries the chapter's setup of the vocabulary dispute. Sub-chapters two and three set up and refuse al-Nusra's "parts of the total soul" reading by dilemma. Sub-chapter four delivers the doctrinal hinge — *second emanation*. Sub-chapters five and six set up the unlimited-capacity proof and the restricted parts-by-rank concession. Sub-chapter seven is the polemical climax (prophethood does not depend on the parts-claim). Sub-chapter eight delivers the deepest move (Intellect IS Word) with the Imam al-Mu'izz citation. Do not collapse the eight into a single thesis. The accumulation is the chapter's argumentative force.
  - When al-Kirmani sides with al-Islah on something, name it. When he sides with al-Nusra on something, name that too. The chapter is a sustained pattern of partial sidings, and the listener should feel each one land. Half-credit is al-Kirmani's signature.
  - Lost-work quotations (the authors of *al-Islah* and *al-Nusra*) are paraphrased in modern English. Quranic verses (91:7–10 on the soul's two faces; 53:7–11 and 53:17–18 on the Prophet ﷺ's vision at the brink) stay verbatim with attribution. Al-Kirmani's own settled formulas — *the souls are the second emanation*; *the Intellect is nothing but the Word, and the Word is nothing but the Intellect*; *what is in the whole is found in the part by rank* — stay verbatim from the chapter file. Imam al-Mu'izz li-Din Allah's *Ta'wil al-Shari'a* citation (the Word is the Intellect, and these names properly belong to it) stays verbatim. Imam Ali ibn Abi Talib (peace be upon him) is quoted from the aphoristic tradition with appropriate honorific.
  - The Prophet ﷺ honorific is spelled out on first per-chapter mention (*peace and blessings of Allah be upon him*) and contracted to ﷺ thereafter, per R-HONORIFIC-ONCE. Imam Ali and the Imams take (peace be upon him); Imam al-Mu'izz li-Din Allah takes (peace be upon him).
  - When the chapter file references *Rahat al-'Aql* and *Asrar al-Ma'ad* (al-Kirmani's own treatises), treat the references as real pointers — say what each treatise contains and why *al-Riyad's Chapter Four* sends the reader there at the precise moments it does (Asrar al-Ma'ad for the second-source / second-emanation doctrine; Rahat al-'Aql for the architecture and the Sixties).
  - End on the chapter's closing image and the bridge to *Chapter Five*. The speaking souls in their place; the Intellect-which-is-the-Word at the source; the *hudud* between, conveying the gift; the believer who knows this according to his strength. *Chapter Five* will take the same architecture and ask the next question: what is the human being? Do not flatten the closing into a "what we learned" summary.
anchor_passages:
  - "Al-Kirmani's third word — the doctrinal hinge: *The souls belong to the nature of those paradoxical things whose existence is creative; their appearance and existence are only among the natural and phenomenal worlds. It is a natural force that acquires what is gained from the limits through obedience and worship. So it emits from itself an abstract remaining image that is like the abstract things in the House of the Hereafter on the one hand, and the opposite of it on the other. This is the second source, and our writings on the Ma'ad include mention of that, God willing.*"
  - "Al-Kirmani's restricted concession on the 'parts' language (sub-chapter six): *The most we can grant him is to say: as for those who wish to call them parts, these speaking souls are receivers if they are rational. As such, the soul and what it has produced are one thing; the speaking soul is identical with it and not distinguished from it except by rank — like the part of a thing in which there exists what is found in the whole, their path in themselves being one and the same from this side.*"
  - "Al-Kirmani's release of the parts-question from the architecture of prophethood (sub-chapter seven): *Prophethood is not invalidated by this, nor imamate, nor anything else, for it has been established that these ranks are not of these. The prophets (peace be upon them) were able to perceive these absent things from the upper world, after they reached the rank of perfection — becoming, at its end, in the Sixties. When they return to themselves, it is as though they have realized that the transcendent selves are one thing in respect of the whole, with no difference except in rank.*"
  - "Al-Kirmani's deepest move on the Intellect and the Word (sub-chapter eight): *The Intellect is nothing but the Word itself, and the Word is nothing but the Intellect itself. It is correct to say that Mawlana Imam al-Mu'izz li-Din Allah (peace be upon him), in The Interpretation of Sharia (Ta'wil al-Shari'a), where he discusses intelligibles, says: the Word is the Intellect, and these names properly belong to it.*"
  - "Al-Kirmani's settled formula on the emanations: *The Soul and nature emanate from the First Intellect, each of them according to its own proportion, so that one of them is more excellent than the other — the first emanation being the Soul, and the speaking souls being the second emanation. What occurs in the first of them is repeated in the last of them.*"
  - "Quran 91:7–10 on the soul's two faces: *By the soul, and Him Who fashioned it, and inspired it as to its wickedness and its righteousness. He has succeeded who purifies it, and he has failed who corrupts it.*"
  - "Quran 53:7–11 on the Prophet ﷺ's vision at the brink: *And he was at the highest horizon. Then he approached and descended, and was at a distance of two bow-lengths or nearer. So He revealed to His servant what He revealed. The heart did not lie about what it saw.*"
  - "Imam Ali ibn Abi Talib (peace be upon him), aphoristic tradition: *Your soul is a precious jewel — whoever guards it has elevated it, and whoever lets it slip has lowered it.* — surfaced for sub-chapter one's reconciliation of al-Nusra's 'jewel' and al-Islah's protective refusal of body-status."
