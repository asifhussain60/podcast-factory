show_notes:
  blurb: >
    Eight sub-chapters of *Chapter Four* of *Kitab al-Riyad* —
    al-Kirmani's adjudication of the longest-running disagreement
    between the two reformers: are the speaking souls in us *parts* of
    the First Truths (the universal Second) or only *traces* of them?
    The chapter walks the dispute through eight passes. Sub-chapter one
    reads both reformers as half-right: al-Islah's "traces" protected the
    soul from body-status; al-Nusra's "parts" protected the soul's
    continuity with what stands above. Sub-chapters two and three set up
    and refuse al-Nusra's "parts of the total soul" reading by a precise
    dilemma. Sub-chapter four delivers the doctrinal hinge: the speaking
    souls are the *second emanation*, the second source. Sub-chapters
    five and six work the unlimited-capacity proof of non-embodiment and
    grant only a restricted parts-by-rank language. Sub-chapter seven
    is the polemical climax: prophethood, imamate, walaya, and the
    divine laws do not stand or fall by the parts-claim at all; they
    rest on the rank attained by the prophet's soul through the chain
    of obedience and worship, on the *hudud* that convey the gift.
    Sub-chapter eight delivers the deepest move: the Intellect is
    nothing but the Word, the Word is nothing but the Intellect — the
    formula Imam al-Mu'izz li-Din Allah taught in *Ta'wil al-Shari'a*.
    The doctrinal payload sets the architecture for the rest of
    *al-Riyad*: the *hudud* convey; the souls receive; the chain holds
    by the running of the single originating power, not by any
    substance-composition between ranks.
