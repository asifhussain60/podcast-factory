show_notes:
  blurb: "Across the nine fusūl of Bāb 2, al-Kirmani takes the disputants' question about motion and rest and turns it into a metaphysics of the First Intellect itself. Al-Islah's symmetry — motion-and-rest in the First by potentiality, in the Second by actuality — collapses on its own terms. Al-Nusra's alternative — motion to the soul, rest to the intellect — still misplaces the natural-order categories. The First Intellect is the very act of origination, not a body that moves or rests. The heavens' motion and the speaker-prophet's motion are perfections, not needs. The blessings overflow from every rank, proportioned to the capacity of the receiver. The bāb closes with the prayer that gives the entire apparatus its purpose: 'God is the light of our intellects by means of these hudud.'"
