title: The First Intellect, the First Originator
audience: Listeners who have followed the dispute on the Soul through Bāb 1 (Episodes 1–3) and now want to see al-Kirmani turn the same dialectical apparatus on the First Intellect itself — the originator's nature, examined through the question of whether motion and rest apply to it.
angle: faithful_exposition
episode_format: deep_dive
host_dynamic: curious_mind + scholar_companion
host_dynamic_custom: null
debate: null
length_target: extended
key_tensions:
  - "The motion-and-rest debate looks like cosmological book-keeping; al-Kirmani turns it into a metaphysics of the originator. The First Intellect is not a body; therefore neither motion nor rest applies to it; therefore the entire framework of the disputants is built on a category-mistake."
  - "Al-Islah's geometric symmetry (motion-and-rest in the First by potentiality, in the Second by actuality) produces the impossible result that the Second is more honorable than the First — because actuality outranks potentiality. The symmetry collapses on its own terms."
  - "Al-Nusra is half-right that the intellect does not move (because it does not need), but he misplaces motion to the universal Soul and rest to the universal Intellect — still folding the originative order back into the natural order. Both disputants make the same category-mistake in different directions."
  - "The motion of the heavens and the motion of the speaker-prophet are motions of perfection, not of need. Al-Nusra's claim that motion arises only from need is not absolutely correct: some natural motions are constitutive of what the moving thing is."
  - "The blessings overflow from every rank, proportioned to the receiver's capacity. If they did not, the entire structure of the Da'wa — Prophet, Imam, hujjah, hudud — would collapse. The bāb on the First Intellect is also, structurally, a bāb on the channels of teaching authority."
  - "The closing prayer places the entire metaphysical apparatus in the service of what the apparatus alone cannot produce: illumination. 'God is the light of our intellects by means of these hudud' — the hierarchy is the channel, not the destination."
tone_constraints:
  - No modernizations. The dispute is one thousand years old and reads accordingly.
  - Hold the gravity of the originative-vs-natural distinction; the hosts should feel that al-Kirmani is teaching domain-discrimination as the master habit of the discriminating reader.
  - The honorifics for the Prophet ﷺ, the Imams (peace be upon them), and the *awliyā'* are expanded on first occurrence per Phase 0c rules; subsequent mentions use the contracted form.
  - The Qur'anic verses are quoted verbatim from the named translator (Saheeh International) on first citation; thereafter the translator is implied.
  - The closing prayer — "God is the light of our intellects" — is the destination the bāb is walking toward; the hosts should not rush past it.
  - Do not turn the dispute into a competition between al-Islah and al-Nusra. Al-Kirmani's heart toward both is generous; the hosts should match that tone.
anchor_passages:
  - "Nothing precedes the First Intellect in its existence. It is the very act in which origination resides; behind it, there is only God, the Creator, the Almighty, whose existence is indicated. Since it is excluded that anything precedes it in existence, it is invalidated that it should be a body."
  - "Motion in what moves is that in which the thing in which it resides is something other than it, and possesses an existence of its own. Where existence of self exists in the presence of different things, the self is deficient and in need."
  - "In every instance where need is invoked, the movement in question is in a natural thing — as one of the causes of its perfection, like the motion of the heavens, which does not move because of need in itself for something it lacked at the moment of its origination, but rather because that motion is its perfection."
  - "The blessings overflow from the side of every rank. The reason that those blessings by which perfection is attained do not reach every being, and that the hudud do not hold them, is the incapacity of the receivers to accept them — corresponding to the strength of the one who is able to receive."
  - "God is the light of our intellects by means of these hudud, and we are made happy by following the pure stages of the divine sciences and the treasuries of the lights of al-Quds — may God's prayers be upon them."
