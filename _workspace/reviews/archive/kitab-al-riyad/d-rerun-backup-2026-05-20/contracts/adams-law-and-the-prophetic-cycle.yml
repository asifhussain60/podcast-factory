    - "Qur'an 42:13 (He has ordained for you of the religion what He enjoined upon Noah, and that which We have revealed to you, and what We enjoined upon Abraham, Moses, and Jesus — to establish the religion and not be divided in it) — al-Nusra's scriptural-omission anchor at Fasl 13; al-Kirmani's reading: Adam is excluded *technically* (not one of ulu al-'azm), not *substantively*"
    - "Qur'an 4:163 (Indeed, We have revealed to you as We revealed to Noah and the prophets after him, and We revealed to Abraham, Ishmael, Isaac, Jacob, the tribes, Jesus, Job, Jonah, Aaron, and Solomon) — al-Kirmani's parity-argument verse at Fasl 13: if non-mention proves no Sharia, non-mention here would prove no revelation to Adam — *impossible*"
    - "Alid line on the seven speaker-prophets (Adam the door, Nuh the ship, Ibrahim the friend, Musa the speaker, 'Isa the breath, Muhammad ﷺ the seal, the Qā'im the gathering — and every door that does not open into a house is no door at all) — paraphrased after the manner of Imam Ali ibn Abi Talib's sayings on the speaker-prophets; the bāb's compressed opening teaching"
    - "al-Sahifa al-Sajjadiyya (Imam Zayn al-'Abidin, peace be upon him; paraphrased) — the closing supplicatory line on *Your mercy in legislating is Your mercy in providing the road, and Your mercy in providing the road is Your mercy in commanding us to walk it*"
    - "al-Masabih fi al-Imama (al-Kirmani's own work) — referenced internally at Fasl 14 as the place where the full demonstration of the architecture of prescription is laid out"
    - "Rahat al-'Aql (Hamid al-Din al-Kirmani) — the longer corpus pointer carried across the prior bābs and continuing into Bāb 9"
