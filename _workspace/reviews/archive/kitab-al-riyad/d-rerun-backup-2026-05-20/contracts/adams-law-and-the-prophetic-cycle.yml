show_notes:
  blurb: "Across the first sixteen fusūl of Bāb 9, al-Kirmani opens the bāb on the central historical-architectural question: *did Adam, the first Speaker, bear a Sharia at all?* The lost *Kitab al-Mahsul* had divided the seven speaker-prophets into two: the *five determined ones* (Noah, Abraham, Moses, Jesus, Muhammad ﷺ) and *Adam in a different category*. Al-Islah reads the exclusion as *technical*: *taqrir* (determination) is *abrogating or renewing a prior Sharia*, and Adam, being first, had no prior — but he was still a Speaker, and Speakers bring laws. Al-Nusra reads the exclusion as *substantive*: Adam was the *first vicegerent*, *the teacher of the names*, *the one to whom the angels prostrated* — none of which requires *legislation*. The Qur'an's lists of those *to whom religion was ordained* (42:13) and *to whom revelation was sent* (4:163) *do not include Adam*. The omissions are deliberate. Across sixteen fusūl al-Kirmani refuses both extremes and builds the positive case on *the very condition of being human*. The bāb's first half walks through al-Islah's scriptural anchors — the sacrifice of the two sons (Quran 5:27), the *mansak* appointed for every nation (22:34), the *sanctuary-keepers* (22:67) — and al-Nusra's counter-anchors — the raven (5:31), the omissions, the angels' demurral (2:30). Fasl 6 opens the bāb's longest extended passage: the political-architectural ta'wīl of the Cain-Abel story. Both Cain and Abel believed in worshipping God; their dispute was *how to worship*. The *adversary* held *the outward only* (works without knowledge); the *wali* held *both* (works *and* knowledge — *the two acts of worship*). The Speaker accepts the wali's belief; the adversary, refusing the appointment, kills the wali. The wali's reply — *If you stretch out your hand to me to kill me, I will not stretch out my hand to you to kill you* (Quran 5:28) — is recognizably Alid. The *raven*, on the inner reading, is *Muhammad ibn Abi Bakr* — *among those specially chosen for the guardianship from religion, and from the opposite standpoint by lineage*. Fasl 9–10 establish the angels' prostration as *the first transmitted act of Sharia*: Adam is *al-mukhtar* (the Chosen, Quran 3:33), and Allah *cannot* command those below the Chosen except through him; the parallel in Quran 2:40–43 (Allah's command to the Children of Israel by way of Muhammad ﷺ) seals the architecture — *direct address* and *mediated transmission* coexist. Fasl 11–12 refute al-Nusra's counter that the angels are non-disobedient (and so cannot be *obligated*) and that Adam never explicitly *verbalized* the command. Fasl 13 delivers the reductio against scriptural-omission arguments: if non-mention in 42:13 proves *no Sharia*, non-mention in 4:163 would prove *no revelation* to Adam — and *no one* accepts the latter. Fasl 14–15 give the bāb's anthropological foundation: the *three souls* of the human (rational, irascible, appetitive) generate the *six gateways* of necessary prescription — worship, retaliation, marriage, property, the absent and the dead, the extraction of rights. *Adam was one of the humans; the six gateways are necessary; therefore Adam brought them.* Fasl 16 distinguishes the *always-necessary* gateways from the *cycle-variable* second tier of *worship and knowing the limits* — what *increases and diminishes according to the era in which a Speaker arises*. Adam, *being first*, opened both architectures: the always-necessary and the cycle-variable. The bāb's first half closes on Adam *prescribing, believing, and calling them to the two acts of worship in knowledge and in deed* — opening the architecture under which Episode 12 will see Nuh inherit the chain, the Ark stand as both *new Sharia* and *foundation/waliyy*, and the Qā'im close the doors of teaching at the Great Resurrection. The episode is enriched (per Phase 0e) with eleven Qur'anic anchors at the head (5:27–28 the two sons; 22:34 the *mansak*; 22:67 the sanctuary; 5:31 the raven; 2:34 *Prostrate to Adam*; 3:33 Adam chosen; 2:30 the angels' demurral; 2:213 the prophets sent; 2:40–43 the Children of Israel; 42:13 the omission; 4:163 the omission), an Alid line on the seven speakers as *door, ship, friend, speaker, breath, seal, gathering*, and a closing supplicatory paraphrase in the manner of Imam Zayn al-'Abidin (peace be upon him) on *Your mercy in legislating is Your mercy in providing the road*."
