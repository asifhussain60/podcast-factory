title: Adam's Law and the Prophetic Cycle
audience: Listeners who have followed Bāb 1 through Bāb 8 (Episodes 1–10) — the originative-emanative architecture, the perfected rational soul, the human as fruit of all the worlds, the cosmological dyads, and Bāb 8's closing teaching that *qadā* and *qadar* are architectural names for *the call's unfolding through history* — and who now want al-Kirmani's first historical-architectural payoff. Bāb 9 returns the architecture to its historical instances. The Da'wa names seven *speaker-prophets* (the nutaqa, nu-ta-qaa — Adam, Nuh, Ibrahim, Musa, 'Isa, Muhammad ﷺ, and the promised Qā'im). The lost *Kitab al-Mahsul* (ki-taab al-mah-sool) had counted *five* of the seven as *al-muqarrarun* (al-mu-qar-ra-roon; the determined ones) and placed Adam in a different category. The dispute al-Islah (al-is-laah) and al-Nusra (an-nus-rah) carry forward turns on what that division means. Al-Islah reads the exclusion as *technical* (Adam, being first, had no prior Sharia to abrogate or renew, so *the name* "al-muqarrar" does not apply — but he was still a Speaker, and Speakers bring laws). Al-Nusra reads the exclusion as *substantive* (Adam's role was foundational, not legislative — the angels' prostration, the teaching of the names, the vicegerency, but no body of laws). Across the bāb's first sixteen fusūl, al-Kirmani refuses the disputants' binary and builds the bāb's positive teaching that Adam *must* have borne a Sharia — not merely from al-Islah's textual proofs (which are sometimes thin) but from *the very condition of being human*. The bāb walks through the Qur'anic anchors (the sacrifice of the two sons at Quran 5:27; the *mansak* — man-sak; rite — appointed for every nation at 22:34; the raven and the burial at 5:31; the prostration at 2:34; Adam as al-mukhtar at 3:33; the omissions at 42:13 and 4:163), the political-architectural ta'wīl (ta-weel) of the Cain-Abel story as a *succession dispute* between *the adversary* (outward only) and *the wali* (wa-lee; outward and inward), the angels' prostration as itself *an act of Sharia transmitted through Adam*, the parallel structure of *direct address with mediated transmission* in Quran 2:40–43 (Allah's command to the Children of Israel *by way of Muhammad ﷺ*), and the anthropological argument from the human's *three souls* (rational, irascible, appetitive) that *no human community can stand without the architecture of legal prescription*. The episode closes on al-Kirmani's *six-gateway theory of Sharia's necessity* — worship, retaliation, marriage, property, the absent and the dead, the extraction of rights — and his refinement that the *cycle-variable* second tier of *worshipping God Almighty and drawing closer to Him through knowing His limits* is what *Adam's sending* added to the always-necessary minimum, opening the architecture that Episode 12 will see Nuh inherit and unfold toward the Qā'im (qaa-im) and the Great Resurrection.
