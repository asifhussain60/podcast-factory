key_tensions:
  - "The technical-versus-substantive reading of al-Mahsul's exclusion of Adam. Al-Islah reads *al-Mahsul* charitably: Adam is excluded from *al-muqarrarun* only because *taqrir* (determination) is defined as *abrogating or renewing a prior Sharia*, and Adam, being first, had no prior. But Adam is *al-natiq* — *a Speaker* — and Speakers, by being Speakers, bring laws. Al-Nusra reads the exclusion as *substantive*: the angels prostrated to Adam; he taught the names; he was the vicegerent — none of this requires *legislation*. The Qur'an's lists of those *who received religion* (42:13) and *to whom revelation was sent* (4:163) *do not include Adam*. The omissions are deliberate. Al-Kirmani's intervention refuses both readings' extremes — he accepts al-Islah's technical reading of the exclusion but builds the positive case for Adam's Sharia on *structural grounds* (the condition of being human) rather than on al-Islah's textual proofs alone (which are sometimes thin)."
  - "The hermeneutic principle of *ẓāhir-bāṭin* (thaa-hir-baa-tin; outer-inner) at Fasl 1–2. Al-Islah anchors Adam's Sharia in Quran 5:27 (*the news of the two sons of Adam*) and 22:34 (*for every nation We have appointed a rite*). Al-Nusra dismisses 5:27 as *the poetry of the Arabs* with *no benefit lying beneath it* — and reframes the verse as a *succession parable* (the two sons brought *cases* for who would succeed Adam, not actual offerings). Al-Kirmani's reply names the Da'wa's hermeneutic constant: *the inner does not cancel the outer; the outer carries the inner*. The Cain-Abel verse holds *both* meanings — the architectural ta'wīl of succession *and* the surface ratification of legislated sacrifice. The principle returns throughout the bāb."
  - "The political-architectural ta'wīl of the Cain-Abel story at Fasl 6. Both Cain and Abel believed in worshipping God; their dispute was *how to worship*. The *adversary* held that worship is *outward only* (works without knowledge); the *wali* held that worship is *both* (works *and* knowledge — *the two acts of worship* the bāb has been preparing since Bāb 4). The Speaker accepts the wali's belief because the wali holds the architecture *whole*; the adversary, refusing the appointment, kills the wali. The wali's reply — *If you stretch out your hand to me to kill me, I will not stretch out my hand to you to kill you* (Quran 5:28) — is *recognizably Alid*: the wali holds the architecture even under cost of death. The *raven*, on the inner reading, is *Muhammad ibn Abi Bakr* (mu-ham-mad ibn a-bee bakr) — *among those specially chosen for the guardianship from the standpoint of religion, and from the opposite standpoint by lineage*. The reading is *politically charged* and reads the first cycle in the architecture of the seventh."
  - "The angels' prostration as the *first transmitted act of Sharia* at Fasl 9–12. Al-Nusra had argued that the angels' prostration was *outside* Sharia — a separate divine command not transmitted through Adam. Al-Kirmani refuses on two grounds. First, the architecture of *al-mukhtar* (Adam as Chosen, anchored in Quran 3:33) means *Allah cannot command those below the Chosen except through the Chosen*. The command's path is *through* Adam; the angels' prostration is therefore *Adam's first act of Sharia*. Second, the structural parallel in Quran 2:40–43 — *O Children of Israel, remember My favor… establish the prayer, give the zakat, and bow with those who bow* — is *outwardly* a direct address from Allah but is *in fact* transmitted *by way of Muhammad ﷺ*. The same architecture must hold in the first cycle as in the seventh. *The verbalization of the command in the I/you form is not what makes a Sharia binding* — *the laws were established by the very fact that their conveyor was striving for them*. Were this not so, *'Isa would not have had a Sharia legitimately his*, since he did not strive militarily."
  - "The reductio against al-Nusra's scriptural-omission argument at Fasl 13. Al-Nusra had argued from Adam's non-mention in Quran 42:13 (*what He enjoined upon Noah, Abraham, Moses, Jesus*) that Adam had no Sharia. Al-Kirmani's parity argument: if non-mention proves *no Sharia*, then non-mention in 4:163 (*We have revealed to you as We revealed to Noah and the prophets after him* — Abraham, Ishmael, Isaac, Jacob, the tribes, Jesus, Job, Jonah, Aaron, Solomon) would prove *no revelation* to Adam. No one accepts the latter conclusion; the former argument fails by parity. The omission is *technical* (Adam is not one of *ulu al-'azm* — oo-lul azm; those of resolute determination), *not substantive*."
  - "The anthropological-structural argument at Fasl 14–15: the six gateways. Al-Kirmani refuses al-Nusra's reading of Sharia as *response to transgression* (laws exist because humans violate limits; if no transgression, no Sharia). The true reason for Sharia's necessity is *structural*: the human has *three souls* (rational, irascible, appetitive); each soul carries demands that *cannot be satisfied without architectural mediation*. The rational soul requires the prescriptions of *worship*; the irascible soul requires *retaliation and criminal law*; the appetitive soul requires *marriage* and *the regulation of property and transactions*. To these are added the architectures of *disposing of the absent and the dead* and *the extraction of rights from their withholders*. *Six gateways by which the courses of the races run, and under which lie the species whose existence among human beings is unceasingly necessary.* The architecture is not (only) a *response* to moral failure; it is the *condition* under which human community can stand at all. Adam was a human; he was sent to humans; the six gateways are *necessary*; therefore Adam must have brought them."
  - "The cycle-variable second tier at Fasl 16, and the bridge to Episode 12. *Some prescriptions are necessary at all times and seasons, and some are not. Some may exist at one time and not at the last, increasing and decreasing.* The *always-necessary* are the six gateways (present in any human community as the structural minimum). The *cycle-variable* are the *duties of worshipping God Almighty and drawing closer to Him through knowing His limits, by which perfection is attained* — and these *increase or diminish according to the era in which a Speaker arises*. Pre-Adamic communities had the minimum; *Adam's sending* added the cycle-tier — *He therefore prescribed, believed, and called them to the two acts of worship in knowledge and in deed*. The bāb's first half closes on the architecture's *reach*. Adam opened *both* — the always-necessary and the cycle-variable. Episode 12 will follow Nuh inheriting the architecture, the Ark as both *new Sharia* and *foundation/waliyy*, and the Qā'im *closing the doors of teaching* and opening the Great Resurrection."
tone_constraints:
  - The bāb's first half is built around al-Kirmani's *patient correction* of both disputants. He grants al-Islah the conclusion but refuses to rest it on al-Islah's sometimes-thin scriptural proofs alone; he refuses al-Nusra's denial entirely but always preserves what is *partial truth* in each objection. The hosts should slow at five architectural moments: Fasl 1 (the structural argument that *Speaker entails Sharia* before any scriptural anchor); Fasl 6 (the political-architectural ta'wīl of Cain-Abel as *the wali-and-adversary archetype* — the longest extended passage in the bāb's first half); Fasl 9–10 (the angels' prostration as *the first transmitted act of Sharia* under the Chosen-one architecture); Fasl 13 (the reductio against scriptural-omission arguments); Fasl 14–15 (the anthropological argument from the three souls and the six gateways).
  - The Cain-Abel ta'wīl at Fasl 6 is *politically charged* and reads the first cycle through the architecture of the seventh (Muhammad's). Al-Kirmani names *Muhammad ibn Abi Bakr* explicitly as the *raven*-figure — a son of Abu Bakr who *grew up in the household of the Commander of the Believers* and was killed in Egypt in 38 AH. The hosts should let the doubled register (the Qur'anic surface *and* the Da'wa's reading of *the wali killed by the adversary, the regret named as the recognition of perfect fidelity*) land without flattening it.
  - The honorifics for the Prophet ﷺ, the Imams (peace be upon them), the prophets (peace be upon them), and the awliya (guardians) are expanded on first occurrence per Phase 0c rules; subsequent mentions use the contracted form. *Sallallahu alayhi wa sallam* — peace and blessings of Allah be upon him — on first mention; thereafter contracted.
  - Qur'anic verses are quoted verbatim from Saheeh International on first citation; thereafter the translator is implied. The bāb's load-bearing anchors are Quran 5:27–28 (the two sons of Adam, the wali's reply), 22:34 (*for every nation We have appointed a rite*), 5:31 (the raven), 2:34 (*Prostrate to Adam*), 3:33 (Adam chosen), 42:13 and 4:163 (the omission-arguments), 2:213 (the prophets sent as bearers of good tidings), 2:30 (the angels' demurral), and 2:40–43 (the Children of Israel parallel).
  - The architectural metaphor that runs through the bāb is *the door, the house, the road*. The Alid line — *Adam is the door, Nuh the ship, Ibrahim the friend, Musa the speaker, 'Isa the breath, Muhammad ﷺ the seal, the Qā'im the gathering — and every door that does not open into a house is no door at all* — names the bāb's compressed teaching. Let the metaphor carry across the episode without being over-explained.
  - The closing Du'a paraphrase (*Your mercy in legislating is Your mercy in providing the road*) is the supplicatory destination of the bāb's analytic argument. The hosts should not rush past it. The bāb's vocation is to receive the architecture of *Adam's law* as *one continuous mercy* from the first door of Adam to the gathering of the Qā'im.
  - The anthropological argument at Fasl 14–15 carries Aristotelian-Avicennan ancestry (the tripartite soul: rational, irascible, appetitive). Note the lineage without importing it as if it were equivalent to the Da'wa's reading. Al-Kirmani's six gateways are not Aristotle's three souls; they are *what the three souls require* under the architecture of *legislated community-formation*. The architecture is the Da'wa's, not the philosophers'.
anchor_passages:
  - "Whoever claims that the first of the Speakers (peace be upon them) had no Shari'ah is in error. He has also erred in counting him among the determined ones (al-muqarrarun), as we have explained, because determination is only by abrogating a Shari'ah or by renewing it; and the first Speaker had no Shari'ah before him to abrogate, so the name of 'determined one' does not apply to him by what we have presented. — author of al-Islah, Fasl 1"
  - "The offering (al-qurban) is one of the laws, and it is the most firmly fixed of the foundations of the Shari'ah. Allah has commanded it in every Shari'ah, and He has made it the root of asceticism and purity… It is called an 'offering' (qurban) because by it they draw close (yataqarrabun) to Allah. By being close to Allah Almighty, it is the first cause of obedience and disobedience, of disbelief and faith, of command and prohibition; and it is the first of the laws of the Shari'ah. — author of al-Islah, Fasl 1"
  - "It is permissible that the apparent meaning hold true at the same time that the inner meaning holds true — especially since this verse does not belong to the kind of parabolic discourse that calls for interpretation and the setting aside of its apparent sense. If that is so, then everything apparent in the verse stands, and the law of Adam (peace be upon him) is thereby established. — al-Kirmani, Fasl 2"
  - "The wali believed that the worship of Allah Almighty consists in both: in the outward, which is works, and in the inward, which is knowledge — and that salvation is in both together. The one who stands in the place of the Prophet (peace), from the position of the Messenger (peace and blessings of Allah be upon him and his family), is established on that, and they disputed about it. — al-Kirmani, Fasl 6"
  - "I am under the command of the Speaker who stands in the place of God, who is the master of the Cycle, the Lord of the Imams; I am under his obedience, and I fear Him, and I will not do what you ask of me. — al-Kirmani, on the wali's reply, Fasl 6"
  - "Allah's command to the angels to prostrate — even if it appeared to come not from the side of Adam (peace be upon him) — was only effected through him… It has been proven that he is the Chosen one, as Allah says: 'Allah chose Adam and Noah' (Quran 3:33). If he is the Chosen one, then it is impossible that Allah command those who are below the Chosen one except through the Chosen one. So Allah's command to the angels to prostrate to Adam was effected only through him; and if it was through him, then the Sharia is established for him. — al-Kirmani, Fasl 9"
  - "The Prophet ﷺ did not say to the Children of Israel 'God commands you to establish prayer and give me zakat,' and yet there is no evidence that prayer, zakat, and all that he commanded them to do are not among the duties of Sharia. The laws were established by the very fact that their conveyor was striving for them. Were this not so, then Jesus (peace be upon him) would not have had a Sharia legitimately his, since he did not strive militarily — and this is invalid. — al-Kirmani, Fasl 12"
  - "If it is permissible for Adam to be excluded from the company of the people of Sharia for the reason that his name is not mentioned with the five (peace be upon them), it is also permissible because he is not mentioned among those to whom revelation was given… But this is impossible, and the saying is the saying of the author of al-Islah, taken from him. — al-Kirmani, Fasl 13"
  - "The closest thing to the need of mankind, foremost in their ranks, is what preserves them from destruction by means of the prescriptions through which blood is safeguarded and lives and property are secured, and by which they are redeemed in matters of necessity that arise among them. Were these not in place, their affairs would come to a halt and they would destroy one another, the strong oppressing the weak through power, on account of their anger at the wealth and other things he possesses, and the fires of strife would be kindled between them. — al-Kirmani, Fasl 14"
  - "These are six gateways by which the courses of the races run, and under which lie the species whose existence among human beings is unceasingly necessary. — al-Kirmani, Fasl 15"
  - "All these prescriptions belong to Sharia. They must be set forth first and prescribed among human beings at the beginning of their existence. And if these prescriptions are needed in the time of Adam (peace be upon him), who was one of the human beings, then upon him — and his angels — the laws of Islam are established. — al-Kirmani, Fasl 15"
  - "Whoever existed before Adam, his ruling is the ruling of whoever stands at the end of the seventh cycle, for example — in a manner that cannot dispense with the necessary prescriptions we have mentioned. Yet it could dispense with the prescriptions that fall under the genus of worship in drawing near to God Almighty… So God sent Adam (peace be upon him) to teach them and others, lest they remain uneducated, and lest they be rewarded only deficiently. — al-Kirmani, Fasl 16"
