show_notes:
  blurb: "Al-Kirmani opens the Kitab al-Riyad with an adjudication between two earlier Ismaili thinkers who disagreed over a single question — is perfection (kamāl) higher than the perfect (tamm), or the reverse? — and shows that the question itself dissolves once we ask which world we are talking about. Across thirteen sections he establishes the architecture that will govern the rest of the book: each thing is complete in itself; each thing is less than what stands above it; and the natural-world analogies that look decisive collapse when carried into the order of origination."
