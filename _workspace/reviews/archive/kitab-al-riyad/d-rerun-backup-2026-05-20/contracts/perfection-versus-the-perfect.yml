key_tensions:
  - "Kamāl versus tamm: is perfection the cause superior to the perfect, or the attribute inferior to its carrier? Al-Islah and al-Nusra fight on opposite premises."
  - "Domain confusion: al-Nusra's strongest arguments come from the natural world (carrier/carried, form/matter, sun/moon) but are being applied to the originative-emanative order, where the ladder inverts."
  - "Essence-completeness versus ranked-deficiency: the Soul is tamm in itself; the Soul is also less than the First Intellect by rank. Both true. Neither contradicts the other."
  - "The First Intellect cannot be an intermediary because nothing of its kind precedes it. The Ismaili Da'wa's whole cosmology depends on getting this category right."
tone_constraints:
  - No modernizations.
  - Hold the gravity of an adjudication; the hosts are walking a court session.
  - Both disputants are paraphrased; al-Kirmani's own ruling sentences are verbatim and should be quoted with that respect.
  - Honorifics for the Prophet ﷺ and Imam Ali (AS) are spelled out per Phase 0c rules at first occurrence only.
anchor_passages:
  - "If the intent of the author of al-Islah was that the First Intellect is in truth perfection — and that it is in truth what the author of al-Nusra described in this way — then they have been unjust to the author of al-Islah."
  - "The statement of the author of al-Islah is correct with regard to the world of origination and emanation, and the statement of the author of al-Nusra — even though the author of al-Islah is mistaken in his own framing — is correct with regard to the world of bodies and their accidents."
  - "If the moon were incomplete in itself, it would not have been able to receive light from the sun. Precisely because its essence is complete, it can receive from another."
  - "It is impossible for the First Intellect to be imagined as a medium, because its existence is the First Existence, and what is a First Existence is not called a medium."
