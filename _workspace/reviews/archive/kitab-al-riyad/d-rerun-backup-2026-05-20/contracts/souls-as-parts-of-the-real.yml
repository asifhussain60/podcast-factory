show_notes:
  blurb: "Across the eight fusūl of Bāb 4, al-Kirmani turns the dispute over whether the rational souls in this world are 'parts' of the universal Soul into a precise instrument of theological discrimination. Al-Islah's attempt to hold *parts*, *traces*, and *essences in themselves* together is shown to collapse under al-Nusra's diagnosis — but al-Nusra's strict part-arithmetic fails too, because the proposed whole has no inhabitable location at the lower rank. Al-Kirmani's corrective: the rational souls are a *second emanation*, neither parts of the universal Soul nor mere effects, but emanations at the second rank related to the universal Soul exactly as the universal Soul is related to the First Intellect at the top of the chain. The soul is a jewel-in-itself that *acquires its survival* through obedience and worship from the *hudud* — the named teaching ranks of the Da'wa — and *emits* in turn the abstract image that becomes its presence in the Hereafter. The soul is infinite in what it can accept, and this infinity is itself proof that the soul is not a body. The theological claims of the Da'wa — tawhid, prophethood, imamate, shari'a, revelation — do not depend on the part-language; they are anchored in another aspect of the Intellect entirely. And the Intellect *is* the Word: not cause-and-instrument but one thing under two names, per the teaching of Maulana Imam al-Mu'izz li Din Allah in *Ta'wil al-Shari'a*. The bāb closes on the prayer-architecture of devotion: *May Allah aid the believer who comes to know this according to his capacity in devotion to Allah and to His awliya.*"
