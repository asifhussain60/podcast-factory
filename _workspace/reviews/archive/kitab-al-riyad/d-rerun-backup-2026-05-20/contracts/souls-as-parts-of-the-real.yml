key_tensions:
  - "The predicate of 'part' (juz') in ordinary speech carries the freight of constitutive sharing — the part is a piece of the whole, the parts summed are the whole. The disputants are pressing this everyday word into the metaphysical work of describing the relation between partial souls in this world and the universal Soul above them. Al-Kirmani's whole bāb is the discriminating reader's training in when to refuse a predicate that has migrated from its proper domain."
  - "Al-Islah tries to hold three predicates at once — *parts*, *traces*, *essences in themselves* — and al-Nusra correctly diagnoses that the language cannot do all three jobs simultaneously. Al-Kirmani grants both critics what they were right about: al-Islah's instinct that the soul is not a body and so cannot be carved into pieces was correct; al-Nusra's instinct that the parts-and-essences predicates pull against each other was correct. But the corrective is not to pick one side — it is to introduce a new predicate that does the work neither *part* nor *trace* nor *effect* can do."
  - "Al-Kirmani's positive proposal: the rational souls are a *second emanation*, neither parts of the universal Soul nor mere effects of it, but emanations at the second rank related to the universal Soul (which is the first emanation) in the same architectural way the universal Soul is related to the First Intellect at the top of the chain. The hierarchy is not part-to-whole; it is emanation-to-emanation, rank to rank. *What occurred in the first of them is recapitulated in the last of them.*"
  - "The soul is constituted by what it receives from the *hudud* — the named teaching ranks of the Da'wa (the speaker-prophets, their wasi, the Imams, the hujjah). The receiving is by *obedience and worship*. The metaphysics of the soul is, at its core, a metaphysics of religious practice. The soul is a 'natural force that acquires what is gained from the hudud through obedience and worship,' and what it emits in turn is the abstract subsistent image that becomes its presence in the Hereafter — the second origin."
  - "The soul is infinite in what it can accept of the light from above, and this infinity is itself a proof that the soul is not a body. The body has a ceiling (the iron reaches a maximum red, the black body a maximum blackness); past the ceiling, no further effect is received and change-of-state occurs. The soul has no such ceiling. The contrast between bounded reception (bodies) and unbounded reception (souls) is one of the bāb's most decisive metaphysical claims."
  - "Al-Nusra had tied the theological doctrines of the Da'wa — tawhid, reward and punishment, prophethood, imamate, shari'a, revelation — to his metaphysical system, claiming that the part-language is what *upholds* those doctrines. Al-Kirmani's most important move is to *detach* the doctrines from the system: tawhid and prophethood are proved through 'another aspect of the Intellect' entirely, not through the part-whole picture. The doctrines stand whether or not the part-language is granted."
  - "The Intellect IS the Word, and the Word IS the Intellect — they are one thing under two names, not cause and instrument. Al-Kirmani cites Maulana Imam al-Mu'izz li Din Allah in *Ta'wil al-Shari'a* as the authority for this identity teaching. This is not al-Kirmani's innovation; it is his fidelity to a teaching given by the Imam of the family of the Prophet ﷺ. The metaphysical correction is at the same time an act of submission to the Imam's teaching authority."
  - "The prophets, at the limit of their purification, *see the architecture itself* — the chain of ranks, the unity of essence across ranks, the difference of rank that does not break the unity. *They came to stand at the limit at its end, and when they returned to themselves they realized that the transcendent selves are one thing in respect of wholeness, with no difference between them except in rank.* The prophetic ascent is not the soul becoming a *part* of the upper world; it is the soul at its limit perceiving the wholeness in which all the ranks participate."
tone_constraints:
  - The bāb is short (the second-slimmest in the treatise) but its work is among the heaviest of any so far — it introduces the predicate of *second emanation* that will carry the architectural weight of the rest of the treatise. The hosts should slow down for Fasl 4 (the positive proposal), Fasl 7 (the prophetic ascent), and Fasl 8 (the Intellect-and-Word identity teaching) — these are the densest moments and the easiest places for the listener to slip.
  - Hold the gravity of the part-language question. This is not a technical philosophical exercise; it is the architecture by which the soul's relation to its source is named without compromising either the soul's self-subsisting jewel-nature or the universal Soul's perfection at its rank. The discriminating reader is being trained for a habit that has theological weight, not just speculative interest.
  - The honorifics for the Prophet ﷺ, the Imams (peace be upon them), and the prophets (peace be upon them) are expanded on first occurrence per Phase 0c rules; subsequent mentions use the contracted form.
  - The Qur'anic verses are quoted verbatim from Saheeh International on first citation; thereafter the translator is implied.
  - Al-Kirmani's tone toward al-Islah and al-Nusra is unfailingly generous even when correcting them — the hosts should match that tone. The bāb is teaching by discrimination, not by victory. The unusual sharpness of the phrase *great unbelief — we seek refuge in God* in Fasl 4 is itself a teaching moment: al-Kirmani only reaches for that register when a metaphysical claim has dragged imperfection up into the originative order.
  - The closing benediction (*May Allah aid the believer who comes to know this according to his capacity in devotion to Allah and to His awliya*) names the moral condition under which the bāb's metaphysics can be received. The hosts should let it land — the metaphysics and the devotional life are one architecture, named twice.
  - Do not turn the dispute into a competition between al-Islah and al-Nusra. Each of them was reaching for a real piece of the truth; al-Kirmani is making both pieces fit together under a new predicate.
anchor_passages:
  - "The parts that are in us are traces of the First Essence, not parts of it. Our union with it is by way of the effects of the First Essence, not by its parts. — author of al-Islah, Fasl 1"
  - "This statement is confused and apparently contradictory, because he said that the parts that are in us are traces of the First Essence — but how can they be parts and at the same time relics, while also being essences in themselves? And the effects do not have power by themselves. — author of al-Nusra, Fasl 1"
  - "The statement of the author of al-Nusra — that the souls are jewels existing by themselves after acquisition, and that effects cannot exist by themselves — is true. — al-Kirmani, Fasl 1"
  - "He saw that what are integral are bodies that are inseparable from the nine accidents and are aware of the five senses, whereas the soul is not a body, nor is it overflowing with object in the manner of bodies. So he did not see fit to give it the name 'part,' lest it be run in the course of bodies. — al-Kirmani on al-Islah, Fasl 1"
  - "That the souls are parts of the universal soul rests on no proof… and if it is not possible for there to be a whole of these souls, then these are not parts of it. — al-Kirmani, Fasl 2"
  - "These souls were parts of the Second — and we found them neither knowing nor wise; not all of them are parts of this category, and a belief like that, to that extent, is great unbelief — we seek refuge in God. — al-Kirmani, Fasl 4"
  - "The souls are of the nature of those paradoxical essences whose existence is creative… It is a natural force that acquires what is gained from the hudud through obedience and worship. So it emits from itself an abstract subsistent image that is like the abstract things in the house of the Hereafter on the one hand, and the opposite of it on the other. — al-Kirmani, Fasl 4"
  - "Hence we say: this is the second origin, and our treatises on the Ma'ad include the mention of it, God willing. — al-Kirmani, Fasl 4"
  - "The truth is that the soul is infinite in what it can accept of what he described, and this is one of the proofs that the soul is not embodied. — al-Kirmani, Fasl 6"
  - "For those who wish to call them parts, these souls are effects insofar as they are rational. As such, the universal Soul and what she has produced are one thing — she is what is hers, distinguished from her offspring only by rank. So it is like the part of a thing in which the whole already exists. — al-Kirmani, Fasl 6"
  - "It has already been said that the souls are not parts or effects, but a second emanation… The prophets (peace be upon them) were able to perceive these things absent to them from the upper world after they had reached the level of perfection: they came to stand at the limit at its end, and when they returned to themselves they realized that the transcendent selves are one thing in respect of wholeness, with no difference between them except in rank. — al-Kirmani, Fasl 7"
  - "The Intellect is nothing but the Word itself, and the Word is none other than the Intellect itself; therefore it is correct to say what Maulana Imam al-Mu'izz li Din Allah (peace be upon him) said in the book *Ta'wil al-Shari'a*, where, speaking of intelligibles, he said that the Word is the Intellect, and that these names properly belong to it. — al-Kirmani, Fasl 8"
  - "But the Soul and Nature both emanate from the First Intellect, each according to its own proper measure, so that one of them is nobler than the other — and that is the First Emanation — and the rational souls are the Second Emanation. What occurred in the first of them is recapitulated in the last of them. — al-Kirmani, Fasl 8"
