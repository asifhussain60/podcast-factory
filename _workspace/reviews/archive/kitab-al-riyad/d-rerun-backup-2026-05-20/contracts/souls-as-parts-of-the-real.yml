title: Souls as Parts of the Real
audience: Listeners who have followed the dispute through Bāb 1 (Episodes 1–3), Bāb 2 (Episode 4), and Bāb 3 (Episode 5) and now want to see al-Kirmani turn the same dialectical apparatus onto the rational souls themselves — testing the predicate of "part" against the relation of partial souls to the universal Soul, refusing both the part-language and the mere-effect-language, and naming what survives the refusal: the rational souls as a second emanation.
