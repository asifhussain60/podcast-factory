key_tensions:
  - "The apologia at Fasl 1 — why this bāb must be written. Sheikh Abu Hatim (the Da'i of Rayy in the prior generation, composer of *al-Islah* against Abu Bakr al-Razi) *did not* correct what al-Kirmani is now correcting. Two readings of Abu Hatim's silence both fail. (a) *Endorsement* — that what Abu Hatim did not correct must be correct — fails because no Da'i is *the sufficient cover* for the sciences of religion. (b) *Failure* — that Abu Hatim *fell short of his obligation* — fails because the Da'wa is *cooperation, not replacement*: *the imams cooperate with one another like the twelve sources (al-ḥujaj), and like the senses, which perceive things in such a way that if one sense misses something, another perceives it without that second perception being a defect for the one that missed it or for the others*. The bāb's principle: the duty of correction is *no man's and every man's*; al-Kirmani writes *because* he can, not *despite* Abu Hatim's silence."
  - "The grammar of *al-shayʾ* and *la-shayʾ* at Fasl 2–7 — the first three corrections. Al-Mahsul opens its tawhid chapter with *He is the Creator of the thing — the rational thing, the imaginal thing, the intellectual thing, the logical thing*. The sentence is innocent if *the thing* is generic; it is impossible if *the thing* is *a name*. Al-Kirmani forces the impossible reading: al-Mahsul *does* use the term as a name (*the thing and nothing*; *He, and nothing with Him*), and once named *the thing* must be *prior to, with, or after* the First Intellect — none of which is possible. The cascading critique runs through *He, and nothing with Him* (covert shirk because *nothing*, once named, becomes a *positive*), through the language objection (*the words and letters of the composer, simple and compound alike, are all temporally generated*; *Allah is beyond minds and perceptions, behind a veil from understandings and thought*), through the Qur'anic anchor at Quran 3:18 (*Allah bears witness that there is no god but He* — *but He*, not *but Allah* — *even the name 'Allah' cannot stand at the place where the affirmation is finally lodged*)."
  - "The structural diagnostic at Fasl 8 — the intellect 'all at once' is the *second emanation*, not the First. Al-Mahsul's most consequential move: the First Intellect contains the images of the two worlds *in potency*, in a single creative pulse, *without those images being indicated by their identities at the level of intellect*. The picture has currency in earlier bābs of al-Riyad itself. Al-Kirmani refuses on the ground that *potency does not belong to the First Intellect at all*. What is *advanced in existence* — the First — is *dispensed* from the perception of what is within it; *it does not need to know more than its knowledge of itself, namely, that it is creative, and that its existence is not by itself but by another, who is its Creator*. The intellect in which images emerge *in potency*, and which is preceded by something to bring it into act, is the *second emanation* — the intellect of the speaker-prophet *who has the images of the worlds and from whom the harvest of these images has already come to exist*. The diagnostic — *did al-Mahsul mean 'First' but describe 'second'?* — fires through every subsequent fasl."
  - "The identity equation at Fasl 9–10 — unity is the intellect, not its cause. Al-Mahsul: *when the intellect's illness (ʿilla, cause) was the unity of the Almighty and the unity of eternity, the intellect became eternal*. The move makes *unity* prior and the intellect's eternity a *received predicate*. Al-Kirmani refuses: *unity is not a cause of intellect, and is not other than it so as to advance upon intellect; rather, it is intellect itself, and the intellect is the unity, which is the one*. The substitution from *X became Y by virtue of Z* to *X is Y is Z* closes the door on every grammar of intermediation. Fasl 10 walks the equation outward through the cascading identity — *cause, effect, creativity, creator, Perfect, Eternal, Existence, Essence — One*. The cascade is not a list of separate predicates of a single subject; it is the *refusal of separation*. Where Mahsul reaches for *intermediaries*, al-Kirmani replies that *intermediation* is what tawhid refuses."
  - "The eternity-of-images at Fasl 11–12 — the natural-world register. Al-Mahsul: *since the image was made manifest in the intellect from the One, the image too is eternal in the intellect*. Al-Kirmani concedes the move is *legitimate* but *only in the register of the natural-world intellects*: the speaker-prophets, the foundations, the Imams, and their followers who *came forth into intellect through their own words*. Their intellects do contain images that, through the prophet's perfection of receiving the eternal cause, attain *permanence* — eternity in the derived register. To apply this register to the First Intellect is to dissolve the distinction between Originator and originated. The soteriological cost is the bāb's most acute: if the eternity Mahsul describes belonged to the First, *the images would have no permanence, and there would be no return to the source from which they emerged… no hope, no fear, no reward, no recompense, and no punishment*. The Da'wa's salvation architecture requires the register-distinction."
  - "The shirk-naming at Fasl 13. Al-Mahsul: the First Intellect *is called creativity, because creativity comes from the Creator. With complete creativity, it is only complete.* The move has now named the First Intellect *Creator*. Al-Kirmani's reply is the bāb's most unambiguous: *this is shirk, plainly so; it is not permissible to say.* The *Creator* is the *Being prior to all things, not anything which is itself among things*. The diagnostic: every grammar that *names anything other than Allah with the name Creator* is shirk; the doctrine of tawhid is the doctrine of *what cannot be predicated*."
  - "The closing equation at Fasl 15 — creativity is the Creator. Al-Mahsul's most refined move: *creativity is an intermediary between Creator and created, an effect of the influencer upon the influenced; its existence is on the side of the creative agent, its effect on the side of the created in the thing affected*. Al-Kirmani's reply is the book's final argument. An *intermediary image* between Creator and created cannot itself be a *creature* (regress) and cannot be *uncreated* without being a second alongside Allah. The trichotomy collapses: similar-to-Allah gives a second example positing competence in each; not-similar requires a third preserving both; existence-from-Allah makes creativity *not an intermediary but the Creator's act itself*. *It is proven that creativity is the Creator; and if creativity is the Creator, then what the author of al-Mahsul said is in error.* The Da'wa's tawhid is the refusal of *the between*."
  - "The book's closing supplication. After *we have thus arrived at what we promised at the beginning of the book*, al-Kirmani turns from refutation into prayer in a single unbroken passage. *Tawhid and knowledge of the limits is difficult* — and *Allah Almighty knows that all His servants do not attain the degree by which they reach perfection in knowledge of the limits of Allah and in His tawhid — among them is in every age one man, perfect and chosen, like the Imam*. The Da'wa's anthropology lands: *salvation is in the two acts of worship*; *fulfilling its right, doing good deeds, and knowledge of the realities of things*. The prayer names *Muhammad, Ali, and the pure nation, and our Imam [the Ruler by the Command of Allah] and his fathers, peace be upon them, in the land of Jerusalem* — the convention by which the Fatimid Imam-Caliph al-Hakim bi-Amr Allah (under whose reign al-Kirmani composed the book) was named in formal Da'wa writing. The book of *judgment between the two reformers* closes on the supplication that judgment was for."
tone_constraints:
  - The bāb is the closing of the book and carries the most extended single shift in register that al-Riyad makes — from refutation to supplication. The hosts should slow at four architectural moments: Fasl 1 (the apologia for why this correction must be written when Abu Hatim did not write it); Fasl 8 (the structural diagnostic that fires through every subsequent fasl — *did al-Mahsul mean "First" but describe "second"?*); Fasl 13 (the shirk-naming, the bāb's most unambiguous moment); Fasl 15 plus the closing prayer (the equation *creativity is the Creator* and the book's last passage on the Imam, the gathering, and the intercession of Muhammad, Ali, the pure nation).
  - The bāb does not lean on Qur'anic anchors the way Bāb 9 did. The single load-bearing Qur'anic citation is Quran 3:18 (*Allah bears witness that there is no god but He* — *but He*, not *but Allah*) at Fasl 4 as the *language*-argument's hinge. Beyond that, the bāb operates in the register of *philosophical-theological grammar*: the predication-rules of tawhid, the proper use of *al-shayʾ* and *la-shayʾ*, the identity-cascade *cause/effect/creativity/Creator/Perfect/Eternal/Existence/Essence — One*.
  - The shirk-diagnosis at Fasl 13 is the bāb's most direct theological move. Al-Kirmani does not hedge; the hosts should not soften. *Plainly so* — *bayyināt al-shirk* — the naming of the First Intellect as *Creator* (al-Khāliq) is *shirk*. The diagnosis returns at Fasl 15 with the intermediary-image: any uncreated *between* posits a second alongside Allah. The hosts should let the diagnosis land in the register al-Kirmani gives it.
  - The closing prayer (after *we have thus arrived at what we promised*) is the book's destination. The hosts should not rush past it. The Imam named under *[the Ruler by the Command of Allah]* is al-Hakim bi-Amr Allah (al-haa-kim bi-amr al-laah), the sixth Fatimid Imam-Caliph (r. 996–1021 CE), under whose reign al-Kirmani composed al-Riyad. *His fathers* are the Fatimid line back through al-ʿAziz (al-a-zeez) and al-Muʿizz (al-mu-izz; whom al-Kirmani named earlier when invoking *Imam al-Muʿizz's well-known book*), back through the concealed Imams to Imam Jaʿfar al-Sadiq (jaa-far as-saa-diq) and ʿAli (peace be upon them). *The land of Jerusalem* (bayt al-maqdis, bayt al-maq-dis) names the eschatological gathering. The honorifics are exact and load-bearing.
  - The honorifics for the Prophet ﷺ, the Imams (peace be upon them), the prophets (peace be upon them), and the awliya (guardians) are expanded on first occurrence per Phase 0c rules; subsequent mentions use the contracted form. *Sallallahu alayhi wa sallam* — peace and blessings of Allah be upon him — on first mention; thereafter contracted.
  - The architectural arc Bāb 10 is closing — the chain that began at Bāb 1 with the First Originator and the soul as the first emanation, passed through the cosmological dyads of Bābs 2–7, the architecture of unfolding in Bāb 8, and the historical sequence of speaker-prophets in Bāb 9 — finds its theological frame here: the book's grammar of tawhid has been, all along, the grammar under which the Da'wa speaks. The hosts should let the arc *close* without forcing a recap; the closing prayer does the recap for them.
  - Sheikh Abu Hatim (a-boo haa-tim) here is *the Da'i of Rayy in the prior generation* — Abu Hatim al-Razi (a-boo haa-tim ar-raa-zee), composer of *Aʿlām al-Nubuwwa* and *al-Islah* — *not* Abu Hatim al-Sijistani the grammarian, and *not* Abu Bakr al-Razi the philosopher-physician (al-Razi is the *opponent* of al-Islah, not its author). The disambiguation matters; the hosts should clarify on first mention.
anchor_passages:
  - "The author of al-Mahsul, may God have mercy on him, exerted himself, exaggerated, and made up his mind concerning the right of the daʿwah and its sons, and concerning the opening of the gates of its landmarks, in what he composed from among the books of those charged with the work whose appearance he deferred. Sheikh Abu Hatim, may God have mercy on him, did not set this right, even though he was capable. — al-Kirmani, Fasl 1"
  - "The imams therefore cooperate with one another on all of the sciences — on awareness of them, on memorization of them — like the twelve sources (ḥujjas), so that each of them takes benefit from those whom God has appointed to him as a crisis-guide from the rightly guided sinless ones, peace and blessings of God be upon them. They are, in this respect, like one human being whose parts come together, and like the senses, which perceive things in such a way that if one sense misses something, another perceives it without that second perception being a defect for the one that missed it or for the others. — al-Kirmani, Fasl 1"
  - "In the chapter on monotheism: He is the creator of the thing — the rational thing, the imaginal thing, the intellectual thing, the logical thing — I mean, that which is beneath these elements, and that which is not beneath them. — author of al-Mahsul, Fasl 2"
  - "It is impossible for it to precede the intellect, since the intellect is the first act, behind which there is none but God Almighty, the One who issued it, and from whom it came into existence: it is pure innovation, and the prior existence — which is the first existence — is from God Almighty. — al-Kirmani, Fasl 2"
  - "The words and letters of the composer, simple and compound alike, are all temporally generated; and words, letters, and languages are merely instruments by which human beings convey to one another what is in themselves. He, the Almighty, is beyond minds and perceptions, behind a veil from understandings and thought — and without that veil, the paths of inquiry would be cut off. — al-Kirmani, Fasl 4"
  - "He said 'but He,' not 'but God,' and likewise. In the same way, Imam al-Muʿizz (may God's peace and blessings be upon him) indicated this in his well-known book, saying that He alone is, even if the word is a borrowed one. — al-Kirmani, Fasl 4 (on Quran 3:18)"
  - "In the first chapter on the Creator, the Almighty said: He created the world all at once. This is because He created the intellect in a single sentence, and within it the images of the two worlds emerged, along with what is in them — without those images being indicated by their identities at the level of intellect. — author of al-Mahsul, Fasl 8"
  - "This intellect — within which the images of the worlds emerged along with what is in them — it is not permissible for this to be the First Intellect that exists from God in the first place… What he mentioned is the intellect that emanates from the natural world — not the First Intellect — supporting what we have said: that it is the most prominent of the images of the worlds. — al-Kirmani, Fasl 8"
  - "When the intellect's illness was the unity of the Almighty and the unity of eternity, the intellect became eternal. — author of al-Mahsul, Fasl 9"
  - "Unity is not a cause of intellect, and is not other than it so as to advance upon intellect; rather, it is intellect itself, and the intellect is the unity, which is the one. — al-Kirmani, Fasl 9"
  - "It is the cause, it is the effect, it is the creativity, it is the creator, and it is the Perfect — the Perfect, which is the Eternal, the Eternal, the Existence, and the Essence. One. — al-Kirmani, Fasl 10"
  - "If the images were not creatively brought forth in eternity, they would have no permanence, and there would be no return to the source from which they emerged bearing the image. They would have perished and faded, and there would be no hope, no fear, no reward, no recompense, and no punishment. — al-Kirmani, Fasl 11"
  - "His saying is mistaken on two counts. The first is that he names the intellect Creator and makes it like its Creator, of whom he said it is perfect — this is shirk, and it is not permissible to say, because Allah is free in His essence from perfection and from completion bound up with His creative act. — al-Kirmani, Fasl 13"
  - "How is it permissible for anything to precede the First Intellect, so as to be a means of action between it and what is below?… Given the impossibility of anything being prior to the First Intellect, there is nothing above the thing except the Thing of the Almighty. And if that is also the Word, it is the Cause, it is Oneness, and it is the Intellect. Allah suffices us, and He is the best Trustee. — al-Kirmani, Fasl 14"
  - "Creativity is an intermediary between Creator and created, an effect of the influencer upon the influenced. The image of creativity is intermediate between the doer and the object, and its existence is on the side of the creative agent, while the effect of the image is found on the side of the created in the thing affected. This image — I mean creativity — has thus come to be in the Creator, the Almighty. — author of al-Mahsul, Fasl 15"
  - "It is proven that creativity is the Creator; and if creativity is the Creator, then what the author of al-Mahsul said is in error, and let him avoid it, if Allah wills. We have thus arrived at what we promised at the beginning of the book. — al-Kirmani, Fasl 15"
  - "Tawhid and knowledge of the limits is difficult, involving the life and survival of souls and their salvation from the world of nature and its impossibilities… among them is in every age one man, perfect and chosen, like the Imam, may Allah's prayers be upon him… there is no way except by adopting the two acts of worship and fulfilling the truth from them in knowledge and action, both outward and inward, and being keen to preserve them. — al-Kirmani, closing prayer"
  - "May Allah place us and the body of believers in the east of the earth and its west — those who conclude their lives with goodness — and may our sustenance and their intercession be the intercession of Muhammad, Ali, and the pure nation, and our Imam [the Ruler by the Command of Allah] and his fathers, peace be upon them, in the land of Jerusalem with His mercy and compassion. — al-Kirmani, closing prayer"
  - "Then we conclude the book with praise to Allah, Lord of the Worlds, and prayers upon the best of the first and the last, Muhammad, the family of the Imams, and the guiding Imams. And we say: there is no power but from Allah the Almighty, what Allah wills; I ask Allah for forgiveness, and I delegate my affair to Allah, sufficient is Allah, yes the Trustee, yes Allah, yes the Supporter. Praise be to Allah unto the praise of Him, and prayers upon Muhammad and his good, pure family, all of them. — al-Kirmani, book's doxological close"
