title: Tawhid and the First Originator
audience: Listeners who have followed Bāb 1 through Bāb 9 (Episodes 1–12) — the originative-emanative chain, the perfected rational soul, the cosmological dyads, qadā and qadar as the architecture of the call's unfolding, and the historical sequence of speaker-prophets from Adam through Nuh, Ibrahim, Musa, 'Isa, Muhammad ﷺ, and the promised Qā'im (qaa-im) — and who now want al-Kirmani's closing turn from the *disputants* to *the source they disputed*. The lost Kitab al-Mahsul (ki-taab al-mah-sool), which al-Islah (al-is-laah) and al-Nusra (an-nus-rah) carried forward across nine bābs, had itself erred — on the most foundational doctrine of all: tawhid (taw-heed) and the First Originator (al-Bāriʾ, al-baa-ri). Sheikh Abu Hatim (a-boo haa-tim) — the Da'i of Rayy in the prior generation, composer of *al-Islah* against Abu Bakr al-Razi (a-boo bakr ar-raa-zee) — did not correct what here needed correcting. Al-Kirmani names that no fault on Abu Hatim's part: *the imams cooperate with one another like the senses; if one sense misses something, another perceives it without that second perception being a defect for the one that missed it or for the others*. Yet the duty of religion makes the correction obligatory, and the *chapter on tawhid is the first of what comes first* — error there ramifies forward into every doctrine downstream. Across the bāb's fifteen fusūl al-Kirmani refutes seven distinct moves in Mahsul's tawhid chapter — (1) the positing of *al-shayʾ* (ash-shay; "the thing") and *la-shayʾ* (laa shay; "nothing") as creatures of God falling under His ibdāʿ (ib-daa; origination); (2) the formulation *"He, and nothing with Him,"* which al-Kirmani exposes as covert shirk (shirk) by smuggling *nothing* in as a *positive*; (3) the claim that the intellect "in which the images of the two worlds emerge all at once" is the First Intellect (al-ʿaql al-awwal, al-aql al-aw-wal); (4) the claim that *unity* is the *cause* of the First Intellect's eternity; (5) the claim that the eternity of *images* in the intellect follows from the intellect's own eternity in the same register as the First; (6) the claim that the First Intellect "becomes like the Word" through some affecting eternity with no intermediary; (7) the claim that *creativity* (al-ibdāʿ) is an *intermediary* between Creator and created. The diagnostic instrument across all seven critiques is the same: what al-Mahsul has predicated of the First Intellect, the First Originator, and the act of origination is true only of *the intellects that emerge from the natural world* — the intellects of the speaker-prophets (al-nutaqā', an-nu-ta-qaa), of the foundations (al-asās, al-a-saas), of the Imams (i-maam) and their followers. The First Intellect cannot be confused with the second emanation; the First Originator cannot be predicated as a creative agent in possession of creativity; tawhid requires that *creativity is the Creator*, not a separable image between Him and what He brings forth. The bāb — and the book — closes on al-Kirmani's most extended closing reflection: *tawhid and knowledge of the limits is difficult; one man, perfect and chosen, the Imam, attains it in every age; salvation is in the two acts of worship; we ask Allah to gather us with our Imam* — naming, beneath the convention of *[the Ruler by the Command of Allah]*, the Fatimid Imam-Caliph al-Hakim (al-haa-kim) under whose reign al-Kirmani composed the book. The episode lands the book on its destination: the *judgment between the two reformers* has been, all along, the architecture of the Da'wa's tawhid spoken under the supplication that judgment itself was for.
