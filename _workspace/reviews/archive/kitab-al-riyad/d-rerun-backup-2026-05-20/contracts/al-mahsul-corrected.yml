show_notes:
  blurb: "Across Bāb 10 — the closing bāb and the hinge on which the book settles its theological ground — al-Kirmani turns from *the disputants* (al-Islah and al-Nusra) to *the source they disputed*. The lost Kitab al-Mahsul itself, composed by an earlier Da'i of the Da'wa, had erred on the most foundational doctrine of all: tawhid and the First Originator. Sheikh Abu Hatim — the Da'i of Rayy whose *al-Islah* set itself to defending Mahsul against al-Razi's attacks — *did not* correct what here needed correcting. Al-Kirmani names that *no fault on Abu Hatim's part*: *the imams cooperate with one another like the senses; if one sense misses something, another perceives it without that second perception being a defect for the one that missed it or for the others*. Yet the duty of religion makes the correction obligatory, and *the chapter on tawhid is the first of what comes first*. Across fifteen fusūl al-Kirmani refutes seven distinct moves in Mahsul's tawhid chapter — (1) *al-shayʾ* and *la-shayʾ* as creatures (Fasl 2–7); (2) *He, and nothing with Him* as covert shirk (Fasl 4); (3) the intellect 'all at once' as the *second emanation*, not the First (Fasl 8); (4) *unity* as the *cause* of the First Intellect's eternity (Fasl 9–10); (5) the eternity of *images* in the natural-world register, not the First (Fasl 11–12); (6) the First Intellect 'becoming like the Word' through affecting eternity (Fasl 12); (7) *creativity* as an *intermediary* between Creator and created (Fasl 13–15). The diagnostic across all seven is the same: what al-Mahsul has predicated of the First Intellect, the First Originator, and the act of origination is true *only* of the *intellects that emerge from the natural world* — the intellects of the speaker-prophets, of the foundations, of the Imams, and of those who follow them. The First Intellect is not a container; the First Originator is not a creative agent in possession of creativity; tawhid requires that *creativity is the Creator*, not a separable image between Him and what He brings forth. The closing equation at Fasl 15 is the book's last argument: *It is proven that creativity is the Creator; and if creativity is the Creator, then what the author of al-Mahsul said is in error. We have thus arrived at what we promised at the beginning of the book.* The bāb does not close where the argument ends. After *we have thus arrived at what we promised*, al-Kirmani turns from refutation into supplication in a single unbroken passage. *Tawhid and knowledge of the limits is difficult; one man, perfect and chosen, the Imam, attains it in every age; salvation is in the two acts of worship.* The closing prayer names *Muhammad, Ali, and the pure nation, and our Imam [the Ruler by the Command of Allah] and his fathers, peace be upon them, in the land of Jerusalem with His mercy and compassion* — the convention by which the Fatimid Imam-Caliph al-Hakim bi-Amr Allah (under whose reign al-Kirmani composed the book) was named in formal Da'wa writing. The book of *judgment between the two reformers* closes on the supplication that judgment was always for. Across ten bābs and one hundred and fifty-seven fusūl, al-Riyad has produced not a *novel doctrine* but the *grammar* under which the Da'wa's doctrine of tawhid was always being held: *creativity is the Creator*; the Originator does not stand on intermediaries; the *between* of doer-and-object collapses into the *one* of *He, and Him alone*."
