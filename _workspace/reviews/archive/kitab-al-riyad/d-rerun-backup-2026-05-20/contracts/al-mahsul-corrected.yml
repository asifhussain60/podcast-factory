  references:
    - "Qur'an 3:18 (Allah bears witness that there is no god but He, and so do the angels and those of knowledge — standing firm in justice — there is no god but He, the Almighty, the Wise) — Fasl 4's load-bearing language anchor: *'but He,' not 'but Allah'*; even the name 'Allah' cannot stand at the place where the affirmation is finally lodged"
    - "Kitab al-Mahsul (lost work of an earlier Da'i of the Da'wa, attributed in the tradition to al-Nasafī or to one of his generation; transmitted only through the second-order voices of al-Islah and al-Nusra) — the source al-Kirmani is correcting in this bāb"
    - "al-Islah (Abu Hatim al-Razi, Da'i of Rayy, d. 322/934) — the defense of al-Mahsul against Abu Bakr al-Razi the philosopher-physician; the Da'i whose silence al-Kirmani names as no fault under the cooperation-of-the-senses image"
    - "al-Nusra (Abu Yaʿqub al-Sijistani, d. ca. 361/971) — the further defense of al-Mahsul against the criticisms al-Islah had not fully met; carried forward by both disputants across the nine prior bābs of al-Riyad"
    - "Abu Bakr al-Razi (Muhammad ibn Zakariya, d. 313/925) — the philosopher-physician whose anti-prophetic-religion work *Aʿlām al-Nubuwwa* al-Islah was written against; *not* the al-Razi being corrected here"
    - "al-Rawda (Hamid al-Din al-Kirmani's own earlier epistle on monotheism and language) — referenced internally at Fasl 4 as the place where the full demonstration of the language-argument is laid out (Allah is *beyond minds and perceptions, behind a veil from understandings and thought — without that veil, the paths of inquiry would be cut off*)"
    - "Imam al-Muʿizz li-Dīn Allāh's well-known book (the Fatimid Imam-Caliph al-Muʿizz, d. 365/975; the work referenced is in the tradition his *Taʾwīl al-Daʿāʾim* or one of the Cairo-court Imami treatises on tawhid) — referenced at Fasl 4 as confirming the Qur'an 3:18 reading: *He alone is, even if the word is a borrowed one*"
    - "Rahat al-'Aql (Hamid al-Din al-Kirmani's major systematic treatise) — the longer corpus pointer carried across the prior bābs; al-Riyad's closing pulls back into the same authorial frame"
    - "al-Hakim bi-Amr Allah (the sixth Fatimid Imam-Caliph, r. 386–411/996–1021) — the Imam named under the convention *[the Ruler by the Command of Allah]* in the closing prayer; the Imam under whose reign al-Kirmani composed al-Riyad and to whose court he was attached as a senior Da'i"
    - "The Fatimid Imam-line back through al-ʿAziz (5th Fatimid Imam-Caliph, d. 386/996), al-Muʿizz (4th, d. 365/975, who established Cairo), and the prior Imams to Imam Jaʿfar al-Sadiq (6th Imam, d. 148/765) and ʿAli ibn Abi Talib (peace be upon them) — *his fathers* in the closing prayer"
    - "bayt al-maqdis (the eschatological gathering-place in the Da'wa's tradition; *the land of Jerusalem* in the closing prayer) — the destination of *those who conclude their lives with goodness*"
