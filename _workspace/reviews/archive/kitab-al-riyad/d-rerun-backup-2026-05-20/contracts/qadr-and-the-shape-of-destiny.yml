    - "Qur'an 41:53 (We will show them Our signs in the horizons and in their own selves until it becomes clear to them that it is the truth) — the verse al-Kirmani anchors at Fasl 18 to ground his reading of *Flee from God's decree to His destiny* as *the prophet's reception of the qadā through which the qadar of revelation is read*"
    - "Qur'an 70:6–7 (They see it as far off, but We see it as near) — the verse al-Kirmani cites at Fasl 8 to ground the third sense of *qadar* (the world together with its parts, predestined in respect of the necessity of its existence)"
    - "Qur'an 18:77 (they found in it a wall about to collapse, and he set it up) — the verse al-Islah invokes at Fasl 16 in his reading of *Flee from God's decree to His destiny* through the image of the leaning wall and the story of Moses and Khidr"
    - "Qur'an 97:1–5 (Indeed, We sent the Quran down during the Night of Decree — *Laylat al-Qadr*) — the Qur'anic anchor for al-Kirmani's reading at Fasl 6 of *Laylat al-Qadr* as the Night of the Qā'im in the Da'wa's interpretation"
    - "Qur'an 12:41 (the matter concerning which you consult has been decreed — *quḍiya*) — the verse al-Islah cites at Fasl 1 for the sense of *qadā* as *finished, separated, cut*"
    - "Qur'an 13:39 (God effaces what He wills and confirms — *yamḥū Allāhu mā yashāʾu wa yuthbit*) — the verse al-Islah invokes at Fasl 10 in his reading of *qadar* as the *book of changes and alterations*"
    - "Sahih al-Bukhari, *Kitab al-Witr*, hadith 1425 and Sahih Muslim, *Kitab al-Musafirin*, hadith 770 (the Witr supplication: *protect me from the evil of what You have decreed — for indeed You decree, and none decrees over You*) — the prophetic supplication that names the architecture of decree-and-destiny from the side of bodily worship, paralleling al-Kirmani's analytic register at Fasl 16–19"
    - "Nahj al-Balagha / Ghurar al-Ḥikam tradition (Decree and destiny are two of Allah's secrets; do not unfold them, lest the unfolding undo you) — paraphrased in the manner of Imam Ali ibn Abi Talib's sayings on the secret of qadāʾ and qadar; the Alid line that names the bāb's compressed teaching from the side of humility before the architecture"
    - "al-Sahifa al-Sajjadiyya (in the manner of Imam Zayn al-'Abidin's supplications, paraphrased) — *let what I know carry me to what I do, that I be not a knower without deeds nor a doer without light* — the Du'a-side counterpart to al-Kirmani's Fasl 23 teaching on the inseparability of knowledge and deed"
    - "Rahat al-'Aql (Hamid al-Din al-Kirmani) — referenced by al-Kirmani himself at Fasl 9 as the place where the full demonstration of the originative-emanative architecture and the perfected rational intellect is laid out; the present bāb offers a summary anchored in the longer work"
    - "Ta'wil al-Shari'a (Maulana Imam al-Mu'izz li-Din Allah Ma'add ibn Isma'il, peace be upon him) — the Fatimid Imam's work paraphrased in the manner of his teaching on the Pen and the Tablet as two names of the originative dyad; the Imamic authority behind al-Kirmani's reading of Quran 54:49 at Fasl 10–15"
