key_tensions:
  - "Al-Islah's tailor-and-garment analogy vs al-Nusra's three-stage refinement. Al-Islah says *qadar* (estimation) precedes *qadā* (detail/cutting) — the tailor estimates before he cuts. Al-Nusra refines: the *form* of the sewing in the tailor's *soul* precedes the estimation, so judgment (the form-in-soul) precedes destiny. Al-Kirmani's verdict is doubled — both readings yield the same architectural result (qadā and qadar are prior and subsequent), but *both have built upon a meaning of qadā and qadar that belongs to the world of the body, not the world of creation*. The tailor's craft is *natural process*; *qadā* and *qadar* in the speech of the Da'wa name a different architecture entirely."
  - "The threefold-by-threefold replacement at Fasl 3–8. *Qadā* names: first, *the speaker-prophet* (the natiq, naa-tiq — the figure in whom the call goes out into act); second, *the elimination of what came out of the potency of revelation* — souls taken from potency into act through the *hudud*; third, *the elimination of what came out of act* — the necessary unfolding of events. *Qadar* names: first, *the promised Qā'im* (qaa-im) — the figure in whom what is destined waits in potency, the architecture behind *Laylat al-Qadr* (lay-lat al-qadr); second, *the Sharia and parables* the Prophet ﷺ brought, *which carry the force of the sciences and the gnosis that the soul needs in its passage to maturity*; third, *the world together with its parts*. The architecture relocates the dispute from cosmological metaphysics into the architecture of *the call's unfolding through history*."
  - "Al-Kirmani's *charitable reading* of the disputants' partial truths after Fasl 8. *Each disputant is right on one pairing of the three; each is wrong on the others.* Al-Islah's *qadar precedes qadā* holds in the *second sense* of each term: the revelation (qadar) precedes the interpretation (qadā). Al-Nusra's *qadā precedes qadar* holds in the *first sense*: the Speaker-Prophet (qadā in the first sense) precedes the revelation he brings (qadar in the second sense). The disputants' instinct is sound; their univocal meanings are not. Al-Kirmani's threefold-by-threefold framework is what *holds them all*."
  - "The aql-hadith correction at Fasl 9. *When God Almighty created the intellect, He finished the worlds with it, because it is the compendium of the images of the worlds* — the report al-Nusra cites to ground judgment-as-prior. Al-Kirmani refuses: *the intellect that holds the images of the worlds is not the first creative intellect, nor is it the second intellect, but rather the intellect that rises out of the world of nature by acquiring works and knowledge*. The hadith names the *rational soul perfected through the two acts of worship* — the *intellect-in-act* of Bāb 4's architecture, not the originative First Intellect. *The First Intellect does not need an intellect below it, nor does it apprehend such, because it is in its own self, from eternity, complete, enduring, and one.* The teaching is at once architectural correction and anthropological promise."
  - "Al-Islah's reading of Quran 54:49 (*Indeed, all things We created with predestination*) under the imagery of pen, tablet, and writer (Fasl 10–15). The verse, on al-Islah's reading, is the Qur'anic charter for *qadar as the unfolded fullness of what the prior contains*. Al-Kirmani accepts the architecture but reads the verse differently: *the I* is *the Self not tainted by any attribute*; *every thing* is *what the religion needs* (not abstract universal essence); *We created it* names *an image by which the two worlds came to be*; *by a determined measure* is *that by which the matter is established*. The architecture is the *al-Qalam wa al-Lawh* — the Pen and the Tablet — mapped onto Intellect and Soul; *qadar* names *the measure of religion-architecture for the soul*, not the cosmological emanation of essences abstractly considered."
  - "The Prophet's hadith *Flee from God's decree to His destiny* and the three meanings al-Nusra adduces (Fasl 16–19). Al-Islah reads it as flight *from the carried-out back to the predestined*, anchored in the anecdote of the leaning wall and the Qur'anic *wall about to collapse* of Moses and Khidr (Quran 18:77). Al-Nusra offers three meanings: (1) the previous as *al-sabq* (support), the next as *al-tarkib* (composition), the natiq as author of the Sharia; (2) the link between intellect and community; (3) flight from the intensity of the previous, as *al-Jadd* (the Grandfather) was overwhelmed. Al-Kirmani reads it as *a saying about how the Prophet ﷺ received and opened revelation*: the *universes (al-akwan)* are *the judgment of Allah, which inevitably goes out into action by His destiny*; the cosmic horizons in their motion are the *qadā* through which the *qadar* of revelation is read (anchored in Quran 41:53)."
  - "The political-historical rereading of Moses on the mountain at Fasl 20–22. Al-Islah and al-Nusra both read Quran 7:143 (*show me that I may look upon You*) as a metaphysical lesson about *what cannot be seen of God* and/or as a story about *al-Jadd overwhelmed*. Al-Kirmani rereads it as *a story about Moses (peace be upon him) at a particular political moment*: Moses lived *in a time of concealment*, saw in himself the *power and ability for politics*, and asked the *author of the Command* — *who is Shu'ayb (shu-ayb)*, his master and guide — *command me, and I will manage this matter and lift the grief*. The mountain is *this man who has worldly power, equipment, and capacity* — a political-historical figure who *could have stood* but did not. The verse teaches the architecture of *political timing* under *qadar*: *every matter has its time and season*; *this time is not the time*."
  - "The decisive refutation of antinomianism at Fasl 23. Al-Nusra had read Quran 5:93 as permission for *the prophets to abandon the use of the laws*. Al-Kirmani refuses absolutely: *the verse contains no mention of permission for the prophets to abandon the use of the laws*. The verse's proper reading is *a license under three conditions* (fear of God in the way of His Messenger; obedience to the Messenger and his successor; obedience to the Imam) for the preachers to *study the sciences of other peoples* as a weapon for establishing the truth. The license is *to consider*, *not to abandon*. The bāb's compressed closing principle: *every interpretation that leads to declaring permissible what Allah has forbidden, or forbidding what He has permitted, or altering the ranks of the limits of Allah Almighty, is a corrupt interpretation*."
  - "The discipline of *listening* the bāb teaches across its closing. The Imam Ali line — *decree and destiny are two of Allah's secrets; do not unfold them, lest the unfolding undo you* — names the bāb's compressed teaching from the side of humility. The Imam Zayn al-'Abidin line — *let me be the listener at the foot of the table, not the disputant about the order of the letters* — names the bāb's vocation as a prayer. The bāb is, in the end, a sustained discipline of receiving the architecture of decree-and-destiny under the architecture of *the call* — refusing to let the metaphysics of destiny become a quarrel over word order, and returning to the *speech* of the prophets and the Imams under whose architecture *qadā* and *qadar* hold the soul's road from beginning to end."
tone_constraints:
  - The bāb is the longest in the treatise after the opening Bāb 1 (8,376 source words across 24 fusūl) and the densest doctrinally. Al-Kirmani's tone is patient and discriminating — he refuses the disputants' partial readings but always preserves what is *charitably right* in each. The hosts should slow down at five architectural moments: Fasl 1–2's diagnosis that both disputants have *built on what belongs to the world of the body*; Fasl 3–8's threefold-by-threefold replacement (each of the six meanings carries doctrinal weight for the rest of the treatise); Fasl 9's correction of the aql-hadith (the perfected rational soul, not the First Intellect, is the *compendium of the worlds*); Fasl 20–22's political-historical reread of Moses on the mountain (the most surprising movement in the bāb); and Fasl 23's refutation of antinomianism (the bāb's most forceful moment).
  - The phrase *Flee from God's decree to His destiny* (the Prophet's hadith at Fasl 16) is treated by both disputants and by al-Kirmani as a load-bearing teaching on the architecture of decree-and-destiny. The hosts should let the phrase land with the gravity al-Kirmani gives it — not as a paradox but as a teaching about *how the Prophet ﷺ received and opened revelation*. The hadith's place in the prayer-discipline of the Witr (Bukhari 1425 / Muslim 770: *protect me from the evil of what You have decreed*) gives the supplicatory register the bāb's analytic register doubles.
  - The honorifics for the Prophet ﷺ, the Imams (peace be upon them), the prophets (peace be upon them), and the awliya (guardians) are expanded on first occurrence per Phase 0c rules; subsequent mentions use the contracted form. *Sallallahu alayhi wa sallam* — peace and blessings of Allah be upon him — for the Prophet ﷺ on first mention; thereafter contracted.
  - Qur'anic verses are quoted verbatim from Saheeh International on first citation; thereafter the translator is implied. The four anchor verses (54:49, 36:82, 7:143, 5:93) are load-bearing — let each land with the architecture al-Kirmani assigns it.
  - Treat the political-historical rereading of Moses-and-Shu'ayb at Fasl 20–22 with the architectural weight it carries. This is *not* a flight away from the metaphysical reading toward a purely political one; it is al-Kirmani's signature interpretive style — *the verse names the architecture of qadar in narrative*, and the narrative is at once *what happened with Moses* and *what is happening with every soul standing at the seam of its time*. Do not flatten the doubled reading into a single register.
  - Hold the gravity of the antinomian refutation at Fasl 23. The architecture of *qadar* — the architecture of revelation as bearer-in-potency of all the soul needs — *does not* authorize the soul to step out of the law it brought down. The two acts of worship (knowledge and deed) remain binding *so long as the person is alive*. The bāb's closing principle is the bāb's most direct teaching on the Da'wa's discipline against antinomian readings; the hosts should not soften it.
  - The Pen-and-Tablet imagery at Fasl 10–15 carries deep Ismaili pedigree (al-Qalam — al-qa-lam — as the First Intellect; al-Lawh — al-lawh — as the Soul; the *writer* as the originative apex). Let the architecture land in its Qur'anic vocabulary (Surat al-Qalam 68:1; Surat al-Buruj 85:22 on the *Preserved Tablet*; Surat al-A'la 87:18–19 on the *first scriptures*), but do not dilute the Ismaili reading by importing alternative Sunni or philosophical readings as if they were equivalent. The Da'wa's reading is specific; the bāb is operating inside it.
  - Treat the Qā'im (qaa-im) — *the promised Qā'im, the one promised by Adam (peace be upon him) and by the Prophet who safeguards his call* — with the doctrinal weight Fasl 6 gives him. The Qā'im is the figure of *what is destined to come forth from potency at the end of the cycle of concealment*; *Laylat al-Qadr* is, in the Da'wa's reading, the Night of the Qā'im. The hosts should name this clearly without speculation, anchored only in what al-Kirmani says.
anchor_passages:
  - "As for saying that judgment (qadā) is the prior and destiny (qadar) is the subsequent — this is incorrect, because destiny is before judgment. 'Judgment' and 'destiny' are two words whose meanings are known from common speech: destiny is estimation, and judgment is detail. There is no detail except after estimation, and the first is before the second by the farthest distance. — author of al-Islah, Fasl 1"
  - "The author of al-Islah has erred in likening destiny and judgment to the garment that the tailor estimates. He ought to have made the form of the sewing — which is in the very soul of the tailor — like judgment, because it is spiritual; and the estimation by which the tailor estimates the sewing is like destiny — this is the meaning of the form of the originals. Then the elaboration that he separates after estimation is the physical boundary that emerges from the first and the second. If the matter is as we have described, then judgment precedes destiny. — author of al-Nusra, Fasl 1"
  - "Their meanings of qadā and qadar are all of them from the world of the body, not from the world of creation, and likewise destiny. — al-Kirmani, Fasl 2"
  - "As for judgment, it indicates the speaker who was forced to it by the support of God Almighty; and likewise those who take his place — peace be upon them — who have arrived at the level parallel to the first resurrection. All of them, in their act, command, prohibition, and judgment in the already-existing call, having been in potency, are identical with the meaning that 'judgment' indicates. — al-Kirmani, Fasl 3"
  - "As for 'the one who stands' (al-qā'im), he is first of all the promised Qā'im, the one promised by Adam (peace be upon him), and by the Prophet who safeguards his call, and by the Imams and Messengers (peace be upon them) in concealment. He extends the force that, by what is destined, must come forth from potency into act and into existence — and for that reason the interpretation of Laylat al-Qadr (peace be upon him) and the references the shaykhs make to him in their sayings have come to be called 'Qadr.' — al-Kirmani, Fasl 6"
  - "And destiny is, secondly, what the Prophet (peace and blessings be upon him and his family) brought to him from revelation: the Sharia, the ruling, and the parables — which carry the force of the sciences and the gnosis that the soul needs in its passage to maturity and to act, by being assembled there in full. For that reason, no knowledge of it stands on its surface alone; only by interpretation. — al-Kirmani, Fasl 7"
  - "The intellect that holds the images of the worlds is not the first creative intellect, nor is it the second intellect — the second emanated being — but rather the intellect that rises out of the world of nature by acquiring works and knowledge corresponding to the first emanation, so that a second resurrection arises within it. Thereby it becomes a compendium of the images of the worlds. — al-Kirmani, Fasl 9"
  - "The first intellect does not need an intellect below it, nor does it apprehend such, because it is in its own self, from eternity, complete, enduring, and one. It refrains not because of some attainment, but for the sake of what is found. — al-Kirmani, Fasl 9"
  - "The meaning of the 'I' by which He intends a Self not tainted by any attribute or qualification — and 'every thing,' by which the intellect (which is all things) is intended, and 'We created it' intends an image by which the two worlds came to be among them — and 'by a determined measure,' meaning that by which the matter is established. This is the pen, the tablet, the writing, and the writer. The writer is the aspect of 'I,' and He is pure eternity. 'And the pen' is the pen of the intellect; 'and We created it' in the form of the tablet. The measure is that by which the tablet, which receives all the forms of letters, holds all physical and spiritual things. — al-Kirmani, Fasl 11"
  - "He is a prophet who responds to the unseen from the universes (al-akwan) and from events. The universes, which are the judgment of Allah, inevitably go out into action by His destiny: that is, Allah Almighty's creation of the souls and the horizons and their movements, by which what is in His power becomes manifest. And therefore Allah says: 'We will show them Our signs in the horizons and in their own selves until it becomes clear to them that it is the truth' (Quran 41:53). — al-Kirmani, Fasl 18"
  - "The interpretation of the verse is different from what he said, because it was not addressed to Moses (peace be upon him) standing among the upper ranks. Rather, He was addressing him at the rank he was already at, when he had not yet reached the rank of pronouncement. He asked the author of the Command before his time had come, because he lived in a time of concealment, and the people of truth were under affliction, under the covering, and under secrecy from the side of opponents and violators. — al-Kirmani, Fasl 21"
  - "'You will not see Me' means: you will not see Me do any of that, nor any of those in this time, for everything has its time and season, and this time is not the time. But look at the mountain — meaning, this man who has worldly power, equipment, and capacity. If it remains in its place, then you will see Me — that is, if he is fixed in what he has been commanded, and is enabled, with his power and help, to extend the rulings of the politics of truth. Moses then learned that what he had predicted would be accomplished at that time was instead destined to be impossible. — al-Kirmani, Fasl 22"
  - "The verse contains no mention of permission for the prophets to abandon the use of the laws. I do not know how this point escaped him until he released this statement without investigating it. The interpretation of this verse is other than what he has said. — al-Kirmani, Fasl 23"
  - "The summary of the matter: every interpretation that leads to declaring permissible what Allah has forbidden, or forbidding what He has permitted, or altering the ranks of the limits of Allah Almighty, and to disregarding the Shari'ah and the rites of the Hanifi religion — calling to the abandonment of work in it and to the acquisition of happiness through refusing to do so — is a corrupt interpretation. Our loyal Imams (peace of Allah Almighty be upon them) are pure of what he has said. — al-Kirmani, Fasl 23"
