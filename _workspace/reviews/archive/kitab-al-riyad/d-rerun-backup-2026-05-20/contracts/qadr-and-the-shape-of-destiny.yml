title: Qadr and the Shape of Destiny
audience: Listeners who have followed Bāb 1 (Episodes 1–3) on the architecture of the originative dyad, Bāb 2 (Episode 4) on the First Intellect as Originator, Bāb 3 (Episode 5) on Soul and Spirit, Bāb 4 (Episode 6) on the rational souls as second emanation, Bāb 5 (Episode 7) on the human as the fruit of all the worlds, Bāb 6 (Episode 8) on motion, stillness, and the word *kun*, and Bāb 7 (Episode 9) on the divisions of the world and the small world that gathers them, and who now want to see al-Kirmani take up the question that has been latent under every prior bāb — *under what architecture does the chain unfold?* The dispute al-Islah (al-is-laah) and al-Nusra (an-nus-rah) carry forward from the lost *Kitab al-Mahsul* (ki-taab al-mah-sool) is at first glance a quarrel over two Arabic words — *qadā* (qa-daa; judgment, decree) and *qadar* (qa-dar; estimation, destiny) — but al-Kirmani refuses both partial readings on the principled ground that *neither of these meanings belongs to the world of creation; both belong to the world of the body*. The episode walks through his threefold-by-threefold replacement of the disputants' meanings (*qadā* names the natiq, the actualization of revelation in the soul, the necessary unfolding of events; *qadar* names the promised Qā'im, the Sharia and parables brought down, and the world together with its parts), his correction of the aql-hadith ("the intellect that holds the worlds is *not* the First Intellect but the rational soul perfected through obedience"), his reading of Quran 54:49 under the pen-tablet-writer imagery, his rereading of the Prophet's hadith *Flee from God's decree to His destiny*, his political-historical rereading of Moses on the mountain (Quran 7:143) as a story about *political timing* under the architecture of qadar, and his decisive refutation of al-Nusra's antinomian reading of Quran 5:93 — *the verse contains no permission for the prophets to abandon the use of the laws*. The episode closes on al-Kirmani's bāb-closing principle that *every interpretation that leads to declaring permissible what Allah has forbidden, or forbidding what He has permitted, or altering the ranks of the limits of Allah Almighty, and to disregarding the Shari'ah and the rites of the Hanifi religion, calling to the abandonment of work in it and to the acquisition of happiness through refusing to do so, is a corrupt interpretation* — *our loyal Imams (peace of Allah be upon them) are pure of what he has said*.
