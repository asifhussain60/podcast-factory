show_notes:
  blurb: "Across the twenty-four fusūl of Bāb 8, al-Kirmani turns to the question that has been latent under every prior bāb: *under what architecture does the chain unfold?* Al-Islah and al-Nusra, drawing from the lost *Kitab al-Mahsul*, quarrel over the order of two Arabic words — *qadā* (judgment, decree) and *qadar* (estimation, destiny). Al-Islah analogizes them to a tailor estimating a garment before cutting it; al-Nusra refines the analogy by inserting the *form of the sewing in the tailor's soul* before the estimation. Al-Kirmani refuses both partial readings on the ground that their meanings *belong to the world of the body, not the world of creation*. From this refusal he opens the bāb's positive teaching: *qadā* and *qadar* carry three technical meanings each in the speech of the People of the Da'wa. *Qadā* names: first, *the speaker-prophet* (the natiq); second, *the actualization of revelation in the soul* (the act of *ta'wīl*); third, *the necessary unfolding of events in the cosmos*. *Qadar* names: first, *the promised Qā'im* (the figure of what is destined to come forth from concealment; *Laylat al-Qadr* is, in the Da'wa's reading, the Night of the Qā'im); second, *the Sharia and parables* the Prophet ﷺ brought, *which carry the force of the sciences and the gnosis that the soul needs in its passage to maturity*; third, *the world together with its parts*. *Each disputant is right on one pairing of the three; each is wrong on the others.* Al-Islah's *qadar precedes qadā* holds in the second sense (revelation precedes interpretation); al-Nusra's *qadā precedes qadar* holds in the first (the Speaker-Prophet precedes the revelation he brings). The bāb then takes up four extended passages. Fasl 9 corrects the *aql-hadith* (*when God created the intellect, He finished the worlds with it*): the intellect that holds the worlds is *not the First Intellect* but the *rational soul perfected through the two acts of worship* — the architecture of Bāb 4 read from the side of the result. Fasl 10–15 reads Quran 54:49 (*all things We created with predestination*) under the Pen-Tablet-Writer imagery — *the writer is the Self, the pen is the First Intellect, the tablet is the Soul, the measure is that by which the religion the soul needs is held*. Fasl 16–19 reads the Prophet's hadith *Flee from God's decree to His destiny* as *a saying about how the Prophet ﷺ received and opened revelation*: the cosmic *universes* are *the qadā through which the qadar of revelation is read*, anchored in Quran 41:53 (*We will show them Our signs in the horizons*). Fasl 20–22 rereads the Qur'anic story of Moses on the mountain (Quran 7:143) as a political-historical narrative: Moses lived *in a time of concealment* and asked the *author of the Command* — *who is Shu'ayb*, his master and guide — *command me, and I will manage this matter and lift the grief*; the mountain is *this man who has worldly power, equipment, and capacity* — a contemporary political figure who *could have stood* but did not. *Every matter has its time and season; this time is not the time.* The verse teaches *political timing under qadar*. Fasl 23 delivers the bāb's most forceful moment — the refutation of antinomianism. Al-Nusra had read Quran 5:93 as permission for *the prophets to abandon the use of the laws*; al-Kirmani refuses absolutely. The verse, properly read, gives a license *under three conditions* (obedience to Allah in His Messenger; to the Messenger and his successor; to the Imam) to *study the sciences of other peoples* as a weapon for establishing the truth. *The license is to consider, not to abandon.* The bāb's closing principle: *every interpretation that leads to declaring permissible what Allah has forbidden, or forbidding what He has permitted, or altering the ranks of the limits of Allah Almighty, is a corrupt interpretation* — *our loyal Imams (peace of Allah be upon them) are pure of what he has said*. The bāb closes in the discipline of *listening* — *let me be the listener at the foot of the table, not the disputant about the order of the letters* — refusing to let the metaphysics of destiny become a quarrel over word order, and returning to the *speech* of the prophets and the Imams under whose architecture *qadā* and *qadar* hold the soul's road from beginning to end."
