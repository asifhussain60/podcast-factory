title: Where the Disputants Erred
audience: Listeners who heard the opening of Bāb 1 (Episode 1) and now want to follow how al-Kirmani diagnoses each disputant's specific mistakes — including the rhetorical line one of them crosses by attaching his opponent to the heresy of Abu Bakr al-Razi.
