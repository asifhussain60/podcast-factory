show_notes:
  blurb: "Across §14–§26 of Bāb 1, al-Kirmani moves from architecture to diagnosis. He defends al-Islah's core claim while pulling al-Nusra up sharply on three specific failures: a logical fork that collapses against the simple fact that one heat acts differently on wax and stone; a smear attaching al-Islah to the heresy of Abu Bakr al-Razi; and a self-contradiction between al-Nusra and al-Ikhtisar. Along the way he sets out the joint emanation of Soul and matter from the First Intellect's two proportions, ties the metaphysical scheme to the Hadith of the Two Weighty Things, and shows that the two rak'ahs of the dawn prayer are the bodily icon of the order of being."
