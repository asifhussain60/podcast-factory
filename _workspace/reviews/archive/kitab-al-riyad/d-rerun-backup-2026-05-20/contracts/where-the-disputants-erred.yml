key_tensions:
  - "Al-Nusra's three-horned fork against al-Islah (deficiency from agent, matter, or both) collapses because diminution is in the receivers, not the received — wax softens, stone refuses, iron warms slowly, but the heat is one."
  - "The al-Razi smear: al-Nusra crosses the line of legitimate critique by attaching al-Islah to Abu Bakr al-Razi's eternal-matter heresy; al-Kirmani refuses to dignify it but names the transgression."
  - "Al-Nusra contradicts himself between al-Nusra and al-Ikhtisar — in one book the world is deficient, in the other the world is rich and perfect. Al-Kirmani lays the two books side by side."
  - "Speaker and Foundation as the bodily image of Intellect and Soul: God commands obedience to the Foundation, and God does not command obedience to the essence-deficient — so the Foundation, like the Soul, is tamm in himself, less only in rank."
  - "Action does not imply deficiency: the sun, the fire, the whales of the Sea of Oman, the dolphins that rescue drowning sailors all act for others, not for themselves. The perfect overflows; it does not transact."
tone_constraints:
  - No modernizations.
  - The disputants' positions are paraphrased; al-Kirmani's verdict sentences are verbatim and should carry weight when quoted.
  - Honorifics for the Prophet ﷺ, Imam Ali (AS), and the Imams are spelled out per Phase 0c rules at first occurrence only.
  - When the Hadith al-Thaqalayn is quoted, it stays verbatim in al-Kirmani's rendering.
  - Hold the gravity of an adjudication; the hosts are not amused by the Razi smear, and they say so.
anchor_passages:
  - "The sun's heat is accepted by objects that yield to it like wax, which softens; while other bodies refuse to accept it, such as stone and iron; and still others react only slowly. We have established by direct observation that the heat is one and the same; the discrepancy lies in the receivers, not in the heat itself."
  - "I leave among you the two weighty things: the Book of Allah and my 'Itrah, a rope stretched from the sky to the earth — one end of it in the hand of Allah and one end in your hands. Hold fast to them and you will not go astray as long as you hold to them."
  - "An action may proceed from an agent in such a way that what benefits is the object of the action, not the one who produced it. The evidence for this is that the heat from the fire is an act of the fire, yet this act does not return to the fire, nor does the fire gain any benefit or suffer any harm from it; rather the benefit and the harm reach whatever the heat acts upon."
  - "Allah does not command obedience to the essence-deficient — therefore the Foundation is in the same position as the Speaker, ranked below him in degree but not in essence."
