name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate server + client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Run server unit tests
        working-directory: server
        run: npm test

      - name: Validate theme-token parity across site/css/
        working-directory: server
        run: node scripts/validate-theme-parity.mjs

      - name: Syntax-check client JS bundles
        run: |
          for f in site/js/*.js; do
            echo "→ $f"
            node --check "$f"
          done
