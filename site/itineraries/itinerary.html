<!DOCTYPE html>
<!--
  Generic itinerary template — data-driven, slug-resolved.
  Usage: itinerary.html?trip={slug}
  Falls back to the active trip from manifest.json when no ?trip= param.
-->
<html lang="en">

  <!-- Import map: shares window.React with ESM modules (react-colorful, sonner)

  <script type="importmap">
  {
    "imports": {
      "react": "data:text/javascript;charset=utf-8,const R=window.React;export default R;export const {useState,useEffect,useRef,useMemo,useCallback,useReducer,useLayoutEffect,useContext,createElement,Fragment,forwardRef,memo,Children,cloneElement,createContext,isValidElement,useImperativeHandle,useDebugValue}=R;",
      "react-dom": "data:text/javascript;charset=utf-8,const R=window.ReactDOM;export default R;export const {createRoot,hydrateRoot,findDOMNode,createPortal,render,unmountComponentAtNode,flushSync,unstable_batchedUpdates}=R;",
      "sonner": "https://esm.sh/sonner@1.7.4?external=react,react-dom"
    }
  }
  </script>

  <!-- Data-Driven Itinerary Renderer — Fetches trip data and re-renders timeline -->
  <script>
    (function() {
      // ─── Slug resolution ─────────────────────────────────────────────
      // Read from ?trip= query param. Falls back to the active trip from
      // the site manifest so bookmarks / direct links still work.
      var SLUG = (function() {
        var params = new URLSearchParams(window.location.search);
        var slug = params.get('trip');
        if (slug && /^[a-z0-9-]+$/.test(slug)) return slug;
        return null; // resolved after manifest fetch
      })();

      // Env-aware API base. Prefer the already-loaded BabuAI client's baseUrl
      // (claude-client.js derives it from the host); fall back to localhost
      // for standalone dev use where claude-client isn't on the page.
      var API_BASE = (function () {
        if (window.BabuAI && window.BabuAI.baseUrl) return String(window.BabuAI.baseUrl).replace(/\/+$/, '');
        if (window.BABU_AI_PROXY_URL) return String(window.BABU_AI_PROXY_URL).replace(/\/+$/, '');
        var host = (window.location && window.location.hostname) || '';
        if (host === 'localhost' || host === '127.0.0.1' || host === '') return 'http://localhost:3001';
        // Production: same-origin — Worker proxies /api/* to journal-api.kashkole.com.
        return '';
      })();
      // Expose for cross-script use: hydrateDriveTimes, hydrateDaySpend,
      // fetchWeather, etc. live in a separate <script> block and can't see
      // this IIFE's local var. Without this, they throw ReferenceError.
      window.__API_BASE = API_BASE;

      // Track live Leaflet instances keyed by container id, so we can destroy
      // cleanly before re-rendering (otherwise Leaflet leaks handlers).
      window.__leafletMaps = window.__leafletMaps || {};

      function destroyAllMaps() {
        Object.keys(window.__leafletMaps).forEach(function(id) {
          try { window.__leafletMaps[id].remove(); } catch (_) {}
          delete window.__leafletMaps[id];
        });
      }

      // ─── Event card helpers ────────────────────────────────────────
      // Map tag text → CSS modifier (travel|dine|rest|event|celebration|default).
      function tagKey(tagText) {
        var t = (tagText || '').toLowerCase();
        if (/dine|dining|breakfast|lunch|dinner|dessert/.test(t)) return 'dine';
        if (/travel|flight|drive|transfer/.test(t)) return 'travel';
        if (/celebration|engagement|wedding/.test(t)) return 'celebration';
        if (/event|meeting|appointment|tour/.test(t)) return 'event';
        if (/rest|nature|market|shopping|spa|leisure|hotel/.test(t)) return 'rest';
        return 'default';
      }

      // Pick a Font Awesome 6 glyph for the event based on tag + title hints.
      function pickEventIcon(tagText, titleText) {
        var tag = (tagText || '').toLowerCase();
        var title = (titleText || '').toLowerCase();
        if (/drive|uber|taxi|car rental|shuttle|transfer/.test(title)) return 'fa-car';
        if (/flight|lands|depart|takeoff|airport|ua \d/i.test(title)) return 'fa-plane-up';
        if (/breakfast|brunch|coffee|diner/.test(title + ' ' + tag)) return 'fa-mug-saucer';
        if (/dessert|ice cream|cones|sweet/.test(title + ' ' + tag)) return 'fa-ice-cream';
        if (/dine|dining|lunch|dinner|restaurant|fondue/.test(tag + ' ' + title)) return 'fa-utensils';
        if (/spa|massage|relax/.test(title + ' ' + tag)) return 'fa-spa';
        if (/meeting|advisor|consult|appointment/.test(title + ' ' + tag)) return 'fa-handshake';
        if (/shopping|market|shalwar|mall|store/.test(title + ' ' + tag)) return 'fa-bag-shopping';
        if (/engagement|celebration|party|wedding/.test(title + ' ' + tag)) return 'fa-champagne-glasses';
        if (/hotel|check.?in|sleep|rest|night/.test(title + ' ' + tag)) return 'fa-bed';
        if (/beach|shore|ocean|tulip|garden|park|nature|walk/.test(title + ' ' + tag)) return 'fa-tree';
        if (/test/.test(tag)) return 'fa-flask';
        if (/travel/.test(tag)) return 'fa-route';
        return 'fa-location-dot';
      }

      // Render 5-star row with integer + half + empty stars.
      function renderStars(rating) {
        var r = parseFloat(rating);
        if (!isFinite(r) || r <= 0) return '';
        var full = Math.floor(r);
        var frac = r - full;
        var half = frac >= 0.25 && frac < 0.75 ? 1 : 0;
        if (frac >= 0.75) { full += 1; }
        var empty = 5 - full - half;
        var out = '';
        for (var i = 0; i < full;  i++) out += '<i class="fa-solid fa-star"></i>';
        if (half)                      out += '<i class="fa-solid fa-star-half-stroke"></i>';
        for (var j = 0; j < empty; j++) out += '<i class="fa-regular fa-star"></i>';
        return out;
      }

      // Hyphenate a phone string into tel: URL (keeps what the user typed visible).
      function telHref(phone) {
        return 'tel:' + (phone || '').replace(/[^0-9+]/g, '');
      }

      // Split "7:30 AM" or "~4:00 PM" into a numeric head + AM/PM period so the
      // time column can stack them. Returns { head, period }.
      function splitTime(raw) {
        if (!raw) return { head: '', period: '' };
        var s = String(raw).trim();
        var m = s.match(/^(.*?)\s*(AM|PM|am|pm)\s*$/);
        if (!m) return { head: s, period: '' };
        return { head: m[1].trim(), period: m[2].toUpperCase() };
      }

      // ─── Spend donut SVG ────────────────────────────────────────────────
      // Renders a 72px donut chart. `data` is either null (empty/placeholder
      // state) or { total, categories:[{name, amount, color}] }. Segments
      // are computed by share of total, rendered as stroked circle arcs.
      function renderSpendDonut(data) {
        var size = 72, stroke = 8, r = (size - stroke) / 2;
        var cx = size / 2, cy = size / 2, circ = 2 * Math.PI * r;
        var html = '<svg class="spend-donut" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" role="img" aria-label="Spend for the day">';
        html += '<circle class="spend-donut-track" cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke-width="' + stroke + '"></circle>';
        if (data && data.categories && data.categories.length && data.total > 0) {
          var offset = 0;
          data.categories.forEach(function(cat) {
            if (!cat.amount || cat.amount <= 0) return;
            var share = cat.amount / data.total;
            var len = Math.max(0, share * circ - 1); // 1px gap between slices
            html += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none"' +
              ' stroke="' + cat.color + '" stroke-width="' + stroke + '"' +
              ' stroke-dasharray="' + len.toFixed(2) + ' ' + (circ - len).toFixed(2) + '"' +
              ' stroke-dashoffset="' + (-offset).toFixed(2) + '"' +
              ' transform="rotate(-90 ' + cx + ' ' + cy + ')"></circle>';
            offset += share * circ;
          });
        }
        html += '</svg>';
        var totalStr = data && data.total != null ? '$' + Math.round(data.total) : '$0';
        var subLabel = data && data.total > 0 ? 'spent' : 'no spend';
        html += '<div class="spend-donut-center">';
        html += '  <span class="spend-donut-total">' + totalStr + '</span>';
        html += '  <span class="spend-donut-sub">' + subLabel + '</span>';
        html += '</div>';
        return html;
      }


      function renderEventCard(ev, num, dayIdx, eventIdx, dayDate, dayNum) {
        // Accept both `venue` (canonical yaml) and `address` (legacy static HTML).
        var address = ev.address || ev.venue || '';
        var key = tagKey(ev.tag);
        var icon = pickEventIcon(ev.tag, ev.event);
        var t = splitTime(ev.time);

        var tagUpper = String(ev.tag || '').toUpperCase();
        var isOutdoor = (tagUpper === 'NATURE' || tagUpper === 'SCENIC_DRIVE') ? '1' : '';
        var dayAttr = ' data-day-idx="' + dayIdx + '"';
        var idxAttr = ' data-event-idx="' + eventIdx + '"';
        var noteText = ev.notes || ev.tip || ev.desc || '';
        // Phase C drag-reorder substrate: time_mode drives pin icon state and
        // is read back by the reorder module when building the recalc-times
        // payload. "anchor" = time is fixed; "flex" = packed by the engine.
        var timeMode = (ev.time_mode === 'anchor') ? 'anchor' : 'flex';
        var modeAttr = ' data-time-mode="' + timeMode + '"';

        var parts = [];
        // data-event-time / data-event-duration power the live state tick
        // (upcoming / current / done) so each card can self-classify against
        // now() without re-rendering. ISO date + "h:mm AM/PM" time string.
        var timeAttr = ev.time ? ' data-event-time="' + escHtml(String(ev.time)) + '"' : '';
        var durAttr = ev.duration_min ? ' data-event-duration="' + escHtml(String(ev.duration_min)) + '"' : '';
        parts.push('<div class="event"' +
          (num ? ' data-stop-num="' + num + '"' : '') +
          (isOutdoor ? ' data-outdoor="1"' : '') +
          dayAttr +
          idxAttr +
          timeAttr +
          durAttr +
          modeAttr +
          ' tabindex="0"' +
          '>');

        // Time column (outside the card, left of the rail). The pin toggle
        // lives here because "is this time fixed?" maps naturally to the
        // time display: anchors (flights, reservations) show a filled pin,
        // flex rows reveal a muted pin on row hover. Clicking flips
        // time_mode via /api/pin-event (see itinerary-reorder.js).
        var pinIcon = 'fa-solid fa-thumbtack';
        var pinLabel = (timeMode === 'anchor') ? 'Unpin (let time flex)' : 'Pin this time';
        parts.push('  <div class="event-time-col">');
        if (t.head) parts.push('    <span class="event-time-head">' + escHtml(t.head) + '</span>');
        if (t.period) parts.push('    <span class="event-time-period">' + escHtml(t.period) + '</span>');
        parts.push('    <button type="button" class="event-pin-btn" data-reorder-pin="1" data-day-idx="' + dayIdx + '" data-event-idx="' + eventIdx + '" aria-label="' + pinLabel + '" title="' + pinLabel + '" onclick="event.stopPropagation()"><i class="' + pinIcon + '" aria-hidden="true"></i></button>');
        parts.push('  </div>');

        // Rail — vertical line via ::before pseudo; numbered disc is a real
        // element so it can hold the stop number. Disc states (upcoming /
        // current / done) are driven by data-state on the parent .event.
        // The disc is also the drag handle: grabbing it triggers SortableJS
        // reorder (see itinerary-reorder.js). Anchors suppress drag via the
        // Sortable filter and the CSS cursor rule below.
        var dragTitle = (timeMode === 'anchor') ? '' : ' title="Drag to reorder"';
        parts.push('  <div class="event-rail">');
        parts.push('    <span class="event-rail-num" data-reorder-handle="1"' + dragTitle + (num != null ? ' aria-label="Stop ' + num + ' — drag to reorder"' : ' aria-label="Drag to reorder"') + '>' + (num != null ? num : '') + '</span>');
        parts.push('  </div>');

        // Card — accordion-style. Click toggles .is-expanded; interactive
        // children (links, buttons) bail out via toggleEventCard's closest()
        // check so tel: links and alt-find button still work.
        parts.push('  <div class="event-card" onclick="event.stopPropagation(); toggleEventCard(event, this)" aria-expanded="false">');
        parts.push('    <div class="event-icon event-icon--' + key + '">');
        parts.push('      <i class="fa-solid ' + icon + '" aria-hidden="true"></i>');
        parts.push('    </div>');
        parts.push('    <div class="event-details">');

        // ── Summary row — title + inline meta. Meta reads as a single
        //     dotted text line (category · ★rating · duration · drive), so
        //     we only have one typographic system instead of five pill
        //     tints. The numbers and the star carry the information; the
        //     chips are gone. The drive span keeps its hydration classes so
        //     hydrateDriveTimes() can still fill it in post-render.
        var metaBits = [];
        if (ev.category) {
          metaBits.push('<span class="event-meta-item">' + escHtml(ev.category) + '</span>');
        }
        if (ev.rating) {
          metaBits.push('<span class="event-meta-item event-meta-item--rating"><i class="fa-solid fa-star" aria-hidden="true"></i>' + escHtml(String(ev.rating)) + '</span>');
        }
        if (ev.duration_min) {
          metaBits.push('<span class="event-meta-item">' + escHtml(String(ev.duration_min)) + ' min stay</span>');
        }
        if (num) {
          var driveTxt = (ev.drive_min_to_next ? escHtml(String(ev.drive_min_to_next)) + ' min drive' : '— drive');
          metaBits.push('<span class="event-meta-item event-chip--drive" data-drive-from="' + num + '"><i class="fa-solid fa-car" aria-hidden="true"></i><span class="drive-val">' + driveTxt + '</span></span>');
        }

        parts.push('      <div class="event-summary">');
        parts.push('        <div class="event-summary-text">');
        // Title is click-to-edit. Tab/Enter/blur commits via /api/swap-event;
        // Escape cancels. Empty on commit restores the original — titles can
        // never be blank. stopPropagation inside handler so editing doesn't
        // also toggle the accordion.
        parts.push('          <h4 class="event-title" data-day-idx="' + dayIdx + '" data-event-idx="' + eventIdx + '" title="Click to edit" onclick="beginTitleEdit(event, this)">' + escHtml(ev.event) + '</h4>');
        if (metaBits.length) {
          parts.push('          <div class="event-meta">' + metaBits.join('<span class="event-meta-dot" aria-hidden="true">\u00b7</span>') + '</div>');
        }
        parts.push('        </div>');
        // Caret stays inline with the summary text — it's an expanded/
        // collapsed indicator tied to the accordion, not a destructive
        // action. Destructive + AI-swap + pin live in the rail on the
        // right (see below).
        parts.push('        <i class="event-caret fa-solid fa-chevron-down" aria-hidden="true"></i>');
        parts.push('      </div>');

        // ── Collapsible body — grid-template-rows 0fr→1fr animates height. ──
        parts.push('      <div class="event-body">');
        parts.push('        <div class="event-body-inner">');
        parts.push('          <div class="event-info-body">');

        var hasContact = address || ev.phone;
        if (hasContact) {
          parts.push('            <div class="event-contact">');
          if (address) parts.push('              <span class="event-addr">' + escHtml(address) + '</span>');
          if (ev.phone) parts.push('              <span class="event-phone"><i class="fa-solid fa-phone" aria-hidden="true"></i><a href="' + telHref(ev.phone) + '" onclick="event.stopPropagation()">' + escHtml(ev.phone) + '</a></span>');
          parts.push('            </div>');
        }

        parts.push('          </div>'); // .event-info-body

        if (noteText) {
          parts.push('          <p class="event-desc">' + escHtml(noteText) + '</p>');
        }

        // Alt-venue slot — spans the full width within the body.
        if (num) {
          if (ev.alt_venue && ev.alt_venue.name) {
            var alt = ev.alt_venue;
            parts.push('          <div class="event-alt event-alt--filled">');
            parts.push('            <span class="alt-label"><i class="fa-solid fa-location-dot" aria-hidden="true"></i>Nearby alternative</span>');
            parts.push('            <div class="alt-body">');
            parts.push('              <span class="alt-name">' + escHtml(alt.name) + '</span>');
            var meta = [];
            if (alt.distance) meta.push(escHtml(String(alt.distance)));
            if (alt.rating) meta.push('&#9733; ' + escHtml(String(alt.rating)));
            if (alt.drive_min) meta.push(escHtml(String(alt.drive_min)) + ' min');
            if (meta.length) parts.push('              <span class="alt-meta">' + meta.join(' &middot; ') + '</span>');
            parts.push('            </div>');
            parts.push('          </div>');
          }
          // No "else" branch — when there's no alt yet, .alt-find-btn in
          // the action rail (rendered below) is the entry point. Avoids a
          // redundant inline pill inside the body.
        }

        parts.push('        </div>'); // .event-body-inner
        parts.push('      </div>'); // .event-body

        parts.push('    </div>'); // .event-details

        // ── Action rail — right-side column inside .event-card. Holds the
        //    destructive (delete) + constructive (alt-find) buttons in a
        //    vertically-centred, right-justified stack. Pin toggle moved to
        //    the time column so it sits with the "is this time fixed?"
        //    display; the rail stays narrow and predictable.
        var delLabel = String(ev.event || '').replace(/'/g, "\\'");
        parts.push('    <div class="event-action-rail" onclick="event.stopPropagation()">');
        parts.push('      <button type="button" class="event-delete-btn" aria-label="Delete this stop" title="Delete this stop" onclick="event.stopPropagation(); requestDeleteEvent(' + dayIdx + ',' + eventIdx + ',\'' + escHtml(delLabel) + '\')"><i class="fa-solid fa-trash-can" aria-hidden="true"></i></button>');
        if (num && !(ev.alt_venue && ev.alt_venue.name)) {
          var altLabel = String(ev.event || '').replace(/'/g, "\\'");
          parts.push('      <button type="button" class="alt-find-btn" aria-label="Find an alternative venue nearby" title="Find an alternative venue nearby" onclick="event.stopPropagation(); findAlternate(' + dayIdx + ',' + eventIdx + ',\'' + escHtml(altLabel) + '\')"><i class="fa-solid fa-shuffle" aria-hidden="true"></i></button>');
        }
        parts.push('    </div>'); // .event-action-rail

        parts.push('  </div>'); // .event-card
        parts.push('</div>');
        return parts.join('\n');
      }

      // Tags whose events are mapped + numbered. APPOINTMENT included —
      // an address-bearing appointment (Chase, doctor, tailor) is a stop on
      // the day even though it's not a "destination" in the validator sense.
      var NUMBERED_TAGS = {
        DINING:1, CAFE:1, NATURE:1, SHOPPING:1, SPA:1,
        ENTERTAINMENT:1, REST:1, ENGAGEMENT_HIGHLIGHT:1,
        EVENT:1, CELEBRATION:1, APPOINTMENT:1
      };

      function isNumberedStop(ev) {
        if (!ev) return false;
        var tag = String(ev.tag || '').toUpperCase();
        if (!NUMBERED_TAGS[tag]) return false;
        return !!(ev.venue || ev.address);
      }
      // Exposed for itinerary-reorder.js which performs a per-day surgical
      // rerender after a drag-drop (avoids tearing down the whole timeline).
      window.renderEventCard = renderEventCard;
      window.isNumberedStop = isNumberedStop;
      window.renderItinerary = renderItinerary;

      function buildGmapsDeeplink(stops) {
        if (!stops || stops.length < 1) return '';
        var enc = stops.map(function(s) { return encodeURIComponent(s); });
        var origin = enc[0];
        var destination = enc[enc.length - 1];
        var waypoints = enc.slice(1, -1).join('|');
        var url = 'https://www.google.com/maps/dir/?api=1&travelmode=driving&origin=' + origin + '&destination=' + destination;
        if (waypoints) url += '&waypoints=' + waypoints;
        return url;
      }

      // Resolve which day should be expanded + scrolled to on load.
      // - Trip contains today → today's day.
      // - Trip entirely in the future → day 1 (anchor at the beginning).
      // - Trip entirely in the past → last day (retroactive journaling lands
      //   on the most recent memory).
      function resolveTargetDay(trip) {
        if (!trip || !trip.days || !trip.days.length) return null;
        var today = new Date().toISOString().slice(0, 10);
        var match = trip.days.find(function(d) { return d.date === today; });
        if (match) return match;
        var dates = trip.days.map(function(d) { return d.date; }).filter(Boolean).sort();
        if (!dates.length) return trip.days[0];
        if (today < dates[0]) return trip.days[0];
        return trip.days[trip.days.length - 1];
      }

      function renderItinerary(trip, opts) {
        console.log('[ITIN:RENDER]', trip.name, trip.days ? trip.days.length + ' days' : 'no days');

        var timeline = document.querySelector('.timeline');
        if (!timeline || !trip.days || !trip.days.length) return;

        // preserveState: capture/restore open day + expanded events + scrollY
        // and SKIP the smart-target scroll. Used by every refresh path except
        // the initial DOMContentLoaded bootstrap, so post-edit re-renders
        // never yank the user away from where they were reading.
        var preserve = !!(opts && opts.preserveState);
        var snap = null;
        if (preserve) {
          var openCardEl = timeline.querySelector('.day-card.open');
          var expandedRows = [];
          timeline.querySelectorAll('.event-card.is-expanded').forEach(function(c) {
            var row = c.closest('.event');
            if (!row) return;
            expandedRows.push({
              dayIdx: row.getAttribute('data-day-idx'),
              eventIdx: row.getAttribute('data-event-idx'),
            });
          });
          snap = {
            openDay: openCardEl ? openCardEl.getAttribute('data-day') : null,
            expanded: expandedRows,
            scrollY: window.scrollY || window.pageYOffset || 0,
          };
        }

        var targetDay = preserve ? null : resolveTargetDay(trip);
        var targetDayNum = targetDay ? targetDay.day : null;

        // Build new HTML for all day cards
        var html = '';
        trip.days.forEach(function(day, dayIdx) {
          // preserve mode: re-open whichever day-card was open before this
          // re-render. Otherwise the smart-target (today / first / last) wins.
          var openDayMatch = preserve && snap && snap.openDay && String(day.day) === String(snap.openDay);
          var isOpen = (openDayMatch || day.day === targetDayNum) ? ' open' : '';
          var stopAddresses = [];
          var stopIdx = 0;

          // Pick day-level coords for weather: first stop on the map array.
          var mapKey = 'map' + day.day;
          var dayCoords = (typeof dayStops !== 'undefined' && dayStops[mapKey] && dayStops[mapKey][0])
            ? dayStops[mapKey][0] : null;
          var dayLat = dayCoords ? dayCoords[0] : '';
          var dayLng = dayCoords ? dayCoords[1] : '';

          html += '<div class="day-card' + isOpen + '" data-day="' + day.day + '" data-day-date="' + escHtml(day.date || '') + '" onclick="toggleCard(this)">';
          html += '  <div class="day-header">';
          html += '    <div class="day-spend" data-spend-date="' + escHtml(day.date || '') + '">';
          html += '      ' + renderSpendDonut(null);
          html += '    </div>';
          html += '    <div class="day-info">';
          html += '      <span class="day-label">Day ' + day.day + ' &bullet; ' + formatDayDate(day.date) + '</span>';
          html += '      <h3 class="day-title">' + escHtml(day.title) + '</h3>';
          html += '    </div>';
          html += '    <div class="day-weather is-loading"' +
            ' data-weather-day="' + day.day + '"' +
            (dayLat !== '' ? ' data-weather-lat="' + dayLat + '"' : '') +
            (dayLng !== '' ? ' data-weather-lng="' + dayLng + '"' : '') +
            ' data-weather-date="' + escHtml(day.date || '') + '">';
          html += '      <i class="weather-icon fa-solid fa-cloud" aria-hidden="true"></i>';
          html += '      <div class="weather-main">';
          html += '        <span class="weather-hilo"><span class="weather-hi">—</span><span class="weather-sep">/</span><span class="weather-lo">—</span></span>';
          html += '        <span class="weather-label">Loading…</span>';
          html += '      </div>';
          html += '      <div class="weather-meta">';
          html += '        <span class="weather-meta-item"><i class="fa-solid fa-wind"></i><span class="weather-wind">—</span></span>';
          html += '        <span class="weather-meta-item"><i class="fa-solid fa-droplet"></i><span class="weather-precip">—</span></span>';
          html += '      </div>';
          html += '    </div>';
          html += '    <div class="day-toggle">&#9660;</div>';
          html += '  </div>';
          html += '  <div class="day-body">';
          html += '    <div class="day-body-inner">';
          html += '    <div class="event-list" data-reorder-list="1" data-day-idx="' + dayIdx + '" data-day-num="' + day.day + '">';

          if (day.events && day.events.length) {
            day.events.forEach(function(ev, eventIdx) {
              var num = null;
              if (isNumberedStop(ev)) {
                stopIdx += 1;
                num = stopIdx;
                stopAddresses.push(ev.venue || ev.address);
              }
              html += renderEventCard(ev, num, dayIdx, eventIdx, day.date, day.day);
            });
          } else {
            html += '      <div class="event"><div class="event-details"><p class="event-desc">No events planned yet — use the Trip Assistant to add activities.</p></div></div>';
          }

          html += '    </div>'; // .event-list

          // Full-width map block beneath the event list, with route header + Gmaps deeplink
          var gmapsHref = buildGmapsDeeplink(stopAddresses);
          html += '    <div class="day-map-block">';
          html += '      <div class="day-map-head">';
          html += '        <span class="day-map-title"><i class="fa-solid fa-route" aria-hidden="true"></i>Day ' + day.day + ' route &bullet; ' + stopAddresses.length + ' stops</span>';
          if (gmapsHref) {
            html += '        <a class="gmaps-deeplink" href="' + gmapsHref + '" target="_blank" rel="noopener" onclick="event.stopPropagation()"><i class="fa-brands fa-google" aria-hidden="true"></i>Open in Google Maps</a>';
          }
          html += '      </div>';
          html += '      <div class="day-map" id="map' + day.day + '"></div>';
          html += '    </div>';
          html += '    </div>'; // .day-body-inner

          html += '  </div>'; // .day-body
          html += '</div>'; // .day-card
        });

        // Destroy existing Leaflet maps right before the DOM swap — old
        // references would otherwise leak handlers on detached containers.
        destroyAllMaps();
        timeline.innerHTML = html;

        // Auto-open the resolved target day (today / first / last). Falls
        // back to the first card if resolveTargetDay returned null. In
        // preserve mode the previously-open day is re-opened in the loop
        // above, so we only fall back here for the initial load path.
        var openCard;
        if (preserve && snap && snap.openDay) {
          openCard = timeline.querySelector('.day-card[data-day="' + snap.openDay + '"]');
        } else {
          openCard = targetDayNum
            ? timeline.querySelector('.day-card[data-day="' + targetDayNum + '"]')
            : timeline.querySelector('.day-card');
          if (openCard) openCard.classList.add('open');
        }

        // Restore expanded event-card state (preserve mode only).
        if (preserve && snap && snap.expanded.length) {
          snap.expanded.forEach(function(ref) {
            var row = timeline.querySelector('.event[data-day-idx="' + ref.dayIdx + '"][data-event-idx="' + ref.eventIdx + '"]');
            if (!row) return;
            var card = row.querySelector('.event-card');
            if (!card) return;
            card.classList.add('is-expanded');
            card.setAttribute('aria-expanded', 'true');
          });
        }

        // Initialize map for every currently-open day card. Collapsed maps
        // are lazy-initialized on first open by toggleCard().
        timeline.querySelectorAll('.day-card.open .day-map').forEach(function(el) {
          if (el.id && !el._leaflet_id) initMap(el.id);
        });

        // Prime the upcoming/current/done classification before we scroll,
        // so the target event already carries data-state="current" if we're
        // mid-trip and the scroll lands on the correct anchor.
        recomputeItineraryStates();

        // Flag timing conflicts on today's events (overlap / drive-gap).
        // Runs via requestIdleCallback so it never blocks first paint.
        if (typeof flagTimingConflicts === 'function') {
          try { flagTimingConflicts(trip); } catch (e) { console.warn('[TIMING]', e); }
        }

        if (preserve && snap) {
          // Restore exact scroll position — no smooth, no jump to a target.
          // The user stays anchored where they were before the refresh.
          window.scrollTo(0, snap.scrollY);
        } else {
          // Initial load: scroll the target into view. When the target day
          // contains a "current" event, anchor on that event; otherwise
          // anchor on the day header. Defer a frame so layout settles after
          // innerHTML swap.
          requestAnimationFrame(function() {
            scrollToTarget(openCard);
          });
        }

        // Kick off async drive-time hydration once cards are painted.
        if (typeof hydrateDriveTimes === 'function') {
          try { hydrateDriveTimes(trip); } catch (e) { console.warn('[DRIVE-TIMES]', e); }
        }
        if (typeof hydrateWeather === 'function') {
          try { hydrateWeather(trip); } catch (e) { console.warn('[WEATHER]', e); }
        }
        if (typeof hydrateDaySpend === 'function') {
          try { hydrateDaySpend(trip); } catch (e) { console.warn('[SPEND]', e); }
        }
      }

      // ─── Surgical per-event update (no full re-render) ───────────────
      // The canonical post-mutation primitive for changes that touch a
      // single event in place (swap venue, manual title edit). Mutates
      // window.__tripData, replaces just that one .event row, and uses
      // the View Transitions API to cross-fade the swap. Falls back to
      // a CSS accent-glow keyframe in browsers without view transitions.
      // Why this exists: the prior pattern (mutate → refreshItinerary)
      // tore down the whole timeline, collapsing accordions and yanking
      // the scroll position. This keeps the user anchored.
      // Re-entry guard: if a second swap arrives for the same row before
      // the first View Transition's 340ms cross-fade completes, the spec
      // aborts the in-flight transition and the .finished cleanup may
      // clear the wrong newRow's viewTransitionName. Instead of racing,
      // skip the second call — the user's last click still wins on the
      // server (the fetch already returned), and the optimistic DOM is
      // accurate for the prior swap.
      var __eventSwapInFlight = Object.create(null);
      function applyEventPatchInPlace(dayIdx, eventIdx, patch) {
        var trip = window.__tripData;
        if (!trip || !trip.days || !trip.days[dayIdx]) return false;
        var dayObj = trip.days[dayIdx];
        var ev = dayObj.events && dayObj.events[eventIdx];
        if (!ev) return false;

        var swapKey = dayIdx + ':' + eventIdx;
        if (__eventSwapInFlight[swapKey]) return false;

        // Mutate canonical client state. The server already persisted the
        // same patch via /api/swap-event, so this is just keeping the
        // in-memory trip object honest for any later reads.
        // Strip undefined values so keys like `rating: undefined` don't
        // overwrite an existing rating when the alt-venue API omits it.
        var cleanPatch = {};
        Object.keys(patch).forEach(function(k) { if (patch[k] !== undefined) cleanPatch[k] = patch[k]; });
        Object.assign(ev, cleanPatch);

        var row = document.querySelector('.event[data-day-idx="' + dayIdx + '"][data-event-idx="' + eventIdx + '"]');
        if (!row) return false;

        // Preserve expanded body state across the swap so a user reading
        // the details of the venue they just swapped doesn't have to
        // re-open the card.
        var oldCard = row.querySelector('.event-card');
        var wasExpanded = oldCard && oldCard.classList.contains('is-expanded');

        // Stop number doesn't change for a same-position swap; reuse it.
        var num = row.getAttribute('data-stop-num');
        num = num ? Number(num) : null;

        var newHtml = renderEventCard(ev, num, dayIdx, eventIdx, dayObj.date, dayObj.day);
        var temp = document.createElement('div');
        temp.innerHTML = newHtml;
        var newRow = temp.firstElementChild;
        if (!newRow) return false;

        if (wasExpanded) {
          var newCard = newRow.querySelector('.event-card');
          if (newCard) {
            newCard.classList.add('is-expanded');
            newCard.setAttribute('aria-expanded', 'true');
          }
        }

        var vtName = 'evt-swap-' + dayIdx + '-' + eventIdx;
        var supportsVT = typeof document.startViewTransition === 'function';
        var execSwap = function() {
          row.parentNode.replaceChild(newRow, row);
          if (supportsVT) newRow.style.viewTransitionName = vtName;
          // Accent-glow ping, layered on top of the cross-fade. Self-clears
          // via animationend so we don't accumulate stale classes.
          var card = newRow.querySelector('.event-card');
          if (card) {
            card.classList.add('event-card--swap-flash');
            card.addEventListener('animationend', function onEnd(e) {
              if (e.animationName === 'event-swap-flash') {
                card.classList.remove('event-card--swap-flash');
                card.removeEventListener('animationend', onEnd);
              }
            });
          }
        };

        __eventSwapInFlight[swapKey] = true;
        var clearGuard = function() { delete __eventSwapInFlight[swapKey]; };

        if (supportsVT) {
          row.style.viewTransitionName = vtName;
          var transition = document.startViewTransition(execSwap);
          transition.finished.finally(function() {
            if (newRow && newRow.style) newRow.style.viewTransitionName = '';
            clearGuard();
          });
        } else {
          execSwap();
          // No VT lifecycle — release the guard once the flash keyframe
          // has had time to land. 1100ms matches the keyframe duration.
          setTimeout(clearGuard, 1100);
        }

        // Re-evaluate live state for the changed row (current/done/upcoming).
        if (typeof recomputeItineraryStates === 'function') {
          try { recomputeItineraryStates(); } catch (_) {}
        }

        // Drive-times to/from this stop changed if the venue moved.
        if (patch && patch.venue && typeof hydrateDriveTimes === 'function') {
          try { hydrateDriveTimes(trip); } catch (_) {}
        }

        return true;
      }
      window.__applyEventPatchInPlace = applyEventPatchInPlace;

      // ─── Find-alternatives modal ─────────────────────────────────────
      // Opens a dark-themed popup, fetches 3 real nearby alternatives from
      // /api/find-alternatives (Sonnet + web_search), and lets the user
      // click one to swap via /api/swap-event. No free-text chat step —
      // this is a focused, point-and-shoot flow.

      function buildAltModal() {
        var m = document.createElement('div');
        m.id = 'alt-modal';
        m.className = 'alt-modal';
        m.hidden = true;
        m.innerHTML =
          '<div class="alt-modal-backdrop"></div>' +
          '<div class="alt-modal-panel" role="dialog" aria-modal="true" aria-labelledby="alt-modal-title">' +
          '  <button type="button" class="alt-modal-close" aria-label="Close"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>' +
          '  <div class="alt-modal-header">' +
          '    <div class="alt-modal-eyebrow"><span class="alt-modal-eyebrow-line"></span><span class="alt-modal-eyebrow-text">Alternatives to</span><span class="alt-modal-eyebrow-line"></span></div>' +
          '    <h3 class="alt-modal-title" id="alt-modal-title"><span id="alt-modal-target"></span></h3>' +
          '  </div>' +
          '  <div class="alt-modal-body" id="alt-modal-body"></div>' +
          '</div>';
        document.body.appendChild(m);
        // Delegated close handler. Bound on the modal root so it survives
        // any innerHTML reshuffle of the modal body, and using closest()
        // so the inner <i> icon never swallows the click. Click (not
        // pointerdown) is deliberate: pointerdown would fire on a touch
        // drag-start that ends elsewhere (false close on touch devices)
        // AND keyboard Space/Enter on the focused button synthesizes a
        // click event, never a pointerdown — so click is the only event
        // that covers mouse, touch, and keyboard activation cleanly.
        m.addEventListener('click', function(e) {
          var closeBtn = e.target.closest && e.target.closest('.alt-modal-close');
          if (closeBtn) {
            console.log('[ALT-MODAL] close clicked, in-flight:', !!altInflight);
            closeAltModal();
            return;
          }
          // Backdrop click closes too — only when the click target IS the
          // backdrop element itself (not a panel child that bubbled).
          if (e.target.classList && e.target.classList.contains('alt-modal-backdrop')) {
            closeAltModal();
          }
        });
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && !m.hidden) {
            console.log('[ALT-MODAL] close via Escape, in-flight:', !!altInflight);
            closeAltModal();
          }
        });
        return m;
      }

      // Rotating status text paired with the progress bar. The backend
      // (Sonnet + web_search) can take 15–30s and occasionally 45+; the
      // loader cadence stretches on the final phase so users don't see
      // the same string churn while they wait.
      var ALT_STATUS_STEPS = [
        'Searching nearby venues\u2026',
        'Reading recent reviews\u2026',
        'Cross-checking with Google Search\u2026',
        'Ranking by proximity and rating\u2026',
        'Almost there \u2014 hang tight\u2026',
      ];
      var altStatusTimer = null;
      // Abort controller for the currently in-flight find-alternatives call.
      // Rapid clicks cancel the prior request so stale results can't overwrite
      // newer ones (otherwise the model's slower response "wins" the UI).
      var altInflight = null;

      function stopAltStatus() {
        if (altStatusTimer) { clearTimeout(altStatusTimer); altStatusTimer = null; }
      }

      function startAltStatusCycle() {
        stopAltStatus();
        var i = 0;
        function tick() {
          var el = document.getElementById('alt-modal-status');
          if (!el) { stopAltStatus(); return; }
          i = Math.min(i + 1, ALT_STATUS_STEPS.length - 1);
          el.classList.add('alt-status-fade');
          setTimeout(function() {
            el.textContent = ALT_STATUS_STEPS[i];
            el.classList.remove('alt-status-fade');
          }, 180);
          // Stretch the final phase so the "Almost there" bubble doesn't
          // re-fire every 2.6s when the fetch runs long.
          var next = (i === ALT_STATUS_STEPS.length - 1) ? 9000 : 2600;
          altStatusTimer = setTimeout(tick, next);
        }
        altStatusTimer = setTimeout(tick, 2600);
      }

      function cancelAltInflight() {
        if (altInflight && typeof altInflight.abort === 'function') {
          try {
            altInflight.abort();
            console.log('[ALT-MODAL] aborted in-flight find-alternatives request');
          } catch (_) {}
        }
        altInflight = null;
      }

      function altSkeletonHtml() {
        var card =
          '<div class="alt-skel-card">' +
          '  <span class="alt-skel-line alt-skel-line--title"></span>' +
          '  <span class="alt-skel-line alt-skel-line--venue"></span>' +
          '  <span class="alt-skel-line alt-skel-line--meta"></span>' +
          '</div>';
        return '<div class="alt-skel-stack" aria-hidden="true">' + card + card + card + '</div>';
      }

      // Last-used constraints per trip event, so re-opening the same alt modal
      // remembers what the user asked for. Scoped by dayIndex:eventIndex.
      var altConstraintsByKey = {};
      // Context of the currently-open modal so "Retry" + "Regenerate" know
      // what to ask for without reaching into DOM ids.
      var altModalCtx = null;

      function constraintsKey(dayIdx, eventIdx) { return dayIdx + ':' + eventIdx; }

      function renderAltConstraintsBar(ctx) {
        var c = ctx.constraints || {};
        var cuisines = ['any', 'vegetarian', 'vegan', 'seafood', 'korean', 'italian', 'mexican'];
        var drives = [
          { id: null, label: 'Any drive' },
          { id: 10,   label: '≤10 min' },
          { id: 20,   label: '≤20 min' },
          { id: 30,   label: '≤30 min' },
        ];
        var parts = ['<div class="alt-constraints" role="group" aria-label="Refine alternatives">'];
        parts.push('<div class="alt-constraints-row">');
        parts.push('<label class="alt-constraint-group"><span>Cuisine</span><select data-constraint="cuisine">');
        cuisines.forEach(function (v) {
          var val = v === 'any' ? '' : v;
          var sel = (c.cuisine || '') === val ? ' selected' : '';
          parts.push('<option value="' + escHtml(val) + '"' + sel + '>' + escHtml(v) + '</option>');
        });
        parts.push('</select></label>');
        parts.push('<label class="alt-constraint-group"><span>Drive</span><select data-constraint="maxDriveMin">');
        drives.forEach(function (d) {
          var val = d.id == null ? '' : String(d.id);
          var sel = String(c.maxDriveMin || '') === val ? ' selected' : '';
          parts.push('<option value="' + val + '"' + sel + '>' + escHtml(d.label) + '</option>');
        });
        parts.push('</select></label>');
        parts.push('<button type="button" class="alt-constraint-apply">Regenerate</button>');
        parts.push('</div>');
        // Free-form steering input. Feeds constraints.notes on the API —
        // hitting Enter triggers the same re-fetch path as the Regenerate
        // button so a typed refinement runs immediately, holistically, with
        // whatever dropdown constraints are already set.
        var notesVal = c.notes || '';
        parts.push('<div class="alt-constraints-notes">');
        parts.push('  <i class="alt-constraints-notes-icon fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i>');
        parts.push('  <input type="text" class="alt-constraints-notes-input" data-constraint="notes" placeholder="Refine \u2014 e.g. vegetarian only, quieter spot, outdoor seating\u2026" value="' + escHtml(notesVal) + '" autocomplete="off" spellcheck="false" aria-describedby="alt-notes-precedence" />');
        parts.push('  <button type="button" class="alt-constraints-notes-submit" aria-label="Submit refinement and search again">Enter</button>');
        parts.push('</div>');
        parts.push('<div id="alt-notes-precedence" class="alt-constraints-precedence-hint">Your prompt overrides the filters above when both are set.</div>');
        parts.push('</div>');
        return parts.join('');
      }

      function readConstraintsFromBar() {
        var bar = document.querySelector('.alt-constraints');
        if (!bar) return {};
        var out = {};
        bar.querySelectorAll('[data-constraint]').forEach(function (el) {
          var key = el.getAttribute('data-constraint');
          var v = el.value;
          if (v == null) return;
          if (key === 'notes') {
            var trimmed = String(v).trim();
            if (trimmed) out.notes = trimmed;
            return;
          }
          if (!v) return;
          if (key === 'maxDriveMin') out[key] = Number(v);
          else out[key] = v;
        });
        return out;
      }

      function renderAltLoadingBody(userPrompt) {
        // When the user typed a refinement, echo it above the generic status
        // so the response visibly acknowledges THEIR input — not just "AI is
        // working" boilerplate.
        var promptEcho = '';
        if (userPrompt) {
          promptEcho =
            '<div class="alt-modal-prompt-echo" role="status" aria-live="polite">' +
            '  <i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i>' +
            '  <span>Evaluating your request: <em>' + escHtml(userPrompt) + '</em></span>' +
            '</div>';
        }
        return (
          promptEcho +
          '<div class="alt-modal-loading" role="status" aria-live="polite">' +
          '  <div class="alt-modal-progress" aria-hidden="true">' +
          '    <div class="alt-modal-progress-bar"></div>' +
          '  </div>' +
          '  <div class="alt-modal-status" id="alt-modal-status">' + ALT_STATUS_STEPS[0] + '</div>' +
          '</div>' +
          altSkeletonHtml()
        );
      }

      // Notes-submit busy state — disables the Enter button + Enter key while
      // a fetch is in flight so rapid double-fires don't stack requests. The
      // input itself stays enabled so the user can start typing the next
      // prompt while waiting for the current one.
      var altNotesBusy = false;
      function setNotesSubmitBusy(busy) {
        altNotesBusy = busy;
        var bodyEl = document.getElementById('alt-modal-body');
        if (!bodyEl) return;
        var btn = bodyEl.querySelector('.alt-constraints-notes-submit');
        if (btn) {
          btn.disabled = busy;
          btn.textContent = busy ? '\u2026' : 'Enter';
          btn.setAttribute('aria-busy', busy ? 'true' : 'false');
        }
      }

      function openAltModal(ctx) {
        altModalCtx = ctx;
        var m = document.getElementById('alt-modal') || buildAltModal();
        document.getElementById('alt-modal-target').textContent = ctx.eventName || '';
        var body = document.getElementById('alt-modal-body');
        body.innerHTML = renderAltConstraintsBar(ctx) + renderAltLoadingBody();
        m.hidden = false;
        // Wire the Regenerate button + notes-Enter so a constraint change
        // can drive a fresh fetch without closing the modal. Both paths call
        // the same applyConstraints() so a typed refinement runs holistically
        // with whatever dropdowns are already set.
        function applyConstraints() {
          if (altNotesBusy) return;
          var next = readConstraintsFromBar();
          // Capture-then-clear: read the typed prompt before wiping the input,
          // so the in-flight fetch carries the value but the field looks fresh
          // for the next refinement attempt.
          var inputEl = document.querySelector('.alt-constraints-notes-input');
          if (inputEl) inputEl.value = '';
          altConstraintsByKey[constraintsKey(ctx.dayIdx, ctx.eventIdx)] = next;
          altModalCtx = Object.assign({}, ctx, { constraints: next });
          setNotesSubmitBusy(true);
          runFindAlternatives(altModalCtx);
        }
        var applyBtn = body.querySelector('.alt-constraint-apply');
        if (applyBtn) applyBtn.addEventListener('click', applyConstraints);
        var notesInput = body.querySelector('.alt-constraints-notes-input');
        if (notesInput) {
          notesInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.isComposing) {
              e.preventDefault();
              if (altNotesBusy) return;
              applyConstraints();
            }
          });
        }
        // Submit button — same handler as Enter-on-input. Standard pattern:
        // every AI widget should auto-run on open AND offer an explicit
        // "submit your override" affordance, not rely on Enter-only.
        var notesSubmit = body.querySelector('.alt-constraints-notes-submit');
        if (notesSubmit) notesSubmit.addEventListener('click', applyConstraints);
        startAltStatusCycle();
      }

      function closeAltModal() {
        stopAltStatus();
        cancelAltInflight();
        var m = document.getElementById('alt-modal');
        if (m) m.hidden = true;
        altModalCtx = null;
        // Reset busy flag — next open should start with a fresh, clickable
        // submit button regardless of how the previous session ended.
        altNotesBusy = false;
      }

      // Replace the result area only — preserves the constraints bar so the
      // user can retry or tweak without losing their selection.
      function updateAltResultsArea(html) {
        var body = document.getElementById('alt-modal-body');
        if (!body) return;
        var bar = body.querySelector('.alt-constraints');
        body.innerHTML = '';
        if (bar) body.appendChild(bar);
        var frag = document.createElement('div');
        frag.innerHTML = html;
        while (frag.firstChild) body.appendChild(frag.firstChild);
      }

      function renderAltError(message) {
        stopAltStatus();
        var errorHtml =
          '<div class="alt-modal-error">' +
          '  <div class="alt-modal-error-text">' + escHtml(message) + '</div>' +
          '  <button type="button" class="alt-modal-retry">Try again</button>' +
          '</div>';
        updateAltResultsArea(errorHtml);
        var retry = document.querySelector('.alt-modal-retry');
        if (retry && altModalCtx) {
          retry.addEventListener('click', function () { runFindAlternatives(altModalCtx); });
        }
      }

      function renderAltOptions(dayIdx, eventIdx, alts) {
        stopAltStatus();
        var body = document.getElementById('alt-modal-body');
        if (!alts || !alts.length) {
          updateAltResultsArea('<div class="alt-modal-error">No alternatives found nearby.</div>');
          return;
        }
        // Keep the constraints bar intact so the notes input + dropdowns
        // stay visible alongside results. updateAltResultsArea preserves it.
        var bar = body.querySelector('.alt-constraints');
        body.innerHTML = '';
        if (bar) body.appendChild(bar);
        alts.forEach(function(alt) {
          var opt = document.createElement('div');
          opt.className = 'alt-option' + (alt.verified ? ' alt-option--verified' : '');
          var htmlParts = [];
          htmlParts.push('<div class="alt-option-header">');
          htmlParts.push('  <span class="alt-option-name">' + escHtml(alt.name || 'Unknown'));
          if (alt.verified) {
            htmlParts.push('    <span class="alt-option-badge" title="Verified via Google Search"><i class="fa-solid fa-circle-check" aria-hidden="true"></i> Verified</span>');
          } else if (alt.verified === false) {
            htmlParts.push('    <span class="alt-option-badge alt-option-badge--warn" title="' + escHtml(alt.verifyNote || 'Not corroborated by Google') + '"><i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i> Unverified</span>');
          }
          htmlParts.push('  </span>');
          if (typeof alt.rating === 'number') {
            htmlParts.push('  <span class="alt-option-rating"><i class="fa-solid fa-star" aria-hidden="true"></i> ' + escHtml(String(alt.rating)) + '</span>');
          }
          htmlParts.push('</div>');
          if (alt.venue) htmlParts.push('<div class="alt-option-venue">' + escHtml(alt.venue) + '</div>');
          var metaBits = [];
          if (alt.phone) metaBits.push('<i class="fa-solid fa-phone" aria-hidden="true"></i> ' + escHtml(alt.phone));
          if (typeof alt.driveMinutes === 'number') metaBits.push('<i class="fa-solid fa-car" aria-hidden="true"></i> ~' + escHtml(String(alt.driveMinutes)) + ' min drive');
          if (metaBits.length) htmlParts.push('<div class="alt-option-meta">' + metaBits.join('<span class="alt-option-sep">\u00b7</span>') + '</div>');
          if (alt.rationale) htmlParts.push('<div class="alt-option-rationale">' + escHtml(alt.rationale) + '</div>');
          htmlParts.push('<button type="button" class="alt-option-swap">Use this <i class="fa-solid fa-arrow-right" aria-hidden="true"></i></button>');
          opt.innerHTML = htmlParts.join('');
          opt.querySelector('.alt-option-swap').addEventListener('click', function(e) {
            e.stopPropagation();
            doSwap(dayIdx, eventIdx, alt);
          });
          body.appendChild(opt);
        });
      }

      function doSwap(dayIdx, eventIdx, alt) {
        stopAltStatus();
        updateAltResultsArea(
          '<div class="alt-modal-loading" role="status" aria-live="polite">' +
          '  <div class="alt-modal-progress" aria-hidden="true">' +
          '    <div class="alt-modal-progress-bar"></div>' +
          '  </div>' +
          '  <div class="alt-modal-status">Swapping in\u2026</div>' +
          '</div>'
        );
        fetch(API_BASE + '/api/swap-event', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tripSlug: SLUG,
            dayIndex: dayIdx,
            eventIndex: eventIdx,
            // `source: 'ai-swap'` marks the edit-log entry so later audits
            // can distinguish AI-suggested swaps from hand-typed edits.
            source: 'ai-swap',
            replacement: {
              name: alt.name,
              venue: alt.venue,
              phone: alt.phone,
              rating: typeof alt.rating === 'number' ? alt.rating : undefined,
            },
          }),
        })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (!data.ok) throw new Error(data.error || 'Swap failed');
            // Close the modal first so the user sees the itinerary they
            // were on. The View Transition cross-fade then animates the
            // single row in place — no full re-render, accordion stays
            // open, scroll position is preserved.
            closeAltModal();
            applyEventPatchInPlace(dayIdx, eventIdx, {
              event: alt.name,
              venue: alt.venue,
              phone: alt.phone,
              rating: typeof alt.rating === 'number' ? alt.rating : undefined,
            });
          })
          .catch(function(err) { renderAltError(err.message || String(err)); });
      }

      // Core fetch for find-alternatives. Pulled out of findAlternate so the
      // constraints bar + retry button can drive re-fetches against the same
      // modal context without re-opening it.
      function runFindAlternatives(ctx) {
        // Abort any previous request — rapid clicks or regenerates must not
        // race: the older, slower response could overwrite the newer one.
        cancelAltInflight();
        var typedPrompt = (ctx.constraints && ctx.constraints.notes) ? ctx.constraints.notes : '';
        updateAltResultsArea(renderAltLoadingBody(typedPrompt));
        startAltStatusCycle();

        var ctl = (typeof AbortController === 'function') ? new AbortController() : null;
        altInflight = ctl;

        fetch(API_BASE + '/api/find-alternatives', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tripSlug: SLUG,
            dayIndex: ctx.dayIdx,
            eventIndex: ctx.eventIdx,
            constraints: ctx.constraints || null,
          }),
          signal: ctl ? ctl.signal : undefined,
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            // Guard against late responses from a superseded request.
            if (altInflight && altInflight !== ctl) return;
            altInflight = null;
            if (!data.ok) throw new Error(data.error || 'No alternatives returned');
            stopAltStatus();
            renderAltOptions(ctx.dayIdx, ctx.eventIdx, data.alternatives);
            setNotesSubmitBusy(false);
          })
          .catch(function (err) {
            if (err && err.name === 'AbortError') return; // superseded — busy state owned by the new request
            altInflight = null;
            renderAltError(err.message || String(err));
            setNotesSubmitBusy(false);
          });
      }

      function findAlternate(dayIdx, eventIdx, eventName) {
        var key = constraintsKey(dayIdx, eventIdx);
        var ctx = {
          dayIdx: dayIdx,
          eventIdx: eventIdx,
          eventName: eventName,
          constraints: altConstraintsByKey[key] || {},
        };
        openAltModal(ctx);
        runFindAlternatives(ctx);
      }

      function formatDayDate(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr + 'T12:00:00');
        var days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
        var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
        return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();
      }

      function escHtml(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      // ─── Data-driven section renderers ──────────────────────────────
      // These populate sections that were formerly hardcoded for a specific
      // trip. Now they read from the fetched trip object.

      function renderHero(trip) {
        var travelers = trip.travelers || [];
        var el;
        document.title = (trip.name || 'Trip Itinerary') + ' — Asif\'s Journal';
        el = document.getElementById('heroBadgeText');
        if (el) el.textContent = trip.occasion || trip.name || 'Trip Itinerary';
        el = document.getElementById('heroNameLeft');
        if (el) el.textContent = travelers[0] || '';
        el = document.getElementById('heroNameRight');
        if (el) el.textContent = travelers[1] || '';
        // Hide ampersand row if solo traveler
        var ampRow = document.querySelector('.hero-ampersand-row');
        if (ampRow && travelers.length < 2) {
          ampRow.innerHTML = '<span class="hero-name-left">' + escHtml(travelers[0] || '') + '</span>';
        }
        el = document.getElementById('heroSubtitle');
        if (el) {
          var subtitle = trip.occasion || trip.theme || trip.name || '';
          if (trip.base) subtitle += ' \u2014 ' + trip.base.replace(/,.*/, '');
          el.textContent = subtitle;
        }
        el = document.getElementById('heroDates');
        if (el && trip.dates) {
          el.textContent = formatDateRange(trip.dates.start, trip.dates.end);
        }
        el = document.getElementById('heroCountdown');
        if (el && trip.dates) {
          el.textContent = computeCountdown(trip.dates.start, trip.dates.end);
        }
        // Populate particles if desired
        var hero = document.getElementById('heroSection');
        if (hero && !hero.querySelector('.hero-particles')) {
          var particles = document.createElement('div');
          particles.className = 'hero-particles';
          particles.innerHTML = '<span class="particle p1">&hearts;</span><span class="particle p2">&hearts;</span><span class="particle p3">&hearts;</span><span class="particle p4">&#10022;</span><span class="particle p5">&#10022;</span>';
          hero.insertBefore(particles, hero.firstChild);
        }
      }

      function formatDateRange(startStr, endStr) {
        if (!startStr) return '';
        var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        var s = new Date(startStr + 'T12:00:00');
        var e = endStr ? new Date(endStr + 'T12:00:00') : null;
        function ordinal(n) {
          var s = ['th','st','nd','rd'], v = n % 100;
          return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }
        var out = months[s.getMonth()] + ' ' + ordinal(s.getDate());
        if (e) out += ' \u2013 ' + ordinal(e.getDate()) + ', ' + e.getFullYear();
        else out += ', ' + s.getFullYear();
        return out;
      }

      function computeCountdown(startStr, endStr) {
        var now = new Date(); now.setHours(0,0,0,0);
        var s = new Date(startStr + 'T00:00:00');
        var e = endStr ? new Date(endStr + 'T23:59:59') : null;
        var daysToStart = Math.ceil((s - now) / 86400000);
        if (daysToStart > 0) return daysToStart + ' day' + (daysToStart !== 1 ? 's' : '') + ' to go';
        if (e && now <= e) return 'Happening now!';
        return 'Completed';
      }

      var PLANE_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21.5 4c0 0-2 .5-3.5 2L14.5 9.5l-8.2-1.8c-.8-.2-1.6.3-1.8 1.1-.1.4 0 .9.3 1.2l4.6 4.6-2.8 2.8-2.6-.6c-.4-.1-.8 0-1.1.3L1.5 18c-.2.2-.2.6 0 .8l4.4 1.4 1.4 4.4c.2.2.6.2.8 0l1.3-1.3c.3-.3.4-.7.3-1.1l-.6-2.6 2.8-2.8 4.6 4.6c.3.3.7.4 1.2.3.8-.2 1.3-1 1.1-1.8z"/></svg>';

      function renderFlightCard(f, isReturn) {
        if (!f) return '';
        var route = (f.route || '').split(/\s*[\u2192→]\s*/);
        var depCode = route[0] || '';
        var arrCode = route[1] || '';
        // Parse city from code (simple mapping for common airports)
        var airports = { LHR:'London, UK', EWR:'Newark, NJ', JFK:'New York, NY', IST:'Istanbul', LHE:'Lahore' };
        var depCity = airports[depCode] || '';
        var arrCity = airports[arrCode] || '';
        var flipClass = isReturn ? ' class="flip-x"' : '';
        var meta1 = escHtml(f.flight || '');
        var meta2 = '';
        if (f.seat) meta2 = 'Seat ' + escHtml(f.seat);
        return '<div class="flight-card">' +
          '<div><div class="fc-airport">' + escHtml(depCode) + '</div><div class="fc-city">' + escHtml(depCity) + '</div><div class="fc-time">' + escHtml(f.depart || '') + '</div></div>' +
          '<div class="fc-route"><div class="fc-meta">' + meta1 + '</div>' + PLANE_SVG.replace('<svg', '<svg' + flipClass) + '<div class="fc-route-line"></div><div class="fc-meta">' + escHtml(meta2) + '</div></div>' +
          '<div class="fc-right"><div class="fc-airport">' + escHtml(arrCode) + '</div><div class="fc-city">' + escHtml(arrCity) + '</div><div class="fc-time">' + escHtml(f.arrive || '') + '</div></div>' +
          '</div>';
      }

      function renderFlights(trip) {
        var sec = document.getElementById('flightsSection');
        if (!sec) return;
        if (!trip.flights || (!trip.flights.inbound && !trip.flights.outbound)) {
          sec.hidden = true;
          return;
        }
        var html = '<div class="section-header"><div class="overline">Travel Details</div><h2>The Journey</h2><div class="divider"><span class="divider-heart">&hearts;</span></div></div>';
        if (trip.flights.inbound) html += renderFlightCard(trip.flights.inbound, false);
        if (trip.flights.outbound) html += renderFlightCard(trip.flights.outbound, true);
        sec.innerHTML = html;
        sec.hidden = false;
      }

      function renderNotes(trip) {
        var sec = document.getElementById('notesSection');
        if (!sec) return;
        var notes = [];
        if (trip.base) notes.push('<strong>Accommodation</strong> \u2014 ' + escHtml(trip.base));
        if (trip.vibe) notes.push('<strong>Vibe</strong> \u2014 ' + escHtml(trip.vibe));
        if (trip.regions && trip.regions.length) notes.push('<strong>Regions</strong> \u2014 ' + escHtml(trip.regions.join(', ')));
        // Add day-level notes
        (trip.days || []).forEach(function(day) {
          if (day.notes) notes.push('<strong>Day ' + day.day + '</strong> \u2014 ' + escHtml(day.notes));
        });
        if (!notes.length) { sec.hidden = true; return; }
        var html = '<div class="section-header"><div class="overline">Practical Details</div><h2>Notes</h2><div class="divider"><span class="divider-heart">&hearts;</span></div></div>';
        html += '<div class="notes-box">';
        notes.forEach(function(n) { html += '<div class="note">' + n + '</div>'; });
        html += '</div>';
        sec.innerHTML = html;
        sec.hidden = false;
      }

      function renderJournalDays(trip) {
        var sel = document.getElementById('journalDay');
        if (!sel || !trip.days) return;
        sel.innerHTML = '';
        trip.days.forEach(function(day) {
          var opt = document.createElement('option');
          opt.textContent = 'Day ' + day.day + ' \u2014 ' + escHtml(day.date || '') + ': ' + escHtml(day.title || '');
          sel.appendChild(opt);
        });
      }

      function renderFooter(trip) {
        var el = document.getElementById('footerLocation');
        if (!el) return;
        var parts = [];
        if (trip.regions && trip.regions.length) parts.push(trip.regions[0]);
        else if (trip.base) parts.push(trip.base.replace(/,.*/, ''));
        if (trip.dates && trip.dates.start) {
          var d = new Date(trip.dates.start + 'T12:00:00');
          var seasons = ['Winter','Winter','Spring','Spring','Spring','Summer','Summer','Summer','Autumn','Autumn','Autumn','Winter'];
          parts.push(seasons[d.getMonth()] + ' ' + d.getFullYear());
        }
        el.innerHTML = escHtml(parts.join(' \u2022 '));
      }

      function renderTimelineOverline(trip) {
        var el = document.getElementById('timelineOverline');
        if (!el || !trip.dates) return;
        el.textContent = trip.dates.days + ' Days Together';
      }

      function renderTripContext(trip) {
        window.__tripContext = {
          slug: SLUG,
          name: trip.name || '',
          dates: trip.dates || {}
        };
      }

      // ─── Resolve slug from manifest if not in URL ──────────────────
      function resolveSlug() {
        if (SLUG) return Promise.resolve(SLUG);
        return fetch('../data/manifest.json')
          .then(function(r) { return r.json(); })
          .then(function(m) {
            SLUG = (m.active && m.active.slug) || null;
            if (!SLUG) throw new Error('No active trip in manifest and no ?trip= param');
            // Update URL so bookmarks work
            var url = new URL(window.location);
            url.searchParams.set('trip', SLUG);
            window.history.replaceState(null, '', url);
            return SLUG;
          });
      }

      // Fetch + render. Exposed so the FloatingChat apply handler can
      // re-render the page in place (SPA-style) instead of forcing a reload.
      function refreshItinerary(opts) {
        var resolvedSlug;
        var preserve = !!(opts && opts.preserveState);
        return resolveSlug().then(function(slug) {
          resolvedSlug = slug;
          window.__API_BASE = API_BASE;
          console.log('[ITIN:LOAD]', 'Fetching trip data for', slug);
          var fetches = [
            fetch(API_BASE + '/api/trip/' + slug + '/full', { credentials: 'include' }).then(function(r) { return r.json(); })
          ];
          if (typeof window.fetchTripStops === 'function') {
            fetches.push(window.fetchTripStops(slug));
          }
          return Promise.all(fetches);
        })
          .then(function(results) {
            var data = results[0];
            if (data.ok && data.trip) {
              if (typeof window.buildDayStopsFromTrip === 'function') window.buildDayStopsFromTrip(data.trip);
              renderTripContext(data.trip);
              renderHero(data.trip);
              renderFlights(data.trip);
              renderItinerary(data.trip, { preserveState: preserve });
              renderNotes(data.trip);
              renderJournalDays(data.trip);
              renderFooter(data.trip);
              renderTimelineOverline(data.trip);
              window.__tripData = data.trip;
              return data.trip;
            }
            console.log('[ITIN:ERR]', 'API returned', data.error || 'no trip data');
            return null;
          })
          .catch(function(err) {
            console.log('[ITIN:ERR]', 'Fetch failed', err.message);
            return null;
          });
      }
      window.__refreshItinerary = refreshItinerary;
      // ─── Delete-event confirmation modal ─────────────────────────────
      // Opens a styled confirm dialog; on confirm calls /api/delete-event
      // and re-renders. Cancel just closes. Single singleton DOM node —
      // re-used across calls. All state flows through delModalCtx so the
      // confirm handler knows what to POST.
      var delModalCtx = null;
      var delModal = null;

      function buildDeleteModal() {
        var m = document.createElement('div');
        m.id = 'del-modal';
        m.className = 'del-modal';
        m.hidden = true;
        m.innerHTML =
          '<div class="del-modal-backdrop"></div>' +
          '<div class="del-modal-panel" role="alertdialog" aria-modal="true" aria-labelledby="del-modal-title" aria-describedby="del-modal-msg">' +
          '  <div class="del-modal-icon" aria-hidden="true">' +
          '    <i class="fa-solid fa-trash-can"></i>' +
          '  </div>' +
          '  <h3 class="del-modal-title" id="del-modal-title">Delete this stop?</h3>' +
          '  <p class="del-modal-msg" id="del-modal-msg">' +
          '    You\u2019re about to remove <span class="del-modal-target"></span> from the itinerary. This change can be reverted from the edit log if needed.' +
          '  </p>' +
          '  <div class="del-modal-actions">' +
          '    <button type="button" class="del-modal-btn del-modal-btn--cancel">Keep it</button>' +
          '    <button type="button" class="del-modal-btn del-modal-btn--confirm"><i class="fa-solid fa-trash-can" aria-hidden="true"></i>Delete</button>' +
          '  </div>' +
          '</div>';
        document.body.appendChild(m);
        m.querySelector('.del-modal-backdrop').addEventListener('click', closeDeleteModal);
        m.querySelector('.del-modal-btn--cancel').addEventListener('click', closeDeleteModal);
        m.querySelector('.del-modal-btn--confirm').addEventListener('click', confirmDelete);
        document.addEventListener('keydown', function(e) {
          if (m.hidden) return;
          if (e.key === 'Escape') closeDeleteModal();
          else if (e.key === 'Enter') confirmDelete();
        });
        return m;
      }

      function openDeleteModal(ctx) {
        delModalCtx = ctx;
        if (!delModal) delModal = buildDeleteModal();
        var targetEl = delModal.querySelector('.del-modal-target');
        targetEl.textContent = '\u201c' + (ctx.eventName || 'this stop') + '\u201d';
        delModal.hidden = false;
        delModal.classList.remove('is-pending');
        // Focus the cancel button by default — safest affordance for a
        // destructive action.
        setTimeout(function() {
          var btn = delModal.querySelector('.del-modal-btn--cancel');
          if (btn) btn.focus();
        }, 50);
      }

      function closeDeleteModal() {
        if (!delModal) return;
        delModal.hidden = true;
        delModal.classList.remove('is-pending');
        delModalCtx = null;
      }

      function confirmDelete() {
        if (!delModalCtx || !delModal) return;
        if (delModal.classList.contains('is-pending')) return; // already in flight
        var ctx = delModalCtx;
        delModal.classList.add('is-pending');
        fetch(API_BASE + '/api/delete-event', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tripSlug: SLUG,
            dayIndex: ctx.dayIdx,
            eventIndex: ctx.eventIdx,
            eventName: ctx.eventName || '',
          }),
        })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (!data.ok) throw new Error(data.error || 'Delete failed');
            closeDeleteModal();
            if (window.notify && typeof window.notify.success === 'function') {
              window.notify.success('Removed \u201c' + (ctx.eventName || 'stop') + '\u201d from the itinerary');
            }
            // Delete is a structural change (renumbers stops + map markers),
            // so we re-fetch the full trip — but in preserve mode so the
            // user's open day, expanded cards, and scroll all hold.
            refreshItinerary({ preserveState: true });
          })
          .catch(function(err) {
            console.warn('[DELETE-EVENT]', err);
            delModal.classList.remove('is-pending');
            if (window.notify && typeof window.notify.error === 'function') {
              window.notify.error('Couldn\u2019t delete: ' + (err.message || String(err)));
            }
          });
      }

      function requestDeleteEvent(dayIdx, eventIdx, eventName) {
        openDeleteModal({ dayIdx: dayIdx, eventIdx: eventIdx, eventName: eventName });
      }
      window.requestDeleteEvent = requestDeleteEvent;

      // ─── Click-to-edit event title ──────────────────────────────────
      // Turn the <h4> into a contenteditable field on click. Tab/Enter/blur
      // commits; Escape cancels; empty on commit restores the original so
      // the title can never be blank. Saves through /api/swap-event —
      // same route the alt-modal uses, tagged source: manual-swap.
      function beginTitleEdit(e, el) {
        if (e && typeof e.stopPropagation === 'function') e.stopPropagation();
        if (!el || el.classList.contains('is-editing') || el.classList.contains('is-saving')) return;
        var original = (el.textContent || '').trim();
        el.setAttribute('data-original', original);
        el.classList.add('is-editing');
        el.setAttribute('contenteditable', 'plaintext-only');
        el.focus();
        // Select all so the user can immediately overtype.
        try {
          var sel = window.getSelection();
          var range = document.createRange();
          range.selectNodeContents(el);
          sel.removeAllRanges();
          sel.addRange(range);
        } catch (_) {}
        el.addEventListener('blur', commitTitleEdit);
        el.addEventListener('keydown', handleTitleKey);
        // Swallow clicks inside the editable so they don't bubble to the
        // accordion toggle while the user is selecting/editing text.
        el.addEventListener('click', swallowClickWhileEditing);
      }

      function swallowClickWhileEditing(e) {
        if (e && typeof e.stopPropagation === 'function') e.stopPropagation();
      }

      function handleTitleKey(e) {
        var el = e.target;
        if (e.key === 'Enter' || e.key === 'Tab') {
          // Both commit; let Tab move focus naturally after blur fires.
          if (e.key === 'Enter') e.preventDefault();
          el.blur();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          el.textContent = el.getAttribute('data-original') || '';
          el.blur();
        }
      }

      function commitTitleEdit(e) {
        var el = e.target;
        el.removeEventListener('blur', commitTitleEdit);
        el.removeEventListener('keydown', handleTitleKey);
        el.removeEventListener('click', swallowClickWhileEditing);
        el.classList.remove('is-editing');
        el.removeAttribute('contenteditable');

        // Normalize: trim + collapse any pasted line breaks to spaces.
        // contenteditable can smuggle <br>s into textContent as "\n".
        var next = (el.textContent || '').replace(/\s+/g, ' ').trim();
        var original = el.getAttribute('data-original') || '';

        if (!next) {
          // Rule: titles are never blank. Quietly restore.
          el.textContent = original;
          return;
        }
        if (next === original) {
          el.textContent = original; // normalize any stray whitespace
          return;
        }
        el.textContent = next;

        var dayIdx = Number(el.getAttribute('data-day-idx'));
        var eventIdx = Number(el.getAttribute('data-event-idx'));
        if (!Number.isFinite(dayIdx) || !Number.isFinite(eventIdx)) return;

        el.classList.add('is-saving');
        fetch(API_BASE + '/api/swap-event', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tripSlug: SLUG,
            dayIndex: dayIdx,
            eventIndex: eventIdx,
            source: 'manual-swap',
            replacement: { name: next },
          }),
        })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            el.classList.remove('is-saving');
            if (!data.ok) throw new Error(data.error || 'Save failed');
            if (window.notify && typeof window.notify.success === 'function') {
              window.notify.success('Renamed to \u201c' + next + '\u201d');
            }
            // Surgical update — just this one row, with cross-fade. No full
            // re-render, so the accordion stays open and scroll is held.
            applyEventPatchInPlace(dayIdx, eventIdx, { event: next });
          })
          .catch(function(err) {
            el.classList.remove('is-saving');
            el.textContent = original;
            console.warn('[TITLE-EDIT]', err);
            if (window.notify && typeof window.notify.error === 'function') {
              window.notify.error('Couldn\u2019t save: ' + (err.message || String(err)));
            }
          });
      }
      window.beginTitleEdit = beginTitleEdit;

      // Expose findAlternate to the global scope so inline onclick handlers
      // on the generated .alt-find-btn buttons can reach it. Everything else
      // in this IIFE is internal.
      window.findAlternate = findAlternate;

      document.addEventListener('DOMContentLoaded', refreshItinerary);
    })();
  </script>

  <script>
    // Accordion Toggle for Timeline
    // Toggle an event accordion. Called from the inline onclick on each
    // .event-card. Interactive children (links, buttons) bail out so they
    // keep their native behavior. `event.stopPropagation()` in the inline
