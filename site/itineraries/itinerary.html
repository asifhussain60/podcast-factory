    // attribute prevents the click from bubbling up to the parent day-card,
    // which would close the day.
    function toggleEventCard(e, card) {
      if (e && e.target && e.target.closest('a, button')) return;
      if (!card) return;
      var next = !card.classList.contains('is-expanded');
      card.classList.toggle('is-expanded', next);
      card.setAttribute('aria-expanded', next ? 'true' : 'false');
    }
    window.toggleEventCard = toggleEventCard;

    function toggleCard(card) {
      var isOpen = card.classList.contains('open');

      // Same card → just close.
      if (isOpen) {
        card.classList.remove('open');
        return;
      }

      // Snap-close any other open cards without animation so the layout is
      // stable the instant we measure-and-scroll. Without this the collapse
      // transition (750ms) runs concurrently, pulling the clicked card up
      // while the browser is trying to scroll to it.
      document.querySelectorAll('.day-card.open').forEach(function(c) {
        c.classList.add('no-anim');
        c.classList.remove('open');
        // Re-enable transitions after layout settles so the *next* toggle
        // animates normally.
        requestAnimationFrame(function() {
          requestAnimationFrame(function() { c.classList.remove('no-anim'); });
        });
      });

      card.classList.add('open');

      var mapEl = card.querySelector('.day-map');
      if (mapEl && !mapEl._leaflet_id) {
        setTimeout(function(){ initMap(mapEl.id); }, 100);
      }

      // Scroll header to top of viewport. Nav is position:fixed, so we
      // measure its live height and offset by that + a breathing gap,
      // otherwise the expanded card's header gets chopped off behind it.
      // Wait one frame so the browser recomputes layout after the class toggles.
      requestAnimationFrame(function() {
        scrollToTarget(card);
      });
    }

    // ── Itinerary state: upcoming / current / done ─────────────────────
    // Events self-classify against the wall clock so the timeline can
    // visually mark where "now" is. Done events dim; the current event
    // pulses with an accent ring. Runs on render and every 60s.
    function parseEventTime(dateIso, timeStr) {
      if (!dateIso || !timeStr) return null;
      var m = String(timeStr).trim().match(/^(\d{1,2}):?(\d{2})?\s*(AM|PM|am|pm)?$/);
      if (!m) return null;
      var h = parseInt(m[1], 10);
      var min = m[2] ? parseInt(m[2], 10) : 0;
      var period = m[3] ? m[3].toUpperCase() : '';
      if (period === 'PM' && h < 12) h += 12;
      if (period === 'AM' && h === 12) h = 0;
      var parts = dateIso.split('-');
      if (parts.length !== 3) return null;
      return new Date(
        parseInt(parts[0], 10),
        parseInt(parts[1], 10) - 1,
        parseInt(parts[2], 10),
        h, min, 0, 0
      );
    }

    function recomputeItineraryStates() {
      var now = Date.now();
      var todayIsoLocal = (function() {
        var d = new Date();
        return d.getFullYear() + '-' +
          String(d.getMonth() + 1).padStart(2, '0') + '-' +
          String(d.getDate()).padStart(2, '0');
      })();
      document.querySelectorAll('.day-card').forEach(function(dayCard) {
        var dayDate = dayCard.getAttribute('data-day-date') || '';
        var dayState;
        if (dayDate && dayDate < todayIsoLocal) dayState = 'done';
        else if (dayDate && dayDate > todayIsoLocal) dayState = 'upcoming';
        else dayState = 'current';
        dayCard.setAttribute('data-state', dayState);

        dayCard.querySelectorAll('.event').forEach(function(evEl) {
          var timeStr = evEl.getAttribute('data-event-time') || '';
          var durStr = evEl.getAttribute('data-event-duration') || '';
          var start = parseEventTime(dayDate, timeStr);
          var evState;
          if (dayState === 'done') {
            evState = 'done';
          } else if (dayState === 'upcoming') {
            evState = 'upcoming';
          } else if (!start) {
            // No time on this event — can't classify intra-day, leave neutral.
            evState = 'current';
          } else {
            var dur = parseInt(durStr, 10);
            if (!dur || isNaN(dur)) dur = 30; // sensible default
            var endMs = start.getTime() + dur * 60 * 1000;
            if (now > endMs) evState = 'done';
            else if (now >= start.getTime()) evState = 'current';
            else evState = 'upcoming';
          }
          evEl.setAttribute('data-state', evState);
        });
      });
    }
    window.recomputeItineraryStates = recomputeItineraryStates;

    // Single idempotent 60s tick — re-classifies so event state flips
    // through done → current → upcoming as the day progresses.
    // Also re-evaluates timing conflicts (an event crossing into "done"
    // may clear a conflict that was flagged earlier).
    if (window.__itineraryTickInterval) clearInterval(window.__itineraryTickInterval);
    window.__itineraryTickInterval = setInterval(function() {
      recomputeItineraryStates();
      if (typeof flagTimingConflicts === 'function' && window.__tripData) {
        try { flagTimingConflicts(window.__tripData); } catch (_) {}
      }
    }, 60 * 1000);

    // Scroll target into view, accounting for the fixed nav. If the target
    // day contains a "current" event, scroll to that event; otherwise the
    // day header. ~12px breathing room above nav baseline.
    function scrollToTarget(dayCard) {
      if (!dayCard) return;
      var nav = document.querySelector('.nav');
      var navH = nav ? nav.offsetHeight : 72;
      var anchor = dayCard.querySelector('.event[data-state="current"]') || dayCard;
      var rect = anchor.getBoundingClientRect();
      var target = rect.top + window.pageYOffset - navH - 12;
      window.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
    }
    window.scrollToTarget = scrollToTarget;

    // Lavender marker icon
    var pinIcon = L.divIcon({
      className: '',
      html: '<svg width="24" height="36" viewBox="0 0 24 36"><path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z" fill="#9B72CF"/><circle cx="12" cy="11" r="5" fill="#fff"/><circle cx="12" cy="11" r="2.5" fill="#9B72CF"/></svg>',
      iconSize: [24, 36],
      iconAnchor: [12, 36],
      popupAnchor: [0, -30]
    });

    // Day stop data — populated dynamically per trip.
    // Fetched from /api/trip/{slug}/stops or built from trip data coords.
    // Falls back to empty (maps show "no stops") when geo data is unavailable.
    var dayStops = window.__dayStops = {};

    // Populate dayStops from trip data if events have lat/lng, or from
    // a separate stops fetch. Called after trip data loads.
    function buildDayStopsFromTrip(trip) {
      if (!trip || !trip.days) return;
      trip.days.forEach(function(day) {
        var key = 'map' + day.day;
        var stops = [];
        (day.events || []).forEach(function(ev) {
          if (ev.lat != null && ev.lng != null) {
            stops.push([ev.lat, ev.lng, ev.event || ev.venue || '']);
          }
        });
        if (stops.length) dayStops[key] = stops;
      });
    }
    window.buildDayStopsFromTrip = buildDayStopsFromTrip;

    function fetchTripStops(slug) {
      var apiBase = window.__API_BASE || '';
      return fetch(apiBase + '/api/trip/' + slug + '/stops', { credentials: 'include' })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          if (data && data.ok && data.stops) {
            Object.keys(data.stops).forEach(function(k) { dayStops[k] = data.stops[k]; });
          }
        })
        .catch(function() { /* stops data unavailable — maps degrade gracefully */ });
    }
    window.fetchTripStops = fetchTripStops;

    function makeNumberedPin(n) {
      return L.divIcon({
        className: 'map-pin-num',
        html: String(n),
        iconSize: [28, 28],
        iconAnchor: [14, 28],
        popupAnchor: [0, -22]
      });
    }

    function initMap(id) {
      var stops = dayStops[id];
      if (!stops) return;
      // Guard against container that was removed between schedule + call.
      var el = document.getElementById(id);
      if (!el) return;
      if (el._leaflet_id) return;
      var map = L.map(id, { scrollWheelZoom: false, attributionControl: true });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);
      var bounds = [];
      stops.forEach(function(s, i) {
        var icon = makeNumberedPin(i + 1);
        L.marker([s[0], s[1]], { icon: icon })
          .addTo(map)
          .bindPopup('<b>' + (i + 1) + '. ' + s[2] + '</b>');
        bounds.push([s[0], s[1]]);
      });
      L.polyline(bounds, { color: '#9B72CF', weight: 2, dashArray: '6,8', opacity: 0.6 }).addTo(map);
      map.fitBounds(bounds, { padding: [30, 30] });
      // Track so renderItinerary() can destroy before re-rendering.
      (window.__leafletMaps = window.__leafletMaps || {})[id] = map;
    }
    // Expose map helper for itinerary-reorder.js (Phase 12) — it needs to
    // rebuild pins/polylines after a drag-drop without a full timeline
    // re-render. Keep alongside the existing buildDayStopsFromTrip export
    // so the boot script's hydration pipeline stays unchanged.
    window.initMap = initMap;

    // Populate `.event-chip--drive` cells with live Google Distance Matrix
    // values. Quiet no-op when the server reports no key configured
    // (key:false) — the chip keeps its "— drive" placeholder.
    async function hydrateDriveTimes(trip) {
      if (!trip || !Array.isArray(trip.days)) return;
      var NUMBERED = { DINING:1, CAFE:1, NATURE:1, SHOPPING:1, SPA:1, ENTERTAINMENT:1, REST:1, ENGAGEMENT_HIGHLIGHT:1, EVENT:1, CELEBRATION:1, APPOINTMENT:1 };
      for (var di = 0; di < trip.days.length; di += 1) {
        var day = trip.days[di];
        var waypoints = [];
        (day.events || []).forEach(function(ev) {
          var tag = String(ev.tag || '').toUpperCase();
          if (NUMBERED[tag] && (ev.venue || ev.address)) waypoints.push(ev.venue || ev.address);
        });
        if (waypoints.length < 2) continue;
        try {
          var resp = await fetch(window.__API_BASE + '/api/distance-matrix', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ waypoints: waypoints })
          });
          if (!resp.ok) continue;
          var data = await resp.json();
          if (!data.ok || !data.key || !Array.isArray(data.pairs)) continue;
          // pair[i] = drive from stop i+1 to stop i+2. Apply to [data-stop-num=i+1].
          data.pairs.forEach(function(pair, idx) {
            if (pair.duration_min == null) return;
            var sel = '.day-card[data-day="' + day.day + '"] .event[data-stop-num="' + (idx + 1) + '"] .event-chip--drive .drive-val';
            var node = document.querySelector(sel);
            if (node) {
              node.textContent = pair.duration_min + ' min drive' + (pair.distance_mi ? ' · ' + pair.distance_mi + ' mi' : '');
            }
          });
        } catch (err) {
          console.warn('[DRIVE-TIMES] day', day.day, err);
        }
      }
      if (typeof reapplyGlowAfterDrives === 'function') reapplyGlowAfterDrives();
    }

    // ─── Weather tiles ───────────────────────────────────────────────────
    // Per-event date+location forecast via Open-Meteo (proxied through
    // /api/weather). Painted from localStorage immediately, then refreshed
    // in the background — but only for imminent dates (today..today+3).
    // Dates further out keep their cached value indefinitely: forecasts
    // beyond ~3 days are unreliable, so re-fetching adds noise, not info.
    var WEATHER_CACHE_KEY = 'weather:v2';
    var LONG_DRIVE_MIN = 30;
    var REFRESH_WINDOW_DAYS = 3;

    function loadWeatherCache() {
      try {
        var raw = localStorage.getItem(WEATHER_CACHE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (e) { return {}; }
    }
    function saveWeatherCache(cache) {
      try { localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify(cache)); } catch (e) {}
    }
    function weatherCacheKey(lat, lng, date) {
      return Number(lat).toFixed(2) + ':' + Number(lng).toFixed(2) + ':' + date;
    }
    function todayIso() { return new Date().toISOString().slice(0, 10); }
    function daysBetween(isoA, isoB) {
      var a = Date.parse(isoA + 'T00:00:00Z');
      var b = Date.parse(isoB + 'T00:00:00Z');
      if (!isFinite(a) || !isFinite(b)) return Infinity;
      return Math.round((b - a) / 86400000);
    }
    function shouldRefresh(date) {
      // Fetch fresh only when the event falls within [today, today+REFRESH_WINDOW_DAYS].
      var delta = daysBetween(todayIso(), date);
      return delta >= 0 && delta <= REFRESH_WINDOW_DAYS;
    }

    function paintWeatherTile(tile, w) {
      if (!tile || !w) return;
      tile.classList.remove('is-loading');
      tile.setAttribute('data-severity', w.severity || 'none');
      var iconEl = tile.querySelector('.weather-icon');
      var hiEl = tile.querySelector('.weather-hi');
      var loEl = tile.querySelector('.weather-lo');
      var labelEl = tile.querySelector('.weather-label');
      var windEl = tile.querySelector('.weather-wind');
      var precipEl = tile.querySelector('.weather-precip');
      if (iconEl && w.icon) iconEl.className = 'weather-icon fa-solid ' + w.icon;
      if (hiEl) hiEl.textContent = (w.tempMax != null ? w.tempMax : (w.tempF != null ? w.tempF : '—')) + '°';
      if (loEl) loEl.textContent = (w.tempMin != null ? w.tempMin + '°' : (w.tempF != null ? w.tempF + '°' : '—'));
      if (labelEl && w.label) labelEl.textContent = w.label;
      if (windEl && w.windMph != null) windEl.textContent = w.windMph + ' mph';
      if (precipEl && w.precipPct != null) precipEl.textContent = w.precipPct + '%';
      else if (precipEl) precipEl.textContent = '—';
    }

    function applyGlowForEvent(eventEl, severity) {
      if (!eventEl) return;
      eventEl.classList.remove('is-weather-warn', 'is-weather-alert');
      if (!severity || severity === 'none') return;
      var outdoor = eventEl.getAttribute('data-outdoor') === '1';
      var driveChip = eventEl.querySelector('.event-chip--drive .drive-val');
      var longDrive = false;
      if (driveChip) {
        var m = /(\d+)\s*min\s*drive/.exec(driveChip.textContent || '');
        if (m && Number(m[1]) >= LONG_DRIVE_MIN) longDrive = true;
      }
      if (!outdoor && !longDrive) return;
      eventEl.classList.add(severity === 'alert' ? 'is-weather-alert' : 'is-weather-warn');
    }

    async function fetchWeather(lat, lng, date) {
      var url = window.__API_BASE + '/api/weather?lat=' + lat + '&lng=' + lng + '&date=' + encodeURIComponent(date);
      var ctl = (typeof AbortController === 'function') ? new AbortController() : null;
      var to = ctl ? setTimeout(function () { ctl.abort(); }, 10000) : null;
      try {
        var resp = await fetch(url, ctl ? { signal: ctl.signal, credentials: 'include' } : { credentials: 'include' });
        if (!resp.ok) throw new Error('http_' + resp.status);
        var j = await resp.json();
        if (!j.ok) throw new Error(j.error || 'weather_failed');
        return { tempF: j.tempF, tempMin: j.tempMin, tempMax: j.tempMax, windMph: j.windMph, icon: j.icon, label: j.label, severity: j.severity };
      } finally {
        if (to) clearTimeout(to);
      }
    }

    function applyGlowToDayEvents(dayCard, severity) {
      if (!dayCard) return;
      dayCard.querySelectorAll('.event').forEach(function(eventEl) {
        applyGlowForEvent(eventEl, severity);
      });
    }

    // Drop a tile out of the loading state when the forecast can't be
    // hydrated, so the UI shows a clear "—" instead of spinning forever.
    function markWeatherTileFailed(tile) {
      if (!tile) return;
      tile.classList.remove('is-loading');
      tile.setAttribute('data-severity', 'none');
      tile.setAttribute('title', 'Weather unavailable');
      var hi = tile.querySelector('.weather-hi'); if (hi) hi.textContent = '—';
      var lo = tile.querySelector('.weather-lo'); if (lo) lo.textContent = '—';
      var lbl = tile.querySelector('.weather-label'); if (lbl) lbl.textContent = 'unavailable';
    }

    async function hydrateWeather(trip) {
      var headers = document.querySelectorAll('.day-weather[data-weather-lat][data-weather-lng][data-weather-date]');
      if (!headers.length) return;
      var cache = loadWeatherCache();

      headers.forEach(function(header) {
        var lat = header.getAttribute('data-weather-lat');
        var lng = header.getAttribute('data-weather-lng');
        var date = header.getAttribute('data-weather-date');
        if (!lat || !lng || !date) return;
        var ck = weatherCacheKey(lat, lng, date);
        var hit = cache[ck];
        if (hit && hit.data) {
          paintWeatherTile(header, hit.data);
          applyGlowToDayEvents(header.closest('.day-card'), hit.data.severity);
        }
      });

      for (var i = 0; i < headers.length; i += 1) {
        var header = headers[i];
        var lat = header.getAttribute('data-weather-lat');
        var lng = header.getAttribute('data-weather-lng');
        var date = header.getAttribute('data-weather-date');
        if (!lat || !lng || !date) {
          // Missing coords — clear the spinner so the tile doesn't hang.
          markWeatherTileFailed(header);
          continue;
        }
        var ck = weatherCacheKey(lat, lng, date);
        var cached = cache[ck];
        if (cached && !shouldRefresh(date)) continue;
        try {
          var data = await fetchWeather(lat, lng, date);
          cache[ck] = { at: Date.now(), data: data };
          paintWeatherTile(header, data);
          applyGlowToDayEvents(header.closest('.day-card'), data.severity);
        } catch (err) {
          console.warn('[WEATHER]', date, lat, lng, err);
          // Only swap to the unavailable state when we have NO prior data at
          // all; otherwise keep the cached tile as-is.
          if (!cached) markWeatherTileFailed(header);
        }
      }
      saveWeatherCache(cache);
    }

    // Re-evaluate glow after drive times hydrate (long-drive status can flip).
    function reapplyGlowAfterDrives() {
      document.querySelectorAll('.day-weather[data-severity]').forEach(function(header) {
        var severity = header.getAttribute('data-severity');
        if (!severity || severity === 'none') return;
        applyGlowToDayEvents(header.closest('.day-card'), severity);
      });
      // Re-evaluate timing conflicts now that drive data is available.
      if (window.__tripData) flagTimingConflicts(window.__tripData);
    }

    // ─── Timing-conflict detection (current day only) ─────────────────
    // Runs off the main thread via requestIdleCallback (setTimeout fallback)
    // so it never blocks paint or scroll. Examines consecutive events on
    // today's day-card only. Flags overlap + insufficient drive gap by
    // setting data-timing-conflict on the .event row and injecting a
    // one-line badge inside .event-summary-text.
    //
    // Conflict rules:
    //  1. OVERLAP  — Event B starts before Event A finishes.
    //  2. DRIVE    — Gap between A's end and B's start is less than the
    //               drive_min_to_next on event A.
    //  3. BUFFER   — After accounting for A's duration + drive, Event B
    //               starts < 5 min after the earliest possible arrival.
    //
    // Events without a parseable time are skipped (they can't conflict).
    // Past events (data-state="done") are skipped — the conflict is moot.
    var _conflictRafId = null;
    function flagTimingConflicts(trip) {
      // Debounce: cancel any pending idle callback from a prior call.
      if (_conflictRafId) {
        (typeof cancelIdleCallback === 'function' ? cancelIdleCallback : clearTimeout)(_conflictRafId);
      }
      var schedule = typeof requestIdleCallback === 'function' ? requestIdleCallback : function(fn) { return setTimeout(fn, 0); };
      _conflictRafId = schedule(function() { _flagTimingConflictsSync(trip); });
    }

    function _parseConflictTime(dateIso, rawTime) {
      if (!dateIso || !rawTime) return null;
      // Strip leading ~ (approximate times) before the same parse logic
      // used by recomputeItineraryStates.
      var s = String(rawTime).replace(/^~\s*/, '').trim();
      var m = s.match(/^(\d{1,2}):?(\d{2})?\s*(AM|PM|am|pm)?$/);
      if (!m) return null;
      var h = parseInt(m[1], 10);
      var min = m[2] ? parseInt(m[2], 10) : 0;
      var period = m[3] ? m[3].toUpperCase() : '';
      if (period === 'PM' && h < 12) h += 12;
      if (period === 'AM' && h === 12) h = 0;
      var parts = dateIso.split('-');
      if (parts.length !== 3) return null;
      return new Date(
        parseInt(parts[0], 10),
        parseInt(parts[1], 10) - 1,
        parseInt(parts[2], 10),
        h, min, 0, 0
      );
    }

    function _flagTimingConflictsSync(trip) {
      if (!trip || !Array.isArray(trip.days)) return;
      var todayIso = (function() {
        var d = new Date();
        return d.getFullYear() + '-' +
          String(d.getMonth() + 1).padStart(2, '0') + '-' +
          String(d.getDate()).padStart(2, '0');
      })();

      // Clean all previous conflict markers across every day.
      var prevCount = document.querySelectorAll('.event[data-timing-conflict]').length;
      document.querySelectorAll('.event[data-timing-conflict]').forEach(function(el) {
        el.removeAttribute('data-timing-conflict');
        var badge = el.querySelector('.event-conflict-badge');
        if (badge) badge.remove();
      });

      // Find today's day object.
      var todayDay = trip.days.find(function(d) { return d.date === todayIso; });
      if (!todayDay || !todayDay.events || todayDay.events.length < 2) {
        // Conflicts cleared — if there were some before, toast the all-clear.
        if (prevCount > 0) _notifyConflicts(0, []);
        return;
      }

      var dayDate = todayDay.date;
      var events = todayDay.events;
      var now = Date.now();
      var conflicts = []; // collect for toast summary

      // Walk consecutive pairs.
      for (var i = 0; i < events.length - 1; i++) {
        var evA = events[i];
        var evB = events[i + 1];
        var startA = _parseConflictTime(dayDate, evA.time);
        var startB = _parseConflictTime(dayDate, evB.time);
        if (!startA || !startB) continue;

        // Skip if both events are already done — conflict is moot.
        var durA = parseInt(evA.duration_min, 10);
        if (!durA || isNaN(durA)) durA = 30; // sensible default
        var endA = startA.getTime() + durA * 60000;
        if (endA < now && startB.getTime() + 30 * 60000 < now) continue;

        var driveMin = parseInt(evA.drive_min_to_next, 10);
        if (isNaN(driveMin)) driveMin = 0;

        var reason = null;
        var earliestArrival = endA + driveMin * 60000;

        if (startB.getTime() < endA) {
          // Event B starts before A even finishes.
          var overlapMin = Math.ceil((endA - startB.getTime()) / 60000);
          reason = 'Overlaps previous by ' + overlapMin + ' min';
        } else if (driveMin > 0 && startB.getTime() < earliestArrival) {
          // Can't physically get there in time.
          var shortfall = Math.ceil((earliestArrival - startB.getTime()) / 60000);
          reason = shortfall + ' min short for ' + driveMin + ' min drive';
        } else if (driveMin > 0 && (startB.getTime() - earliestArrival) < 5 * 60000) {
          // Technically possible but dangerously tight (< 5 min buffer).
          reason = 'Tight — only ' + Math.floor((startB.getTime() - earliestArrival) / 60000) + ' min buffer after drive';
        }

        if (!reason) continue;

        // Find the DOM row for event B (it's the one that can't start on time).
        var dayCard = document.querySelector('.day-card[data-day-date="' + dayDate + '"]');
        if (!dayCard) continue;
        var row = dayCard.querySelector('.event[data-event-idx="' + (i + 1) + '"]');
        if (!row) continue;

        row.setAttribute('data-timing-conflict', reason);
        conflicts.push({ idx: i + 1, name: evB.event || 'Event ' + (i + 2), reason: reason });
        // Inject badge into .event-summary-text (below meta, above body).
        var summaryText = row.querySelector('.event-summary-text');
        if (summaryText && !summaryText.querySelector('.event-conflict-badge')) {
          var badge = document.createElement('span');
          badge.className = 'event-conflict-badge';
          badge.setAttribute('role', 'status');
          badge.innerHTML = '<i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i>' + _escHtmlConflict(reason);
          summaryText.appendChild(badge);
        }
      }
      _notifyConflicts(conflicts.length, conflicts);
    }

    // Toast summary — only fires when the conflict count changes from the
    // last notification so the 60s tick doesn't spam identical toasts.
    var _lastConflictToastCount = -1;
    function _notifyConflicts(count, conflicts) {
      if (count === _lastConflictToastCount) return; // no change
      _lastConflictToastCount = count;
      if (!window.notify) return;
      if (count === 0) {
        // Was non-zero before, now resolved — quiet success.
        window.notify.success('All timing conflicts resolved');
        return;
      }
      // Build a terse description: up to 3 event names, then "+N more".
      var names = conflicts.slice(0, 3).map(function(c) { return c.name; });
      var desc = names.join(', ');
      if (conflicts.length > 3) desc += ' +' + (conflicts.length - 3) + ' more';
      window.notify.warning(
        count + ' timing ' + (count === 1 ? 'conflict' : 'conflicts') + ' on today\u2019s schedule',
        { description: desc, duration: 8000 }
      );
    }
    function _escHtmlConflict(s) {
      var d = document.createElement('span');
      d.textContent = s;
      return d.innerHTML;
    }
    window.flagTimingConflicts = flagTimingConflicts;

    // ─── Day spend donut ─────────────────────────────────────────────────
    // Fetches YNAB-sourced spend for the whole trip range in one call and
    // repaints each day's donut slot. When the server reports `key:false`
    // (YNAB unconfigured), the donut renders an actionable "Configure YNAB"
    // hint instead of silently sitting at $0 forever.
    function renderSpendUnconfigured() {
      return (
        '<div class="spend-unconfigured" role="note" title="YNAB integration is not configured on the server">' +
        '  <i class="fa-solid fa-plug-circle-exclamation" aria-hidden="true"></i>' +
        '  <span>Configure YNAB to see spend</span>' +
        '</div>'
      );
    }

    function paintUnconfiguredSpend() {
      document.querySelectorAll('.day-spend[data-spend-date]').forEach(function (slot) {
        slot.innerHTML = renderSpendUnconfigured();
      });
    }

    async function hydrateDaySpend(trip) {
      if (!trip || !Array.isArray(trip.days) || !trip.days.length) return;
      var dates = trip.days.map(function(d) { return d.date; }).filter(Boolean).sort();
      if (!dates.length) return;
      var since = dates[0];
      var until = dates[dates.length - 1];
      try {
        var resp = await fetch(window.__API_BASE + '/api/trip-spend?since=' + since + '&until=' + until, { credentials: 'include' });
        if (!resp.ok) return;
        var j = await resp.json();
        if (!j.ok) return;
        // YNAB key absent → degrade with an actionable affordance rather
        // than leaving every day at "$0 spent".
        if (j.key === false) { paintUnconfiguredSpend(); return; }
        if (!j.days) return;
        Object.keys(j.days).forEach(function(date) {
          var slot = document.querySelector('.day-spend[data-spend-date="' + date + '"]');
          if (!slot) return;
          slot.innerHTML = renderSpendDonut(j.days[date]);
        });
      } catch (err) {
        console.warn('[SPEND]', err);
      }
    }

    // Compact To-Do Toggle
    function toggleTodo(row) {
      var check = row.querySelector('.todo-check');
      check.classList.toggle('done');
    }

    // Initial open-card + map bootstrap is handled by refreshItinerary()
    // after the trip fetch resolves. Do not race the fetch here.

    // Journal Logic
    let journalData = [];

    function openJournal() {
      document.getElementById('journalModal').classList.add('active');
      renderJournal();
    }

    function closeJournal() {
      document.getElementById('journalModal').classList.remove('active');
    }

    function saveJournal() {
      const day = document.getElementById('journalDay').value;
      const text = document.getElementById('journalText').value.trim();
      if(!text) return;
      const date = new Date();
      const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      journalData.push({ day, text, time: timeStr });
      document.getElementById('journalText').value = '';
      renderJournal();
    }

    function renderJournal() {
      const container = document.getElementById('journalEntries');
      if(!journalData.length) {
        container.innerHTML = '<div class="j-empty">No memories saved yet.</div>';
        return;
      }
      let html = '';
      for(let i = journalData.length - 1; i >= 0; i--) {
        html += '<div class="j-entry"><div class="j-meta">' + esc(journalData[i].day) + ' \u2022 ' + esc(journalData[i].time) + '</div><div class="j-text">' + esc(journalData[i].text) + '</div></div>';
      }
      container.innerHTML = html;
    }

    document.getElementById('journalModal').addEventListener('click', function(e) {
      if(e.target === this) closeJournal();
    });

    // Budget Panel Accordion
    function toggleBudgetCat(header) {
      var cat = header.parentElement;
      cat.classList.toggle('open');
    }

    // Mobile Budget Panel Toggle
    function toggleMobileBudget() {
      var panel = document.getElementById('budgetPanel');
      panel.classList.toggle('mobile-open');
    }

    // ─── Holiday Budget panel — live YNAB data ───────────────────────
    // Click the refresh button → force-fresh fetch from /api/holiday-budget.
    // Initial page load also fetches (cache-friendly) so the panel isn't
    // stuck on skeletons. Sort toggle re-renders in place.
    (function() {
      var API_BASE = (function() {
        if (window.BabuAI && window.BabuAI.baseUrl) return String(window.BabuAI.baseUrl).replace(/\/+$/, '');
        if (window.BABU_AI_PROXY_URL) return String(window.BABU_AI_PROXY_URL).replace(/\/+$/, '');
        var host = (window.location && window.location.hostname) || '';
        if (host === 'localhost' || host === '127.0.0.1' || host === '') return 'http://localhost:3001';
        // Production: same-origin — Worker proxies /api/* to journal-api.kashkole.com.
        return '';
      })();

      var state = { data: null, sort: 'total', loading: false };

      function fmtMoney(n) {
        var v = Number(n) || 0;
        return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      function fmtShortDate(iso) {
        if (!iso) return '';
        var d = new Date(iso + 'T12:00:00');
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return months[d.getMonth()] + ' ' + d.getDate();
      }
      function esc(s) {
        if (s == null) return '';
        var d = document.createElement('div');
        d.textContent = String(s);
        return d.innerHTML;
      }

      // Color-coded Available tile — thresholds from availableShare.
      //   >= 25%  green   .is-ok
      //   15–25%  orange  .is-warn
      //   < 15%   red     .is-danger
      function availableTone(percentLeft) {
        if (percentLeft < 0.15) return 'is-danger';
        if (percentLeft < 0.25) return 'is-warn';
        return 'is-ok';
      }

      function renderSummary(totals) {
        var host = document.getElementById('budgetSummary');
        if (!host) return;
        var pct = Number(totals.percentLeft) || 0;
        var tone = availableTone(pct);
        host.innerHTML =
          '<div class="budget-stat">' +
          '  <div class="budget-stat-value">' + esc(fmtMoney(totals.spent)) + '</div>' +
          '  <div class="budget-stat-label">Spent</div>' +
          '</div>' +
          '<div class="budget-stat budget-stat--available ' + tone + '">' +
          '  <div class="budget-stat-value">' + esc(fmtMoney(totals.available)) + '</div>' +
          '  <div class="budget-stat-label">Available <span class="budget-stat-pct">' + Math.round(pct * 100) + '% left</span></div>' +
          '</div>';
      }

      function sortCategories(cats, mode) {
        var copy = (cats || []).slice();
        if (mode === 'name') {
          copy.sort(function(a, b) { return a.name.localeCompare(b.name); });
        } else {
          copy.sort(function(a, b) { return (b.total || 0) - (a.total || 0); });
        }
        return copy;
      }

      function renderCategories() {
        var host = document.getElementById('budgetCategories');
        if (!host || !state.data) return;
        var cats = sortCategories(state.data.categories, state.sort);
        if (!cats.length) {
          var msg;
          if (state.data.key === false) {
            msg = 'YNAB is not configured. Add YNAB_ACCESS_TOKEN to your server .env or keychain.';
          } else if (state.data.category && state.data.category.matched === false) {
            msg = 'YNAB category "' + esc(state.data.category.name) + '" not found. Add ynab.category to trip.yaml or rename the category in YNAB.';
          } else {
            var catName = (state.data.category && state.data.category.name) || 'Holiday';
            msg = 'No ' + esc(catName) + ' transactions yet. Press the refresh button after YNAB sync.';
          }
          host.innerHTML = '<div class="budget-empty">' + msg + '</div>';
          return;
        }
        var html = '';
        cats.forEach(function(c, idx) {
          html += '<div class="budget-cat">';
          html += '  <div class="budget-cat-header" onclick="toggleBudgetCat(this)">';
          html += '    <span class="budget-cat-icon">' + esc(c.icon) + '</span>';
          html += '    <span class="budget-cat-name">' + esc(c.name) + '</span>';
          html += '    <span class="budget-cat-total">' + esc(fmtMoney(c.total)) + '</span>';
          html += '    <span class="budget-cat-chevron">\u25BC</span>';
          html += '  </div>';
          // .budget-cat-body uses a grid-rows 0fr→1fr animation. The inner
          // wrapper is required so the child can be `overflow:hidden` while
          // the parent animates its allotted row height from 0 to intrinsic.
          html += '  <div class="budget-cat-body">';
          html += '    <div class="budget-cat-body-inner">';
          (c.transactions || []).forEach(function(t) {
            var payee = t.payee || 'Unknown';
            if (t.memo) payee += ' \u2014 ' + t.memo;
            html += '<div class="budget-txn" title="' + esc(t.reason || '') + '">';
            html += '  <span class="budget-txn-date">' + esc(fmtShortDate(t.date)) + '</span>';
            html += '  <span class="budget-txn-payee">' + esc(payee) + '</span>';
            html += '  <span class="budget-txn-amount">' + esc(fmtMoney(t.amount)) + '</span>';
            if (t.card) html += '<span class="budget-txn-card">' + esc(t.card) + '</span>';
            html += '</div>';
          });
          html += '    </div>';
          html += '  </div>';
          html += '</div>';
        });
        host.innerHTML = html;
      }

      function renderVerify(data) {
        var el = document.getElementById('budgetVerify');
        if (!el) return;
        el.hidden = false;
        el.classList.remove('is-warn');
        var txt = el.querySelector('.budget-verify-text');
        var icon = el.querySelector('i');
        if (data.verified) {
          txt.textContent = 'Totals verified';
          icon.className = 'fa-solid fa-circle-check';
        } else {
          el.classList.add('is-warn');
          txt.textContent = 'Drift: ' + fmtMoney(data.discrepancy);
          icon.className = 'fa-solid fa-triangle-exclamation';
        }
        if (data.unclassified > 0) {
          txt.textContent += ' \u00b7 ' + data.unclassified + ' unclassified \u2192 Misc';
        }
      }

      function renderFooter(data) {
        var el = document.getElementById('budgetPanelFooter');
        if (!el) return;
        var when = data.syncedAt ? new Date(data.syncedAt) : new Date();
        var time = when.toLocaleString('en-US', {
          month: 'long', day: 'numeric', year: 'numeric',
          hour: 'numeric', minute: '2-digit'
        });
        el.innerHTML = 'Synced from <span>YNAB</span> \u00b7 ' + esc(time) + (data.cached ? ' \u00b7 cached' : '');
      }

      function renderAll() {
        if (!state.data) return;
        renderSummary(state.data.totals);
        renderCategories();
        renderVerify(state.data);
        renderFooter(state.data);
        var controls = document.getElementById('budgetControls');
        if (controls) controls.hidden = false;
      }

      function setLoading(on) {
        state.loading = on;
        var btn = document.getElementById('budgetRefreshBtn');
        if (!btn) return;
        btn.classList.toggle('is-loading', !!on);
        btn.disabled = !!on;
        if (on) {
          var summary = document.getElementById('budgetSummary');
          if (summary) summary.classList.add('is-refreshing');
          var cats = document.getElementById('budgetCategories');
          if (cats && !state.data) {
            cats.innerHTML =
              '<div class="budget-cat-skeleton"></div>' +
              '<div class="budget-cat-skeleton"></div>' +
              '<div class="budget-cat-skeleton"></div>';
          }
        } else {
          var s = document.getElementById('budgetSummary');
          if (s) s.classList.remove('is-refreshing');
        }
      }

      // Trip-window dates — pull from window.__tripData if the itinerary
      // script has already populated it. Poll briefly on first call since
      // that script loads in parallel. Falls through to no params (server
      // defaults to last 90 days) so refresh always works.
      function readTripWindow() {
        var t = window.__tripData;
        if (!t) return null;
        var start = t.dates && t.dates.start;
        var end = t.dates && t.dates.end;
        if ((!start || !end) && Array.isArray(t.days) && t.days.length) {
          var ds = t.days.map(function(d) { return d.date; }).filter(Boolean).sort();
          start = start || ds[0];
          end = end || ds[ds.length - 1];
        }
        if (!start || !end) return null;
        // Widen backwards 90 days to capture pre-trip bookings (flights, hotel,
        // activities, shopping) — those all post dates well before the trip
        // itself. The Holiday YNAB category already filters to this trip's
        // expenses so there's no risk of pulling in other trips' history.
        var startD = new Date(start + 'T12:00:00');
        startD.setDate(startD.getDate() - 90);
        var since = startD.toISOString().slice(0, 10);
        return { since: since, until: end };
      }
      function waitForTripWindow(timeoutMs) {
        var deadline = Date.now() + (timeoutMs || 2500);
        return new Promise(function(resolve) {
          (function tick() {
            var w = readTripWindow();
            if (w) return resolve(w);
            if (Date.now() >= deadline) return resolve(null);
            setTimeout(tick, 100);
          })();
        });
      }

      function fetchBudget(fresh) {
        setLoading(true);
        return waitForTripWindow(fresh ? 0 : 2500).then(function(win) {
          var qs = [];
          if (win) {
            qs.push('since=' + encodeURIComponent(win.since));
            qs.push('until=' + encodeURIComponent(win.until));
          }
          var tripSlug = (window.__tripContext && window.__tripContext.slug) || null;
          if (tripSlug) qs.push('trip=' + encodeURIComponent(tripSlug));
          if (fresh) qs.push('fresh=1');
          var url = API_BASE + '/api/holiday-budget' + (qs.length ? '?' + qs.join('&') : '');
          return fetch(url, { credentials: 'include' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
              if (!data.ok) throw new Error(data.error || 'Budget fetch failed');
              state.data = data;
              renderAll();
            })
            .catch(function(err) {
              console.warn('[HOLIDAY-BUDGET]', err);
              var host = document.getElementById('budgetCategories');
              if (host) host.innerHTML = '<div class="budget-empty budget-empty--error">Couldn\u2019t load budget: ' + esc(err.message || String(err)) + '</div>';
            })
            .finally(function() { setLoading(false); });
        });
      }

      function wireControls() {
        var btn = document.getElementById('budgetRefreshBtn');
        if (btn) btn.addEventListener('click', function() { if (!state.loading) fetchBudget(true); });
        var sortGroup = document.querySelector('.budget-sort-group');
        if (sortGroup) {
          sortGroup.addEventListener('click', function(e) {
            var target = e.target.closest('.budget-sort-btn');
            if (!target) return;
            var mode = target.getAttribute('data-sort');
            if (!mode || mode === state.sort) return;
            state.sort = mode;
            sortGroup.querySelectorAll('.budget-sort-btn').forEach(function(b) {
              var active = b.getAttribute('data-sort') === mode;
              b.classList.toggle('is-active', active);
              b.setAttribute('aria-selected', active ? 'true' : 'false');
            });
            renderCategories();
          });
        }
      }

      document.addEventListener('DOMContentLoaded', function() {
        wireControls();
        fetchBudget(false);
      });
    })();
  </script>

</body>
</html>
