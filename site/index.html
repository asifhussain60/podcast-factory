    function entryPreview(entry) {
      if (entry.kind === 'note') return entry.payload?.text || '(empty note)';
      if (entry.kind === 'voice') return entry.draft?.prose || entry.payload?.transcript || '(voice note)';
      if (entry.kind === 'receipt') {
        const p = entry.payload;
        return p?.merchant ? `${p.merchant} — ${p.currency ?? 'USD'} ${p.amount ?? ''}` : '(receipt)';
      }
      if (entry.kind === 'photo') {
        const mime = entry.payload?.mime || '';
        const ip = entry.payload?.imagePath || entry.imagePath || '';
        const ext = (ip.match(/\.([a-z0-9]+)$/i)?.[1] || mime.split('/')[1] || '').toUpperCase();
        return ext ? `${ext} photo` : 'Photo';
      }
      return '(item)';
    }

    function matchesLogTab(entry, tab) {
      switch (tab) {
        case 'inbox':
          return ['unreviewed', 'in_review'].includes(entry.reviewStatus) ||
                 ['unplaced', 'proposed'].includes(entry.placementStatus);
        case 'journal':
          return ['draft', 'published'].includes(entry.journalStatus) || entry.memoryWorthy === true;
        case 'expenses':
          return ['candidate', 'approved', 'synced', 'failed'].includes(entry.ynabStatus);
        case 'stuck':
          return entry.ingestStatus === 'failed' || entry._drainStatus === 'stuck' || entry.ynabStatus === 'failed';
        default:
          return true;
      }
    }

    // ─── Relative-time helper ("3m ago" etc.) ───
    function relativeTime(ts) {
      if (!ts) return '';
      const then = new Date(ts).getTime();
      if (isNaN(then)) return '';
      const diffMs = Date.now() - then;
      const m = Math.floor(diffMs / 60000);
      if (m < 1)    return 'just now';
      if (m < 60)   return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24)   return `${h}h ago`;
      const d = Math.floor(h / 24);
      if (d < 7)    return `${d}d ago`;
      return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    // ─── Visual thumbnail: photo-forward; iconic tile otherwise ───
    function LogEntryThumb({ entry }) {
      const kind = entry.kind;
      const ts = entry.capturedAt || entry.createdAt;
      const rel = relativeTime(ts);

      if (kind === 'photo') {
        const ip = entry.payload?.imagePath || entry.imagePath;
        if (ip) {
          const src = /^https?:\/\//.test(ip) ? ip : `${LOG_API_BASE}/${ip.replace(/^\//, '')}`;
          return (
            <div className="log-entry-thumb">
              <img src={src} alt="" loading="lazy" />
              {rel && <span className="log-entry-thumb-time">{rel}</span>}
            </div>
          );
        }
      }
      // Text-bearing kinds: show content instead of icon
      const textContent = kind === 'note'  ? (entry.payload?.text || entry.notes || '')
                        : kind === 'voice' ? (entry.payload?.transcript || '')
                        : '';
      if (textContent) {
        const cls = `log-entry-thumb log-entry-thumb--text log-entry-thumb--${kind}`;
        return (
          <div className={cls}>
            <div className="log-entry-thumb-prose">{textContent}</div>
            {rel && <span className="log-entry-thumb-time">{rel}</span>}
          </div>
        );
      }

      const iconByKind = {
        photo:     'fa-camera',
        receipt:   'fa-receipt',
        voice:     'fa-microphone-lines',
        note:      'fa-note-sticky',
        itinerary: 'fa-calendar-days',
      };
      const cls = `log-entry-thumb log-entry-thumb--icon log-entry-thumb--${kind}`;
      return (
        <div className={cls}>
          <Icon name={iconByKind[kind] || 'fa-question'} />
          {rel && <span className="log-entry-thumb-time">{rel}</span>}
        </div>
      );
    }

    // ─── Reusable confirmation modal (mirrors itinerary del-modal) ───
    function ConfirmModal({ open, title, message, targetLabel, confirmLabel, onCancel, onConfirm }) {
      useEffect(() => {
        if (!open) return;
        function onKey(e) {
          if (e.key === 'Escape') onCancel?.();
          if (e.key === 'Enter')  onConfirm?.();
        }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [open, onCancel, onConfirm]);

      if (!open) return null;
      return (
        <div className="confirm-modal" role="alertdialog" aria-modal="true">
          <div className="confirm-modal-backdrop" onClick={onCancel}></div>
          <div className="confirm-modal-panel">
            <div className="confirm-modal-icon" aria-hidden="true">
              <Icon name="fa-triangle-exclamation" />
            </div>
            <h3 className="confirm-modal-title">{title || 'Are you sure?'}</h3>
            <p className="confirm-modal-msg">
              {message || "This action can't be undone."}
              {targetLabel && (
                <> {' '}<span className="confirm-modal-target">{targetLabel}</span></>
              )}
            </p>
            <div className="confirm-modal-actions">
              <button className="confirm-modal-btn confirm-modal-btn--cancel" onClick={onCancel} autoFocus>
                Keep it
              </button>
              <button className="confirm-modal-btn confirm-modal-btn--confirm" onClick={onConfirm}>
                <Icon name="fa-trash-can" /> {confirmLabel || 'Reject'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Phase 11b: per-entry localStorage draft cache.
    // Holds the in-progress prompt (Zone 2), refined output (Zone 3), kind
    // override (image-kind toggle), and structured receipt fields. Server
    // stays source of truth for the entry itself; this hook just preserves
    // typing across reloads. Cleared on Approve/Reject.
    function useDraftCache(entryId, initialPrompt = '') {
      const key = `journal.draft.${entryId}`;
      const [draft, setDraft] = useState(() => {
        const empty = { prompt: initialPrompt, refined: '', preRefine: null, kindOverride: null, structured: null };
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return empty;
          const parsed = JSON.parse(raw);
          // If localStorage has any prompt content (even empty string from a
          // user clear), respect it. Only fall back to initialPrompt when the
          // key isn't present at all.
          return {
            prompt: typeof parsed.prompt === 'string' ? parsed.prompt : initialPrompt,
            refined: typeof parsed.refined === 'string' ? parsed.refined : '',
            preRefine: typeof parsed.preRefine === 'string' ? parsed.preRefine : null,
            kindOverride: parsed.kindOverride === 'photo' || parsed.kindOverride === 'receipt' ? parsed.kindOverride : null,
            structured: parsed.structured && typeof parsed.structured === 'object' ? parsed.structured : null,
          };
        } catch { return empty; }
      });
      const writeTimer = useRef(null);

      function persist(updater) {
        setDraft(prev => {
          const next = typeof updater === 'function' ? updater(prev) : updater;
          if (writeTimer.current) clearTimeout(writeTimer.current);
          writeTimer.current = setTimeout(() => {
            try {
              const empty = !next.prompt && !next.refined && next.preRefine == null && !next.kindOverride && !next.structured;
              if (empty) localStorage.removeItem(key);
              else localStorage.setItem(key, JSON.stringify({ ...next, updatedAt: new Date().toISOString() }));
            } catch {}
          }, 300);
          return next;
        });
      }

      return {
        ...draft,
        setPrompt:       (v) => persist(p => ({ ...p, prompt: v })),
        setRefined:      (v) => persist(p => ({ ...p, refined: v })),
        setKindOverride: (v) => persist(p => ({ ...p, kindOverride: v })),
        setStructured:   (v) => persist(p => ({ ...p, structured: v })),
        // Snapshot the current prompt before Refine replaces it. Pass null
        // to clear (e.g. after Undo restores). Only one snapshot is kept —
        // each Refine overwrites the previous snapshot so Undo always goes
        // back exactly one step.
        snapshotForRefine: (currentPrompt) => persist(p => ({ ...p, preRefine: currentPrompt })),
        clearPreRefine:    () => persist(p => ({ ...p, preRefine: null })),
        clear: () => {
          setDraft({ prompt: '', refined: '', preRefine: null, kindOverride: null, structured: null });
          if (writeTimer.current) clearTimeout(writeTimer.current);
          try { localStorage.removeItem(key); } catch {}
        },
      };
    }

    // 30-day TTL purge: drop drafts whose updatedAt is older than the cutoff.
    // Runs once at app mount; backstop against unbounded growth, not a feature.
    function purgeStaleDrafts() {
      try {
        const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
        for (let i = localStorage.length - 1; i >= 0; i--) {
          const k = localStorage.key(i);
          if (!k || !k.startsWith('journal.draft.')) continue;
          try {
            const d = JSON.parse(localStorage.getItem(k));
            if (!d?.updatedAt || new Date(d.updatedAt).getTime() < cutoff) localStorage.removeItem(k);
          } catch { localStorage.removeItem(k); }
        }
      } catch {}
    }

    // ─── Phase 11b: kind badge (top-right overlay on Zone 1).
    // For image kinds (photo/receipt/unsorted-image), the badge is clickable
    // and flips photo↔receipt. For note/voice it's informational only.
    function KindBadge({ kind, onFlip, busy }) {
      const badge = KIND_BADGE[kind] || { icon: 'fa-question', label: kind };
      const clickable = !!onFlip && !busy;
      const flipTarget = kind === 'receipt' ? 'Photo' : 'Receipt';
      const title = clickable
        ? `Click to switch to ${flipTarget}`
        : (kind === 'unsorted-image' ? 'Image kind not yet classified' : badge.label);
      return (
        <button
          type="button"
          className={`review-card-kind-badge ${clickable ? 'is-clickable' : 'is-static'}`}
          onClick={clickable ? onFlip : undefined}
          disabled={busy}
          title={title}
          aria-label={title}
        >
          <Icon name={busy ? 'fa-circle-notch fa-spin' : badge.icon} />
          <span>{badge.label}</span>
        </button>
      );
    }

    // ─── Phase 11b: artifact pane (Zone 1) — read-only, kind-aware.
    // Image / audio paths are repo-relative (e.g. trips/{slug}/photos/{id}.jpg).
    // Static blobs are mounted by the API server, so URL must prefix LOG_API_BASE.
    function ReviewArtifact({ entry, kind }) {
      const toApiUrl = (p) => /^https?:\/\//.test(p) ? p : `${LOG_API_BASE}/${String(p).replace(/^\/+/, '')}`;
      const isImage = kind === 'photo' || kind === 'receipt' || entry.kind === 'unsorted-image';
      if (isImage) {
        const ip = entry.payload?.imagePath || entry.imagePath;
        if (!ip) return <div className="review-card-artifact review-card-artifact--empty">No image attached</div>;
        return <img src={toApiUrl(ip)} alt="Captured" className="review-card-artifact review-card-artifact--image" />;
      }
      if (kind === 'voice') {
        const audioPath = entry.payload?.audioPath;
        const transcript = entry.payload?.transcript || '(no transcript)';
        return (
          <div className="review-card-artifact review-card-artifact--voice">
            {audioPath && (
              <audio controls className="review-card-artifact-audio" src={toApiUrl(audioPath)} />
            )}
            <div className="review-card-artifact-transcript">{transcript}</div>
          </div>
        );
      }
      if (kind === 'note') {
        const text = entry.payload?.text || entry.notes || '(empty note)';
        return <div className="review-card-artifact review-card-artifact--text">{text}</div>;
      }
      return <div className="review-card-artifact review-card-artifact--empty">Unsupported kind: {kind}</div>;
    }

    // ─── Phase 11b: unified review card (3 zones).
    // Zone 1 — read-only artifact (image / transcript / captured text)
    // Zone 2 — editable prompt textarea (curatorial intent, not persisted)
    // Zone 3 — editable refined output (AI result, persisted on Approve)
    // Approve resolution: Zone 3 if non-empty, else Zone 1 (raw artifact).
    function ReviewCard({ entry, lane, onApproveDraft, onSaveDraft, onReject, onKindFlipped }) {
      // Reviewed cards seed the textarea with the canonical prose so the
      // reviewer can see/edit what they previously approved. Unreviewed
      // cards start empty (or whatever localStorage holds).
      const initialPrompt = lane === 'reviewed' ? (entry.draft?.prose || '') : '';
      const draft = useDraftCache(entry.id, initialPrompt);
      const effectiveKind = draft.kindOverride || entry.kind;
      const isReviewed = lane === 'reviewed';

      const [refining, setRefining] = useState(false);
      const [refineError, setRefineError] = useState('');
      const [approving, setApproving] = useState(false);
      const [flippingKind, setFlippingKind] = useState(false);

      const isDummy = typeof entry.id === 'string' && entry.id.startsWith('dummy_');

      // Refine in-place: AI rewrites the textarea content using the card
      // artifact + voice fingerprint + active trip context. The result
      // replaces draft.prompt directly. Before replacing, the current
      // prompt is snapshotted to draft.preRefine so the reviewer can undo.
      async function handleRefine() {
        if (refining) return;
        if (isDummy) {
          window.notify?.info?.('Demo card', { description: 'Refine is disabled on preview cards.' });
          return;
        }
        setRefining(true);
        setRefineError('');
        try {
          const body = { note: draft.prompt };
          if (draft.kindOverride) body.kindOverride = draft.kindOverride;
          const r = await window.BabuAI.logRefine(entry.id, body);
          if (r?.refined) {
            draft.snapshotForRefine(draft.prompt);
            draft.setPrompt(r.refined);
            if (r.structured) draft.setStructured(r.structured);
          } else {
            setRefineError('No refined text returned');
          }
        } catch (err) {
          setRefineError(err.message || String(err));
        } finally {
          setRefining(false);
        }
      }

      // Undo: swap the textarea back to the pre-refine snapshot.
      function handleUndoRefine() {
        if (draft.preRefine == null) return;
        draft.setPrompt(draft.preRefine);
        draft.clearPreRefine();
      }

      // Approve (Unreviewed lane) flips reviewStatus to 'approved' along
      // with the textarea text + any structured/kind override.
      // Save (Reviewed lane) PATCHes only the textarea text + structured —
      // entry stays approved.
      async function handleCommit() {
        if (approving) return;
        if (isDummy) {
          const verb = isReviewed ? 'Save' : 'Approve';
          window.notify?.info?.('Demo card', { description: `${verb} is disabled on preview cards.` });
          return;
        }
        setApproving(true);
        try {
          const patch = {};
          if (!isReviewed) patch.reviewStatus = 'approved';
          if (draft.prompt && draft.prompt.trim()) patch.draftProse = draft.prompt.trim();
          if (draft.kindOverride) patch.kindOverride = draft.kindOverride;
          if (draft.structured) patch.structured = draft.structured;
          if (isReviewed) {
            await onSaveDraft?.(entry.id, patch);
          } else {
            await onApproveDraft?.(entry.id, patch);
          }
          draft.clear();
        } catch (err) {
          const verb = isReviewed ? 'Save' : 'Approve';
          window.notify?.error?.(`${verb} failed`, { description: err.message || String(err) });
        } finally {
          setApproving(false);
        }
      }

      const refineLabel = refining ? 'Refining…' : 'Refine';
      const refineIcon = refining ? 'fa-circle-notch fa-spin' : 'fa-wand-magic-sparkles';
      const refineTitle = effectiveKind === 'unsorted-image'
        ? 'Refining as a photo — classify hasn\u2019t firmed the kind yet'
        : 'Refine in your voice with active trip context';

      // Kind-flip: only meaningful for image kinds. Click toggles
      // photo↔receipt, immediately PATCHes the server so it persists, and
      // auto-refines only when the textarea is empty (preserves user text).
      const isImageKind = ['photo', 'receipt', 'unsorted-image'].includes(effectiveKind);
      async function handleKindFlip() {
        if (flippingKind) return;
        const next = effectiveKind === 'receipt' ? 'photo' : 'receipt';
        if (isDummy) {
          // Dummies don't exist server-side — flip locally only.
          draft.setKindOverride(next);
          return;
        }
        setFlippingKind(true);
        try {
          const r = await window.BabuAI.logPatch(entry.id, { kindOverride: next });
          if (r?.entry) {
            onKindFlipped?.(entry.id, r.entry);
            draft.setKindOverride(null);
          }
          if (!draft.prompt || !draft.prompt.trim()) {
            handleRefine();
          }
        } catch (err) {
          window.notify?.error?.('Kind change failed', { description: err.message || String(err) });
        } finally {
          setFlippingKind(false);
        }
      }

      return (
        <article className="review-card review-card-3zone">
          <div className="review-card-zone review-card-zone--artifact">
            <ReviewArtifact entry={entry} kind={effectiveKind} />
            <KindBadge
              kind={effectiveKind}
              onFlip={isImageKind ? handleKindFlip : null}
              busy={flippingKind}
            />
          </div>

          <div className="review-card-zone review-card-zone--prompt">
            <textarea
              className="review-card-prompt-input"
              value={draft.prompt}
              onChange={e => draft.setPrompt(e.target.value)}
              placeholder="Add a note or prompt for this entry…"
              rows={3}
              disabled={refining || approving}
              spellCheck
            />
          </div>

          {refineError && (
            <div className="review-card-error" role="alert">
              <Icon name="fa-triangle-exclamation" /> {refineError}
            </div>
          )}

          <footer className="review-card-actions">
            <button
              className="log-action-btn log-action-btn--reject"
              onClick={() => onReject?.(entry)}
              disabled={approving || refining}
              title="Reject this entry"
            >
              <Icon name="fa-trash-can" /> Reject
            </button>
            <button
              className="log-action-btn log-action-btn--refine"
              onClick={handleRefine}
              disabled={approving || refining}
              title={refineTitle}
            >
              <Icon name={refineIcon} /> {refineLabel}
            </button>
            {draft.preRefine != null && (
              <button
                className="log-action-btn log-action-btn--undo"
                onClick={handleUndoRefine}
                disabled={approving || refining}
                title="Restore the text you had before Refine ran"
              >
                <Icon name="fa-rotate-left" /> Undo
              </button>
            )}
            <button
              className="log-action-btn log-action-btn--approve"
              onClick={handleCommit}
              disabled={approving || refining}
              title={isReviewed ? 'Save edits to this approved entry' : 'Approve and persist'}
            >
              <Icon name={approving ? 'fa-circle-notch fa-spin' : (isReviewed ? 'fa-floppy-disk' : 'fa-check')} />
              {' '}
              {approving ? (isReviewed ? 'Saving…' : 'Approving…') : (isReviewed ? 'Save' : 'Approve')}
            </button>
          </footer>
        </article>
      );
    }

    function LogModule() {
      const [tab, setTab] = useState('inbox');
      // Photo review lane — only meaningful when tab==='inbox'.
      // 'unreviewed' = photos with reviewStatus ∈ {unreviewed, in_review} + any non-photo kind
      // 'reviewed'   = photos with reviewStatus === 'approved' only
      const [reviewView, setReviewView] = useState(() => {
        try { return localStorage.getItem('log_review_view') || 'unreviewed'; }
        catch { return 'unreviewed'; }
      });
      useEffect(() => {
        try { localStorage.setItem('log_review_view', reviewView); } catch {}
      }, [reviewView]);
      const [sourceFilter, setSourceFilter] = useState('all');
      // dayFilter: 'all' | 'today' | 'unsorted' | <number dayIndex>
      const [dayFilter, setDayFilter] = useState('all');
      const [entries, setEntries] = useState([]);
      const [loading, setLoading] = useState(true);
      const [tripSlug, setTripSlug] = useState(null);
      const [noteText, setNoteText] = useState('');
      const [capturing, setCapturing] = useState(false);
      const [photoMenuOpen, setPhotoMenuOpen] = useState(false);
      const [noteComposerOpen, setNoteComposerOpen] = useState(false);
      const [receiptProcessing, setReceiptProcessing] = useState(false);
      const [rejectTarget, setRejectTarget] = useState(null);
      const photoCameraRef = useRef(null);
      const photoLibraryRef = useRef(null);
      const receiptInputRef = useRef(null);

      // Close the Photo menu on outside click
      useEffect(() => {
        if (!photoMenuOpen) return;
        function onDoc(e) {
          if (!e.target.closest?.('.log-capture-action--photo')) setPhotoMenuOpen(false);
        }
        document.addEventListener('click', onDoc);
        return () => document.removeEventListener('click', onDoc);
      }, [photoMenuOpen]);

      function loadEntries() {
        setLoading(true);
        fetch(`${LOG_API_BASE}/api/log`)
          .then(r => r.json())
          .then(data => {
            if (data.ok) { setEntries(data.entries); setTripSlug(data.tripSlug); }
          })
          .catch(err => console.error('[Log]', err))
          .finally(() => setLoading(false));
      }

      useEffect(() => { loadEntries(); }, []);

      function tabCount(t) {
        return entries.filter(e => matchesLogTab(e, t)).length;
      }

      // Day chips are derived from the data set itself
      const dayIndices = React.useMemo(() => {
        const s = new Set();
        entries.forEach(e => { const di = e.placement?.dayIndex; if (di != null) s.add(di); });
        return Array.from(s).sort((a, b) => a - b);
      }, [entries]);
      const todayIndex = dayIndices.length ? dayIndices[dayIndices.length - 1] : null;
      const unsortedCount = entries.filter(e => e.placement?.dayIndex == null).length;

      // Single canonical filter pipeline — source of truth is `entries`.
      // Order: tab → source → day → (inbox-only) photo-review-view split.
      const baseVisible = entries
        .filter(e => matchesLogTab(e, tab))
        .filter(e => sourceFilter === 'all' ? true : e.kind === sourceFilter)
        .filter(e => {
          const di = e.placement?.dayIndex;
          if (dayFilter === 'all')      return true;
          if (dayFilter === 'today')    return todayIndex != null && di === todayIndex;
          if (dayFilter === 'unsorted') return di == null;
          if (typeof dayFilter === 'number') return di === dayFilter;
          return true;
        });

      // Phase 11b: review lifecycle applies to ALL kinds in the Inbox tab.
      // Unreviewed lane shows entries with reviewStatus ∈ {unreviewed, in_review}.
      // Reviewed lane shows entries with reviewStatus === approved. The same
      // pattern works for photos, receipts, voice, and notes.
      const isUnreviewed = e => ['unreviewed', 'in_review'].includes(e.reviewStatus);
      const isReviewed   = e => e.reviewStatus === 'approved';
      const reviewUnreviewedCount = baseVisible.filter(isUnreviewed).length;
      const reviewReviewedCount   = baseVisible.filter(isReviewed).length;

      const visible = tab === 'inbox'
        ? baseVisible.filter(reviewView === 'reviewed' ? isReviewed : isUnreviewed)
        : baseVisible;

      // Phase 11b: dummy preview cards (one per kind) at the top of Unreviewed
      // so every card variant is visible at a glance for layout review. Their
      // ids are prefixed `dummy_` and ReviewCard short-circuits Refine/Approve
      // for any such entry — they never hit the server. Dummies respect the
      // active Source filter so the filter behaves consistently across both
      // real and preview entries.
      const filteredDummies = sourceFilter === 'all'
        ? DUMMY_ENTRIES
        : DUMMY_ENTRIES.filter(e => e.kind === sourceFilter);
      const displayEntries = (tab === 'inbox' && reviewView === 'unreviewed')
        ? [...filteredDummies, ...visible]
        : visible;

      // Drop stale draft cache entries once on mount (30-day TTL backstop).
      useEffect(() => { purgeStaleDrafts(); }, []);

      // ─── Per-row action handlers ───
      // ReviewCard sends a combined PATCH (status + draft.prose + kindOverride
      // + structured) so refined output and reviewer corrections ride to the
      // server in one atomic write. Throws on failure so the card can keep
      // its draft state for retry.
      async function handleApproveDraft(id, patch) {
        const r = await window.BabuAI.logPatch(id, patch);
        if (!r?.entry) throw new Error('approve patch returned no entry');
        setEntries(prev => prev.map(e => e.id === id ? r.entry : e));
        window.notify?.success?.('Approved');
      }
      // Save: same PATCH path as approve, just without the reviewStatus flip.
      // Used by the Reviewed lane when the reviewer edits/refines an
      // already-approved entry.
      async function handleSaveDraft(id, patch) {
        const r = await window.BabuAI.logPatch(id, patch);
        if (!r?.entry) throw new Error('save patch returned no entry');
        setEntries(prev => prev.map(e => e.id === id ? r.entry : e));
        window.notify?.success?.('Saved');
      }
      // Reconcile entries state after the kind-toggle badge PATCHes the row.
      function handleKindFlipped(id, updatedEntry) {
        setEntries(prev => prev.map(e => e.id === id ? updatedEntry : e));
      }
      function handleReject(entry) { setRejectTarget(entry); }
      async function confirmReject() {
        const entry = rejectTarget;
        if (!entry) return;
        setRejectTarget(null);
        try {
          const r = await fetch(`${LOG_API_BASE}/api/log/${encodeURIComponent(entry.id)}`, { method: 'DELETE' });
          const d = await r.json();
          if (!d.ok) throw new Error(d.error || 'delete failed');
          setEntries(prev => prev.filter(e => e.id !== entry.id));
          try { localStorage.removeItem(`journal.draft.${entry.id}`); } catch {}
          window.notify?.success?.('Entry removed', { description: entryPreview(entry) });
          window.dispatchEvent(new CustomEvent('log-entry:reject', { detail: { id: entry.id } }));
        } catch (err) {
          window.notify?.error?.('Delete failed', { description: err.message || String(err) });
        }
      }

      async function captureNote() {
        const text = noteText.trim();
        if (!text) return;
        setCapturing(true);
        try {
          const r = await fetch(`${LOG_API_BASE}/api/log/capture`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ kind: 'note', text }),
          });
          const d = await r.json();
          if (d.ok) { setNoteText(''); window.notify?.success('Note captured'); loadEntries(); }
          else window.notify?.error('Capture failed', { description: d.error });
        } catch (err) {
          window.notify?.error('Capture failed', { description: err.message });
        } finally {
          setCapturing(false);
        }
      }

      async function capturePhoto(file, sourceRef) {
        if (!file) return;
        setCapturing(true);
        try {
          const form = new FormData();
          form.append('photo', file);
          const r = await fetch(`${LOG_API_BASE}/api/log/capture`, { method: 'POST', body: form });
          const d = await r.json();
          if (d.ok) {
            window.notify?.success('Photo captured');
            loadEntries();
            // Server runs Vision classify async (~1\u20132s). Re-load shortly to
            // pick up the firmed kind so the card shows photo/receipt instead
            // of the transient unsorted-image.
            setTimeout(loadEntries, 2000);
          } else window.notify?.error('Photo capture failed', { description: d.error });
        } catch (err) {
          window.notify?.error('Photo capture failed', { description: err.message });
        } finally {
          setCapturing(false);
          if (sourceRef?.current) sourceRef.current.value = '';
        }
      }

      // Phase 11b: [+ Receipt] flow — upload with explicit kind=receipt (skips
      // async classify), then immediately call refine so the card lands with
      // structured fields + Asif-voice description already filled in. The
      // button shows a spinner during the round trip.
      async function captureReceipt(file) {
        if (!file) return;
        setReceiptProcessing(true);
        try {
          const form = new FormData();
          form.append('photo', file);
          form.append('kind', 'receipt');
          const r = await fetch(`${LOG_API_BASE}/api/log/capture`, { method: 'POST', body: form });
          const d = await r.json();
          if (!d.ok) throw new Error(d.error || 'capture failed');
          window.notify?.success?.('Receipt uploaded — refining…');
          // Auto-refine; persist=true writes refined + structured into draft.*.
          try {
            await window.BabuAI.logRefine(d.id, { note: '', persist: true });
          } catch (refineErr) {
            window.notify?.warning?.('Refine failed — receipt added but unpolished', {
              description: refineErr.message || String(refineErr),
            });
          }
          loadEntries();
        } catch (err) {
          window.notify?.error?.('Receipt capture failed', { description: err.message || String(err) });
        } finally {
          setReceiptProcessing(false);
          if (receiptInputRef.current) receiptInputRef.current.value = '';
        }
      }

      const TABS = [
        { id: 'inbox',    icon: 'fa-inbox',             label: 'Inbox' },
        { id: 'journal',  icon: 'fa-book',              label: 'Journal' },
        { id: 'expenses', icon: 'fa-coins',             label: 'Expenses' },
        { id: 'stuck',    icon: 'fa-circle-exclamation', label: 'Stuck' },
      ];

      const SOURCES = [
        { id: 'all',     label: 'All' },
        { id: 'photo',   label: 'Photo',   icon: 'fa-camera' },
        { id: 'receipt', label: 'Receipt', icon: 'fa-receipt' },
        { id: 'voice',   label: 'Voice',   icon: 'fa-microphone' },
        { id: 'note',    label: 'Note',    icon: 'fa-note-sticky' },
      ];

      return (
        <div className="log-module">
          {/* ── 1. Context toolbar — trip + day chips (standalone tile) ── */}
          <div className="log-context-tile">
            <div className="log-trip-pill">
              <Icon name="fa-plane" /> {tripSlug || 'No active trip'}
            </div>
            <span className="log-context-divider" aria-hidden="true"></span>
            <div className="log-day-chips">
                <button
                  className={`log-day-chip ${dayFilter === 'all' ? 'active' : ''}`}
                  onClick={() => setDayFilter('all')}
                >All days <span className="count">{entries.length}</span></button>
                {todayIndex != null && (
                  <button
                    className={`log-day-chip log-day-chip--today ${dayFilter === 'today' ? 'active' : ''}`}
                    onClick={() => setDayFilter('today')}
                  >
                    <Icon name="fa-sun" /> Today
                  </button>
                )}
                {dayIndices.map(di => {
                  const n = entries.filter(e => e.placement?.dayIndex === di).length;
                  return (
                    <button
                      key={di}
                      className={`log-day-chip ${dayFilter === di ? 'active' : ''}`}
                      onClick={() => setDayFilter(di)}
                    >Day {di + 1} <span className="count">{n}</span></button>
                  );
                })}
                {unsortedCount > 0 && (
                  <button
                    className={`log-day-chip log-day-chip--unsorted ${dayFilter === 'unsorted' ? 'active' : ''}`}
                    onClick={() => setDayFilter('unsorted')}
                  >
                    Unsorted <span className="count">{unsortedCount}</span>
                  </button>
                )}
            </div>
          </div>

          {/* Hidden file inputs used by the tab-row capture actions below. */}
          <input
            type="file"
            accept="image/*"
            capture="environment"
            ref={photoCameraRef}
            style={{ display: 'none' }}
            onChange={e => capturePhoto(e.target.files?.[0], photoCameraRef)}
          />
          <input
            type="file"
            accept="image/*"
            multiple
            ref={photoLibraryRef}
            style={{ display: 'none' }}
            onChange={e => {
              const files = Array.from(e.target.files || []);
              files.forEach(f => capturePhoto(f, photoLibraryRef));
            }}
          />
          <input
            type="file"
            accept="image/*"
            ref={receiptInputRef}
            style={{ display: 'none' }}
            onChange={e => captureReceipt(e.target.files?.[0])}
          />

          {/* ── 3. Log panel — bordered container: control bar + entry grid ── */}
          <section className="log-panel">
            <div className="log-panel-control">
              <div className="log-tab-bar">
                {TABS.map(t => {
                  const count = tabCount(t.id);
                  return (
                    <button key={t.id} className={`log-tab ${tab === t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>
                      <Icon name={t.icon} /> {t.label}
                      {count > 0 && <span className="log-tab-badge">{count}</span>}
                    </button>
                  );
                })}
              </div>

              <div className="log-filter-bar">
                <div className="log-chip-row">
                  <span className="log-chip-row-label">Source</span>
                  {SOURCES.map(s => (
                    <button key={s.id} className={`log-chip ${sourceFilter === s.id ? 'active' : ''}`} onClick={() => setSourceFilter(s.id)}>
                      {s.icon && <Icon name={s.icon} />} {s.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {/* Review frame — folder-tab strip + tab-row capture actions (Inbox only) */}
            <div className={`log-review-frame ${tab === 'inbox' ? 'has-tabs' : ''}`}>
              {tab === 'inbox' && (
                <div className="log-subtab-row">
                  <div className="log-subtab-bar" role="tablist" aria-label="Photo review">
                    <button
                      role="tab"
                      aria-selected={reviewView === 'unreviewed'}
                      className={`log-subtab ${reviewView === 'unreviewed' ? 'active' : ''}`}
                      onClick={() => setReviewView('unreviewed')}
                    >
                      <Icon name="fa-circle-half-stroke" /> Unreviewed
                      {reviewUnreviewedCount > 0 && <span className="log-subtab-badge">{reviewUnreviewedCount}</span>}
                    </button>
                    <button
                      role="tab"
                      aria-selected={reviewView === 'reviewed'}
                      className={`log-subtab ${reviewView === 'reviewed' ? 'active' : ''}`}
                      onClick={() => setReviewView('reviewed')}
                    >
                      <Icon name="fa-circle-check" /> Reviewed
                      {reviewReviewedCount > 0 && <span className="log-subtab-badge">{reviewReviewedCount}</span>}
                    </button>
                  </div>

                  <div className="log-capture-actions">
                    <button
                      className="log-capture-action log-capture-action--photo"
                      onClick={e => { e.stopPropagation(); setPhotoMenuOpen(o => !o); }}
                      disabled={capturing}
                      title="Add a photo"
                    >
                      <Icon name="fa-camera" /> Photo
                      {photoMenuOpen && (
                        <div className="log-capture-menu" onClick={e => e.stopPropagation()}>
                          <button onClick={() => { setPhotoMenuOpen(false); photoCameraRef.current?.click(); }}>
                            <Icon name="fa-camera-retro" /> Take photo
                          </button>
                          <button onClick={() => { setPhotoMenuOpen(false); photoLibraryRef.current?.click(); }}>
                            <Icon name="fa-images" /> Choose from library
                          </button>
                        </div>
                      )}
                    </button>

                    <button
                      className="log-capture-action log-capture-action--receipt"
                      onClick={() => receiptInputRef.current?.click()}
                      disabled={receiptProcessing}
                      title="Add a receipt — image is uploaded and AI-extracted automatically"
                    >
                      <Icon name={receiptProcessing ? 'fa-circle-notch fa-spin' : 'fa-receipt'} />
                      {receiptProcessing ? ' Processing…' : ' Receipt'}
                    </button>

                    <button
                      className="log-capture-action log-capture-action--note"
                      onClick={() => setNoteComposerOpen(o => !o)}
                      disabled={capturing}
                      title="Add a note — type in your own words"
                    >
                      <Icon name="fa-note-sticky" /> Note
                    </button>
                  </div>
                </div>
              )}

              <div className="log-entries">
                {/* Inline note composer — opens when [+ Note] is clicked. */}
                {tab === 'inbox' && reviewView === 'unreviewed' && noteComposerOpen && (
                  <article className="review-card review-card--composer">
                    <div className="review-card-composer-label">
                      <Icon name="fa-note-sticky" /> New note
                    </div>
                    <textarea
                      autoFocus
                      className="review-card-composer-input"
                      value={noteText}
                      onChange={e => setNoteText(e.target.value)}
                      placeholder="Type a thought, a memory, a fragment… (⌘↵ to capture)"
                      rows={5}
                      onKeyDown={e => {
                        if (e.key === 'Escape') { setNoteComposerOpen(false); }
                        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
                          e.preventDefault();
                          captureNote().then(() => setNoteComposerOpen(false));
                        }
                      }}
                    />
                    <footer className="review-card-actions">
                      <button
                        className="log-action-btn log-action-btn--reject"
                        onClick={() => { setNoteText(''); setNoteComposerOpen(false); }}
                        disabled={capturing}
                      >
                        <Icon name="fa-xmark" /> Cancel
                      </button>
                      <button
                        className="log-action-btn log-action-btn--approve"
                        onClick={async () => { await captureNote(); setNoteComposerOpen(false); }}
                        disabled={capturing || !noteText.trim()}
                      >
                        <Icon name={capturing ? 'fa-circle-notch fa-spin' : 'fa-arrow-up'} /> {capturing ? 'Capturing…' : 'Capture'}
                      </button>
                    </footer>
                  </article>
                )}

                {loading ? (
                  <div className="log-empty"><Icon name="fa-spinner" /> <p>Loading your log…</p></div>
                ) : displayEntries.length === 0 ? (
                  <div className="log-empty">
                    <Icon name="fa-inbox" />
                    <p>{
                      tab === 'inbox'
                        ? (reviewView === 'reviewed'
                            ? 'Nothing approved yet — review some from Unreviewed to see them here.'
                            : 'Nothing needs attention — everything is up to date.')
                        : `No ${tab} items match these filters.`
                    }</p>
                  </div>
                ) : (
                  displayEntries.map(entry => {
                    // Phase 11b: every entry renders as a unified ReviewCard.
                    // Lane is per-entry by reviewStatus — approved entries
                    // get the 'reviewed' shape (Save instead of Approve,
                    // textarea pre-filled with draft.prose).
                    const lane = entry.reviewStatus === 'approved' ? 'reviewed' : 'unreviewed';
                    return (
                      <ReviewCard
                        key={entry.id}
                        entry={entry}
                        lane={lane}
                        onApproveDraft={handleApproveDraft}
                        onSaveDraft={handleSaveDraft}
                        onReject={handleReject}
                        onKindFlipped={handleKindFlipped}
                      />
                    );
                  })
                )}
              </div>
            </div>
          </section>

          {/* ── Reject confirmation modal ── */}
          <ConfirmModal
            open={!!rejectTarget}
            title="Reject this entry?"
            message={rejectTarget ? "You're about to reject" : ""}
            targetLabel={rejectTarget ? entryPreview(rejectTarget) : null}
            confirmLabel="Reject"
            onCancel={() => setRejectTarget(null)}
            onConfirm={confirmReject}
          />
        </div>
      );
    }

    // =================================================================
    // MAIN APP
    // =================================================================

    const VALID_PAGES = ['home', 'memoir', 'dayone', 'log'];
    function pageFromHash() {
      const h = location.hash.replace('#', '');
      return VALID_PAGES.includes(h) ? h : 'home';
    }

    function App() {
      const [page, setPage] = useState(pageFromHash);
      const [trips, setTrips] = useState([]);
      const [activeChapter, setActiveChapter] = useState(null);
      const [readProgress, setReadProgress] = useState(0);


      useEffect(() => {
        console.log('[THEME] rose-mauve-night (single-theme build)');
        console.log('[NAV]', page);
        loadTrips().then(setTrips);
        function onPopState() {
          const target = pageFromHash();
          setPage(target);
          setActiveChapter(null);
        }
        window.addEventListener('popstate', onPopState);
        return () => window.removeEventListener('popstate', onPopState);
      }, []);

      useEffect(() => {
        console.log('[NAV]', page);
        const desired = page === 'home' ? '' : '#' + page;
        const current = location.hash || '';
        if (current !== desired) {
          history.replaceState(null, '', desired || location.pathname + location.search);
        }
        // Refresh the nav budget pill on every view change. BudgetPill
        // already listens for `budget:refresh` via its event-bus wiring,
        // so this one dispatch keeps its display in sync with whatever
        // the cowork server has spent since the last 30-s poll.
        window.dispatchEvent(new Event('budget:refresh'));
      }, [page]);

      function openChapter(ch) {
        if (ch.file) {
          setActiveChapter(ch);
          setPage('chapter');
        }
      }

      function handleBackFromReader(target) {
        setActiveChapter(null);
        setPage(target || 'memoir');
      }

      return (
        <div>
          <nav className="nav">
            <div className="nav-brand">Asif's Journal</div>
            <div className="nav-links">
              <button className={`nav-link ${page === 'home' ? 'active' : ''}`} onClick={() => { setPage('home'); setActiveChapter(null); }}><Icon name="fa-house" /> <span>Dashboard</span></button>
              <button className={`nav-link ${page === 'memoir' || page === 'chapter' ? 'active' : ''}`} onClick={() => { setPage('memoir'); setActiveChapter(null); }}><Icon name="fa-book-open" /> <span>Memoir</span></button>
              <button className={`nav-link ${page === 'dayone' ? 'active' : ''}`} onClick={() => { setPage('dayone'); setActiveChapter(null); }}><Icon name="fa-feather-pointed" /> <span>DayOne</span></button>
              <button className={`nav-link ${page === 'log' ? 'active' : ''}`} onClick={() => { setPage('log'); setActiveChapter(null); }}><Icon name="fa-layer-group" /> <span>Log</span></button>
              <div data-theme-switcher=""></div>
            </div>
          </nav>

          <main className="page">
            {page === 'home' && <HomePage trips={trips} onNavigate={setPage} />}
            {page === 'memoir' && <MemoirModule onOpenChapter={openChapter} />}
            {page === 'dayone' && <DayOneModule trips={trips} />}
            {page === 'log' && <LogModule />}
            {page === 'chapter' && activeChapter && (
              <ChapterReader
                chapter={activeChapter}
                onBack={handleBackFromReader}
                onNavigateChapter={(ch) => { setActiveChapter(ch); }}
                onProgress={setReadProgress}
              />
            )}
            <ScrollToTop progress={page === 'chapter' ? readProgress : null} />
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <div id="ai-drawer-root"></div>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
  <script src="js/theme-switcher.js"></script>
  <script src="js/claude-client.js"></script>
  <script type="text/babel" src="js/voice-refiner.jsx"></script>
  <script src="js/tweaker/tweaker-loader.js"></script>

</body>
</html>
