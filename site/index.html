  <script type="importmap">

  <!-- Shared tag normalizer — loaded synchronously so window.normalizeTag is
       available to the Babel-transpiled block below. -->
  <script>
    (function () {
      // Inline copy of shared/tag-normalize.js (avoids ESM import in legacy script).
      // Canonical source: /shared/tag-normalize.js — keep in sync.
      function normalizeTag(raw) {
        if (typeof raw !== 'string') return '';
        return raw
          .normalize('NFC')
          .toLowerCase()
          .replace(/\s+/g, '-')
          .replace(/[^a-z0-9-]/g, '')
          .replace(/-{2,}/g, '-')
          .replace(/^-|-$/g, '');
      }
      window.normalizeTag = normalizeTag;
    })();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo, memo } = React;

    const MOODS = ['romantic', 'adventure', 'cultural', 'relaxed', 'celebration', 'bittersweet', 'anticipation', 'reflective', 'spiritual', 'playful'];

    const MOOD_COLORS = {

    const JOURNALS = ['Travel', 'Ishrat\u2019s Trips', 'Asif\u2019s Journal'];

    // Load trip data from manifest.json + per-trip entry files
    async function loadTrips() {
      console.log('[API:REQ]', 'data/manifest.json');
      const res = await fetch('data/manifest.json');
      const manifest = await res.json();
      console.log('[API:RES]', 'data/manifest.json', res.status);
      const allTrips = [];

      if (manifest.active) {
        const trip = manifest.active;
        let entries = [];
        try {
          const r = await fetch(`data/entries/${trip.slug}.json`);
          if (r.ok) entries = await r.json();
        } catch (e) { console.error('[API:ERR]', `data/entries/${trip.slug}.json`, e); }
        allTrips.push({ ...trip, entries });
      }

      for (const trip of (manifest.archive || [])) {
        let entries = [];
        try {
          const r = await fetch(`data/entries/${trip.slug}.json`);
          if (r.ok) entries = await r.json();
        } catch (e) { console.error('[API:ERR]', `data/entries/${trip.slug}.json`, e); }
        allTrips.push({ ...trip, entries });
      }

      console.log('[DATA]', 'trips loaded', allTrips.length);
      return allTrips;
    }

    const CHAPTERS = [
      { id: 'ch00', num: '00', title: 'Introduction', subtitle: 'What I Wish Babu Taught Me', status: 'locked', words: 1370, readiness: 100, file: 'chapters/ch00-intro.txt' },
      { id: 'ch01', num: '01', title: 'Man', subtitle: 'Babu, What Does It Mean to Be a Man?', status: 'locked', words: 4200, readiness: 100, file: 'chapters/ch01-man.txt' },
      { id: 'ch02', num: '02', title: 'Love', subtitle: 'Babu, Tell Me What Love Really Is', status: 'locked', words: 9084, readiness: 100, file: 'chapters/ch02-love.txt' },
      { id: 'ch03', num: '03', title: 'Marriage', subtitle: 'Babu, Tell Me What Marriage Really Is', status: 'active', words: 3200, readiness: 62, file: 'chapters/ch03-marriage.txt' },
      { id: 'ch04', num: '04', title: 'Faith', subtitle: 'Babu, What Should I Believe?', status: 'planned', words: 0, readiness: 0, file: null },
      { id: 'ch05', num: '05', title: 'Education', subtitle: 'Babu, How Do I Learn What Matters?', status: 'planned', words: 0, readiness: 0, file: null },
      { id: 'ch06', num: '06', title: 'Parenthood', subtitle: 'Babu, How Do I Raise My Children?', status: 'planned', words: 0, readiness: 0, file: null },

    const QUOTES_SAMPLE = [

      { text: 'A man who has not passed through the inferno of his passions has never overcome them.', source: 'Carl Jung', chapter: '01' },
      { text: 'Love is not about possession. Love is about appreciation.', source: 'Osho', chapter: '02' },

      { text: 'Perhaps all the dragons in our lives are princesses who are only waiting to see us act, just once, with beauty and courage.', source: 'Rainer Maria Rilke', chapter: '03' },
    ];

    const INCIDENTS_SAMPLE = [
      { title: 'The night Babu didn\'t come home', chapter: '01', status: 'PLACED' },
      { title: 'First fight after marriage \u2014 the silence that followed', chapter: '03', status: 'PLACED' },
      { title: 'Ishrat\'s first visit to Lahore \u2014 culture shock', chapter: '02', status: 'PLACED' },
      { title: 'The job offer that changed everything', chapter: '01', status: 'BANKED' },

    // =================================================================
    // UTILITIES
    // =================================================================

    function Icon({ name, size }) {
      // size → className (e.g. "0.75em" → "icon-em-75"). No inline style.
      const sizeClass = size ? `icon-em-${Math.round(parseFloat(size) * 100)}` : '';
      return <i className={`fa-solid ${name} ${sizeClass}`.trim()}></i>;
    }

    // Thin alias so any lingering legacy caller still works; the canonical
    // notification API is window.notify (site/js/toast.js, Sonner-backed).
    function showToast(message, kind) {
      const n = window.notify;
      if (n && typeof n[kind || 'message'] === 'function') return n[kind || 'message'](message);
      if (n && typeof n.message === 'function') return n.message(message);
      console.log('[TOAST]', message);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text)
        .then(() => window.notify.success('Copied to DayOne clipboard'))
        .catch((e) => window.notify.error('Copy failed', { description: e && e.message }));
    }

    function formatDate(iso) {
      return new Date(iso + 'T12:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    // =================================================================
    // COMPONENTS
    // =================================================================

    // --- DayOne Code Preview ---
    function DayOnePreview({ entry, selectedJournal }) {
      const md = `# ${entry.location} \u2014 ${formatDate(entry.date)}\n\n**Mood:** ${entry.mood}\n**Journal:** ${selectedJournal || entry.journal}\n**Tags:** ${entry.tags.join(', ')}\n\n${entry.text}\n\n*[Refined with Voice DNA]*`;

      return (
        <div className="glass-card glass-card--pad fade-enter stagger-2">

            <span className="inline-accent"><Icon name="fa-file-code" /> Markdown Export</span>
          </div>
          <div className="dayone-preview-body">
            {md}
          </div>
          <button className="btn btn-primary btn--block" onClick={() => copyToClipboard(md)}>
            <Icon name="fa-copy" /> Copy for DayOne
          </button>
        </div>
      );
    }

    // --- Active Trip Hero ---
    function ActiveTripHero({ trips, onNavigate }) {
      const today = new Date(); today.setHours(0, 0, 0, 0);

      // Find active (in-progress) or next upcoming trip
      const activeTrip = trips.find(trip => {
        const start = new Date(trip.dates.start + 'T00:00:00');
        const end = new Date(trip.dates.end + 'T23:59:59');
        return today >= start && today <= end;
      }) || trips.find(trip => {
        const start = new Date(trip.dates.start + 'T00:00:00');
        return start > today;
      });

      if (!activeTrip) return null;

      const start = new Date(activeTrip.dates.start + 'T00:00:00');
      const end = new Date(activeTrip.dates.end + 'T23:59:59');
      const isLive = today >= start && today <= end;
      const isBefore = today < start;
      const msPerDay = 86400000;
      const daysUntil = isBefore ? Math.ceil((start - today) / msPerDay) : 0;
      const currentDay = isLive ? Math.floor((today - start) / msPerDay) + 1 : 0;

      return (
        <div className="trip-hero stagger-2" onClick={() => window.location.href = activeTrip.itineraryPath || 'itineraries/itinerary.html?trip=' + activeTrip.slug}>
          
          <div className="hero-overline">{activeTrip.travelers ? activeTrip.travelers.join(' & ') : ''}</div>
          <div className="hero-names">{activeTrip.travelers ? activeTrip.travelers.join(' & ') : ''}</div>
          <div className="hero-for">{activeTrip.occasion || activeTrip.name || ''}</div>
          <div className="hero-dates">{activeTrip.dates ? activeTrip.dates.start + ' — ' + activeTrip.dates.end : ''}</div>

          <div className="hero-line"></div>

          <div className={`trip-hero-status ${isLive ? 'live' : 'upcoming'}`}>
            {isLive && <div className="pulse-dot"></div>}
            {isLive ? `LIVE NOW · DAY ${currentDay} OF ${activeTrip.dates.days}` : `UPCOMING · ${daysUntil} DAYS TO GO`}
          </div>

        </div>
      );
    }

    // --- Home Dashboard ---
    function HomePage({ trips, onNavigate }) {
      const totalWords = CHAPTERS.reduce((sum, ch) => sum + (ch.words || 0), 0);
      const chaptersLocked = CHAPTERS.filter(c => c.status === 'locked').length;

              </div>

    // --- Memoir Module ---
    function MemoirModule({ onOpenChapter }) {

              ch02: { bg: '#4a4280', border: '#38327a', icon: 'fa-heart' },
              ch03: { bg: '#7a5085', border: '#643e6e', icon: 'fa-ring' },

            }

              <div className="bookshelf stagger-1">
                {rows.map((row, ri) => (

                              <span className="book-chapter-label">Chapter {ch.num}</span>
                              <div className="book-cover-icon">
                                <Icon name={meta.icon} size="4.4em" />
                              </div>
                              <h3 className="book-title">{ch.title}</h3>
                              <p className="book-subtitle">{ch.subtitle}</p>
                            </div>
                            {isPlanned && (
                              <div className="book-lock-emboss">
                                <Icon name="fa-lock" size="3.5em" />
                              </div>
                            )}
                            <div className="book-binding-bottom"></div>
                            <div className="book-pages-edge"></div>
                          </div>
                        );
                      })}
                    </div>
                    <div className="shelf-wood"></div>
                  </div>
                ))}
              </div>
            );
          })()}

          {tab === 'incidents' && (
            <div className="grid-cards stagger-1">
              {INCIDENTS_SAMPLE.map((inc, i) => (
                <div key={i} className="glass-card incident-card">

                    </span>

                </div>

            </div>
          )}

          {tab === 'quotes' && (
            <div className="stagger-1">
              <input
                className="input-field input-field--search"
                placeholder="Search quotes..."
                value={searchQuery}

    }

    // --- DayOne Journal Module ---
    function DayOneModule({ trips }) {
      const [subTab, setSubTab] = useState('browser');
      const [selectedTrip, setSelectedTrip] = useState(null);
      const [selectedEntry, setSelectedEntry] = useState(null);

          </div>

      }

      return (
        <div className="container fade-enter">

                <div key={trip.id} className="glass-card module-card" onClick={() => setSelectedTrip(trip)}>

                  <div className="tag-row">
                    {trip.tags.map(tag => <span key={tag} className="badge badge-active">{tag}</span>)}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* --- Browser: Trip Entries --- */}
          {subTab === 'browser' && selectedTrip && (
            <div>
              <button className="btn btn-secondary btn--mb-sm" onClick={() => setSelectedTrip(null)}>
                <Icon name="fa-arrow-left" /> All Trips
              </button>
              <h2 className="h-serif-lg-tight">{selectedTrip.location}</h2>
              <p className="meta-mono-inline-muted">
                {selectedTrip.displayDate} &middot; {selectedTrip.country} &middot; {selectedTrip.entries.length} entries
              </p>
              <div className="grid-cards stagger stagger-1">
                {selectedTrip.entries.map((entry, idx) => {

                          <Icon name={color.icon} /> {entry.mood}
                        </span>
                      </div>
                      <h3 className="entry-title">{entry.summary}</h3>
                      <p className="entry-preview">{entry.text}</p>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* --- Editor Tab --- */}
          {subTab === 'editor' && (
            <div className="stagger-1">
              <div className="glass-card glass-card--pad-narrow">
                <h3 className="h-serif-sm">Select a trip and entry to edit</h3>
                <select className="input-field input-field--mb" onChange={e => { const trip = trips.find(t => t.id === e.target.value); setSelectedTrip(trip || null); setSelectedEntry(null); }}>
                  <option value="">Choose trip...</option>
                  {trips.map(t => <option key={t.id} value={t.id}>{t.location} &mdash; {t.displayDate}</option>)}
                </select>
                {selectedTrip && (
                  <select className="input-field" onChange={e => { const entry = selectedTrip.entries.find(en => en.uuid === e.target.value); if (entry) setSelectedEntry(entry); }}>
                    <option value="">Choose entry...</option>
                    {selectedTrip.entries.map(en => <option key={en.uuid} value={en.uuid}>{en.date} &mdash; {en.summary}</option>)}
                  </select>
                )}
              </div>
            </div>
          )}

          {/* --- New Entry Tab --- */}
          {subTab === 'new' && (
            <div className="stagger-1">
              <div className="stack">
                <DayOnePreview
                  entry={{
                    location: 'New Entry',
                    date: new Date().toISOString().split('T')[0],
                    mood: newMood,
                    text: newText || 'Your entry will appear here...',
                    tags: [newMood, 'ishrat'],
                    journal: newJournal,
                  }}
                  selectedJournal={newJournal}
                />

                <div className="glass-card glass-card--pad-lg">
                  <h3 className="h-serif-md">New Entry</h3>

                  <label className="meta-label">Mood</label>
                  <div className="mood-chips mood-chips--mb">
                    {MOODS.map(mood => {
                      const color = MOOD_COLORS[mood] || MOOD_COLORS.reflective;
                      return (
                        <div key={mood} className={`mood-chip mood-${mood} ${newMood === mood ? 'selected' : ''}`} onClick={() => setNewMood(mood)}>
                          <Icon name={color.icon} size="0.9em" />
                          <span className="chip-label">{mood}</span>
                        </div>
                      );
                    })}
                  </div>

                  <div className="form-grid-2">
                    <div>
                      <label className="meta-label">Journal</label>
                      <select className="input-field" value={newJournal} onChange={e => setNewJournal(e.target.value)}>
                        {JOURNALS.map(j => <option key={j} value={j}>{j}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="meta-label">Date</label>
                      <input className="input-field" type="date" defaultValue={new Date().toISOString().split('T')[0]} />
                    </div>
                  </div>

                  <label className="meta-label">Summary</label>
                  <input className="input-field input-field--mb" placeholder="One line that captures the moment" value={newSummary} onChange={e => setNewSummary(e.target.value)} />

                  <label className="meta-label">Entry</label>
                  <textarea className="input-field" placeholder="Let the moment breathe on the page..." value={newText} onChange={e => setNewText(e.target.value)} />

                  <div className="form-actions">
                    <button className="btn btn-primary"><Icon name="fa-wand-magic-sparkles" /> Refine with Voice DNA</button>
                    <button className="btn btn-secondary"><Icon name="fa-floppy-disk" /> Save Draft</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // =================================================================
    // CHAPTER SECTIONS DATA
    // =================================================================

    const CHAPTER_SECTIONS = {
      ch00: [
        { para: 1, title: 'The Sentence That Would Not Leave' },
        { para: 10, title: 'What This Book Really Is' },
        { para: 16, title: 'A Map, Not a Monument' },
        { para: 25, title: 'Imperfect Honesty, Offered Now' }
      ],
      ch01: [
        { para: 1, title: 'The Confused Boy in Kuwait' },
        { para: 12, title: 'Discipline and Defiance' },
        { para: 43, title: 'Character Under Pressure' },
        { para: 78, title: "Nadeem Bhai\u2019s Quiet Intervention" },
        { para: 85, title: 'Failure as Curriculum' },
        { para: 92, title: 'Learning Manhood from Women' },
        { para: 111, title: "Babu\u2019s Advice on Manhood" }
      ],
      ch02: [
        { para: 1, title: 'First Glimpses of Real Love' },
        { para: 10, title: 'Love as Control and Punishment' },
        { para: 74, title: 'Faith Weaponized, Religion Broken' },
        { para: 102, title: 'The Thaw Begins with Javeed Bhai' },
        { para: 138, title: 'Women Who Showed Me Tenderness' },
        { para: 174, title: 'Synthesis: What Love Actually Is' },
        { para: 188, title: "Babu\u2019s Advice on Love" }
      ],
      ch03: [
        { para: 1, title: 'Sex Before Understanding' },
        { para: 47, title: 'The Engagement That Broke Me' },
        { para: 63, title: 'A Marriage of Two Broken People' },
        { para: 76, title: "Ishrat\u2019s Arrival, Everything Changes" },
        { para: 101, title: "Babu\u2019s Advice on Marriage" }
      ]
    };

    // =================================================================
    // CHAPTER READER
    // =================================================================

    function ChapterReader({ chapter, onBack, onNavigateChapter, onProgress }) {
      const [content, setContent] = useState(null);
      const [loading, setLoading] = useState(true);
      const [scrollProgress, setScrollProgress] = useState(0);
      const [fontScale, setFontScale] = useState(() => {
        try { const v = parseFloat(localStorage.getItem('rp_fontScale')); return isNaN(v) ? 1 : v; } catch(e) { return 1; }
      });
      const [fontFamily, setFontFamily] = useState(() => {
        try { const v = localStorage.getItem('rp_fontFamily'); return (v && v !== 'garamond') ? v : 'lato'; } catch(e) { return 'lato'; }
      });
      const [readingTheme, setReadingTheme] = useState(() => {
        try { return localStorage.getItem('rp_readingTheme') || 'dark'; } catch(e) { return 'dark'; }
      });
      const [lineSpacing, setLineSpacing] = useState(() => {
        try { const v = parseFloat(localStorage.getItem('rp_lineSpacing')); return isNaN(v) ? 1.85 : v; } catch(e) { return 1.85; }
      });
      const [contentWidth, setContentWidth] = useState(() => {
        try { return localStorage.getItem('rp_contentWidth') || 'medium'; } catch(e) { return 'medium'; }
      });
      const [controlsOpen, setControlsOpen] = useState(false);
      const [activeSection, setActiveSection] = useState(0);
      const [tocOpen, setTocOpen] = useState(true);
      const [bookmarks, setBookmarks] = useState(() => {
        try { return JSON.parse(localStorage.getItem('bm_' + chapter.id) || '[]'); } catch(e) { return []; }
      });
      const [showResume, setShowResume] = useState(false);
      const [currentParaIdx, setCurrentParaIdx] = useState(0);
      const [notesOpen, setNotesOpen] = useState(true);
      const [notes, setNotes] = useState([]);
      const [noteType, setNoteType] = useState('edit');
      const [noteText, setNoteText] = useState('');
      const [notesLoaded, setNotesLoaded] = useState(false);
      const sectionRefs = useRef({});
      const articleRef = useRef(null);

      const NOTE_TYPES = {
        edit:       { label: 'Edit',       icon: 'fa-pen',           color: '#c6a6ff' },
        reflection: { label: 'Reflection', icon: 'fa-lightbulb',     color: '#f4d49c' },
        research:   { label: 'Research',   icon: 'fa-magnifying-glass', color: '#34d399' },
        continuity: { label: 'Continuity', icon: 'fa-link',          color: '#ffb0cc' },
        voice:      { label: 'Voice',      icon: 'fa-microphone',    color: '#93c5fd' }
      };

      const FONT_MAP = {
        lato: "'Lato', 'Inter', sans-serif",
        inter: "'Inter', 'Lato', sans-serif",
        georgia: "'Georgia', 'Garamond', serif",
        dyslexic: "'OpenDyslexic', 'Comic Sans MS', sans-serif"
      };
      const FONT_LABELS = { lato: 'Lato', inter: 'Inter', georgia: 'Georgia', dyslexic: 'Dyslexic' };
      const SPACING_OPTS = [{ val: 1.6, label: 'Tight' }, { val: 1.75, label: 'Normal' }, { val: 1.85, label: 'Relaxed' }, { val: 2.1, label: 'Airy' }];
      const WIDTH_OPTS = [{ val: 'narrow', label: 'Narrow', icon: 'fa-compress' }, { val: 'medium', label: 'Medium', icon: 'fa-grip-lines' }, { val: 'wide', label: 'Wide', icon: 'fa-expand' }];

      const chapterIndex = CHAPTERS.findIndex(c => c.id === chapter.id);
      const prevChapter = chapterIndex > 0 ? CHAPTERS[chapterIndex - 1] : null;
      const nextChapter = chapterIndex < CHAPTERS.length - 1 ? CHAPTERS[chapterIndex + 1] : null;
      const sections = CHAPTER_SECTIONS[chapter.id] || [];

      useEffect(() => {
        if (!chapter.file) { setLoading(false); return; }
        setLoading(true);
        fetch(chapter.file)
          .then(r => r.ok ? r.text() : Promise.reject('Not found'))
          .then(text => { setContent(text); setLoading(false); })
          .catch((e) => {
            setContent(null); setLoading(false);
            if (window.notify) window.notify.error('Could not load chapter', { description: 'Try again or pick another chapter.' });
          });
      }, [chapter.id]);

      // Persist bookmarks
      useEffect(() => {
        try { localStorage.setItem('bm_' + chapter.id, JSON.stringify(bookmarks)); } catch(e) {}
      }, [bookmarks, chapter.id]);

      // Persist reader preferences
      useEffect(() => { try { localStorage.setItem('rp_fontScale', fontScale); } catch(e) {} }, [fontScale]);
      useEffect(() => { try { localStorage.setItem('rp_fontFamily', fontFamily); } catch(e) {} }, [fontFamily]);
      useEffect(() => { try { localStorage.setItem('rp_readingTheme', readingTheme); } catch(e) {} }, [readingTheme]);
      useEffect(() => { try { localStorage.setItem('rp_lineSpacing', lineSpacing); } catch(e) {} }, [lineSpacing]);
      useEffect(() => { try { localStorage.setItem('rp_contentWidth', contentWidth); } catch(e) {} }, [contentWidth]);

      // Auto-collapse sidebars in wide mode, re-expand in narrow/medium
      useEffect(() => {
        if (contentWidth === 'wide') {
          setTocOpen(false);
          setNotesOpen(false);
        } else {
          setTocOpen(true);
          setNotesOpen(true);
        }
      }, [contentWidth]);

      // Load notes: try JSON file first, fallback to localStorage
      useEffect(() => {
        const lsKey = 'notes_' + chapter.id;
        fetch('data/notes/' + chapter.id + '-notes.json')
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(data => { setNotes(Array.isArray(data) ? data : []); setNotesLoaded(true); })
          .catch(() => {
            try { setNotes(JSON.parse(localStorage.getItem(lsKey) || '[]')); } catch(e) { setNotes([]); }
            setNotesLoaded(true);
          });
      }, [chapter.id]);

      // Persist notes to localStorage on every change
      useEffect(() => {
        if (!notesLoaded) return;
        try { localStorage.setItem('notes_' + chapter.id, JSON.stringify(notes)); } catch(e) {}
      }, [notes, chapter.id, notesLoaded]);

      // Show resume banner if bookmarks exist on load
      useEffect(() => {
        if (bookmarks.length > 0) setShowResume(true);
        const t = setTimeout(() => setShowResume(false), 8000);
        return () => clearTimeout(t);
      }, [chapter.id]);

      useEffect(() => {
        function handleScroll() {
          const scrollTop = window.scrollY;
          const docHeight = document.documentElement.scrollHeight - window.innerHeight;
          const pct = docHeight > 0 ? Math.min((scrollTop / docHeight) * 100, 100) : 0;
          setScrollProgress(pct);
          if (onProgress) onProgress(pct);

          // Determine active section based on scroll position
          let current = 0;
          for (let i = sections.length - 1; i >= 0; i--) {
            const el = sectionRefs.current['sec-' + i];
            if (el) {
              const rect = el.getBoundingClientRect();
              if (rect.top <= 180) { current = i; break; }
            }
          }
          setActiveSection(current);

          // Track which paragraph is currently in the viewport center
          const paraEls = document.querySelectorAll('[id^="para-"]');
          let closestIdx = 0;
          let closestDist = Infinity;
          const viewCenter = window.innerHeight / 2;
          paraEls.forEach(el => {
            const rect = el.getBoundingClientRect();
            const dist = Math.abs(rect.top - viewCenter);
            if (dist < closestDist) {
              closestDist = dist;
              closestIdx = parseInt(el.id.replace('para-', ''), 10);
            }
          });
          setCurrentParaIdx(closestIdx);
        }
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, [onProgress, sections.length]);

      useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [chapter.id]);

      // Parse text into paragraphs — first line is title, skip it
      const paragraphs = content ? content.split('\n\n').filter(p => p.trim()) : [];
      const titleLine = paragraphs.length > 0 ? paragraphs[0] : chapter.subtitle;
      let bodyParagraphs = paragraphs.slice(1);

      // Merge short salutation lines (e.g. "Kids,") into the next paragraph
      if (bodyParagraphs.length > 1) {
        const merged = [];
        for (let i = 0; i < bodyParagraphs.length; i++) {
          const trimmed = bodyParagraphs[i].trim();
          if (trimmed.length < 20 && i < bodyParagraphs.length - 1 && !isAdviceHeading(trimmed)) {
            merged.push(trimmed + '\n\n' + bodyParagraphs[i + 1].trim());
            i++; // skip next
          } else {
            merged.push(trimmed);
          }
        }
        bodyParagraphs = merged;
      }

      // Build a map: paragraph index → section index (for inserting dividers)
      const sectionAtPara = useMemo(() => {
        const map = {};
        sections.forEach((sec, idx) => { map[sec.para - 1] = idx; });
        return map;
      }, [sections]);

      // Compute reading time (~230 wpm)
      const wordCount = content ? content.split(/\s+/).length : chapter.words;
      const readingMinutes = Math.max(1, Math.round(wordCount / 230));

      // Detect "Dad's Advice" section
      function isAdviceHeading(text) {
        return /^(Babu[''\u2019]s Advice|Dad[''\u2019]s Advice|What I Wish)/i.test(text.trim());
      }

      function toggleBookmark(paraIdx) {
        setBookmarks(prev => {
          const exists = prev.includes(paraIdx);
          if (window.notify) {
            exists
              ? window.notify.message('Bookmark removed')
              : window.notify.success('Bookmark added');
          }
          return exists ? prev.filter(b => b !== paraIdx) : [...prev, paraIdx].sort((a,b) => a - b);
        });
      }

      function bookmarkCurrentParagraph() {
        if (!bookmarks.includes(currentParaIdx)) {
          setBookmarks(prev => [...prev, currentParaIdx].sort((a,b) => a - b));
          if (window.notify) window.notify.success('Bookmark added', { description: getParaPreview(currentParaIdx) });
        } else if (window.notify) {
          window.notify.info('Already bookmarked here');
        }
      }

      function getParaPreview(idx) {
        if (!bodyParagraphs[idx]) return 'Para ' + (idx + 1);
        const text = bodyParagraphs[idx].trim().replace(/\n+/g, ' ');
        const words = text.split(/\s+/).slice(0, 5).join(' ');
        return words.length < text.length ? words + '…' : words;
      }

      function addNote() {
        if (!noteText.trim()) return;
        const note = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          type: noteType,
          text: noteText.trim(),
          paraIdx: currentParaIdx,
          paraPreview: getParaPreview(currentParaIdx),
          timestamp: new Date().toISOString(),
          chapter: chapter.id
        };
        setNotes(prev => [...prev, note]);
        setNoteText('');
        if (window.notify) window.notify.success('Note saved', { description: (NOTE_TYPES[noteType] && NOTE_TYPES[noteType].label) + ' · ' + note.paraPreview });
      }

      function removeNote(noteId) {
        setNotes(prev => prev.filter(n => n.id !== noteId));
        if (window.notify) window.notify.message('Note deleted');
      }

      // Map paragraph index → notes at that paragraph
      const notesAtPara = useMemo(() => {
        const map = {};
        notes.forEach(n => {
          if (!map[n.paraIdx]) map[n.paraIdx] = [];
          map[n.paraIdx].push(n);
        });
        return map;
      }, [notes]);

      function scrollToSection(idx) {
        const el = sectionRefs.current['sec-' + idx];
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      function scrollToBookmark(paraIdx) {
        const el = document.getElementById('para-' + paraIdx);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setShowResume(false);
      }

      return (
        <div className="chapter-reader-wrap" data-content-width={contentWidth}>

          {/* ═══ Floating Side TOC ═══ */}
          {!loading && content && sections.length > 0 && (
            <aside className={`toc-sidebar ${tocOpen ? 'open' : 'collapsed'}`}>
              <button className="toc-toggle" onClick={() => setTocOpen(o => !o)} title={tocOpen ? 'Collapse TOC' : 'Expand TOC'}>
                <Icon name={tocOpen ? 'fa-angles-left' : 'fa-list'} size="0.75em" />
              </button>
              {tocOpen && (
                <div className="toc-content">
                  <div className="toc-header">
                    <Icon name="fa-bars-staggered" size="0.75em" />
                    <span>Sections</span>
                  </div>
                  <nav className="toc-nav">
                    {sections.map((sec, idx) => (
                      <button
                        key={idx}
                        className={`toc-item ${activeSection === idx ? 'active' : ''}`}
                        onClick={() => scrollToSection(idx)}
                      >
                        <span className="toc-marker"></span>
                        <span className="toc-item-text">{sec.title}</span>
                      </button>
                    ))}
                  </nav>

                  <div className="toc-divider"></div>

                  <button className="toc-bookmark-action" onClick={bookmarkCurrentParagraph} title="Bookmark the paragraph currently in view">
                    <Icon name="fa-bookmark" size="0.7em" />
                    <span>Bookmark Here</span>
                  </button>

                  {bookmarks.length > 0 && (
                    <div className="toc-bookmarks">
                      <div className="toc-header toc-header--spaced">
                        <Icon name="fa-bookmark" size="0.65em" />
                        <span>Bookmarks ({bookmarks.length})</span>
                      </div>
                      {bookmarks.map(bIdx => (
                        <div key={bIdx} className="toc-bookmark-row">
                          <button className="toc-bookmark-item" onClick={() => scrollToBookmark(bIdx)}>
                            <span className="toc-bm-preview">{getParaPreview(bIdx)}</span>
                          </button>
                          <button className="toc-bookmark-remove" onClick={() => toggleBookmark(bIdx)} title="Remove bookmark">
                            <Icon name="fa-xmark" size="0.55em" />
                          </button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </aside>
          )}

          {/* ═══ Floating Right Notes Panel ═══ */}
          {!loading && content && (
            <aside className={`notes-sidebar ${notesOpen ? 'open' : 'collapsed'}`}>
              <button className="notes-toggle" onClick={() => setNotesOpen(o => !o)} title={notesOpen ? 'Collapse Notes' : 'Expand Notes'}>
                <Icon name={notesOpen ? 'fa-angles-right' : 'fa-note-sticky'} size="0.75em" />
              </button>
              {notesOpen && (
                <div className="notes-content">
                  <div className="notes-panel-header">
                    <Icon name="fa-note-sticky" size="0.75em" />
                    <span>Chapter Notes</span>
                    <span className="notes-count">{notes.length}</span>
                  </div>

                  {/* Note composer */}
                  <div className="note-composer">
                    <div className="note-type-row">
                      {Object.entries(NOTE_TYPES).map(([key, t]) => (
                        <button
                          key={key}
                          className={`note-type-chip note-${key} ${noteType === key ? 'active' : ''}`}
                          onClick={() => setNoteType(key)}
                          title={t.label}
                        >
                          <Icon name={t.icon} size="0.65em" />
                          <span className="note-type-label">{t.label}</span>
                        </button>
                      ))}
                    </div>
                    <div className="note-anchor-hint">
                      <Icon name="fa-map-pin" size="0.6em" />
                      <span>Anchored to: {getParaPreview(currentParaIdx)}</span>
                    </div>
                    <textarea
                      className="note-input"
                      placeholder="Add a note about this passage..."
                      value={noteText}
                      onChange={e => setNoteText(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) addNote(); }}
                      rows={4}
                    />
                    <button className="note-add-btn" onClick={addNote} disabled={!noteText.trim()}>
                      <Icon name="fa-plus" size="0.7em" /> Add Note
                    </button>
                  </div>

                  {/* Notes list */}
                  <div className="notes-list">
                    {notes.length === 0 && (
                      <div className="notes-empty">
                        <Icon name="fa-pen-fancy" size="1.2em" />
                        <p>No notes yet. Jot thoughts as you read — agents can use these for editing, continuity checks, and voice refinement.</p>
                      </div>
                    )}
                    {[...notes].reverse().map(note => {
                      const nt = NOTE_TYPES[note.type] || NOTE_TYPES.edit;
                      return (
                        <div key={note.id} className="note-card">
                          <div className="note-card-header">
                            <span className={`note-card-type note-${note.type}`}>
                              <Icon name={nt.icon} size="0.6em" /> {nt.label}
                            </span>
                            <button className="note-card-remove" onClick={() => removeNote(note.id)} title="Delete note">
                              <Icon name="fa-xmark" size="0.6em" />
                            </button>
                          </div>
                          <p className="note-card-text">{note.text}</p>
                          <button className="note-card-anchor" onClick={() => scrollToBookmark(note.paraIdx)}>
                            <Icon name="fa-map-pin" size="0.55em" /> {note.paraPreview}
                          </button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </aside>
          )}

          {/* ═══ Resume Reading Banner ═══ */}
          {showResume && bookmarks.length > 0 && (
            <div className="resume-banner">
              <Icon name="fa-bookmark" size="0.85em" />
              <span>Continue where you left off?</span>
              <button className="resume-btn" onClick={() => scrollToBookmark(bookmarks[bookmarks.length - 1])}>
                Resume <Icon name="fa-arrow-right" size="0.7em" />
              </button>
              <button className="resume-dismiss" onClick={() => setShowResume(false)}>
                <Icon name="fa-xmark" size="0.75em" />
              </button>
            </div>
          )}

          <div className="chapter-reader-container" data-content-width={contentWidth}>

            {/* Chapter header */}
            <header className="chapter-reader-header">
              <div className="chapter-reader-num">Chapter {chapter.num}</div>
              <h1 className="chapter-reader-title">{chapter.title}</h1>
              <p className="chapter-reader-subtitle">{chapter.subtitle}</p>
              <div className="chapter-header-rule"></div>
            </header>

    // =================================================================
    // SCROLL TO TOP BUTTON
    // =================================================================

    function ScrollToTop({ progress }) {
      const [visible, setVisible] = useState(false);

      useEffect(() => {
        function onScroll() {
          setVisible(window.scrollY > 400);
        }
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      // SVG circle math: r=21, circumference=2*pi*21 ≈ 131.95
      const r = 21;
      const circ = 2 * Math.PI * r;
      const offset = circ - (circ * (progress || 0) / 100);
      const showRing = typeof progress === 'number' && progress > 0;

      return (
        <button
          className={`scroll-top-btn ${visible ? 'show' : ''}`}
          onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
          aria-label="Scroll to top"
        >
          {showRing && (
            <svg className="scroll-top-ring" width="52" height="52" viewBox="0 0 52 52">
              <circle className="ring-track" cx="26" cy="26" r={r} />
              <circle className="ring-fill" cx="26" cy="26" r={r}
                strokeDasharray={circ}
                strokeDashoffset={offset}
                transform="rotate(-90 26 26)"
              />
            </svg>
          )}
          <svg className="scroll-top-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="18 15 12 9 6 15" />
          </svg>
        </button>
      );
    }

    // =================================================================
    // PHASE 8: BUDGET PILL & USAGE MODAL
    // =================================================================

    const budgetStatus = pct => pct >= 90 ? 'danger' : pct >= 75 ? 'warn' : 'ok';
    let __budgetErrorNotified = false;
    const fetchSummary = () => {
      const summaryUrl = (window.BabuAI?.baseUrl ?? 'http://localhost:3001') + '/api/usage/summary';
      return fetch(summaryUrl)
        .then(r => {
          if (r.ok) { __budgetErrorNotified = false; return r.json(); }
          if (!__budgetErrorNotified && window.notify) {
            window.notify.warning('Budget unavailable', { description: 'Server returned ' + r.status });
            __budgetErrorNotified = true;
          }
          return null;
        })
        .catch(err => {
          if (!__budgetErrorNotified && window.notify) {
            window.notify.warning('Budget unavailable', { description: 'Cowork server is offline.' });
            __budgetErrorNotified = true;
          }
          return null;
        });
    };

    function BudgetAdvisor({ s }) {
      const [details, setDetails] = useState(false);
      const cap = Number(s.monthlyCAP || 50);
      const spent = Number(s.spentThisMonth || 0);
      const days = Math.max(1, new Date().getDate());
      const daysInMonth = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
      const daily = spent / days;
      const projected = daily * daysInMonth;
      const hits = Number(s.throttleHitsThisMonth || 0);
      const advice = hits > 0
        ? `You've been throttled ${hits} time${hits === 1 ? '' : 's'} this month. Consider raising the cap to $${Math.ceil((projected * 1.5) / 10) * 10} to avoid interruptions.`
        : projected < cap * 0.4
          ? `Your cap of $${cap} is generous. Based on your usage ($${projected.toFixed(2)}/mo projected), you could safely lower to $${Math.round((projected * 2) / 5) * 5 || 5}.`
          : `Your cap fits your usage well. No change needed.`;
      return (
        <div className="budget-advisor">
          <div className="budget-advisor-title">Budget Advisor</div>
          <div className="budget-advisor-text">{advice}</div>
          <button type="button" className="budget-advisor-toggle" onClick={() => setDetails(d => !d)}>{details ? 'Hide details' : 'Show details'}</button>
          {details && (
            <div className="budget-advisor-details">
              <span>daily avg: ${daily.toFixed(3)}</span><span>day {days} of {daysInMonth}</span>
              <span>projected month-end: ${projected.toFixed(2)}</span><span>throttle hits this month: {hits}</span>
            </div>
          )}
        </div>
      );
    }

    function UsageModal({ onClose }) {
      const [state, setState] = useState({ loading: true, summary: null });
      const [tab, setTab] = useState('summary');
      useEffect(() => {
        let cancelled = false;
        fetchSummary().then(body => { if (!cancelled) setState({ loading: false, summary: body && body.ok ? body : null }); });
        return () => { cancelled = true; };
      }, []);
      const s = state.summary || { spentThisMonth: 0, monthlyCAP: 50, percentageUsed: 0, throttleState: 'normal', byEndpoint: [] };
      const pct = Math.max(0, Math.min(100, Number(s.percentageUsed || 0)));
      const status = budgetStatus(pct);
      const pctBucket = Math.round(pct / 5) * 5;
      return (
        <div className="usage-modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="usage-modal-window">
            <h2 className="usage-modal-title">{`Monthly Budget — $${Number(s.spentThisMonth || 0).toFixed(2)} / $${Number(s.monthlyCAP || 50).toFixed(2)} (${pct.toFixed(0)}%)`}</h2>
            <div className="usage-tab-row">
              {['summary', 'breakdown'].map(t => <button key={t} type="button" onClick={() => setTab(t)} className={`journal-tab ${tab === t ? 'active' : ''}`}>{t[0].toUpperCase() + t.slice(1)}</button>)}
            </div>
            {state.loading && <div className="usage-loading" />}
            {!state.loading && tab === 'summary' && (
              <div>
                <div className="usage-bar-track">
                  <div className="usage-bar-fill" data-status={status} data-pct-bucket={pctBucket} />
                  {[75, 90].map(th => <div key={th} className="usage-bar-tick" data-tick={th} aria-hidden />)}
                </div>
                <div className="usage-scale-row"><span>0</span><span>75%</span><span>90%</span><span>100%</span></div>
                <div className="usage-throttle-text">
                  Throttle state: <strong className="usage-throttle-state" data-status={status}>{s.throttleState || 'normal'}</strong>.
                  {s.throttleState === 'soft' && ' Edit intents are throttled to clarify-only until usage drops below 75%.'}
                  {s.throttleState === 'hard' && ' Non-essential endpoints return 429 until the next billing month or cap increase.'}
                </div>
                <BudgetAdvisor s={s} />
              </div>
            )}
            {!state.loading && tab === 'breakdown' && (
              <div className="usage-breakdown">
                <table className="usage-table">
                  <thead><tr>{['Endpoint','Calls','Avg Cost','Total %','Last Call'].map(h => <th key={h}>{h}</th>)}</tr></thead>
                  <tbody>
                    {(s.byEndpoint || []).map(row => (
                      <tr key={row.endpoint}>
                        <td className="cell-mono">{row.endpoint}</td>
                        <td>{row.calls}</td>
                        <td className="cell-mono-num">${Number(row.avgCost || 0).toFixed(3)}</td>
                        <td>{Number(row.percentOfMonth || 0).toFixed(1)}%</td>
                        <td className="cell-muted-sm">{row.lastCallAt ? new Date(row.lastCallAt).toLocaleString() : '—'}</td>
                      </tr>
                    ))}
                    {(!s.byEndpoint || s.byEndpoint.length === 0) && <tr><td colSpan={5} className="usage-empty-cell">No usage recorded this month.</td></tr>}
                  </tbody>
                </table>
              </div>
            )}
            <div className="usage-actions"><button type="button" className="usage-done-btn" onClick={onClose}>Done</button></div>
          </div>
        </div>
      );
    }

    function BudgetPill({ monthlyCAP = 50, onOpen }) {
      const [state, setState] = useState({ loading: true, summary: null });
      useEffect(() => {
        let cancelled = false;
        const load = () => fetchSummary().then(body => { if (!cancelled) setState({ loading: false, summary: body && body.ok ? body : null }); });
        load();
        const timer = setInterval(load, 30000);
        const evs = ['queue:refresh', 'trip:edited', 'budget:refresh'];
        evs.forEach(ev => window.addEventListener(ev, load));
        return () => { cancelled = true; clearInterval(timer); evs.forEach(ev => window.removeEventListener(ev, load)); };
      }, []);
      const s = state.summary || {};
      const cap = Number(s.monthlyCAP || monthlyCAP);
      const spent = Number(s.spentThisMonth || 0);
      const pct = cap > 0 ? (spent / cap) * 100 : 0;
      const status = budgetStatus(pct);
      const label = state.loading || !state.summary ? '—' : `$${spent.toFixed(2)} / $${cap.toFixed(2)}`;
      return (
        <button type="button" className="budget-pill" data-status={status} onClick={onOpen} aria-label={`Monthly budget: ${label} (${pct.toFixed(0)}%)`} title={`Monthly spend: ${pct.toFixed(0)}% of $${cap.toFixed(2)}`}>
          <span className="budget-pill-dot" /><span>{label}</span>
        </button>
      );
    }

    // =================================================================
    // LOG MODULE — Phase 11a
    // Trip Log surface: capture strip + 4-tab IA + row list
    // =================================================================

    // Reuse the env-aware base from claude-client.js (loaded before this script).
    // Falls back to localhost for dev when BabuAI isn't available yet.
    const LOG_API_BASE = (window.BabuAI?.baseUrl ?? (
      window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === ''
        ? 'http://localhost:3001'
        : '' // production: same-origin, Worker proxies /api/* to journal-api.kashkole.com
    ));

    const KIND_BADGE = {
      photo:            { icon: 'fa-camera',        label: 'Photo' },
      receipt:          { icon: 'fa-receipt',       label: 'Receipt' },
      voice:            { icon: 'fa-microphone',    label: 'Voice' },
      note:             { icon: 'fa-note-sticky',   label: 'Note' },
      itinerary:        { icon: 'fa-calendar-days', label: 'Itinerary' },
      'unsorted-image': { icon: 'fa-camera',        label: 'Photo' },
    };

    // Phase 11b: dummy preview entries — one per kind. Always rendered at the
    // top of the Unreviewed lane so all card variants are visible for layout
    // review. ReviewCard short-circuits API actions for any id starting with
    // `dummy_` so these never hit the server.
    const DUMMY_ENTRIES = [
      {
        id: 'dummy_photo', kind: 'photo', tripSlug: '_dummy', source: 'app',
        capturedAt: new Date(Date.now() - 1000 * 60 * 60).toISOString(),
        reviewStatus: 'unreviewed',
        payload: { imagePath: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800' },
        notes: '',
      },
      {
        id: 'dummy_receipt', kind: 'receipt', tripSlug: '_dummy', source: 'app',
        capturedAt: new Date(Date.now() - 1000 * 60 * 90).toISOString(),
        reviewStatus: 'unreviewed',
        payload: { imagePath: 'https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=800' },
        notes: '',
      },
      {
        id: 'dummy_note', kind: 'note', tripSlug: '_dummy', source: 'app',
        capturedAt: new Date(Date.now() - 1000 * 60 * 150).toISOString(),
        reviewStatus: 'unreviewed',
        payload: { text: 'Reminder: ask the innkeeper about the ferry timetable to Inishbofin. The coastal road past Letterfrack is supposedly worth the detour even if we skip the island.' },
        notes: '',
      },
    ];

    function entryPreview(entry) {
      if (entry.kind === 'note') return entry.payload?.text || '(empty note)';
      if (entry.kind === 'voice') return entry.draft?.prose || entry.payload?.transcript || '(voice note)';
      if (entry.kind === 'receipt') {
        const p = entry.payload;
        return p?.merchant ? `${p.merchant} — ${p.currency ?? 'USD'} ${p.amount ?? ''}` : '(receipt)';
      }
      if (entry.kind === 'photo') {
        const mime = entry.payload?.mime || '';
        const ip = entry.payload?.imagePath || entry.imagePath || '';
        const ext = (ip.match(/\.([a-z0-9]+)$/i)?.[1] || mime.split('/')[1] || '').toUpperCase();
        return ext ? `${ext} photo` : 'Photo';
      }
      return '(item)';
    }

    // Source-filter matcher — 'photo' pill matches both firmed photos and
    // unsorted-image rows (pre-classify). Every other source is a literal
    // kind match. Mirrors server-side predicate in routes/log.js.
    function matchesLogSource(entry, source) {
      if (!source || source === 'all') return true;
      if (source === 'photo') return entry.kind === 'photo' || entry.kind === 'unsorted-image';
      return entry.kind === source;
    }

    function matchesLogTab(entry, tab) {
      switch (tab) {
        case 'inbox':
          return ['unreviewed', 'in_review'].includes(entry.reviewStatus) ||
                 ['unplaced', 'proposed'].includes(entry.placementStatus);
        case 'journal':
          return ['draft', 'published'].includes(entry.journalStatus) || entry.memoryWorthy === true;
        case 'expenses':
          return ['candidate', 'approved', 'synced', 'failed'].includes(entry.ynabStatus);
        case 'stuck':
          return entry.ingestStatus === 'failed' || entry._drainStatus === 'stuck' || entry.ynabStatus === 'failed';
        default:
          return true;
      }
    }

    // ─── Relative-time helper ("3m ago" etc.) ───
    function relativeTime(ts) {
      if (!ts) return '';
      const then = new Date(ts).getTime();
      if (isNaN(then)) return '';
      const diffMs = Date.now() - then;
      const m = Math.floor(diffMs / 60000);
      if (m < 1)    return 'just now';
      if (m < 60)   return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24)   return `${h}h ago`;
      const d = Math.floor(h / 24);
      if (d < 7)    return `${d}d ago`;
      return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    // Time-bucket bucketing for Log Bank grouping. Maps an entry's capturedAt
    // (or createdAt fallback) to a bucket key plus a local ISO date string.
    // Entries with no timestamp fall into a synthetic 'other' bucket, which
    // renders below the chronological ones.
    const LOG_BUCKET_DEFS = [
      { key: 'morning',   label: 'Morning',   range: '6am – 11am', start: 6,  end: 11 },
      { key: 'midday',    label: 'Midday',    range: '11am – 3pm', start: 11, end: 15 },
      { key: 'afternoon', label: 'Afternoon', range: '3pm – 6pm',  start: 15, end: 18 },
      { key: 'evening',   label: 'Evening',   range: '6pm – late', start: 18, end: 30 },
      { key: 'other',     label: 'Untimed',   range: '',           start: -1, end: -1 },
    ];
    function bucketForEntry(entry) {
      const ts = entry?.capturedAt || entry?.createdAt;
      if (!ts) return { bucketKey: 'other', dateKey: 'unknown' };
      const d = new Date(ts);
      if (isNaN(d.getTime())) return { bucketKey: 'other', dateKey: 'unknown' };
      const h = d.getHours();
      let bucketKey = 'evening';
      if (h >= 6 && h < 11)       bucketKey = 'morning';
      else if (h >= 11 && h < 15) bucketKey = 'midday';
      else if (h >= 15 && h < 18) bucketKey = 'afternoon';
      else                         bucketKey = 'evening';
      const dateKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      return { bucketKey, dateKey };
    }
    // Group entries by date (if multiple) + time bucket. Returns a flat list
    // of render items: { type: 'date-header' | 'bucket-header' | 'entry' }.
    // Preserves the input order within each bucket, so upstream sort (newest
    // first from displayEntries) is honored.
    function groupEntriesForDensity(entries) {
      if (!entries || entries.length === 0) return [];
      const byDate = new Map();
      for (const entry of entries) {
        const { bucketKey, dateKey } = bucketForEntry(entry);
        if (!byDate.has(dateKey)) byDate.set(dateKey, new Map());
        const bucketMap = byDate.get(dateKey);
        if (!bucketMap.has(bucketKey)) bucketMap.set(bucketKey, []);
        bucketMap.get(bucketKey).push(entry);
      }
      const todayKey = (() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      })();
      const yesterdayKey = (() => {
        const d = new Date(); d.setDate(d.getDate() - 1);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      })();
      const showDateHeaders = byDate.size > 1;
      // Sort dates newest-first; 'unknown' sinks to the bottom.
      const dateKeys = [...byDate.keys()].sort((a, b) => {
        if (a === 'unknown') return 1;
        if (b === 'unknown') return -1;
        return b.localeCompare(a);
      });
      const items = [];
      for (const dateKey of dateKeys) {
        if (showDateHeaders) {
          let label;
          if (dateKey === todayKey) label = 'Today';
          else if (dateKey === yesterdayKey) label = 'Yesterday';
          else if (dateKey === 'unknown') label = 'Untimed';
          else label = new Date(dateKey + 'T12:00:00').toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
          items.push({ type: 'date-header', dateKey, label });
        }
        const bucketMap = byDate.get(dateKey);
        for (const def of LOG_BUCKET_DEFS) {
          const list = bucketMap.get(def.key);
          if (!list || !list.length) continue;
          items.push({
            type: 'bucket-header',
            key: `${dateKey}-${def.key}`,
            label: def.label,
            range: def.range,
            count: list.length,
          });
          for (const entry of list) items.push({ type: 'entry', entry });
        }
      }
      return items;
    }

    // Turn a server-sent error string into something presentable. Defense in
    // depth — the server already sanitises upstream Anthropic errors, but old
    // callers, non-refine endpoints, and network-layer errors still surface
    // raw "NNN {json...}" blobs. We unwrap the JSON body if we see one, and
    // otherwise trim to a single short line.
    function friendlyError(raw) {
      if (!raw) return 'Something went wrong.';
      const s = typeof raw === 'string' ? raw : (raw?.message || String(raw));
      const jsonStart = s.indexOf('{');
      if (jsonStart >= 0) {
        try {
          const body = JSON.parse(s.slice(jsonStart));
          const inner = body?.error?.message || body?.error?.error?.message;
          if (typeof inner === 'string' && inner.trim()) return inner.trim();
        } catch { /* not JSON — fall through */ }
      }
      const statusMatch = /^(\d{3})\b/.exec(s);
      if (statusMatch) {
        const byCode = {
          '400': 'Request was invalid — the image or input may be unreadable.',
          '401': 'Not authorized.',
          '413': 'Input was too large.',
          '429': 'Rate-limited — try again shortly.',
          '500': 'Server error — try again.',
          '502': 'AI service is temporarily unavailable.',
          '503': 'Service is temporarily unavailable.',
        };
        if (byCode[statusMatch[1]]) return byCode[statusMatch[1]];
      }
      return s.length > 180 ? s.slice(0, 177) + '…' : s;
    }

    // ─── Visual thumbnail: photo-forward; iconic tile otherwise ───
    function LogEntryThumb({ entry }) {
      const kind = entry.kind;
      const ts = entry.capturedAt || entry.createdAt;
      const rel = relativeTime(ts);

      if (kind === 'photo') {
        const ip = entry.payload?.imagePath || entry.imagePath;
        if (ip) {
          const src = /^https?:\/\//.test(ip) ? ip : `${LOG_API_BASE}/${ip.replace(/^\//, '')}`;
          return (
            <div className="log-entry-thumb">
              <img src={src} alt="" loading="lazy" />
              {rel && <span className="log-entry-thumb-time">{rel}</span>}
            </div>
          );
        }
      }
      // Text-bearing kinds: show content instead of icon
      const textContent = kind === 'note'  ? (entry.payload?.text || entry.notes || '')
                        : kind === 'voice' ? (entry.payload?.transcript || '')
                        : '';
      if (textContent) {
        const cls = `log-entry-thumb log-entry-thumb--text log-entry-thumb--${kind}`;
        return (
          <div className={cls}>
            <div className="log-entry-thumb-prose">{textContent}</div>
            {rel && <span className="log-entry-thumb-time">{rel}</span>}
          </div>
        );
      }

      const iconByKind = {
        photo:     'fa-camera',
        receipt:   'fa-receipt',
        voice:     'fa-microphone-lines',
        note:      'fa-note-sticky',
        itinerary: 'fa-calendar-days',
      };
      const cls = `log-entry-thumb log-entry-thumb--icon log-entry-thumb--${kind}`;
      return (
        <div className={cls}>
          <Icon name={iconByKind[kind] || 'fa-question'} />
          {rel && <span className="log-entry-thumb-time">{rel}</span>}
        </div>
      );
    }

    // ─── Reusable confirmation modal (mirrors itinerary del-modal) ───
    function ConfirmModal({ open, title, message, targetLabel, confirmLabel, onCancel, onConfirm }) {
      useEffect(() => {
        if (!open) return;
        function onKey(e) {
          if (e.key === 'Escape') onCancel?.();
          if (e.key === 'Enter')  onConfirm?.();
        }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [open, onCancel, onConfirm]);

      if (!open) return null;
      return (
        <div className="confirm-modal" role="alertdialog" aria-modal="true">
          <div className="confirm-modal-backdrop" onClick={onCancel}></div>
          <div className="confirm-modal-panel">
            <div className="confirm-modal-icon" aria-hidden="true">
              <Icon name="fa-triangle-exclamation" />
            </div>
            <h3 className="confirm-modal-title">{title || 'Are you sure?'}</h3>
            <p className="confirm-modal-msg">
              {message || "This action can't be undone."}
              {targetLabel && (
                <> {' '}<span className="confirm-modal-target">{targetLabel}</span></>
              )}
            </p>
            <div className="confirm-modal-actions">
              <button className="confirm-modal-btn confirm-modal-btn--cancel" onClick={onCancel} autoFocus>
                Keep it
              </button>
              <button className="confirm-modal-btn confirm-modal-btn--confirm" onClick={onConfirm}>
                <Icon name="fa-trash-can" /> {confirmLabel || 'Reject'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Phase 11b: per-entry localStorage draft cache.
    // Holds the in-progress prompt (Zone 2), refined output (Zone 3), kind
    // override (image-kind toggle), and structured receipt fields. Server
    // stays source of truth for the entry itself; this hook just preserves
    // typing across reloads. Cleared on Approve/Reject.
    function useDraftCache(entryId, initialPrompt = '') {
      const key = `journal.draft.${entryId}`;
      const [draft, setDraft] = useState(() => {
        const empty = { prompt: initialPrompt, refined: '', kindOverride: null, structured: null };
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return empty;
          const parsed = JSON.parse(raw);
          // If localStorage has any prompt content (even empty string from a
          // user clear), respect it. Only fall back to initialPrompt when the
          // key isn't present at all.
          return {
            prompt: typeof parsed.prompt === 'string' ? parsed.prompt : initialPrompt,
            refined: typeof parsed.refined === 'string' ? parsed.refined : '',
            kindOverride: parsed.kindOverride === 'photo' || parsed.kindOverride === 'receipt' ? parsed.kindOverride : null,
            structured: parsed.structured && typeof parsed.structured === 'object' ? parsed.structured : null,
          };
        } catch { return empty; }
      });
      const writeTimer = useRef(null);

      function persist(updater) {
        setDraft(prev => {
          const next = typeof updater === 'function' ? updater(prev) : updater;
          if (writeTimer.current) clearTimeout(writeTimer.current);
          writeTimer.current = setTimeout(() => {
            try {
              const empty = !next.prompt && !next.refined && !next.kindOverride && !next.structured;
              if (empty) localStorage.removeItem(key);
              else localStorage.setItem(key, JSON.stringify({ ...next, updatedAt: new Date().toISOString() }));
            } catch {}
          }, 300);
          return next;
        });
      }

      return {
        ...draft,
        setPrompt:       (v) => persist(p => ({ ...p, prompt: v })),
        setRefined:      (v) => persist(p => ({ ...p, refined: v })),
        setKindOverride: (v) => persist(p => ({ ...p, kindOverride: v })),
        setStructured:   (v) => persist(p => ({ ...p, structured: v })),
        clear: () => {
          setDraft({ prompt: '', refined: '', kindOverride: null, structured: null });
          if (writeTimer.current) clearTimeout(writeTimer.current);
          try { localStorage.removeItem(key); } catch {}
        },
      };
    }

    // 30-day TTL purge: drop drafts whose updatedAt is older than the cutoff.
    // Runs once at app mount; backstop against unbounded growth, not a feature.
    function purgeStaleDrafts() {
      try {
        const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
        for (let i = localStorage.length - 1; i >= 0; i--) {
          const k = localStorage.key(i);
          if (!k || !k.startsWith('journal.draft.')) continue;
          try {
            const d = JSON.parse(localStorage.getItem(k));
            if (!d?.updatedAt || new Date(d.updatedAt).getTime() < cutoff) localStorage.removeItem(k);
          } catch { localStorage.removeItem(k); }
        }
      } catch {}
    }

    // ─── Phase 11b: kind badge (top-right overlay on Zone 1).
    // For image kinds (photo/receipt/unsorted-image), the badge is clickable
    // and flips photo↔receipt. For note/voice it's informational only.
    function KindBadge({ kind, onFlip, busy }) {
      const badge = KIND_BADGE[kind] || { icon: 'fa-question', label: kind };
      const clickable = !!onFlip && !busy;
      const flipTarget = kind === 'receipt' ? 'Photo' : 'Receipt';
      const title = clickable
        ? `Click to switch to ${flipTarget}`
        : (kind === 'unsorted-image' ? 'Photo kind not yet classified' : badge.label);
      return (
        <button
          type="button"
          className={`review-card-kind-badge ${clickable ? 'is-clickable' : 'is-static'}`}
          onClick={clickable ? onFlip : undefined}
          disabled={busy}
          title={title}
          aria-label={title}
        >
          <Icon name={busy ? 'fa-circle-notch fa-spin' : badge.icon} />
          <span>{badge.label}</span>
        </button>
      );
    }

    // ─── Phase 11b: artifact pane (Zone 1) — read-only, kind-aware.
    // Image / audio paths are repo-relative (e.g. trips/{slug}/photos/{id}.jpg).
    // Static blobs are mounted by the API server, so URL must prefix LOG_API_BASE.
    function ReviewArtifact({ entry, kind }) {
      const toApiUrl = (p) => /^https?:\/\//.test(p) ? p : `${LOG_API_BASE}/${String(p).replace(/^\/+/, '')}`;
      const isImage = kind === 'photo' || kind === 'receipt' || entry.kind === 'unsorted-image';
      if (isImage) {
        const ip = entry.payload?.imagePath || entry.imagePath;
        if (!ip) return <div className="review-card-artifact review-card-artifact--empty">No image attached</div>;
        return <img src={toApiUrl(ip)} alt="Captured" className="review-card-artifact review-card-artifact--image" />;
      }
      if (kind === 'voice') {
        const audioPath = entry.payload?.audioPath;
        const transcript = entry.payload?.transcript || '(no transcript)';
        return (
          <div className="review-card-artifact review-card-artifact--voice">
            {audioPath && (
              <audio controls className="review-card-artifact-audio" src={toApiUrl(audioPath)} />
            )}
            <div className="review-card-artifact-transcript">{transcript}</div>
          </div>
        );
      }
      if (kind === 'note') {
        const text = entry.payload?.text || entry.notes || '(empty note)';
        return <div className="review-card-artifact review-card-artifact--text">{text}</div>;
      }
      return <div className="review-card-artifact review-card-artifact--empty">Unsupported kind: {kind}</div>;
    }

    // ─── Phase 11b: unified review card (3 zones).
    // Zone 1 — read-only artifact (image / transcript / captured text)
    // Zone 2 — editable prompt textarea (curatorial intent, not persisted)
    // Zone 3 — editable refined output (AI result, persisted on Approve)
    // Approve resolution: Zone 3 if non-empty, else Zone 1 (raw artifact).
    function ReviewCard({ entry, lane, draggable, onReorder, onApproveDraft, onSaveDraft, onReject, onKindFlipped }) {
      // Reviewed cards seed the textarea with the canonical prose so the
      // reviewer can see/edit what they previously approved. Unreviewed
      // cards start empty (or whatever localStorage holds).
      const initialPrompt = lane === 'reviewed' ? (entry.draft?.prose || '') : '';
      const draft = useDraftCache(entry.id, initialPrompt);
      const effectiveKind = draft.kindOverride || entry.kind;
      const isReviewed = lane === 'reviewed';

      const [refining, setRefining] = useState(false);
      const [refineError, setRefineError] = useState('');
      const [approving, setApproving] = useState(false);
      const [flippingKind, setFlippingKind] = useState(false);

      const isDummy = typeof entry.id === 'string' && entry.id.startsWith('dummy_');

      // Refine in-place: AI rewrites the textarea content using the card
      // artifact + voice fingerprint + active trip context. The result
      // replaces draft.prompt directly. On the Reviewed lane, persist=true
      // so the refined output lands server-side immediately (no Save button
      // to click).
      async function handleRefine() {
        if (refining) return;
        if (isDummy) {
          window.notify?.info?.('Demo card', { description: 'Refine is disabled on preview cards.' });
          return;
        }
        setRefining(true);
        setRefineError('');
        try {
          const body = { note: draft.prompt };
          if (draft.kindOverride) body.kindOverride = draft.kindOverride;
          if (isReviewed) body.persist = true;
          const r = await window.BabuAI.logRefine(entry.id, body);
          if (r?.refined) {
            draft.setPrompt(r.refined);
            if (r.structured) draft.setStructured(r.structured);
            if (isReviewed) setLastSaved(r.refined);
            // When vision was skipped for a known reason (HEIC from iPhone,
            // oversized, unreadable) the refine still succeeds on text, but
            // the prose is poorer than with an image. Nudge the user so they
            // know why this entry looks less grounded.
            if (r?.vision && r.vision.used === false && r.vision.reason && /^format-|^too-large/.test(r.vision.reason)) {
              const hint = r.vision.reason === 'format-heic'
                ? 'HEIC photo — vision skipped. Re-export as JPG for richer refinement.'
                : `Vision skipped (${r.vision.reason.replace(/-/g, ' ')}). Refined from text only.`;
              window.notify?.info?.('Refined without vision', { description: hint });
            }
          } else {
            setRefineError('No refined text returned');
          }
        } catch (err) {
          setRefineError(friendlyError(err));
        } finally {
          setRefining(false);
        }
      }

      // Auto-save on textarea blur (Reviewed lane only). Silent unless the
      // PATCH fails. Skips when content is unchanged since last persist.
      const [lastSaved, setLastSaved] = useState(initialPrompt);
      const [autoSaving, setAutoSaving] = useState(false);
      async function handleAutoSave() {
        if (!isReviewed || isDummy) return;
        if (draft.prompt === lastSaved) return;
        setAutoSaving(true);
        try {
          const patch = { draftProse: (draft.prompt || '').trim() };
          if (draft.kindOverride) patch.kindOverride = draft.kindOverride;
          if (draft.structured) patch.structured = draft.structured;
          await onSaveDraft?.(entry.id, patch, { silent: true });
          setLastSaved(draft.prompt);
        } catch (err) {
          window.notify?.error?.('Auto-save failed', { description: err.message || String(err) });
        } finally {
          setAutoSaving(false);
        }
      }

      // Unapprove (Reviewed lane only): flips reviewStatus back to
      // 'unreviewed' so the entry returns to the Unreviewed lane.
      const [unapproving, setUnapproving] = useState(false);
      async function handleUnapprove() {
        if (unapproving) return;
        if (isDummy) {
          window.notify?.info?.('Demo card', { description: 'Reject is disabled on preview cards.' });
          return;
        }
        setUnapproving(true);
        try {
          await onSaveDraft?.(entry.id, { reviewStatus: 'unreviewed' }, { silent: true });
          window.notify?.success?.('Moved back to Log Bank');
        } catch (err) {
          window.notify?.error?.('Reject failed', { description: err.message || String(err) });
        } finally {
          setUnapproving(false);
        }
      }

      // Approve (Unreviewed lane) flips reviewStatus to 'approved' along
      // with the textarea text + any structured/kind override.
      // Save (Reviewed lane) PATCHes only the textarea text + structured —
      // entry stays approved.
      async function handleCommit() {
        if (approving) return;
        if (isDummy) {
          const verb = isReviewed ? 'Save' : 'Approve';
          window.notify?.info?.('Demo card', { description: `${verb} is disabled on preview cards.` });
          return;
        }
        setApproving(true);
        try {
          const patch = {};
          if (!isReviewed) patch.reviewStatus = 'approved';
          if (draft.prompt && draft.prompt.trim()) patch.draftProse = draft.prompt.trim();
          if (draft.kindOverride) patch.kindOverride = draft.kindOverride;
          if (draft.structured) patch.structured = draft.structured;
          if (isReviewed) {
            await onSaveDraft?.(entry.id, patch);
          } else {
            await onApproveDraft?.(entry.id, patch);
          }
          draft.clear();
        } catch (err) {
          const verb = isReviewed ? 'Save' : 'Approve';
          window.notify?.error?.(`${verb} failed`, { description: err.message || String(err) });
        } finally {
          setApproving(false);
        }
      }

      const refineLabel = refining ? 'Refining…' : 'Refine';
      const refineIcon = refining ? 'fa-circle-notch fa-spin' : 'fa-wand-magic-sparkles';
      const refineTitle = effectiveKind === 'unsorted-image'
        ? 'Refining as a photo — classify hasn\u2019t firmed the kind yet'
        : 'Refine in your voice with active trip context';

      // Kind-flip: only meaningful for image kinds. Click toggles
      // photo↔receipt, immediately PATCHes the server so it persists, and
      // auto-refines only when the textarea is empty (preserves user text).
      const isImageKind = ['photo', 'receipt', 'unsorted-image'].includes(effectiveKind);
      async function handleKindFlip() {
        if (flippingKind) return;
        const next = effectiveKind === 'receipt' ? 'photo' : 'receipt';
        if (isDummy) {
          // Dummies don't exist server-side — flip locally only.
          draft.setKindOverride(next);
          return;
        }
        setFlippingKind(true);
        try {
          const r = await window.BabuAI.logPatch(entry.id, { kindOverride: next });
          if (r?.entry) {
            onKindFlipped?.(entry.id, r.entry);
            draft.setKindOverride(null);
          }
          if (!draft.prompt || !draft.prompt.trim()) {
            handleRefine();
          }
        } catch (err) {
          window.notify?.error?.('Kind change failed', { description: err.message || String(err) });
        } finally {
          setFlippingKind(false);
        }
      }

      // Drag-and-drop handlers — only active on Reviewed lane real entries.
      const [isDragOver, setIsDragOver] = useState(false);
      const dragProps = draggable ? {
        draggable: true,
        onDragStart: (e) => {
          e.dataTransfer.setData('text/plain', entry.id);
          e.dataTransfer.effectAllowed = 'move';
        },
        onDragOver: (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          if (!isDragOver) setIsDragOver(true);
        },
        onDragLeave: () => setIsDragOver(false),
        onDrop: (e) => {
          e.preventDefault();
          setIsDragOver(false);
          const fromId = e.dataTransfer.getData('text/plain');
          if (fromId && fromId !== entry.id) onReorder?.(fromId, entry.id);
        },
      } : {};

      return (
        <article
          className={`review-card review-card-3zone ${draggable ? 'is-draggable' : ''} ${isDragOver ? 'is-drag-over' : ''}`}
          {...dragProps}
        >
          <div className="review-card-zone review-card-zone--artifact">
            <ReviewArtifact entry={entry} kind={effectiveKind} />
            <KindBadge
              kind={effectiveKind}
              onFlip={isImageKind ? handleKindFlip : null}
              busy={flippingKind}
            />
          </div>

          <div className="review-card-zone review-card-zone--prompt">
            <textarea
              className="review-card-prompt-input"
              value={draft.prompt}
              onChange={e => draft.setPrompt(e.target.value)}
              onBlur={handleAutoSave}
              placeholder="Add a note or prompt for this entry…"
              rows={3}
              disabled={refining || approving || unapproving}
              spellCheck
            />
          </div>

          {refineError && (
            <div className="review-card-error" role="alert">
              <Icon name="fa-triangle-exclamation" />
              <span className="review-card-error-msg">{refineError}</span>
              <button
                type="button"
                className="review-card-error-dismiss"
                onClick={() => setRefineError('')}
                aria-label="Dismiss error"
                title="Dismiss"
              >
                <Icon name="fa-xmark" />
              </button>
            </div>
          )}

          <footer className="review-card-actions">
            {isReviewed ? (
              <button
                className="log-action-btn log-action-btn--reject"
                onClick={handleUnapprove}
                disabled={unapproving || refining || autoSaving}
                title="Send this back to the Unreviewed lane"
                aria-label={unapproving ? 'Rejecting' : 'Reject'}
              >
                <Icon name={unapproving ? 'fa-circle-notch fa-spin' : 'fa-rotate-left'} />
                <span className="btn-label">{unapproving ? 'Rejecting…' : 'Reject'}</span>
              </button>
            ) : (
              <button
                className="log-action-btn log-action-btn--reject"
                onClick={() => onReject?.(entry)}
                disabled={approving || refining}
                title="Reject this entry"
                aria-label="Reject"
              >
                <Icon name="fa-trash-can" />
                <span className="btn-label">Reject</span>
              </button>
            )}
            <button
              className="log-action-btn log-action-btn--refine"
              onClick={handleRefine}
              disabled={approving || refining || unapproving}
              title={refineTitle}
              aria-label={typeof refineLabel === 'string' ? refineLabel : 'Refine'}
            >
              <Icon name={refineIcon} />
              <span className="btn-label">{refineLabel}</span>
            </button>
            {!isReviewed && (
              <button
                className="log-action-btn log-action-btn--approve"
                onClick={handleCommit}
