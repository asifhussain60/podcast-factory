                </div>
                {isOpen && (
                  <div style={{ marginTop: '0.75rem', display: 'grid', gap: '0.35rem' }}>
                    {p.description && <Text size="sm">{p.description}</Text>}
                    {p.category && <Text size="sm" color="muted">Category: {p.category}</Text>}
                    {it.imagePath && <Text size="sm" variant="mono" color="muted">{it.imagePath}</Text>}
                    <Text size="sm" variant="mono" color="muted">id: {it.id}</Text>
                    {it.visionUsed !== undefined && <Text size="sm" variant="mono" color="muted">visionUsed: {String(it.visionUsed)}</Text>}
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      );
    }
    const CAPTURE_CURRENCIES = ['USD','GBP','EUR','CAD','AUD','AED','PKR','INR','JPY','TRY'];
    const CAPTURE_CATEGORIES = ['Food','Transport','Lodging','Shopping','Entertainment','Health','Other'];
    const CAPTURE_STEPS = ['Reading image', 'Extracting details', 'Review'];

    function TripCapture({ trip }) {
      const [modalOpen, setModalOpen] = useState(false);
      return (
        <div style={{ display: 'grid', gap: '1rem' }}>
          <Card variant="glass" style={{ padding: '1.75rem' }}>
            <Text as="h3" variant="serif" size="lg" style={{ marginBottom: '0.5rem' }}>Capture</Text>
            <Text size="sm" color="muted" style={{ marginBottom: '1.25rem' }}>Drop a receipt photo; we'll extract the details and queue it for review.</Text>
            <Button variant="primary" icon="fa-receipt" onClick={() => setModalOpen(true)}>Capture Receipt</Button>
          </Card>
          {modalOpen && <CaptureModal trip={trip} onClose={() => setModalOpen(false)} />}
        </div>
      );
    }

    function CaptureModal({ trip, onClose }) {
      const { show: toast } = useToast();
      const [file, setFile] = useState(null);
      const [previewUrl, setPreviewUrl] = useState(null);
      const [step, setStep] = useState(0); // 0=pick, 1=upload, 2=extract, 3=review
      const [error, setError] = useState(null);
      const [rawText, setRawText] = useState(null);
      const [uploaded, setUploaded] = useState(null); // { imagePath, id, visionUsed }
      const [form, setForm] = useState({ merchant: '', amount: '', currency: trip?.currency || 'USD', date: todayISO(), category: 'Food', description: '' });
      const [memoryWorthy, setMemoryWorthy] = useState(false);
      const [dragOver, setDragOver] = useState(false);
      const [submitting, setSubmitting] = useState(false);

      useEffect(() => () => { if (previewUrl) URL.revokeObjectURL(previewUrl); }, [previewUrl]);

      const onPick = (f) => {
        if (!f) return;
        if (!/^image\//.test(f.type)) { setError('Please choose an image file.'); return; }
        if (f.size > 5 * 1024 * 1024) { setError('File too large (max 5 MB).'); return; }
        setError(null); setRawText(null);
        setFile(f);
        setPreviewUrl(URL.createObjectURL(f));
      };

      const runPipeline = useCallback(async () => {
        if (!file) return;
        setError(null); setStep(1);
        try {
          const up = await window.BabuAI.uploadReceipt(file);
          setUploaded(up); setStep(2);
          const ex = await window.BabuAI.extractReceipt(up.imagePath);
          if (ex.extracted) {
            setForm(prev => ({
              merchant:    ex.extracted.merchant    ?? prev.merchant,
              amount:      ex.extracted.amount != null ? String(ex.extracted.amount) : prev.amount,
              currency:    ex.extracted.currency    ?? prev.currency,
              date:        ex.extracted.date        ?? prev.date,
              category:    ex.extracted.category    ?? prev.category,
              description: ex.extracted.description ?? prev.description,
            }));
          } else {
            setRawText(ex.rawText || '(empty response)');
          }
          setUploaded(u => ({ ...u, visionUsed: ex.visionUsed }));
          setStep(3);
        } catch (err) {
          setError(err.message || 'Extraction failed. You can retry or edit manually.');
          setStep(3);
        }
      }, [file]);

      useEffect(() => { if (file && step === 0) runPipeline(); }, [file, step, runPipeline]);

      const approve = async () => {
        if (!uploaded) return;
        setSubmitting(true); setError(null);
        const amountNum = Number(form.amount);
        try {
          const row = {
            schemaVersion: '1',
            id: `receipt-${uploaded.id}`,
            createdAt: new Date().toISOString(),
            tripSlug: trip?.slug,
            kind: 'receipt',
            source: 'app',
            status: 'pending',
            memoryWorthy,
            imagePath: uploaded.imagePath,
            visionUsed: Boolean(uploaded.visionUsed),
            payload: {
              merchant: form.merchant.trim() || null,
              amount: Number.isFinite(amountNum) ? amountNum : null,
              currency: form.currency || null,
              date: form.date || null,
              category: form.category || null,
              description: form.description.trim() || null,
            },
          };
          await window.BabuAI.queuePost('pending', row);
          toast('Receipt queued', 'success');
          window.dispatchEvent(new CustomEvent('queue:refresh'));
          onClose();
        } catch (err) {
          setError(err.message || 'Queue write failed.');
        } finally {
          setSubmitting(false);
        }
      };

      const onDrop = (e) => { e.preventDefault(); setDragOver(false); onPick(e.dataTransfer.files && e.dataTransfer.files[0]); };

      return (
        <Modal title="Capture receipt" onClose={onClose} size="md">
          {step === 0 && !file && (
            <div>
              <label
                className={`capture-drop ${dragOver ? 'is-over' : ''}`}
                onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={onDrop}
                style={{ display: 'grid', placeItems: 'center', padding: '2rem', border: '2px dashed var(--border, #555)', borderRadius: '0.75rem', cursor: 'pointer', gap: '0.5rem' }}>
                <Icon name="fa-image" size="2em" />
                <Text size="sm">Click or drop an image here</Text>
                <Text size="sm" color="muted">JPG, PNG, HEIC, WebP · up to 5 MB</Text>
                <input type="file" accept="image/*" capture="environment" style={{ display: 'none' }} onChange={e => onPick(e.target.files && e.target.files[0])} />
              </label>
              {error && <Text color="error" size="sm" style={{ marginTop: '0.75rem' }}>{error}</Text>}
            </div>
          )}
          {file && (
            <div style={{ display: 'grid', gap: '1rem' }}>
              <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 180px) 1fr', gap: '1rem', alignItems: 'start' }}>
                {previewUrl && <img src={previewUrl} alt="Receipt preview" style={{ width: '100%', borderRadius: '0.5rem' }} />}
                <div style={{ display: 'grid', gap: '0.5rem' }}>
                  <StepProgress steps={CAPTURE_STEPS} current={Math.max(0, step - 1)} />
                  {uploaded?.visionUsed !== undefined && <Badge variant="neutral" icon={uploaded.visionUsed ? 'fa-eye' : 'fa-wand-magic-sparkles'}>{uploaded.visionUsed ? 'macOS Vision OCR' : 'Haiku vision'}</Badge>}
                  {error && <Text color="error" size="sm">{error}</Text>}
                  {rawText && <Text size="sm" color="muted" style={{ whiteSpace: 'pre-wrap' }}>Model output (raw):{"\n"}{rawText}</Text>}
                </div>
              </div>
              {step >= 3 && (
                <div style={{ display: 'grid', gap: '0.75rem' }}>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem' }}>
                    <FormField label="Merchant"><Input value={form.merchant} onChange={e => setForm({ ...form, merchant: e.target.value })} /></FormField>
                    <FormField label="Amount"><Input type="number" step="0.01" value={form.amount} onChange={e => setForm({ ...form, amount: e.target.value })} /></FormField>
                    <FormField label="Currency">
                      <Select value={form.currency} onChange={e => setForm({ ...form, currency: e.target.value })}>
                        {CAPTURE_CURRENCIES.map(c => <option key={c} value={c}>{c}</option>)}
                      </Select>
                    </FormField>
                    <FormField label="Date"><Input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} /></FormField>
                    <FormField label="Category">
                      <Select value={form.category} onChange={e => setForm({ ...form, category: e.target.value })}>
                        {CAPTURE_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                      </Select>
                    </FormField>
                  </div>
                  <FormField label="Description"><Input value={form.description} onChange={e => setForm({ ...form, description: e.target.value })} /></FormField>
                  <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap' }}>
                    <IconButton icon={memoryWorthy ? 'fa-star' : 'fa-star'} label={memoryWorthy ? 'Unmark memory-worthy' : 'Mark memory-worthy'}
                      onClick={() => setMemoryWorthy(m => !m)}
                      variant={memoryWorthy ? 'primary' : 'ghost'} />
                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                      {error && <Button variant="secondary" icon="fa-rotate" onClick={() => runPipeline()}>Retry</Button>}
                      <Button variant="secondary" onClick={onClose}>Cancel</Button>
                      <Button variant="primary" icon="fa-check" loading={submitting} onClick={approve}>Approve</Button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}
        </Modal>
      );
    }

    const TRIP_QUICK_ACTIONS = [
      { id: 'next',   label: "What's next today?" },
      { id: 'sumday', label: "Summarize today" },
      { id: 'tip',    label: "Tip for this country" }
    ];

    function FloatingChat({ trip }) {
      const [open, setOpen] = useState(false);
      const [draft, setDraft] = useState('');
      const [pending, setPending] = useState(false);
      const [pulse, setPulse] = useState(false);
      const [messages, setMessages] = useState([]);
      const inputRef = useRef(null);
      const convRef = useRef(null);
      const taResize = (el) => { if (!el) return; el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 96) + 'px'; };

      useEffect(() => {
        function onChatFocus() { setOpen(true); setTimeout(() => inputRef.current && inputRef.current.focus(), 0); }
        window.addEventListener('floating-chat:focus', onChatFocus);
        return () => window.removeEventListener('floating-chat:focus', onChatFocus);
      }, []);

      useEffect(() => {
        if (!open) return;
        function onKey(e) { if (e.key === 'Escape') { e.stopPropagation(); setOpen(false); } }
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [open]);

      useEffect(() => { if (open && inputRef.current) inputRef.current.focus(); }, [open]);
      useEffect(() => { if (convRef.current) convRef.current.scrollTop = convRef.current.scrollHeight; }, [messages, pending]);

      const send = useCallback(async (text) => {
        const trimmed = (text ?? draft).trim();
        if (!trimmed || pending) return;
        setMessages(m => [...m, { role: 'user', text: trimmed }]);
        setDraft('');
        if (inputRef.current) { inputRef.current.style.height = 'auto'; }
        setPending(true);
        try {
          const r = await window.BabuAI.tripQA(trimmed, trip || null);
          setMessages(m => [...m, { role: 'assistant', text: r.response || '(empty response)' }]);
          if (!open) setPulse(true);
        } catch (err) {
          setMessages(m => [...m, { role: 'error', text: err.message || 'Request failed', last: trimmed }]);
        } finally {
          setPending(false);
        }
      }, [draft, pending, trip, open]);

      useEffect(() => { if (!pulse) return; const t = setTimeout(() => setPulse(false), 2800); return () => clearTimeout(t); }, [pulse]);

      function onKeyDown(e) {
        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); send(); }
        else if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
      }

      const lastError = messages.length && messages[messages.length - 1].role === 'error' ? messages[messages.length - 1] : null;

      return (
        <div className="floating-chat" aria-live="off">
          {!open && (
            <button
              type="button"
              className={`floating-chat-bubble ${pulse ? 'is-pulsing' : ''}`}
              aria-label="Open trip assistant chat"
              onClick={() => { setOpen(true); setPulse(false); }}
            >
              <Icon name="fa-comment-dots" />
            </button>
          )}
          {open && (
            <div className="floating-chat-panel" role="dialog" aria-label="Trip assistant">
              <header className="floating-chat-header">
                <span><Icon name="fa-comment-dots" /> Trip Assistant</span>
                <span className="floating-chat-header-actions">
                  <IconButton icon="fa-window-minimize" label="Minimize chat" onClick={() => setOpen(false)} />
                  <IconButton icon="fa-xmark" label="Close chat" onClick={() => { setOpen(false); setMessages([]); }} />
                </span>
              </header>
              <div ref={convRef} className="floating-chat-conversation" aria-live="polite">
                {messages.length === 0 && !pending && (
                  <div className="floating-chat-msg system">Ask anything about your trip.</div>
                )}
                {messages.map((m, i) => (
                  <div key={i} className={`floating-chat-msg ${m.role}`}>
                    {m.text}
                    {m.role === 'error' && (
                      <Button variant="secondary" size="sm" icon="fa-rotate" onClick={() => { setMessages(prev => prev.slice(0, -1)); send(m.last); }}>Retry</Button>
                    )}
                  </div>
                ))}
                {pending && <div className="floating-chat-msg assistant"><ThinkingDots /></div>}
              </div>
              <div className="floating-chat-chips" role="toolbar" aria-label="Quick actions">
                {TRIP_QUICK_ACTIONS.map(a => (
                  <button key={a.id} type="button" className="floating-chat-chip" onClick={() => send(a.label)} disabled={pending}>{a.label}</button>
                ))}
              </div>
              <div className="floating-chat-input-row">
                <textarea
                  ref={inputRef}
                  className="input-field"
                  rows={1}
                  placeholder={'Ask about your trip\u2026 (\u23ceCmd send, \u21e7\u23ce newline)'}
                  value={draft}
                  onChange={e => { setDraft(e.target.value); taResize(e.target); }}
                  onKeyDown={onKeyDown}
                  aria-label="Chat message"
                />
                <Button variant="primary" icon="fa-paper-plane" loading={pending} onClick={() => send()} aria-label="Send message" />
              </div>
            </div>
          )}
        </div>
      );
    }

    // CHAPTER SECTIONS DATA

    const CHAPTER_SECTIONS = {
      ch00: [
        { para: 1, title: 'The Sentence That Would Not Leave' },
        { para: 10, title: 'What This Book Really Is' },
        { para: 16, title: 'A Map, Not a Monument' },
        { para: 25, title: 'Imperfect Honesty, Offered Now' }
      ],
      ch01: [
        { para: 1, title: 'The Confused Boy in Kuwait' },
        { para: 12, title: 'Discipline and Defiance' },
        { para: 43, title: 'Character Under Pressure' },
        { para: 78, title: "Nadeem Bhai\u2019s Quiet Intervention" },
        { para: 85, title: 'Failure as Curriculum' },
        { para: 92, title: 'Learning Manhood from Women' },
        { para: 111, title: "Babu\u2019s Advice on Manhood" }
      ],
      ch02: [
        { para: 1, title: 'First Glimpses of Real Love' },
        { para: 10, title: 'Love as Control and Punishment' },
        { para: 74, title: 'Faith Weaponized, Religion Broken' },
        { para: 102, title: 'The Thaw Begins with Javeed Bhai' },
        { para: 138, title: 'Women Who Showed Me Tenderness' },
        { para: 174, title: 'Synthesis: What Love Actually Is' },
        { para: 188, title: "Babu\u2019s Advice on Love" }
      ],
      ch03: [
        { para: 1, title: 'Sex Before Understanding' },
        { para: 47, title: 'The Engagement That Broke Me' },
        { para: 63, title: 'A Marriage of Two Broken People' },
        { para: 76, title: "Ishrat\u2019s Arrival, Everything Changes" },
        { para: 101, title: "Babu\u2019s Advice on Marriage" }
      ]
    };

    // CHAPTER READER

    function ChapterReader({ chapter, onBack, onNavigateChapter, onProgress }) {
      const [content, setContent] = useState(null);
      const [loading, setLoading] = useState(true);
      const [scrollProgress, setScrollProgress] = useState(0);
      const [readerPrefs, setReaderPrefs] = useLocalStoragePrefs('reader', {
        fontScale: 1,
        fontFamily: 'lato',
        readingTheme: 'dark',
        lineSpacing: 1.85,
        contentWidth: 'medium'
      });
      const { fontScale, fontFamily, readingTheme, lineSpacing, contentWidth } = readerPrefs;
      const setPref = (k) => (u) => setReaderPrefs(p => ({
        ...p,
        [k]: typeof u === 'function' ? u(p[k]) : u
      }));
      const setFontScale    = setPref('fontScale');
      const setFontFamily   = setPref('fontFamily');
      const setReadingTheme = setPref('readingTheme');
      const setLineSpacing  = setPref('lineSpacing');
      const setContentWidth = setPref('contentWidth');
      const [controlsOpen, setControlsOpen] = useState(false);
      const [activeSection, setActiveSection] = useState(0);
      const [tocOpen, setTocOpen] = useState(true);
      const [bookmarks, setBookmarks] = useState(() => {
        try { return JSON.parse(localStorage.getItem('bm_' + chapter.id) || '[]'); } catch(e) { return []; }
      });
      const [showResume, setShowResume] = useState(false);
      const [currentParaIdx, setCurrentParaIdx] = useState(0);
      const [notesOpen, setNotesOpen] = useState(true);
      const [notes, setNotes] = useState([]);
      const [noteType, setNoteType] = useState('edit');
      const [noteText, setNoteText] = useState('');
      const [notesLoaded, setNotesLoaded] = useState(false);
      const sectionRefs = useRef({});
      const articleRef = useRef(null);

      const NOTE_TYPES = {
        edit:       { label: 'Edit',       icon: 'fa-pen',           color: '#c6a6ff' },
        reflection: { label: 'Reflection', icon: 'fa-lightbulb',     color: '#f4d49c' },
        research:   { label: 'Research',   icon: 'fa-magnifying-glass', color: '#34d399' },
        continuity: { label: 'Continuity', icon: 'fa-link',          color: '#ffb0cc' },
        voice:      { label: 'Voice',      icon: 'fa-microphone',    color: '#93c5fd' }
      };

      const FONT_MAP = {
        lato: "'Lato', 'Inter', sans-serif",
        inter: "'Inter', 'Lato', sans-serif",
        georgia: "'Georgia', 'Garamond', serif",
        dyslexic: "'OpenDyslexic', 'Comic Sans MS', sans-serif"
      };
      const FONT_LABELS = { lato: 'Lato', inter: 'Inter', georgia: 'Georgia', dyslexic: 'Dyslexic' };
      const SPACING_OPTS = [{ val: 1.6, label: 'Tight' }, { val: 1.75, label: 'Normal' }, { val: 1.85, label: 'Relaxed' }, { val: 2.1, label: 'Airy' }];
      const WIDTH_OPTS = [{ val: 'narrow', label: 'Narrow', icon: 'fa-compress' }, { val: 'medium', label: 'Medium', icon: 'fa-grip-lines' }, { val: 'wide', label: 'Wide', icon: 'fa-expand' }];

      const chapterIndex = CHAPTERS.findIndex(c => c.id === chapter.id);
      const prevChapter = chapterIndex > 0 ? CHAPTERS[chapterIndex - 1] : null;
      const nextChapter = chapterIndex < CHAPTERS.length - 1 ? CHAPTERS[chapterIndex + 1] : null;
      const sections = CHAPTER_SECTIONS[chapter.id] || [];

      useEffect(() => {
        if (!chapter.file) { setLoading(false); return; }
        setLoading(true);
        fetch(chapter.file)
          .then(r => r.ok ? r.text() : Promise.reject('Not found'))
          .then(text => { setContent(text); setLoading(false); })
          .catch(() => { setContent(null); setLoading(false); });
      }, [chapter.id]);

      useEffect(() => {
        try { localStorage.setItem('bm_' + chapter.id, JSON.stringify(bookmarks)); } catch(e) {}
      }, [bookmarks, chapter.id]);

      useEffect(() => {
        if (contentWidth === 'wide') {
          setTocOpen(false);
          setNotesOpen(false);
        } else {
          setTocOpen(true);
          setNotesOpen(true);
        }
      }, [contentWidth]);

      useEffect(() => {
        const lsKey = 'notes_' + chapter.id;
        fetch('data/notes/' + chapter.id + '-notes.json')
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(data => { setNotes(Array.isArray(data) ? data : []); setNotesLoaded(true); })
          .catch(() => {
            try { setNotes(JSON.parse(localStorage.getItem(lsKey) || '[]')); } catch(e) { setNotes([]); }
            setNotesLoaded(true);
          });
      }, [chapter.id]);

      useEffect(() => {
        if (!notesLoaded) return;
        try { localStorage.setItem('notes_' + chapter.id, JSON.stringify(notes)); } catch(e) {}
      }, [notes, chapter.id, notesLoaded]);

      useEffect(() => {
        if (bookmarks.length > 0) setShowResume(true);
        const t = setTimeout(() => setShowResume(false), 8000);
        return () => clearTimeout(t);
      }, [chapter.id]);

      useEffect(() => {
        function handleScroll() {
          const scrollTop = window.scrollY;
          const docHeight = document.documentElement.scrollHeight - window.innerHeight;
          const pct = docHeight > 0 ? Math.min((scrollTop / docHeight) * 100, 100) : 0;
          setScrollProgress(pct);
          if (onProgress) onProgress(pct);

          let current = 0;
          for (let i = sections.length - 1; i >= 0; i--) {
            const el = sectionRefs.current['sec-' + i];
            if (el) {
              const rect = el.getBoundingClientRect();
              if (rect.top <= 180) { current = i; break; }
            }
          }
          setActiveSection(current);

          const paraEls = document.querySelectorAll('[id^="para-"]');
          let closestIdx = 0;
          let closestDist = Infinity;
          const viewCenter = window.innerHeight / 2;
          paraEls.forEach(el => {
            const rect = el.getBoundingClientRect();
            const dist = Math.abs(rect.top - viewCenter);
            if (dist < closestDist) {
              closestDist = dist;
              closestIdx = parseInt(el.id.replace('para-', ''), 10);
            }
          });
          setCurrentParaIdx(closestIdx);
        }
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, [onProgress, sections.length]);

      useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [chapter.id]);

      const paragraphs = content ? content.split('\n\n').filter(p => p.trim()) : [];
      const titleLine = paragraphs.length > 0 ? paragraphs[0] : chapter.subtitle;
      let bodyParagraphs = paragraphs.slice(1);

      if (bodyParagraphs.length > 1) {
        const merged = [];
        for (let i = 0; i < bodyParagraphs.length; i++) {
          const trimmed = bodyParagraphs[i].trim();
          if (trimmed.length < 20 && i < bodyParagraphs.length - 1 && !isAdviceHeading(trimmed)) {
            merged.push(trimmed + '\n\n' + bodyParagraphs[i + 1].trim());
            i++; // skip next
          } else {
            merged.push(trimmed);
          }
        }
        bodyParagraphs = merged;
      }

      const sectionAtPara = useMemo(() => {
        const map = {};
        sections.forEach((sec, idx) => { map[sec.para - 1] = idx; });
        return map;
      }, [sections]);

      const wordCount = content ? content.split(/\s+/).length : chapter.words;
      const readingMinutes = Math.max(1, Math.round(wordCount / 230));

      function isAdviceHeading(text) {
        return /^(Babu[''\u2019]s Advice|Dad[''\u2019]s Advice|What I Wish)/i.test(text.trim());
      }

      function toggleBookmark(paraIdx) {
        setBookmarks(prev => prev.includes(paraIdx) ? prev.filter(b => b !== paraIdx) : [...prev, paraIdx].sort((a,b) => a - b));
      }

      function bookmarkCurrentParagraph() {
        if (!bookmarks.includes(currentParaIdx)) {
          setBookmarks(prev => [...prev, currentParaIdx].sort((a,b) => a - b));
        }
      }

      function getParaPreview(idx) {
        if (!bodyParagraphs[idx]) return 'Para ' + (idx + 1);
        const text = bodyParagraphs[idx].trim().replace(/\n+/g, ' ');
        const words = text.split(/\s+/).slice(0, 5).join(' ');
        return words.length < text.length ? words + '…' : words;
      }

      function addNote() {
        if (!noteText.trim()) return;
        const note = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          type: noteType,
          text: noteText.trim(),
          paraIdx: currentParaIdx,
          paraPreview: getParaPreview(currentParaIdx),
          timestamp: new Date().toISOString(),
          chapter: chapter.id
        };
        setNotes(prev => [...prev, note]);
        setNoteText('');
      }

      function removeNote(noteId) {
        setNotes(prev => prev.filter(n => n.id !== noteId));
      }

      const notesAtPara = useMemo(() => {
        const map = {};
        notes.forEach(n => {
          if (!map[n.paraIdx]) map[n.paraIdx] = [];
          map[n.paraIdx].push(n);
        });
        return map;
      }, [notes]);

      function scrollToSection(idx) {
        const el = sectionRefs.current['sec-' + idx];
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      function scrollToBookmark(paraIdx) {
        const el = document.getElementById('para-' + paraIdx);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setShowResume(false);
      }

      return (
        <div className="chapter-reader-wrap" data-content-width={contentWidth}>
          {!loading && content && sections.length > 0 && (
            <aside className={`toc-sidebar ${tocOpen ? 'open' : 'collapsed'}`}>
              <button className="toc-toggle" onClick={() => setTocOpen(o => !o)} title={tocOpen ? 'Collapse TOC' : 'Expand TOC'} aria-label={tocOpen ? 'Collapse table of contents' : 'Expand table of contents'} aria-expanded={tocOpen}>
                <Icon name={tocOpen ? 'fa-angles-left' : 'fa-list'} size="0.75em" />
              </button>
              {tocOpen && (
                <div className="toc-content">
                  <div className="toc-header">
                    <Icon name="fa-bars-staggered" size="0.75em" />
                    <span>Sections</span>
                  </div>
                  <nav className="toc-nav">
                    {sections.map((sec, idx) => (
                      <button key={idx} className={`toc-item ${activeSection === idx ? 'active' : ''}`} onClick={() => scrollToSection(idx)}>
                        <span className="toc-marker"></span>
                        <span className="toc-item-text">{sec.title}</span>
                      </button>
                    ))}
                  </nav>
                  <div className="toc-divider"></div>
                  <button className="toc-bookmark-action" onClick={bookmarkCurrentParagraph} title="Bookmark the paragraph currently in view">
                    <Icon name="fa-bookmark" size="0.7em" /> <span>Bookmark Here</span>
                  </button>
                  {bookmarks.length > 0 && (
                    <div className="toc-bookmarks">
                      <div className="toc-header" style={{ marginTop: '0.6rem' }}>
                        <Icon name="fa-bookmark" size="0.65em" /> <span>Bookmarks ({bookmarks.length})</span>
                      </div>
                      {bookmarks.map(bIdx => (
                        <div key={bIdx} className="toc-bookmark-row">
                          <button className="toc-bookmark-item" onClick={() => scrollToBookmark(bIdx)}><span className="toc-bm-preview">{getParaPreview(bIdx)}</span></button>
                          <button className="toc-bookmark-remove" onClick={() => toggleBookmark(bIdx)} title="Remove bookmark" aria-label="Remove bookmark"><Icon name="fa-xmark" size="0.55em" /></button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </aside>
          )}

          {!loading && content && (
            <aside className={`notes-sidebar ${notesOpen ? 'open' : 'collapsed'}`}>
              <button className="notes-toggle" onClick={() => setNotesOpen(o => !o)} title={notesOpen ? 'Collapse Notes' : 'Expand Notes'} aria-label={notesOpen ? 'Collapse notes panel' : 'Expand notes panel'} aria-expanded={notesOpen}>
                <Icon name={notesOpen ? 'fa-angles-right' : 'fa-sticky-note'} size="0.75em" />
              </button>
              {notesOpen && (
                <div className="notes-content">
                  <div className="notes-panel-header">
                    <Icon name="fa-sticky-note" size="0.75em" />
                    <span>Chapter Notes</span>
                    <span className="notes-count">{notes.length}</span>
                  </div>

                  <div className="note-composer">
                    <div className="note-type-row">
                      {Object.entries(NOTE_TYPES).map(([key, t]) => (
                        <button key={key} type="button" className={`note-type-chip ${noteType === key ? 'active' : ''}`}
                          onClick={() => setNoteType(key)}
                          style={noteType === key ? { borderColor: t.color, background: t.color + '18' } : {}}
                          title={t.label} aria-label={`Set note type to ${t.label}`} aria-pressed={noteType === key}>
                          <Icon name={t.icon} size="0.65em" />
                          <span className="note-type-label">{t.label}</span>
                        </button>
                      ))}
                    </div>
                    <div className="note-anchor-hint">
                      <Icon name="fa-map-pin" size="0.6em" />
                      <span>Anchored to: {getParaPreview(currentParaIdx)}</span>
                    </div>
                    <FormField label="Note text">
                      <textarea className="note-input" placeholder="Add a note about this passage..." value={noteText}
                        onChange={e => setNoteText(e.target.value)}
                        onKeyDown={e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) addNote(); }}
                        rows={4} aria-label="Note text" />
                    </FormField>
                    <button type="button" className="note-add-btn" onClick={addNote} disabled={!noteText.trim()} aria-label="Add note">
                      <Icon name="fa-plus" size="0.7em" /> Add Note
                    </button>
                  </div>

                  <div className="notes-list">
                    {notes.length === 0 && (
                      <div className="notes-empty">
                        <Icon name="fa-pen-fancy" size="1.2em" />
                        <p>No notes yet. Jot thoughts as you read — agents can use these for editing, continuity checks, and voice refinement.</p>
                      </div>
                    )}
                    {[...notes].reverse().map(note => {
                      const nt = NOTE_TYPES[note.type] || NOTE_TYPES.edit;
                      return (
                        <div key={note.id} className="note-card">
                          <div className="note-card-header">
                            <span className="note-card-type" style={{ color: nt.color }}><Icon name={nt.icon} size="0.6em" /> {nt.label}</span>
                            <button className="note-card-remove" onClick={() => removeNote(note.id)} title="Delete note" aria-label="Delete note"><Icon name="fa-xmark" size="0.6em" /></button>
                          </div>
                          <p className="note-card-text">{note.text}</p>
                          <button className="note-card-anchor" onClick={() => scrollToBookmark(note.paraIdx)}><Icon name="fa-map-pin" size="0.55em" /> {note.paraPreview}</button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </aside>
          )}

          {showResume && bookmarks.length > 0 && (
            <div className="resume-banner">
              <Icon name="fa-bookmark" size="0.85em" />
              <span>Continue where you left off?</span>
              <button className="resume-btn" onClick={() => scrollToBookmark(bookmarks[bookmarks.length - 1])}>Resume <Icon name="fa-arrow-right" size="0.7em" /></button>
              <button className="resume-dismiss" onClick={() => setShowResume(false)} aria-label="Dismiss resume banner"><Icon name="fa-xmark" size="0.75em" /></button>
            </div>
          )}

          <div className="chapter-reader-container" data-content-width={contentWidth}>
            <header className="chapter-reader-header">
              <div className="chapter-reader-num">Chapter {chapter.num}</div>
              <h1 className="chapter-reader-title">{chapter.title}</h1>
              <p className="chapter-reader-subtitle">{chapter.subtitle}</p>
              <div className="chapter-header-rule"></div>
            </header>

            <div className="rc-wrapper">
              <div className="rc-toolbar">
                <button className={`rc-toggle-btn ${controlsOpen ? 'active' : ''}`} onClick={() => setControlsOpen(o => !o)} title="Customize view">
                  <Icon name="fa-sliders" size="0.9em" />
                  <span className="rc-toggle-label">Customize View</span>
                  <svg className={`rc-chevron ${controlsOpen ? 'open' : ''}`} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div className="rc-quick-row">
                  <button className="rc-quick-btn" onClick={() => setFontScale(s => Math.max(0.8, +(s - 0.1).toFixed(1)))} title="Smaller text">A<span className="rc-small-minus">&minus;</span></button>
                  <span className="rc-quick-value">{Math.round(fontScale * 100)}%</span>
                  <button className="rc-quick-btn" onClick={() => setFontScale(s => Math.min(1.5, +(s + 0.1).toFixed(1)))} title="Larger text">A<span className="rc-small-plus">+</span></button>
                </div>
              </div>

              <div className={`rc-panel ${controlsOpen ? 'open' : ''}`}>
                <div className="rc-panel-inner">
                  <div className="rc-group">
                    <label className="rc-label">Font Size</label>
                    <div className="rc-size-row">
                      <button className="rc-circle-btn" onClick={() => setFontScale(s => Math.max(0.8, +(s - 0.1).toFixed(1)))}>
                        <span style={{ fontSize: '0.85em', fontWeight: 700 }}>&minus;</span>
                      </button>
                      <div className="rc-size-track">
                        <div className="rc-size-fill" style={{ width: ((fontScale - 0.8) / 0.7 * 100) + '%' }}></div>
                      </div>
                      <button className="rc-circle-btn" onClick={() => setFontScale(s => Math.min(1.5, +(s + 0.1).toFixed(1)))}>
                        <span style={{ fontSize: '0.85em', fontWeight: 700 }}>+</span>
                      </button>
                      <span className="rc-size-value">{Math.round(fontScale * 100)}%</span>
                    </div>
                  </div>

                  <div className="rc-group">
                    <label className="rc-label">Font</label>
                    <div className="rc-btn-row">
                      {Object.keys(FONT_MAP).map(f => (
                        <button key={f} className={`rc-pill ${fontFamily === f ? 'active' : ''}`} onClick={() => setFontFamily(f)}
                          style={{ fontFamily: FONT_MAP[f] }}>
                          {FONT_LABELS[f]}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="rc-group">
                    <label className="rc-label">Theme</label>
                    <div className="rc-btn-row">
                      <button className={`rc-theme-swatch dark ${readingTheme === 'dark' ? 'active' : ''}`} onClick={() => setReadingTheme('dark')}>
                        <span className="swatch-dot dark-dot"></span> Dark
                      </button>
                      <button className={`rc-theme-swatch sepia ${readingTheme === 'sepia' ? 'active' : ''}`} onClick={() => setReadingTheme('sepia')}>
                        <span className="swatch-dot sepia-dot"></span> Sepia
                      </button>
                      <button className={`rc-theme-swatch light ${readingTheme === 'light' ? 'active' : ''}`} onClick={() => setReadingTheme('light')}>
                        <span className="swatch-dot light-dot"></span> Light
                      </button>
                    </div>
                  </div>

                  <div className="rc-group">
                    <label className="rc-label">Line Spacing</label>
                    <div className="rc-btn-row">
                      {SPACING_OPTS.map(s => (
                        <button key={s.val} className={`rc-pill ${lineSpacing === s.val ? 'active' : ''}`} onClick={() => setLineSpacing(s.val)}>
                          {s.label}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="rc-group rc-group-full">
                    <label className="rc-label">Content Width</label>
                    <div className="rc-btn-row">
                      {WIDTH_OPTS.map(w => (
                        <button key={w.val} className={`rc-pill ${contentWidth === w.val ? 'active' : ''}`} onClick={() => setContentWidth(w.val)}>
                          <Icon name={w.icon} size="0.8em" /> {w.label}
                        </button>
                      ))}
                    </div>
                  </div>

                </div>
              </div>
            </div>

            <article ref={articleRef} className="chapter-reader-body" data-reading-theme={readingTheme} style={{ fontSize: (1.2 * fontScale) + 'rem', fontFamily: FONT_MAP[fontFamily], lineHeight: lineSpacing }}>
              {loading && (
                <div className="chapter-loading">
                  <div className="chapter-loading-pulse"></div>
                  <p>Loading chapter...</p>
                </div>
              )}

              {!loading && !content && (
                <div className="chapter-empty">
                  <Icon name="fa-pen-fancy" size="2em" />
                  <h3>Chapter Not Yet Written</h3>
                  <p>This chapter is planned but hasn't been drafted yet. Check back soon.</p>
                </div>
              )}

              {!loading && content && bodyParagraphs.map((para, i) => {
                const trimmed = para.trim();
                const secIdx = sectionAtPara[i];
                const hasSectionBreak = secIdx !== undefined;
                const isBookmarked = bookmarks.includes(i);

                const sectionDivider = hasSectionBreak && secIdx > 0 ? (
                  <div className="section-divider" key={'sd-' + i} id={'section-' + secIdx} ref={el => sectionRefs.current['sec-' + secIdx] = el}>
                    <div className="section-divider-line"></div>
                    <span className="section-divider-title">{sections[secIdx].title}</span>
                    <div className="section-divider-line"></div>
                  </div>
                ) : hasSectionBreak && secIdx === 0 ? (
                  <div key={'sd-0'} id="section-0" ref={el => sectionRefs.current['sec-0'] = el} style={{ position: 'absolute', top: 0 }}></div>
                ) : null;

                if (isAdviceHeading(trimmed)) {
                  return (
                    <React.Fragment key={i}>
                      {sectionDivider}
                      <div className="chapter-advice-break" id={'para-' + i}>
                        <div className="advice-rule"></div>
                        <h2 className="advice-heading">{trimmed}</h2>
                        <div className="advice-rule"></div>
                      </div>
                    </React.Fragment>
                  );
                }

                const isShort = trimmed.length < 120 && !trimmed.includes('.');
                const paraNotes = notesAtPara[i];
                const hasNotes = paraNotes && paraNotes.length > 0;
                return (
                  <React.Fragment key={i}>
                    {sectionDivider}
                    <div className={`para-wrap ${isBookmarked ? 'bookmarked' : ''} ${hasNotes ? 'has-notes' : ''}`} id={'para-' + i}>
                      <button
                        className={`bookmark-btn ${isBookmarked ? 'active' : ''}`}
                        onClick={() => toggleBookmark(i)}
                        title={isBookmarked ? 'Remove bookmark' : 'Bookmark this paragraph'}
                        aria-label={isBookmarked ? 'Remove bookmark' : 'Bookmark this paragraph'}
                        aria-pressed={isBookmarked}
                      >
                        <Icon name={isBookmarked ? 'fa-bookmark' : 'fa-bookmark'} size="0.7em" />
                      </button>
                      {hasNotes && (
                        <span className="para-note-indicator" title={paraNotes.length + ' note' + (paraNotes.length > 1 ? 's' : '')}>
                          <Icon name="fa-sticky-note" size="0.6em" />
                          {paraNotes.length > 1 && <span className="note-count-badge">{paraNotes.length}</span>}
                        </span>
                      )}
                      <p className={`chapter-paragraph ${isShort ? 'chapter-emphasis' : ''}`} style={{ animationDelay: `${Math.min(i * 30, 600)}ms` }}>
                        {trimmed}
                      </p>
                    </div>
                  </React.Fragment>
                );
              })}
            </article>

            <footer className="chapter-nav-footer">
              <div className="chapter-nav-row">
                {prevChapter && prevChapter.file ? (
                  <button className="chapter-nav-btn prev" onClick={() => onNavigateChapter(prevChapter)}>
                    <Icon name="fa-arrow-left" size="0.85em" />
                    <div className="chapter-nav-label">
                      <span className="nav-direction">Previous</span>
                      <span className="nav-chapter-title">Ch {prevChapter.num}: {prevChapter.title}</span>
                    </div>
                  </button>
                ) : <div></div>}

                <button className="chapter-nav-btn center" onClick={() => onBack('memoir')}>
                  <Icon name="fa-th-large" size="0.85em" /> All Chapters
                </button>

                {nextChapter && nextChapter.file ? (
                  <button className="chapter-nav-btn next" onClick={() => onNavigateChapter(nextChapter)}>
                    <div className="chapter-nav-label" style={{ textAlign: 'right' }}>
                      <span className="nav-direction">Next</span>
                      <span className="nav-chapter-title">Ch {nextChapter.num}: {nextChapter.title}</span>
                    </div>
                    <Icon name="fa-arrow-right" size="0.85em" />
                  </button>
                ) : <div></div>}
              </div>
            </footer>
          </div>
        </div>
      );
    }

    // SCROLL TO TOP BUTTON

    function ScrollToTop({ progress }) {
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const onScroll = () => setVisible(window.scrollY > 400);
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      const r = 21;
      const circ = 2 * Math.PI * r;
      const offset = circ - (circ * (progress || 0) / 100);
      const showRing = typeof progress === 'number' && progress > 0;
      return (
        <button className={`scroll-top-btn ${visible ? 'show' : ''}`} onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} aria-label="Scroll to top">
          {showRing && (
            <svg className="scroll-top-ring" width="52" height="52" viewBox="0 0 52 52">
              <circle className="ring-track" cx="26" cy="26" r={r} />
              <circle className="ring-fill" cx="26" cy="26" r={r} strokeDasharray={circ} strokeDashoffset={offset} transform="rotate(-90 26 26)" />
            </svg>
          )}
          <svg className="scroll-top-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="18 15 12 9 6 15" />
          </svg>
        </button>
      );
    }

    // MAIN APP

    function App() {
      const [page, setPage] = useState('home');
      const [trips, setTrips] = useState([]);
      const [activeChapter, setActiveChapter] = useState(null);
      const [readProgress, setReadProgress] = useState(0);
      const { trip: activeTrip, loading: activeTripLoading, error: activeTripError } = useActiveTrip();
      const { open: paletteOpen, setOpen: setPaletteOpen } = useCommandPalette();
      const toast = React.useContext(ToastContext);
      const commands = useMemo(() => {
        const copyDate = () => {
          const iso = todayISO();
          navigator.clipboard.writeText(iso).then(
            () => toast && toast.show(`Copied ${iso}`, 'success'),
            () => toast && toast.show('Copy failed', 'error')
          );
        };
        return [
          { id: 'open-chat',       label: 'Open chat',              icon: 'fa-comment-dots',     keywords: 'chat assistant trip qa', action: () => { setPage('trip'); window.dispatchEvent(new CustomEvent('floating-chat:focus')); } },
          { id: 'open-itinerary',  label: 'Open active itinerary',  icon: 'fa-map-location-dot', keywords: 'trip overview',          action: () => { setPage('trip'); } },
          { id: 'refresh-queues',  label: 'Refresh queues',         icon: 'fa-rotate',           keywords: 'queue refetch pending',  action: () => window.dispatchEvent(new CustomEvent('queue:refresh')) },
          { id: 'copy-date',       label: "Copy today's date",      icon: 'fa-calendar-day',     keywords: 'date dayone today',      action: copyDate }
        ];
      }, [toast]);

      useEffect(() => { loadTrips().then(setTrips); }, []);

      function openChapter(ch) {
        if (ch.file) {
          setActiveChapter(ch);
          setPage('chapter');
        }
      }

      function handleBackFromReader(target) {
        setActiveChapter(null);
        setPage(target || 'memoir');
      }

      return (
        <div>
          <nav className="nav" role="navigation" aria-label="Primary">
            <div className="nav-brand">Asif's Journal</div>
            <div className="nav-links">
              <button type="button" aria-current={page === 'home' ? 'page' : undefined} className={`nav-link ${page === 'home' ? 'active' : ''}`} onClick={() => { setPage('home'); setActiveChapter(null); }}><Icon name="fa-house" /> <span>Dashboard</span></button>
              <button type="button" aria-current={page === 'memoir' || page === 'chapter' ? 'page' : undefined} className={`nav-link ${page === 'memoir' || page === 'chapter' ? 'active' : ''}`} onClick={() => { setPage('memoir'); setActiveChapter(null); }}><Icon name="fa-book-open" /> <span>Memoir</span></button>
              <button type="button" aria-current={page === 'trip' ? 'page' : undefined} className={`nav-link ${page === 'trip' ? 'active' : ''}`} onClick={() => { setPage('trip'); setActiveChapter(null); }}><Icon name="fa-plane" /> <span>Trip</span></button>
              <button type="button" aria-current={page === 'dayone' ? 'page' : undefined} className={`nav-link ${page === 'dayone' ? 'active' : ''}`} onClick={() => { setPage('dayone'); setActiveChapter(null); }}><Icon name="fa-feather-pointed" /> <span>DayOne</span></button>
            </div>
          </nav>

          <main id="main-content" className="page">
            {page === 'home' && <HomePage trips={trips} onNavigate={setPage} />}
            {page === 'memoir' && <MemoirModule onOpenChapter={openChapter} />}
            {page === 'trip' && <TripModule trip={activeTrip} loading={activeTripLoading} error={activeTripError} />}
            {page === 'dayone' && <DayOneModule trips={trips} />}
            {page === 'chapter' && activeChapter && (
              <ChapterReader
                chapter={activeChapter}
                onBack={handleBackFromReader}
                onNavigateChapter={(ch) => { setActiveChapter(ch); }}
                onProgress={setReadProgress}
              />
            )}
            <ScrollToTop progress={page === 'chapter' ? readProgress : null} />
          </main>
          <CommandPalette open={paletteOpen} onClose={() => setPaletteOpen(false)} commands={commands} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ToastProvider><App /></ToastProvider>);
  </script>

  <!-- AI Voice Refine drawer (independent Babel script, isolated React root) -->
  <script type="text/babel" src="js/voice-refiner.jsx"></script>

</body>
</html>
