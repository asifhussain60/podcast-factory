    // Load trip data from manifest.json + per-trip entry files
    async function loadTrips() {
      const res = await fetch('data/manifest.json');
      const manifest = await res.json();
      const allTrips = [];

      if (manifest.active) {
        const trip = manifest.active;
        let entries = [];
        try {
          const r = await fetch(`data/entries/${trip.slug}.json`);
          if (r.ok) entries = await r.json();
        } catch (e) {}
        allTrips.push({ ...trip, entries });
      }

      for (const trip of (manifest.archive || [])) {
        let entries = [];
        try {
          const r = await fetch(`data/entries/${trip.slug}.json`);
          if (r.ok) entries = await r.json();
        } catch (e) {}
        allTrips.push({ ...trip, entries });
      }

      return allTrips;
    }

    function Button({ variant = 'primary', size = 'md', loading = false, disabled, icon, iconRight, children, className = '', type = 'button', ...rest }) {
      const cls = ['btn', `btn-${variant}`, `btn-size-${size}`, loading && 'is-loading', className].filter(Boolean).join(' ');
      return (
        <button type={type} className={cls} disabled={disabled || loading} aria-busy={loading || undefined} {...rest}>
          {loading && <Icon name="fa-circle-notch fa-spin" />}
          {!loading && icon && <Icon name={icon} />}
          {children != null && <span className="btn-label">{children}</span>}
          {!loading && iconRight && <Icon name={iconRight} />}
        </button>
      );
    }

    function IconButton({ icon, label, variant = 'ghost', size = 'md', className = '', ...rest }) {
      const cls = ['icon-btn', `icon-btn-${variant}`, `icon-btn-size-${size}`, className].filter(Boolean).join(' ');
      return (
        <button type="button" className={cls} aria-label={label} title={label} {...rest}>
          <Icon name={icon} />
        </button>
      );

    function Badge({ variant = 'neutral', size = 'md', icon, children, className = '', ...rest }) {

      return (

          {children}

    function Text({ as: Tag = 'p', variant = 'sans', size, weight, align, color, className = '', children, ...rest }) {

        'text',
        `text-${variant}`,
        size && `text-size-${size}`,
        weight && `text-weight-${weight}`,
        align && `text-align-${align}`,
        color && `text-color-${color}`,
        className
      ].filter(Boolean).join(' ');
      return <Tag className={cls} {...rest}>{children}</Tag>;
    }

    // DESIGN SYSTEM — FORM ATOMS + FormField

    function Input({ className = '', ...rest }) {
      return <input className={['input-field', className].filter(Boolean).join(' ')} {...rest} />;
    }

    function Textarea({ className = '', ...rest }) {
      return <textarea className={['input-field', className].filter(Boolean).join(' ')} {...rest} />;
    }

    function Select({ className = '', children, ...rest }) {
      return <select className={['input-field', className].filter(Boolean).join(' ')} {...rest}>{children}</select>;
    }

    function Checkbox({ label, className = '', id, ...rest }) {
      const autoId = React.useId();
      const checkboxId = id || autoId;
      return (
        <label htmlFor={checkboxId} className={['form-checkbox', className].filter(Boolean).join(' ')}>
          <input type="checkbox" id={checkboxId} {...rest} />
          {label && <span className="form-checkbox-label">{label}</span>}
        </label>
      );
    }

    function RadioGroup({ name, value, onChange, options = [], className = '', ariaLabel }) {
      return (
        <div role="radiogroup" aria-label={ariaLabel} className={['form-radio-group', className].filter(Boolean).join(' ')}>
          {options.map(opt => (
            <label key={opt.value} className="form-radio">
              <input
                type="radio"
                name={name}
                value={opt.value}
                checked={value === opt.value}
                onChange={e => onChange && onChange(e.target.value)}
              />
              <span className="form-radio-label">{opt.label}</span>
            </label>
          ))}
        </div>
      );
    }

    function FormField({ label, helper, error, required, children, className = '', ...rest }) {
      const autoId = React.useId();
      const helperId = helper ? `${autoId}-help` : null;
      const errorId = error ? `${autoId}-err` : null;
      const describedBy = [helperId, errorId].filter(Boolean).join(' ') || undefined;
      const child = React.Children.only(children);
      const input = React.cloneElement(child, {
        id: child.props.id || autoId,
        'aria-describedby': describedBy,
        'aria-invalid': error ? true : undefined,
        'aria-required': required || undefined,
        required: required || child.props.required
      });
      return (
        <div className={['form-field', error && 'has-error', className].filter(Boolean).join(' ')} {...rest}>
          {label && (
            <label htmlFor={child.props.id || autoId} className="form-field-label">
              {label}
              {required && <span className="form-field-required" aria-hidden="true"> *</span>}
            </label>
          )}
          {input}
          {helper && !error && <span id={helperId} className="form-field-helper">{helper}</span>}
          {error && <span id={errorId} className="form-field-error" role="alert">{error}</span>}
        </div>
      );
    }

    function StepProgress({ steps = [], current = 0, className = '' }) {
      return (
        <ol className={['step-progress', className].filter(Boolean).join(' ')} aria-label="Progress">
          {steps.map((step, i) => {

            return (

                <span className="step-progress-dot">

    // DESIGN SYSTEM — ORGANISMS

    const FOCUSABLE_SELECTOR = 'a[href], button:not([disabled]), textarea:not([disabled]), input:not([disabled]), select:not([disabled]), [tabindex]:not([tabindex="-1"])';

    function Modal({ title, onClose, size = 'md', children, className = '', ariaLabel }) {
      const containerRef = useRef(null);

      useEffect(() => {
        const previouslyFocused = document.activeElement;
        const container = containerRef.current;
        if (container) {
          const items = container.querySelectorAll(FOCUSABLE_SELECTOR);
          if (items.length) items[0].focus();
          else container.focus();
        }

        function onKeyDown(e) {
          if (e.key === 'Escape') {
            e.stopPropagation();
            onClose && onClose();
            return;
          }
          if (e.key !== 'Tab' || !container) return;
          const items = container.querySelectorAll(FOCUSABLE_SELECTOR);
          if (!items.length) return;
          const first = items[0];
          const last = items[items.length - 1];
          if (e.shiftKey && document.activeElement === first) {
            e.preventDefault();
            last.focus();
          } else if (!e.shiftKey && document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }

        document.addEventListener('keydown', onKeyDown);
        const prevOverflow = document.body.style.overflow;
        document.body.style.overflow = 'hidden';

        return () => {
          document.removeEventListener('keydown', onKeyDown);
          document.body.style.overflow = prevOverflow;
          if (previouslyFocused && typeof previouslyFocused.focus === 'function') {
            previouslyFocused.focus();
          }
        };
      }, [onClose]);

      function handleBackdrop(e) {
        if (e.target === e.currentTarget) onClose && onClose();
      }

      return ReactDOM.createPortal(
        <div className="modal-overlay" onClick={handleBackdrop} role="presentation">
          <div
            ref={containerRef}
            className={['modal', `modal-size-${size}`, className].filter(Boolean).join(' ')}
            role="dialog"
            aria-modal="true"
            aria-label={ariaLabel || title || 'Dialog'}
            tabIndex={-1}
          >
            {title && (
              <header className="modal-header">
                <h2 className="modal-title">{title}</h2>
                <IconButton icon="fa-xmark" label="Close dialog" onClick={onClose} />
              </header>
            )}
            <div className="modal-body">{children}</div>
          </div>
        </div>,
        document.body
      );
    }

    function ConfirmDialog({ title = 'Are you sure?', description, destructive = false, confirmLabel = 'Confirm', cancelLabel = 'Cancel', onConfirm, onCancel }) {
      return (
        <Modal title={title} onClose={onCancel} size="sm">
          {description && <p className="confirm-dialog-description">{description}</p>}

              variant={destructive ? 'destructive' : 'primary'}
              onClick={onConfirm}
              icon={destructive ? 'fa-triangle-exclamation' : undefined}
            >
              {confirmLabel}
            </Button>
          </div>
        </Modal>
      );
    }

    const ToastContext = React.createContext(null);

    const TOAST_ICONS = {
      success: 'fa-circle-check',
      error:   'fa-triangle-exclamation',
      warning: 'fa-triangle-exclamation',
      info:    'fa-circle-info'
    };

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);

      const show = useCallback((message, variant = 'info', duration = 3000) => {
        const id = Date.now() + Math.random();
        setToasts(prev => [...prev, { id, message, variant }]);
        if (duration > 0) {
          setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
        }
        return id;
      }, []);

      const dismiss = useCallback((id) => {
        setToasts(prev => prev.filter(t => t.id !== id));
      }, []);

      useEffect(() => {
        window.__appToast = { show, dismiss };
        return () => {
          if (window.__appToast && window.__appToast.show === show) {
            delete window.__appToast;
          }
        };
      }, [show, dismiss]);

      const value = useMemo(() => ({ show, dismiss }), [show, dismiss]);

      return (
        <ToastContext.Provider value={value}>
          {children}
          <div className="toast-container" role="region" aria-live="polite" aria-label="Notifications">
            {toasts.map(t => (
              <div key={t.id} className={`toast toast-${t.variant}`} role="status" onClick={() => dismiss(t.id)}>
                <Icon name={TOAST_ICONS[t.variant] || TOAST_ICONS.info} />
                <span className="toast-message">{t.message}</span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }

    function useToast() {
      const ctx = React.useContext(ToastContext);
      if (!ctx) throw new Error('useToast must be used within <ToastProvider>');
      return ctx;

    // DESIGN SYSTEM — STATE HOOKS

    function useFetch(url, options) {
      const [state, setState] = useState({ data: null, loading: true, error: null });
      const [tick, setTick] = useState(0);
      useEffect(() => {
        if (!url) { setState({ data: null, loading: false, error: null }); return; }
        let cancelled = false;
        setState(s => ({ ...s, loading: true, error: null }));
        fetch(url, options)
          .then(r => {
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const ct = r.headers.get('content-type') || '';
            return ct.includes('application/json') ? r.json() : r.text();
          })
          .then(data => { if (!cancelled) setState({ data, loading: false, error: null }); })
          .catch(error => { if (!cancelled) setState({ data: null, loading: false, error }); });
        return () => { cancelled = true; };
      }, [url, tick]);
      const refetch = useCallback(() => setTick(t => t + 1), []);
      return { ...state, refetch };
    }

    function useLocalStoragePrefs(key, defaults) {
      const [prefs, setPrefs] = useState(() => {
        try {
          const raw = localStorage.getItem(key);
          if (raw) return { ...defaults, ...JSON.parse(raw) };
        } catch (e) {}
        return defaults;
      });
      useEffect(() => {
        try { localStorage.setItem(key, JSON.stringify(prefs)); } catch (e) {}
      }, [key, prefs]);
      return [prefs, setPrefs];
    }

    function useActiveTrip() {
      const [state, setState] = useState({ trip: null, loading: true, error: null });
      useEffect(() => {
        let cancelled = false;
        fetch('data/manifest.json')
          .then(r => r.ok ? r.json() : Promise.reject(new Error(`HTTP ${r.status}`)))
          .then(manifest => {
            if (!cancelled) setState({ trip: manifest.active || null, loading: false, error: null });
          })
          .catch(() => {
            if (!cancelled) setState({ trip: null, loading: false, error: null });
          });
        return () => { cancelled = true; };
      }, []);
      return state;
    }

    // DESIGN SYSTEM — COMMAND PALETTE

    function CommandPalette({ open, onClose, commands = [] }) {
      const [query, setQuery] = useState('');
      const [activeIdx, setActiveIdx] = useState(0);
      const inputRef = useRef(null);
      const containerRef = useRef(null);

      const filtered = useMemo(() => {
        if (!query) return commands;
        const q = query.toLowerCase();
        return commands.filter(c => {
          const hay = `${c.label || ''} ${c.keywords || ''}`.toLowerCase();
          return hay.includes(q);
        });
      }, [query, commands]);

      useEffect(() => { setActiveIdx(0); }, [query]);

      useEffect(() => {
        if (open) {
          setQuery('');
          const t = setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 0);
          return () => clearTimeout(t);
        }
      }, [open]);

      useEffect(() => {
        if (!open) return;
        const previouslyFocused = document.activeElement;
        function onKey(e) {
          if (e.key === 'Escape') { e.stopPropagation(); onClose && onClose(); }
        }
        document.addEventListener('keydown', onKey);
        return () => {
          document.removeEventListener('keydown', onKey);
          if (previouslyFocused && typeof previouslyFocused.focus === 'function') {
            previouslyFocused.focus();
          }
        };
      }, [open, onClose]);

      function handleKeyDown(e) {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          setActiveIdx(i => Math.min(Math.max(filtered.length - 1, 0), i + 1));
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          setActiveIdx(i => Math.max(0, i - 1));
        } else if (e.key === 'Enter') {
          e.preventDefault();
          const cmd = filtered[activeIdx];
          if (cmd && cmd.action) { cmd.action(); onClose && onClose(); }
        } else if (e.key === 'Tab') {
          const focusables = containerRef.current ? containerRef.current.querySelectorAll(FOCUSABLE_SELECTOR) : [];
          if (focusables.length <= 1) { e.preventDefault(); }
        }
      }

      function handleBackdrop(e) {
        if (e.target === e.currentTarget) onClose && onClose();
      }

      if (!open) return null;

      return ReactDOM.createPortal(
        <div className="command-palette-overlay" onClick={handleBackdrop} role="presentation">
          <div
            ref={containerRef}
            className="command-palette"
            role="dialog"
            aria-modal="true"
            aria-label="Command palette"
          >
            <div className="command-palette-input-row">
              <label htmlFor="command-palette-search" className="visually-hidden">Command search</label>
              <Icon name="fa-magnifying-glass" />
              <input
                id="command-palette-search"
                ref={inputRef}
                className="command-palette-input"
                type="text"
                placeholder="Type a command..."
                value={query}
                onChange={e => setQuery(e.target.value)}
                onKeyDown={handleKeyDown}
                aria-label="Command search"
                aria-autocomplete="list"
                aria-controls="command-palette-list"
              />
              <kbd>Esc</kbd>
            </div>
            <div id="command-palette-list" className="command-palette-list" role="listbox">
              {filtered.length === 0 ? (
                <div className="command-palette-empty">
                  {commands.length === 0 ? 'No commands registered yet' : 'No matches'}
                </div>
              ) : filtered.map((cmd, i) => (
                <MenuItem
                  key={cmd.id || i}
                  icon={cmd.icon}
                  label={cmd.label}
                  shortcut={cmd.shortcut}
                  selected={i === activeIdx}
                  onMouseEnter={() => setActiveIdx(i)}
                  onClick={() => { cmd.action && cmd.action(); onClose && onClose(); }}
                />
              ))}
            </div>
          </div>
        </div>,
        document.body
      );
    }

    function useCommandPalette() {
      const [open, setOpen] = useState(false);
      useEffect(() => {
        function onKey(e) {
          if ((e.metaKey || e.ctrlKey) && e.key && e.key.toLowerCase() === 'k') {
            e.preventDefault();
            setOpen(prev => !prev);
          }
        }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);
      return { open, setOpen };
    }

    function ActiveTripHero({ trips, onNavigate }) {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const activeTrip = trips.find(trip => {
        const start = new Date(trip.dates.start + 'T00:00:00');
        const end = new Date(trip.dates.end + 'T23:59:59');
        return today >= start && today <= end;
      }) || trips.find(trip => {
        const start = new Date(trip.dates.start + 'T00:00:00');
        return start > today;
      });

      if (!activeTrip) return null;

      const start = new Date(activeTrip.dates.start + 'T00:00:00');
      const end = new Date(activeTrip.dates.end + 'T23:59:59');
      const isLive = today >= start && today <= end;
      const isBefore = today < start;
      const msPerDay = 86400000;
      const daysUntil = isBefore ? Math.ceil((start - today) / msPerDay) : 0;
      const currentDay = isLive ? Math.floor((today - start) / msPerDay) + 1 : 0;

      const openTrip = () => { onNavigate && onNavigate('trip'); };
      return (
        <div
          className="trip-hero stagger-2"
          role="button"
          tabIndex={0}
          aria-label={`Open Trip module for ${activeTrip.displayDate || 'the active trip'}`}
          onClick={openTrip}

              <button
                key={t.id}

                aria-selected={subTab === t.id}
                tabIndex={subTab === t.id ? 0 : -1}

                <Icon name={t.icon} /> {t.label}

          {subTab === 'overview' && <TripOverview trip={trip} />}
          {subTab === 'tools'    && <TripTools    trip={trip} />}

          {subTab === 'overview' && <FloatingChat trip={trip} />}

      );
    }

    function tripStatus(trip) {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const start = new Date(trip.dates.start + 'T00:00:00');
      const end = new Date(trip.dates.end + 'T23:59:59');
      const msPerDay = 86400000;
      if (today < start) {
        const days = Math.ceil((start - today) / msPerDay);
        return { status: 'upcoming', label: `T-${days} day${days === 1 ? '' : 's'}` };
      }
      if (today > end) return { status: 'complete', label: 'Trip complete' };
      const day = Math.floor((today - start) / msPerDay) + 1;
      return { status: 'active', label: `Day ${day} of ${trip.dates.days}` };
    }

    function FlightLine({ label, flight }) {
      if (!flight) return null;
      return (
        <div className="trip-flight-row">
          <Text as="span" variant="mono" size="sm" color="muted">{label}</Text>
          <Text as="span" weight="600">{flight.flight} &middot; {flight.route}</Text>
          <Text as="span" variant="mono" size="sm" color="muted">{flight.date} &middot; {flight.depart} \u2192 {flight.arrive}</Text>
        </div>
      );
    }

    function TripOverview({ trip }) {
      const { status, label } = useMemo(() => tripStatus(trip), [trip]);

      const travelers = Array.isArray(trip.travelers) ? trip.travelers : [];
      return (
        <div className="trip-overview" style={{ display: 'grid', gap: '1.5rem' }}>
          <Card variant="glass" style={{ padding: '2rem' }}>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '1rem', alignItems: 'baseline', justifyContent: 'space-between' }}>
              <div>
                <Text as="h2" variant="serif" size="xl" style={{ marginBottom: '0.25rem' }}>{trip.name}</Text>
                <Text variant="mono" size="sm" color="muted">
                  {trip.dates.start} \u2192 {trip.dates.end} &middot; {trip.dates.days} days
                </Text>
              </div>
              <StatusBadge status={status} label={label} />
            </div>
            {trip.occasion && <Text style={{ marginTop: '1rem' }}>{trip.occasion}</Text>}
            {trip.base && (
              <Text variant="mono" size="sm" color="muted" style={{ marginTop: '0.5rem' }}>
                <Icon name="fa-hotel" /> {trip.base}

            {travelers.length > 0 && (
              <div style={{ display: 'flex', gap: '0.5rem', marginTop: '1rem', flexWrap: 'wrap' }}>
                {travelers.map(t => <Badge key={t} variant="accent" icon="fa-user">{t}</Badge>)}
              </div>
            )}
          </Card>

          {trip.flights && (
            <Card variant="glass" style={{ padding: '1.75rem' }}>
              <Text as="h3" variant="serif" size="lg" style={{ marginBottom: '1rem' }}>Flights</Text>
              <div style={{ display: 'grid', gap: '0.75rem' }}>
                <FlightLine label="OUTBOUND" flight={trip.flights.inbound} />
                <FlightLine label="RETURN"   flight={trip.flights.outbound} />
              </div>
            </Card>
          )}

          {highlights.length > 0 && (
            <Card variant="glass" style={{ padding: '1.75rem' }}>
              <Text as="h3" variant="serif" size="lg" style={{ marginBottom: '1rem' }}>Highlights</Text>
              <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'grid', gap: '0.75rem' }}>
                {highlights.map((h, i) => (
                  <li key={i} style={{ display: 'flex', gap: '0.75rem', alignItems: 'baseline' }}>
                    <Text as="span" variant="mono" size="sm" color="muted" style={{ minWidth: '6.5rem' }}>{h.date}</Text>
                    <div>
                      <Text as="span" weight="600">{h.event}</Text>
                      {h.venue && <Text as="div" variant="mono" size="sm" color="muted">{h.venue}</Text>}
                    </div>
                  </li>
                ))}
              </ul>
            </Card>
          )}
        </div>
      );
    }
    function TripTools({ trip }) {
      return (
        <div style={{ display: 'grid', gap: '1.5rem', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))' }}>
          <TipHelper trip={trip} />
          <PackingList trip={trip} />
        </div>
      );
    }

    function TipHelper({ trip }) {
      const { data: currencyMap, error: currencyErr } = useFetch('http://localhost:3001/api/reference-data/currency');
      const { data: tippingMap, error: tippingErr } = useFetch('http://localhost:3001/api/reference-data/tipping');
      const [country, setCountry] = useState(trip?.country || '');
      const countries = currencyMap ? Object.keys(currencyMap).sort() : [];
      const tip = tippingMap ? tippingMap[country] : null;
      const currency = currencyMap ? currencyMap[country] : null;
      const error = currencyErr || tippingErr;
      return (
        <Card variant="glass" style={{ padding: '1.75rem' }}>
          <Text as="h3" variant="serif" size="lg" style={{ marginBottom: '1rem' }}>Tip helper</Text>
          {error && <Text color="muted" size="sm">Couldn\u2019t load tipping data ({String(error.message)}).</Text>}
          <FormField label="Country">
            <Select value={country} onChange={e => setCountry(e.target.value)} disabled={!countries.length}>
              <option value="">Choose a country\u2026</option>
              {countries.map(c => <option key={c} value={c}>{c}</option>)}
            </Select>
          </FormField>
          {tip && currency && (
            <div style={{ marginTop: '1rem', display: 'grid', gap: '0.6rem' }}>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: '0.75rem' }}>
                <Text as="span" variant="serif" size="xl">{tip.range}</Text>
                <Badge variant={tip.expected ? 'accent' : 'neutral'} icon={tip.expected ? 'fa-circle-check' : 'fa-circle-info'}>
                  {tip.expected ? 'Expected' : 'Optional'}
                </Badge>
              </div>
              <Text variant="mono" size="sm" color="muted">{currency.code} ({currency.symbol}) &middot; {currency.name}</Text>
              <Text size="sm">{tip.notes}</Text>
            </div>
          )}
          {country && !tip && currencyMap && tippingMap && (
            <Text color="muted" size="sm" style={{ marginTop: '0.75rem' }}>No tipping notes for {country}.</Text>
          )}
        </Card>
      );

    function PackingList({ trip }) {
      const slug = trip?.slug || 'default';
      const { data: packingData, error } = useFetch('http://localhost:3001/api/reference-data/packing');
      const [checked, setChecked] = useLocalStoragePrefs(`packing-${slug}`, {});
      const categories = (packingData && Array.isArray(packingData.categories)) ? packingData.categories : [];
      const allItems = useMemo(() => categories.flatMap(c => c.items), [categories]);
      const totalCount = allItems.length;
      const packedCount = allItems.filter(i => checked[i]).length;
      const toggle = (item) => setChecked(c => ({ ...c, [item]: !c[item] }));
      return (
        <Card variant="glass" style={{ padding: '1.75rem' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '1rem', gap: '1rem', flexWrap: 'wrap' }}>
            <Text as="h3" variant="serif" size="lg">Packing list</Text>
            <Text variant="mono" size="sm" color="muted">{packedCount} of {totalCount} packed</Text>
          </div>
          {error && <Text color="muted" size="sm">Couldn\u2019t load packing template ({String(error.message)}).</Text>}
          {!packingData && !error && <SkeletonRow variant="queue-row" count={3} />}
          {categories.map(cat => (
            <div key={cat.name} style={{ marginBottom: '1rem' }}>
              <Text as="h4" variant="mono" size="sm" color="muted" style={{ textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.5rem' }}>{cat.name}</Text>
              <div style={{ display: 'grid', gap: '0.35rem' }}>
                {cat.items.map(item => (
                  <Checkbox key={item} label={item} checked={!!checked[item]} onChange={() => toggle(item)} />

            </div>
          ))}

    }
    function QueuePanel({ trip }) {
      const [state, setState] = useState({ items: null, loading: true, error: null });
      const [tick, setTick] = useState(0);
      const [openId, setOpenId] = useState(null);
      useEffect(() => {
        let cancelled = false;
        setState(s => ({ ...s, loading: true }));
        fetch('http://localhost:3001/api/queue/pending')
          .then(r => r.ok ? r.json() : Promise.resolve({ ok: true, items: [] }))
          .then(body => { if (!cancelled) setState({ items: Array.isArray(body.items) ? body.items : [], loading: false, error: null }); })
          .catch(() => { if (!cancelled) setState({ items: [], loading: false, error: null }); });
        function onRefresh() { setTick(t => t + 1); }
        window.addEventListener('queue:refresh', onRefresh);
        return () => { cancelled = true; window.removeEventListener('queue:refresh', onRefresh); };
      }, [tick]);
      if (state.loading) return <SkeletonRow variant="queue-row" count={3} />;
      if (!state.items || state.items.length === 0) {
        return <EmptyState icon="fa-inbox" title="Queue is empty" description="Captured receipts and voice notes will appear here." />;
      }
      return (
        <div style={{ display: 'grid', gap: '0.75rem' }}>
          {state.items.map((it, i) => {
            const p = it.payload || {};
            const rowId = it.id || String(i);
            const isOpen = openId === rowId;
            const primary = p.merchant || it.title || (it.kind ? it.kind[0].toUpperCase() + it.kind.slice(1) : 'Pending item');
            const amountStr = p.amount != null ? `${p.currency || ''} ${Number(p.amount).toFixed(2)}`.trim() : null;
            return (
              <Card key={rowId} variant="glass" style={{ padding: '1rem' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', justifyContent: 'space-between', flexWrap: 'wrap' }}>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: '0.75rem', minWidth: 0 }}>
                    {it.memoryWorthy && <Icon name="fa-star" color="var(--accent, #f4d49c)" />}
                    <Text weight="600" style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{primary}</Text>
                    {amountStr && <Text variant="mono" size="sm" color="muted">{amountStr}</Text>}
                    {p.date && <Text variant="mono" size="sm" color="muted">{p.date}</Text>}
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                    <StatusBadge status={it.status || 'pending'} size="sm" />
                    <IconButton icon={isOpen ? 'fa-chevron-up' : 'fa-chevron-down'} label={isOpen ? 'Hide details' : 'Show details'} onClick={() => setOpenId(o => o === rowId ? null : rowId)} />
