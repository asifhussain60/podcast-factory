              title={copiedOnce
                ? 'Permanently delete all Reviewed entries for this trip'
                : 'Copy to DayOne first — this unlocks once the bundle is safely on your clipboard'}
              aria-label={deletingReviewed ? 'Deleting reviewed entries' : 'Delete reviewed entries'}
            >
              <Icon name={deletingReviewed ? 'fa-circle-notch fa-spin' : 'fa-trash-can'} />
              <span className="btn-label">{deletingReviewed ? ' Deleting…' : ' Delete Reviewed Entries'}</span>
            </button>
          )}
        </>
      );

      // Drag-and-drop handlers for the whole composer. dataTransfer.types
      // includes "Files" only when the user is dragging from outside the
      // page (e.g. Photos.app, Finder), so we don't accidentally hijack
      // the existing review-card drag-to-reorder which uses text/plain.
      const isFileDrag = (e) => {
        const types = e.dataTransfer?.types;
        if (!types) return false;
        // types is DOMStringList in some browsers; coerce to Array.
        return Array.from(types).includes('Files');
      };
      const onModuleDragEnter = (e) => {
        if (!isFileDrag(e)) return;
        dragDepthRef.current += 1;
        if (dropOver === null) setDropOver('photo');
      };
      const onModuleDragOver = (e) => {
        if (!isFileDrag(e)) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
      };
      const onModuleDragLeave = (e) => {
        if (!isFileDrag(e)) return;
        dragDepthRef.current = Math.max(0, dragDepthRef.current - 1);
        if (dragDepthRef.current === 0) setDropOver(null);
      };
      const onModuleDrop = async (e) => {
        if (!isFileDrag(e)) return;
        e.preventDefault();
        const intent = dropOver || 'photo';
        setDropOver(null);
        dragDepthRef.current = 0;
        const files = Array.from(e.dataTransfer?.files || []).filter(f => f.type && f.type.startsWith('image/'));
        if (!files.length) {
          window.notify?.warning?.('Drop ignored — no images in the drag', { description: 'Try dragging a photo from Photos.app or Finder.' });
          return;
        }
        if (intent === 'receipt') {
          // Receipts are single-shot; if multiple were dropped, take the
          // first and warn rather than silently fan out.
          if (files.length > 1) {
            window.notify?.info?.('Using first image', { description: `${files.length - 1} other image(s) ignored — Receipt is one at a time.` });
          }
          await captureReceipt(files[0]);
        } else {
          for (const f of files) {
            try { await capturePhoto(f, null); } catch { /* capturePhoto handles its own toast */ }
          }
        }
      };
      // Per-target hover handlers — let the user retarget mid-drag by
      // moving the cursor between the two zones in the overlay.
      const onZoneEnter = (kind) => () => setDropOver(kind);

      return (
        <div
          className={`log-module ${dropOver ? 'is-drop-active' : ''}`}
          onDragEnter={onModuleDragEnter}
          onDragOver={onModuleDragOver}
          onDragLeave={onModuleDragLeave}
          onDrop={onModuleDrop}
        >
          {dropOver && (
            <div className="log-drop-overlay" aria-hidden="true">
              <div className="log-drop-overlay-card">
                <div className="log-drop-overlay-title">Drop to add</div>
                <div className="log-drop-overlay-zones">
                  <div
                    className={`log-drop-zone ${dropOver === 'photo' ? 'is-target' : ''}`}
                    onDragEnter={onZoneEnter('photo')}
                  >
                    <Icon name="fa-camera" />
                    <span>Photo</span>
                  </div>
                  <div
                    className={`log-drop-zone ${dropOver === 'receipt' ? 'is-target' : ''}`}
                    onDragEnter={onZoneEnter('receipt')}
                  >
                    <Icon name="fa-receipt" />
                    <span>Receipt</span>
                  </div>
                </div>
                <div className="log-drop-overlay-hint">Tip — Cmd&nbsp;+&nbsp;V also pastes a copied image.</div>
              </div>
            </div>
          )}
          {/* Hidden file inputs used by the tab-row capture actions below. */}
          <input
            type="file"
            accept="image/*"
            capture="environment"
            ref={photoCameraRef}
            style={{ display: 'none' }}
            onChange={e => capturePhoto(e.target.files?.[0], photoCameraRef)}
          />
          <input
            type="file"
            accept="image/*"
            multiple
            ref={photoLibraryRef}
            style={{ display: 'none' }}
            onChange={async e => {
              const files = Array.from(e.target.files || []);
              if (!files.length) return;
              // Serialize uploads — pending.json is a read-modify-write queue
              // and the server's per-file mutex protects against concurrent
              // writers, but firing N parallel fetches still double-triggers
              // loadEntries and spams the classify queue. Sequential keeps
              // toasts + refreshes in lockstep with visible progress.
              for (const f of files) {
                try { await capturePhoto(f, null); }
                catch { /* capturePhoto handles its own toast */ }
              }
              if (photoLibraryRef.current) photoLibraryRef.current.value = '';
            }}
          />
          <input
            type="file"
            accept="image/*"
            ref={receiptInputRef}
            style={{ display: 'none' }}
            onChange={e => captureReceipt(e.target.files?.[0])}
          />

          {/* ── Log panel — bordered container: source filter + entry grid ── */}
          <section className="log-panel">
            <div className="log-panel-control">
              <div className="log-filter-bar">
                <div className="log-chip-row">
                  <span className="log-chip-row-label">Source</span>
                  {SOURCES.map(s => (
                    <button
                      key={s.id}
                      className={`log-chip ${sourceFilter === s.id ? 'active' : ''}`}
                      onClick={() => setSourceFilter(s.id)}
                      aria-label={s.label}
                      title={s.label}
                    >
                      {s.icon && <Icon name={s.icon} />}
                      <span className="btn-label">{s.icon ? ' ' : ''}{s.label}</span>
                    </button>
                  ))}
                  {tab === 'inbox' && reviewView === 'reviewed' && (
                    <label className="log-date-picker" title="Journal date for the DayOne entry">
                      <Icon name="fa-calendar-day" />
                      <span className="log-date-picker-label">Date</span>
                      <input
                        type="date"
                        className="log-date-picker-input"
                        value={compose.date || todayIso()}
                        onChange={e => setCompose(c => ({ ...c, date: e.target.value || todayIso() }))}
                        aria-label="Journal date"
                      />
                    </label>
                  )}
                  {/* Density toggle — both lanes (Compact / Comfortable / Detail) */}
                  {tab === 'inbox' && (
                    <div className="log-density-toggle" role="group" aria-label="Card density">
                      <span className="log-density-toggle-label">Density</span>
                      <div className="log-density-toggle-group">
                        {[
                          { id: 'compact',     label: 'Compact',     icon: 'fa-grip' },
                          { id: 'comfortable', label: 'Comfortable', icon: 'fa-table-cells-large' },
                          { id: 'detail',      label: 'Detail',      icon: 'fa-rectangle-list' },
                        ].map(m => (
                          <button
                            key={m.id}
                            type="button"
                            className="log-density-btn"
                            aria-pressed={densityMode === m.id}
                            onClick={() => setDensityMode(m.id)}
                            title={`${m.label} density`}
                          >
                            <Icon name={m.icon} />
                            <span className="log-density-btn-label">{m.label}</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* Review frame — folder-tab strip + composer (Reviewed) or raw card list (Unreviewed).
                Capture-action buttons get injected via captureActionsNode — into the subtab-row
                in Unreviewed, into the composer header in Reviewed (never duplicated). */}
            <div className={`log-review-frame ${tab === 'inbox' ? 'has-tabs' : ''}`}>
              {tab === 'inbox' && (
                <div className="log-subtab-row">
                  <div className="log-subtab-bar" role="tablist" aria-label="Photo review">
                    <button
                      role="tab"
                      aria-selected={reviewView === 'unreviewed'}
                      className={`log-subtab ${reviewView === 'unreviewed' ? 'active' : ''}`}
                      onClick={() => setReviewView('unreviewed')}
                      aria-label="Log Bank"
                    >
                      <Icon name="fa-circle-half-stroke" />
                      <span className="btn-label"> Log Bank</span>
                      {reviewUnreviewedCount > 0 && <span className="log-subtab-badge">{reviewUnreviewedCount}</span>}
                    </button>
                    <button
                      role="tab"
                      aria-selected={reviewView === 'reviewed'}
                      className={`log-subtab ${reviewView === 'reviewed' ? 'active' : ''}`}
                      onClick={() => setReviewView('reviewed')}
                      aria-label="DayOne Workspace"
                    >
                      <Icon name="fa-circle-check" />
                      <span className="btn-label"> DayOne Workspace</span>
                      {reviewReviewedCount > 0 && <span className="log-subtab-badge">{reviewReviewedCount}</span>}
                    </button>
                  </div>

                  <div className="log-subtab-right">
                    {reviewView === 'unreviewed' && captureActionsNode}
                    {(() => {
                      const activeCount = reviewView === 'reviewed' ? reviewReviewedCount : reviewUnreviewedCount;
                      const tabLabel = reviewView === 'reviewed' ? 'DayOne Workspace' : 'Log Bank';
                      return activeCount > 0 ? (
                        <button
                          className="log-subtab-reset-btn"
                          onClick={() => setResetOpen(true)}
                          disabled={resetting}
                          title={`Clear all entries from ${tabLabel}`}
                          aria-label={resetting ? 'Resetting…' : `Reset ${tabLabel}`}
                        >
                          <Icon name={resetting ? 'fa-circle-notch fa-spin' : 'fa-rotate-left'} />
                          <span className="btn-label"> Reset</span>
                        </button>
                      ) : null;
                    })()}
                  </div>
                </div>
              )}

              {tab === 'inbox' && reviewView === 'reviewed' ? (
                <DayOneComposer
                  tripSlug={tripSlug}
                  tripCtx={tripCtx}
                  reviewedRows={applyOrder(visible.filter(isReviewed))}
                  value={compose}
                  onChange={setCompose}
                  captureActions={captureActionsNode}
                  storyCards={reviewedCardsNode}
                  storyEmpty={emptyStoryNode}
                  actionsBar={reviewedActionsNode}
                  dayoneTags={dayoneTags}
                  onTagsChange={handleTagsChange}
                  tagCorpus={tagCorpus}
                  featureFlags={featureFlags}
                  refineState={refineState}
                  reflectionEdited={refineState.reflection.hashes.length > 0 && !reflectionIsAiClean}
                  aiSuggestedTags={aiSuggestedTags}
                  onRejectAiTag={handleRejectAiTag}
                  onRefineAll={handleRefineAll}
                  onReSynth={handleReSynth}
                />
              ) : (
                <div className={`log-entries log-entries--${densityMode}`}>
                {/* Inline note composer — opens when [+ Note] is clicked. */}
                {tab === 'inbox' && reviewView === 'unreviewed' && noteComposerOpen && (
                  <article className="review-card review-card--composer">
                    <div className="review-card-composer-label">
                      <Icon name="fa-note-sticky" /> New note
                    </div>
                    <textarea
                      autoFocus
                      className="review-card-composer-input"
                      value={noteText}
                      onChange={e => setNoteText(e.target.value)}
                      placeholder="Type a thought, a memory, a fragment… (⌘↵ to capture)"
                      rows={5}
                      onKeyDown={e => {
                        if (e.key === 'Escape') { setNoteComposerOpen(false); }
                        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
                          e.preventDefault();
                          captureNote().then(() => setNoteComposerOpen(false));
                        }
                      }}
                    />
                    <footer className="review-card-actions">
                      <button
                        className="log-action-btn log-action-btn--reject"
                        onClick={() => { setNoteText(''); setNoteComposerOpen(false); }}
                        disabled={capturing}
                        aria-label="Cancel"
                      >
                        <Icon name="fa-xmark" />
                        <span className="btn-label">Cancel</span>
                      </button>
                      <button
                        className="log-action-btn log-action-btn--approve"
                        onClick={async () => { await captureNote(); setNoteComposerOpen(false); }}
                        disabled={capturing || !noteText.trim()}
                        aria-label={capturing ? 'Capturing' : 'Capture'}
                      >
                        <Icon name={capturing ? 'fa-circle-notch fa-spin' : 'fa-arrow-up'} />
                        <span className="btn-label">{capturing ? 'Capturing…' : 'Capture'}</span>
                      </button>
                    </footer>
                  </article>
                )}

                {loading ? (
                  <div className="log-empty"><Icon name="fa-spinner" /> <p>Loading your log…</p></div>
                ) : displayEntries.length === 0 ? (
                  <div className="log-empty">
                    <Icon name="fa-inbox" />
                    <p>{
                      tab === 'inbox'
                        ? (reviewView === 'reviewed'
                            ? 'Nothing approved yet — review some from Log Bank to see them here.'
                            : 'Nothing needs attention — everything is up to date.')
                        : `No ${tab} items match these filters.`
                    }</p>
                  </div>
                ) : (
                  (reviewView === 'unreviewed'
                    ? groupEntriesForDensity(displayEntries)
                    : displayEntries.map(e => ({ type: 'entry', entry: e }))
                  ).map(item => {
                    if (item.type === 'date-header') {
                      return (
                        <div className="log-date-header" key={`d-${item.dateKey}`}>
                          <span>{item.label}</span>
                          <span className="log-date-meta">{item.dateKey}</span>
                        </div>
                      );
                    }
                    if (item.type === 'bucket-header') {
                      return (
                        <div className="log-bucket-header" key={`b-${item.key}`}>
                          <span className="log-bucket-label">{item.label}</span>
                          <span className="log-bucket-meta">{item.count} {item.count === 1 ? 'entry' : 'entries'}{item.range ? ` · ${item.range}` : ''}</span>
                          <span className="log-bucket-rule"></span>
                        </div>
                      );
                    }
                    // Phase 11b: every entry renders as a unified ReviewCard.
                    // Lane is per-entry by reviewStatus — approved entries
                    // get the 'reviewed' shape (Save instead of Approve,
                    // textarea pre-filled with draft.prose).
                    const entry = item.entry;
                    const lane = entry.reviewStatus === 'approved' ? 'reviewed' : 'unreviewed';
                    const isDummyEntry = typeof entry.id === 'string' && entry.id.startsWith('dummy_');
                    return (
                      <ReviewCard
                        key={entry.id}
                        entry={entry}
                        lane={lane}
                        draggable={lane === 'reviewed' && !isDummyEntry}
                        onReorder={handleReorder}
                        onApproveDraft={handleApproveDraft}
                        onSaveDraft={handleSaveDraft}
                        onReject={handleReject}
                        onKindFlipped={handleKindFlipped}
                      />
                    );
                  })
                )}
              </div>
              )}
            </div>
          </section>

          {/* ── Reject confirmation modal ── */}
          <ConfirmModal
            open={!!rejectTarget}
            title="Reject this entry?"
            message={rejectTarget ? "You're about to reject" : ""}
            targetLabel={rejectTarget ? entryPreview(rejectTarget) : null}
            confirmLabel="Reject"
            onCancel={() => setRejectTarget(null)}
            onConfirm={confirmReject}
          />

          {/* ── Reset confirmation modal ── */}
          {(() => {
            const lane = reviewView;
            const tabLabel = lane === 'reviewed' ? 'DayOne Workspace' : 'Log Bank';
            const laneEntries = lane === 'reviewed' ? entries.filter(isReviewed) : entries.filter(isUnreviewed);
            const activeCount = laneEntries.length;
            const photoCount = laneEntries.filter(e => e?.payload?.imagePath || e?.imagePath).length;
            return (
              <ConfirmModal
                open={resetOpen}
                title={`Reset ${tabLabel}?`}
                message={`This will permanently remove all ${activeCount} ${activeCount === 1 ? 'entry' : 'entries'}${photoCount ? ` (including ${photoCount} photo${photoCount === 1 ? '' : 's'} on disk)` : ''} from ${tabLabel}. This cannot be undone.`}
                confirmLabel="Reset forever"
                onCancel={() => setResetOpen(false)}
                onConfirm={confirmReset}
              />
            );
          })()}

          {/* ── Delete-all-reviewed confirmation modal ── */}
          {(() => {
            const reviewedRows = entries.filter(isReviewed);
            const reviewedCount = reviewedRows.length;
            const photoCount = reviewedRows.filter(e => e?.payload?.imagePath || e?.imagePath).length;
            return (
              <ConfirmModal
                open={deleteReviewedOpen}
                title={`Permanently delete ${reviewedCount} reviewed ${reviewedCount === 1 ? 'entry' : 'entries'}?`}
                message={photoCount
                  ? `${photoCount} photo${photoCount === 1 ? '' : 's'} will be removed from disk. This cannot be undone.`
                  : 'This cannot be undone.'}
                confirmLabel="Delete forever"
                onCancel={() => setDeleteReviewedOpen(false)}
                onConfirm={confirmDeleteReviewed}
              />
            );
          })()}
        </div>
      );
    }

    // =================================================================
    // MAIN APP
    // =================================================================

    const VALID_PAGES = ['home', 'memoir', 'dayone', 'log'];
    function pageFromHash() {
      const h = location.hash.replace('#', '');
      return VALID_PAGES.includes(h) ? h : 'home';
    }

    function App() {
      const [page, setPage] = useState(pageFromHash);
      const [trips, setTrips] = useState([]);
      const [activeChapter, setActiveChapter] = useState(null);
      const [readProgress, setReadProgress] = useState(0);


      useEffect(() => {
        console.log('[THEME] rose-mauve-night (single-theme build)');
        console.log('[NAV]', page);
        loadTrips().then(setTrips);
        function onPopState() {
          const target = pageFromHash();
          setPage(target);
          setActiveChapter(null);
        }
        window.addEventListener('popstate', onPopState);
        return () => window.removeEventListener('popstate', onPopState);
      }, []);

      useEffect(() => {
        console.log('[NAV]', page);
        const desired = page === 'home' ? '' : '#' + page;
        const current = location.hash || '';
        if (current !== desired) {
          history.replaceState(null, '', desired || location.pathname + location.search);
        }
        // Refresh the nav budget pill on every view change. BudgetPill
        // already listens for `budget:refresh` via its event-bus wiring,
        // so this one dispatch keeps its display in sync with whatever
        // the cowork server has spent since the last 30-s poll.
        window.dispatchEvent(new Event('budget:refresh'));
      }, [page]);

      function openChapter(ch) {
        if (ch.file) {
          setActiveChapter(ch);
          setPage('chapter');
        }
      }

      function handleBackFromReader(target) {
        setActiveChapter(null);
        setPage(target || 'memoir');
      }

      return (
        <div>
          <nav className="nav">
            <div className="nav-brand">Asif's Journal</div>
            <div className="nav-links">
              <button className={`nav-link ${page === 'home' ? 'active' : ''}`} onClick={() => { setPage('home'); setActiveChapter(null); }}><Icon name="fa-house" /> <span>Dashboard</span></button>
              <button className={`nav-link ${page === 'memoir' || page === 'chapter' ? 'active' : ''}`} onClick={() => { setPage('memoir'); setActiveChapter(null); }}><Icon name="fa-book-open" /> <span>Memoir</span></button>
              <button className={`nav-link ${page === 'dayone' ? 'active' : ''}`} onClick={() => { setPage('dayone'); setActiveChapter(null); }}><Icon name="fa-feather-pointed" /> <span>DayOne</span></button>
              <button className={`nav-link ${page === 'log' ? 'active' : ''}`} onClick={() => { setPage('log'); setActiveChapter(null); }}><Icon name="fa-layer-group" /> <span>Log</span></button>
              <div data-theme-switcher=""></div>
            </div>
          </nav>

          <main className="page">
            {page === 'home' && <HomePage trips={trips} onNavigate={setPage} />}
            {page === 'memoir' && <MemoirModule onOpenChapter={openChapter} />}
            {page === 'dayone' && <DayOneModule trips={trips} />}
            {page === 'log' && <LogModule />}
            {page === 'chapter' && activeChapter && (
              <ChapterReader
                chapter={activeChapter}
                onBack={handleBackFromReader}
                onNavigateChapter={(ch) => { setActiveChapter(ch); }}
                onProgress={setReadProgress}
              />
            )}
            <ScrollToTop progress={page === 'chapter' ? readProgress : null} />
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <div id="ai-drawer-root"></div>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
  <script src="js/theme-switcher.js"></script>
  <script src="js/claude-client.js"></script>
  <script type="text/babel" src="js/voice-refiner.jsx"></script>
  <script src="js/tweaker/tweaker-loader.js"></script>

</body>
</html>
