<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asif's Journal</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Great+Vibes&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Font Awesome 6.5.1 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F4D6;</text></svg>">

  <!-- Design System — Dark Rose Theme -->
  <link rel="stylesheet" href="css/app-dark.css">
</head>
<body>

  <div class="bg-mesh"></div>
  <div id="root"></div>

  <!-- Dependencies -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // =================================================================
    // DATA LAYER
    // =================================================================

    const MOODS = ['romantic', 'adventure', 'cultural', 'relaxed', 'celebration', 'bittersweet', 'anticipation', 'reflective', 'spiritual', 'playful'];

    const MOOD_COLORS = {
      romantic:     { bg: 'rgba(244,114,182,0.15)', text: '#BE185D', icon: 'fa-heart' },
      adventure:    { bg: 'rgba(16,185,129,0.15)',  text: '#047857', icon: 'fa-mountain-sun' },
      cultural:     { bg: 'rgba(245,158,11,0.15)',  text: '#B45309', icon: 'fa-landmark' },
      relaxed:      { bg: 'rgba(139,92,246,0.15)',  text: '#6D28D9', icon: 'fa-spa' },
      celebration:  { bg: 'rgba(230,160,60,0.15)',  text: '#B45309', icon: 'fa-champagne-glasses' },
      bittersweet:  { bg: 'rgba(107,90,122,0.15)',  text: '#4A3358', icon: 'fa-cloud-rain' },
      anticipation: { bg: 'rgba(200,120,100,0.15)', text: '#9A3412', icon: 'fa-clock' },
      reflective:   { bg: 'rgba(59,130,246,0.15)',  text: '#1D4ED8', icon: 'fa-pen-fancy' },
      spiritual:    { bg: 'rgba(120,160,140,0.15)', text: '#047857', icon: 'fa-moon' },
      playful:      { bg: 'rgba(210,100,140,0.15)', text: '#BE185D', icon: 'fa-face-smile-beam' },
    };

    const JOURNALS = ['Travel', 'Ishrat\u2019s Trips', 'Asif\u2019s Journal'];

    // Load trip data from manifest.json + per-trip entry files
    async function loadTrips() {
      const res = await fetch('data/manifest.json');
      const manifest = await res.json();
      const allTrips = [];

      if (manifest.active) {
        const trip = manifest.active;
        let entries = [];
        try {
          const r = await fetch(`data/entries/${trip.slug}.json`);
          if (r.ok) entries = await r.json();
        } catch (e) {}
        allTrips.push({ ...trip, entries });
      }

      for (const trip of (manifest.archive || [])) {
        let entries = [];
        try {
          const r = await fetch(`data/entries/${trip.slug}.json`);
          if (r.ok) entries = await r.json();
        } catch (e) {}
        allTrips.push({ ...trip, entries });
      }

      return allTrips;
    }

    const CHAPTERS = [
      { id: 'ch00', num: '00', title: 'Introduction', subtitle: 'What I Wish Babu Taught Me', status: 'locked', words: 1370, readiness: 100 },
      { id: 'ch01', num: '01', title: 'Man', subtitle: 'Babu, What Does It Mean to Be a Man?', status: 'locked', words: 4200, readiness: 100 },
      { id: 'ch02', num: '02', title: 'Love', subtitle: 'Babu, Tell Me What Love Really Is', status: 'locked', words: 9084, readiness: 100 },
      { id: 'ch03', num: '03', title: 'Marriage', subtitle: 'Babu, Tell Me What Marriage Really Is', status: 'active', words: 3200, readiness: 62 },
      { id: 'ch04', num: '04', title: 'Faith', subtitle: 'Babu, What Should I Believe?', status: 'planned', words: 0, readiness: 0 },
      { id: 'ch05', num: '05', title: 'Education', subtitle: 'Babu, How Do I Learn What Matters?', status: 'planned', words: 0, readiness: 0 },
      { id: 'ch06', num: '06', title: 'Parenthood', subtitle: 'Babu, How Do I Raise My Children?', status: 'planned', words: 0, readiness: 0 },
      { id: 'ch07', num: '07', title: 'Friendship', subtitle: 'Babu, Who Can I Trust?', status: 'planned', words: 0, readiness: 0 },
    ];

    const QUOTES_SAMPLE = [
      { text: 'The wound is the place where the Light enters you.', source: 'Rumi', chapter: '01' },
      { text: 'A man who has not passed through the inferno of his passions has never overcome them.', source: 'Carl Jung', chapter: '01' },
      { text: 'Love is not about possession. Love is about appreciation.', source: 'Osho', chapter: '02' },
      { text: 'The meeting of two personalities is like the contact of two chemical substances: if there is any reaction, both are transformed.', source: 'Carl Jung', chapter: '02' },
      { text: 'Perhaps all the dragons in our lives are princesses who are only waiting to see us act, just once, with beauty and courage.', source: 'Rainer Maria Rilke', chapter: '03' },
    ];

    const INCIDENTS_SAMPLE = [
      { title: 'The night Babu didn\'t come home', chapter: '01', status: 'PLACED' },
      { title: 'First fight after marriage \u2014 the silence that followed', chapter: '03', status: 'PLACED' },
      { title: 'Ishrat\'s first visit to Lahore \u2014 culture shock', chapter: '02', status: 'PLACED' },
      { title: 'The job offer that changed everything', chapter: '01', status: 'BANKED' },
      { title: 'Teaching my son to pray \u2014 and doubting my own faith', chapter: '04', status: 'BANKED' },
      { title: 'Babu\'s funeral \u2014 what I couldn\'t say', chapter: '01', status: 'NEEDS-QQ' },
      { title: 'The letter Amma never sent', chapter: '03', status: 'NEEDS-QQ' },
      { title: 'Standing in the rain outside the mosque at 3am', chapter: '04', status: 'BANKED' },
    ];

    // =================================================================
    // UTILITIES
    // =================================================================

    function Icon({ name, size = '1em', color = 'inherit' }) {
      return <i className={`fa-solid ${name}`} style={{ fontSize: size, color }}></i>;
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => showToast('Copied to DayOne clipboard'));
    }

    function formatDate(iso) {
      return new Date(iso + 'T12:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    // =================================================================
    // COMPONENTS
    // =================================================================

    // --- DayOne Code Preview ---
    function DayOnePreview({ entry, selectedJournal }) {
      const md = `# ${entry.location} \u2014 ${formatDate(entry.date)}\n\n**Mood:** ${entry.mood}\n**Journal:** ${selectedJournal || entry.journal}\n**Tags:** ${entry.tags.join(', ')}\n\n${entry.text}\n\n*[Refined with Voice DNA]*`;

      return (
        <div className="glass-card fade-enter stagger-2" style={{ padding: '2rem' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1.5rem', fontFamily: 'var(--font-mono)', fontSize: '0.8rem', color: 'var(--text-muted)', letterSpacing: '0.05em', textTransform: 'uppercase', fontWeight: 600 }}>
            <span><Icon name="fa-markdown" color="var(--accent)" /> Markdown Export</span>
          </div>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: '0.85rem', lineHeight: '1.7', color: 'var(--text-main)', whiteSpace: 'pre-wrap', marginBottom: '1.5rem' }}>
            {md}
          </div>
          <button className="btn btn-primary" style={{ width: '100%' }} onClick={() => copyToClipboard(md)}>
            <Icon name="fa-copy" /> Copy for DayOne
          </button>
        </div>
      );
    }

    // --- Active Trip Hero ---
    function ActiveTripHero({ trips, onNavigate }) {
      const today = new Date(); today.setHours(0, 0, 0, 0);

      // Find active (in-progress) or next upcoming trip
      const activeTrip = trips.find(trip => {
        const start = new Date(trip.dates.start + 'T00:00:00');
        const end = new Date(trip.dates.end + 'T23:59:59');
        return today >= start && today <= end;
      }) || trips.find(trip => {
        const start = new Date(trip.dates.start + 'T00:00:00');
        return start > today;
      });

      if (!activeTrip) return null;

      const start = new Date(activeTrip.dates.start + 'T00:00:00');
      const end = new Date(activeTrip.dates.end + 'T23:59:59');
      const isLive = today >= start && today <= end;
      const isBefore = today < start;
      const msPerDay = 86400000;
      const daysUntil = isBefore ? Math.ceil((start - today) / msPerDay) : 0;
      const currentDay = isLive ? Math.floor((today - start) / msPerDay) + 1 : 0;

      return (
        <div className="trip-hero stagger-2" onClick={() => window.location.href = activeTrip.itineraryPath || 'itineraries/2026-04-ishrat-engagement.html'}>
          
          <div className="hero-overline">Asif & Ishrat</div>
          <div className="hero-names">Asif & Ishrat</div>
          <div className="hero-pet-name">for my shatoot</div>
          
          <div className="hero-for">The Engagement Trip</div>
          <div className="hero-dates">April 20 — 28, 2026</div>

          <div className="hero-line"></div>

          <div className={`trip-hero-status ${isLive ? 'live' : 'upcoming'}`}>
            {isLive && <div className="pulse-dot"></div>}
            {isLive ? `LIVE NOW · DAY ${currentDay} OF ${activeTrip.dates.days}` : `UPCOMING · ${daysUntil} DAYS TO GO`}
          </div>

        </div>
      );
    }

    // --- Home Dashboard ---
    function HomePage({ trips, onNavigate }) {
      const totalWords = CHAPTERS.reduce((sum, ch) => sum + (ch.words || 0), 0);
      const chaptersLocked = CHAPTERS.filter(c => c.status === 'locked').length;
      const totalEntries = trips.reduce((sum, t) => sum + t.entries.length, 0);

      return (
        <div className="container fade-enter">
          <h1 className="page-title stagger-1" style={{ fontSize: '3.2rem', marginBottom: '2rem', textAlign: 'center' }}>Asif's Journal</h1>

          <ActiveTripHero trips={trips} onNavigate={onNavigate} />

          <div className="grid-cards stagger-3" style={{ gridTemplateColumns: 'repeat(auto-fit, minmax(400px, 1fr))' }}>
            <div className="glass-card module-card" onClick={() => onNavigate('memoir')}>
              <div className="module-icon"><Icon name="fa-book-open" /></div>
              <h3 className="module-title">Memoir</h3>
              <p className="module-description">"What I Wish Babu Taught Me" &mdash; Manage your chapters, incidents, and quotes.</p>
            </div>
            <div className="glass-card module-card" onClick={() => onNavigate('dayone')}>
              <div className="module-icon"><Icon name="fa-feather-pointed" /></div>
              <h3 className="module-title">DayOne Journal</h3>
              <p className="module-description">Draft daily logs, tag locations, and apply your Voice DNA before exporting to DayOne.</p>
            </div>
          </div>
        </div>
      );
    }

    // --- Memoir Module ---
    function MemoirModule() {
      const [tab, setTab] = useState('chapters');
      const [searchQuery, setSearchQuery] = useState('');

      const filteredQuotes = QUOTES_SAMPLE.filter(q =>
        q.text.toLowerCase().includes(searchQuery.toLowerCase()) ||
        q.source.toLowerCase().includes(searchQuery.toLowerCase())
      );

      return (
        <div className="container fade-enter">
          <h1 className="page-title">Memoir</h1>
          <p className="page-subtitle">"What I Wish Babu Taught Me" &mdash; Structure, memory banking, and voice refinement.</p>

          <div className="journal-tabs">
            <button className={`journal-tab ${tab === 'chapters' ? 'active' : ''}`} onClick={() => setTab('chapters')}><Icon name="fa-book" /> Chapters</button>
            <button className={`journal-tab ${tab === 'incidents' ? 'active' : ''}`} onClick={() => setTab('incidents')}><Icon name="fa-lightbulb" /> Incidents</button>
            <button className={`journal-tab ${tab === 'quotes' ? 'active' : ''}`} onClick={() => setTab('quotes')}><Icon name="fa-quote-left" /> Quotes</button>
          </div>

          {tab === 'chapters' && (
            <div className="grid-cards stagger-1">
              {CHAPTERS.map(ch => (
                <div key={ch.id} className="glass-card chapter-card">
                  <div>
                    <div className="chapter-header">
                      <span className="chapter-num">{ch.num}</span>
                      <span className={`badge badge-${ch.status}`}>{ch.status}</span>
                    </div>
                    <h3 className="chapter-title">{ch.title}</h3>
                    <p className="chapter-subtitle">{ch.subtitle}</p>
                  </div>
                  <div>
                    <div className="progress-track">
                      <div className={`progress-bar ${ch.status}`} style={{ width: `${ch.readiness}%` }}></div>
                    </div>
                    <div className="chapter-footer">
                      <span>{ch.words.toLocaleString()} words</span>
                      <span>{ch.readiness}% ready</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab === 'incidents' && (
            <div className="grid-cards stagger-1">
              {INCIDENTS_SAMPLE.map((inc, i) => (
                <div key={i} className="glass-card incident-card">
                  <h3 className="incident-title">{inc.title}</h3>
                  <div className="incident-meta">
                    <span style={{ fontFamily: 'var(--font-mono)', fontSize: '0.85rem', color: 'var(--text-muted)' }}>
                      <Icon name="fa-bookmark" /> Ch {inc.chapter}
                    </span>
                    <span className={`badge ${inc.status === 'PLACED' ? 'badge-locked' : inc.status === 'BANKED' ? 'badge-active' : 'badge-planned'}`}>
                      {inc.status}
                    </span>
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab === 'quotes' && (
            <div className="stagger-1">
              <input
                className="input-field"
                placeholder="Search quotes..."
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
                style={{ marginBottom: '1.5rem', maxWidth: '400px' }}
              />
              <div className="grid-cards">
                {filteredQuotes.map((q, i) => (
                  <div key={i} className="glass-card quote-card">
                    <div className="quote-icon">&ldquo;</div>
                    <p className="quote-text">{q.text}</p>
                    <div className="quote-author">
                      <span>&mdash; {q.source}</span>
                      <span className="badge badge-active">Ch {q.chapter}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- DayOne Journal Module ---
    function DayOneModule({ trips }) {
      const [subTab, setSubTab] = useState('browser');
      const [selectedTrip, setSelectedTrip] = useState(null);
      const [selectedEntry, setSelectedEntry] = useState(null);

      // New Entry state
      const [newMood, setNewMood] = useState('romantic');
      const [newJournal, setNewJournal] = useState('Ishrat\u2019s Trips');
      const [newSummary, setNewSummary] = useState('');
      const [newText, setNewText] = useState('');

      // Entry detail / editor view
      if (selectedEntry) {
        return (
          <div className="container fade-enter">
            <button className="btn btn-secondary" onClick={() => setSelectedEntry(null)} style={{ marginBottom: '2rem' }}>
              <Icon name="fa-arrow-left" /> Back
            </button>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '2rem' }}>
              <DayOnePreview entry={selectedEntry} selectedJournal={selectedEntry.journal} />
              <div className="glass-card" style={{ padding: '2.5rem' }}>
                <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: '2rem', marginBottom: '0.5rem' }}>{selectedEntry.summary}</h2>
                <p style={{ fontFamily: 'var(--font-mono)', color: 'var(--text-muted)', marginBottom: '1.5rem', fontSize: '0.85rem' }}>
                  {selectedEntry.date} &middot; {selectedEntry.location} &middot; {selectedEntry.mood}
                </p>
                <textarea className="input-field" defaultValue={selectedEntry.text} />
                <button className="btn btn-primary" style={{ marginTop: '1.5rem', width: '100%' }}>
                  <Icon name="fa-wand-magic-sparkles" /> Refine with Voice DNA
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="container fade-enter">
          <h1 className="page-title">DayOne Journal</h1>
          <p className="page-subtitle">Browse trips, edit entries, and sync moments to DayOne.</p>

          <div className="journal-tabs">
            <button className={`journal-tab ${subTab === 'browser' ? 'active' : ''}`} onClick={() => { setSubTab('browser'); setSelectedTrip(null); }}>
              <Icon name="fa-map-location-dot" /> Trips
            </button>
            <button className={`journal-tab ${subTab === 'editor' ? 'active' : ''}`} onClick={() => setSubTab('editor')}>
              <Icon name="fa-pen" /> Edit Entry
            </button>
            <button className={`journal-tab ${subTab === 'new' ? 'active' : ''}`} onClick={() => setSubTab('new')}>
              <Icon name="fa-plus" /> New Entry
            </button>
          </div>

          {/* --- Browser: Trip List --- */}
          {subTab === 'browser' && !selectedTrip && (
            <div className="grid-cards stagger-1">
              {trips.map(trip => (
                <div key={trip.id} className="glass-card module-card" onClick={() => setSelectedTrip(trip)}>
                  <div className="module-icon" style={{ background: 'linear-gradient(135deg, rgba(244,114,182,0.2), rgba(139,92,246,0.2))' }}>
                    <Icon name="fa-plane-departure" />
                  </div>
                  <h2 className="module-title" style={{ fontSize: '1.8rem' }}>{trip.location}</h2>
                  <p className="module-description">{trip.displayDate} &middot; {trip.country} &middot; {trip.entries.length} entries</p>
                  <div style={{ display: 'flex', gap: '0.5rem', marginTop: '1rem', flexWrap: 'wrap' }}>
                    {trip.tags.map(tag => <span key={tag} className="badge badge-active">{tag}</span>)}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* --- Browser: Trip Entries --- */}
          {subTab === 'browser' && selectedTrip && (
            <div>
              <button className="btn btn-secondary" onClick={() => setSelectedTrip(null)} style={{ marginBottom: '1.5rem' }}>
                <Icon name="fa-arrow-left" /> All Trips
              </button>
              <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: '2rem', marginBottom: '0.25rem' }}>{selectedTrip.location}</h2>
              <p style={{ fontFamily: 'var(--font-mono)', fontSize: '0.85rem', color: 'var(--text-muted)', marginBottom: '1.5rem' }}>
                {selectedTrip.displayDate} &middot; {selectedTrip.country} &middot; {selectedTrip.entries.length} entries
              </p>
              <div className="grid-cards stagger-1">
                {selectedTrip.entries.map((entry, idx) => {
                  const color = MOOD_COLORS[entry.mood] || MOOD_COLORS.reflective;
                  return (
                    <div key={entry.uuid} className="glass-card entry-card" onClick={() => setSelectedEntry(entry)} style={{ animationDelay: `${idx * 0.06}s` }}>
                      <div className="entry-header">
                        <span className="entry-date">Day {idx + 1} &middot; {entry.date}</span>
                        <span className="entry-mood" style={{ background: color.bg, color: color.text }}>
                          <Icon name={color.icon} /> {entry.mood}
                        </span>
                      </div>
                      <h3 className="entry-title">{entry.summary}</h3>
                      <p className="entry-preview">{entry.text}</p>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* --- Editor Tab --- */}
          {subTab === 'editor' && (
            <div className="stagger-1">
              <div className="glass-card" style={{ padding: '2rem', maxWidth: '600px' }}>
                <h3 style={{ fontFamily: 'var(--font-serif)', fontSize: '1.3rem', marginBottom: '1.5rem' }}>Select a trip and entry to edit</h3>
                <select className="input-field" style={{ marginBottom: '1rem' }} onChange={e => { const trip = trips.find(t => t.id === e.target.value); setSelectedTrip(trip || null); setSelectedEntry(null); }}>
                  <option value="">Choose trip...</option>
                  {trips.map(t => <option key={t.id} value={t.id}>{t.location} &mdash; {t.displayDate}</option>)}
                </select>
                {selectedTrip && (
                  <select className="input-field" onChange={e => { const entry = selectedTrip.entries.find(en => en.uuid === e.target.value); if (entry) setSelectedEntry(entry); }}>
                    <option value="">Choose entry...</option>
                    {selectedTrip.entries.map(en => <option key={en.uuid} value={en.uuid}>{en.date} &mdash; {en.summary}</option>)}
                  </select>
                )}
              </div>
            </div>
          )}

          {/* --- New Entry Tab --- */}
          {subTab === 'new' && (
            <div className="stagger-1">
              <div style={{ display: 'flex', flexDirection: 'column', gap: '2rem' }}>
                <DayOnePreview
                  entry={{
                    location: 'New Entry',
                    date: new Date().toISOString().split('T')[0],
                    mood: newMood,
                    text: newText || 'Your entry will appear here...',
                    tags: [newMood, 'ishrat'],
                    journal: newJournal,
                  }}
                  selectedJournal={newJournal}
                />

                <div className="glass-card" style={{ padding: '2.5rem' }}>
                  <h3 style={{ fontFamily: 'var(--font-serif)', fontSize: '1.5rem', marginBottom: '1.5rem' }}>New Entry</h3>

                  <label style={{ fontFamily: 'var(--font-mono)', fontSize: '0.8rem', color: 'var(--text-muted)', letterSpacing: '0.1em', textTransform: 'uppercase', display: 'block', marginBottom: '0.5rem' }}>Mood</label>
                  <div className="mood-chips" style={{ marginBottom: '1.5rem' }}>
                    {MOODS.map(mood => {
                      const color = MOOD_COLORS[mood] || MOOD_COLORS.reflective;
                      return (
                        <div key={mood} className={`mood-chip ${newMood === mood ? 'selected' : ''}`} onClick={() => setNewMood(mood)}
                          style={{ background: color.bg, borderColor: newMood === mood ? color.text : 'transparent' }}>
                          <Icon name={color.icon} size="0.9em" />
                          <span style={{ color: color.text }}>{mood}</span>
                        </div>
                      );
                    })}
                  </div>

                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', marginBottom: '1rem' }}>
                    <div>
                      <label style={{ fontFamily: 'var(--font-mono)', fontSize: '0.8rem', color: 'var(--text-muted)', letterSpacing: '0.1em', textTransform: 'uppercase', display: 'block', marginBottom: '0.5rem' }}>Journal</label>
                      <select className="input-field" value={newJournal} onChange={e => setNewJournal(e.target.value)}>
                        {JOURNALS.map(j => <option key={j} value={j}>{j}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={{ fontFamily: 'var(--font-mono)', fontSize: '0.8rem', color: 'var(--text-muted)', letterSpacing: '0.1em', textTransform: 'uppercase', display: 'block', marginBottom: '0.5rem' }}>Date</label>
                      <input className="input-field" type="date" defaultValue={new Date().toISOString().split('T')[0]} />
                    </div>
                  </div>

                  <label style={{ fontFamily: 'var(--font-mono)', fontSize: '0.8rem', color: 'var(--text-muted)', letterSpacing: '0.1em', textTransform: 'uppercase', display: 'block', marginBottom: '0.5rem' }}>Summary</label>
                  <input className="input-field" placeholder="One line that captures the moment" value={newSummary} onChange={e => setNewSummary(e.target.value)} style={{ marginBottom: '1rem' }} />

                  <label style={{ fontFamily: 'var(--font-mono)', fontSize: '0.8rem', color: 'var(--text-muted)', letterSpacing: '0.1em', textTransform: 'uppercase', display: 'block', marginBottom: '0.5rem' }}>Entry</label>
                  <textarea className="input-field" placeholder="Let the moment breathe on the page..." value={newText} onChange={e => setNewText(e.target.value)} />

                  <div style={{ display: 'flex', gap: '1rem', marginTop: '1.5rem' }}>
                    <button className="btn btn-primary"><Icon name="fa-wand-magic-sparkles" /> Refine with Voice DNA</button>
                    <button className="btn btn-secondary"><Icon name="fa-save" /> Save Draft</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // =================================================================
    // MAIN APP
    // =================================================================

    function App() {
      const [page, setPage] = useState('home');
      const [trips, setTrips] = useState([]);

      useEffect(() => { loadTrips().then(setTrips); }, []);

      return (
        <div>
          <nav className="nav">
            <div className="nav-brand">Asif's Journal</div>
            <div className="nav-links">
              <button className={`nav-link ${page === 'home' ? 'active' : ''}`} onClick={() => setPage('home')}><Icon name="fa-house" /> <span>Dashboard</span></button>
              <button className={`nav-link ${page === 'memoir' ? 'active' : ''}`} onClick={() => setPage('memoir')}><Icon name="fa-book-open" /> <span>Memoir</span></button>
              <button className={`nav-link ${page === 'dayone' ? 'active' : ''}`} onClick={() => setPage('dayone')}><Icon name="fa-feather-pointed" /> <span>DayOne</span></button>
            </div>
          </nav>

          <main className="page">
            {page === 'home' && <HomePage trips={trips} onNavigate={setPage} />}
            {page === 'memoir' && <MemoirModule />}
            {page === 'dayone' && <DayOneModule trips={trips} />}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
