                disabled={approving || refining}
                title="Approve and persist"
                aria-label={approving ? 'Approving' : 'Approve'}
              >
                <Icon name={approving ? 'fa-circle-notch fa-spin' : 'fa-check'} />
                <span className="btn-label">{approving ? 'Approving…' : 'Approve'}</span>
              </button>
            )}
          </footer>
        </article>
      );
    }

    // ─── TagInput — chip-based tag editor with typeahead + AI suggestions ───
    function TagInput({ value = [], onChange, corpus = [], aiSuggestions = [], rejectedAiTags = [], onRejectAi, disabled = false, inputId }) {
      const [draft, setDraft] = useState('');
      const [showDropdown, setShowDropdown] = useState(false);
      const [activeIdx, setActiveIdx] = useState(-1);
      const inputRef = useRef(null);
      const dropdownRef = useRef(null);
      const debounceRef = useRef(null);
      const chipRefs = useRef([]);
      // Stable per-instance IDs for ARIA combobox→listbox wiring
      const instanceId = useRef('ti-' + Math.random().toString(36).slice(2, 7)).current;
      const listboxId = instanceId + '-lb';
      const optionId = (i) => instanceId + '-opt-' + i;

      const normalizedSet = useMemo(() => new Set(value.map(t => window.normalizeTag(t))), [value]);

      const MAX_TAGS = 25;
      const WARN_TAGS = 15;
      const atLimit = value.length >= MAX_TAGS;

      // Typeahead: filter corpus by partial match, exclude already-added
      const suggestions = useMemo(() => {
        const q = window.normalizeTag(draft);
        if (!q || q.length < 2) return [];
        return corpus
          .filter(c => {
            const norm = window.normalizeTag(c.displayForm || '');
            return norm.includes(q) && !normalizedSet.has(norm);
          })
          .slice(0, 8);
      }, [draft, corpus, normalizedSet]);

      // AI suggestion chips: exclude already-in-value and rejectedAiTags
      const rejectedSet = useMemo(() => new Set((rejectedAiTags || []).map(t => window.normalizeTag(t))), [rejectedAiTags]);
      const visibleAiSuggestions = useMemo(() => {
        return (aiSuggestions || []).filter(t => {
          const n = window.normalizeTag(t);
          return n && !normalizedSet.has(n) && !rejectedSet.has(n);
        });
      }, [aiSuggestions, normalizedSet, rejectedSet]);

      // Show/hide dropdown based on input
      useEffect(() => {
        if (debounceRef.current) clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(() => {
          setShowDropdown(suggestions.length > 0 && draft.trim().length >= 2);
          setActiveIdx(-1);
        }, 150);
        return () => clearTimeout(debounceRef.current);
      }, [draft, suggestions.length]);

      function addTag(raw) {
        const n = window.normalizeTag(raw);
        if (!n || normalizedSet.has(n) || atLimit) return;
        onChange([...value, raw.trim()]);
        setDraft('');
        setShowDropdown(false);
      }

      function removeTag(idx) {
        const next = [...value];
        next.splice(idx, 1);
        onChange(next);
      }

      function rejectAi(tag) {
        if (onRejectAi) onRejectAi(tag);
      }

      function handleKeyDown(e) {
        if (e.isComposing) return; // macOS IME / autocomplete
        if (e.key === 'Enter' || e.keyCode === 13 || e.key === ',') {
          e.preventDefault();
          if (activeIdx >= 0 && activeIdx < suggestions.length) {
            addTag(suggestions[activeIdx].displayForm);
          } else if (draft.trim()) {
            if (draft.trim().length > 50) return; // block too-long
            addTag(draft);
          }
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          setActiveIdx(i => Math.min(i + 1, suggestions.length - 1));
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          setActiveIdx(i => Math.max(i - 1, -1));
        } else if (e.key === 'Escape') {
          setShowDropdown(false);
          setActiveIdx(-1);
          inputRef.current?.focus();
        } else if (e.key === 'ArrowLeft' && !draft && value.length) {
          // Move focus into chips from the left end of the input
          e.preventDefault();
          chipRefs.current[value.length - 1]?.focus();
        } else if (e.key === 'Backspace' && !draft && value.length) {
          removeTag(value.length - 1);
        }
      }

      // Keyboard nav while a chip ×-button is focused
      function handleChipKeyDown(e, idx) {
        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          if (idx > 0) chipRefs.current[idx - 1]?.focus();
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          if (idx < value.length - 1) chipRefs.current[idx + 1]?.focus();
          else inputRef.current?.focus();
        } else if (e.key === 'Backspace' || e.key === 'Delete') {
          e.preventDefault();
          removeTag(idx);
          // Focus prev chip or input after removal
          setTimeout(() => {
            if (idx > 0) chipRefs.current[idx - 1]?.focus();
            else inputRef.current?.focus();
          }, 0);
        } else if (e.key === 'Escape') {
          e.preventDefault();
          inputRef.current?.focus();
        }
      }

      // Close dropdown on outside click
      useEffect(() => {
        function handleClick(e) {
          if (dropdownRef.current && !dropdownRef.current.contains(e.target) &&
              inputRef.current && !inputRef.current.contains(e.target)) {
            setShowDropdown(false);
          }
        }
        document.addEventListener('mousedown', handleClick);
        return () => document.removeEventListener('mousedown', handleClick);
      }, []);

      const counterColor = value.length >= MAX_TAGS ? 'var(--error, #ef4444)' :
                            value.length >= WARN_TAGS ? 'var(--warning, #eab308)' : 'inherit';

      return (
        <div className="tag-input-wrap">
          <div className="tag-input-chips" onClick={() => inputRef.current?.focus()}>
            {value.map((tag, i) => (
              <span key={`${tag}-${i}`} className="tag-chip">
                <span className="tag-chip-label">{tag}</span>
                <button
                  type="button"
                  className="tag-chip-remove"
                  ref={el => { chipRefs.current[i] = el; }}
                  onClick={e => { e.stopPropagation(); removeTag(i); }}
                  onKeyDown={e => handleChipKeyDown(e, i)}
                  aria-label={`Remove tag ${tag}`}
                  disabled={disabled}
                >×</button>
              </span>
            ))}
            {!atLimit && (
              <input
                ref={inputRef}
                id={inputId}
                className="tag-input-field"
                type="text"
                role="combobox"
                aria-expanded={showDropdown}
                aria-autocomplete="list"
                aria-controls={listboxId}
                aria-activedescendant={showDropdown && activeIdx >= 0 ? optionId(activeIdx) : undefined}
                aria-label="Add tag"
                value={draft}
                onChange={e => setDraft(e.target.value)}
                onKeyDown={handleKeyDown}
                onFocus={() => { if (suggestions.length) setShowDropdown(true); }}
                placeholder={value.length === 0 ? 'Add a tag…' : ''}
                disabled={disabled || atLimit}
                autoComplete="off"
              />
            )}
          </div>

          {showDropdown && (
            <ul ref={dropdownRef} className="tag-typeahead" role="listbox" id={listboxId} aria-label="Tag suggestions">
              {suggestions.map((s, i) => (
                <li
                  key={s.displayForm}
                  id={optionId(i)}
                  role="option"
                  aria-selected={i === activeIdx}
                  className={`tag-typeahead-item ${i === activeIdx ? 'active' : ''}`}
                  onMouseDown={e => { e.preventDefault(); addTag(s.displayForm); }}
                >
                  <span className="tag-typeahead-label">{s.displayForm}</span>
                  <span className="tag-typeahead-count">{s.count}×</span>
                </li>
              ))}
            </ul>
          )}

          <div className="tag-input-footer">
            <span className="tag-counter" style={{ color: counterColor }}>
              {value.length} / {MAX_TAGS} tags
            </span>
          </div>

          {visibleAiSuggestions.length > 0 && (
            <details className="tag-ai-suggestions">
              <summary className="tag-ai-summary">
                <Icon name="fa-wand-magic-sparkles" /> {visibleAiSuggestions.length} AI suggestion{visibleAiSuggestions.length !== 1 ? 's' : ''}
              </summary>
              <div className="tag-ai-chips">
                {visibleAiSuggestions.map(tag => (
                  <span key={tag} className="tag-chip tag-chip--ai" title="AI-suggested tag">
                    <button
                      type="button"
                      className="tag-chip-add"
                      onClick={() => addTag(tag)}
                      aria-label={`Add AI tag ${tag}`}
                    >+ {tag}</button>
                    <button
                      type="button"
                      className="tag-chip-reject"
                      onClick={() => rejectAi(tag)}
                      aria-label={`Reject AI tag ${tag}`}
                      title="Don't suggest this again"
                    >×</button>
                  </span>
                ))}
              </div>
            </details>
          )}
        </div>
      );
    }

    // ─── Phase 11d: DayOne Composer
    // Single authoring surface for the Reviewed lane. The cards live INSIDE
    // the composer (Story); the composer owns Title / Context / Reflection,
    // derives Metadata read-only, and hosts the capture-action buttons
    // (top-right) + the Journal/Copy/Delete action bar (footer). User-typed
    // fields persist per trip in localStorage so the composer survives
    // reload and re-copies. Reflection was dropped — the refined prose on
    // the card stack already carries that emotional beat.
    // memo() prevents re-renders from unrelated LogModule state changes when
    // all props (especially callbacks) are stable (E2 state discipline).
    const DayOneComposer = memo(function DayOneComposer({
      tripSlug,
      tripCtx,
      reviewedRows,
      value,
      onChange,
      captureActions,
      storyCards,
      storyEmpty,
      actionsBar,
      dayoneTags,
      onTagsChange,
      tagCorpus,
      featureFlags,
      refineState = { reflection: { status: 'idle', hashes: [] }, tags: { status: 'idle' } },
      reflectionEdited = false,
      aiSuggestedTags = [],
      onRejectAiTag,
      onRefineAll,
      onReSynth,
    }) {
      const [reflectionRefining, setReflectionRefining] = useState(false);
      const refineAllBtnRef = useRef(null);

      // Return focus to Refine All button after a refine cycle completes (E1 a11y)
      useEffect(() => {
        const s = refineState.reflection.status;
        if (s === 'success' || s === 'failed') {
          refineAllBtnRef.current?.focus();
        }
      }, [refineState.reflection.status]);

      // Context auto-derivation — built when empty or the user resets it.
      const autoContext = useMemo(() => {
        if (!tripCtx) return '';
        const travelers = Array.isArray(tripCtx.travelers) ? tripCtx.travelers.join(' & ') : '';
        const dateRange = (() => {
          const s = tripCtx?.dates?.start;
          const e = tripCtx?.dates?.end;
          if (!s) return '';
          const fmt = (iso) => {
            const d = new Date(iso + 'T00:00:00');
            if (isNaN(d.getTime())) return iso;
            const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return `${MONTHS[d.getMonth()]} ${d.getDate()}`;
          };
          if (!e || e === s) return `${fmt(s)}, ${s.slice(0,4)}`;
          const year = s.slice(0, 4);
          return `${fmt(s)}–${fmt(e)}, ${year}`;
        })();
        const base = tripCtx?.base || '';
        return [travelers, dateRange, base].filter(Boolean).join(' · ');
      }, [tripCtx]);

      // Metadata pill — read-only summary line, rebuilt on any dependency change.
      const metadataLine = useMemo(() => {
        const parts = [];
        if (value.date && /^\d{4}-\d{2}-\d{2}$/.test(value.date)) {
          const d = new Date(value.date + 'T00:00:00');
          if (!isNaN(d.getTime())) {
            const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            parts.push(`${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`);
          }
        }
        const regions = Array.isArray(tripCtx?.regions) ? tripCtx.regions.filter(Boolean) : [];
        if (regions.length) parts.push(regions.slice(0, 3).join(' · '));
        if (value.weather?.label) {
          const w = value.weather;
          parts.push(w.tempF != null ? `${w.label} · ${w.tempF}°F` : w.label);
        }
        if (tripCtx?.vibe) parts.push(tripCtx.vibe);
        const kinds = Array.from(new Set((reviewedRows || []).map(r => r.kind).filter(Boolean)));
        if (kinds.length) parts.push(kinds.map(k => `#${k}`).join(' '));
        return parts.join('  •  ');
      }, [tripCtx, reviewedRows, value.date, value.weather]);

      // Seed Context with the auto-derived line the first time we see the
      // trip (user can overwrite freely; once dirty we never clobber it).
      useEffect(() => {
        if (!autoContext) return;
        if (value.context && value.context.trim()) return;
        onChange({ ...value, context: autoContext });
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [autoContext]);

      function update(patch) { onChange({ ...value, ...patch }); }

      // AI-powered reflection: sends approved entry prose + optional user draft
      // to /api/refine-reflection which uses the voice DNA fingerprint.
      // Blank textarea → AI generates from entries. Has text → AI enhances it.
      async function refineReflection() {
        if (reflectionRefining) return;
        const rows = reviewedRows || [];
        if (!rows.length) {
          window.notify?.info?.('Nothing to refine', { description: 'Approve a few entries first.' });
          return;
        }
        // Gather prose from all approved entries
        const entries = rows
          .map(row => row?.draft?.prose || row?.payload?.text || '')
          .filter(Boolean);
        if (!entries.length) {
          window.notify?.info?.('No prose found', { description: 'Entries need refined text first.' });
          return;
        }
        setReflectionRefining(true);
        try {
          const body = {
            entries,
            title: value.title || '',
            context: value.context || '',
            date: value.date || '',
          };
          const currentDraft = (value.reflection || '').trim();
          if (currentDraft) body.draft = currentDraft;

          const d = await window.BabuAI.request('/api/refine-reflection', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
            timeoutMs: 60000,
          });
          if (d?.refined) {
            update({ reflection: d.refined });
            window.notify?.success?.(currentDraft ? 'Reflection enhanced' : 'Reflection generated');
          }
        } catch (err) {
          window.notify?.error?.('Reflection refine failed', { description: err.message || String(err) });
        } finally {
          setReflectionRefining(false);
        }
      }

      const hasAny = !!(value.title?.trim() || (value.reflection || '').trim() || dayoneTags.length > 0);
      const storyCount = (reviewedRows || []).length;

      return (
        <section className="dayone-composer" aria-label="DayOne entry composer">
          <header className="dayone-composer-head">
            <div className="dayone-composer-head-text">
              <span className="dayone-composer-eyebrow"><Icon name="fa-feather-pointed" /> Compose your DayOne entry</span>
              <span className="dayone-composer-hint">
                {storyCount > 0
                  ? `${storyCount} ${storyCount === 1 ? 'entry below becomes' : 'entries below become'} the Story.`
                  : 'Capture something below — it becomes your Story.'}
              </span>
            </div>
            <div className="dayone-composer-head-actions">
              {captureActions}
            </div>
          </header>

          <div className="dayone-title-context">
            <div className="dayone-field dayone-field--title">
              <div className="dayone-field-label-row">
                <label htmlFor="dayone-title" className="dayone-field-label">Title</label>
                <span className="dayone-field-meta">{(value.title || '').length}/90</span>
              </div>
              <input
                id="dayone-title"
                className="dayone-hero-input"
                type="text"
                maxLength={90}
                value={value.title || ''}
                onChange={e => update({ title: e.target.value })}
                placeholder="A short, specific line — the soul of the entry"
              />
            </div>

            <div className="dayone-field dayone-field--context">
              <div className="dayone-field-label-row">
                <label htmlFor="dayone-context" className="dayone-field-label">Context</label>
                {autoContext && value.context !== autoContext && (
                  <button
                    type="button"
                    className="dayone-field-restore"
                    onClick={() => update({ context: autoContext })}
                    title="Restore auto-derived context"
                    aria-label="Restore auto-derived context"
                  >
                    <Icon name="fa-wand-magic-sparkles" /> Use trip
                  </button>
                )}
              </div>
              <input
                id="dayone-context"
                className="dayone-hero-input"
                type="text"
                value={value.context || ''}
                onChange={e => update({ context: e.target.value })}
                placeholder="Where, when, who"
              />
            </div>
          </div>

          <div className="dayone-field dayone-field--reflection">
            <div className="dayone-field-label-row">
              <label htmlFor="dayone-reflection" className="dayone-field-label">Reflection</label>
              <div className="dayone-reflection-actions">
                {featureFlags?.refineAllEnabled && (
                  <button
                    ref={refineAllBtnRef}
                    type="button"
                    className="dayone-refine-all-btn"
                    onClick={onRefineAll}
                    disabled={refineState.reflection.status === 'pending' || refineState.reflection.status === 'streaming' || refineState.tags.status === 'pending' || !storyCount}
                    title="Run full AI narrative + tag generation"
                    aria-label="Refine All"
                  >
                    <Icon name={refineState.reflection.status === 'pending' || refineState.reflection.status === 'streaming' ? 'fa-circle-notch fa-spin' : 'fa-wand-magic-sparkles'} />
                    <span className="btn-label"> Refine All</span>
                  </button>
                )}
                <button
                  type="button"
                  className="dayone-reflection-refine"
                  onClick={refineReflection}
                  disabled={reflectionRefining || !storyCount}
                  title="Quick AI enhance of reflection (voice DNA)"
                  aria-label="Refine reflection"
                >
                  <Icon name={reflectionRefining ? 'fa-circle-notch fa-spin' : 'fa-wand-magic-sparkles'} />
                </button>
                {hasAny && (
                  <button
                    type="button"
                    className="dayone-composer-reset"
                    onClick={() => {
                      if (!confirm('Clear all fields?')) return;
                      onChange({ title: '', context: autoContext, reflection: '' });
                      onTagsChange?.([]);
                    }}
                    title="Reset all user-typed fields"
                    aria-label="Reset all user-typed fields"
                  >
                    <Icon name="fa-rotate-left" />
                    <span className="btn-label"> Reset</span>
                  </button>
                )}
              </div>
            </div>
            {/* Status badges row (D9) */}
            {(refineState.reflection.status !== 'idle' || refineState.tags.status !== 'idle') && (
              <div className="dayone-refine-badges" aria-live="polite">
                {refineState.reflection.status !== 'idle' && (() => {
                  const s = refineState.reflection.status;
                  const isEdited = reflectionEdited && (s === 'success' || s === 'edited');
                  const badgeStatus = isEdited ? 'edited' : s;
                  return (
                    <span
                      className={`dayone-refine-badge dayone-refine-badge--${badgeStatus}`}
                      title={refineState.reflection.reasoning || ''}
                    >
                      {badgeStatus === 'edited' && <><Icon name="fa-pen" /> Reflection edited<button type="button" className="dayone-refine-badge-action" onClick={onReSynth}>Re-synth</button></>}
                      {badgeStatus === 'streaming' && <><Icon name="fa-circle-notch fa-spin" /> Writing…</>}
                      {badgeStatus === 'pending' && <><Icon name="fa-circle-notch fa-spin" /> Thinking…</>}
                      {badgeStatus === 'success' && !isEdited && <><Icon name="fa-check" /> Reflection</>}
                      {badgeStatus === 'failed' && <><Icon name="fa-triangle-exclamation" /> Failed<button type="button" className="dayone-refine-badge-action" onClick={onRefineAll}>Retry</button></>}
                    </span>
                  );
                })()}
                {refineState.tags.status !== 'idle' && (() => {
                  const s = refineState.tags.status;
                  return (
                    <span
                      className={`dayone-refine-badge dayone-refine-badge--${s}`}
                      title={refineState.tags.reasoning || ''}
                    >
                      {s === 'pending' && <><Icon name="fa-circle-notch fa-spin" /> Tags…</>}
                      {s === 'success' && <><Icon name="fa-check" /> Tags</>}
                      {s === 'failed' && <><Icon name="fa-triangle-exclamation" /> Tags failed</>}
                    </span>
                  );
                })()}
              </div>
            )}
            <textarea
              id="dayone-reflection"
              className={`dayone-reflection-input${refineState.reflection.status === 'streaming' ? ' dayone-reflection-input--streaming' : refineState.reflection.status === 'pending' ? ' dayone-reflection-input--pending' : ''}`}
              rows={3}
              value={value.reflection || ''}
              onChange={e => update({ reflection: e.target.value })}
              placeholder="How was this day? What stood out?"
              aria-busy={refineState.reflection.status === 'streaming'}
            />
          </div>

          <div className="dayone-field dayone-field--tags">
            <div className="dayone-field-label-row">
              <label htmlFor="dayone-tags-input" className="dayone-field-label"><Icon name="fa-tags" /> Tags</label>
              <span className="dayone-field-meta">{(dayoneTags || []).length} tags</span>
            </div>
            <TagInput
              inputId="dayone-tags-input"
              value={dayoneTags || []}
              onChange={onTagsChange || (() => {})}
              corpus={tagCorpus || []}
              aiSuggestions={aiSuggestedTags || []}
              rejectedAiTags={tripCtx?.rejectedAiTags || []}
              onRejectAi={onRejectAiTag || (() => {})}
            />
          </div>

          <div className="dayone-story">
            <div className="dayone-story-label">
              <Icon name="fa-book-open" /> Story
              <span className="dayone-story-count">
                {storyCount} {storyCount === 1 ? 'entry' : 'entries'}
              </span>
            </div>
            <div className="dayone-story-body">
              {storyCount > 0 ? storyCards : storyEmpty}
            </div>
          </div>

          {metadataLine && (
            <div className="dayone-field dayone-field--metadata">
              <label className="dayone-field-label">Metadata</label>
              <div className="dayone-metadata-pill" title="Auto-derived from trip + entry kinds">
                {metadataLine}
              </div>
            </div>
          )}

          {actionsBar && (
            <div className="dayone-actions">{actionsBar}</div>
          )}
        </section>
      );
    }); // end memo(DayOneComposer)

    function LogModule() {
      // Tab UI removed in this iteration; the entire view is the inbox lane.
      // Filter is still applied via matchesLogTab so the visible set stays
      // identical to the pre-removal Inbox tab.
      const tab = 'inbox';
      // Review lane: 'unreviewed' lane shows reviewStatus ∈ {unreviewed,
      // in_review}; 'reviewed' lane shows reviewStatus === 'approved'.
      // Default to 'reviewed' (DayOne Workspace) so the composition surface
      // loads first on every visit.
      const [reviewView, setReviewView] = useState(() => {
        try { return localStorage.getItem('log_review_view') || 'reviewed'; }
        catch { return 'reviewed'; }
      });
      useEffect(() => {
        try { localStorage.setItem('log_review_view', reviewView); } catch {}
      }, [reviewView]);
      const [sourceFilter, setSourceFilter] = useState('all');
      // Density mode: Compact (4-col scan) / Comfortable (3-col balanced) / Detail (3-col full).
      // Persisted in localStorage; Compact is the first-load default so a heavy day of captures
      // (30-50 entries) is immediately scannable without scrolling. Applies only to Log Bank.
      const [densityMode, setDensityMode] = useState(() => {
        try { return localStorage.getItem('log_density_mode') || 'compact'; }
        catch { return 'compact'; }
      });
      useEffect(() => {
        try { localStorage.setItem('log_density_mode', densityMode); } catch {}
      }, [densityMode]);
      // Day chip filter UI removed in this iteration; the day filter chain in
      // baseVisible short-circuits with this constant.
      const dayFilter = 'all';
      const [entries, setEntries] = useState([]);
      const [loading, setLoading] = useState(true);
      const [tripSlug, setTripSlug] = useState(null);
      const [noteText, setNoteText] = useState('');
      const [capturing, setCapturing] = useState(false);
      const [photoMenuOpen, setPhotoMenuOpen] = useState(false);
      const [noteComposerOpen, setNoteComposerOpen] = useState(false);
      const [receiptProcessing, setReceiptProcessing] = useState(false);
      const [rejectTarget, setRejectTarget] = useState(null);
      const [dayoneJournals, setDayoneJournals] = useState([]);
      const [dayoneJournal, setDayoneJournal] = useState('');
      const [dayonePushing, setDayonePushing] = useState(false);
      const [tripCtx, setTripCtx] = useState(null);
      // Composer survives reload per-trip. Cleared on successful
      // Delete-Reviewed (the sink that ends the Copy → paste → archive cycle).
      // `date` is the user-selected journal date — defaults to today so the
      // happy path requires no click, overridable via the filter-bar picker.
      const todayIso = () => new Date().toISOString().slice(0, 10);
      const [compose, setCompose] = useState({ title: '', context: '', reflection: '', date: todayIso(), weather: null });
      const composeKey = tripSlug ? `journal.dayone.compose.${tripSlug}` : null;

      // --- Tag state (persisted in trip.yaml, not localStorage) ---
      const [dayoneTags, setDayoneTags] = useState([]);
      const [tagCorpus, setTagCorpus] = useState([]);
      const [featureFlags, setFeatureFlags] = useState({});
      const tagSaveTimerRef = useRef(null);
      const lastSavedTagsRef = useRef(null); // E3: optimistic rollback anchor
      // Refine All state (D9)
      const [tripVersion, setTripVersion] = useState(null);
      const [refineState, setRefineState] = useState({ reflection: { status: 'idle', hashes: [] }, tags: { status: 'idle' } });
      const [aiSuggestedTags, setAiSuggestedTags] = useState([]);
      const [reflectionIsAiClean, setReflectionIsAiClean] = useState(true);
      const refineAbortRef = useRef(null);

      // Fetch feature flags on mount
      useEffect(() => {
        fetch(`${LOG_API_BASE}/api/config`, { credentials: 'include' })
          .then(r => r.json())
          .then(d => { if (d) setFeatureFlags(d); })
          .catch(() => {});
      }, []);

      // Fetch tag corpus on mount
      useEffect(() => {
        fetch(`${LOG_API_BASE}/api/tag-corpus/top`, { credentials: 'include' })
          .then(r => r.json())
          .then(d => { if (d?.ok) setTagCorpus(d.top || []); })
          .catch(() => {});
      }, []);

      // Hydrate dayoneTags from tripCtx when it loads
      useEffect(() => {
        if (tripCtx?.dayoneTags && Array.isArray(tripCtx.dayoneTags)) {
          setDayoneTags(tripCtx.dayoneTags);
        } else {
          setDayoneTags([]);
        }
      }, [tripCtx]);

      // Hydrate refineState.reflection.hashes from tripCtx (D4)
      useEffect(() => {
        const hashes = Array.isArray(tripCtx?.narrativeAiHashes) ? tripCtx.narrativeAiHashes : [];
        setRefineState(rs => ({ ...rs, reflection: { ...rs.reflection, hashes } }));
      }, [tripCtx]);

      // Compute reflectionIsAiClean via SubtleCrypto (D4 — edited = hash not in set)
      useEffect(() => {
        const hashes = refineState.reflection.hashes;
        const text = (compose.reflection || '').trim();
        if (!hashes.length || !text) {
          setReflectionIsAiClean(true); // no AI history → treat as clean
          return;
        }
        let cancelled = false;
        const enc = new TextEncoder().encode(text);
        crypto.subtle.digest('SHA-256', enc).then(buf => {
          if (cancelled) return;
          const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 16);
          setReflectionIsAiClean(hashes.includes(hex));
        });
        return () => { cancelled = true; };
      }, [compose.reflection, refineState.reflection.hashes]);

      // Debounced save of tags to server
      const handleTagsChange = useCallback(function handleTagsChange(nextTags) {
        // E3: optimistic update — rollback anchor captured before mutating
        const prevTags = lastSavedTagsRef.current ?? dayoneTags;
        setDayoneTags(nextTags);
        if (tagSaveTimerRef.current) clearTimeout(tagSaveTimerRef.current);
        tagSaveTimerRef.current = setTimeout(() => {
          if (!tripSlug) return;
          fetch(`${LOG_API_BASE}/api/trip-edit`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              tripSlug,
              patches: [{ op: 'add', path: '/dayoneTags', value: nextTags }],
              baseVersion: 'skip',
            }),
          })
            .then(r => r.json())
            .then(d => {
              if (d?.ok) {
                lastSavedTagsRef.current = nextTags; // advance rollback anchor
                window.notify?.success?.('Tags saved', { duration: 1500 });
                // Re-fetch corpus to include new tags
                fetch(`${LOG_API_BASE}/api/tag-corpus/top`, { credentials: 'include' })
                  .then(r => r.json())
                  .then(d2 => { if (d2?.ok) setTagCorpus(d2.top || []); })
                  .catch(() => {});
              } else if (d?.error) {
                setDayoneTags(prevTags); // rollback optimistic update
                window.notify?.error?.(`Tag save failed: ${d.error}`);
              }
            })
            .catch(err => {
              setDayoneTags(prevTags); // rollback optimistic update
              window.notify?.error?.('Tag save failed — rolled back');
              console.error('[Tags]', err);
            });
        }, 400);
      }, [tripSlug, dayoneTags]);
      // Reject an AI-suggested tag (D14): add to rejectedAiTags, remove from suggestions
      const handleRejectAiTag = useCallback(function handleRejectAiTag(tag) {
        setAiSuggestedTags(prev => prev.filter(t => t !== tag));
        if (!tripSlug) return;
        // Read current rejectedAiTags to maintain FIFO cap of 50
        const current = Array.isArray(tripCtx?.rejectedAiTags) ? tripCtx.rejectedAiTags : [];
        const next = [...current.filter(t => t !== tag), tag].slice(-50);
        fetch(`${LOG_API_BASE}/api/trip-edit`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tripSlug,
            patches: [{ op: 'replace', path: '/rejectedAiTags', value: next }],
            baseVersion: 'skip',
          }),
        }).catch(() => {});
      }, [tripSlug, tripCtx?.rejectedAiTags]);

      // Stable-ref proxies for RefineAll / ReSynth — DayOneComposer (memo'd) receives
      // stable function references while the actual impl always sees fresh closure state.
      const handleRefineAllImplRef = useRef(null);
      const handleReSynthImplRef = useRef(null);
      const handleRefineAll = useCallback((...args) => handleRefineAllImplRef.current?.(...args), []);
      const handleReSynth    = useCallback((...args) => handleReSynthImplRef.current?.(...args), []);

      // E4: debug logger — gated by localStorage.DEBUG_REFINE === 'true'
      function debugRefineLog(label, data) {
        if (typeof localStorage !== 'undefined' && localStorage.getItem('DEBUG_REFINE') === 'true') {
          console.groupCollapsed(`[refine-all] ${label}`);
          if (data !== undefined) console.log(data);
          console.groupEnd();
        }
      }

      // Refine All handler (C2) — SSE streaming, atomic commit (D10, D12)
      // (Registered in handleRefineAllImplRef so the stable useCallback proxy always calls the latest closure.)
      async function handleRefineAllImpl() {
        const rows = (tab === 'inbox' && reviewView === 'reviewed')
          ? applyOrder(visible.filter(isReviewed)) : [];
        if (!rows.length) {
          window.notify?.info?.('Nothing to refine', { description: 'Approve a few entries first.' });
          return;
        }
        // Build photos list: entries with prose (captions-only per D6)
        const photos = rows
          .map(r => ({ caption: r?.draft?.prose || r?.payload?.text || '' }))
          .filter(r => r.caption.trim());
        if (!photos.length) {
          window.notify?.info?.('No prose found', { description: 'Entries need refined text first.' });
          return;
        }
        // Abort any in-flight refine
        if (refineAbortRef.current) { refineAbortRef.current.abort(); }
        const controller = new AbortController();
        refineAbortRef.current = controller;

        const requestId = crypto.randomUUID();
        const baseVersion = tripVersion || 'skip';
        const reflectionEdited = refineState.reflection.hashes.length > 0 && !reflectionIsAiClean;

        setRefineState(rs => ({
          reflection: { ...rs.reflection, status: reflectionEdited ? 'edited' : 'pending' },
          tags: { status: 'pending' },
        }));

        // Date range for context
        const dateRange = (() => {
          const s = tripCtx?.dates?.start; const e = tripCtx?.dates?.end;
          if (!s) return '';
          const fmt = (iso) => { const d = new Date(iso + 'T00:00:00'); return isNaN(d.getTime()) ? iso : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
          return e && e !== s ? `${fmt(s)} to ${fmt(e)}` : fmt(s);
        })();

        try {
          const resp = await fetch(`${LOG_API_BASE}/api/trip-refine-all`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
            body: JSON.stringify({
              tripId: tripSlug,
              requestId,
              baseVersion,
              photos,
              title: compose.title || '',
              subtitle: compose.context || '',
              dateRange,
            }),
            signal: controller.signal,
          });
          if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${resp.status}`);
          }

          debugRefineLog('SSE connected', { status: resp.status, requestId });
          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';
          let narrativeValue = null;
          let narrativeHash = null;
          let narrativeReasoning = '';
          let tagsResult = null;

          // E3: SSE token batching — flush every 16 tokens or 100ms to avoid layout thrash
          let tokenBuf = '';
          let tokenBatchTimer = null;
          let batchCount = 0;
          const BATCH_TOKEN_COUNT = 16;
          const BATCH_MS = 100;
          function flushTokenBatch() {
            if (tokenBuf) {
              const captured = tokenBuf;
              setCompose(c => ({ ...c, reflection: (c.reflection || '') + captured }));
              tokenBuf = '';
              batchCount = 0;
            }
            if (tokenBatchTimer) { clearTimeout(tokenBatchTimer); tokenBatchTimer = null; }
          }

          // Process SSE stream
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const parts = buf.split('\n\n');
            buf = parts.pop(); // keep incomplete chunk
            for (const chunk of parts) {
              const eventLine = chunk.match(/^event: (.+)$/m);
              const dataLine = chunk.match(/^data: (.+)$/ms);
              if (!eventLine || !dataLine) continue;
              const event = eventLine[1].trim();
              let data;
              try { data = JSON.parse(dataLine[1]); } catch { continue; }

              if (event === 'narrative.delta' && !reflectionEdited) {
                // Batch tokens — only call setCompose every 16 tokens or 100ms (E3)
                setRefineState(rs => rs.reflection.status === 'streaming' ? rs : { ...rs, reflection: { ...rs.reflection, status: 'streaming' } });
                tokenBuf += (data.text || '');
                batchCount++;
                if (batchCount >= BATCH_TOKEN_COUNT) {
                  flushTokenBatch();
                } else if (!tokenBatchTimer) {
                  tokenBatchTimer = setTimeout(flushTokenBatch, BATCH_MS);
                }
              } else if (event === 'narrative.done' && !reflectionEdited) {
                flushTokenBatch(); // drain any pending batch
                narrativeValue = data.value;
                narrativeHash = data.hash;
                narrativeReasoning = data.reasoning || '';
                setCompose(c => ({ ...c, reflection: data.value }));
                setRefineState(rs => ({
                  ...rs,
                  reflection: { status: 'success', hashes: [...rs.reflection.hashes, data.hash].filter((h, i, a) => a.indexOf(h) === i), reasoning: data.reasoning },
                }));
              } else if (event === 'tags.done') {
                tagsResult = data;
                setAiSuggestedTags(data.values || []);
                setRefineState(rs => ({
                  ...rs,
                  tags: { status: 'success', reasoning: data.reasoning },
                }));
              } else if (event === 'complete') {
                // Build patches (D10 \u2014 respecting edited-skip for reflection)
                const patches = [];
                if (!reflectionEdited && narrativeValue !== null) {
                  patches.push({ op: 'replace', path: '/reflection', value: narrativeValue });
                  const prevHashes = Array.isArray(tripCtx?.narrativeAiHashes) ? tripCtx.narrativeAiHashes : [];
                  const nextHashes = [...new Set([...prevHashes, narrativeHash])];
                  patches.push({ op: 'replace', path: '/narrativeAiHashes', value: nextHashes });
                }
                if (tagsResult) {
                  // Merge: union(currentTags, aiTags) - rejectedAiTags (D14)
                  const rejected = new Set(Array.isArray(tripCtx?.rejectedAiTags) ? tripCtx.rejectedAiTags : []);
                  const merged = [...new Set([...dayoneTags, ...(tagsResult.values || []).filter(t => !rejected.has(t))])];
                  patches.push({ op: 'replace', path: '/dayoneTags', value: merged });
                  setDayoneTags(merged);
                }
                if (patches.length) {
                  const patchResp = await fetch(`${LOG_API_BASE}/api/trip-edit`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tripSlug, patches, baseVersion }),
                  }).then(r => r.json());
                  if (!patchResp.ok && patchResp.error === 'Conflict') {
                    // 409 \u2014 reload trip and retry message
                    window.notify?.error?.('Refine All: version conflict \u2014 reloaded, please retry');
                    if (patchResp.version) setTripVersion(patchResp.version);
                  } else if (patchResp.version) {
                    setTripVersion(patchResp.version);
                  }
                }
                window.notify?.success?.('Refine All complete');
                debugRefineLog('complete', data);
              } else if (event === 'error') {
                // E4: name which orchestrator(s) failed in the toast
                const failedParts = Object.entries(data.errors || {}).map(([k, v]) => `${k}: ${v}`);
                debugRefineLog('SSE error', data.errors);
                throw new Error(failedParts.join('; ') || 'Refine All failed');
              } else {
                debugRefineLog(`event:${event}`, data);
              }
            }
          }
        } catch (err) {
          if (err.name === 'AbortError') return;
          debugRefineLog('error caught', { message: err.message });
          setRefineState(rs => ({
            reflection: { ...rs.reflection, status: rs.reflection.status === 'edited' ? 'edited' : 'failed' },
            tags: { status: 'failed' },
          }));
          window.notify?.error?.('Refine All failed', { description: err.message || String(err) });
        }
      }
      handleRefineAllImplRef.current = handleRefineAllImpl;

      // Re-synth single field (C3): overwrite reflection with fresh narrative
      // (Registered in handleReSynthImplRef so the stable useCallback proxy always calls the latest closure.)
      async function handleReSynthImpl() {
        if (!confirm('Overwrite your edits to the reflection with a fresh AI narrative?')) return;
        const rows = (tab === 'inbox' && reviewView === 'reviewed')
          ? applyOrder(visible.filter(isReviewed)) : [];
        const photos = rows
          .map(r => ({ caption: r?.draft?.prose || r?.payload?.text || '' }))
          .filter(r => r.caption.trim());
        if (!photos.length) {
          window.notify?.info?.('No prose found', { description: 'Entries need refined text first.' });
          return;
        }
        const requestId = crypto.randomUUID();
        const baseVersion = tripVersion || 'skip';
        setRefineState(rs => ({ ...rs, reflection: { ...rs.reflection, status: 'pending' } }));
        try {
          const dateRange = (() => {
            const s = tripCtx?.dates?.start; const e = tripCtx?.dates?.end;
            if (!s) return '';
            const fmt = (iso) => { const d = new Date(iso + 'T00:00:00'); return isNaN(d.getTime()) ? iso : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
            return e && e !== s ? `${fmt(s)} to ${fmt(e)}` : fmt(s);
          })();
          const d = await fetch(`${LOG_API_BASE}/api/trip-refine-field`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tripId: tripSlug, requestId, field: 'narrative', photos, title: compose.title || '', subtitle: compose.context || '', dateRange, baseVersion }),
          }).then(r => r.json());
          if (!d.ok) throw new Error(d.error || 'Re-synth failed');

          setCompose(c => ({ ...c, reflection: d.value }));
          const prevHashes = Array.isArray(tripCtx?.narrativeAiHashes) ? tripCtx.narrativeAiHashes : [];
          const nextHashes = [...new Set([...prevHashes, d.hash])];
          setRefineState(rs => ({
            ...rs,
            reflection: { status: 'success', hashes: nextHashes, reasoning: d.reasoning },
          }));
          // Persist to server
          const patchResp = await fetch(`${LOG_API_BASE}/api/trip-edit`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              tripSlug,
              patches: [
                { op: 'replace', path: '/reflection', value: d.value },
                { op: 'replace', path: '/narrativeAiHashes', value: nextHashes },
              ],
              baseVersion,
            }),
          }).then(r => r.json());
          if (patchResp.version) setTripVersion(patchResp.version);
          window.notify?.success?.('Reflection re-synthesized');
        } catch (err) {
          setRefineState(rs => ({ ...rs, reflection: { ...rs.reflection, status: 'failed' } }));
          window.notify?.error?.('Re-synth failed', { description: err.message || String(err) });
        }
      }
      handleReSynthImplRef.current = handleReSynthImpl;

      // Unlocks the "Delete Reviewed Entries" button after a successful Copy
      // in the current session. Resets on reload so stale tabs must re-copy.
      const [copiedOnce, setCopiedOnce] = useState(false);
      const [deleteReviewedOpen, setDeleteReviewedOpen] = useState(false);
      const [deletingReviewed, setDeletingReviewed] = useState(false);
      const [resetOpen, setResetOpen] = useState(false);
      const [resetting, setResetting] = useState(false);
      const photoCameraRef = useRef(null);
      const photoLibraryRef = useRef(null);
      const receiptInputRef = useRef(null);

      // Drag-and-drop + paste support. The macOS file dialog can't be
      // pointed at the Photos library by web code (browser security), so
      // we offer the two native macOS workflows that bypass it entirely:
      //   • Drag a photo from Photos.app onto the Log composer
      //   • Cmd+V a copied photo anywhere inside the Log composer
      // dropOver tracks the currently-hovered intent target ('photo' |
      // 'receipt' | null). dragDepthRef avoids the well-known dragleave
      // flicker when the cursor crosses child element boundaries.
      const [dropOver, setDropOver] = useState(null);
      const dragDepthRef = useRef(0);

      // Close the Photo menu on outside click
      useEffect(() => {
        if (!photoMenuOpen) return;
        function onDoc(e) {
          if (!e.target.closest?.('.log-capture-action--photo')) setPhotoMenuOpen(false);
        }
        document.addEventListener('click', onDoc);
        return () => document.removeEventListener('click', onDoc);
      }, [photoMenuOpen]);

      // Paste-image support. Listens at document scope so the user can
      // Cmd+V from anywhere on the Log page (focus may be on the title
      // input, the reflection field, or nowhere). Only fires when the
      // clipboard actually carries an image, so it never interferes with
      // pasting plain text into form fields. Routes to capturePhoto by
      // default — kind can be flipped on the entry card after.
      // Refs hold the current capture functions so the listener doesn't
      // need to re-bind every render.
      const capturePhotoRef = useRef(null);
      useEffect(() => {
        function onPaste(e) {
          const items = Array.from(e.clipboardData?.items || []);
          const imgItem = items.find(it => it.type && it.type.startsWith('image/'));
          if (!imgItem) return;
          const file = imgItem.getAsFile();
          if (!file) return;
          // Don't interfere with pasting text into a focused input/textarea
          // when the clipboard ALSO has text. Also bail when focus is in
          // FloatingChat — even an image-only paste shouldn't be silently
          // hijacked there; the chat may want to handle it (or refuse it
          // explicitly), but our log-capture should never own that vector.
          const ae = document.activeElement;
          const inEditable = ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.isContentEditable);
          const hasText = items.some(it => it.kind === 'string');
          if (inEditable && hasText) return;
          if (ae && ae.closest && ae.closest('#floating-chat-root')) return;
          e.preventDefault();
          capturePhotoRef.current?.(file, null);
        }
        document.addEventListener('paste', onPaste);
        return () => document.removeEventListener('paste', onPaste);
      }, []);

      function loadEntries() {
        setLoading(true);
        fetch(`${LOG_API_BASE}/api/log`, { credentials: 'include' })
          .then(r => r.json())
          .then(data => {
            if (data.ok) { setEntries(data.entries); setTripSlug(data.tripSlug); }
          })
          .catch(err => console.error('[Log]', err))
          .finally(() => setLoading(false));
      }

      useEffect(() => { loadEntries(); }, []);

      // Fetch weather for the composer's current date whenever it changes.
      // The server geocodes the trip's base on first call and caches coords
      // in-process, so subsequent date flips are a single cached-aware fetch.
      useEffect(() => {
        if (!tripSlug || reviewView !== 'reviewed') return;
        const date = compose.date;
        if (!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)) return;
        // Skip re-fetch if we already have this date's weather memoised on state.
        if (compose.weather?.date === date) return;
        let cancelled = false;
        fetch(`${LOG_API_BASE}/api/weather?slug=${encodeURIComponent(tripSlug)}&date=${encodeURIComponent(date)}`, { credentials: 'include' })
          .then(r => r.json())
          .then(d => {
            if (cancelled) return;
            if (d?.ok && d.label) {
              setCompose(c => ({ ...c, weather: { date, label: d.label, tempF: d.tempF, precipPct: d.precipPct, icon: d.icon } }));
            } else {
              // Clear stale weather on coords-unresolved or upstream error.
              setCompose(c => (c.weather ? { ...c, weather: null } : c));
            }
          })
          .catch(() => { /* silent — metadata line falls back to no-weather */ });
        return () => { cancelled = true; };
      }, [tripSlug, reviewView, compose.date, compose.weather?.date]);

      // Hydrate composer + trip context whenever the active trip changes.
      useEffect(() => {
        if (!tripSlug) return;
        try {
          const raw = localStorage.getItem(`journal.dayone.compose.${tripSlug}`);
          if (raw) {
            const parsed = JSON.parse(raw);
            setCompose({
              title: typeof parsed?.title === 'string' ? parsed.title : '',
              context: typeof parsed?.context === 'string' ? parsed.context : '',
              reflection: typeof parsed?.reflection === 'string' ? parsed.reflection : '',
              date: /^\d{4}-\d{2}-\d{2}$/.test(parsed?.date) ? parsed.date : todayIso(),
              weather: parsed?.weather && typeof parsed.weather === 'object' ? parsed.weather : null,
            });
          } else {
            setCompose({ title: '', context: '', reflection: '', date: todayIso(), weather: null });
          }
        } catch { /* ignore malformed cache */ }
        fetch(`${LOG_API_BASE}/api/trip/${encodeURIComponent(tripSlug)}/full`, { credentials: 'include' })
          .then(r => r.json())
          .then(d => {
            if (d?.ok) {
              setTripCtx(d.trip);
              if (d.version) setTripVersion(d.version);
            }
          })
          .catch(() => { /* composer still usable without trip metadata */ });
      }, [tripSlug]);

      // Persist composer edits — debounced via the reducer-free pattern: every
      // change writes synchronously to localStorage. The payload is tiny.
      useEffect(() => {
        if (!composeKey) return;
        try { localStorage.setItem(composeKey, JSON.stringify(compose)); } catch {}
      }, [compose, composeKey]);

      // Single canonical filter pipeline — source of truth is `entries`.
      // Order: tab (inbox only) → source → review-lane split.
      const baseVisible = entries
        .filter(e => matchesLogTab(e, tab))
        .filter(e => matchesLogSource(e, sourceFilter));

      // Phase 11b: review lifecycle applies to ALL kinds in the Inbox tab.
      // Unreviewed lane shows entries with reviewStatus ∈ {unreviewed, in_review}.
      // Reviewed lane shows entries with reviewStatus === approved. The same
      // pattern works for photos, receipts, voice, and notes.
      const isUnreviewed = e => ['unreviewed', 'in_review'].includes(e.reviewStatus);
      const isReviewed   = e => e.reviewStatus === 'approved';
      const reviewUnreviewedCount = baseVisible.filter(isUnreviewed).length;
      const reviewReviewedCount   = baseVisible.filter(isReviewed).length;

      const visible = tab === 'inbox'
        ? baseVisible.filter(reviewView === 'reviewed' ? isReviewed : isUnreviewed)
        : baseVisible;

      // Phase 11b: dummy preview cards (one per kind) at the top of Unreviewed
      // so every card variant is visible at a glance for layout review. Their
      // ids are prefixed `dummy_` and ReviewCard short-circuits Refine/Approve
      // for any such entry — they never hit the server. Dummies respect the
      // active Source filter so the filter behaves consistently across both
      // real and preview entries.
      const filteredDummies = DUMMY_ENTRIES.filter(e => matchesLogSource(e, sourceFilter));

      // Drag-and-drop ordering on the Reviewed lane only. The order array
      // is per-trip and lives in localStorage; entries not in the array
      // sort to the end by capturedAt (newest first to match the rest of
      // the app's chronology). Tweak the storage key if the ordering
      // contract ever needs to expand beyond a single trip.
      const orderKey = `journal.order.${tripSlug || '_default'}`;
      const [orderTick, setOrderTick] = useState(0);
      const orderArray = useMemo(() => {
        try {
          const raw = localStorage.getItem(orderKey);
          return raw ? JSON.parse(raw) : [];
        } catch { return []; }
      }, [orderKey, orderTick]);

      function persistOrder(nextArray) {
        try { localStorage.setItem(orderKey, JSON.stringify(nextArray)); } catch {}
        setOrderTick(t => t + 1);
      }

      function applyOrder(rows) {
        if (!orderArray.length) return rows;
        const indexMap = new Map(orderArray.map((id, i) => [id, i]));
        return [...rows].sort((a, b) => {
          const ai = indexMap.has(a.id) ? indexMap.get(a.id) : Infinity;
          const bi = indexMap.has(b.id) ? indexMap.get(b.id) : Infinity;
          if (ai !== bi) return ai - bi;
          // Fallback: newest first by capturedAt for entries not in the map.
          return new Date(b.capturedAt || 0).getTime() - new Date(a.capturedAt || 0).getTime();
        });
      }

      // Drop fromId in front of toId. If toId is null, append fromId to end.
      function handleReorder(fromId, toId) {
        if (!fromId || fromId === toId) return;
        // Build the canonical order from currently-visible reviewed entries
        // so freshly added rows merge in deterministically.
        const reviewedIds = visible.filter(isReviewed).map(e => e.id);
        const ordered = applyOrder(visible.filter(isReviewed)).map(e => e.id);
        const seen = new Set([...orderArray, ...ordered, ...reviewedIds]);
        let combined = orderArray.filter(id => seen.has(id));
        for (const id of ordered) if (!combined.includes(id)) combined.push(id);
        combined = combined.filter(id => id !== fromId);
        const insertAt = toId ? combined.indexOf(toId) : combined.length;
        if (insertAt < 0) combined.push(fromId);
        else combined.splice(insertAt, 0, fromId);
        persistOrder(combined);
      }

      const displayEntries = (tab === 'inbox' && reviewView === 'unreviewed')
        ? [...filteredDummies, ...visible]
        : (reviewView === 'reviewed' ? applyOrder(visible) : visible);

      // Drop stale draft cache entries once on mount (30-day TTL backstop).
      useEffect(() => { purgeStaleDrafts(); }, []);

      // ─── Per-row action handlers ───
      // ReviewCard sends a combined PATCH (status + draft.prose + kindOverride
      // + structured) so refined output and reviewer corrections ride to the
      // server in one atomic write. Throws on failure so the card can keep
      // its draft state for retry.
      async function handleApproveDraft(id, patch) {
        const r = await window.BabuAI.logPatch(id, patch);
        if (!r?.entry) throw new Error('approve patch returned no entry');
        setEntries(prev => prev.map(e => e.id === id ? r.entry : e));
        window.notify?.success?.('Approved');
      }
      // Save: PATCH any subset of fields. Used by Reviewed-lane auto-save
      // (textarea blur) and Unapprove (reviewStatus flip). The `silent`
      // option suppresses the success toast for ambient save operations.
      async function handleSaveDraft(id, patch, opts = {}) {
        const r = await window.BabuAI.logPatch(id, patch);
        if (!r?.entry) throw new Error('save patch returned no entry');
        setEntries(prev => prev.map(e => e.id === id ? r.entry : e));
        if (!opts.silent) window.notify?.success?.('Saved');
      }
      // Reconcile entries state after the kind-toggle badge PATCHes the row.
      function handleKindFlipped(id, updatedEntry) {
        setEntries(prev => prev.map(e => e.id === id ? updatedEntry : e));
      }
      function handleReject(entry) { setRejectTarget(entry); }

      // Fetch DayOne journals on mount; default selection to the first.
      useEffect(() => {
        fetch(`${LOG_API_BASE}/api/dayone/journals`, { credentials: 'include' })
          .then(r => r.json())
          .then(d => {
            if (!d?.ok || !Array.isArray(d.journals)) return;
            setDayoneJournals(d.journals);
            if (d.journals.length && !dayoneJournal) setDayoneJournal(d.journals[0].id);
          })
          .catch(() => { /* silent — DayOne push is optional */ });
      }, []);

      // Bundle every visible Reviewed entry and copy the result to the
      // clipboard as rich HTML (inline base64 photos) plus plain markdown.
      // Paste into a new DayOne entry to land the photos + narrative.
      async function handleDayoneCopy() {
        if (dayonePushing) return;
        const reviewedRows = applyOrder(visible.filter(isReviewed));
        const entryIds = reviewedRows
          .map(e => e.id)
          .filter(id => typeof id === 'string' && !id.startsWith('dummy_'));
        if (!entryIds.length) {
          window.notify?.warning?.('Nothing to copy', { description: 'No Reviewed entries to bundle.' });
          return;
        }
        if (!dayoneJournal) {
          window.notify?.warning?.('Pick a journal first');
          return;
        }
        setDayonePushing(true);
        try {
          const r = await fetch(`${LOG_API_BASE}/api/dayone/bundle`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tripSlug, entryIds, journal: dayoneJournal, compose: { ...compose, dayoneTags } }),
          });
          const d = await r.json();
          if (!d?.ok) throw new Error(d?.error || 'bundle failed');
          const htmlBlob = new Blob([d.html || ''], { type: 'text/html' });
          const textBlob = new Blob([d.markdown || ''], { type: 'text/plain' });
          await navigator.clipboard.write([new ClipboardItem({
            'text/html': htmlBlob,
            'text/plain': textBlob,
          })]);
          setCopiedOnce(true);
          window.notify?.success?.(`Copied ${d.entryCount} entries`, {
            description: `Paste into "${d.journal}" in DayOne.`,
          });
        } catch (err) {
          window.notify?.error?.('Copy to DayOne failed', { description: err.message || String(err) });
        } finally {
          setDayonePushing(false);
        }
      }
      // Shared clear-path for Reviewed-lane resets — wipes tags, AI suggestions,
      // and refine badges locally, then fire-and-forget PATCH /dayoneTags=[] so
      // a fail doesn't roll back into the just-reset UI.
      function clearComposerTagsAndRefine(slug) {
        // Abort any in-flight Refine All stream first — its token handler at ~3070
        // merges into dayoneTags via stale closure and would resurrect tags.
        if (refineAbortRef.current) { refineAbortRef.current.abort(); refineAbortRef.current = null; }
        if (tagSaveTimerRef.current) { clearTimeout(tagSaveTimerRef.current); tagSaveTimerRef.current = null; }
        setDayoneTags([]);
        lastSavedTagsRef.current = [];
        setAiSuggestedTags([]);
        setRefineState({ reflection: { status: 'idle', hashes: [] }, tags: { status: 'idle' } });
        if (!slug) return;
        fetch(`${LOG_API_BASE}/api/trip-edit`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tripSlug: slug,
            patches: [{ op: 'add', path: '/dayoneTags', value: [] }],
            baseVersion: 'skip',
          }),
        }).catch(() => {});
      }

      // Bulk-delete every Reviewed-lane entry for the active trip. Gated on
      // copiedOnce: the button only opens the modal after a successful Copy
      // to DayOne in this session, so the prose has a durable home before
      // the source rows are archived + photo files are removed on disk.
      async function confirmReset() {
        if (resetting) return;
        setResetOpen(false);
        setResetting(true);
        try {
          const slug = tripSlug;
          if (!slug) throw new Error('no active trip');
          const lane = reviewView;
          const endpoint = lane === 'reviewed'
            ? `/api/trips/${encodeURIComponent(slug)}/reviewed`
            : `/api/trips/${encodeURIComponent(slug)}/unreviewed`;
          const r = await fetch(`${LOG_API_BASE}${endpoint}`, { method: 'DELETE', credentials: 'include' });
          const d = await r.json();
          if (!d?.ok) throw new Error(d?.error || 'reset failed');

          if (lane === 'reviewed') {
            setEntries(prev => prev.filter(e => !isReviewed(e)));
            setCopiedOnce(false);
            setCompose({ title: '', context: '', reflection: '', date: todayIso(), weather: null });
            if (composeKey) { try { localStorage.removeItem(composeKey); } catch {} }
            clearComposerTagsAndRefine(slug);
          } else {
            const removedIds = entries.filter(isUnreviewed).map(e => e.id);
            setEntries(prev => prev.filter(e => !isUnreviewed(e)));
            for (const id of removedIds) {
              try { localStorage.removeItem(`journal.draft.${id}`); } catch {}
            }
          }

          const tabLabel = lane === 'reviewed' ? 'DayOne Workspace' : 'Log Bank';
          window.notify?.success?.(`${tabLabel} reset`, {
            description: d.photoCount
              ? `${d.entryCount} entries removed, ${d.photoCount} photo${d.photoCount === 1 ? '' : 's'} deleted.`
              : `${d.entryCount} ${d.entryCount === 1 ? 'entry' : 'entries'} removed.`,
          });
        } catch (err) {
          window.notify?.error?.('Reset failed', { description: err.message || String(err) });
        } finally {
          setResetting(false);
        }
      }

      async function confirmDeleteReviewed() {
        if (deletingReviewed) return;
        setDeleteReviewedOpen(false);
        setDeletingReviewed(true);
        try {
          const slug = tripSlug;
          if (!slug) throw new Error('no active trip');
          const r = await fetch(`${LOG_API_BASE}/api/trips/${encodeURIComponent(slug)}/reviewed`, { method: 'DELETE', credentials: 'include' });
          const d = await r.json();
          if (!d?.ok) throw new Error(d?.error || 'delete failed');
          setEntries(prev => prev.filter(e => !isReviewed(e)));
          setCopiedOnce(false);
          // Composer has done its job — clear so the next trip/session starts fresh.
          setCompose({ title: '', context: '', reflection: '', date: todayIso(), weather: null });
          if (composeKey) { try { localStorage.removeItem(composeKey); } catch {} }
          clearComposerTagsAndRefine(slug);
          window.notify?.success?.(`Deleted ${d.entryCount} reviewed entries`, {
            description: d.photoCount ? `${d.photoCount} photo${d.photoCount === 1 ? '' : 's'} removed from disk.` : undefined,
          });
        } catch (err) {
          window.notify?.error?.('Delete failed', { description: err.message || String(err) });
        } finally {
          setDeletingReviewed(false);
        }
      }

      async function confirmReject() {
        const entry = rejectTarget;
        if (!entry) return;
        setRejectTarget(null);
        try {
          const r = await fetch(`${LOG_API_BASE}/api/log/${encodeURIComponent(entry.id)}`, { method: 'DELETE', credentials: 'include' });
          const d = await r.json();
          if (!d.ok) throw new Error(d.error || 'delete failed');
          setEntries(prev => prev.filter(e => e.id !== entry.id));
          try { localStorage.removeItem(`journal.draft.${entry.id}`); } catch {}
          window.notify?.success?.('Entry removed', { description: entryPreview(entry) });
          window.dispatchEvent(new CustomEvent('log-entry:reject', { detail: { id: entry.id } }));
        } catch (err) {
          window.notify?.error?.('Delete failed', { description: err.message || String(err) });
        }
      }

      // Captures initiated from the Reviewed lane should land approved so the
      // new row shows up in the active tab, not back in Unreviewed. Server
      // honors `reviewStatus` on /api/log/capture when it's a legal initial
      // transition ('unreviewed' → 'approved').
      const targetReviewStatus = reviewView === 'reviewed' ? 'approved' : null;

      async function captureNote() {
        const text = noteText.trim();
        if (!text) return;
        setCapturing(true);
        try {
          const payload = { kind: 'note', text };
          if (targetReviewStatus) payload.reviewStatus = targetReviewStatus;
          const r = await fetch(`${LOG_API_BASE}/api/log/capture`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const d = await r.json();
          if (d.ok) { setNoteText(''); window.notify?.success('Note captured'); loadEntries(); }
          else window.notify?.error('Capture failed', { description: d.error });
        } catch (err) {
          window.notify?.error('Capture failed', { description: err.message });
        } finally {
          setCapturing(false);
        }
      }

      // Re-encode HEIC/HEIF to JPEG before upload — Anthropic vision rejects
      // HEIC, and the browser will happily decode it via <img> on macOS /
      // iOS. For browsers that can't decode HEIC (Chrome on Windows/Linux)
      // we send the original bytes through and let the server skip vision;
      // the text-only refine still produces prose, and the UI surfaces the
      // skip reason on the card.
      async function normalizeImageForUpload(file) {
        if (!file) return file;
        const mime = (file.type || '').toLowerCase();
        const name = (file.name || '').toLowerCase();
        const isHeic = mime.includes('heic') || mime.includes('heif') || /\.(heic|heif)$/.test(name);
        if (!isHeic) return file;
        try {
          const url = URL.createObjectURL(file);
          const img = await new Promise((res, rej) => {
            const i = new Image();
            i.onload = () => res(i);
            i.onerror = () => rej(new Error('decode-failed'));
            i.src = url;
          });
          const canvas = document.createElement('canvas');
          // Cap dimension so we don't emit an oversized JPEG from a 48MP iPhone shot.
          const MAX = 2400;
          const scale = Math.min(1, MAX / Math.max(img.naturalWidth, img.naturalHeight));
          canvas.width = Math.round(img.naturalWidth * scale);
          canvas.height = Math.round(img.naturalHeight * scale);
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
          const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
          if (!blob) return file;
          const base = name.replace(/\.(heic|heif)$/i, '') || 'photo';
          return new File([blob], `${base}.jpg`, { type: 'image/jpeg', lastModified: file.lastModified });
        } catch {
          // Browser couldn't decode HEIC — upload original and let the server
          // route through text-only refine with a clear skip reason.
          return file;
        }
      }

      async function capturePhoto(file, sourceRef) {
        if (!file) return;
        if (!file.type || !file.type.startsWith('image/')) {
          window.notify?.warning?.('Skipped — not an image', { description: file.name || 'file' });
          return;
        }
        setCapturing(true);
        try {
          const normalized = await normalizeImageForUpload(file);
          const form = new FormData();
          form.append('photo', normalized);
          if (targetReviewStatus) form.append('reviewStatus', targetReviewStatus);
          const r = await fetch(`${LOG_API_BASE}/api/log/capture`, { method: 'POST', credentials: 'include', body: form });
          const d = await r.json().catch(() => ({ ok: false, error: 'non-JSON response' }));
          if (d.ok) {
            window.notify?.success(`Photo captured: ${file.name || 'image'}`);
            loadEntries();
            // Server runs Vision classify async (~1\u20132s). Re-load shortly to
            // pick up the firmed kind so the card shows photo/receipt instead
            // of the transient unsorted-image.
            setTimeout(loadEntries, 2000);
          } else {
            window.notify?.error('Photo capture failed', { description: friendlyError(d.error || `HTTP ${r.status}`) });
          }
        } catch (err) {
          window.notify?.error('Photo capture failed', { description: friendlyError(err) });
        } finally {
          setCapturing(false);
          if (sourceRef?.current) sourceRef.current.value = '';
        }
      }

      // Keep the paste-handler's ref pointed at the latest capturePhoto
      // closure each render so it always sees the current state setters.
      capturePhotoRef.current = capturePhoto;

      // Phase 11b: [+ Receipt] flow — upload with explicit kind=receipt (skips
      // async classify), then immediately call refine so the card lands with
      // structured fields + Asif-voice description already filled in. The
      // button shows a spinner during the round trip.
      async function captureReceipt(file) {
        if (!file) return;
        if (!file.type || !file.type.startsWith('image/')) {
          window.notify?.warning?.('Skipped — not an image', { description: file.name || 'file' });
          return;
        }
        setReceiptProcessing(true);
        try {
          const normalized = await normalizeImageForUpload(file);
          const form = new FormData();
          form.append('photo', normalized);
          form.append('kind', 'receipt');
          if (targetReviewStatus) form.append('reviewStatus', targetReviewStatus);
          const r = await fetch(`${LOG_API_BASE}/api/log/capture`, { method: 'POST', credentials: 'include', body: form });
          const d = await r.json();
          if (!d.ok) throw new Error(d.error || 'capture failed');
          window.notify?.success?.('Receipt uploaded — refining…');
          // Auto-refine; persist=true writes refined + structured into draft.*.
          try {
            await window.BabuAI.logRefine(d.id, { note: '', persist: true });
          } catch (refineErr) {
            window.notify?.warning?.('Refine failed — receipt added but unpolished', {
              description: friendlyError(refineErr),
            });
          }
          loadEntries();
        } catch (err) {
          window.notify?.error?.('Receipt capture failed', { description: friendlyError(err) });
        } finally {
          setReceiptProcessing(false);
          if (receiptInputRef.current) receiptInputRef.current.value = '';
        }
      }

      const SOURCES = [
        { id: 'all',     label: 'All' },
        { id: 'photo',   label: 'Photo',   icon: 'fa-camera' },
        { id: 'receipt', label: 'Receipt', icon: 'fa-receipt' },
        { id: 'note',    label: 'Note',    icon: 'fa-note-sticky' },
      ];

      // Shared JSX fragments reused between the two review lanes.
      const captureActionsNode = (
        <div className="log-capture-actions">
          <button
            className="log-capture-action log-capture-action--photo"
            onClick={e => { e.stopPropagation(); setPhotoMenuOpen(o => !o); }}
            disabled={capturing}
            title="Add a photo"
            aria-label="Add a photo"
          >
            <Icon name="fa-camera" />
            <span className="btn-label">Photo</span>
            {photoMenuOpen && (
              <div className="log-capture-menu" onClick={e => e.stopPropagation()}>
                <button onClick={() => { setPhotoMenuOpen(false); photoCameraRef.current?.click(); }}>
                  <Icon name="fa-camera-retro" /> Take photo
                </button>
                <button onClick={() => { setPhotoMenuOpen(false); photoLibraryRef.current?.click(); }}>
                  <Icon name="fa-images" /> Choose from library
                </button>
              </div>
            )}
          </button>
          <button
            className="log-capture-action log-capture-action--receipt"
            onClick={() => receiptInputRef.current?.click()}
            disabled={receiptProcessing}
            title="Add a receipt — image is uploaded and AI-extracted automatically"
            aria-label={receiptProcessing ? 'Processing receipt' : 'Add a receipt'}
          >
            <Icon name={receiptProcessing ? 'fa-circle-notch fa-spin' : 'fa-receipt'} />
            <span className="btn-label">{receiptProcessing ? ' Processing…' : ' Receipt'}</span>
          </button>
          <button
            className="log-capture-action log-capture-action--note"
            onClick={() => setNoteComposerOpen(o => !o)}
            disabled={capturing}
            title="Add a note — type in your own words"
            aria-label="Add a note"
          >
            <Icon name="fa-note-sticky" />
            <span className="btn-label">Note</span>
          </button>
        </div>
      );

      // Reviewed-lane card list, already ordered and filtered.
      const reviewedRowsOrdered = tab === 'inbox' ? applyOrder(visible.filter(isReviewed)) : [];
      const reviewedCardsNode = reviewedRowsOrdered.map(entry => {
        const isDummyEntry = typeof entry.id === 'string' && entry.id.startsWith('dummy_');
        return (
          <ReviewCard
            key={entry.id}
            entry={entry}
            lane="reviewed"
            draggable={!isDummyEntry}
            onReorder={handleReorder}
            onApproveDraft={handleApproveDraft}
            onSaveDraft={handleSaveDraft}
            onReject={handleReject}
            onKindFlipped={handleKindFlipped}
          />
        );
      });
      const emptyStoryNode = loading
        ? (<div className="log-empty"><Icon name="fa-spinner" /> <p>Loading your log…</p></div>)
        : (<div className="log-empty"><Icon name="fa-inbox" /><p>Nothing approved yet — review some from Log Bank to see them here.</p></div>);

      // Reviewed-lane footer: Journal select + Copy-to-DayOne + Delete. Lives
      // inside the composer so all post-composition controls sit together.
      const reviewedActionsNode = (
        <>
          <div className="log-dayone-push-controls">
            <select
              className="log-dayone-journal-select"
              value={dayoneJournal}
              onChange={e => setDayoneJournal(e.target.value)}
              disabled={dayonePushing || !dayoneJournals.length}
              aria-label="Target DayOne journal"
            >
              {dayoneJournals.length === 0 && <option value="">No journals available</option>}
              {dayoneJournals.map(j => (
                <option key={j.id} value={j.id}>{j.label}</option>
              ))}
            </select>
            <button
              className="log-dayone-push-btn"
              onClick={handleDayoneCopy}
              disabled={dayonePushing || !dayoneJournals.length}
              title="Copy every Reviewed entry (photos + text) to the clipboard for pasting into DayOne"
              aria-label={dayonePushing ? 'Copying to DayOne' : 'Copy to DayOne'}
            >
              <Icon name={dayonePushing ? 'fa-circle-notch fa-spin' : 'fa-copy'} />
              <span className="btn-label">{dayonePushing ? ' Copying…' : ' Copy to DayOne'}</span>
            </button>
          </div>
          {entries.some(isReviewed) && (
            <button
              className="log-reviewed-delete-btn"
              onClick={() => setDeleteReviewedOpen(true)}
              disabled={!copiedOnce || deletingReviewed}
