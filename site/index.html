<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asif's Journal</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Great+Vibes&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Font Awesome 6.5.1 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F4D6;</text></svg>">

  <style>
    /* =================================================================
       PREMIUM LAVENDER GLASS 2.0 — Gemini Design
       Rich, modern, interactive with multi-column grids
       ================================================================= */
    :root {
      --bg-main: #EFE9F5;
      --bg-mesh-1: rgba(180, 140, 210, 0.45);
      --bg-mesh-2: rgba(150, 110, 180, 0.35);
      --bg-mesh-3: rgba(220, 160, 180, 0.3);
      --bg-mesh-4: rgba(120, 180, 200, 0.2);

      --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.75) 0%, rgba(255, 255, 255, 0.4) 100%);
      --glass-bg-hover: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.6) 100%);
      --glass-border: rgba(255, 255, 255, 0.7);
      --glass-border-light: rgba(255, 255, 255, 0.95);
      --glass-shadow: 0 10px 40px rgba(74, 51, 88, 0.08);
      --glass-shadow-hover: 0 16px 50px rgba(74, 51, 88, 0.15);

      --text-main: #2D1E3A;
      --text-secondary: #4A3358;
      --text-muted: #6B5A7A;
      --text-soft: #9A8CA8;

      --purple-deep: #4A3358;
      --purple-mid: #8B7394;
      --lavender: #A78BFA;
      --wisteria: #C084FC;
      --rose: #F472B6;
      --accent: #8B5CF6;
      --success: #10B981;
      --warning: #F59E0B;

      --font-serif: 'Cormorant Garamond', serif;
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --font-script: 'Great Vibes', cursive;

      --transition-fast: all 0.2s ease;
      --transition-spring: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-main);
      color: var(--text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* --- Animated Mesh Background --- */
    .bg-mesh {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
      background:
        radial-gradient(circle at 10% 20%, var(--bg-mesh-1), transparent 50%),
        radial-gradient(circle at 90% 80%, var(--bg-mesh-2), transparent 50%),
        radial-gradient(circle at 50% 50%, var(--bg-mesh-3), transparent 60%),
        radial-gradient(circle at 80% 10%, var(--bg-mesh-4), transparent 50%);
      filter: blur(60px);
      animation: mesh-shift 25s ease-in-out infinite alternate;
    }
    @keyframes mesh-shift {
      0%   { transform: scale(1) translate(0, 0); }
      33%  { transform: scale(1.05) translate(3%, 2%); }
      66%  { transform: scale(1.02) translate(-2%, 4%); }
      100% { transform: scale(1) translate(-2%, -2%); }
    }

    /* --- Layout --- */
    .page { padding-top: 110px; padding-bottom: 6rem; min-height: 100vh; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }

    .grid-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      align-items: start;
    }

    /* --- Transitions --- */
    .fade-enter { animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .stagger-1 { animation-delay: 0.1s; opacity: 0; animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .stagger-2 { animation-delay: 0.2s; opacity: 0; animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .stagger-3 { animation-delay: 0.3s; opacity: 0; animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* --- Typography --- */
    .page-title {
      font-family: var(--font-serif); font-size: 3.5rem; font-weight: 500;
      color: var(--text-main); margin-bottom: 0.25rem; letter-spacing: -0.01em; line-height: 1.1;
    }
    .page-subtitle { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 3rem; font-weight: 400; max-width: 600px; }

    /* --- Glass Cards --- */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-border-light);
      border-left: 1px solid var(--glass-border-light);
      border-radius: 24px;
      box-shadow: var(--glass-shadow);
      transition: var(--transition-spring);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .glass-card:hover {
      background: var(--glass-bg-hover);
      transform: translateY(-6px);
      box-shadow: var(--glass-shadow-hover);
      border-color: rgba(255, 255, 255, 1);
    }

    /* --- Navigation (Pill) --- */
    .nav {
      position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 100;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 32px rgba(74, 51, 88, 0.1);
      border-radius: 999px; padding: 0.5rem 1rem;
      display: flex; align-items: center; gap: 1.5rem;
      width: 90%; max-width: 1000px;
    }
    .nav-brand {
      font-family: var(--font-script); font-size: 2rem;
      background: linear-gradient(135deg, var(--accent), var(--rose));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      padding: 0 1rem; font-weight: 600;
    }
    .nav-links { display: flex; gap: 0.25rem; flex: 1; justify-content: flex-end; }
    .nav-link {
      padding: 0.6rem 1.25rem; border-radius: 999px; color: var(--text-muted);
      font-size: 0.95rem; font-weight: 500; transition: var(--transition-fast);
      cursor: pointer; border: none; background: transparent;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .nav-link:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.6); }
    .nav-link.active { color: var(--accent); background: white; box-shadow: 0 2px 12px rgba(74, 51, 88, 0.08); }

    /* --- Buttons --- */
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem; justify-content: center;
      padding: 0.75rem 1.5rem; border-radius: 14px;
      font-family: var(--font-sans); font-size: 0.95rem; font-weight: 500;
      cursor: pointer; transition: var(--transition-fast); border: 1px solid transparent;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--wisteria)); color: white;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.25);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139, 92, 246, 0.35); filter: brightness(1.1); }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.9); color: var(--text-main);
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.9); transform: translateY(-2px); }

    /* --- Sub-Nav Tabs --- */
    .journal-tabs {
      display: inline-flex; background: rgba(255, 255, 255, 0.4); padding: 0.5rem;
      border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.6);
      margin-bottom: 2.5rem; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
    }
    .journal-tab {
      padding: 0.75rem 1.5rem; border: none; background: transparent; color: var(--text-muted);
      cursor: pointer; border-radius: 14px; font-size: 0.95rem; font-weight: 600;
      transition: var(--transition-fast); display: flex; align-items: center; gap: 0.5rem;
    }
    .journal-tab.active { background: white; color: var(--accent); box-shadow: 0 4px 15px rgba(74, 51, 88, 0.08); }

    /* --- Module Cards --- */
    .module-card { padding: 3rem 2.5rem; cursor: pointer; }
    .module-icon {
      width: 70px; height: 70px; border-radius: 20px;
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.4));
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: var(--accent); margin-bottom: 1.5rem;
      border: 1px solid white; box-shadow: 0 8px 25px rgba(139, 92, 246, 0.15);
    }
    .module-title { font-family: var(--font-serif); font-size: 2.2rem; color: var(--text-main); margin-bottom: 0.75rem; line-height: 1.1; }
    .module-description { font-size: 1.05rem; color: var(--text-muted); line-height: 1.6; }

    /* --- Active Trip Hero (Redesigned) --- */
    .trip-hero {
      position: relative;
      padding: 4rem 3rem;
      border-radius: 24px;
      overflow: hidden;
      margin: 0 auto 3rem auto;
      max-width: 60%;
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-border-light);
      border-left: 1px solid var(--glass-border-light);
      box-shadow: var(--glass-shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
      transition: var(--transition-spring);
    }
    .trip-hero:hover {
      background: var(--glass-bg-hover);
      transform: translateY(-6px);
      box-shadow: var(--glass-shadow-hover);
      border-color: rgba(255, 255, 255, 1);
    }
    
    .trip-hero::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(200,170,220,0.15) 0%, transparent 70%);
      z-index: -1;
    }

    .hero-overline {
      font-family: var(--font-sans);
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--wisteria);
      margin-bottom: 1rem;
    }

    .hero-names {
      font-family: var(--font-script);
      color: var(--purple-mid);
      font-size: 5rem;
      line-height: 1.1;
      margin-bottom: 0.25rem;
    }

    .hero-pet-name {
      font-family: 'Great Vibes', cursive;
      color: var(--lavender);
      font-size: 2.2rem;
      display: block;
      margin-bottom: 2rem;
      font-weight: 400;
    }

    .hero-for {
      display: block;
      font-family: var(--font-serif);
      font-size: 2.2rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 400;
    }

    .hero-dates {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.2rem;
      color: var(--text-soft);
      margin-bottom: 2.5rem;
    }

    .hero-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #C4A87A, transparent);
      margin: 0 auto 2.5rem auto;
    }

    .trip-hero-status {
      font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 0.5rem 1.2rem; border-radius: 999px; margin-bottom: 0;
      display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 600;
    }
    .trip-hero-status.live { background: rgba(16, 185, 129, 0.15); color: #047857; border: 1px solid rgba(16, 185, 129, 0.3); }
    .trip-hero-status.upcoming { background: rgba(139, 92, 246, 0.15); color: var(--accent); border: 1px solid rgba(139, 92, 246, 0.3); }

    .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.5); } 100% { opacity: 1; transform: scale(1); } }

    /* --- Chapter Cards --- */
    .chapter-card { padding: 2rem; display: flex; flex-direction: column; justify-content: space-between; min-height: 240px; }
    .chapter-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
    .chapter-num { font-family: var(--font-serif); font-size: 3rem; color: rgba(139, 92, 246, 0.2); font-weight: 700; line-height: 0.8; }
    .chapter-title { font-family: var(--font-serif); font-size: 1.8rem; color: var(--text-main); line-height: 1.2; margin-bottom: 0.5rem; }
    .chapter-subtitle { font-style: italic; color: var(--text-muted); font-size: 1rem; line-height: 1.4; }
    .progress-track { height: 6px; background: rgba(255,255,255,0.5); border-radius: 999px; overflow: hidden; margin-top: 1.5rem; }
    .progress-bar { height: 100%; border-radius: 999px; transition: width 1s ease; }
    .progress-bar.active { background: linear-gradient(90deg, var(--accent), var(--wisteria)); }
    .progress-bar.locked { background: var(--text-soft); }
    .progress-bar.planned { background: rgba(154, 140, 168, 0.3); }
    .chapter-footer { display: flex; justify-content: space-between; margin-top: 0.75rem; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-soft); }

    /* --- Incident Cards --- */
    .incident-card { padding: 1.75rem; }
    .incident-title { font-family: var(--font-serif); font-size: 1.4rem; color: var(--text-main); line-height: 1.3; margin-bottom: 1rem; }
    .incident-meta { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.5); }

    /* --- Quote Cards --- */
    .quote-card { padding: 2.5rem 2rem; position: relative; }
    .quote-icon { position: absolute; top: 1.5rem; left: 1.5rem; font-size: 3rem; color: rgba(139, 92, 246, 0.1); font-family: var(--font-serif); line-height: 1; }
    .quote-text { font-family: var(--font-serif); font-size: 1.35rem; font-style: italic; color: var(--text-main); line-height: 1.6; margin-bottom: 1.5rem; position: relative; z-index: 1; }
    .quote-author { font-family: var(--font-sans); font-size: 0.9rem; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; justify-content: space-between; }

    /* --- Badges --- */
    .badge {
      font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
      padding: 0.3rem 0.8rem; border-radius: 8px; font-weight: 600; display: inline-block;
    }
    .badge-locked { background: rgba(107, 90, 122, 0.1); color: var(--text-muted); border: 1px solid rgba(107, 90, 122, 0.2); }
    .badge-active { background: rgba(139, 92, 246, 0.15); color: var(--accent); border: 1px solid rgba(139, 92, 246, 0.3); }
    .badge-planned { background: rgba(255, 255, 255, 0.5); color: var(--text-soft); border: 1px solid rgba(255, 255, 255, 0.8); }

    /* --- Forms & Inputs --- */
    .input-field {
      width: 100%; padding: 1rem 1.5rem;
      background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.9);
      border-radius: 16px; font-family: var(--font-sans); font-size: 1rem; color: var(--text-main);
      transition: var(--transition-fast); outline: none;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
    }
    .input-field:focus {
      background: rgba(255,255,255,0.95); border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15), inset 0 2px 5px rgba(0,0,0,0.01);
    }
    textarea.input-field { min-height: 180px; resize: vertical; font-family: var(--font-serif); font-size: 1.2rem; line-height: 1.6; }

    /* --- Entry Cards --- */
    .entry-card { padding: 1.75rem; cursor: pointer; }
    .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .entry-date { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted); letter-spacing: 0.05em; }
    .entry-mood { font-size: 0.75rem; padding: 0.3rem 0.8rem; border-radius: 999px; display: inline-flex; align-items: center; gap: 0.4rem; font-weight: 500; }
    .entry-title { font-family: var(--font-serif); font-size: 1.5rem; color: var(--text-main); line-height: 1.3; margin-bottom: 0.75rem; }
    .entry-preview {
      font-family: var(--font-serif); font-size: 1.05rem; color: var(--text-secondary); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* --- Mood Chips (New Entry) --- */
    .mood-chips { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.75rem; margin: 1rem 0; }
    .mood-chip {
      padding: 0.75rem 1rem; border: 2px solid transparent; border-radius: 14px; cursor: pointer;
      font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 0.5rem;
      transition: var(--transition-fast);
    }
    .mood-chip.selected { border-color: var(--accent); transform: scale(1.05); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.15); }

    /* --- Toast --- */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--text-main); color: white;
      padding: 1rem 2rem; border-radius: 14px;
      font-family: var(--font-sans); font-size: 0.95rem; font-weight: 500;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1000;
    }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    @media (max-width: 768px) {
      .page-title { font-size: 2.5rem; }
      .nav { width: 95%; padding: 0.5rem; gap: 0.5rem; }
      .nav-brand { font-size: 1.5rem; }
      .nav-link span { display: none; }
      .grid-cards { grid-template-columns: 1fr; }
      .editor-grid { grid-template-columns: 1fr !important; }
      .animated-highlight-box { padding: 2rem 1.5rem; }
      .trip-hero { max-width: 80%; padding: 3rem 2rem; }
      .hero-names { font-size: 3.5rem; }
      .hero-pet-name { font-size: 1.8rem; }
      .hero-for { font-size: 1.6rem; }
    }

    @media (max-width: 480px) {
      .trip-hero { max-width: 95%; padding: 2rem 1.5rem; }
      .hero-names { font-size: 2.8rem; }
      .hero-pet-name { font-size: 1.5rem; }
      .hero-for { font-size: 1.3rem; letter-spacing: 0.15em; }
      .hero-dates { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div class="bg-mesh"></div>
  <div id="root"></div>

  <!-- Dependencies -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // =================================================================
    // DATA LAYER
    // =================================================================

    const MOODS = ['romantic', 'adventure', 'cultural', 'relaxed', 'celebration', 'bittersweet', 'anticipation', 'reflective', 'spiritual', 'playful'];

    const MOOD_COLORS = {
      romantic:     { bg: 'rgba(244,114,182,0.15)', text: '#BE185D', icon: 'fa-heart' },
      adventure:    { bg: 'rgba(16,185,129,0.15)',  text: '#047857', icon: 'fa-mountain-sun' },
      cultural:     { bg: 'rgba(245,158,11,0.15)',  text: '#B45309', icon: 'fa-landmark' },
      relaxed:      { bg: 'rgba(139,92,246,0.15)',  text: '#6D28D9', icon: 'fa-spa' },
      celebration:  { bg: 'rgba(230,160,60,0.15)',  text: '#B45309', icon: 'fa-champagne-glasses' },
      bittersweet:  { bg: 'rgba(107,90,122,0.15)',  text: '#4A3358', icon: 'fa-cloud-rain' },
      anticipation: { bg: 'rgba(200,120,100,0.15)', text: '#9A3412', icon: 'fa-clock' },
      reflective:   { bg: 'rgba(59,130,246,0.15)',  text: '#1D4ED8', icon: 'fa-pen-fancy' },
      spiritual:    { bg: 'rgba(120,160,140,0.15)', text: '#047857', icon: 'fa-moon' },
      playful:      { bg: 'rgba(210,100,140,0.15)', text: '#BE185D', icon: 'fa-face-smile-beam' },
    };

    const JOURNALS = ['Travel', 'Ishrat\u2019s Trips', 'Asif\u2019s Journal'];

    const loremBodies = [
      'The morning light filtered through latticed windows, casting geometric shadows on the stone floor. We stood there for what felt like hours, though it might have been minutes. Some places slow time down \u2014 this was one of them. Ishrat reached for my hand without looking.',
      'Streets narrowed into alleys that smelled of cardamom and woodsmoke. A vendor called out something we didn\'t understand, but the warmth in his voice needed no translation. She stopped at every stall, touching fabrics, holding ceramics up to the light. I carried the bags and watched her come alive.',
      'The water stretched out before us, impossibly blue, the kind of blue that makes you question every other blue you\'ve ever seen. She leaned against the railing and said nothing. I said nothing. The silence between us was the fullest conversation we\'d had all week.',
      'We got lost. Properly, beautifully lost. No map, no signal, just the two of us following our feet through a city that rewarded wandering. Every wrong turn revealed a courtyard, a fountain, a doorway that had been standing for centuries.',
      'She went in alone. I sat on the steps outside, watching pigeons and tourists and the way the light changed as clouds moved across the sky. When she came back out, her eyes were different \u2014 softer, maybe. Or just more present.',
      'The table was small, the candles were real, and the menu was in a language neither of us spoke. We pointed at things and hoped. Everything that arrived was extraordinary. She laughed when the dessert came \u2014 it was enormous, ridiculous, perfect.',
      'The air changed as we climbed. Cooler, thinner, carrying the scent of wild herbs and distant rain. Below us the city looked like a toy \u2014 all those lives, all those stories, reduced to specks of light. She said she could see our hotel. I pretended I could too.',
      'Rain came from nowhere, hard and sudden. We ducked into the first open door \u2014 a tea house, ancient and warm, the kind of place where the chairs don\'t match and the tea is perfect. We stayed two hours. It became the best memory of the trip.',
      'Walking the old walls, I told her about the version of myself I\'d imagined at twenty. She told me about hers. Neither of us had become those people, and that was fine. Better than fine.',
      'She was the teacher today. I was the student. She showed me how to read the shopkeeper\'s face, when to walk away, when to come back. I showed her how to let go of the thing you wanted. We were both bad at our lessons.',
      'Last night energy \u2014 that particular sadness of knowing something beautiful is ending. Turkish coffee, thick and sweet. The fortune-teller turned her cup and said something about water and journeys. She laughed. I saved the cup.',
      'At the gate, she squeezed my hand twice. Our signal. It means: I\'m here, I see you, this was worth it. The plane was delayed. We didn\'t mind. We sat in the plastic chairs and talked about next time.',
      'The house smelled like childhood \u2014 cooking oil, incense, the particular warmth of a place where someone has been expecting you. Ammi appeared before we could set our bags down, already listing what she\'d made.',
      'The old neighbourhood hadn\'t changed, but I had. Every street corner triggered a memory I\'d forgotten I was carrying. She walked beside me, quiet, letting me narrate a childhood she was seeing for the first time.',
    ];

    // --- Active Trip Hero ---
    function ActiveTripHero({ onNavigate }) {
      const [activeTrip, setActiveTrip] = useState(null);

      useEffect(() => {
        // Try manifest.json first, then fall back to finding upcoming/active trip from data
        fetch('data/manifest.json')
          .then(r => r.ok ? r.json() : null)
          .then(data => {
            if (data && data.active) { setActiveTrip(data.active); return; }
            findTripFromData();
          })
          .catch(() => findTripFromData());
      }, []);

      function findTripFromData() {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        // Find active or upcoming trip
        for (const trip of PLACEHOLDER_TRIPS) {
          const start = new Date(trip.dates.start + 'T00:00:00');
          const end = new Date(trip.dates.end + 'T23:59:59');
          if (today >= start && today <= end) {
            setActiveTrip(trip); return;
          }
        }
        for (const trip of PLACEHOLDER_TRIPS) {
          const start = new Date(trip.dates.start + 'T00:00:00');
          if (start > today) {
            setActiveTrip(trip); return;
          }
        }
      }

      if (!activeTrip) return null;

      const today = new Date(); today.setHours(0, 0, 0, 0);
      const start = new Date(activeTrip.dates.start + 'T00:00:00');
      const end = new Date(activeTrip.dates.end + 'T23:59:59');
      const isLive = today >= start && today <= end;
      const isBefore = today < start;
      const msPerDay = 86400000;
      const daysUntil = isBefore ? Math.ceil((start - today) / msPerDay) : 0;
      const currentDay = isLive ? Math.floor((today - start) / msPerDay) + 1 : 0;

      return (
        <div className="trip-hero stagger-2" onClick={() => window.location.href = activeTrip.itineraryPath || 'itineraries/2026-04-ishrat-engagement.html'}>
          
          <div className="hero-overline">Asif & Ishrat</div>
          <div className="hero-names">Asif & Ishrat</div>
          <div className="hero-pet-name">for my shatoot</div>
          
          <div className="hero-for">The Engagement Trip</div>
          <div className="hero-dates">April 20 — 28, 2026</div>

          <div className="hero-line"></div>

          <div className={`trip-hero-status ${isLive ? 'live' : 'upcoming'}`}>
            {isLive && <div className="pulse-dot"></div>}
            {isLive ? `LIVE NOW · DAY ${currentDay} OF ${activeTrip.dates.days}` : `UPCOMING · ${daysUntil} DAYS TO GO`}
          </div>

        </div>
      );
    }

                      <select className="input-field" value={newJournal} onChange={e => setNewJournal(e.target.value)}>
                        {JOURNALS.map(j => <option key={j} value={j}>{j}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={{ fontFamily: 'var(--font-mono)', fontSize: '0.8rem', color: 'var(--text-muted)', letterSpacing: '0.1em', textTransform: 'uppercase', display: 'block', marginBottom: '0.5rem' }}>Date</label>
                      <input className="input-field" type="date" defaultValue={new Date().toISOString().split('T')[0]} />
                    </div>
                  </div>

                  <label style={{ fontFamily: 'var(--font-mono)', fontSize: '0.8rem', color: 'var(--text-muted)', letterSpacing: '0.1em', textTransform: 'uppercase', display: 'block', marginBottom: '0.5rem' }}>Summary</label>
                  <input className="input-field" placeholder="One line that captures the moment" value={newSummary} onChange={e => setNewSummary(e.target.value)} style={{ marginBottom: '1rem' }} />

                  <label style={{ fontFamily: 'var(--font-mono)', fontSize: '0.8rem', color: 'var(--text-muted)', letterSpacing: '0.1em', textTransform: 'uppercase', display: 'block', marginBottom: '0.5rem' }}>Entry</label>
                  <textarea className="input-field" placeholder="Let the moment breathe on the page..." value={newText} onChange={e => setNewText(e.target.value)} />

                  <div style={{ display: 'flex', gap: '1rem', marginTop: '1.5rem' }}>
                    <button className="btn btn-primary"><Icon name="fa-wand-magic-sparkles" /> Refine with Voice DNA</button>
                    <button className="btn btn-secondary"><Icon name="fa-save" /> Save Draft</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // =================================================================
    // MAIN APP
    // =================================================================

    function App() {
      const [page, setPage] = useState('home');

      return (
        <div>
          <nav className="nav">
            <div className="nav-brand">Asif's Journal</div>
            <div className="nav-links">
              <button className={`nav-link ${page === 'home' ? 'active' : ''}`} onClick={() => setPage('home')}><Icon name="fa-house" /> <span>Dashboard</span></button>
              <button className={`nav-link ${page === 'memoir' ? 'active' : ''}`} onClick={() => setPage('memoir')}><Icon name="fa-book-open" /> <span>Memoir</span></button>
              <button className={`nav-link ${page === 'dayone' ? 'active' : ''}`} onClick={() => setPage('dayone')}><Icon name="fa-feather-pointed" /> <span>DayOne</span></button>
            </div>
          </nav>

          <main className="page">
            {page === 'home' && <HomePage onNavigate={setPage} />}
            {page === 'memoir' && <MemoirModule />}
            {page === 'dayone' && <DayOneModule />}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
